<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ block "title" . }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  {{ block "head" . }}{{ end }}
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="site-title" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
      <nav class="site-nav">
        {{ range .Site.Menus.main }}
          <a href="{{ .PageRef | relURL }}" {{ if eq $.RelPermalink (printf "%s/" .PageRef) }}class="active"{{ end }}>{{ .Name }}</a>
        {{ end }}
      </nav>
    </div>
  </header>
  <main class="site-main">
    <div class="container">
      {{ block "main" . }}{{ end }}
    </div>
  </main>
  <footer class="site-footer">
    <div class="container">
      <p>{{ .Site.Params.description }} · 開始於 {{ .Site.Params.started }} · 本站為個人學習筆記</p>
    </div>
  </footer>
</body>
</html>
