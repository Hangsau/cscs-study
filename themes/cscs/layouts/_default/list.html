{{ define "main" }}
<article class="page">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="page-meta">{{ . }}</p>{{ end }}
  </header>
  <div class="page-content">
    {{ .Content }}
  </div>
  <ul class="section-list">
    {{ range .Pages.ByWeight }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        {{ with .Description }}<span class="desc"> — {{ . }}</span>{{ end }}
      </li>
    {{ end }}
  </ul>
</article>
{{ end }}
