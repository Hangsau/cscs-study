  - id: "ch19-speed-and-agility-mechanics"
    title: "Speed and Agility Mechanics"
    level: 2
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      In order to execute movement techniques, athletes must apply force—the product of mass and acceleration. Due to the limited available time to produce force during most athletic activities, there are two variables that describe force relative to the time available to produce force:
      
        * Rate of force development (RFD)—the development of maximal force in minimal time, typically used as an index of explosive strength ([3](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref3>))
        * Impulse—the product of the generated force and the time required for its production, which is measured as the area under the force–time curve. According to the impulse–momentum relationship, impulse dictates the magnitude of change of momentum of an object.
      
      ### Physics of Sprinting, Change of Direction, and Agility
      
      Force represents the interaction of two physical objects. Force is a vector quantity, meaning that it has both magnitude (size) and direction. Traditionally, force is described as a push or a pull exerted on one object by another, which prevents both objects from occupying the same space. This movement of mass changes an object’s velocity, causing acceleration.
      
      Within the strength and conditioning profession, velocity and _speed_ are often used interchangeably. For a proper discussion on sprint and agility performance, these terms need to be separated. Speed is a scalar quantity, which means that it describes only how fast an object is moving. Speed is the rate at which an object covers a distance. Like force, velocity is a vector quantity. Velocity describes both how fast an object is traveling and its direction. In short, velocity is speed with a direction.
      
      Acceleration refers to the rate at which an object’s velocity changes over time. Once a force acts upon a physical object, the mass will change direction and leave the space it was occupying. Acceleration of the object will continue as long as external forces continue to change velocity. In practical settings, _deceleration_ replaces _negative acceleration_ in describing a change from higher to lower velocity.
      
      ### Rate of Force Development
      
      Within the sporting context, the ability to produce force rapidly is arguably a more desirable trait than maximal force production ([89](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref89>)). While the ability to generate high levels of maximal force has been shown to improve performance in jump height and other athletic measures, most competitive scenarios do not occur within a time frame that allows an athlete to generate maximal forces ([19](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref19>)). Specifically, the generation of maximal contraction force takes at least 300 ms, while many sport activities consume 0 to 200 ms (see [figure 19.1](<E6372ch19_d96.xhtml#f19.1>)) ([1](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref1>)). For this reason, in sport settings where success is restricted to timing of movement, RFD may be a more useful measure of an athlete’s explosive ability ([5](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref5>)). Rate of force development can be described as the change in force divided by the change in time ([89](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref89>)).
      
      **Figure 19.1** Force as a function of time, indicating maximum strength, rate of force development (RFD), and force at 0.2 seconds for untrained (solid blue line), heavy resistance–trained (dashed purple line), and explosive-ballistic–trained (dotted black line) subjects. Impulse is the change in momentum resulting from a force, measured as the product of force and time (represented by the area under each curve), and is increased by improving RFD. When functional movements are performed, force is typically applied very briefly—often for 0.1 to 0.2 seconds—whereas absolute maximum force development may require 0.6 to 0.8 seconds.
      
      ![A line graph of the change in force with an increase in time.](images/E6372_508274_ebook.jpg)
      
      [Follow for extended description](<Ext_desc_E6372_508274_ebook.xhtml#l_E6372_508274_ebook>)
      
      Reprinted, by permission, from Häkkinen and Komi, 1985 ([46](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref46>)).
      
      The ability to accelerate a mass depends on a change in velocity resulting from the application of an external force. Therefore, from a practical standpoint, an athlete wishing to achieve higher acceleration capabilities should apply forces at a greater rate ([73](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref73>)).
      
      ### Impulse
      
      In order for an object to change its location, forces must be applied to produce a change in velocity. Athletes attempting to increase speeds through the production of force never apply forces instantaneously. In fact, force is applied to the running surface over a period of time in the stance phase of sprinting ([figure 19.2](<E6372ch19_d96.xhtml#f19.2>)) or in the plant phase of changing direction. The length of time athletes are in this stance or plant phase is termed their _ground contact time_. The product of the time the force is applied to the ground and the amount of force applied is termed impulse and can be graphically represented as the area under a force–time curve. Changes in impulse result in changes of the athlete’s momentum and therefore the ability to either accelerate or decelerate.
      
      **Figure 19.2** Sprint ground reaction force and impulse during the _(a)_ acceleration phase and _(b)_ maximal-velocity phase. Wb = body weight.
      
      ![A line graph of the change in force with an increase in time.](images/E6372_508275_ebook.jpg)
      
      [Follow for extended description](<Ext_desc_E6372_508275_ebook.xhtml#l_E6372_508275_ebook>)
      
      ![A line graph of the change in force over time.](images/E6372_519440_ebook.jpg)
      
      [Follow for extended description](<Ext_desc_E6372_519440_ebook.xhtml#l_E6372_519440_ebook>)
      
      [Figure 19.2](<E6372ch19_d96.xhtml#f19.2>) demonstrates how the vertical and horizontal forces differ in magnitude when the acceleration phase ([figure 19.7](<E6372ch19_d96.xhtml#f19.7>), later in the chapter) is compared to the maximal-velocity phase ([figure 19.8](<E6372ch19_d96.xhtml#f19.8>)), which reflects the two different body positions used to produce force through maximal extension. Further, these two diagrams demonstrate the concept of impulse (represented as the area under the force–time curve) during the braking phase, indicated by a negative horizontal force, or during the propulsive phase that occurs where there is a positive horizontal force. These two phases of impulse are indicated by the vertical dotted line. It should be noted that during maximal-velocity phases, there is an asymmetrical production of force and the RFD is very high, resulting in much shorter ground contact times in comparison to the acceleration phase.
      
      Momentum is defined as the relationship between the mass of an object and the velocity of movement. During a sprint, an athlete’s body mass remains constant. Thus, given the same time frame, the only way to achieve a greater impulse is to generate greater force. This increase in impulse leads to an increase in momentum or a decrease in momentum, depending on whether the athlete is intending to accelerate or reaccelerate or decelerate before a change of direction. In other words, a change in impulse results in a change in momentum and is the cause of an object’s movement.
      
      Within human locomotion, the magnitude of the force coupled with the length of time the force is produced during an individual step is paramount to success. Changes in these forces can increase or decrease the athlete’s momentum. For this reason, training should focus on impulse—the area under the force–time curve—in addition to RFD.
      
      Power has not been discussed here because it is derived from force and velocity. Therefore, power is considered a mechanical construct that does not truly indicate maximal explosive performance ([32](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref32>)). Practically speaking, a power value does not give insight into the performance in a way that is fully useful to professionals, because it is unclear whether a power value has been achieved as a result of the force or of the velocity. In understanding that force, RFD, and impulse are direct measures, one does not require a more complex derived value to gain additional insight.
      
      ### Practical Implications for Speed
      
      In order to displace their body mass down a track or field, athletes must produce forces sufficient to overcome the effects of gravity and create a positive change in velocity. Within a short sprint, force is the effort needed to accelerate an athlete up to his or her highest achievable speeds, which are largely determined by physiological factors. These forces or efforts are produced rapidly, with time constraints that are often shorter than the time needed for maximal voluntary force production. For this reason, rate of force production may be a more important factor for sprinting success. Moreover, since sprinting success is largely dependent on the production of forces within a short amount of time, impulse is an important underlying factor.
      
      ### Practical Implications for Change of Direction and Agility
      
      In addition to the requirement for acceleration, the production of braking forces over certain periods of time, termed _braking impulse_ , should be considered during change-of-direction and agility maneuvers. The amount of impulse required to change momentum effectively and efficiently is a direct reflection of the physical requirements for change of direction. For example, as the angle of directional change required or the velocity of entry into the change of direction increases, so does the impulse required to change momentum; therefore it is physically more demanding to perform such activities. Further, the time restraints placed on a performer due to the perceptual–cognitive aspects of agility can influence the physical demands by limiting the time available to produce the required force (and impulse) to successfully change direction in response to a stimulus.

  - id: "ch19-neurophysiological-basis-for-speed"
    title: "Neurophysiological Basis for Speed"
    level: 2
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      Sprinting, agility, and change of direction are all dynamic displays of force production in the athletic setting. Because strength and conditioning professionals are often asked to assist in the development of these competitively advantageous qualities, an overview of how these force measures are produced during movement is warranted.
      
      ### Nervous System
      
      Neuromuscular function is vital to sprint performance, because the activity and the interaction of the central nervous system with the muscles ultimately influence the rate and strength of muscle contraction. Research has shown that the combination of strength, plyometric, and sprint training produces several adaptations within the neuromuscular system that may contribute to improved sprint performance. Strength training enhances _neural drive,_ the rate and amplitude of impulses being sent from the nervous system to the target muscles ([1](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref1>)). Increases in neural drive, which are indicative of an increase in the rate at which action potentials occur, are related to increases in both muscular force production and the rate of force production. Similarly, plyometric training demonstrates increases in excitability of high-threshold motor neurons. Increased excitability ultimately enhances neural drive. Taken together, increases in neural drive may contribute to increases in the athlete’s RFD and impulse generation.
      
      ### Stretch–Shortening Cycle
      
      Many functional tasks begin with preparatory countermovements involving spring-like actions referred to as the stretch–shortening cycle (SSC)—an eccentric–concentric coupling phenomenon in which muscle–tendon complexes are rapidly and forcibly lengthened, or stretch loaded, and immediately shortened in a reactive or elastic manner. Practically speaking, the SSC is demonstrated in movements in which a rapid transition from an eccentric action to a concentric action occurs. Therefore, SSC actions are particularly prevalent in sports involving running, jumping, and other explosive changes in velocity. Their performance is a distinct capability that is independent of maximal strength in elite athletes ([35](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref35>), [45](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref45>), [46](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref46>), [71](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref71>), [72](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref72>), [80](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref80>), [87](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref87>), [99](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref99>)).
      
      Stretch–shortening cycle actions exploit two phenomena: ([1](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref1>)) intrinsic muscle–tendon behavior and ([2](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref2>)) force and length reflex feedback to the nervous system ([3](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref3>), [4](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref4>), [9](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref9>), [14](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref14>), [25](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref25>)). Acutely, SSC actions tend to increase mechanical efficiency and impulse via elastic energy recovery, whereas chronically, they upregulate muscle stiffness and enhance neuromuscular activation ([35](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref35>), [45](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref45>), [46](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref46>), [71](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref71>), [72](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref72>)).
      
      Training activities aimed at improving SSC performance should fulfill two criteria ([36](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref36>), [71](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref71>), [72](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref72>), [80](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref80>), [87](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref87>)):
      
        * They should involve skillful, multijoint movements that transmit forces through the kinetic chain and exploit elastic–reflexive mechanisms.
        * In order to manage fatigue and emphasize work quality and technique, they should be structured around brief work bouts or clusters separated by frequent rest pauses.
      
      In practice, a combination of progressive plyometric and heavy resistance methods can accomplish these objectives. An intriguing example of this strategy is complex training, in which alternating SSC tasks with heavy resistance exercises within the same session enhances their working effect. The basis of this method is an acute aftereffect phenomenon referred to as postactivation potentiation ([37](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref37>), [66](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref66>), [69](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref69>)). This training modality is becoming increasingly popular as a means of enhancing advanced athletes’ performance but may be inappropriate for novices or youths.
      
      ### Spring–Mass Model
      
      Exposure to strength and speed training may be linked to a rise in the preactivation of the musculature used in sprinting ([43](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref43>), [46](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref46>)). The onset of pre-tension may be related to an increase in the sensitivity of associated muscle spindles. The improvement in the time needed for feedback from muscle spindles results in greater muscle stiffness and tendon compliance ([44](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref44>), [48](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref48>), [68](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref68>)). This physiological condition provides support to the SSC, which underpins the spring–mass model (SMM). The SMM ([figure 19.3](<E6372ch19_d96.xhtml#f19.3>)) is a mathematical model that depicts sprinting as a type of human locomotion in which the displacement of a body mass is the aftereffect from energy produced and is delivered through the collective coiling and extension of spring-like actions within muscle architecture ([10](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref10>), [21](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref21>), [27](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref27>), [29](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref29>)). During a complete running cycle, one spring compresses and propels the sprinter’s body forward. Simultaneously, the other spring swings forward in preparation for ground contact.
      
      **Figure 19.3** A simple spring–mass model relative to the ground reaction force during the stance phase of a sprint. During the stance phase, the model demonstrates how the leg (represented as a spring) is uncompressed at initial contact and then is compressed (represented by the change in length of the spring) during midstance or as vertical ground reaction force increases.
      
      ![A line graph of the change in vertical force with a change in contact time.](images/E6372_508279_ebook.jpg)
      
      [Follow for extended description](<Ext_desc_E6372_508279_ebook.xhtml#l_E6372_508279_ebook>)
      
      ![A line graph of the change in vertical force for a model and two examples over time.](images/E6372_519441_ebook.jpg)
      
      [Follow for extended description](<Ext_desc_E6372_519441_ebook.xhtml#l_E6372_519441_ebook>)
      
      Reprinted, by permission, from Clark and Weyand, 2014 ([17](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref17>)).
      
      Within an upright sprint, compression of the spring begins at foot strike, resulting in horizontal braking forces. This sudden and brief deceleration assists in propelling the swing leg forward in preparation for the subsequent step. As the center of mass moves ahead of the foot, the sprinter is in midstance. Within the SMM, the spring is compressed to the lowest point, which coincides with a lowered center of mass at midstance. Finally, the model describes the push-off segment of the stance phase as the return of energy through the extension of the coiled spring. This resultant energy and return of force projects the sprinter forward.
      
      While the SMM provides a conceptual framework for highlighting the actions involved in upright high-speed running, recent investigations suggest that there are limitations to the model’s ability to describe the stance phase of elite sprinters. As illustrated in [figure 19.2](<E6372ch19_d96.xhtml#f19.2>), during the maximal-velocity phase, elite sprinters tend to deviate from a classic SMM by producing much of their vertical force in the first half of a ground contact. In contrast, most nonelite sprinters, such as those involved in many team or field-based sports, display stance phases that are described by the SMM ([17](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref17>)), where the vertical force curve is more symmetrical, as shown in [figure 19.3](<E6372ch19_d96.xhtml#f19.3>). As such, the SMM should be used as a means to describe the relationship between the SSC, muscle stiffness, and sprinting. In fact, as stride frequency increases at a given running speed, one of the most important features of the leg spring is an increase in muscle stiffness ([29](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref29>)).
      
      Because sprinting requires an athlete to move at high speeds, strength and conditioning professionals should emphasize the prescription of exercises that have been shown to increase neural drive while overloading musculature of the hip and knee regions involved in the SSC.
      
      ### Additional Neurophysiological Considerations for Change-of-Direction and Agility Development
      
      In addition to the neurophysiological aspects of speed performance previously discussed, there are other factors to consider with regard to change-of-direction and agility performance. During the plant phase, depicted in [figure 19.4](<E6372ch19_d96.xhtml#f19.4>), the length of ground contact time of either an agility (0.23 to 0.25 seconds) ([7](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref7>)) or a change-of-direction movement (0.44 to 0.722 seconds) ([8](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref8>), [39](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref39>), [54](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref54>)) exceeds the typical ground contact time of both the acceleration phase of sprinting (0.17 to 0.2 seconds) ([4](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref4>)) and the maximal-velocity phase of sprinting (0.09 to 0.11 seconds) ([92](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref92>), [93](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref93>)). In view of this, most change of direction requires longer SSC activities.
      
      **Figure 19.4** Plant phase, termed _stance phase_ in the context of sprinting, of a change-of-direction movement. This is the point in a change-of-direction movement that represents the transition between the deceleration step and the acceleration step. Body positioning and the ability to maintain strong trunk positions during the deceleration of momentum and reorientation of the body to run in a new direction are critical for performance.
      
      ![An athlete changes their direction abruptly while sprinting.](images/E6372_0757P_3237_ebook.jpg)
      
      Since effective braking is an important part of agility performance ([83](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref83>), [84](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref84>)), neuromuscular development with respect to high-velocity and high-force eccentric contractions should be considered, for two reasons. First, the adaptations or motor unit recruitment pathways called upon during an eccentric contraction are different than those called upon during concentric contractions ([28](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref28>)). Secondly, the adaptations to eccentric training appear to be specific to the velocity of eccentric loading ([62](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref62>)). In addition, training athletes for effective agility performance requires knowledge of perceptual–cognitive demands over and above the neurophysiological requirements for changing direction. Not only are the perceptual–cognitive demands on athletes related to their abilities in the areas of visual search scanning, anticipation, decision making, and reaction time ([76](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref76>)), but also the tactical situation (offensive vs. defensive) changes the brain processing strategy required ([82](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref82>), [85](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref85>)).
      
      The training required to improve agility becomes clearer as one begins to understand the various demands required for change of direction and agility with respect to neurophysiological factors, including the SSC, eccentric muscle action neuromuscular training, and implications of the length of time or the demand of the change-of-direction maneuver on the SMM. Further, neurophysiological requirements of agility performance extend beyond physical requirements to perceptual–cognitive requirements that are specific to the tactical situation.

  - id: "ch19-sprinting-technique-guidelines"
    title: "Running Speed / Sprinting Technique Guidelines"
    level: 3
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      Linear sprinting is composed of a series of subtasks that can be divided into the start, acceleration ([figure 19.7](<E6372ch19_d96.xhtml#f19.7>)), and top speed ([figure 19.8](<E6372ch19_d96.xhtml#f19.8>)). While these phases of a sprint are technically distinct, they all require the athlete to volitionally move the lower limbs at maximal speeds through a series of stance and flight phases. The stance phase can be broken down further into an eccentric braking period followed by a concentric propulsive period. In contrast, the flight phase consists of the recovery and ground preparation segments of the swing leg.
      
      **Figure 19.7** Sprinting technique during the initial acceleration (start) and acceleration.
      
      ![The sprinting technique during start is leaning the body forward and the sprinting technique during acceleration is pushing forward.](images/E6372_0757P_3631_ebook.jpg)
      
      **Figure 19.8** Sprinting technique at maximum velocity: _(a)_ late flight to early support; _(b)_ early support; _(c)_ midsupport; and _(d)_ late support, toe-off.
      
      ![The four different sprinting techniques with different supports and phases to achieve the target.](images/E6372_0757P_3666_ebook.jpg)
      
      [Figure 19.9](<E6372ch19_d96.xhtml#f19.9>) is a sprint technique checklist that accompanies [figures 19.7](<E6372ch19_d96.xhtml#f19.7>) and [19.8](<E6372ch19_d96.xhtml#f19.8>). These recommendations are based on linear sprinting and may be useful for both instruction and evaluation of the movements. [Figure 19.10](<E6372ch19_d96.xhtml#f19.10>) describes the fundamental movements occurring in maximum-velocity sprinting.
      
      **Figure 19.9** A checklist for sprinting at start, acceleration, and maximum velocity.
      
      Sprinting Technique Checklist: Start, Acceleration, and Maximum Velocity  
      ---  
      **Start (Figure 19.7)** The athlete should attempt to distribute a balanced body weight through a set position (blocks, three- or four-point staggered start) that uses segment angles critical for the production of forces necessary to deliver explosive forces from the start.
      
        * Front lower leg angle is ~90° in elite sprinters.
        * Rear lower leg angle is ~133° in elite sprinters.
      
      Aggressive extension with both legs
      
        * Goal should be to generate high horizontal velocities through a maximal exertion (push) against blocks or ground.
        * During start clearance (0.28 seconds), the legs combine to produce ~905 N of force.
        * In order to overcome static start position, the sprinter must rely on the production of vertical forces to support the body weight in addition to moving the body’s center of gravity into an upward running position.
        * Vertical velocity is greatest during block clearance and the subsequent two steps due to the need for appropriate rise in the body’s center of gravity.
      
      Start clearance occurs once the leg set in the front block position nears extension at the knee joint.
      
        * The exit angle of the front lower leg extension (measured at knee) during block clearance is ~160° in elite male sprinter populations.
        * Optimal length of touchdown of first step is 0.5 m from start line.
        * Initial starting velocity of elite sprinters can reach 5 m/s.
      
      **Acceleration (Figure 19.7)** Initial steps
      
        * During both the start clearance and initial steps of the acceleration, the recovery of the swing legs should be low to the ground to a point where the toes are barely off the ground.
        * Elite male sprinters display a stride rate of 5.26 steps/second during the second step compared to novice sprinters, who move at a rate of 3.45 steps/second.
        * Elite male sprinters display a stride length of 1.13 to 1.15 m during the first two steps of block clearance compared to novices, who average 1.21 to 1.50 m.
        * Stride length is shorter in elite sprinters due to the need for less flight time so that horizontal velocity is increased through more frequent ground contact times.
        * Elite male sprinters average ground times of ~0.123 seconds during the second step of start clearance, while novice sprinters average 0.223 seconds.
      
      By ~20 m, the body’s center of gravity has been raised to a point at which sprinting is nearly upright. The head is in a relaxed, neutral position and will rise at the same rate as the torso. **Maximum Velocity (Figure 19.8)** The sprinter displays stacked joints with the shoulders appearing to sit directly above the hips, which sit above the foot during stance phase. The head continues to stay in a relaxed, neutral position with eyes focused directly ahead. The shoulders stay down and relaxed to allow the arms to move at the same rate as legs cycle through the phases of stance and swing.
      
        * Elite male sprinters attain horizontal velocities ~12.55 m/s compared to novice sprinters, who reach velocities of 11.25 m/s.
        * At maximum velocity, top sprinters display higher stride rates than their competitors. Specifically, elite males demonstrate a stride rate of 4.63 steps/second while novice sprinters take 4.43 steps/second.
        * Elite male sprinters produce stride lengths of 2.70 m at maximum velocity compared to their novice counterparts, who achieve 2.56 m per stride.
        * Elite male sprinters minimize ground contact time to 0.087 seconds, while novice sprinters maintain ground contact times of 0.101 during maximum velocity.
      
      
      
      Adapted, by permission, from Mann, 2011 ([52](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref52>)).
      
      **Figure 19.10** List of the fundamental movements of the flight and support phases in maximum-velocity sprinting.
      
      Fundamental Movements Occurring in Maximum-Velocity Sprinting  
      ---  
      **Early Flight**
      
        * _Eccentric hip flexion:_ decelerates backward rotation of thigh
        * _Eccentric knee extension:_ decelerates backward rotation of leg/foot
      
      **Midflight**
      
        * _Concentric hip flexion:_ accelerates thigh forward
        * _Eccentric knee extension → eccentric knee flexion_ Late Flight
        * _Concentric hip extension:_ rotates thigh backward in preparation for foot contact
        * _Eccentric knee flexion:_ accelerates leg backward, limiting knee extension; stops before foot strike (aided by concentric knee flexion to minimize braking at touchdown)
      
      **Early Support**
      
        * _Continued concentric hip extension:_ minimizes braking effect of foot strike
        * _Brief concentric knee flexion followed by eccentric hip extension:_ resists tendency of hip/ankle extension to hyperextend knee; absorbs landing shock
        * _Eccentric plantarflexion:_ helps absorb shock and control forward rotation of tibia over ankle
      
      **Late Support**
      
        * _Eccentric hip flexion:_ decelerates backward thigh rotation; rotates trunk in preparation for forward takeoff
        * _Concentric knee extension:_ propels center of gravity forward
        * _Concentric plantarflexion:_ aids in propulsion
      
      
      
      From Putnam and Kozey 1989 ([65](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref65>)); Wood 1987 ([95](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref95>)).

  - id: "ch19-technical-errors-and-coaching"
    title: "Running Speed / Technical Errors and Coaching"
    level: 3
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      [Table 19.1](<E6372ch19_d96.xhtml#t19.1>) highlights many common sprinting errors as well as possible causes and coaching corrections. Quite often, these errors are the result of the misapplication of forces due to improper coaching cues, insufficient mobility, or disruption to an athlete’s normal gait caused by external interference. For instance, an athlete may demonstrate overstriding due to a coaching drill (such as reaching to successively longer marks along the track in order to gain speed) or the belief that acutely increasing stride length will allow one to “catch up” to a competitor in a race. Regardless of the reason, the aim of coaches should be to promote an athlete’s speed through the proper transmission of forces into the ground that will optimize the athlete’s gait cycle.
      
      TABLE 19.1 Common Sprinting Technique errors, Causes, and Corrections Error | Cause | Coaching recommendations  
      ---|---|---  
      START AND ACCEIERATION  
      Hips too high in start of crouch position. | Misunderstanding of setup | Instruct athlete to space feet by 1.5 to 2 foot lengths, then lower into starting position by dropping the shin of back leg to be more parallel with sprint surface.  
      Athlete is stepping out laterally during the initial drive phase. | Improper distribution of forces | Instruct athlete to push or drive through the ground to initiate the sprint.  
      Athlete‘s arm movement is abnormally short and tight. | Misunderstanding of natural arm swing | Instruct the athlete to either (a) drive the elbow down and back or (b) pull the hands down and back so as to simulate pulling on a rope. In addition, cue the athlete to allow the hands to fully break the waist while also allowing the arms to recover at midline of the body (invisible line from nose through navel).  
      Unnecessary tension in dorsal muscles; neck hyperextension. | Misunderstanding of movement | Instruct athlete to keep head in line with spine, as the torso and head should rise at the same rate during the acceleration and transition phases of the sprint.  
      Athlete “jumps” first stride or steps over the knee of stance leg. | Push-off angle too high; upward thrust too steep | Instruct the athlete to initiate movement by driving through the ground and allow the swing leg to horizontally “cut” the stance leg shin, rather than stepping over the stance leg. In addition, one may cue the athlete to keep the foot of swing leg close to the ground in order to set up a proper acceleration phase.  
      Premature upright posture. | Inadequate push-off force; improper carriage of head | Instruct the athlete to continue pushing into the ground while maintaining a natural trunk lean. Also cue the athlete to keep the head in line with the spine, as lifting the head may result in a sudden lifting of the torso, ultimately minimizing acceleration patterns.  
      MAXIMUM VELOCITY  
      Athlete is superficially attempting to maintain an acceleration phase when the shins are clearly vertical. | Improper understanding of movement patterns | Instruct the athlete that as the shins and hips come up to vertical, so should the torso and head. Encourage the athlete to feel for the rise in the hips so that the joints (shoulders to hips to ankles) stay stacked or in line. This position allows for the proper transmission of forces into the running surface.  
      Athlete is not displaying optimal front side mechanics with regard to the height of swing leg knee. | Inadequate force production | Recall that the swing leg‘s knee height (traditionally called front side mechanics) is purely a display of ground reaction forces. Improper cueing an athlete to lift the knees may result in further improper transmission of forces and ultimately change the musculature naturally used during the sprint event.  
      Athlete is overstriding. | Misunderstanding of force application | Success in sprint events results from the ability to produce high vertical forces in a short amount of time. An athlete overstriding is attempting to increase speed via larger ground contact times, which ultimately dampens the effects of the stretch-shortening cycle. Instruct athletes to “run in their lane” and maintain their natural gait cycle.  
      Athlete is displaying chronic hamstring injury or pain. | Insufficient mobility, improper positioning of pelvis | A high likelihood of hamstring injury occurs during the swing phase of the sprint event as a result of eccentric (lengthening) forces. An athlete is further compromised when displaying anterior pelvic tilt during the sprint event. Before training or competition, mobility and soft tissue therapy may be warranted in order to stabilize the pelvis in a neutral position.  
      Athlete is attempting to “cycle” the leg action, resulting in an increased time to complete the swing phase. This is made apparent by the open gap between the knees during the stance phase. | Improper force application | Instruct the athlete to drive the foot down and back into the track, not paw. Due to the seemingly horizontal movement of the foot during a sprint, coaches often miscue athletes to paw the foot into the track. Pawing the foot horizontally against the track prevents the athlete from using vertical forces, overloading the stretch-shortening cycle to move down the track.  
      Athlete is displaying erroneous arm movement in the transverse plane. | Improper understanding of movement pattern | While traditionally coaches would claim that erratic arm movement is a symptom of fatigue, much literature suggests that speed is limited by mechanical force application, not metabolic efficiency. Under this newer model, coaches should emphasize driving the arms down and back while maintaining an upright torso. In addition, the coach should recommend to the athlete that the arm swing recover near the midline of the body in order to take advantage of the glenohumeral joint‘s natural range of motion.

  - id: "ch19-training-goals"
    title: "Running Speed / Training Goals"
    level: 3
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      The overarching goal of sprinting is to achieve optimal stride length and stride frequency through the correct application of force into the ground. The transmission of high forces must occur within a short stance phase, also known as ground contact time. During the acceleration phase, propulsive forces assist in elevating the hips above the ground to a point at which speed is no longer increasing at large rates. This portion of the sprint, known as maximum velocity, uses the SSC (through stiffness regulation) to propel the athlete’s center of mass down the track horizontally.
      
      The following fundamental training objectives regarding performance enhancement and injury prevention should be considered during the development of speed in practical settings:
      
        * _Emphasize brief ground support times as a means of achieving rapid stride rate._ As previously mentioned, this requires high levels of explosive strength. This quality is developed systematically through consistent exposure to speed training as well as properly designed strength training programs. 
        * _Emphasize the further development of the SSC as a means to increase the amplitude of impulse for each step of the sprint._ Specifically, high achievers at top-speed sprinting produce high forces in a shorter stance phase using the SSC. The complete weightlifting movements and their derivatives are key exercises for overloading the SSC with forces greater than those produced during an open sprint.

  - id: "ch19-factors-affecting-change-of-direction-an"
    title: "Agility Performance and Change-of-Direction Ability / Factors Affecting Change of Direction and Perceptual–Cognitive Ability"
    level: 3
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      It is becoming increasingly clear that the ground contact time and ground reaction force during the plant phase ([figure 19.4](<E6372ch19_d96.xhtml#f19.4>)) of a movement provide valuable insight into the physical factors that affect change-of-direction performance, while perceptual–cognitive factors must also be considered with regard to agility. Change-of-direction and agility movements performed at shallow cutting angles (less than 75°) and associated with shorter ground contact times (less than 250 ms) ([83](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref83>)) will benefit from training similar to speed training with regard to the physical demands but will still require additional perceptual–cognitive training. On the other hand, when a change of direction involves a more aggressive cutting angle (equal to or greater than 75°), the length of ground contact time can often exceed 250 ms ([8](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref8>), [38](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref38>), [54](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref54>)) due to the greater braking requirements. Therefore, one should consider increasing emphasis on eccentric strength and maximal strength alongside the concentric explosiveness required during the reacceleration. [Figure 19.11](<E6372ch19_d96.xhtml#f19.11>) provides an example of how various requirements (angle of change of direction or perceptual–cognitive requirement of agility) may affect the ground reaction force and ground contact times of athletes. Of particular interest is the effect of various methods of changing direction (for the same-degree cut) on ground reaction force and ground contact times. The effect of method of changing direction can be seen in [figure 19.11](<E6372ch19_d96.xhtml#f19.11>): The 505 was performed either with a single-leg change of direction (outside leg turn) or with a “jump turn” that can be performed in a testing environment but is not commonly performed on the field of play. Nevertheless, this demonstrates that the technique chosen will dictate the demands; therefore, if trying to elicit a specific adaptation from an athlete, one should provide specific instructions.
      
      **Figure 19.11** Comparison of ground reaction force and contact times during various change-of-direction (COD) and agility maneuvers.
      
      ![A line graph of the change in force over time.](images/E6372_508286_ebook.jpg)
      
      [Follow for extended description](<Ext_desc_E6372_508286_ebook.xhtml#l_E6372_508286_ebook>)
      
      The test used for assessment of agility performance will have an impact on perceived agility ability of the athlete. A plethora of tests are used to assess “agility,” but tests without a reactive aspect should be considered change-of-direction tests, and a test that includes a reactive stimulus is now by definition a test of agility for most sports. Further, the requirements of the test may result in assessment of factors other than change-of-direction ability or perceptual–cognitive requirements. Therefore, one must be informed about and critical regarding a test used to assess “agility” or “change-of-direction ability.” For example, if the Illinois agility test, often performed with soccer athletes ([91](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref91>)), was used after pre-season training, improvements in performance during the Illinois agility test may be due to improved metabolic capacity and not necessarily improved change-of-direction ability. This is attributed to the length of the Illinois test, which imposes a higher metabolic demand than shorter tests.
      
      TABLE 19.2 Aspects of Agility Tested or Trained in Various Drills and Tests | Change-of-direction speed | Maneuverability | Perceptual-cognitive ability | Metabolic requirement* (average length of test)  
      ---|---|---|---|---  
      Reactive agility tests | **✓** |  | **✓** | < 3 s  
      505 | **✓** |  |  | < 3 s  
      Pro agility | **✓** |  |  | < 5 s  
      T-test | **✓** | **✓** |  | < 12 s*  
      Illinois agility |  | **✓** |  | < 12 s*  
      L-run |  | **✓** |  | < 6 s  
      
      *The length of the test has a large influence on the metabolic requirements and whether changes in test performance can become a function of enhanced conditioning instead of directly related to improvements in change-of-direction or agility ability.
      
      Data from references 31, 60, 63, 75, 79, 90, 91, and 97.
      
      However, it should be noted that even similar-length tests such as the traditional 505 test, the modified 505 test (the 505 without the initial 10 m run-up), and the L-run used on the same athletes have only a moderate relationship ([31](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref31>)), indicating they are not all assessing the same type of change-of-direction ability or the same underpinning physical requirements. This becomes more apparent when one realizes that some tests require a rapid change of direction while others require multiple changes of direction. Tests with multiple changes of direction often require more bending around an object or cone, while maintaining as much velocity as possible, in comparison to a sharp change of direction that demands a rapid deceleration. Therefore, tests such as the Illinois agility or L-run that require a bend to maintain velocity instead of an aggressive change of direction could be considered tests of maneuverability ([58](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref58>)). With this said, [table 19.2](<E6372ch19_d96.xhtml#t19.2>) gives examples of change-of-direction and agility tests and drills that address different physical requirements within the realm of “agility.” One should consider the aspect most important to the given sport when determining change-of-direction and agility abilities and consider testing and monitoring various types of change-of-direction abilities and perceptual–cognitive abilities required during true agility tests.
      
      #### Change-of-Direction Ability
      
      As just stated, one must understand that an athlete’s measured change-of-direction ability may vary depending on the demand imposed by the chosen change-of-direction test. Therefore, it may be beneficial to choose different tests that measure this ability under a high-velocity braking requirement; with multiple changes of direction; or, as will be discussed, in reaction to a scenario, opponent, or stimulus. Another consideration regarding change-of-direction ability is the orientation of the body leading into the deceleration, through the transition phase as the athlete comes to a stop, and then the positioning as he or she subsequently reaccelerates out of the change of direction. Therefore, the positioning of the trunk will influence the performance of the change of direction. Therefore, it is a combination of the ability to decelerate, reorient the body to face or partially face the direction of intended travel, and then explosively reaccelerate that truly determines change-of-direction ability.
      
      Considering the requirements for rapidly changing momentum, increased muscle mass in combination with decreased body fat has been regarded as a predictor of change-of-direction performance when assessed by the T-test in elite basketball players ([16](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref16>)). Other anthropometrics and their relationship to change-of-direction ability are not discussed here, as aspects such as height and limb length are not modifiable by the strength and conditioning professional. Instead, body center of mass height is related to improved lateral change-of-direction performance ([78](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref78>)), and this can be actively targeted during training.
      
      Overall, change-of-direction ability among a variety of movement patterns (various degrees of cutting) has been shown to improve with increased hip extension velocity (rapid application of force by the hip extensors), low center of mass height, increased braking impulse and propulsive impulse, increased knee flexion entering the change of direction, minimized trunk angular displacement entering the change of direction (deceleration phase), and increased lateral trunk tilt (during 180° changes) ([15](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref15>), [70](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref70>), [78](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref78>), [83](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref83>), [84](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref84>), [86](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref86>)). As the ability to decelerate, hold body position, and then reaccelerate is important in change-of-direction tasks as described by the kinetic and kinematic requirements of faster change-of-direction and agility performances, it is clear that a well-rounded approach to strength development involving dynamic, isometric, and in particular eccentric strength capacities is needed for the development of better change-of-direction performances ([41](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref41>), [86](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref86>)). In contrast to sprint development, it is recommended that athletes undergo training that allows for the neuromuscular system to effectively adapt to the rate of loading required during the braking phase, with the understanding that the neuromuscular requirements for braking capacity must be specifically trained using high-velocity eccentric contractions ([28](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref28>)) such as those during drop landings, landing from a loaded jump, or the catch phase of a power clean or power snatch. All of these place different eccentric loading demands on the hips, knees, and ankles ([56](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref56>)).
      
      #### Perceptual–Cognitive Ability
      
      When the physical ability to change direction rapidly is present, one can focus on the components of perceptual–cognitive ability that must be developed to bring together the ability to perform both physically and mentally on the field of play. There are several components of perceptual–cognitive ability: visual scanning, anticipation, pattern recognition, knowledge of the situation, decision-making time and accuracy, and reaction time ([75](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref75>), [77](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref77>), [83](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref83>), [97](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref97>), [98](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref98>)). Many of these aspects of development are sport specific, and a comprehensive discussion is beyond the scope of this text. However, general drills to help improve these skills are discussed in the section on methods of developing agility.

  - id: "ch19-technical-guidelines-and-coaching"
    title: "Agility Performance and Change-of-Direction Ability / Technical Guidelines and Coaching"
    level: 3
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      In comparison to sprinting, change of direction and agility have a large number of degrees of freedom due to the multitude of movements that occur during a change of direction. Further, agility performance as restricted or determined by opponents or other tactical restraints and scenarios cannot be trained through the use of a single technique. Nevertheless, the following are some technical guidelines and coaching suggestions.
      
      Visual Focus
      
        * When changing direction in response to an opponent (either offensive or defensive), the athlete should focus on the shoulders, trunk, and hip.
        * Following the anticipation of the event, unless deception is intended, the athlete should quickly redirect attention to a new area to help lead the transition of the body.
      
      Body Position During Braking and Reacceleration
      
        * Control the trunk leading into the deceleration (decrease large amounts of trunk motion) ([70](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref70>)).
        * Through the stance phase, reorient the trunk and hips toward the direction of intended travel to allow for a more effective reacceleration ([15](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref15>)).
        * Just as with acceleration mechanics, body lean is paramount in allowing proper force application through the ground with strong alignment of the ankle, knee, and hip and through to the trunk and shoulders.
        * Enter and exit changes in direction with a lower center of mass; when performing side-shuffling changes of direction, maintaining this low center of mass is critical ([78](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref78>)).
      
      Leg Action
      
        * Ensure that the athlete can effectively dissipate or tolerate the eccentric braking loads through an effective range of motion at the knee and avoid a stiff-legged braking style ([81](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref81>), [83](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref83>)).
        * Emphasize “pushing the ground away” in order to enhance performance, especially while learning in closed drills. External focus of attention—through instructions to concentrate on the ground instead of a body part—has been shown to improve change-of-direction performance ([64](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref64>)).
      
      Arm Action
      
        * Powerful arm actions should be used to facilitate leg drive.
        * Ensure that the action of the arms is not counterproductive (i.e., does not cause a decrease in speed or efficiency), particularly during transitioning between difficult changes of direction (e.g., from a backpedal to a sprint).

  - id: "ch19-training-goals"
    title: "Agility Performance and Change-of-Direction Ability / Training Goals"
    level: 3
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      The three goals of agility performance are enhanced perceptual–cognitive ability in various situations and tactical scenarios, effective and rapid braking of one’s momentum, and rapid reacceleration toward the new direction of travel. To meet these goals, one should emphasize the following:
      
        * Directing visual focus toward the opponent’s shoulders, trunk, and hips to increase perceptual ability to anticipate the movement of a defensive or offensive opponent ([75](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref75>))
        * Orienting the body into a position that allows for effective application of forces into the ground to maximize braking capacity, and increasing the speed from which one can rapidly stop as well as the direction of movement one must brake from (running forward, running backward, or shuffling laterally) ([15](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref15>), [70](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref70>), [78](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref78>), [83](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref83>), [84](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref84>), [86](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref86>))
        * The ability to maintain a good position after braking, reorient the body into a position that faces the new direction, and effectively use acceleration mechanics to reaccelerate ([58](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref58>))

  - id: "ch19-methods-of-developing-speed"
    title: "Methods of Developing Speed"
    level: 2
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      From a practical standpoint, the demonstration of proper speed is the result of well-organized programming that organically develops and matures the required skill sets within the athlete. This organic approach to sprint training results from a schema of development that is based on the emphasis and de-emphasis of certain qualities, such as acceleration and maximum velocity, within each training phase. Furthermore, the training plan should coordinate these singular qualities through phasic progression. A well-constructed training plan highlights specific components that will assist in fully maximizing an athlete’s movement potential.
      
      ### Sprinting
      
      Although a variety of training stimuli are important for the optimization of athletic performance, it can be argued that no exercise improves running velocity more than maximum-velocity sprinting. An athlete’s sprint prowess depends on the generation of high forces in short periods of time ([52](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref52>), [93](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref93>)). Neurological adaptations resulting from long-term training plans that emphasize maximal strength and movement velocity improve both RFD and impulse generation ([1](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref1>), [89](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref89>)). In the strength and conditioning setting, weightlifting movements and jump training are prescribed to develop RFD and impulse at varying loads, as these movements use the SSC. Similarly, upright sprinting uses the SSC, defining it as a plyometric movement. Chronic exposure to movements eliciting the SSC can increase muscle stiffness, which is a potential physiological advantage for sprint ability ([29](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref29>)).
      
      In addition, sprinting requires near-maximum to maximum muscle activation, which depends on high central nervous system activity. This activity is often referred to as _rate coding_ ([47](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref47>), [68](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref68>)). When signal frequency reaches a threshold, skeletal muscle may not completely relax between stimulations ([47](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref47>)). Incomplete relaxation results in more forceful contractions and a greater RFD in subsequent contractions ([57](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref57>)). Therefore, chronic exposure to sprinting may lead to improvements in musculoskeletal control via the central nervous system. This would result in a cyclical dose–response relationship, as neurophysiological adaptations from previous practices would bolster subsequent training. In an effort to either enhance the force required or target potential neuromuscular adaptations for sprinting improvement, resisted and assisted sprint training techniques are often employed. The proposed benefits, potential drawbacks, and coaching considerations are outlined in [table 19.3](<E6372ch19_d96.xhtml#t19.3>).
      
      TABLE 19.3 Assistance and Resistance Training for Speed Development Type of training | Example exercise modalities | Potential benefits | Potential disadvantages | Practical use suggestion  
      ---|---|---|---|---  
      Assistance training (e.g., overspeed training) | Inclusive of modalities such as rope towing, bungee cord pulls, or downhill running with the intention of allowing the athlete to run at supramaximal speeds | Theoretically, these training tools are used in hopes of exposing the athlete to higher velocities than one can achieve in unassisted sprinting by inducing an increased stride rate. This increased stride rate is hypothesized to have potential for neuromuscular adaptations to increase maximal sprint velocity. | Assisted sprinting may prematurely rush an athlete‘s stance phase, thus removing time needed to exert proper forces, and has been shown to result in decreased muscle activation and propulsive force production in comparison to maximal running ([55](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref55>)). Therefore what can be described as “chop” steps may often be observed. Exercises that rely on the towing of athletes may increase braking forces in comparison to maximal running ([55](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref55>)) as athletes attempt to tolerate velocities they cannot naturally create or accommodate to as a result of biomechanical efficiency, training state, or both. Downhill sprinting may expose the athlete to unnecessary eccentric forces through a modified stance leg that results from having to “find the ground.” This may also affect the SSC, which is optimized through the foot placement occurring just in front of the center of mass upon ground contact in flat-surface upright sprinting ([55](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref55>)). To date, very little research supports the implementation of overspeed training, as sprint success results from an athlete‘s ability to produce large forces in a short ground contact time. | Top-speed sprinting should be developed through more natural and safer training tools that consider an athlete‘s training status and support optimal biomechanics. Coaches should carefully assess the implications of assistance modalities before implementation.  
      Resistance training | Inclusive of training modalities such as sled towing, wind resistance, incline sprinting, and sled pushing with the intention of improving an athlete‘s accelerative abilities | Accentuates the biomechanics of the acceleration phase by placing the athlete in a position that promotes lowered torso, hips, and shin angles. Resisted sprinting may optimize an athlete‘s ability to cover short distances quickly by overloading the acceleration phase, resulting in ground contact times that produce higher propulsive forces. Improving acceleration, which is a change in velocity, may lead to an increase in top speed through enhanced rate of force development. | Sprint efforts against a load that is too great may lead to longer ground contact times in addition to shorter stride lengths that are not task specific ([49](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref49>)). Slopes of incline that are too great may modify proper sprinting biomechanics, resulting in rehearsal of improper technique and thus limiting transfer of training effect. Sled pushing may alter the natural sprinting gait cycle due to the removal of arm action that synchronizes and counterbalances the leg action occurring at the hip. | Coaches and athletes attempting to improve the acceleration phase of a sprint may adopt resistance training modalities that maintain normal biomechanics involved in unresisted sprints. Loads should be chosen based on the sporting context while also considering the athlete‘s physical status. For instance, track and field sprinters may use loads that do not decrease running velocity by more than 10% to 12% ([2](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref2>), [39](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref39>), [51](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref51>), [42](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref42>)). In contrast, field sport athletes who overcome external resistance while blocking, tackling, and scrimmaging can use loads 20% to 30% of body weight to improve the initial 5-10 m of movement ([20](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref20>), [42](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref42>)).  
      
      ### Strength
      
      As noted throughout the chapter, sprint speed is underpinned by an athlete’s ability to produce large forces within a brief period of time. These forces must be large enough to (a) support the body weight in the presence of gravity and (b) displace the body through an increase in velocity ([52](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref52>)). Thus many strength and conditioning professionals are aware of the importance of weight training in the development of a sprint-based athlete. Central to the discussion of strength training is how best to transfer newly developed strength qualities from the weight room to the track ([96](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref96>)). The transfer of strength improvements to sprinting may require an emphasis on the specificity of training. This transfer of training effect deals with the degree of performance adaptation and may result from the similarities between the movement patterns, peak force, RFD, acceleration, and velocity patterns of an exercise and the sporting environment ([87](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref87>)).
      
      While maximal strength training may be beneficial, training should emphasize agendas that merge maximal strength and speed–strength qualities ([34](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref34>)). The selection of exercises and movements that provide opportunities to display forces and velocities similar to those found in sprinting may have the most benefit with regard to enhancing rate coding and firing frequency, alongside alterations to Type II muscle fibers such as cross-sectional area and fascicle length ([30](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref30>), [33](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref33>)). For instance, evidence suggests that weightlifting movements and their derivatives such as the clean, snatch, and midthigh pulls may enhance sprint performance through physiological adaptations such as muscular stiffness, enhanced RFD, and coactivation of the musculature surrounding the hips and knees ([6](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref6>), [18](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref18>), [24](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref24>)).
      
      ### Mobility
      
      While not a kinetic variable, soft tissue manipulation has become an increasingly used practice in the development of speed athletes. Coaches and trainers rely on tools such as stretching, chiropractic care, massage, and myofascial release in an attempt to achieve optimal mobility within the dynamic state. Mobility is the freedom of an athlete’s limb to move through a desired range of motion, whereas flexibility is a joint’s total range of motion. With an understanding that positional characteristics are among several limiting factors in performance, coaches should ensure that proper postural integrity is in place before the onset of practice or competition.
      
      Based on the previously described constructs of speed, the currently accepted model of sprint success is based on the athlete’s ability to produce and overcome ground reaction forces in a short amount of time. Moreover, while these ground reaction forces assist in producing optimal stride length through forward propulsion, the sprinter’s position in flight may be limited by insufficient mobility. Specifically, an athlete may possess the physical characteristics necessary to yield high rates of force in a short amount of time, but compromises in a joint’s freedom of movement will result in misplaced forces. The improper placement of forces due to erroneous ground contact will result in dampened sprint speed and an increased likelihood for injury.

  - id: "ch19-methods-of-developing-agility"
    title: "Methods of Developing Agility"
    level: 2
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      As discussed throughout the chapter, a multifactorial approach is warranted to develop both the physical and the perceptual–cognitive aspects required for continual improvement in agility performance. Therefore, one should consider a plan that addresses underpinning physical capacities using various strength development strategies, technical competence in a closed skill environment with movement-specific actions (change-of-direction ability), and improvement of perceptual–cognitive capacity through agility drills and inherent aspects of skills practice ([58](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref58>)).
      
      ### Strength
      
      Similar to aspects of strength development for speed, strength development for agility should emphasize relative strength and a variety of speed–strength qualities along the force–velocity spectrum. However, additional development of the eccentric strength of the athlete due to the large braking forces during change-of-direction and agility movements should be considered. This means that training exercises can include a spectrum of load–velocity profiles in the weight room ([32](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref32>)) as well as a variety of load–velocity profile activities in the field, such as squat jumps, countermovement jumps, and drop jumps of various heights in combination with the change-of-direction and agility drills themselves. The multifactorial nature of agility warrants a well-rounded approach to strength development. [Table 19.4](<E6372ch19_d96.xhtml#t19.4>) provides an example of how training in the weight room and on the field can satisfy the strength requirements underlying agility performance. Understanding that athletes will develop the physical requirements before being able to transfer newly gained strength into technical competence helps both coaches and athletes realize that performance gains will lag behind fundamental physical requirements for a given technical skill ([88](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref88>)).
      
      TABLE 19.4 Comparison of Focus for Agility Development in Novice and Advanced Athletes Strength requirement | Novice athletes (weight room associated) | Novice athletes (field and court drills) | Advanced athletes (weight room associated) | Advanced athletes (field and court drills)  
      ---|---|---|---|---  
      **Dynamic strength** Required to provide base strength for all subsequent training as well as to ensure adequate mobility during body weight and loaded training | Body weight exercises | “Body awareness” work such as leaning drills | Squat (and variations) Pulls (and variations) | Various change-of- direction drills  
      **Concentric explosive strength** (may include isometric strength work) Required to effectively reaccelerate after the braking phase or maintain strong position through the transition phase of change of direction and agility | Box jumps | Acceleration drills | Box jumps Olympic lifts Squat jumps (loaded) | Advanced acceleration drills (e.g., sled push)  
      **Eccentric strength** Required to develop the ability to effectively absorb load required during the braking phase of change of direction and agility | Drop landing | Deceleration drills (forward emphasis) | Drop landings and receiving strength required during the catch phase of Olympic lifts Accentuated eccentric training | Decelerations drills (high velocity and various angles)  
      **Reactive strength** Required to increase the ability to transfer from high eccentric load to concentric explosiveness | — | Beginner plyometrics | Loaded jumps Drop jumps Complex training | Advanced plyometrics  
      **Multidirectional strength** Required to hold body position strongly during multitude of movement demands | Lunges | Low-velocity COD (e.g., Z-drill) Lateral, backward, and forward COD drills | Unilateral lifts Greater degree of freedom lifts (e.g., land mine exercises) | High-velocity COD drills Challenging cutting-angle COD drills  
      **Perceptual-cognitive abilities** Required to progress in visual scanning, effective anticipation, and decision making | — | Simple reaction drills: introduction to increasing either temporal or spatial uncertainty | — | Small-sided games Agility drills with severely restricted temporal and spatial aspects  
      
      COD = change of direction.
      
      Adapted, by permission, from Nimphius, 2014 ([58](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref58>)).
      
      ### Change-of-Direction Ability
      
      Similar to the progressions of plyometric activities based on intensity and difficulty of each drill, closed skill change-of-direction drills can progress from beginner to intermediate to advanced levels based on the physical loading demands that have been discussed in this chapter. [Table 19.5](<E6372ch19_d96.xhtml#t19.5>) presents an example of a progression of drills for change-of-direction ability (both rapid changes of direction and those associated with maneuverability), as well as a progression plan for agility drills. The physical loading during agility drills will be higher than beginner change-of-direction drills. Therefore, [table 19.5](<E6372ch19_d96.xhtml#t19.5>) provides practitioners with a series of drills and a guideline for safely and effectively advancing athletes so they can build on their physical and technical attributes as they improve.
      
      TABLE 19.5 Change-of-Direction and Agility Drill Progressions Agility component | Beginner | Intermediate | Advanced  
      ---|---|---|---  
      Change of direction | Deceleration drills (forward) progressing to higher entry velocity or shorter distance to stop Basic movement patterns for forward, backward, and lateral shuffling Change-of-direction drills that involve low velocities (less than 5 yards of acceleration into change of direction)— Z-drill, for example | Deceleration drills (lateral) with same progressions as forward Expand to include a broad range of cutting angles less than 75° May increase entry velocity during drills (up to 10 yards of acceleration leading into change of direction) | Deceleration to reacceleration in both forward and lateral directions Expand further to a comprehensive range of cutting angles including those greater than 75°  
      “Maneuverability” | Basic drills or tests such as the Illinois agility that require nearly straight-line running with slight bends | Drills that increase the difficulty of the “bend” involved such as the L-run Drills that require transition between modes of movement (shuffling, sprinting, and backpedaling) such as the T-test |   
      Agility | Physical and technical competence should occur before agility drills are incorporated. | Change-of-direction drills in beginner and intermediate categories with the addition of simple stimuli (arrow, pointing in a certain direction) These drills present a limited number of options for the athlete to have to react to (e.g., right or left, forward or back) on the signal | Expand into large degrees of spatial and temporal uncertainty (and therefore greater perceptual-cognitive stress) Small-sided games Evasion games and drills  
      
      Adapted, by permission, from Nimphius, 2014 ([58](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref58>)).
      
      ### Perceptual–Cognitive Ability
      
      During years of skills training (within the sport), athletes continually enhance visual scanning, pattern recognition, and knowledge of the situation, while in drills used to improve agility (outside of skills practice) they primarily focus on improving anticipation, decision-making time, and accuracy. In the same way one would regularly increase the demands of a physical task to continually improve performance, one can train perceptual–cognitive ability ([table 19.5](<E6372ch19_d96.xhtml#t19.5>)). Therefore, agility activities should begin by adding a perceptual–cognitive component to common closed skill change-of-direction drills. For example, decelerations or the Z-drill can evolve into agility drills by including a generic stimulus such as a whistle, a coach command, or a flashing arrow or light ([76](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref76>), [97](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref97>)). Following success with the aforementioned agility drills, progression requires activities that have sport-specific stimuli such as evasive drills and small-sided games, which have been said to have better transfer to performance ([76](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref76>), [97](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref97>)). Both generic and specific stimuli can be made more difficult within a given agility drill through progressive increases in either temporal (time) or spatial (space or area) stress on the athlete.

  - id: "ch19-program-design"
    title: "Program Design"
    level: 2
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      Program design involves planning at several levels, each with its own set of considerations: microcycles (short-term), mesocycles (medium-term), and macrocycles (long-term). The process is referred to as periodization. Periodization is the strategic manipulation of an athlete’s preparedness through the employment of sequenced training phases defined by cycles and stages of workload. These planned workloads are varied in order to facilitate the integration of planned programming tactics that will harmonize the relationship between training-induced fatigue and accommodation ([22](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref22>)). Furthermore, the periodization process is guided by information collected during the athlete monitoring process. Specifically, as an athlete progresses through a training phase, consistent information acquired through various monitoring strategies helps to show how the athlete is responding to the training stimulus in the short term and how the athlete should be further developed in the long term—that is, how the original training program should be modified to reflect responses to the training.
      
      At each level of training plan development, strength and conditioning professionals must manipulate certain variables. While these are useful in characterizing the training agenda as well as quantifying workloads, coaches should also keep in mind that each variable must be considered individually as well as with regard to how it affects the collective system. Moreover, individual athlete training responses, which athlete monitoring reveals, should be used in the manipulation of these variables.
      
        * Exercise (or work) interval—the duration or distance over which a repetition is executed
        * Exercise order—the sequence in which a set of repetitions is executed
        * Frequency—the number of training sessions performed in a given time period (e.g., day or week)
        * Intensity—the effort with which a repetition is executed (% of maximum)
        * Recovery (rest) interval—the time period between repetitions and sets
        * Repetition—the execution of a specific workload assignment or movement technique
        * Series—a group of sets and recovery intervals
        * Set—a group of repetitions and rest intervals
        * Volume—the amount of work (e.g., three sets of five repetitions) performed in a given training session or time period
        * Work-to-rest ratio—the relative density of exercise and relief intervals in a set, expressed as a ratio
        * Volume load—the density of volume performed at prescribed intensities—for example, three sets of five repetitions at 100 kg results in a volume-load of 1,500 kg
      
      [Chapter 21](<E6372ch21_d98.xhtml>) explains periodization of resistance training programs, and the same concepts can be applied to sprint, change-of-direction, and agility training.

  - id: "ch19-speed-development-strategies"
    title: "Speed Development Strategies"
    level: 2
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      The planning process for speed development is very similar to that used by strength and conditioning professionals in the weight room. Specifically, planning tactics should be periodized in a manner that addresses the physical and psychological components of sprinting through emphasis and de-emphasis on particular qualities in a phasic manner. An athlete’s capability to sprint can be improved through the incorporation of training periods that are designed to fully maximize and saturate a fitness quality, which may bolster the effects of future training agendas.
      
      In order to enhance speed, a practitioner should consider the relationship between human locomotion and force production. Throughout this chapter the authors have pointed to a link between sprint success and certain physiological phenomena. Elite sprinters produce large amounts of force within a short amount of time. This high level of force allows the sprinter to produce longer stride lengths at a faster rate. This display of movement on the track is a reflection of enhanced neuromuscular factors, namely maximal strength, RFD, and impulse. These variables are the product of well-designed training protocols that aim to enhance qualities such as the hypertrophy of task-specific motor units, firing frequency, rate coding, and muscle–tendon stiffness.
      
      The example of speed development provided in the application table demonstrates how sequenced phases of training may seamlessly develop sprint potential through the maturation of accelerative abilities before the execution of maximal-velocity efforts. This model, which can be referred to as a _short to long method_ of sprint training, is a conceptual progression that attempts to merge the relationship between larger rates of acceleration and greater sprint velocities (discussed earlier in this chapter) ([23](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref23>)). Specifically, an athlete taking part in a short to long model will begin the training year with an emphasis on improving propulsive force output through short sprints that maintain the biomechanics associated with the acceleration phase of a sprint. Later, the athlete bridges into longer sprint work that aims to enhance top speed through upright running mechanics. The concept behind this proposed model is that an athlete may see greater improvements in top speed if force production can occur at the ideal rate and moment through an investment in acceleration development and optimization ([52](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref52>)).
      
      Application of Speed Development Strategies: Phasic Development of a Short-Distance (100 m) Sprinter Block and emphasis | Training tool and notes | Load prescription (rest periods between sets) for week 1 for each block  
      ---|---|---  
      **BLOCK 1:** _Primary aim:_ Acceleration development | 
      
        1. Use incline sprinting in order to place athlete into proper acceleration mechanics, which provides an opportunity to maximize propulsion forces in the initial stages of a sprint.
        2. Emphasize low heel recovery; driving the foot “down and through” the ground; aggressive and complete arm action; neutral head position “in line with the spine.”
      
      | **MONDAY AND WEDNESDAY:** **Incline sprints** 1 × 3 × 15 m (1.5 min) 1 × 4 × 20 m (2 min) **FRIDAY:** **Incline sprints** 1 × 2 × 15 m (1.5 min) 1 × 3 × 20 m (2 min) 1 × 2 × 25 m (2.5 min)  
      **BLOCK 2:** _Primary aim:_ Long acceleration development _Secondary aim:_ Improve transition to upright sprinting _Tertiary aim:_ Exposure to speed endurance | 
      
        1. Steadily remove the athlete from the incline by gradually introducing flatground sprinting from a low starting position or towing mechanism.
        2. Promote the correct biomechanics of transition sprinting from acceleration to maximal velocity through the inclusion of acceleration holds.*
      
      | **MONDAY:** **Incline sprints** 1 × 3 × 30 m (3 min) 1 × 3 × 40 m (4 min) **WEDNESDAY:** **Push-up starts** 1 × 4 × 15 m (2 min) **Sled tows** 2 × 3 × 20 m (2 min /4 min) **FRIDAY:** **Crouch starts** 1 × 4 × 15 m (2 min) **Acceleration holds** 1 × 3 × 40 m (4 min)  
      **BLOCK 3:** _Primary aim:_ Introduction to max speed training _Secondary aim:_ Maintain accelerative ability _Tertiary aim:_ Continued exposure to speed endurance; introduction to special endurance | 
      
        1. Maintain acceleration abilities through inclusion of short sprints at beginning of almost every session.
        2. Begin exposure to maximum speed training through exercises that use upright sprinting mechanics.
        3. Prescribe speed endurance or special endurance sessions later in the week when effects of summated fatigue may dampen neural drive.
      
      | **MONDAY:** **Block starts** 1 × 2 × 20 m (2.5 min) 1 × 2 × 30 m (3.5 min) **Accelerations from crouch stance** 1 × 3 × 40 m (5 min) **WEDNESDAY:** High-stance starts 1 × 3 × 20 m (2.5 min) Fly-ins 1 × 4 × 15 m build/20 m fly (4 min) **FRIDAY:** **Block starts** 1 × 4 × 25 m (3 min) **Accelerations from crouch stance** 1 × 2 × 45 m (5 min) **Speed endurance from high stance** 1 × 2 × 60 m (5.5 min)  
      **BLOCK 4:**
      
        1. _Primary aim:_ Enhance maximal speed ability
        2. _Secondary aim:_ Maintain accelerative ability
        3. _Tertiary aim:_ Continued exposure to speed endurance and special endurance
      
      | 
      
        1. Continue exposure to maximum speed training through longer fly-in zones or race-modeling practices.
        2. Maintain acceleration abilities through inclusion of short sprints at beginning of almost every session.
        3. Prescribe speed endurance or special endurance sessions that are relevant to the athlete‘s primary events.
      
      | **MONDAY:** **Push-up starts** 1 × 3 × 15 m (2 min) **Block starts** 1 × 2 × 20 m (2.5 min) 1 × 2 × 30 m (3.5 min) acceleration holds 1 × 2 × 40 m (5 min) **WEDNESDAY:** **High-stance starts** 1 × 3 × 20 m (2 min) **Fly-float-fly** 1 × 4 × 20/20/20 (7 min) **FRIDAY:** **Block starts** 1 × 3 × 25 m (3 min) **Accelerations from crouch stance** 1 × 1 × 40 m (5 min) **Speed endurance from high stance** 1 × 1 × 70 m (6.5 min) 1 × 2 × 90 m (8.5 min)  
      
      *An acceleration hold is a sprint drill for which the coach places a cone on the track near or slightly before the point at which an athlete‘s shin typically rises to a vertical position, which is indicative of upright sprinting. The athlete is then instructed to maintain the speed achieved up to the cone through the remainder of the sprint. For instance, an athlete may be prescribed acceleration holds for 40 m, but the coach‘s mark ending the acceleration zone is placed at the 20 m mark on the track. The athlete then maintains that speed from the 20 m to the 40 m. This drill is used to begin to focus on improving transitional mechanics as well as a method to introduce speed endurance.
      
      ### Monitoring Sprint Ability
      
      The longstanding method of assessing an athlete’s speed ability has typically involved a test of maximal-effort linear sprinting. Much of the time, the maximal-effort sprint test is carried out over a distance, such as 40 yards (36.6 m), that is believed to be relevant to the athlete’s sport. While time to completion is an effective tool to evaluate changes in sprint performance, these tests do not fully address the minute changes regarding an athlete’s progression toward race or field readiness. In addition, testing error in the form of hand timing and various start tactics confound the interpretation of testing results. As a result, strength and conditioning professionals may consider the adoption of additional monitoring tools as part of their battery of assessments.
      
      One such method of evaluation comes from the assistance of high-speed cameras or optical timing systems that use interruptions of infrared light to capture data from an athlete’s collective foot strike ([12](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref12>)). This technology provides coaches with additional insight into the sprint capabilities of the athlete. [Table 19.6](<E6372ch19_d96.xhtml#t19.6>) provides a description of key variables that may be beneficial in the monitoring of speed development.
      
      TABLE 19.6 Monitoring Speed Development Measure | Description | interpretation  
      ---|---|---  
      Ground contact time | The total time allotted for a single stance phase. | In general, decreased ground contact times coupled with improved sprint completion times may suggest that an athlete has improved the ability to generate high rates of force in a shorter amount of time. However, an athlete may demonstrate slightly longer ground contact times at the initial stages of the sprint due to acceleration mechanics.  
      Step length | The distance between the toe and heel of two consecutive footsteps. Example: centimeters between the toe of right foot and the heel of left foot. | Improvements in step length (increases in distance covered) may occur through improved sprint mechanics or posture and ultimately enhanced force output.  
      Stride length | The distance between the heel in two consecutive steps of the same foot. Example: meters between the heel of the right foot and the heel of the next ground contact made by the right foot. | Improvements in stride length (increases in distance covered by two successive steps) may occur through improved sprint mechanics or posture, and ultimately enhanced force output.  
      Flight time | The duration of time that an athlete is not in contact with the ground. This occurs between the end of one step and the beginning of the subsequent step. | Increases in flight time can be interpreted two ways: (1) An athlete is producing higher vertical forces over a shorter amount of time, resulting in proper horizontal displacement of the athlete‘s mass down the track. (2) An athlete is producing higher forces over a longer amount of time, which may result in unnecessary vertical amplitude of the center of mass.  
      Stride angle | The angle at which the foot leaves the track. | The angle of stride may provide the coach with an ability to determine if the athlete is producing forces at the right moment, which is achieved through proper sprint mechanics. Furthermore, data on the stride angle elucidate what stage of sprint the athlete is attaining (acceleratory, transitory, maximum speed) and may relate to ground contact times.  
      Speed | The relationship between steps and the sum of the first step‘s ground contact time and the flight time leading to the subsequent ground contact. | Speed dictates how fast an athlete can move the body mass over a specific distance.  
      Acceleration | The change in speed as determined by the delta of two steps (e.g., right heel to left heel) and the sum of ground contact times and flight times of each step. | Acceleration provides insight into how well the athlete changes speed (increasing velocity in a direction) over a prescribed distance. For most athletes, furthering the length an athlete can accelerate will lead to higher top speed, provided that postural integrity and mechanics are sound.

  - id: "ch19-agility-development-strategies"
    title: "Agility Development Strategies"
    level: 2
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      The development of agility is best achieved using a periodized programming method. Random programming or the development of agility using only “sport-specific methods” such as small-sided games has not been found to be as effective ([11](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref11>)). Although agility is a constant element on the field of play or during skills practices, it is recommended that agility development begin with the use of change-of-direction drills (preplanned) and progress in difficulty through increases in the physical demands; this is followed by the addition of drills involving perceptual–cognitive stress or what are typically termed “agility” drills ([50](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref50>), [97](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref97>)). In line with this recommendation, the development of agility should start with a needs analysis based on assessment of the athlete’s change-of-direction ability and agility. The agility test should specifically evaluate perceptual–cognitive ability, as previously described in [table 19.2](<E6372ch19_d96.xhtml#t19.2>). Further, dependent on the additional movement requirements of the sport, one may also choose to use a test that is more dependent on maneuverability. The following is an example of using this type of testing information to create an informed agility program.
      
      ### Sample Program of Agility Development
      
      The following is an example of steps for determining the appropriate tests, analyzing the results, and using them to program agility development of an athlete. As agility performance is underpinned by multiple factors, one should target the largest window of opportunity through direct assessment of the strengths and weakness of the athlete.
      
        * Step 1: Perform a needs analysis of the sport and match tests appropriately to assess these qualities (see the table).
        * Step 2: Determine strengths and weaknesses by comparing results as a standardized score to performance standards or team mean (see [figure 19.12](<E6372ch19_d96.xhtml#f19.12>)).
        * Step 3: Plan the development of a primary area of need and a secondary area of need for the athlete.
        * Step 4: Distribute the time available for this development based on need identification.
      
      Needs Analysis for Agility Development Sport | Basketball  
      ---|---  
      Time frame | 12 weeks (8 weeks off-season and 4 weeks preseason training)  
      Sport-specific agility needs analysis | High-velocity changes of direction
      
        * Backdoor cuts, cuts through the lane, fast break, and possession changes Maneuverability (multiple modes of change-of-direction movement)
        * Defensive shuffling, backpedaling, and bending changes of direction around screens to lose defender
      
      Agility (perceptual-cognitive)
      
        * Decision-making time (provides great advantages both offensively and defensively)
        * Ability to move in reaction to play or opponent
      
      
      Recommended tests | 505, T-test, agility test (decision time measured)  
      
      **Figure 19.12** Strengths and weaknesses of an athlete through representation of standardized scores for perceptual–cognitive ability, maneuverability, and change-of-direction ability. Negative values indicate performance lower than average whereas positive values indicate performance better than average.
      
      ![A horizontal bar graph of the decision time for different Z scores.](images/E6372_508940_ebook.jpg)
      
      [Follow for extended description](<Ext_desc_E6372_508940_ebook.xhtml#l_E6372_508940_ebook>)
      
        * Step 5: Provide a preliminary plan for transition of percent distribution through the training blocks (see the table). Determine if this progression is appropriate by monitoring the development of change of direction and agility as described in [table 19.7](<E6372ch19_d96.xhtml#t19.7>) (e.g., change-of-direction deficit).
      
      Planned Distribution of Training Blocks for Agility Development | Change of direction Primary aim | Maneuverability Secondary aim | Agility (perceptual-cognitive) Tertiary aim  
      ---|---|---|---  
      Estimated % time allotted through blocks | Block 1 ~65% Block 2 ~60% Block 3 ~50% | Block 1 ~35% Block 2 ~30% Block 3 ~25% | Block 1 N/A Block 2 ~20% Block 3 ~25%  
      Additional comments | Check strength or specifically load absorption ability with drop landings. | Assess body positioning during lateral shuffling and changes of direction. | May be reliant on their perceptual- cognitive ability. This may have previously masked the identification they could improve their physical change-of-direction ability.  
      
      With the information provided by the testing as well as taking into account other physical fitness capacities, one can implement an appropriate periodized plan. The application table for agility shows an example of three blocks of training (four weeks each). The length of time for a training session is between 10 and 15 minutes inclusive of work and rest time and can be completed one to three times per week dependent on additional requirements of the athletes (such as skills training increasing in the preseason). A variety of drills can replace the examples given here; however, they should be chosen based on their classification ([table 19.2](<E6372ch19_d96.xhtml#t19.2>)) and ability to address the athlete needs.
      
      Application of Agility Development Strategies Block and emphasis | Training tool and notes | Load prescription (rest periods between sets) for week 1 for each block  
      ---|---|---  
      **BLOCK 1:** _Primary aim:_ Change of direction (deceleration capacity—linear) _Secondary aim:_ Maneuverability (body position) | 
      
        1. Braking tasks are eccentric focused; therefore start with low volumes similar to those used to introduce eccentric tasks (plyometrics).
        2. Focus on athlete staying low; sacrifice speed for positioning.
      
      | 2-3 sessions per week **COD DRILL:** Decelerations** (forward) 2 × 4 (30 s; 2 min) (Alternate nonpreferred and preferred leg finish braking.) **MANEUVERABILITY DRILL:** Lateral shuffling @ height 1 × 4 × 10 m (30 s) (Use a rope or other object set at head height during athletic stance to provide feedback to athletes if they are “standing” instead of holding low center of mass.)  
      **BLOCK 2:** _Primary aim:_ Change of direction (deceleration capacity—lateral) _Secondary aim:_ Maneuverability (transition between modes of change of direction— shuffle to sprint to shuffle) | 
      
        1. Ensure that athlete can use body position to effectively brake when oriented both forward and laterally; focus on athlete absorbing into stop. Expand to a single effort in reaction to generic stimulus.
        2. Promote effective application of force into the ground (“pushing the ground away”); watch shank angle for visual feedback.
      
      | 2-3 sessions per week **COD DRILL:** Decelerations** (forward) 1 × 4 (30 s; 2 min) **As with week 1** Decelerations (lateral) 1 × 4 (30 s; 2 min) **MANEUVERABILITY DRILL:** Z-drill (forward) 2 × 4 (30 s; 2 min) (Always alternate start direction, left to right vs. right to left direction.) **AGILITY** Deceleration 1 × 4 (decelerate on whistle) (30 s)  
      **BLOCK 3:** _Primary aim:_ Change of direction (effective deceleration to reacceleration) _Secondary aim:_ Maneuverability (combine effective transition and body positioning) _Tertiary aim:_ Agility (focus on keeping change-of-direction performance and body position even in response to a generic stimulus) | 
      
        1. Focus on “braking in” and “exploding out” of the change of direction.
        2. Focus on footwork and keeping low, with steps that promote a “drop and drive” out of change of direction.
        3. This is used to check the “transfer” of physical training to a more specific (yet still generic) stimulus. Focus on the “decide and go,” checking for athletes to reorient effectively or “to move as effectively as they decide.”
      
      | 1-2 sessions per week (dependent on skills volume) **COD DRILL:** Modified 505 drill 2 × 4 (30 s; 2 min) (Alternate plant foot.) **MANEUVERABILITY DRILL:** T-test 1 × 4 (30 s; 2 min) **AGILITY** Reactive agility (Y agility drill) 1 × 4 (30 s) (Same direction in response to pointing in a direction) Skills training will also inherently contain sport-specific stimulus trainingd  
      
      COD = change of direction.
      
      **Speed should progressively increase for deceleration drills through the weeks—for example, half speed to three-quarters speed entry velocity.
      
      _Note:_ There is not a separate emphasis on acceleration ability here, as it is expected this will be addressed in conjunction with speed sessions.
      
      ### Monitoring Agility and Change-of-Direction Ability
      
      In line with the concepts considered in monitoring sprint performance, simply assessing performance modification in either change of direction or agility according to time to completion of the chosen test does not isolate the physical quality or perceptual–cognitive quality that one is trying to examine—the actual ability to change direction ([59](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref59>), [61](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref61>), [81](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref81>), [85](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref85>)). Therefore, when monitoring change-of-direction or agility performance, the strength and conditioning professional may consider the measures in [table 19.7](<E6372ch19_d96.xhtml#t19.7>). Although these aspects of performance have been measured using expensive devices such as three-dimensional motion analysis equipment, readily available high-speed cameras (collecting more than 100 frames per second) could easily be used in conjunction with the usual timing methods (hand or electronic) and in the absence of high-end biomechanical equipment.
      
      TABLE 19.7 Monitoring Agility Development Measure | Description | interpretation  
      ---|---|---  
      Change-of- direction deficit | The difference in time between a straight-line sprint and a change-of-direction test of equal length. | Assessing the COD deficit provides insight into the additional amount of time required by the athlete due to the demands of change of direction. An example is subtraction of 10 m sprint time from 505 change-of-direction time (a common COD test 10 m in length).  
      Ground contact time | The total time the foot is in contact with the ground during the change of direction (length of the plant phase). | Assessing the ground contact time in conjunction with other variables can determine if the athlete is effectively improving the actual change of direction independent of the total time required to complete a COD test, which usually requires a greater percentage of straight-line sprinting.  
      Exit velocity | The horizontal velocity of the athlete during the initial step out of the plant of the change in direction. Considered the first step of reacceleration from toe-off of the plant foot to foot strike of subsequent step. | Unlike the situation for total time, using a high-speed video camera to assess the velocity of the athlete (at the hip or center of mass) can give a direct measure of the ability to change direction. Improved exit velocity in conjunction with either the same or faster ground contact times implies greater rate of force development relevant to improving change-of-direction ability.  
      Entry velocity | Velocity of the athlete before the plant phase; can be measured over several steps or as the last step is entering the plant phase of the change of direction. | Similar methods can be used by practitioners to assess entry velocity as suggested for exit velocity. This allows the coach to understand the demand of the change of direction that should be considered when tracking the exit velocity.  
      Decisionmaking time | Measurement of the time between two events is considered decisionmaking time and can either be a positive or a negative value. Decision-making time can be broken down into two different orientations to comprehensively assess how athletes respond during game scenarios: ([1](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref1>)) defensive (move in the same direction as the stimulus); ([2](<E6372RM_Refs_d104_split_019.xhtml#chapter19-ref2>)) offensive (move in the opposite direction to the stimulus). | Similar to the measurement of entry and exit velocity, a high-speed camera can be positioned to the side of the directional change to capture both the stimulus and the athlete‘s first definitive foot plant to change direction in response. If the decision-making time is negative, this indicates that the athlete anticipated the directional change before the stimulus finalized the movement. Negative decision-making time is observed only during response to movements of another person (video or human stimulus), highlighting the importance of stimulus specificity during agility protocols. The measurement of decision-making time in both defensive and offensive situations allows coaches to identify whether athletes need to develop perceptual-cognitive ability in a specific game scenario.  
      
      COD = change of direction.

  - id: "ch19-a-skip"
    title: "Conclusion / A-Skip"
    level: 3
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      The A-skip is a commonly prescribed sprint drill that is used to simulate upright sprinting mechanics and vertical force production.
      
      Starting Position
      
        * Begin the exercise in a tall stance with torso directly above the hips, knees, and ankles (stacked joints).
      
      Movement Phase
      
        * Initiate movement by lifting one leg to a bent knee position in which the top of the thigh is near parallel. The foot of the lifted leg (swing leg) should be approximately at knee height of the stance leg, with the heel pulled up under the buttocks. This will result in the appearance of a “figure 4” at the legs. Swing leg will always accord with this description
        * Begin the first skip by aggressively driving the swing leg down to the ground through an active foot, established through slight dorsiflexion. “Lift the big toe up” to establish appropriate dorsiflexion.
        * Complete the aggressive drive down of the swing leg through the forefoot until near triple extension of the new stance leg occurs.
        * The fore- to midfoot of the new stance leg should land under the hips, maintaining the stacked joints appearance.
        * At the initiation of contact, the opposing leg should pop up rapidly to create a swing leg.
        * The force generated from the active push down should coincide with a skipping motion that will result in a horizontal displacement of the body down the track.
      
      The “figure 4” at the legs
      
      ![An athlete lifts their left leg and right arm. Their leg and arm are bent at the knee and elbow, respectively.](images/E6372_0757P_3263_ebook.jpg)
      
      Technique Tips
      
        * Maintain a tall posture with relaxed shoulders through the entire duration.
        * The arms should move at the same rate as the legs, with minimal to no pausing of arm action between cycles.
      
      19.2

  - id: "ch19-fast-feet"
    title: "Conclusion / Fast Feet"
    level: 3
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      This drill is designed to enhance the stride frequency of a sprinter.
      
      Starting Position
      
        * Athlete begins exercise in a tall stance with torso directly above the hips, knees, and ankles (stacked joints).
      
      Movement Phase
      
        * Athlete initiates movement by lifting one leg to a bent knee position, with the foot of the lifted leg approximately at the halfway point of the shank in order to replicate a swing leg. Swing leg will always accord with this description.
        * Once this position has been achieved, the athlete alternates stance and swing legs as quickly as possible while maintaining stacked joints.
        * The quick and aggressive drive down of the swing leg should be completed through the forefoot, ensuring that the feet do not rise above the halfway point of the shank. The aim of the shortened rise of the swing leg is to ensure quicker stepping frequency.
        * The fore- to midfoot of the new stance leg should land under the athlete’s hips, maintaining the stacked joints appearance.
        * The athlete’s arm should move at the same rate as the legs, with minimal to no pausing of arm action between cycles.
      
      The quick drive down of the swing leg
      
      ![An athlete pumps their arm and lifts their right leg slightly off the ground, while they stand on their toes on the left leg.](images/E6372_0757P_3343_ebook.jpg)
      
      Technique Tips
      
        * While this drill has traditionally been prescribed to increase a sprinter’s stride frequency, remember that stride frequency is a by-product of high vertical forces occurring in a short ground contact time. In other words, an athlete cannot artificially improve stride frequency by moving the feet faster during a sprint event.
      
      19.3

  - id: "ch19-sprint-resistance-incline-for-accelerati"
    title: "Conclusion / Sprint Resistance: Incline for Acceleration"
    level: 3
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      Incline sprinting is a type of resisted sprinting that is prescribed to promote improvements within the acceleration phase of a sprint.
      
      Starting Position
      
        * Begin the exercise by placing the athlete in the correct starting position (commonly called a crouched start). First, instruct the sprinter to split the stance position by placing the dominant leg forward and to drop the back/swing leg by one to two foot lengths.
        * The length of split between the drive and swing leg is largely determined by the compromise between the athlete’s (a) ability to generate sufficient forces needed to overcome a lower center of gravity and (b) comfort. In addition, the feet should be split in such a manner that the front and back legs are in line with the pelvis, so that no unnecessary twisting of the hips occurs.
        * Once the split stance has been established, instruct the athlete to drop the back knee “straight down” so that the shank (shin) is nearer (more parallel) to the ground. This aids in promoting the proper driving position needed to begin acceleration.
        * With a tall and rigid torso, the athlete should then raise the arm that is opposite to the front/drive leg to a position near or slightly above the forehead. The hand should be spaced approximately 6 to 8 inches (15 to 20 cm) away from the forehead. The rear arm (opposite to the rear/swing leg) should be pulled back to a point at which the hand is near the lateral aspect of the buttocks with an elbow angle that may range from 100° to 120°. This position allows for the arm action to assist in producing sufficient propulsive forces to overcome static inertia.
        * Upon completion of setup, instruct the athlete to lean the entire body forward so that 60% of the body weight is on the front leg. Ensure that the athlete does not “break at the waist” during this shift. The athlete should continue to feel balanced and stable.
      
      Crouched start
      
      ![An athlete crouches partially by bending their knees, taking their right leg and resting on toes, leaning forward, and bending their arms.](images/E6372_0757P_3359_ebook.jpg)
      
      Movement Phase
      
        * After body weight has been transferred, the athlete can initiate the sprint through an aggressive push down and through the ground via the front/drive leg. The back leg should also assist in force production but will leave the ground earlier due to starting stance position. Arm action should be synchronous with leg action.
      
      Technique Tips
      
        * Cue the athlete to maximize accelerative mechanics through a low heel recovery of the rear/swing leg. This should be staged through the proper setup of the crouched starting position described earlier.
        * Coach the athlete to continue aggressive pushing against the ground alongside an arm swing that may be cued to emphasize a hand that is pulled down and back. Recall that arm action often parallels movements of the legs.
        * The torso should remain tall and tight with the head in a neutral position. The torso and head are in line and will rise at the same rate as the hips gradually rise.
      
      Agility Drills
      
      19.4

  - id: "ch19-deceleration-drill"
    title: "Conclusion / Deceleration Drill"
    level: 3
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      Deceleration drills are intended to improve the braking ability of the athlete and assist in transfer of training from eccentric strength exercises in the weight room toward a more movement-specific pattern on the field. The exercise should be performed first with just forward running to deceleration and can then be expanded to forward running into a lateral deceleration. In forward deceleration drills, the athlete rapidly accelerates and then, in a fixed number of steps, controls the body into a stopped lunge position. In lateral deceleration drills, the athlete rapidly accelerates and then decelerates before a set position, braking while facing perpendicular to the original running direction and actively absorbing the force.
      
      Movement Phase
      
        * Depending on the physical and technical competence of the athlete, have him or her run forward at half speed and then decelerate and stop within three steps.
        * If the athlete effectively absorbs the load by the third step, increase to running at three-quarters speed (more than 10 yards [9 m] of acceleration) and then decelerating within five steps.
        * The most advanced version of this drill requires braking from top speed and decelerating within seven steps.
        * The most demanding braking step or the step resulting in the greatest deceleration occurs one or more steps before stopping and does not typically occur only on the final deceleration or change-of-direction step.
      
      Technique Tips
      
        * Variations of this drill can be used during lateral movement and backward running. An intermediate version of this drill would require the athlete to accelerate for 5 to 15 yards (4.6 to 13.7 m) (similar to what the 505 and modified 505 tests call for) and come to a complete stop while facing perpendicular to the original direction of running. This allows for progression into reaccelerating out of the deceleration.
      
      Forward deceleration drill
      
      ![An athlete runs towards the finish line.](images/E6372_0757P_3370_ebook.jpg)
      
      ![An athlete touches the finish line and attempts to stop their sprint.](images/E6372_0757P_3403_ebook.jpg)
      
      ![An athlete continues running past the finish line as they try to stop their sprint.](images/E6372_0757P_3405_ebook.jpg)
      
      ![An athlete begins crouching as they attempt to stop their sprint.](images/E6372_0757P_3406_ebook.jpg)
      
      ![An athlete performs a lunge after stopping their sprint past the finish line.](images/E6372_0757P_3407_ebook.jpg)
      
      Lateral deceleration drill
      
      ![An athlete touches a line with their right leg and leans toward their left.](images/E6372_0757P_3423_ebook.jpg)
      
      ![An athlete touches a line with their right leg and runs toward their left with a bent body.](images/E6372_0757P_3425_ebook.jpg)
      
      19.5

  - id: "ch19-z-drill"
    title: "Conclusion / Z-Drill"
    level: 3
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      The Z-drill is intended as a beginning-level change-of-direction drill to develop proficiency in the patterns of side shuffling, accelerating out of a change of direction, and decelerating into a change of direction. See the diagram for cone arrangement and running direction.
      
      Starting Position
      
        * Begin the exercise by starting at the first cone in the athletic ready position with a lowered center of mass and a stance wider than shoulder-width.
      
      Movement Phase
      
        * Side shuffle to the next cone while keeping the center of mass at a constant height (as low as the original center of mass height during the start position). Emphasize pushing the ground away. Coaches may look at the angle of the shank to ensure that it is directed toward the direction of intended travel.
        * The athlete should plant at or near the cone and rapidly transition into a sprint toward the cone located on the diagonal.
        * Approaching this cone, the athlete should effectively decelerate and transition into another shuffle (as with the second step).
      
      Technique Tips
      
        * This drill can be modified to run the Z formation in reverse, which would require the athlete to backpedal, adding another basic movement pattern that is important in the beginning stages of change-of-direction development. Throughout the movement, one should evaluate the ability to control the trunk effectively during changes and transitions as well as effective and efficient development of force during decelerations and accelerations.
      
      Z-drill setup
      
      ![Illustration of a movement through cone 1 on the top right, cone 2 on the top left, cone 3 on the bottom right, and cone 4 on the bottom left.](images/E6372_508954_ebook.jpg)
      
      ![An athlete shuffles between a cone on the top left and a cone on the top right.](images/E6372_0757P_3455_ebook.jpg)
      
      ![An athlete touches a cone on the top left.](images/E6372_0757P_3467_ebook.jpg)
      
      ![An athlete runs toward a cone on the bottom right.](images/E6372_0757P_3495_ebook.jpg)
      
      ![An athlete touches the cone on the bottom right and shuffles to their left.](images/E6372_0757P_3498_ebook.jpg)
      
      19.6

  - id: "ch19-agility-drill-y-shaped-agility"
    title: "Conclusion / Agility Drill (Y-Shaped Agility)"
    level: 3
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      This drill is intended to be the starting point for working on agility by using a generic stimulus followed by a specific stimulus to work on incorporating a perceptual–cognitive requirement in conjunction with a change of direction.
      
      Starting Position
      
        * Start at a cone 10 yards (9 m) away from a person who will act as the stimulus or director.
      
      Movement Phase
      
        * Run toward the stimulus and change direction based on the direction in which the stimulus points or the audible signal the stimulus provides (these two options are considered generic stimuli).
        * The director should point left or right when the athlete reaches the 5-yard (4.6 m) (mark this with another cone for the director to refer to).
        * The athlete should plant and change direction as soon as possible, accelerating to one of the two cones that are placed at an angle of 45 degrees and distance of 3 yards (2.7 m) to the left and right of the stimulus.
      
      Technique Tips
      
      Variations of this drill to adapt for more specific stimuli (advanced-level drill):
      
        * Have the athlete move in the direction opposite to the generic stimulus (offensive).
        * Have the stimulus take either a single step or two steps, with the athlete responding either offensively or defensively (instruct the athlete as to which before each repetition). A two-step addition option will increase the temporal difficulty of the drill, as one can cross over with an initial left then right step to confuse the athlete as to the final direction of the stimulus.
        * Have the stimulus pass an implement relevant to the sport to either of two teammates standing on the right and left of the stimulus.
