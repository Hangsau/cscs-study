      Periodization is a process through which the athlete’s training is logically and systematically organized in order to promote peak condition (preparedness) for the most important competitions. The annual training plan (year of training) is divided into macrocycles that contain preparatory, competition, and transition periods. Each period is subdivided into mesocycles that target specific phases of development: hypertrophy/strength endurance, basic strength, or strength/power. Transitions are used to link mesocycles or macrocycles and provide the athlete with an unloading period that enhances recovery. The overall structure of the macrocycle, mesocycle, and individual microcycles is dictated by the individual sport’s competitive season and demands.
      
