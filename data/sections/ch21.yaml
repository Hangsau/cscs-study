  - id: "ch21-central-concepts-related-to-periodizatio"
    title: "Central Concepts Related to Periodization"
    level: 2
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      A successful training program allows for management of the adaptive and recovery responses to specific interventions that are delivered in a structured way ([28](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref28>)). The ultimate success of any training program centers on its ability to induce specific physiological adaptations and translate those adaptations into increases in performance. At the center of this process is the ability to manage the adaptive response, handle accumulated fatigue, and capitalize on the aftereffects established from the various training factors encountered. The strength of a periodized training plan lies in its ability to sequence and structure the training interventions in order to manage all of these factors and peak performance at appropriate time points (4-6, 51, 59, 63). Ultimately, peak performance can be optimized only for short periods of time (7-14 days), and the average time it can be maintained is inversely related to the average intensity of the training plan ([17](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref17>), [33](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref33>), [59](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref59>)). In order to elucidate how periodized training models can manage these factors, three basic mechanistic theories have been established: the General Adaptation Syndrome (GAS), stimulus-fatigue-recovery-adaptation theory, and the fitness–fatigue paradigm ([22](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref22>), [28](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref28>), [59](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref59>), [65](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref65>)).
      
      Periodization is the logical and systematic process of sequencing and integrating training interventions in order to achieve peak performance at appropriate time points.
      
      ### The General Adaptation Syndrome
      
      In 1956, Hans Selye, a pioneering researcher on the biological effects of exposure to stressful stimuli, presented the basic concepts of the GAS in which a three-stage response to stress (alarm, resistance, and exhaustion) was defined ([54](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref54>), [55](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref55>)). While not originally conceptualized in the context of physical training, over time the GAS has become one of the foundational concepts from which periodization theories have been developed ([21](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref21>), [59](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref59>)). Any time the body experiences a novel, new, or more intense stress than previously applied (e.g., lifting a heavier training load or a greater volume-load; see [chapter 17](<E6372ch17_d94.xhtml>)), the initial response, or alarm phase, is an accumulation of fatigue, soreness, stiffness, or reduction in energetic stores that results in a reduction in performance capacity ([59](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref59>)). Depending on the magnitude of the stress encountered by the athlete, this response may last several hours, days, or weeks. After this initial response, the body moves into the resistance phase, in which it adapts to the stimulus and returns to a normal functional capacity. If the training stress is appropriately structured and not excessive, these adaptive responses can result in specific biochemical, structural, and mechanical adjustments that further elevate the athlete’s performance capacity, resulting in what is termed supercompensation ([58](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref58>)).
      
      If, however, the stress persists for an extended period of time, the athlete can move into the exhaustion phase. If this occurs, the athlete is demonstrating an inability to adapt to the imposed stressors and will present some of the same symptoms noted in the alarm phase. Ultimately, when athletes reach the exhaustion phase they are most likely experiencing overreaching or overtraining responses ([20](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref20>)). From a training perspective, excessive loading, monotonous training, and overly varied training can all result in the occurrence of the exhaustion phase. Additionally, the responses to training can be affected by other nontraining-related stress (e.g., occupational issues, insufficient sleep, relationship, poor diet) that can contribute to the overall stress level experienced by the athlete. Ultimately, the strength and conditioning professional should strive to avoid the occurrence of this phase of the GAS through the proper planning and management (periodization) of training stressors. Although the actual dimensions (i.e., slope, magnitude, and timing) of the curve shown in [figure 21.1](<E6372ch21_d98.xhtml#f21.1>) are highly individualized, the figure represents the basic application of the GAS to training responses.
      
      **Figure 21.1** The General Adaptation Syndrome (GAS) and application to periodization.
      
      ![A line graph of the change in performance level over a period.](images/E6372_508301_ebook.jpg)
      
      [Follow for extended description](<Ext_desc_E6372_508301_ebook.xhtml#l_E6372_508301_ebook>)
      
      Adapted, by permission, from Haff and Haff, 2012 ([28](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref28>)).
      
      ### Stimulus-Fatigue-Recovery-Adaptation Theory
      
      The stimulus-fatigue-recovery-adaptation theory is an extension of the GAS and suggests that training stimuli produce a general response ([figure 21.2](<E6372ch21_d98.xhtml#f21.2>)) that is influenced by the overall magnitude of the training stressor ([59](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref59>)). Specifically, the greater the overall magnitude of the workload encountered, the more fatigue accumulates and the longer the delay before complete recovery and adaption can occur. As the athlete recovers from and adapts to the training stimuli, fatigue will dissipate, and preparedness and performance increase. If no new training stimulus is introduced, a state of involution or detraining (i.e., a reduced overall capacity, to below the current baseline) is observed. In contrast, if a new training stimulus is introduced, the process is repeated. This basic pattern is present whenever an athlete is exposed to a training exercise, session, day, or cycle within a periodized training plan. It should be noted that while recovery is an important part of the training process, it is not always necessary to reach a state of complete recovery before engaging in a new bout or session of training ([49](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref49>)). The manipulation of workloads and training intensities through use of light and heavy sessions or days of training can be used to modulate fatigue and recovery responses ([9](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref9>), [19](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref19>)) while allowing for fitness to be either increased or maintained. Conceptually, this theory serves as the foundation for sequential periodization models in that these models allow for the manipulation of various training factors to modulate the athlete’s overall fatigue levels, rate of recovery, and adaptive response to the training stimuli.
      
      **Figure 21.2** The stimulus-fatigue-recovery-adaptation theory, with interchangeable terminology.
      
      ![A line graph of the change in performance level at different stages of recovery.](images/E6372_508302_ebook.jpg)
      
      [Follow for extended description](<Ext_desc_E6372_508302_ebook.xhtml#l_E6372_508302_ebook>)
      
      Adapted, by permission, from Haff and Haff, 2012 ([28](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref28>)).
      
      ### Fitness–Fatigue Paradigm
      
      Generally, there is a summation of the two primary training aftereffects (i.e., fitness and fatigue) in response to training interventions that influence the athlete’s level of preparedness ([3](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref3>), [14](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref14>), [66](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref66>)). Zatsiorsky ([65](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref65>)) presents the classic explanation of these relationships as the fitness–fatigue paradigm ([figure 21.3](<E6372ch21_d98.xhtml#f21.3>)). Ultimately, every training bout, session, or cycle creates both fatigue and fitness aftereffects, which summate to create a state of preparedness ([14](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref14>), [65](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref65>)). When training loads are the highest, fitness becomes elevated; but because of the high training loads, a concomitant increase in fatigue occurs. When fitness and fatigue are summed in this case, the level of fatigue results in a reduction in preparedness. On the other hand, when training workloads are low, little fatigue occurs and minimal fitness is developed, resulting in a low level of preparedness. Thus the sequencing of training loads becomes important in that it allows for training workloads to be varied in a systematic manner. An important thing to remember is that fatigue dissipates at a faster rate than fitness, thus allowing preparedness to become elevated if appropriate training strategies are used to retain fitness while reducing fatigue ([25](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref25>), [28](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref28>)). While the fitness–fatigue paradigm is classically represented as one fatigue, fitness, and preparedness curve, it is likely that each training factor stimulates its own individual fitness, fatigue, and preparedness aftereffect response ([14](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref14>), [59](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref59>)). These aftereffects are often considered to be residual training effects and serve as a fundamental concept underlying the use of sequential periodization models ([25](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref25>), [28](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref28>)). Ultimately, the residual training effects of one training period have the potential to affect the level of preparedness in subsequent training periods, depending on the overall structure of the periodized training plan ([28](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref28>)).
      
      **Figure 21.3** The fitness–fatigue paradigm.
      
      ![A line graph of the change in the fitness-fatigue paradigm.](images/E6372_508303_ebook.jpg)
      
      [Follow for extended description](<Ext_desc_E6372_508303_ebook.xhtml#l_E6372_508303_ebook>)
      
      Adapted, by permission, from Haff and Haff, 2012 ([28](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref28>)).

  - id: "ch21-periodization-hierarchy"
    title: "Periodization Hierarchy"
    level: 2
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      Ultimately periodization is simply a means of organizing the planning of a training intervention so that the program is partitioned into specific time periods ([table 21.1](<E6372ch21_d98.xhtml#t21.1>)) ([22](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref22>), [24](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref24>)). The multiyear training plan covers the most time but is the least detailed plan within a periodized training structure. For example, it may involve the basic progression of a collegiate football player from his freshman to senior year and contain key developmental goals that are targeted within each year of training. This multiyear training structure is then subdivided into more detailed individual annual training plans that are developed based on the athlete’s progression through the various stages or benchmarks associated with the multiyear training plan. In sports that have only one competitive season such as American football, an annual training plan would be represented as a macrocycle. However, in a sport like college track and field, the annual plan would be divided into two macrocycles because of the indoor and outdoor seasons typical of this college sport. Typically the macrocycle lasts several months up to a year, depending on the sport. Within each macrocycle are mesocycles, each lasting several weeks to months; two to six weeks is the most typical duration. The number of mesocycles within each macrocycle is dependent on the training targets and the length of the macrocycle within the annual training plan. Each mesocycle is then broken down into individual microcycles that last from several days to weeks; the most common duration is four weeks ([22](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref22>), [28](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref28>)). Within each microcycle are training days that are further subdivided into training sessions.
      
      TABLE 21.1 Periodization Cycles Period | Duration | Description  
      ---|---|---  
      Multiyear plan | 2-4 years | A 4-year training plan is termed a quadrennial plan.  
      Annual training plan | 1 year | The overall training plan can contain single or multiple macrocycles. Is subdivided into various periods of training including preparatory, competitive, and transition periods.  
      Macrocycle | Several months to a year | Some authors refer to this as an annual plan. Is divided into preparatory, competitive, and transition periods of training.  
      Mesocycle | 2-6 weeks | Medium-sized training cycle, sometimes referred to as a block of training. The most common duration is 4 weeks. Consists of microcycles that are linked together.  
      Microcycle | Several days to 2 weeks | Small-sized training cycle; can range from several days to 2 weeks in duration; the most common duration is 1 week (7 days). Composed of multiple workouts.  
      Training day | 1 day | One training day that can include multiple training sessions is designed in the context of the particular microcycle it is in.  
      Training session | Several hours | Generally consists of several hours of training. If the workout includes >30 min of rest between bouts of training, it would comprise multiple sessions.  
      
      Adapted, by permission, from G.G. Haff and E.E. Haff, 2012, Training integration and periodization. In _NSCA guide to program design_ , edited by J. Hoffman (Champaign, IL: Human Kinetics), 220.
      
      Periodization of training begins with general global training targets set forth in the multiyear or annual training plan and becomes more specific as the program is developed for the macro-, meso-, and microcycles. For example, annual training plans set the general pathway for a training year, while the other cycles set the means, methods, and modes used to get to the primary competitive targets.

  - id: "ch21-preparatory-period"
    title: "Periodization Periods / Preparatory Period"
    level: 3
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      In outlining a periodized training plan, the starting point is usually the preparatory period. This period occurs when there are no competitions, and technical, tactical, or sport-specific work is limited. This period often corresponds to what is termed the off-season. The central goal of this period of training is to develop a base level of conditioning in order to increase the athlete’s ability to tolerate more intense training. Based on the model presented in [figure 21.4](<E6372ch21_d98.xhtml#f21.4>), the conditioning activities would begin with relatively low intensities and high volumes: long, slow distance running or swimming; low-intensity plyometrics; and high-repetition resistance training with light to moderate resistances. Traditionally, the preparatory period is subdivided into general and specific phases. The general preparatory phase typically occurs during the early part of the period and often targets the development of a general physical base ([3](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref3>)). This early part of the preparatory period includes high training volumes, low training intensities, and a larger variety of training means that are structured to develop general motor abilities and skills ([36](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref36>), [44](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref44>)). The specific preparatory phase occurs after the completion of the general preparatory phase and involves a shift in training focus. From the training base that has been established, this phase expands the athlete’s training base through an increased emphasis on sport-specific training activities that prepare the athlete for the competitive period ([15](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref15>)). During the preparatory period, resistance training phases can be created in order to depict more refined differences in training intensity and volume. In order, these are the hypertrophy/strength endurance and basic strength phases ([57](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref57>), [58](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref58>)).
      
      #### Hypertrophy/Strength Endurance Phase
      
      The hypertrophy phase, which is also referred to as the strength endurance phase, generally occurs during the early portion of the preparatory period (i.e., the general preparatory phase) ([18](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref18>), [27](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref27>), [28](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref28>)). During this phase, the training intensity is low to moderate and the overall volume is high. The primary goals during this phase are (a) to increase lean body mass, (b) to develop an endurance (muscular and metabolic) base, or (c) to do both. This development will serve as the foundation for the higher-intensity training in subsequent phases and periods ([29](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref29>), [30](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref30>)). With strength/power athletes, the primary target might be to stimulate hypertrophic effects while increasing strength endurance. With endurance athletes, the primary goal would be to increase strength endurance without significantly increasing hypertrophy. Regardless of the sport or athlete being trained, it is generally accepted that during the general preparatory phase, sport conditioning activities may not be specific to the athlete’s sport. However, as the athlete moves into the specific preparatory phase, over several weeks the training activities will become more sport specific. For example, sprinters may begin the general preparatory phase with longer-distance runs (longer than their competitive distance, not traditional distance running; for example, a 100 m sprinter may do 400 m runs to establish a foundation) at slower speeds in conjunction with lower-intensity plyometrics such as double-leg bounding and hopping, as well as more basic resistance exercises that are not necessarily biomechanically or structurally similar to running (back squat, leg curl, and so on.). Generally, the athlete performs resistance training with low to moderate intensities for high volumes ([table 21.2](<E6372ch21_d98.xhtml#t21.2>)).
      
      TABLE 21.2 A Periodization Model for Resistance Training Period | Preparatory | First transition | Competition | Second transition  
      ---|---|---|---|---  
      Subperiod | General preparatory | Specific preparatory | Precompetitive | Main competitive | Postcompetitive  
      Season | Off-season | Preseason | In-season | Postseason  
      Phase | Hypertrophy/ strength endurance | Basic strength | Strength/power | Peaking | Or | Maintenance | Active rest  
      Intensity | Low to moderate | High | Low to very high | Very high to very low | Moderate to high | Recreational activities (may not involve resistance training)  
      50-75% of 1RM | 80-95% of 1RM | 87-95% of 1RM* | 50% to >93% of 1RM | 85-93% of 1RM  
      30-85% of 1RM**  
      Volume | High | Moderate to high | Low | Very low | Low to moderate  
      3-6 sets*** | 2-6 sets*** | 2-5 sets*** | 1-3 sets*** | ~2-5 sets***  
      8-20 repetitions | 2-6 repetitions | 2-5 repetitions | 1-3 repetitions | 3-6 repetitions  
      
      *These percentages of 1RM apply to nonpower core exercises.
      
      **These percentages of 1RM apply to power exercises. The actual percentage used to elicit power development depends on the exercise that is used. For more information see Kawamori and Haff ([39](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref39>)).
      
      ***These recommendations do not include warm-up sets and represent only target sets for core exercises ([2](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref2>)); they also do not include lower-intensity recovery days that are often part of a periodized training plan ([27](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref27>)).
      
      Adapted from 27, 56, 57, 58, 59.
      
      However, it is important to note that throughout this phase, daily variations in training intensity and workload will facilitate recovery ([27](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref27>)). Additionally, recovery weeks or microcycles may be placed throughout the phase and most often at the end of the phase before the next phase of training begins.
      
      The hypertrophy/strength endurance phase involves low to moderate intensity (50-75% of the 1-repetition maximum [1RM]) and high volumes (three to six sets of 8-20 repetitions).
      
      #### Basic Strength Phase
      
      In the later portion of the preparatory period, during the specific preparatory phase, the primary aim of the basic strength phase is to increase the strength of the muscles that are essential to the primary sport movements (11-13). For example, the sprinter’s running program would progress to include interval sprints of a moderate distance and more complex and specialized plyometric drills. The resistance training program also becomes more specific to the sport (e.g., squats, power cleans, one-leg squats) and involves heavier loads performed at lower volumes than in the hypertrophy/strength endurance phase ([table 21.2](<E6372ch21_d98.xhtml#t21.2>)). As with the hypertrophy/strength endurance phase, daily variations in training load facilitate recovery ([27](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref27>), [28](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref28>)).
      
      The basic strength phase involves higher intensity (80-95% of 1RM) and moderate to high volumes (two to six sets of two to six repetitions).

  - id: "ch21-first-transition-period"
    title: "Periodization Periods / First Transition Period"
    level: 3
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      As originally described by Stone and colleagues (56-58), the first transition period is a link between the preparatory and competitive periods. Classically the resistance training in this period focuses on the development of strength and power as noted in Stone, O’Bryant, and Garhammer’s ([57](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref57>)) seminal paper on the periodization of strength training. The central aim of this period is to shift training focus toward the elevation of strength and its translation into power development ([56](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref56>), [57](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref57>)). In order to maximize this process and facilitate recovery, there are variations in training intensity and workload at the microcycle level ([27](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref27>), [28](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref28>)). Additionally, the last week of the period is marked by reduced volume, intensity, or both in order to achieve recovery before the beginning of the competition period.
      
      #### Strength/Power Phase
      
      The main phase within the first transition period is the strength/power phase. In this phase, the sprinter’s interval and speed training intensifies to near competitive pace; speed drills are performed (e.g., sled towing, sprints against resistance, and uphill sprints); plyometric drills mimic sprinting; and the resistance training program involves performing power/explosive exercises at low to very high loads with low volumes. As explained in [chapter 17](<E6372ch17_d94.xhtml>), the load assignments for power exercises do not follow the typical %RM–repetition relationship, but their relative intensities are elevated during this phase ([table 21.2](<E6372ch21_d98.xhtml#t21.2>)). Specifically, the exercises selected in this phase can dictate the loading that is used ([39](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref39>)). For example, the development of power may be facilitated with a load of 80% of 1RM with hang power cleans ([38](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref38>)), while a load of 50% to 70% of 1RM may be used with the bench press throw when the aim is to maximize power development ([39](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref39>)). Ultimately, in order to address both strength and power development, a mixed training approach is warranted in which heavy- and low-load training is used to optimize both attributes ([31](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref31>)).
      
      The strength/power phase involves low to very high loads (30-95% of 1RM, depending on the exercise) and low volumes (two to five sets for two to five repetitions).

  - id: "ch21-competitive-period"
    title: "Periodization Periods / Competitive Period"
    level: 3
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      The central training target during the competitive period is preparing the athlete for competition by further increasing strength and power via additional increases in training intensity while decreasing volume. This process can be a delicate balancing act, as adequate volume and intensity of training are needed in order to maintain competitive preparedness, and reductions in volume, intensity, or both are needed to optimize performance. To understand this conundrum, consider the fitness–fatigue paradigm presented earlier. If training workloads (volume or intensity) are reduced too much, fatigue will be reduced, but there will be a concomitant decrease in overall fitness that results in a reduction in competitive preparedness. Also during this period, time spent practicing sport-specific skills and tactics increases dramatically, and a proportional decrease occurs in time spent performing physical conditioning activities such as resistance training. For example, a sprinter places even more emphasis on speed, reaction time, sprint-specific plyometric drills, and technique training. The competition period may last for one or two weeks for some sports in which a peaking program is employed ([7](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref7>), [23](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref23>)). Peaking programs attempt to place the athlete in peak condition for about one or two weeks. Trying to extend this to longer durations ultimately results in reduced performance capacity as a result of reduction in fitness or potential overtraining ([3](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref3>), [23](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref23>)). Depending on the load reduction strategy employed, peaking programs result in a progressive shift from higher-intensity training toward lower-intensity work designed to reduce fatigue as the athlete moves through the taper before competition ([23](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref23>)). As shown in [table 21.2](<E6372ch21_d98.xhtml#t21.2>), resistance training may range between 50% and ≥93% of 1RM, depending on where athletes are in the peaking program.
      
      For team sports, this period spans an entire season and may last for many months, requiring the use of a maintenance program ([3](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref3>)). Because of the prolonged duration of the competitive period in this situation, the intensity and volume of training must be manipulated on a microcycle basis in order to maintain strength and power while managing the fatigue associated with a frequent-competition schedule. Generally, a maintenance program is marked by moderate- to high-intensity training (e.g., 85-93% 1RM) at low to moderate volumes. At the microcycle level, the training loads are modulated based on the training, travel, and competitive schedule. Careful monitoring of the athlete’s performance capacity and recovery is critical during the team sport athlete’s competitive period.
      
      The competitive period includes peaking and maintenance. For peaking, athletes use very high to low intensities (50% to ≥93% of the 1RM) and very low volume (one to three sets of one to three repetitions) for one to two weeks. For maintenance, athletes modulate training between moderate and high intensities (85-93% of 1RM) with moderate volumes (about two to five sets of three to six repetitions).

  - id: "ch21-second-transition-period-active-rest"
    title: "Periodization Periods / Second Transition Period (Active Rest)"
    level: 3
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      Between the competitive season and the next annual training plan or the preparatory period of a macrocycle, a second transition period is often used to create a linkage ([57](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref57>)). This period is sometimes referred to as an active rest or restoration period and generally lasts for one to four weeks ([3](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref3>)). It is important to note that if active rest is extended for a prolonged duration, athletes will require a much longer preparatory period in order to regain their performance capacities ([26](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref26>)). Therefore, it is generally recommended that the second transition period last no longer than four weeks unless an athlete requires additional time to recover from an injury. During this period, aggressive training immediately after the peak performance or end of the maintenance phase should be avoided so athletes can rehabilitate injuries and rest physically and mentally (11-13). For example, a sprinter may engage in recreational activities such as volleyball, racket sports, and swimming in a leisurely manner and perform very low-volume, nonsport-specific resistance training with very low loads. A secondary use of the active rest concept is to structure one-week breaks between long phases (three weeks) or periods of training. The purpose is to create an unloading week in order to prepare the body for the subsequent phase or period of training. The practice of reducing the training load via the reduction of training intensity and volume is believed by many strength and conditioning professionals to reduce overtraining potential.
      
      The second transition (active rest) provides a period of time in which athletes can rehabilitate injuries and refresh both physically and mentally before beginning a new annual training plan or macrocycle. This period should not last longer than four weeks, because long periods with reduced training will require the athlete to engage in a longer preparatory period in order to regain sporting form.

  - id: "ch21-applying-sport-seasons-to-the-periodizat"
    title: "Applying Sport Seasons to the Periodization Periods"
    level: 2
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      In practical terms, periodization involves a logical, systematic variation and integration of training in order to direct the training responses while managing fatigue and optimizing performance in accordance with the seasonal demands of the sport and athletes. Based on the competitive season, the overall annual plan or macrocycle is structured in order to sequentially develop specific attributes required by the athlete. In order to avoid monotony, staleness, and overtraining potential, the training program must involve structured variation of key training variables (e.g., volume, intensity, training frequency, training foci, exercise selection) ([28](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref28>)). Classically, most intercollegiate and professional sports have an annual schedule that includes an off-season, preseason, in-season, and postseason. These seasons are easy to relate to the periods in a periodized training model (see [figure 21.5](<E6372ch21_d98.xhtml#f21.5>)).
      
      **Figure 21.5** Relationship of periodization periods to seasons and strength training focus. HP = hypertrophy/strength endurance; BS = basic strength; AR = active rest; SP =strength/power.
      
      ![An illustration of different periods according to different plans.](images/E6372_508306_ebook.jpg)
      
      [Follow for extended description](<Ext_desc_E6372_508306_ebook.xhtml#l_E6372_508306_ebook>)
      
      ### Off-Season
      
      The off-season should be considered the preparatory period; it typically lasts from the end of the postseason to the beginning of the preseason, which can be about six weeks before the first major competition (although this varies greatly). This preparatory period is subdivided into general and specific preparatory phases that are broken down into mesocycles; these interlink to prepare the athlete for the subsequent competitive season. For example, the athlete may complete several rotations of mesocycles that focus on hypertrophy/strength endurance and basic strength (see [figure 21.5](<E6372ch21_d98.xhtml#f21.5>)). Ultimately, these cyclical rotations are selected based on the sport and the athlete’s needs. For example, if an American football player needs to gain muscle mass, more mesocycles that target the hypertrophy phase will be prescribed.
      
      ### Preseason
      
      After the completion of the off-season, the preseason is used to lead into the first major competition. The first transition period is often undertaken at this time with a focus on the strength/power phase of resistance training. This time is used to prepare the athlete for the subsequent competitive period. It is very important to note that the preseason is not the time to build the foundational physical capacities needed for the sport; this should occur primarily in the off-season. The preseason is designed to capitalize on the off-season and elevate the athlete’s performance capacity during the competitive period.
      
      ### In-Season
      
      The competition, or in-season, period contains all the contests scheduled for the given year, including any tournament games. Most sports have a long season that requires multiple mesocycles arranged around key contests. Thus, a long competition season (12-16+ weeks) presents unique programming challenges. One solution is to structure three- or four-week mesocycle blocks that unload the athlete in the last microcycle in order to allow for fatigue reduction and performance supercompensation before critical contests ([28](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref28>)). This does not mean that the athlete is in poor condition for the other contests, as varying training intensities and volumes across the mesocycle can modulate preparedness. Specifically, training intensity and volume are increased or decreased in order to maintain physical capacities while reducing fatigue and peaking preparedness before the competitive engagements. The other approach is to design a maintenance program that modulates moderate intensities with low to moderate volumes.
      
      ### Postseason
      
      After the final contest, the postseason or second transition period provides the athlete with a relative or active rest before the beginning of the next year’s off-season or preparatory period. It is important to remember that the longer the postseason, the greater the chance for detraining, which results in an increased need for a longer general preparatory phase during the next off-season ([3](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref3>)).

  - id: "ch21-undulating-versus-linear-periodization-m"
    title: "Undulating Versus Linear Periodization Models"
    level: 2
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      For better or worse, contemporary periodization literature has adopted the terms _linear_ and _nonlinear_ when referring to periodization models. However, it should be noted that a central tenet of periodization is the removal of linearity from training ([25](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref25>), [32](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref32>), [37](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref37>), [43](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref43>), [49](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref49>), [51](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref51>)). Often the traditional resistance training model is falsely referred to as linear due to the gradual and progressive mesocycle increases in intensity over time ([8](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref8>), [37](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref37>), [51](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref51>)). However, a closer look at the traditional model as described by Stone, O’Bryant, and Garhammer ([57](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref57>), [58](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref58>)) and within the literature ([37](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref37>)) shows that the traditional model contains nonlinear variation in training intensity and volume-load at the microcycle level and throughout the mesocycle. Regardless of this, an alternative model termed the nonlinear periodization model has been introduced in the strength and conditioning industry ([42](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref42>), [53](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref53>)). This model is probably better described as an undulating or daily undulating periodization model, because it involves large daily (i.e., within the microcycle) fluctuations in the load and volume (e.g., repetitions and volume-load) of assigned core resistance training exercises. For example, using this model you might perform four sets with a 6RM load (strength focus) on the first day of the week (e.g., Tuesday), three sets with a 10RM (hypertrophic focus) on the next training day (e.g., Thursday), and five sets with a 3RM load (power focus) on the last training day (e.g., Saturday). In this case the load, volume (e.g., repetitions and volume-load), and training focus are all modified within the microcycle. These modifications are in contrast to what occurs with the traditional periodization model, falsely referred to as the linear periodization model, according to which the athlete performs the same number of sets and repetitions across the training days and varies the training load. For example, the athlete may perform four sets of six at 85% of 1RM on the first day of training, at 75% of 1RM on the second day, and at 65% of 1RM on the third day to basically train using a heavy-to-light training structure. While the traditional model appears to vary only intensity because the repetitions do not change, one must remember that the volume-load changes in this model result in undulations in workload and training volume, supporting the idea that the traditional model is in fact nonlinear and should not be classified as linear ([37](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref37>)).
      
      Some research studies suggest that the undulating model is more effective than the traditional model ([16](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref16>), [41](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref41>), [45](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref45>), [47](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref47>), [53](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref53>)), although other evidence suggests that there is no difference between the models ([1](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref1>), [10](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref10>), [52](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref52>)) or that the traditional model is superior ([34](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref34>), [35](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref35>), [50](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref50>)). Proponents of the undulating model suggest that one of its strengths is the absence of accumulated neural fatigue caused by extended, ever-increasing training intensities common to the traditional model ([40](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref40>)). Conversely, proponents of the traditional model suggest that the overall high volume-loads of training in the undulating model result in greater peripheral fatigue and increased risk of injury because of the high levels of metabolic fatigue this type of programming can stimulate ([50](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref50>)). Additionally, examination of the fatigue–fitness paradigm ([figure 21.3](<E6372ch21_d98.xhtml#f21.3>)) and the stimulus-fatigue-recovery-adaptation theory ([figure 21.2](<E6372ch21_d98.xhtml#f21.2>)) indicates that the undulating model has the potential to decrease athlete preparedness because of accumulated fatigue that occurs with higher volume-load training sessions. Some authors suggest that, based upon the GAS, this response may actually increase the potential for overtraining with higher-level athletes ([25](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref25>), [60](<E6372RM_Refs_d104_split_021.xhtml#chapter21-ref60>)) and result in an increased injury risk for athletes using this model in conjunction with their sport-based training.

  - id: "ch21-example-of-an-annual-training-plan"
    title: "Example of an Annual Training Plan"
    level: 2
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      An example of one approach to designing a full annual training plan (i.e., macrocycle for sports with one competitive season) spanning all four sport seasons is presented in the four application tables near the end of this chapter. The program is based on the preseason resistance training program for scenario A from chapter 17, “Program Design for Resistance Training,” which concerns a female collegiate basketball center. Background information and initial testing information about this athlete are provided in [chapter 17](<E6372ch17_d94.xhtml>).
      
      The annual plan example provided in this chapter begins where the preseason program from [chapter 17](<E6372ch17_d94.xhtml>) left off and shows a continuation of the training program through the in-season, the postseason, and the following year’s off-season. The primary focus of the annual training plan example is the resistance training component of scenario A. Although other modes of training are described briefly (e.g., plyometrics, anaerobic conditioning, aerobic endurance), this example is not intended to illustrate every aspect of variation for a strength and conditioning program for basketball. Also, although this example is divided into four sport seasons that are made up of two- to four-week mesocycles, an alternative approach is to structure each season as an individual macrocycle.
      
      ### Preseason
      
      After undertaking one or two unloading weeks following the cessation of the off-season training period, the athlete begins the preseason period of training. For this example, the period covers about 3.5 months (mid-August until the first game, possibly mid-November). The goals of the preseason are to increase the intensity of sport-specific training and the attention given to basketball drills and skills. The resistance training portion is planned for three days per week and focuses primarily on strength and power outcomes. Other training modes (e.g., plyometrics and anaerobic conditioning) hold high priority, especially if they directly contribute to basketball training. Although [chapter 17](<E6372ch17_d94.xhtml>) does not show microcycle progressions, it describes the resistance training portion of this season in detail; therefore, please refer to the table titled “Application of All Program Design Variables” in that chapter for the preseason program example. The same method of applying the periodization concepts described in this chapter can be used to design the remainder of the preseason period.
      
      ### In-Season
      
      After an unloading week following the preseason, the athlete is ready to begin the competition period of training. The in-season period lasts approximately 20 weeks, spanning a time period from November until April (including a four-week tournament period, although it could last longer). The goals for the in-season are to maintain and possibly improve strength, power, flexibility, and anaerobic conditioning. The time constraints of games, skill and strategy practice, and travel result in a lower volume of off-court training activities. Due to multiple games each week, resistance training may be limited to 30 minutes, one to three times per week, consisting of an undulating regimen of varying volume-loads and relative intensities. Power and basketball-specific nonpower core exercises predominate, with assistance exercises added for balance. See the sample in-season program near the end of this chapter. Plyometric sessions should be alternated with resistance training and conducted once or twice weekly, depending on the number of games.
      
      On days when no resistance training is scheduled, 15 to 20 minutes of various short sprint intervals could be performed once or twice weekly during practice. Speed, agility, and other running conditioning can be incorporated into practice time, and flexibility training can be part of the practice and game warm-up and cool-down. Two or three days of rest should be afforded between resistance training, plyometrics, and sprint interval sessions, depending on the game schedule. This period is similar to the previous training period in that the majority of the athlete’s time is spent on skill and strategy development, with the remainder devoted to conditioning.
      
      The athlete is in good condition from the previous mesocycles, so she should be able not only to maintain that condition but also to peak again if the team continues in the conference tournament. In that case, she would revert back to mesocycle 2 and progress to mesocycle 3 if the team qualifies for a tournament to be held after the conference tournament. If the tournament game schedule does not allow for more than one resistance training session per week, the athlete should perform all the week’s power and core exercises (if time allows) and omit the assistance exercises. Two examples of specific weekly tournament schedules are presented near the end of this chapter.
      
      ### Postseason (Active Rest Period)
      
      Following the completion of the competitive season is a (second) transition period of active rest with no formal or structured workouts. For this example, the transition period lasts a month (from April 4 until May 1). The goal of the period is for the athlete to recuperate physically and psychologically from the long in-season. Recreational games and fitness activities include swimming, jogging, circuit weight training, volleyball, racquetball, and informal basketball. _All activities are performed at low intensities with low volumes._
      
      ### Off-Season
      
      Following the postseason active rest period, the athlete should be rested and ready to begin off-season (preparatory period) training. For this example, this preparatory period lasts about 14 weeks, from the beginning of May to the beginning of August. The goal of this period is to establish a base level of conditioning to increase the athlete’s tolerance for more intense training in later phases and periods. During the first week, testing should be performed so the strength and conditioning professional can determine initial training loads for the exercises in the first mesocycle. In later mesocycles, when more or other exercises are added, the training loads can be estimated from loads used in similar exercises or can be determined from RM testing. For example, the strength and conditioning professional can reasonably predict training load for the hang clean from the tested power clean maximum, or the actual RM load could be measured. Other monitoring tests related to basketball are shoulder and hip flexibility tests, 12-minute run, 300-yard (274 m) shuttle, line drill, T-test, vertical jump, and skinfold measurements (see [chapter 13](<E6372ch13_d90_split_000.xhtml>) for testing protocols).
      
      The resistance training component holds higher priority in the off-season, and an athlete may follow a split routine of four or more training days per week. In this example, the basketball player begins the off-season with an all-body, three times per week regimen but soon progresses to four training days per week with variations in training intensity across the microcycle to allow fatigue to be managed. These advancements also involve a gradual increase in loading, with associated decreases in training volume. Other training includes aerobic endurance exercises to maintain or improve body composition and cardiovascular fitness. These conditioning workouts are scheduled on nonresistance training days, and flexibility training can be emphasized in the warm-up and cooldown portions of each training session.
      
      ### Reviewing the Annual Plan Example
      
      For any periodization model to function optimally, the sport coach and the strength and conditioning professional must plan the program together in order to share goals and strategies. This is a critical issue in that working together allows all the training factors that the athlete will engage in to be integrated so as to better manage the training stress and modulate fatigue and recovery. Without the cooperation of all involved professionals, optimal performance cannot be fully achieved.
      
      The example in this chapter is a representation of only one periodization model that could be used to structure training for a sample athlete. Other athletes or sports may require subtle to radical variations in the structure presented here. It is important to remember that a multitude of periodization models can be adapted to meet the needs of the various athletes and sports.

