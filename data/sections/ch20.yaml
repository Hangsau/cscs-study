sections:
  - id: "ch20-factors-related-to-aerobic-endurance-per"
    title: "Factors Related to Aerobic Endurance Performance"
    level: 2
    tags: [factors, related, aerobic, endurance, performance]
    key_points:
      - "When designing aerobic endurance training programs, it is important to understand those factors that influence and play a significant role in successful aerobic endurance performance."
    recall_prompts:
      - "Factors Related to Aerobic Endurance Performance 的核心概念是什麼？"
    content: "\n\nWhen designing aerobic endurance training programs, it is important to understand those factors that influence and play a significant role in successful aerobic endurance performance. This allows for the development of sound training programs while minimizing unnecessary training that may lead to counterproductive adaptations, fatigue, overwork, or overtraining.\n\n### Maximal Aerobic Capacity\n\nAs the duration of the aerobic endurance event increases, so does the proportion of the total energy demand that must be met by aerobic metabolism. Therefore, high maximal aerobic capacity (V̇O2 max) is necessary for success in aerobic endurance events ([59](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref59>)). A high correlation has been shown to exist between V̇O2max and performance in aerobic endurance events ([1](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref1>), [19](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref19>), [32](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref32>), [59](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref59>), [60](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref60>)). Consequently, aerobic endurance training programs should be designed to improve V̇O2max. However, although a high V̇O2max is important for successful performance, other factors may be equally or even more important. These factors include a high lactate threshold, good exercise economy, high efficiency in using fat as a fuel source, and a high percentage of Type I muscle fibers.\n\nFor well-trained endurance athletes, improving V̇O2max may benefit performance only up to a certain point, especially since these individuals typically already possess excellent aerobic capacity. Consequently, the ability to sustain higher velocities during competition and training may have a greater impact on performance than attempting to make marginal improvements in aerobic capacity. For this reason, many athletes use high-intensity interval training (HIIT). While the issue is not well understood, HIIT may contribute to performance in highly trained endurance athletes via improvements in peak power output, ventilatory threshold, hydrogen ion buffering, and utilization of fat as a fuel source ([55](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref55>)).\n\n### Lactate Threshold\n\nIn aerobic endurance events, the best competitor among athletes with similar V̇O2max values is typically the person who can sustain aerobic energy production at the highest percentage of his or her V̇O2max without accumulating large amounts of lactic acid in the muscle and blood ([54](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref54>)). Although numerous terms have been used to refer to this phenomenon, lactate threshold is the one most commonly employed in the literature. The lactate threshold is that speed of movement or percentage of V̇O2max at which a specific blood lactate concentration is observed or the point at which blood lactate concentration begins to increase above resting levels ([82](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref82>)). Several studies have shown that an athlete’s lactate threshold appears to be a better indicator of his or her aerobic endurance performance than V̇O2max ([21](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref21>), [22](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref22>)). The maximal lactate steady state is another term that often appears in the aerobic endurance training literature. The maximal lactate steady state is defined as the exercise intensity at which maximal lactate production is equal to maximal lactate clearance within the body ([4](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref4>)). The maximal lactate steady state is considered by many to be a better indicator of aerobic endurance performance than either V̇O2max or the lactate threshold ([4](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref4>), [34](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref34>)). What is clear from this information is that aerobic endurance athletes must improve their lactate threshold or maximal lactate steady state. This requires athletes to conduct some training at elevated levels of blood and muscle lactate to maximize training improvements.\n\n### Exercise Economy\n\nA measure of the energy cost of activity at a given exercise velocity is referred to as the exercise economy. Athletes with a high exercise economy expend less energy during exercise to maintain a given exercise velocity (e.g., running speed). Several investigators have suggested that exercise economy is an important factor in successful performance in running events ([14](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref14>), [31](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref31>)), with better performers having a slightly shorter stride length and greater stride frequency compared to less successful performers ([12](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref12>)). During cycling, exercise economy can be affected by body mass size, cycling velocity, and aerodynamic positioning ([22](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref22>), [61](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref61>), [78](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref78>)). For cyclists, an increase in body mass and cycling velocity and an inefficient body position generate greater wind resistance, resulting in a decrease in exercise economy. It has been demonstrated that elite swimmers are much more economical than nonelite swimmers ([81](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref81>)) and use less oxygen at any given swimming velocity. The most profound impact on exercise economy during swimming can be observed when swimming technique becomes more efficient. As improvements in stroke mechanics occur, energy demand for a given swimming velocity is reduced ([80](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref80>)). Training to improve exercise economy is critical for aerobic endurance athletes.\n\nAn improvement in exercise economy can enhance maximal aerobic capacity (V̇O2max) and lactate threshold."

  - id: "ch20-aerobic-training-program-design-variable"
    title: "Designing an Aerobic Endurance Program / Aerobic Training Program Design Variables"
    level: 3
    tags: [designing, aerobic, endurance, program, aerobic, training]
    key_points:
      - "* Step 1: Exercise mode"
    recall_prompts:
      - "Aerobic Training Program Design Variables 是什麼？有哪些類型或應用？"
    content: "\n\n  * Step 1: Exercise mode\n  * Step 2: Training frequency\n  * Step 3: Training intensity\n  * Step 4: Exercise duration\n  * Step 5: Exercise progression\n\nTraining programs for female athletes do not have to be different from those used to train male athletes; evidence indicates that males and females respond similarly to training programs ([10](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref10>), [60](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref60>), [67](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref67>)). Refer to [chapter 7](<E6372ch07_d84.xhtml>) for a discussion on sex-related differences and their implications for exercise."

  - id: "ch20-step-1-exercise-mode"
    title: "Designing an Aerobic Endurance Program / Step 1: Exercise Mode"
    level: 3
    tags: [designing, aerobic, endurance, program, step, exercise]
    key_points:
      - "Exercise mode refers to the specific activity performed by the athlete: cycling, running, swimming, and so on."
    recall_prompts:
      - "Step 1: Exercise Mode 是什麼？有哪些類型或應用？"
    content: "\n\nExercise mode refers to the specific activity performed by the athlete: cycling, running, swimming, and so on. When training to improve aerobic endurance performance, the athlete should select activities that mimic as closely as possible the movement pattern employed in competition. This will cause positive adaptations in specific physiological systems of the body. For example, the recruitment of specific muscle fibers and the adaptation of the energy systems within those fibers must be challenged during aerobic endurance training. Selecting the appropriate exercise mode during training ensures that the systems used in competition are challenged to improve. Remember that the more specific the training mode is to the sport, the greater the improvement in performance. For an athlete involved in multiple aerobic endurance sports, or one who is interested in a general aerobic endurance fitness program, cross-training or participation in multiple aerobic endurance activities may be warranted ([35](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref35>))."

  - id: "ch20-step-2-training-frequency"
    title: "Designing an Aerobic Endurance Program / Step 2: Training Frequency"
    level: 3
    tags: [designing, aerobic, endurance, program, step, training]
    key_points:
      - "Training frequency refers to the number of training sessions conducted per day or per week."
    recall_prompts:
      - "Step 2: Training Frequency 是什麼？有哪些類型或應用？"
    content: "\n\nTraining frequency refers to the number of training sessions conducted per day or per week. The frequency of training sessions depends on an interaction of exercise intensity and duration, the training status of the athlete, and the specific sport season. Higher exercise intensity and longer duration may necessitate less frequent training to allow sufficient recovery from exercise sessions. The training status of the athlete can influence training frequency, with lesser-trained athletes requiring more recovery days at the beginning of a training period than more highly trained athletes. The sport season that the athlete is currently in can also influence training frequency; an off-season program may include five training days per week, but training frequency may progress to daily workouts (or even multiple workouts per day for a triathlete) in the preseason. Additionally, fewer training sessions may be required to maintain an achieved level of physiological function or performance than to attain that level initially ([77](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref77>)). Appropriate training frequency is important for the aerobic endurance athlete, because too much training may increase the risk of injury, illness, or overtraining. A number of studies have shown increased injury rates with training sessions more frequent than five times per week ([49](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref49>), [69](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref69>)); however, these studies used active individuals in a wide age range, not only young and healthy athletes, as subjects. Conversely, too little training will not result in positive adaptations to the various systems of the body. Research has shown that it is necessary to train more than twice per week in order to increase V̇O2max ([38](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref38>), [83](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref83>)). Many coaches recognize that multiple training sessions per day may be needed to improve performance in some endurance athletes. Research conducted by Hansen and colleagues ([43](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref43>)) showed that time to exhaustion, resting muscle glycogen concentrations, and citrate synthase activity increased among seven healthy untrained men after 10 weeks of training twice every other day versus once daily. It was speculated that training in a glycogen-depleted state may improve glycogen resynthesis via an increase in the transcription and transcription rate of certain genes responsible for training adaptations. However, the researchers cautioned that these results should not necessarily be used by coaches and practitioners to guide practice, as low glycogen concentrations may reduce the period of time an athlete is able to train and may increase risk of overtraining. This is one reason why it is important to monitor the effects of the training load on athletes.\n\nRecovery from individual training sessions is essential if the athlete is to derive maximum benefits from the subsequent training session. Exercise performance has been shown to improve following relative rest from difficult training sessions ([2](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref2>)). Obtaining sufficient rest, becoming rehydrated, and restoring fuel sources are critical issues for the athlete during recovery. Relaxation and avoidance of strenuous physical activity are particularly important following days of high-intensity or long-duration training. Postexercise ingestion of adequate fluids is important for replacing the fluid lost during training. If the training session was especially long or intense, then postexercise carbohydrate intake is important for replacing the muscle and liver glycogen stores that were likely depleted. More detailed information on this topic can be found in [chapter 10](<E6372ch10_d87.xhtml>), “Nutrition Strategies for Maximizing Performance.”"

  - id: "ch20-step-3-training-intensity"
    title: "Designing an Aerobic Endurance Program / Step 3: Training Intensity"
    level: 3
    tags: [designing, aerobic, endurance, program, step, training]
    key_points:
      - "Central to causing training adaptations in the body is the interaction of training intensity and duration."
    recall_prompts:
      - "Step 3: Training Intensity 是什麼？有哪些類型或應用？"
    content: "\n\nCentral to causing training adaptations in the body is the interaction of training intensity and duration. Generally, the higher the exercise intensity, the shorter the exercise duration. Adaptations in the body are specific to the intensity, or effort expended during a training session. High-intensity aerobic exercise increases cardiovascular and respiratory function and allows for improved oxygen delivery to the working muscles ([72](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref72>)). Increasing exercise intensity may also benefit skeletal muscle adaptations by affecting muscle fiber recruitment ([28](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref28>)). As exercise intensity is increased, greater recruitment of Type II muscle fibers occurs to meet the increased power needs. This training stimulus allows those fibers to become more aerobically trained, thereby possibly improving overall aerobic performance.\n\nThe regulation of exercise intensity is critical to the success of each training session and ultimately the entire program. An exercise intensity that is too low does not overload the body’s systems and induce the desired physiological adaptations, whereas an intensity that is too high results in fatigue and a premature end to the training session ([70](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref70>)). In either instance, the training session will be poor and ineffective.\n\nThe most accurate methods for regulating exercise intensity are to monitor oxygen consumption during exercise to determine its percentage of V̇O2max and to periodically measure the blood lactate concentration to determine the relationship to the lactate threshold. If V̇O2max testing is not available, exercise prescriptions can use heart rate, ratings of perceived exertion, metabolic equivalents, or exercise velocity to monitor exercise intensity. Cycling power–measuring devices are frequently used by professional and top-level amateur competitors.\n\n#### Heart Rate\n\nHeart rate is likely the most frequently used method for prescribing aerobic exercise intensity. The reason is the close relationship between heart rate and oxygen consumption, especially when the intensity is between 50% and 90% of functional capacity (V̇O2max), also called heart rate reserve (HRR), which is the difference between an athlete’s maximal heart rate and his or her resting heart rate ([5](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref5>)).The most accurate means of regulating intensity using this method is to determine the specific heart rate associated with the desired percentage of V̇O2max or the heart rate associated with the lactate threshold. For the greatest precision, this necessitates laboratory testing to identify these exercise intensities. If laboratory testing is unavailable, then the individual’s age-predicted (estimated) maximal heart rate (APMHR) can be used as the basis for determining exercise intensity. Refer to the sidebar “Target Heart Rate Calculations” for formulas and sample calculations for determining aerobic endurance exercise heart rate ranges using the Karvonen method and the percentage of maximal heart rate (MHR) method. The relationship between V̇O2max, HRR, and MHR is shown in [table 20.1](<E6372ch20_d97.xhtml#t20.1>).\n\nTABLE 20.1 Relationship between VO2max, HRR, and MHR 2 % V.O2max | % HRR | % MHR  \n---|---|---  \n50 | 50 | 66  \n55 | 55 | 70  \n60 | 60 | 74  \n65 | 65 | 77  \n70 | 70 | 81  \n75 | 75 | 85  \n80 | 80 | 88  \n85 | 85 | 92  \n90 | 90 | 96  \n95 | 95 | 98  \n100 | 100 | 100  \n  \nHRR = heart rate reserve; MHR = percentage of maximal heart rate.\n\n##### Target Heart Rate Calculations\n\nKarvonen Method\n\n_Formula:_\n\n  * Age-predicted maximum heart rate (APMHR) = 220 − age\n  * Heart rate reserve (HRR) = APMHR − resting heart rate (RHR)\n  * Target heart rate (THR) = (HRR × exercise intensity) + RHR\n\nDo this calculation twice to determine the target heart rate range (THRR).\n\n_Example:_\n\nA 30-year-old athlete with an RHR of 60 beats/min is assigned an exercise intensity of 60% to 70% of functional capacity:\n\n  * APMHR = 220 − 30 = 190 beats/min\n  * RHR = 60 beats/min\n  * HRR = 190 − 60 = 130 beats/min\n  * Lowest number of the athlete’s THRR = (130 × 0.60) + 60 = 78 + 60 = 138 beats/min\n  * Highest number of the athlete’s THRR = (130 × 0.70) + 60 = 91 + 60 = 151 beats/min\n\nWhen monitoring heart rate during exercise, divide the THRR by 6 to yield the athlete’s THRR in number of beats for a 10-second interval:\n\n138 ÷ 6 = 23 \n\n151 ÷ 6 = 25\n\nThe athlete’s THRR is 23 to 25 beats per 10 seconds.\n\nPercentage of Maximal Heart Rate Method\n\n_Formula:_\n\n  * Age-predicted maximum heart rate (APMHR) = 220 − age\n  * Target heart rate (THR) = (APMHR × exercise intensity)\n\nDo this calculation twice to determine the target heart rate range (THRR).\n\n_Example:_\n\nA 20-year-old athlete is assigned an exercise intensity of 70% to 85% of maximal heart rate:\n\n  * APMHR = 220 − 20 = 200 beats/min\n  * Lowest number of the athlete’s THRR = 200 × 0.70 = 140 beats/min\n  * Highest number of the athlete’s THRR = 200 × 0.85 = 170 beats/min\n\nWhen monitoring heart rate during exercise, divide the THRR by 6 to yield the athlete’s THRR in number of beats for a 10-second interval:\n\n140 ÷ 6 = 23 \n\n170 ÷ 6 = 28\n\nThe athlete’s THRR is 23 to 28 beats per 10 seconds.\n\nAlthough the Karvonen and percentage of maximal heart rate formulas provide practical intensity assignments, basing them on age-predicted maximal heart rates may entail some inaccuracies (vs. laboratory-tested maximal heart rates) when exercise intensity is being monitored during cycling or running ([65](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref65>)). It has been determined that age contributes 75% of the variability of heart rate; the effects of other factors such as mode of exercise and fitness level must also be considered with the use of heart rate to monitor intensity ([65](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref65>)). Additionally, using estimations of exercise intensity via estimated maximal heart rate equations provides no information about the intensity associated with the lactate threshold. Without some knowledge of an athlete’s lactate threshold, a highly effective aerobic endurance training program cannot be developed.\n\n#### Ratings of Perceived Exertion Scales\n\nRatings of perceived exertion (RPE) scales can also be used to regulate intensity during aerobic endurance training ([26](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref26>), [39](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref39>)). It appears that RPE can be used to accurately regulate intensity when there are changes in fitness level ([6](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref6>)); however, researchers have demonstrated that the RPE–intensity relationship can be influenced by various external environmental factors such as passive distracters and environmental temperature ([13](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref13>), [71](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref71>)). According to Haddad, Padula, and Chamari ([41](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref41>)), various subject characteristics such as age, sex, training status, and fitness level may influence RPE. Furthermore, a few environmental factors that may influence RPE are listening to music, watching television or video, environmental temperature, altitude, nutritional considerations, and external feedback. However, these authors suggest that despite the potential influence of these factors, RPE is still a valid monitoring tool (see [table 20.2](<E6372ch20_d97.xhtml#t20.2>)).\n\nTABLE 20.2 Rating of Perceived Exertion (RPE) Scale Rating | Description  \n---|---  \n1 | Nothing at all (lying down)  \n2 | Extremely little  \n3 | Very easy  \n4 | Easy (could do this all day)  \n5 | Moderate  \n6 | Somewhat hard (starting to feel it)  \n7 | Hard  \n8 | Very hard (making an effort to keep up)  \n9 | Very very hard  \n10 | Maximum effort (can‘t go any further)  \n  \nReprinted, by permission, from NSCA, 2012, Aerobic endurance training program design, by P. Hagerman. In _NSCA‘s essentials of personal training,_ 2nd ed., edited by J.W. Coburn and M.H. Malek (Champaign, IL: Human Kinetics), figure 16.1, 395.\n\n#### Metabolic Equivalents\n\nMetabolic equivalents may also be used to prescribe exercise intensity. One metabolic equivalent (MET) is equal to 3.5 ml·kg−1·min−1 of oxygen consumption and is considered the amount of oxygen required by the body at rest ([1](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref1>)). Metabolic equivalent values have been determined for a variety of physical activities; a brief list is shown in [table 20.3](<E6372ch20_d97.xhtml#t20.3>). For example, an activity with a MET value of 10.0 requires 10 times the oxygen uptake that is required by an individual at rest. Assigning MET values as part of an aerobic exercise prescription requires the strength and conditioning professional to know (or estimate) an athlete’s maximal oxygen uptake in order to be able to calculate an exercise MET level ([40](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref40>)).\n\nTABLE 20.3 Metabolic Equivalents (METs) for Physical Activities METs | Activity  \n---|---  \n1.0 | Lying or sitting quietly, doing nothing, lying in bed awake  \n2.0 | Walking, <2 miles per hour (<3.2 km/h), level surface  \n2.5 | Walking, 2 miles per hour (3.2 km/h), level surface  \n3.0 | Resistance training (free weight, Nautilus or Universal type), light or moderate effort  \n3.5 | Stationary cycling, 30-50 W, very light effort  \n3.0 | Walking, 2.5 miles per hour (4 km/h)  \n3.5 | Walking, 2.8-3.2 miles per hour (4.5-5.2 km/h), level surface  \n3.5 | Calisthenics, home exercise, light or moderate effort  \n4.3 | Walking, 3.5 miles per hour (5.6 km/h), level surface  \n4.8 | Stair stepping (with a 4-inch [10 cm] step height), 30 steps per minute  \n5.0 | Aerobic dance, low impact  \n5.0 | Walking, 4 miles per hour (6.4 km/h), level surface  \n5.0 | Elliptical trainer, moderate effort  \n5.5 | Step aerobics (with a 4-inch [10 cm] step height)  \n5.5 | Water aerobics, water calisthenics  \n5.8 | Swimming laps, freestyle, slow, moderate or light effort  \n6.0 | Outdoor cycling, 10 to 11.9 miles per hour (16.1-19.2 km/h)  \n6.0 | Resistance training (free weight, Nautilus or Universal type), powerlifting or bodybuilding, vigorous effort  \n6.3 | Stair stepping (with a 12-inch [31 cm] step height), 20 steps per minute  \n6.3 | Walking, 4.5 miles per hour (7.2 km/h), level surface  \n6.8 | Stationary cycling, 90-100 W, light effort  \n6.9 | Stair stepping (with an 8-inch [20 cm] step height), 30 steps per minute  \n70 | Rowing, stationary, 100 W, moderate effort  \n73 | Aerobic dance, high impact  \n75 | Step aerobics (with a 6- to 8-inch [15-20 cm] step)  \n8.0 | Calisthenics (e.g., push-ups, sit-ups, pull-ups, jumping jacks), vigorous effort  \n8.0 | Circuit training, including some aerobic stations, with minimal rest  \n8.0 | Outdoor cycling, 12 to 13.9 miles per hour (19.3-22.4 km/h)  \n8.3 | Walking, 5 miles per hour (8.0 km/h)  \n8.5 | Rowing, stationary, 150 W, moderate effort  \n8.8 | Stationary cycling, 101-160 W, moderate effort  \n9.0 | Running, 5.2 miles per hour (8.4 km/h) (11.5 minutes per mile)  \n9.0 | Stair aerobics (with a 10-12-inch [31 cm] step height)  \n9.8 | Running, 6 miles per hour (9.7 km/h) (10 minutes per mile)  \n9.5 | Step aerobics (with a 10- to 12-inch [25.4-31 cm] step)  \n9.8 | Swimming laps, freestyle, fast, vigorous effort  \n10.0 | Outdoor cycling, 14 to 15.9 miles per hour (22.5-25.6 km/h)  \n10.5 | Running, 6.7 miles per hour (10.8 km/h) (9 minutes per mile)  \n11.0 | Running, 7 miles per hour (11.3 km/h) (8.5 minutes per mile)  \n11.0 | Stationary cycling, 161-200 W, vigorous effort  \n11.0 | Rope skipping, general  \n11.8 | Running, 7.5 miles per hour (12.1 km/h) (8 minutes per mile)  \n11.8 | Running, 8 miles per hour (12.9 km/h) (7.5 minutes per mile)  \n12.0 | Outdoor cycling, 16 to 19 miles per hour (25.7-30.6 km/h)  \n12.0 | Rowing, stationary, 200 W, moderate effort  \n12.3 | Running, 8.6 miles per hour (13.7 km/h) (7 minutes per mile)  \n12.8 | Running, 9 miles per hour (14.5 km/h) (6 minutes 40 seconds per mile)  \n14.0 | Stationary cycling, 201-270 W, very vigorous effort  \n14.5 | Running, 10 miles per hour (16.1 km/h) (6 minutes per mile)  \n15.8 | Outdoor cycling, >20 miles per hour (>32.2 km/h)  \n  \n#### Power Measurement\n\nCyclists may use power-measuring cranks and hubs to monitor exercise intensity ([25](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref25>)). Due to cost, these devices are probably suitable only for professionals and top-level amateurs. Research studies have indicated that at least two of these devices provide valid and reliable power measures ([36](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref36>), [57](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref57>)). Using power to monitor intensity in cycling has an advantage over other measures because metabolic rate is closely related to mechanical power production ([25](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref25>)). Using power as an intensity measure also allows reproducible intensity efforts regardless of environmental conditions, which may influence other measurements of intensity such as heart rate and training velocity ([25](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref25>))."

  - id: "ch20-step-4-exercise-duration"
    title: "Designing an Aerobic Endurance Program / Step 4: Exercise Duration"
    level: 3
    tags: [designing, aerobic, endurance, program, step, exercise]
    key_points:
      - "Exercise duration refers to the length of time of the training session."
    recall_prompts:
      - "Step 4: Exercise Duration 是什麼？有哪些類型或應用？"
    content: "\n\nExercise duration refers to the length of time of the training session. The duration of a training session is often influenced by the exercise intensity: the longer the exercise duration, the lower the exercise intensity ([74](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref74>)). For example, exercise that is conducted at an intensity above the maximal lactate steady state (e.g., 85% of V̇O2max) will have a relatively short duration (20-30 minutes) because the accumulation of lactate within the muscle will contribute to fatigue. Conversely, exercise that is performed at a much lower intensity (e.g., 70% of V̇O2max) may be performed for several hours before the athlete experiences fatigue.\n\nThe duration of a training session is often influenced by the exercise intensity; the longer the exercise duration, the lower the exercise intensity."

  - id: "ch20-step-5-exercise-progression"
    title: "Designing an Aerobic Endurance Program / Step 5: Exercise Progression"
    level: 3
    tags: [designing, aerobic, endurance, program, step, exercise]
    key_points:
      - "Once athletes begin an aerobic endurance exercise program, they need to continue the program to either maintain or advance their aerobic fitness level."
    recall_prompts:
      - "Step 5: Exercise Progression 是什麼？有哪些類型或應用？"
    content: "\n\nOnce athletes begin an aerobic endurance exercise program, they need to continue the program to either maintain or advance their aerobic fitness level. Research seems to indicate that aerobic fitness does not decrease for up to five weeks when intensity of training is maintained and frequency decreases to as few as two times per week ([46](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref46>)).\n\nDepending on the goals of the athlete, progression of an aerobic endurance exercise program initially involves increasing the frequency, intensity, and duration of exercise. General recommendations are that individuals always include at least one recovery or active rest day in each week of training. Most athletes have the goal of attempting to increase rather than just maintain aerobic fitness. This requires regular progression of the training program. Typically, exercise frequency, intensity, or duration should not increase more than 10% each week ([42](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref42>)). At higher levels of fitness, athletes will reach a point where it is not feasible to increase either the frequency or the duration of exercise. When this occurs, progressions in training will occur only through exercise intensity manipulation ([42](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref42>)).\n\nAs shown by the sidebar titled “Examples of Aerobic Exercise Progression,” athletes and strength and conditioning professionals can manipulate combinations of frequency, intensity, and duration. Progression of training frequency may be limited by constraints such as school and work. It may not be possible for the athlete to incorporate more than one training session each day. Training intensity measurement should use the same methods as used in the original exercise intensity prescription. The best method is determined by the equipment available to monitor intensity (heart rate monitor, RPE charts, or machines that provide MET workloads). Progression of training intensity should be monitored very carefully to avoid overtraining. The duration of each training session is limited by the same constraints as training frequency. Athletes who train predominantly outdoors are also limited by the number of daylight hours, especially in the late fall, winter, and early spring.\n\n#### Examples of Aerobic Exercise Progression\n\nExample A\n\n  * _Week 1:_ Four times per week at an intensity of 70% to 85% THR for 40 minutes\n  * _Week 2:_ Five times per week at an intensity of 70% to 85% THR for 45 minutes\n  * _Week 3:_ Three times per week at an intensity of 70% to 85% THR for 40 minutes, one time per week for 50 minutes at 60% to 75% THR\n  * _Week 4:_ Four times per week at an intensity of 70% to 85% THR for 45 minutes, one time per week for 50 minutes at 60% to 75% THR\n  * _Week 5:_ Four times per week at an intensity of 70% to 85% THR for 45 minutes, one time per week for 55 minutes at 60% to 75% THR\n\nExample B\n\n  * _Week 1:_ Three times per week at an intensity of 60% to 70% THR for 30 minutes\n  * _Week 2:_ Four times per week at an intensity of 60% to 70% THR for 35 minutes\n  * _Week 3:_ Three times per week at an intensity of 65% to 75% THR for 30 minutes\n  * _Week 4:_ Four times per week at an intensity of 65% to 70% THR for 35 minutes\n  * _Week 5:_ Three times per week at an intensity of 70% to 75% THR for 30 minutes"

  - id: "ch20-types-of-aerobic-endurance-training-prog"
    title: "Types of Aerobic Endurance Training Programs"
    level: 2
    tags: [types, aerobic, endurance, training, programs]
    key_points:
      - "There are several types of aerobic endurance training programs, each with varying frequency, intensity, duration, and progression parameters."
    recall_prompts:
      - "Types of Aerobic Endurance Training Programs 的核心概念是什麼？"
    content: "\n\nThere are several types of aerobic endurance training programs, each with varying frequency, intensity, duration, and progression parameters. Each type incorporates the five design variables and results in regimens created for specific outcomes. [Table 20.4](<E6372ch20_d97.xhtml#t20.4>) summarizes the types of aerobic endurance training and their common prescriptive guidelines. Sample training programs for each type of aerobic endurance training are included after the sections that follow; the specific training mode being discussed is boldfaced in the sample training chart.\n\nTABLE 20.4 Types of Aerobic Endurance Training Training type | Frequency per week* | Duration (work bout portion) | Intensity  \n---|---|---|---  \nLong, slow distance (LSD) | 1-2 | Race distance or longer (~30-120 minutes) | ~70% of VO2max  \nPace/tempo | 1-2 | ~20-30 minutes | At the lactate threshold; at or slightly above race pace  \nInterval | 1-2 | 3-5 minutes (with a work:rest ratio of 1:1) | Close to VO2max  \nHigh-intensity interval training | 1 | 30-90 seconds (with a work:rest ratio of 1:5) | Greater than VO2max  \nFartlek | 1 | ~20-60 minutes | Varies between LSD and pace/tempo  \n  \n*The other days of the week are composed of other training types and rest-recovery days.\n\nData from references 15, 24, 54, 77, and 82\n\n### Long, Slow Distance Training\n\nTraditionally, endurance coaches and athletes have used the term long, slow distance (LSD) to refer to training at intensities equivalent to approximately 70% of V̇O2max (or about 80% of maximum heart rate). The fitness professional and athlete should remember that the term _slow_ refers to a pace that is slower than typical race pace. The LSD terminology is probably due for a change to better reflect the intention of the activity. We have kept the term _LSD_ to match terminology that is commonly used. In a LSD training session, the training distance should be greater than race distance, or the duration should be at least as long as 30 minutes to 2 hours ([24](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref24>)). This intensity and duration is typically characterized as “conversation” exercise, with the athlete able to talk without undue respiratory distress. The physiological benefits derived from LSD training primarily include enhanced cardiovascular and thermoregulatory function, improved mitochondrial energy production and oxidative capacity of skeletal muscle, and increased utilization of fat as a fuel ([7](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref7>), [11](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref11>), [16](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref16>), [18](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref18>), [28](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref28>), [33](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref33>), [40](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref40>), [47](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref47>), [48](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref48>), [52](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref52>), [73](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref73>), [82](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref82>)). These changes are likely to improve the lactate threshold intensity by enhancing the body’s ability to clear lactate. Chronic use of this type of training also causes a change in the metabolic characteristics of the involved muscles ([40](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref40>), [50](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref50>)) and an eventual shift of Type IIx fibers to Type I fibers ([68](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref68>), [76](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref76>)).\n\nThe increase in fat utilization may also cause a sparing of muscle glycogen ([20](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref20>), [23](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref23>), [44](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref44>), [48](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref48>), [52](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref52>), [58](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref58>), [82](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref82>)). The intensity during LSD training is lower than the intensity used during competition, and this may be a disadvantage if too much of this type of training is performed. Additionally, LSD training does not stimulate the neurological patterns of muscle fiber recruitment that are required during a race ([82](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref82>)), and this may result in adaptations in muscle fibers that are not used during competition.\n\n### Pace/Tempo Training\n\nPace/tempo training employs an intensity at or slightly higher than race competition intensity. The intensity corresponds to the lactate threshold; therefore, this type of training is also often called _threshold training_ ([24](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref24>)) or _aerobic–anaerobic interval training_ ([15](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref15>)). There are two ways to conduct pace/tempo training: steady and intermittent ([24](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref24>)). Steady pace/tempo training is continuous training conducted at an intensity equal to the lactate threshold for durations of approximately 20 to 30 minutes. The purpose of pace/tempo training is to stress the athlete at a specific intensity and improve energy production from both aerobic and anaerobic metabolism. Intermittent pace/tempo training is also referred to as _tempo intervals_ , _cruise intervals_ , or _threshold training_ ([24](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref24>)). During intermittent pace/tempo training, the intensity is the same as for a steady-threshold workout, but the training session consists of a series of shorter intervals with brief recovery periods between work intervals. During pace/tempo training, it is important to avoid exercising at a higher intensity than the prescribed pace. If the workout seems relatively easy, it is better to increase the distance than to increase the intensity. The primary objective for this type of training is to develop a sense of race pace and enhance the body systems’ ability to sustain exercise at that pace. Pace/tempo training involves the same pattern of muscle fiber recruitment as is required in competition. The benefits derived from this type of training include improved running economy and increased lactate threshold.\n\n### Interval Training\n\nInterval training involves exercise at intensities close to V̇O2max. The work intervals should last between 3 and 5 minutes, although they can be as short as 30 seconds ([1](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref1>)). The rest intervals for 3- to 5-minute work intervals should be equal to the work interval, thereby keeping the work:rest ratio (W:R) at 1:1. Interval training permits the athlete to train at intensities close to V̇O2max for a greater amount of time than would be possible in a single exercise session at a continuous high intensity. This type of training should not be performed until a firm base of aerobic endurance training has been attained ([54](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref54>)). Interval training is very stressful on the athlete and should be used sparingly. The benefits derived from interval training include an increased V̇O2max and enhanced anaerobic metabolism.\n\n### High-Intensity Interval Training\n\nHigh-intensity interval training, or HIIT, is a form of training that uses repeated high-intensity exercise bouts interspersed with brief recovery periods ([9](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref9>)). According to Buchheit and Laursen ([9](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref9>)), for an optimal stimulus it is necessary for athletes to spend several minutes within the HIIT session above 90% of the V̇O2max. Both short (<45 seconds) and long (2- to 4-minute) HIIT intervals can be used to elicit different training responses. As the work duration for a single exercise bout is increased, the energy contribution from anaerobic glycolysis will likely increase along with blood lactate levels. Additionally, HIIT training may be beneficial for improving running speed and economy. This may be particularly important toward the later stages of an aerobic endurance race when the “final kick” or “push” is needed to pass a competitor or set a record or personal best time.\n\nIn performing HIIT, the appropriate amount of rest between repetitions is critical. If the relief intervals are too short, the athlete will be unable to put forth a quality effort on subsequent exercise bouts and also will be at a greater risk for injury. If the rest periods are too long, many of the benefits experienced from challenging the anaerobic glycolytic energy system will likely diminish. An example of an appropriate work-to-rest ratio for long-interval HIIT training is ≥2 to 3 minutes at or above 90% V̇O2max, with relief bouts of ≤2 minutes ([8](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref8>), [9](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref9>), [55](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref55>)).\n\n### Fartlek Training\n\nFartlek training (the word _Fartlek_ originates from the Swedish term for speed play) is a combination of several of the previously mentioned types of training. Although Fartlek training is generally associated with running, it can also be used for cycling and swimming. A sample Fartlek run involves easy running (~70% V̇O2max) combined with either hill work or short, fast bursts of running (~85-90% V̇O2max) for short time periods. Athletes can apply this basic format to cycling and swimming by simply combining long, slow distance training, pace/tempo training, and interval training. A Fartlek training workout challenges all systems of the body and may help reduce the boredom and monotony associated with daily training. This type of training is likely to enhance V̇O2max, increase the lactate threshold, and improve running economy and fuel utilization.\n\nThe various types of training induce different physiological responses. Ideally a sound program would incorporate all types of training into the athlete’s weekly, monthly, or yearly training schedule.\n\nSample LSD Training Program for a beginning Marathon Runner Sunday | Monday | Tuesday | Wednesday | Thursday | Friday | Saturday  \n---|---|---|---|---|---|---  \nRest day | 45-min Fartlek run | **60-min LSD run** | 45-min interval run | 60-min run at race pace over hills and flats | 45-min repetition run | **120-min LSD run**  \n  \n**Comments**\n\n  * Frequency: To help combat overtraining or overuse, the two LSD training days should be spread out evenly during the week to allow recovery between sessions.\n  * Duration: Since the athlete‘s race distance is a marathon (26.2 miles, 42 km), the duration or running distance of the LSD training sessions should approach that of the marathon (for a trained athlete), at least for one of the two LSD sessions.\n  * Intensity: To complete the extended LSD sessions, the athlete should run at a lower intensity or training pace (minutes per mile or per kilometer); high respiratory stress is not required.\n\nSample Pace/Tempo Training Program for a beginning 50 km Cyclist Sunday | Monday | Tuesday | Wednesday | Thursday | Friday | Saturday  \n---|---|---|---|---|---|---  \nRest day | 60-min LSD ride | **30-min pace/tempo ride** | 45-min Fartlek ride | 45-min easy ride | **30-min pace/tempo ride** | 90-min LSD ride  \n  \n**Comments**\n\n  * Frequency: Because the pace/tempo rides are stressful, these two training days should be spread out during the week to allow recovery between sessions.\n  * Duration: For _steady_ pace/tempo training, exercise duration is shorter than race distance or duration to allow for a higher training intensity.\n  * Intensity: The athlete should cycle at a high intensity or training pace (minutes per mile or per kilometer); high respiratory stress is required to simulate race pace.\n\nSample Interval Training Program for an Intermediate 10 km Runner Sunday | Monday | Tuesday | Wednesday | Thursday | Friday | Saturday  \n---|---|---|---|---|---|---  \nRest day | **10 reps of 0.5 km intervals at race pace with a 1:1 W:R ratio** | 10 km easy run | 45-min LSD run | HIIT 3 min @ 90% VO2max/2 min passive recovery × 6 reps | 45-min LSD run | 45-min Fartlek run on flat course  \n  \n**Comments**\n\n  * Frequency: Because the interval runs are stressful, these two training days should be spread out during the week to allow recovery between sessions.\n  * Duration: The total distance or duration of the training portion of the session (i.e., the sum of the interval work bouts) should approach the competition distances as the athlete becomes more highly trained.\n  * Intensity: The athlete should run at an intensity (pace) close to VO2max when completing the work bout portions of the interval training sessions.\n\nSample High-Intensity Interval Training Swim Program for an Intermediate 140.6 Triathlete (Swim Training Portion; Race Distance Is 2.4 Miles) Sunday | Monday | Tuesday | Wednesday | Thursday | Friday | Saturday  \n---|---|---|---|---|---|---  \nRest day | 60-min LSD swim | **HIIT 2 min @ 95% VO 2max/2 min passive recovery × 8 reps** | 45-min LSD swim | Rest day (no swim workout) | 1-mile swim at race pace | 60-min LSD swim  \n  \n  * Frequency: Because the interval runs are stressful, these two training days should be spread out during the week to allow recovery between sessions.\n  * Duration: The total distance or duration of the training portion of the session (i.e., the sum of the interval work bouts) should approach the competition distances as the athlete becomes more highly trained.\n  * Intensity: The athlete should run at an intensity (pace) close to VO2max when completing the work bout portions of the interval training sessions.\n\nSample Fartlek Training Program for a Female 5 km Collegiate Cross-Country Runner Sunday | Monday | Tuesday | Wednesday | Thursday | Friday | Saturday  \n---|---|---|---|---|---|---  \nRest or easy run | 60-min LSD run | **45-min Fartlek run of hard/easy work on hills and flats** | 25-min pace/ tempo run | 45-min LSD run | 25-min LSD run | Competition  \n  \n**Comments**\n\n  * Frequency: Because the Fartlek runs are stressful, only one Fartlek training day should occur during the week.\n  * Duration: The total distance or duration of the training portion of the session (i.e., the sum of the interval work bouts) should approach the competition distance as the athlete becomes more highly trained.\n  * Intensity: The athlete should run at an intensity (pace) close to VO2max when completing the work bout portions of the Fartlek training sessions."

  - id: "ch20-application-of-program-design-to-trainin"
    title: "Application of Program Design to Training Seasons"
    level: 2
    tags: [application, program, design, training, seasons]
    key_points:
      - "The program design variables and the various types of aerobic endurance training are often applied to athletes’ sport seasons to create a yearly training program."
    recall_prompts:
      - "Application of Program Design to Training Seasons 的核心概念是什麼？"
    content: "\n\nThe program design variables and the various types of aerobic endurance training are often applied to athletes’ sport seasons to create a yearly training program. Typically, the training year is divided into phases that include the off-season (sometimes called base training), preseason, in-season (sport competition), and postseason (active rest). [Table 20.5](<E6372ch20_d97.xhtml#t20.5>) summarizes the main objectives and the typical program design assignments for each training season.\n\nTable 20.5 Sport Season Objectives and Program Design Assignments Sport season | Objective | Frequency per week | Duration | Intensity  \n---|---|---|---|---  \nOff-season (base training) | Develop sound conditioning base | 5-6 | Long | Low to moderate  \nPreseason | Improve factors important to aerobic endurance performance | 6-7 | Moderate to long | Moderate to high  \nIn-season (competition) | Maintain factors important to aerobic endurance performance | 5-6 (training and racing) | Short (training) | Low (training)  \nRace distance | High (racing)  \nPostseason (active rest) | Recovery from competitive season | 3-5 | Short | Low  \n  \nData from references 15, 24, 54, 77, and 82.\n\n### Off-Season (Base Training)\n\nThe priority in off-season training is to develop a base of cardiorespiratory fitness. Initially, the training program should be composed of long-duration and low-intensity workouts. As the off-season continues, intensity and, to a lesser extent, duration are increased; however, the increase in training duration should not be more than 5% to 10% per week ([87](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref87>)). Increasing the training duration too much can actually lead to decreases in aerobic endurance performance ([18](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref18>)). Periodic increases in exercise intensity occur when an athlete has adapted to the training stimulus and requires additional overload for continued improvements.\n\n### Preseason\n\nDuring the preseason, the athlete should focus on increasing intensity, maintaining or reducing duration, and incorporating all types of training into the program. The strengths and weaknesses of the individual athlete should determine the amount and frequency of each type of training.\n\n### In-Season (Competition)\n\nThe in-season training program needs to be designed to include competition or race days in the training schedule. Low-intensity and short-duration training days should precede scheduled competitions so that the athlete is fully recovered and rested. The types of training employed during the in-season are based on the continued goal of improving weaknesses and maintaining strengths of the athlete.\n\n### Postseason (Active Rest)\n\nDuring the postseason, the main focus should be on recovering from the previous competitive season. Low training duration and intensity are typical for this active rest phase, but enough overall exercise or activity should be performed to maintain a sufficient level of cardiorespiratory fitness, muscular strength, and lean body mass. During the postseason, the aerobic endurance athlete should focus on rehabilitating injuries incurred during the competitive season and improving the strength of weak or underconditioned muscle groups.\n\nA sound year-round aerobic endurance training program should be divided into sport seasons with specific goals and objectives designed to improve performance gradually and progressively."

  - id: "ch20-special-issues-related-to-aerobic-endura"
    title: "Special Issues Related to Aerobic Endurance Training"
    level: 2
    tags: [special, issues, related, aerobic, endurance, training]
    key_points:
      - "In addition to the program design variables, it is important to consider other related issues when developing an aerobic endurance training program."
    recall_prompts:
      - "Special Issues Related to Aerobic Endurance Training 的核心概念是什麼？"
    content: "\n\nIn addition to the program design variables, it is important to consider other related issues when developing an aerobic endurance training program. These include cross-training, detraining, tapering, and supplemental resistance training. The strength and conditioning professional should contemplate these issues when adapting the types of aerobic endurance training programs to an individual athlete or developing an aerobic endurance program based on the sport season.\n\n### Cross-Training\n\nCross-training is a mode of training that can be used to maintain general conditioning in athletes during periods of reduced training due to injury or during recovery from a training cycle ([33](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref33>)). Cross-training may reduce the likelihood of overuse injuries because it distributes the physical stress of training to muscle groups different from those used during training ([87](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref87>)). Multiple-event athletes also use cross-training to maximize performance in swimming, cycling, and running. The benefits derived from cross-training include adaptations of the respiratory, cardiovascular, and musculoskeletal systems ([53](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref53>), [57](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref57>), [87](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref87>)). It seems reasonable to expect that cross-training would maintain some level of conditioning in single-event athletes who perform another mode of training (e.g., runners who perform cycling or swimming). To be effective in maintaining V̇O2max, cross-training must be equal in intensity and duration to the athlete’s primary mode of exercise ([37](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref37>), [56](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref56>), [85](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref85>)); however, cross-training will not improve single-event performance to the same magnitude as mode-specific training only ([33](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref33>)).\n\n### Detraining\n\nDetraining occurs when the athlete reduces the training duration or intensity or stops training altogether due to a break in the training program, injury, or illness. In the absence of an appropriate training stimulus, the athlete experiences a loss of the physiological adaptations brought about by training. It has been demonstrated that most of the physiological adaptations attained with training regress rapidly toward pretraining levels when the training stimulus is removed ([27](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref27>), [29](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref29>), [52](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref52>)). To avoid some of the effects of detraining, the use of other training modes may be beneficial; however, cross-training may only attenuate some of the loss of physiological adaptation normally seen during complete cessation of training. Aerobic endurance athletes can minimize the effects of detraining by continuing to use their primary mode of exercise at reduced frequency and intensity, if possible ([82](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref82>)).\n\n### Tapering\n\nTapering is an important component of the training program as aerobic endurance athletes prepare for major competition. Tapering involves the systematic reduction of training duration and intensity, combined with an increased emphasis on technique work and nutritional intervention. The objective of tapering the training regimen is to attain peak performance at the time of competition. While the duration of the taper is dependent on numerous factors, a typical tapering period may last between 7 and 28 days ([63](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref63>)). Although most of the available research on tapering has been conducted on swimmers ([17](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref17>), [46](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref46>), [79](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref79>)), the use of tapering is not limited to these aerobic endurance athletes. Research among runners and cyclists has shown that these endurance athletes also benefit from a well-planned tapering regimen ([63](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref63>), [64](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref64>), [75](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref75>)). Tapering before competition helps facilitate recovery and rehydration and promotes increases in muscle and liver glycogen stores ([63](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref63>)).\n\nThere are several types of tapering models that may be employed by athletes in order to restore impaired physiological capacities resulting from the rigors of training. The most common tapering models are linear, step, and progressive tapers ([79](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref79>)). The linear taper is characterized by a gradual decrease in the overall daily training volume throughout the duration of the taper. In contrast, a step taper is typified by an abrupt and considerable reduction (normally ≥50%) in training volume that is maintained throughout the duration of the taper without fluctuation. The progressive taper uses a combination of the linear and step tapering models. This model is associated with a rapid 10% to 15% immediate reduction in training volume, with smaller, more gradual reductions in volume at each tier. Training volume is systematically reduced while intensity and frequency are maintained.\n\n### Resistance Training\n\nResistance training is an important but often overlooked factor in improving performance in aerobic endurance athletes. Overall, research on the effects of resistance training on performance in trained aerobic endurance athletes is limited; however, some data suggest that benefits can be derived from performing resistance training during aerobic endurance training. Of particular importance, Hickson and colleagues ([45](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref45>)) demonstrated that although the V̇O2max of highly trained aerobic athletes did not improve as a result of resistance training, there was an improvement in short-term exercise performance during both cycling and running. Benefits that aerobic endurance athletes may obtain from performing resistance training include faster recovery from injuries, prevention of overuse injuries, and reduction of muscle imbalances. Increased strength is important for various aspects of aerobic endurance competition, including hill climbing, bridging gaps between competitors during breakaways from groups, and the final sprint ([87](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref87>)). More recently Mikkola and colleagues ([62](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref62>)) examined the influence of a variety of resistance training programs on the running performance of recreational runners. Muscle endurance training and explosive resistance and heavy resistance training programs all improved running performance on a treadmill.\n\n[Chapter 17](<E6372ch17_d94.xhtml>) provides guidelines for designing resistance training programs that can apply to aerobic endurance athletes; refer to scenario C for a sample program that focuses on a high school cross-country runner.\n\n### Altitude\n\nAltitude can be defined as the height above sea level. Altitude is classified into several categories, ranging from sea level (>500 m) to low (>500-2,000 m), moderate (>2,000-3,000 m), high (>3,000-5,500 m), and extreme (>5,500 m) ([30](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref30>)). Contrary to popular belief, the percentage of oxygen is the same at different altitudes ([66](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref66>)). However, as altitude increases, the atmospheric pressure drops, causing a reduction in partial pressure (PO2), which acts as the driving force for gas exchange in the lungs ([30](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref30>), [66](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref66>)). This leads to a cascade of physiological responses to compensate for the reduction in PO2\\. Subsequently, aerobic endurance performance decrements upon acute altitude exposure may begin to occur at altitudes as low as 700 m ([86](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref86>)).\n\nAcclimatization to altitude may occur between 12 and 14 days at moderate altitudes up to 2,300 m; however, it has been found that this process may take up to several months ([86](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref86>)). According to Wyatt ([86](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref86>)), recommendations for optimizing performance at altitude vary dramatically, from arriving immediately before competition (24-48 hours) to 12 weeks of altitude exposure.\n\nMany elite and subelite athletes train at altitude to produce an ergogenic effect. In order to experience a benefit from this type of training, it has been reported that an athlete must receive a hypoxic dose of training ≥12 hours/day for a minimum of three weeks at moderate altitude (approximately 2,100-2,500 m) ([51](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref51>), [86](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref86>)). “Live high, train low” (LHTL) is a method commonly used by athletes seeking to benefit from altitude training. The LHTL requires individuals to live at moderate altitudes, between 2,000 and 3,000 m, and train at near sea level ([51](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref51>)). This method of training allows athletes to simultaneously experience the benefits of altitude acclimatization and training at sea level ([84](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref84>)). Thus, LHTL may potentially provide an ergogenic benefit by allowing athletes to take advantage of the metabolic and hematological adaptations experienced when living at altitude to augment neuromuscular development at lower altitudes ([30](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref30>), [84](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref84>))."

  - id: "ch20-conclusion"
    title: "Conclusion"
    level: 2
    tags: [conclusion]
    key_points:
      - "Training to improve aerobic endurance performance requires a well-developed and scientifically based program."
    recall_prompts:
      - "Conclusion 的核心概念是什麼？"
    content: "\n\nTraining to improve aerobic endurance performance requires a well-developed and scientifically based program. The training program should be developed in conjunction with periodic performance assessment and should be structured to enhance the strengths and improve the weaknesses of the athlete. A combination of a variety of the training types described in this chapter should be used so that all physiological systems involved in successful performance are overloaded and challenged to respond with positive adaptations.\n\nTraining programs should be developed far enough in advance and with enough structure to ensure enhancement of performance, but with enough flexibility to avoid overuse injuries and overtraining. Although other forms of training can be employed to avoid boredom and overtraining, activity-specific training results in the best adaptations to training and ultimately the most improvement in performance.\n\nAerobic Endurance Training Exercises\n\nThe following section discusses some basic technique considerations for performance of aerobic endurance training. General guidelines for both common cardiorespiratory training machines and nonmachine activities are provided. These exercise instructions are largely adapted from Beck ([3](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref3>)).\n\n  * [20.1 Treadmill](<E6372ch20_d97.xhtml#d0>)\n  * [20.2 Stationary Bike](<E6372ch20_d97.xhtml#d1>)\n  * [20.3 Rowing Machine](<E6372ch20_d97.xhtml#d2>)\n  * [20.4 Stair Stepper](<E6372ch20_d97.xhtml#d3>)\n  * [20.5 Elliptical](<E6372ch20_d97.xhtml#d4>)\n  * [20.6 Walking (Gait)](<E6372ch20_d97.xhtml#d5>)\n  * [20.7 Running (Gait)](<E6372ch20_d97.xhtml#d6>)\n\nAerobic Endurance Training Exercises\n\n20.1\n\n### Treadmill\n\nStarting Position\n\n  * Begin by attaching the security clip to the clothing where it will not interfere with the action of the lower or upper limbs.\n  * Straddle the belt by placing the feet on the right and left platform.\n  * Read the instructions on the console of the treadmill to gain an understanding of how to adjust the speed and incline of the specific treadmill being used.\n  * Turn on the machine and adjust the speed of the belt so that it is at the desired warm-up speed.\n\nMovement Phase\n\n  * While holding the handrails, allow one leg to swing freely, and using a pawing action, strike the treadmill with the midfoot.\n  * Once comfortable with the speed of the belt, begin walking/running on the treadmill.\n  * Run/walk, keeping toward the front portion of the machine while remaining in the center of the treadmill deck.\n  * Release the hands from the handrails and adjust the speed and incline until the desired training level is attained.\n  * Avoid holding on to the console or front handrails or leaning backward while walking or running.\n\nEnding Position\n\n  * Reduce the speed of the treadmill and perform a 3- to 5-minute cooldown to prevent blood pooling and improve venous return.\n  * Step onto the platforms on either side of the belt and turn the machine off ([3](<E6372RM_Refs_d104_split_020.xhtml#chapter20-ref3>)).\n\n20.2\n\n### Stationary Bike\n\nStarting Position\n\n  * Begin by adjusting the seat height so the knee of the extended leg is slightly bent (25°-30°) at the bottom of the pedal stroke.\n  * The foot of the down leg should be flat and parallel to the floor with the balls of the feet in contact with the pedals.\n  * Adjust the seat so that the knee is over the center of the pedal on the extended leg and the hips do not rock back and forth during pedaling.\n  * While maintaining a neutral spine position, lean slightly forward at the hips.\n  * Adjust the handlebars so that when the arms are extended at a downward angle there is a slight bend in the elbows. Ideally the upper arm and torso will form an angle of approximately 90°.\n\nMovement Phase\n\n  * Begin pedaling while keeping the balls of the feet in contact with the pedals throughout the duration of the exercise.\n  * Maintain a neutral posture and do not round the shoulders.\n  * With “bullhorn” handlebars, a variety of hand positions may be used. These include \n    * pronated, palms-facing downward grip, allowing a more upright posture;\n    * neutral palms-facing grip on the sides of the handlebars, encouraging a greater forward lean; and\n    * racing position, with the forearms resting on the handlebars, creating maximum forward lean.\n\nEnding Position\n\n  * Slow down until the pedals have come to a complete stop, and step off of the bike.\n\nProper seat height adjustment: _(a)_ leg straight with knee locked and heel on pedal; _(b)_ knee slightly bent with ball of foot on pedal; _(c)_ with the pedal at 12 o’clock, the knee is about even with the hips and approximately parallel with the floor.\n\n![An athlete sits on a stationary bike with their feet on the pedals, one leg straight and the other leg bent at the knee.](images/E6372_0756P_0135_ebook.jpg)\n\n![An athlete sits on a stationary bike with their feet on the pedals, one leg slightly bent, and the other leg fully bent at the knee.](images/E6372_0756P_0131_ebook.jpg)\n\n![An athlete sits on a stationary bike with their feet on the pedals, knee in line with the hips and parallel to the floor.](images/E6372_0756P_0136_ebook.jpg)\n\n20.3\n\n### Rowing Machine\n\nStarting Position (Start)\n\n  * Keep the back upright, not rounded, with a slight lean forward from the hips.\n  * Hold the head upright while looking straight ahead.\n  * Extend the arms in front of the body and grab the rower handle while flexing the hips and knees until the shins are approximately vertical.\n\nMovement Phase (Drive)\n\n  * Extend the hips and knees while using the arms to pull the handle toward the abdomen just below the rib cage.\n  * Adjust the air vent to increase (more air admitted) or decrease (less air admitted) the resistance provided.\n\nEnding Position (Finish)\n\n  * The legs should be fully extended with the torso leaning slightly backward.\n  * Arms are bent at the elbows and the handle is at the abdomen just below the rib cage.\n\nRecovery is the movement from finish back to the start.\n\nStarting position (and the catch)\n\n![An athlete sits in a row machine and begins pulling the handles back. Their knees are completely bent.](images/E6372_0757P_1271_ebook.jpg)\n\nThe drive\n\n![An athlete sits in a row machine and pulls the handles back. Their knees are bent.](images/E6372_0757P_1269_ebook.jpg)\n\nThe finish\n\n![An athlete sits in a rowing machine and pulls the handles to the maximum, causing their legs to be straight.](images/E6372_0757P_1266_ebook.jpg)\n\nThe recovery\n\n![An athlete sits in a row machine and pulls the handles back. Their knees are bent.](images/E6372_0757P_1270_ebook.jpg)\n\n20.4\n\n### Stair Stepper\n\nStarting Position\n\n  * Hold the handrails while stepping forward onto the pedals.\n  * Place the whole foot in contact with each pedal.\n\nMovement Phase\n\n  * Begin stepping, using the handrails for support.\n  * While maintaining an upright posture, take deep (4- to 8-inch [10 to 20 cm]) steps.\n  * Do not allow the steps to contact the floor or the upper-limit stop of the machine.\n  * Continue to hold the handrails lightly while looking straight ahead, keeping an upright posture with the shoulders squared and relaxed, the torso over the hips, the knees aligned with the feet, and toes pointed forward.\n\nEnding Position\n\n  * Hold the handrails while stepping backward off the pedals.\n\nProper position on a stair stepper\n\n![An athlete stands on the pedals of a stair stepper with their back straight and holds the handles of the machine.](images/E6372_0756P_0272_ebook.jpg)\n\n20.5\n\n### Elliptical Trainer\n\nStarting Position\n\n  * Facing the center console of the elliptical, place one foot on each pedal.\n  * While standing upright and looking forward, grasp the handrails with the torso upright and properly balanced directly over the hips, head held high, and shoulders relaxed (but not rounded).\n\nMovement Phase\n\n  * Begin pedaling forward moving the arms and legs in a reciprocating fashion.\n  * The feet should remain in full contact with the pedals throughout the duration of the exercise unless the design of the machine causes the rear heel to lift.\n  * The knees should not be allowed to come forward past the toes when in the flexed position.\n  * Hold on to the handrails in order to maintain balance. If handrail holding is unnecessary, it is a good idea to release the hold on the handrails and pump the arms similarly to the way they move in walking or running.\n  * The incline of the elliptical may be increased to more closely simulate a running motion or reduced to replicate a walking motion.\n  * Performing this exercise with a forward motion may place greater emphasis on the quadriceps; performing it with a backward motion may increase the stress on the hamstrings and gluteals.\n\nEnding Position\n\n  * Slow down until the machine has come to a complete stop then step off the pedals.\n\nProper position on an elliptical trainer\n\n![An athlete stands on the pedals of an elliptical trainer with their back straight and holds the handles of the machine.](images/E6372_0756P_0184_ebook.jpg)\n\n20.6\n\n### Walking (Gait)\n\nBody Position\n\n  * Hold the head upright with the eyes looking straight ahead.\n  * Relax the shoulders, and do not allow them to round.\n  * Position the upper body directly over the hips while keeping the ear, shoulder, and hip aligned.\n\nFoot Strike\n\n  * The heel should strike the ground first, followed by a gentle “rolling” heel-to-ball action, allowing the weight to be spread over the foot.\n  * The weight should transfer from the outer side of the heel and continue to shift forward and slightly inward toward the middle of the ball of the foot at push-off.\n\nStride\n\n  * Without rolling the pelvis (unless racewalking), allow the hips to move freely to increase stride length.\n  * Lift the knees and engage the hips and gluteals in the movement.\n\nArm Action\n\n  * The arms should swing forward and backward in a reciprocating fashion with the lower body (i.e., when the left arm is forward, the right leg is extended, and vice versa).\n  * The shoulders should be relaxed, allowing the arms to swing freely.\n  * At faster walking speeds, the actions should be as follows: \n    * The arms should be bent at the elbows 90° with arm movement originating at the shoulders.\n    * The arms and hands should swing backward and forward, not crossing the midline of the body, in order to create forward propulsion.\n    * The hands should stay relaxed, with the hand coming up to the level of the chest at the nipple line on the forward swing, and the hip bone at the side of the body on the backward swing.\n\n_Note:_ Racewalkers must increase hip rotation with each stride to create a pelvic roll. This enables them to increase stride length while keeping one foot in contact with the ground at all times.\n\n20.7\n\n### Running (Gait)\n\nBody Position\n\n  * Hold the head upright with the eyes looking straight ahead.\n  * Relax the shoulders, but do not allow them to round.\n  * Position the upper body directly over the hips while keeping the ear, shoulder, and hip aligned.\n\nFoot Strike\n\n  * The heel should strike the ground first, followed by a gentle “rolling” heel-to-ball action, allowing the weight to be spread over the foot.\n  * The weight should transfer from the outer side of the heel and continue to shift.\n\nStride\n\n  * Without rolling the pelvis (unless racewalking), allow the hips to move freely to increase stride length.\n  * Lift the knees and engage the hips and gluteals in the movement.\n  * With each running step, the foot should land approximately under the hips to avoid “braking” and spending too much time in the air.\n\nArm Action\n\n  * The arms should swing forward and backward in a reciprocating motion with the lower body (i.e., when the left arm is forward, the right leg is extended, and vice versa).\n  * The shoulders should be relaxed, allowing the arms to swing freely.\n  * In contrast to what occurs in walking, the majority of arm movement comes from the lower arm, as too much shoulder movement wastes energy.\n  * The forearms should be carried between the waist and the chest.\n  * The arms and hands should swing backward and forward, not crossing the midline of the body, in order to create forward propulsion.\n\n### Key Terms\n\n  * age-predicted maximal heart rate (APMHR)\n  * altitude\n  * base training\n  * cross-training\n  * detraining\n  * duration\n  * exercise economy\n  * Fartlek training\n  * frequency\n  * functional capacity\n  * heart rate reserve (HRR)\n  * high-intensity interval training\n  * in-season\n  * intensity\n  * interval training\n  * Karvonen method\n  * lactate threshold\n  * long, slow distance training (LSD)\n  * maximal aerobic capacity (V̇O2max)\n  * maximal lactate steady state\n  * metabolic equivalent (MET)\n  * mode\n  * off-season\n  * overload\n  * pace/tempo training\n  * percentage of maximal heart rate (MHR) method\n  * postseason\n  * preseason\n  * ratings of perceived exertion (RPE)\n  * recovery\n  * resistance training\n  * tapering\n\n### Study Questions\n\n  1. Which of the following adaptations occur as an outcome of an aerobic endurance training program? \n     1. I. increased oxygen delivery to working tissues\n     2. II. higher rate of aerobic energy production\n     3. III. greater utilization of fat as a fuel source\n     4. IV. increased disturbance of the acid–base balance\n     1. I and III only\n     2. II and IV only\n     3. I, II, and III only\n     4. II, III, and IV only\n  2. Which of the following types of training is conducted at an intensity equal to the lactate threshold? \n     1. pace/tempo\n     2. interval\n     3. high-intensity interval training (HIIT)\n     4. Fartlek\n  3. Which of the following is the method most commonly used to assign and regulate exercise intensity? \n     1. oxygen consumption\n     2. heart rate\n     3. ratings of perceived exertion\n     4. race pace\n  4. The loss of physiological adaptations upon the cessation of training is an example of \n     1. specificity of training\n     2. cross-training\n     3. detraining\n     4. tapering\n  5. The longest aerobic endurance training sessions should be performed during which of the following sport seasons? \n     1. postseason\n     2. preseason\n     3. in-season\n     4. off-season"
