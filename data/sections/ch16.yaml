sections:
  - id: "ch16-general-guidelines"
    title: "General Guidelines"
    level: 2
    tags: [general, guidelines]
    key_points:
      - "With the use of alternative modes and nontraditional implement exercises, the general guidelines are not very different from those used with traditional resistance training methods."
    recall_prompts:
      - "General Guidelines 的核心概念是什麼？"
    content: "\n\nWith the use of alternative modes and nontraditional implement exercises, the general guidelines are not very different from those used with traditional resistance training methods. A stable body position that allows the athlete to achieve and maintain safe and proper body alignment during the performance of the exercise is needed in order to appropriately stress the skeletal muscle system. Freestanding ground-based exercises typically use a position in which the feet are placed slightly wider than shoulder-width. With the use of instability devices, the body position may need to be modified in order to ensure that stability is achieved. The grip used with alternative modes and nontraditional implement exercises is typically one of the traditional grips presented in [chapter 15](<E6372ch15_d92.xhtml>). The choice of grip is based on the demands of the particular exercise. Additionally, with many nontraditional implements, the grip can be a limiting factor in the performance of the exercise.\n\nAs with more traditional exercises, the breathing pattern often recommended with these alternative methods is for the athlete to exhale through the sticking point (concentric portion) and to inhale during the less stressful portion (eccentric portion) of the movement. For example, athletes doing the dumbbell chest press on a stability ball would inhale as they lower the dumbbells to the chest and exhale as they push them away from the chest. With structural exercises (those that load the axial skeleton), breath holding may be warranted. However, when one is lifting loads greater than 80% of maximal voluntary contraction or lifting lighter loads to failure, the Valsalva maneuver (forced expiration against a closed glottis) may be unavoidable ([32](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref32>)). The Valsalva maneuver allows for an increase in the intra-abdominal pressure that augments the stability of the spine, which may be beneficial for performing nontraditional exercises. For example, with the log clean, the athlete may perform the Valsalva maneuver during the pull and catch portion of the exercise. The athlete would then exhale after assuming an erect position. [Chapter 15](<E6372ch15_d92.xhtml>) presents more information on the Valsalva maneuver.\n\n### General Guidelines for Alternative Modes and Nontraditional Implement Exercises\n\n  * Ensure proper body alignment via selection of a stable body position.\n  * If the exercise is a freestanding ground-based exercise, place the feet slightly wider than shoulder-width and keep them flat on the ground.\n  * Use the appropriate grip for the exercise based on the type of exercise (see [chapter 15](<E6372ch15_d92.xhtml>) for more detail).\n  * Exhale during the concentric portion of the exercise and inhale during the eccentric phase.\n  * With heavy loads (80% of maximal voluntary contraction or greater) or with lighter loads performed to failure, the Valsalva maneuver may be a useful technique for maintaining spinal stability."

  - id: "ch16-bodyweight-training-methods"
    title: "Bodyweight Training Methods"
    level: 2
    tags: [bodyweight, training, methods]
    key_points:
      - "Bodyweight training methods are among the most basic methods for performing resistance training."
    recall_prompts:
      - "Bodyweight Training Methods 的核心概念是什麼？"
    content: "\n\nBodyweight training methods are among the most basic methods for performing resistance training. Specifically, with these types of exercises, the body weight of the individual is used to provide resistance ([37](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref37>)). Activities such as push-ups, pull-ups, chin-ups, sit-ups, and squat thrusts are typically mentioned in the context of bodyweight training. However, activities such as calisthenics, gymnastics, and yoga could all be classified as bodyweight training methodologies ([37](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref37>)). As noted by Behm and colleagues ([10](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref10>)), gymnastics was classically a part of the physical education system; and this type of training strongly promotes the development of the core musculature, which, when strengthened, appears to reduce injury potential. Bodyweight training appears to offer a low-cost training method that allows for the development of relative strength levels.\n\nOne of the issues related to bodyweight resistance training is the fact that the resistance load is limited to the individual’s body weight. As such, bodyweight training tends not to significantly affect absolute strength levels ([37](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref37>)). To increase the intensity of bodyweight exercises, one can do several things, including increasing the number of repetitions or changing the movement pattern. While increasing the number of repetitions will change the workload, it will shift the targeted outcome from strength toward strength-endurance, which shifts the targeted output away from the development of strength. Simple modifications to bodyweight exercises may obviate some of these limitations. Changing the movement pattern, for example, by elevating the legs while doing a push-up, will increase the resistance encountered. Suspension devices with bodyweight exercises could also be used to increase training intensity ([71](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref71>), [72](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref72>)) as indicated by increases in muscle activation patterns ([51](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref51>)). Snarr and Esco ([72](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref72>)) report that muscle activation is significantly greater in push-ups performed in a suspension device when compared to traditional push-ups performed on stable ground.\n\n### Benefits of Bodyweight Training\n\nThe following are some of the benefits of bodyweight training ([37](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref37>)):\n\n  * Is specific to each individual’s anthropometrics\n  * Often includes closed chain–based exercises\n  * Strengthens several muscle groups at once\n  * Develops relative strength\n  * Improves body control\n  * Is a low-cost training alternative"

  - id: "ch16-core-stability-and-balance-training-meth"
    title: "Core Stability and Balance Training Methods"
    level: 2
    tags: [core, stability, balance, training, methods]
    key_points:
      - "There is increasing interest in training the core in an attempt to improve overall health, rehabilitate from injuries, and enhance athletic performance ([10](<E6372RM_Refs_d104_split_016."
    recall_prompts:
      - "Core Stability and Balance Training Methods 的核心概念是什麼？"
    content: "\n\nThere is increasing interest in training the core in an attempt to improve overall health, rehabilitate from injuries, and enhance athletic performance ([10](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref10>)). To target core stability and balance, interventions ranging from traditional ground-based free weight exercises to training on unstable devices have been advocated in the applied literature.\n\n### Anatomical Focus\n\nThe term _core_ is commonly used in the popular media and in some training journals ([10](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref10>)) to refer to the trunk, or more specifically the lumbopelvic region of the body ([81](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref81>)). However, interpretation of the scientific literature appears to make an accurate or consistent definition of the core tenuous at best ([10](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref10>), [82](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref82>)). Typically, the anatomical core is defined as the axial skeleton and all the soft tissues with proximal attachments that originate on the axial skeleton ([9](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref9>), [10](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref10>)). It is important to note that the axial skeleton includes the pelvic and shoulder girdles, while the soft tissues include the articular cartilage and fibrocartilage, ligaments, tendons, muscles, and fascia ([10](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref10>)). Ultimately the soft tissues act to generate forces (concentric muscle actions) and resist motion (eccentric and isometric muscle actions).\n\nThe muscles that are typically associated with the core allow for the transference of torques and angular momentum during the performance of integrated kinetic chain activities, such as kicking or throwing ([81](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref81>)). In fact, Willardson ([81](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref81>)) suggests that increasing an athlete’s core stability will result in a better foundation for force production in the upper and lower extremities.\n\n### Isolation Exercises\n\nIsolation exercises typically consist of dynamic or isometric muscle actions designed to isolate specific core musculature without the contribution of the lower and upper extremities ([10](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref10>)). For example, common exercises performed to isolate the core are the prone plank ([68](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref68>)) and side plank ([78](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref78>)). There is evidence that these types of isolated exercises can increase muscle activation, which has been suggested to result in improvements in spinal stability and a reduction of injuries ([56](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref56>)). While evidence suggests that these types of activities result in improvements in performance in untrained individuals and those recovering from an injury, there is limited support for the idea that these types of training activities translate to improvements in sport performance ([65](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref65>), [81](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref81>)). In fact, in a recent systematic review, Reed and colleagues ([65](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref65>)) report that isolated core training is not very effective at improving sport performance. Additionally, according to Behm and coworkers ([10](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref10>)) and Willardson ([81](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref81>)), there is strong evidence that ground-based free weight exercises (e.g., squat, deadlift, push press, snatch, and exercises that involve trunk rotation) offer a greater benefit to actual sport performance compared to isolated core training. Ground-based free weight activities appear to offer activation of the core musculature that is similar to, or in most cases greater than, that with traditional isolation exercises designed to engage the core ([35](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref35>), [60](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref60>)). Isolation exercises may have the greatest benefit for injured athletes who are going through the rehabilitation process and are not able to adequately load traditional ground-based free weight exercises ([81](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref81>)).\n\nGround-based free weight activities appear to offer similar or, in most cases, greater activation of the core musculature when compared to traditional isolation exercises designed to engage the core.\n\n### Machines Versus Free Weight Exercises\n\nWhen free weight training methods are compared to machine-based training methods, each has advantages and disadvantages ([10](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref10>), [34](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref34>), [75](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref75>)). With regard to machine-based training, the stability provided by the machine may result in a better ability to target specific muscle groups; but in the context of sport performance, muscle rarely if ever functions in such an isolated fashion ([10](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref10>)). With regard to the stabilizer muscles, it is generally accepted that activation of these muscles is greater during free weight training when compared with machine-based training ([33](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref33>)). In partial support of this belief, Anderson and Behm ([2](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref2>)) state that the activity of the back stabilizers was 30% lower during a Smith machine squat when compared to a free weight squat. Additionally, there is scientific support for the contention that machine-based strength gains exert a negligible or a possible detrimental effect on the muscle activation pattern in athletic movements ([2](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref2>), [15](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref15>), [57](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref57>)). However, if instability is increased via performance of ground-based free weight training on unstable surfaces or devices, greater decrements in force production, the rate of force development, and power outputs have been noted ([23](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref23>), [49](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref49>)). Therefore, based on these data, it appears that free weight ground-based exercises offer the ideal combination of specificity and instability, especially when one is focusing on strength and power development. Ultimately, sufficient instability for the development of sport-specific adaptations can be stimulated via the use of traditional ground-based free weight strength training, and there appears to be no need to add increased instability to these types of exercises ([10](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref10>)).\n\nFree weight ground-based exercises offer the ideal combination of specificity and instability, especially when one is focusing on strength and power development.\n\n### Instability Devices\n\nInstability-based exercises are typically considered those that are performed on unstable surfaces or devices commonly found in strength and conditioning facilities. The increased popularity of training on instability devices seems to have stemmed from their use by physiotherapists in the rehabilitation process. These devices are used to promote postural disequilibrium or imbalance requiring a greater stabilizing function of the core musculature ([10](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref10>), [81](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref81>)). If perturbations are applied during use of these devices, a balance challenge can occur that requires activation of the core musculature in order to induce postural adjustments to remain upright ([19](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref19>)).\n\nNumerous instability devices are available to the strength and conditioning professional; the most common are the Swiss, physio, and pezzi gymnastics balls ([10](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref10>)). Other instability options include hemispherical physioballs with one inflated dome side and a flat rubber side, inflatable disks, wobble boards, balance boards, foam tubes, and various foam platforms. Natural surfaces such as sand can also create scenarios that introduce instability into an athlete’s movement pattern, creating an increased balance challenge that results in increased core muscle activation. Many strength and conditioning professionals believe that performing instability exercises trains the target agonist muscle group while simultaneously increasing core muscle activation ([10](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref10>)). While there is some evidence to suggest that core muscle activation may be increased, it appears that this increase occurs in conjunction with reduced force generation by the agonist muscle ([9](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref9>), [23](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref23>)). During training with instability exercises, the overall agonist force-generating capacity ([8](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref8>)) and overall power output ([23](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref23>)) may be less than 70% of what can be achieved when the exercise is performed under stable conditions. Additionally, there can be a significant reduction in the rate of force development that is achieved during the exercise ([60](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref60>)). Training with a reduced force production, power output, and rate of force development may not be the most advantageous method for preparing athletes, as these factors have a large impact on many aspects central to successful sport performance.\n\nOverall, there is limited research that suggests the performance of resistance exercises on unstable devices by athletes results in significant performance improvements ([21](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref21>), [73](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref73>)). The lack of performance benefit noted in the literature might be expected based on the principle of diminishing returns, as it is very likely that trained athletes require a much greater adaptive stimulus in terms of force production, movement velocity, and rate of force development to realize performance gains than can be provided by instability exercise devices ([10](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref10>), [47](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref47>)). Therefore, the performance of static balance activities on instability devices may be considered an introductory training step to improve balance and core stability before the implementation of dynamic or explosive ground-based free weight exercises, such as the Olympic lifts, that are performed on stable surfaces ([10](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref10>)).\n\nGround-based free weight exercises (e.g., squats, deadlifts, Olympic lifts) involve a degree of instability that allows for simultaneous development of all links of the kinetic chain, offering a much better training stimulus for the development of core stability and the enhancement of athletic performance than do instability device–based exercises ([10](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref10>)).\n\nWhen used in the rehabilitation setting, unstable devices have been shown to reduce low back pain and improve the efficiency of the soft tissues that stabilize the knee and ankle joints ([9](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref9>), [10](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref10>)). Since several muscles related to the knee joint originate in the lumbopelvic region, the core of the body could be considered an important contributor to the prevention of anterior cruciate ligament (ACL) injuries ([58](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref58>)). In fact, several studies provide evidence that using instability devices may reduce the likelihood of ACL injuries ([58](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref58>)), especially after rehabilitation from an ACL injury ([59](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref59>)). For example, Fitzgerald and colleagues ([28](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref28>)) reported that activities that challenge the rehabilitating athlete using perturbations stimulated by tilt boards, roller boards, and other balance devices make a successful return to competitive sport activities five times more likely. Additionally, Caraffa and colleagues ([18](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref18>)) suggest that the addition of balance training to traditional training methods results in a reduction of ACL injuries in amateur soccer players. However, in a systematic review, Grimm and coworkers ([31](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref31>)) contest this contention and suggest that these types of interventions do not reduce ACL injury risk. In contrast, ground-based free weight activities seem to have a more balanced effect leading to improvements in performance while increasing core strength and balance abilities. Ultimately, the use of instability-based exercises to train the core seems to be an effective method for returning the injured athlete to competitive-based training."

  - id: "ch16-variable-resistance-training-methods"
    title: "Variable-Resistance Training Methods"
    level: 2
    tags: [variable, resistance, training, methods]
    key_points:
      - "Resistance training practices include three methods for applying overload to the body: constant external, accommodating, and variable resistance ([30](<E6372RM_Refs_d104_split_016."
    recall_prompts:
      - "Variable-Resistance Training Methods 的核心概念是什麼？"
    content: "\n\nResistance training practices include three methods for applying overload to the body: constant external, accommodating, and variable resistance ([30](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref30>), [54](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref54>)). The most common method for applying resistance during training is to use a constant external load, which is best represented by traditional resistance training methods (e.g., free weights). In this scenario, the external load remains constant throughout the range of motion, better represents real-life activities, and allows for a more realistic skeletal muscle coordination and movement pattern ([36](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref36>), [54](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref54>), [63](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref63>)). On the other hand, accommodating resistance (sometimes referred to as _semi-isokinetic resistance applications_) generally allows for the speed of movement or isokinetic resistance to be controlled throughout a range of motion ([54](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref54>), [75](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref75>)). Stone and coworkers ([75](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref75>)) suggest that these types of devices have poor external validity. Additionally, these devices are unlikely to provide an adequate training stimulus when compared to more traditional methods such as those involving constant-loaded free weight movements, particularly when those movements are performed with multijoint movement patterns.\n\nWith traditional resistance training exercise, the external load remains constant, but the forces exerted by the muscle vary in accordance with the mechanical advantages associated with the joints involved in the movement ([3](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref3>), [13](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref13>), [30](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref30>)). In order to combat the changing mechanical advantages and inertial properties associated with constant-loaded resistance, there has been a concerted effort to develop innovative training devices that allow the applied resistance to be varied in conjunction with changes in joint angle ([30](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref30>)). These variable-resistance methods attempt to alter the resistance so the muscle maximizes force application throughout the full range of motion ([29](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref29>)). For example, in the back squat the greatest muscle force production occurs at the midpoint of the movement, while the smallest forces are produced at the bottom. Thus variable-resistance methods would be used to reduce resistance at the bottom of the squatting motion and increase resistance as the athlete ascends from the bottom position. Another consideration is that during the concentric effort of a movement, a large portion of time is spent decelerating ([30](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref30>)). Overall it has been suggested that variable-resistance methods may be able to match the changes in joint leverage ([85](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref85>)), overcome the mechanical disadvantages associated with specific joint angles ([24](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref24>), [69](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref69>), [70](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref70>), [79](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref79>)), and provide for compensatory acceleration ([69](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref69>), [70](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref70>)).\n\nWith the use of a variable-loaded resistance model, the methodology most commonly seen in modern strength and conditioning facilities is the application of chains or rubber bands ([30](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref30>), [54](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref54>)). The combination of chains or bands with traditional free weight resistance training methods has been shown to alter the loading profile typically seen during these constant-loaded activities ([30](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref30>), [41](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref41>)). Specifically, the chains or bands allow for the resistance to be varied across the range of motion achieved during the activity.\n\nWith use of a variable-loaded resistance model, the most common methodology used in modern strength and conditioning facilities is application of chains or rubber bands ([30](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref30>), [54](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref54>)).\n\n### Chain-Supplemented Exercises\n\nOne increasingly popular method of applying variable resistance is the addition of chains to traditional resistance training activities such as the bench press or back squat ([4](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref4>), [13](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref13>), [39](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref39>), [54](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref54>)). This method of force application is most popular among powerlifters ([69](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref69>), [70](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref70>)), but has become increasingly popular among strength and conditioning professionals working with a variety of sports ([22](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref22>)). Despite the increasing popularity and the belief that these methods provide a training advantage, these beliefs are largely unsubstantiated in the scientific literature ([13](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref13>), [14](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref14>), [39](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref39>), [54](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref54>)). Some studies, however, demonstrate that the application of chains to traditional resistance training methods such as the bench press can be advantageous ([6](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref6>)). Careful inspection of these studies reveals that the means by which the chains are applied to the free weight exercise may influence their effectiveness. Specifically, these studies used a method in which the chain was suspended from the bar without touching the floor until the athlete had reached the lowest position in the squat or until the bar had reached chest height in the bench press ([6](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref6>)). While some research seems to support this methodology, much more research is needed to explore the various methods of applying chains to traditional resistance training methods.\n\n#### Determining Resistance With Chains\n\nThe resistance provided by chains is largely dictated by the structure, density, length, and diameter of the chain and must be quantified before the chain is used in a resistance training setting. Additionally, the number of links in a chain will affect the amount of resistance provided by the chain ([13](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref13>), [55](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref55>)). To quantify the loading provided by chains, Berning and colleagues ([13](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref13>)) developed a practical chart that related chain link diameter and length to the resistance load provided by the chain. This chart was later modified by McMaster and colleagues ([54](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref54>)) to show the relationship between the chain mass, length, and diameter ([table 16.1](<E6372ch16_d93.xhtml#t16.1>)).\n\nTABLE 16.1 Mass, Length, and Diameter of Chains Chain diameters | Chain lengths  \n---|---  \n10 cm (4 in.) | 50 cm (20 in.) | 100 cm (40 in.) | 150 cm (59 in.) | 200 cm (79 in.)  \n6.4 mm (1/4 in.) | 0.3 kg (0.6 lb) | 1.3 kg (2.8 lb) | 2.5 kg (5.5 lb) | 3.8 kg (8.3 lb) | 5.0 kg (11.0 lb)  \n9.5 mm (3/8 in.) | 0.4 kg (0.8 lb) | 1.9 kg (4.1 lb) | 3.7 kg (8.1 lb) | 5.6 kg (12.2 lb) | 74 kg (16.3 lb)  \n12.7 mm (1/2 in.) | 0.7 kg (1.6 lb) | 3.7 kg (8.1 lb) | 74 kg (16.3 lb) | 11.1 kg (24.4 lb) | 14.8 kg (32.6 lb)  \n19.1 mm (3/4 in.) | 1.4 kg (3.1 lb) | 70 kg (15.4 lb) | 14.0 kg (30.8 lb) | 21.0 kg (46.2 lb) | 28.0 kg (61.6 lb)  \n22.2 mm (7/8 in.) | 2.2 kg (4.8 lb) | 10.8 kg (23.8 lb) | 21.6 kg (475 lb) | 32.4 kg (71.3 lb) | 43.2 kg (95.0 lb)  \n25.4 mm (1 in.) | 2.8 kg (6.2 lb) | 14.0 kg (30.8 lb) | 28.0 kg (61.6 lb) | 42.0 kg (92.4 lb) | 56.0 kg (123.0 lb)  \n  \nAdapted, by permission, from McMaster, Cronin, and McGuigan, 2009 ([54](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref54>)).\n\nAs a means of deciding on the barbell resistance to use in conjunction with chains, the absolute load is determined for the top and the bottom portion of the movement ([4](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref4>)). The average of these two loads is then calculated and used to modify the barbell load in order to allow the athlete to train in the prescribed range.\n\n##### Determining the Load to Use With Chains\n\nTo determine the load used with chains, the absolute chain resistance at the top and that at the bottom portion of the movement are summed and then averaged. For example, if athletes wanted to train at a 5-repetition maximum (5RM) load in the bench press, they would first determine the 5RM load without the chains. Then, if their 5RM is 120 kg (264 pounds), they would subtract the average chain resistance from this load. If at the bottom position the load is 0 kg and at the top the chain load is 11.1 kg (24.4 pounds), the average is 5.55 kg (12.2 pounds). Thus, the athlete would add 114 to 115 kg (251.8-253.0 pounds) to the barbell to achieve the appropriate loading.\n\nAs a general rule, Baker ([4](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref4>)) recommends that the use of chains be reserved for experienced intermediate- and elite-level athletes who have stable exercise technique, as the addition of chains provides a loading challenge that can affect the athlete’s technique.\n\n#### Applying Chains to Free Weight Exercises\n\nGenerally, the application of chains to traditional resistance training methods allows for a linear increase in the applied resistance ([54](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref54>)). Ways to apply chains include letting them touch the floor from the fully extended position during the movement ([13](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref13>)) or hanging them from lighter chains ([figure 16.1](<E6372ch16_d93.xhtml#f16.1>)), which allows them to touch the floor only upon reaching the lowest portion ([figure 16.2](<E6372ch16_d93.xhtml#f16.2>)) of the movement pattern (i.e., bottom of the squat or at chest level during the bench press) ([4](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref4>), [6](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref6>)). Baker ([4](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref4>)) suggests that the second method may affect the velocity of movement in three distinct ways. Firstly, the total barbell–chain complex comes into play only at the top of the movement (i.e., extend portion) when the chain links have been lifted off the floor. At the bottom of the movement, the links are in full contact with the floor, providing a reduction in load and allowing the athlete to accelerate the barbell at a faster rate. Secondly, it is possible that a within-repetition postactivation potentiation effect may occur in response to a greater neural activation. Specifically, when the chains pile on the floor and the mass of the barbell decreases, a greater neuromuscular activation may occur, allowing for an enhancement in movement velocity. Finally, it is possible that the decreasing resistance at the bottom portion of the movement may cause a more rapid stretch–shortening cycle. Baker ([4](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref4>)) suggests that this happens in response to the eccentric unloading that occurs when the chain links pile on the floor at the bottom of the movement and a quicker amortization phase occurs when the athlete shifts from eccentric to concentric muscle action.\n\n**Figure 16.1** Bench press with added chain resistance. The links of the chains are draped over the lighter supporting chains, such that the chain does not contact the floor until the barbell reaches chest height. As the athlete lowers the barbell to the chest, the resistance progressively decreases as the chains furl onto the floor. Conversely, as the athlete moves the barbell concentrically away from the chest, the resistance progressively increases as the chains unfurl from the floor.\n\n![An athlete lies on a bench and holds a barbell close to their chest.](images/E6372_0727P_0392_A_ebook.jpg)\n\n**Figure 16.2** When the barbell is at chest height during the bench press, the chains are furled on the floor, with the result that their weight does not act on the barbell.\n\n![An athlete lies on a bench and lifts a barbell above their head.](images/E6372_0727P_0391_A_ebook.jpg)\n\n### Resistance Band Exercises\n\nThe use of resistance bands to augment traditional barbell resistances has become increasingly popular among strength and conditioning professionals ([4](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref4>), [27](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref27>), [46](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref46>), [77](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref77>)). There is some research support for the use of resistance bands combined with traditional resistance training exercises ([1](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref1>), [74](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref74>), [79](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref79>)). For example, Wallace and coworkers ([79](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref79>)) suggest that using bands to substitute 35% of the total load during a back squat can acutely increase peak power by approximately 13%. Additionally, Baker and Newton ([5](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref5>)) suggest that the use of bands may result in a postactivation potentiation effect within each repetition. Support for this contention comes from the work of Stevenson and colleagues ([74](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref74>)), who demonstrated that the use of bands to account for 20% of the training load resulted in an acute increase in the concentric rate of force development when compared to a constant-loaded condition. While these data seem to suggest that the addition of bands to traditional resistance training methods may offer some benefit, especially to power or rate of force development, there is research contesting these findings ([24](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref24>), [41](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref41>)). For example, Ebben and Jensen ([24](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref24>)) report no differences in integrated electromyography and mean ground reaction forces when resistance bands are used to apply 10% of the total loading during squats.\n\nCurrently, minimal research on the use of resistance bands, especially longitudinal studies, has been conducted to determine whether the acute effects noted by some authors translate into superior strength and power gains over time. More research is also needed to determine the optimal methodologies for using bands in the development of athletes.\n\n#### Determining Resistance With Resistance Bands\n\nIn working with resistance bands, it is important to understand that their composition varies depending on the type of thermoplastic or elastomer used to produce them ([54](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref54>)). The composition of resistance bands is important because it can exert an impact on their overall stiffness, density, yield, and tensile strength ([54](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref54>), [55](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref55>), [77](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref77>)). Ultimately the tension (resistance) generated by a resistance band is determined by the overall stiffness of the band and the extent to which the band is stretched (deformation) ([55](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref55>)). Specifically, based on Hooke’s law, the tension generated by a band is equal to its stiffness _(k)_ multiplied by the deformation _(d):_\n\nTension = Stiffness _(k)_ × Deformation _(d)_\n\nAs the band is stretched (i.e., increased deformation), there is a linear increase in the amount of tension placed on the band. However, several studies suggest that resistance bands exhibit both curvilinear and linear deformation regions ([1](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref1>), [55](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref55>), [62](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref62>)).\n\nWhen using bands in conjunction with traditional free weight training exercises such as the bench press or back squat, the strength and conditioning professional must be aware that there can be a 3.2% to 5.2% difference between two supposedly equal bands that could result in an 8% to 19% difference in mean tension between the bands ([55](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref55>)). A basic length–tension relationship can be seen in [table 16.2](<E6372ch16_d93.xhtml#t16.2>), and tension can be predicted based on the length of the band with the use of a prediction equation.\n\nTABLE 16.2 Examples of Resistance Band Tension-Length Relationships **Width (mm)** | **Color** | **Length-tension relationships** | **Tension prediction equation**  \n---|---|---|---  \n110 cm (43.3 in.) | 120 cm (47.2 in.) | 130 cm (51.2 in.) | 140 cm (55.1 in.) | 150 cm (59.1 in.)  \n14 | Yellow | 2.6 kg | 5.7 kg | 8.1 kg | 9.8 kg | 11.5 kg | Y = -0.003x2 \\+ 0.98x - 69.82  \n22 | Red | 4.6 kg | 9.6 kg | 13.3 kg | 16.6 kg | 19.2 kg | Y = -0.004x2 \\+ 1.38x - 99.49  \n32 | Blue | 8.5 kg | 14.8 kg | 19.5 kg | 23.9 kg | 273 kg | Y = -0.004x2 \\+ 1.60x - 114.86  \n48 | Green | 6.8 kg | 16.5 kg | 24.0 kg | 30.0 kg | 49.3 kg | Y = -0.007x2 \\+ 2.43x - 179.56  \n67 | Black | l5.4 kg | 29.1 kg | 40.0 kg | 49.3 kg | 572 kg | Y = -0.010x2 \\+ 3.73x - 269.21  \n  \nAdapted, by permission, from: McMaster, Cronin, and McGuigan, 2010 ([55](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref55>)).\n\nSimilar to how resistance is applied with the use of chains, the use of bands requires the coach to determine how much load is provided by the free weight and how much is provided from the bands throughout the range of movement ([4](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref4>)). Specifically, the coach must determine the load of the band at the bottom and top portions of the movement and create an average of these two loads. Based on the recommendations of Baker ([4](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref4>)), an athlete who wants to train at a 5RM load of 150 kg (330 pounds) with bands would subtract the average of the two band positions (i.e., top and bottom) and reduce the load on the bar by that amount. So if the band exerts a zero resistance load at the bottom of the movement and a load of 26.6 kg (58.5 pounds) at the top position (i.e., lockout in the bench press), based on the length of the band achieved as it is stretched, the athlete would subtract 13.3 kg (29.2 pounds) from the total weight on the bar without the bands to get 136 to 137 kg (299.2-301.4 pounds).\n\n#### Applying Resistance Bands to Free Weight Exercises\n\nTo apply bands to free weight resistance exercises, one can use a multitude of methods. The band may be attached to the barbell and either a customized attachment point on a squat rack or heavily weighted dumbbells ([4](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref4>)). When the bands are applied, the highest tension and the total resistance load are provided to the athlete at the top position. Conversely, at the bottom position the applied load is reduced, as the bands will no longer be stretched and thus no longer apply resistance to the barbell. For example, in the squat at the lowest point (i.e., bottom position, [figure 16.3](<E6372ch16_d93.xhtml#f16.3>)), the bands are slack and do not actively create tension on the barbell, thus adding no additional resistance to the exercise. As the athlete ascends from the bottom position and approaches the lockout position, the bands will impart a larger stretch resistance and the athlete will experience the full load of both the bar and the bands ([figure 16.4](<E6372ch16_d93.xhtml#f16.4>)). It is important to note that as the athlete ascends from the bottom position the stretch load gradually increases. Conversely, as the athlete descends, the stretch load gradually decreases.\n\n**Figure 16.3** Bottom position of a squat performed with bands.\n\n![An athlete squats and holds a barbell on the back of their neck and posterior deltoid.](images/E6372_0727P_0428_A_ebook.jpg)\n\n**Figure 16.4** Top position of a squat performed with bands.\n\n![An athlete stands upright and holds a barbell on the back of their neck and posterior deltoid.](images/E6372_0727P_0429_A_ebook.jpg)"

  - id: "ch16-nontraditional-implement-training-method"
    title: "Nontraditional Implement Training Methods"
    level: 2
    tags: [nontraditional, implement, training, methods]
    key_points:
      - "Traditionally, resistance training interventions used in most modern strength and conditioning facilities have relied heavily on barbells, dumbbells, and various resistance training machines."
    recall_prompts:
      - "Nontraditional Implement Training Methods 的核心概念是什麼？"
    content: "\n\nTraditionally, resistance training interventions used in most modern strength and conditioning facilities have relied heavily on barbells, dumbbells, and various resistance training machines. More recently, strength and conditioning professionals have begun to incorporate nontraditional implements in order to add greater variation to the preparation of athletes. Nontraditional implements can include items that are typically associated with strongman training such as tires, logs, kettlebells, stones, weighted sleds, and other weighted implements ([39](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref39>)). While nontraditional implement training is increasing in popularity, there is currently relatively little research directly exploring the efficacy of these types of training methods.\n\nWhile nontraditional implement training is increasing in popularity, there is currently relatively little research directly exploring the efficacy of these types of training methods.\n\n### Strongman Training\n\nStrongman implement training has recently seen an increase in popularity as a proposed tool for enhancing sport performance ([11](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref11>), [53](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref53>), [66](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref66>), [80](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref80>), [84](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref84>), [86](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref86>)). Some of the most common strongman exercises are tire flipping, log (or keg) lifting, and farmer’s walks. While research on these types of exercises is limited, some evidence suggests that they can be used to introduce a high-intensity stimulus resulting in an elevated blood lactate response ([12](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref12>), [44](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref44>), [86](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref86>)). Additionally, it has been suggested that these types of exercises create a greater degree of instability that effectively challenges the athlete in different ways compared to traditional resistance training activities ([53](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref53>)).\n\n#### Tire Flipping\n\nTire flipping typically employs truck or heavy-equipment tires that can be modified via placement of an extra load in the center to address individual strength needs ([39](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref39>), [80](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref80>)). The selection of the appropriate tire size is dependent on numerous factors that the strength and conditioning professional must consider when designing a specific program for an athlete. Thought must be given to the tire’s dimensions, including the height, width, and weight ([16](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref16>)). As a general rule, the tire should not be taller than the athlete’s upright standing height: The taller the tire, the harder it is for the athlete to flip because of the mechanical disadvantage and the greater overall lifting distance required. Additionally, the width of the tire can affect the athlete’s ability to perform the flip. For example, narrow tires are generally considered harder to flip for taller athletes because of the limb length and depth requirements. Conversely, wider tires are more difficult for shorter athletes because of their shorter arm lengths ([16](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref16>)). Another consideration is the tread on the tire; worn treads are more difficult to grip, and pronounced treads potentially contain cuts, debris, or exposed metal that could put the athlete at risk for injury ([16](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref16>), [80](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref80>)). Once the correct tire is selected based on the individual athlete’s strength levels, appropriate exercise technique should be used to minimize risk of injury.\n\nThree basic techniques can be used to flip tires; these include the sumo, the backlift style, and shoulders-against-the-tire technique ([16](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref16>), [80](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref80>)). The sumo-style flipping technique uses a traditional wider sumo deadlift stance coupled with the arms positioned in a narrower grip. This type of technique is typically used by powerlifters when deadlifting. With this technique, once the tire has been raised to hip or chest height, the hands are rotated so that a forward pressing action can be performed with the arms to flip the tire ([16](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref16>), [80](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref80>)). The backlift style is performed with a narrower, more conventional deadlift stance, ending with a forward pressing motion. This technique is initiated with feet placed in a hip-width stance, plus bending at the knees and hips, allowing the athlete to grab the base of the tire and pull in a fashion similar to that with a deadlift ([80](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref80>)). As the tire is raised, the hands are repositioned so that a forward press can be used to flip the tire ([16](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref16>)).\n\nCurrently no research has directly explored the overall safety of either tire-flipping techniques. However, some authors suggest that the sumo style is the safest, while more recently shoulders-against-the-tire has become the preferred technique in the practical literature ([16](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref16>)). The tire lies on its side, and the athlete addresses the tire by kneeling behind it. The feet are placed in a hip-width position with the ankles dorsiflexed. In this position the athlete places the chin and shoulders onto the tire. This placement of the tire on the shoulders is similar to that seen in a traditional barbell front squat (see [chapter 15](<E6372ch15_d92.xhtml>)). The tire is gripped with a supinated grip with a width that is largely dependent upon the size of the tire (i.e., wider tire = narrower grip). In this position, the athlete continues to dorsiflex the ankles so that he or she is on the balls of the feet while raising the knees from the ground. At this point the athlete’s center of gravity should transition toward the tire, placing the majority of the athlete’s body weight onto the tire. The athlete then raises the chest and contracts the musculature of the lower back ([16](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref16>)) (see the photo of the starting position in the exercise technique section near the end of the chapter).\n\nNext, the athlete initiates the flipping movement by extending the knees and hips followed by plantar flexing the ankles in order to push the tire forward and up. As this occurs, the shoulders and hips should rise at the same rate, ending in a triple extension, from which the athlete moves forward by taking two or three small steps. Once the tire reaches hip height, the athlete forcefully flexes the hip of one leg and strikes the tire with the quadriceps. The striking of the tire with the leg allows achievement of a forceful upward momentum ([16](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref16>)). As this occurs, the athlete switches the hands into a pronated position. After reorienting the hands, the athlete runs the feet toward the tire while forcefully extending the arms to push the tire over. Photos of all of these positions can be found in the exercise technique section near the end of the chapter.\n\n##### Tire Flipping\n\nTechnique\n\nPoints to remember:\n\n  * Select a surface that is acceptable for tire flipping.\n  * While kneeling behind the tire, place the chin and anterior deltoid on the tire.\n  * Use a supinated grip with the arms extended but not locked out to grip the tire.\n  * Dorsiflex the ankles and raise the knees off the ground in order to get onto the balls of the feet.\n  * Raise the chest and contract the lower back musculature.\n\nThe movement technique:\n\n  * Extend the knees and hips and plantar flex the ankles while pushing the tire forward and up.\n  * Move forward explosively toward the tire by taking two or three steps.\n  * Flex one hip and forcefully strike the tire with the quadriceps of that leg.\n  * Immediately after striking the tire, reorient the hands into a pronated grip.\n  * Move the feet forward while extending the arms in order to flip the tire.\n\nCommon Technical Flaws and Their Corrections\n\n  * _Flaw: Placing the feet too close to the tire when initiating the movement._ When this occurs, athletes often have to round their back and position their knees close to their chest in order to initiate the movement. _Correction:_ Have athletes move their feet away from the tire and instruct them to raise their chest while contracting the musculature of the lower back.\n  * _Flaw: Hips rise faster than the shoulders during the initial pushing motion._ This flaw is very similar to what can be seen during traditional deadlifting with incorrect technique. _Correction:_ Instruct athletes to keep their hips low and drive the tire forward rather than lifting it. Additionally, encourage athletes to keep the hips slightly below the shoulders during this movement.\n  * _Flaw: A lifting motion is used instead of a pushing motion._ With heavier tires, this motion reduces the lifting speed; the tire will lose momentum as it is elevated to hip height, forcing the athlete to “muscle” the tire over. This is an extremely dangerous position, as the tire can easily fall onto the athlete, and should be corrected immediately. _Correction:_ The athlete should be encouraged to drive the tire forward and move forward with the tire as it is elevated. One cue is to strike the tire with the quadriceps at hip height and continue a forward movement pattern.\n\nSpotting the Tire Flip\n\nIn general, spotting the tire flip requires two spotters who are positioned on either side of the athlete. Spotters should do the following:\n\n  * Assist the athlete by pushing on the tire when needed.\n  * Pay close attention to ensure they can assist if the athlete loses grip on the tire.\n  * Be aware of the area around the athlete; in particular, the landing area needs to be monitored to ensure that the flipping path is clear of people and apparatus.\n\nAdapted, by permission, from J.B. Bullock and D.M.M. Aipa, 2010, “Coaching considerations for the tire flip,” _Strength & Conditioning Journal_ 32: 75-78.\n\n#### Log Lifting\n\nOne of the classic exercises that is a part of strongman training is the log lift, which is essentially a version of the clean. Other traditional lifting movements can also be performed with logs, such as cleans, presses, jerks, rows, squats, deadlifts, and lunges ([39](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref39>), [64](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref64>), [83](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref83>)). Logs are typically designed to have weight added to them while offering a midrange grip support to accommodate a pronated grip position ([64](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref64>)). Weight is typically added with the use of traditional plates, which eliminates the need for having a variety of logs ([39](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref39>)). Information on how to effectively load log-based exercises is limited, but training loads may be based on traditional exercises. For example, Winwood and colleagues ([83](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref83>)) used 70% of a 1RM for a traditional clean and jerk with log training. While the connection seems logical, it is likely that athletes will not be able to lift the same load as they could in the comparable traditional exercise because of the mechanical difficulties associated with lifting the log apparatus ([39](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref39>)).\n\nIn another type of log, water can be used to provide the resistance ([39](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref39>), [64](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref64>)). Ratamess ([64](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref64>)) suggests that with this type of log, the fluid inside will move, resulting in an increased activation of the stabilizer muscles. While this may seem logical, no scientific papers appear to have explored this contention.\n\nWhile log-based training seems to be increasing in popularity, little research has explored the effectiveness of this training method or how best to apply this type of training in the preparation of athletes in various sports. Therefore, significantly more scientific inquiry is required to provide true understanding of the efficacy of log-based training.\n\n#### Farmer’s Walk\n\nAnother commonly used strongman exercise is the farmer’s walk, in which the athlete holds a load at the sides in each hand while walking forward ([53](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref53>), [80](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref80>)). Winwood and colleagues ([83](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref83>)) suggest that exercises such as the farmer’s walk are useful training tools because they involve unstable and awkward resistances that have both unilateral and bilateral motions. Additionally, it has been suggested that the farmer’s walk develops total body anaerobic endurance, back endurance, and grip strength ([80](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref80>)). McGill and colleagues ([53](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref53>)) suggest that the farmer’s walk may enhance traditional resistance training programs because this exercise challenges body linkages and stabilizing systems in a different way than traditional resistance training. The farmer’s walk can be performed with static loads (e.g., a heavy dumbbell) or variable loads (e.g., water-filled objects) ([80](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref80>)). Regardless of the type load used, it appears that the farmer’s walk offers a unique activation pattern of the core, although there is very limited research in the scientific literature supporting the use of this exercise as a strength and conditioning tool. Additionally, no available research has examined the safety of the farmer’s walk, which makes it difficult to recommend safety precautions. Thus athletes should follow generally accepted safety principles and precautions: Only advanced athletes who possess high levels of strength should attempt this exercise. While this training modality may be popular in strength and conditioning environments, more research is required in order to determine its efficacy.\n\n### Kettlebell Training\n\nRecently, strength and conditioning professionals have become interested in the use of kettlebell exercises ([7](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref7>), [17](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref17>), [48](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref48>)). While seemingly a new phenomenon, the use of kettlebells dates back hundreds of years to when they were a popular training method in various Eastern Bloc countries ([38](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref38>)). The word _kettlebell_ comes from the Russian word _girya,_ which refers to a cast iron cannonball with a handle on it ([20](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref20>)). In Western literature the term _kettlebell_ is used to refer to a weighted implement consisting of a ball with a handle, which is probably better termed a _kettleball_ ([20](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref20>)).\n\nAlong with the increasing interest in the use of kettlebell training has been an increase in the amount of scientific inquiry into the efficacy of using these implements with athletes and general populations. The majority of the scientific evidence supporting the use of kettlebells highlights their potential usefulness as a tool for general physical or fitness development ([26](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref26>), [40](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref40>), [76](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref76>)). In these studies the most common exercise employed is the kettlebell swing, which can be performed with either one or two hands ([40](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref40>), [52](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref52>), [76](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref76>)). While kettlebell swings appear to have a positive impact on cardiovascular fitness, it is important to note that this activity does not offer the same level of cardiovascular benefit as treadmill running or more traditional aerobic exercise ([40](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref40>)).\n\nCurrently, limited research explores the efficacy of kettlebell training as a strength development tool. When used with clinical and recreationally trained populations, kettlebell training has been reported to increase muscular strength levels compared to no training ([43](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref43>), [61](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref61>)). Additionally, when a battery of kettlebell exercises (i.e., swings, goblet squats, accelerated swings) is performed across a six-week training intervention, there appears to be an increase in muscular strength and vertical jump performance in recreationally trained men ([61](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref61>)). However, these strength gains are significantly lower than those typically seen with traditional weightlifting-based training methods. Specifically, Otto and colleagues ([61](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref61>)) reported that six weeks of weightlifting training resulted in a 4% increase in vertical jump performance, while kettlebell swings increased jumping performance by only 0.8%. Additionally, back squat strength was increased by 13.6% after six weeks of traditional weightlifting training, while the kettlebell training resulted in only a 4.5% increase ([61](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref61>)).\n\nBased on the contemporary body of scientific knowledge, it appears that kettlebells are probably best used as general preparation exercise and that more traditional training methods such as weightlifting are more effective for developing maximal strength and jumping performance capacity. However, further scientific research is needed to develop a better understanding of the role that kettlebells may be able to play in the development of athletes.\n\n#### Types of Kettlebells\n\nWhen working with kettlebells, one must consider the type of kettlebell, as there are two major types: the cast iron ([figure 16.5](<E6372ch16_d93.xhtml#f16.5>)) and the sport kettlebell ([figure 16.6](<E6372ch16_d93.xhtml#f16.6>)) ([20](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref20>)). The cast iron, or fitness, kettlebells are cast from iron and range in size depending on their weight. The sport or competition kettlebells are made from steel and have universal design and measurements. Specifically, the size of the kettlebell does not change regardless of the weight, and the various weights are indicated by different colors ([20](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref20>)). Besides the structural differences in the size and dimensions of the cast iron and sport kettlebell, the other difference is that the cast iron kettlebell is less expensive and probably more prevalent in strength and conditioning facilities.\n\n**Figure 16.5** Cast iron class kettlebells.\n\n![A row of cast iron class kettlebells of different sizes.](images/E6372_0655P_1748_ebook.jpg)\n\n**Figure 16.6** Competition kettlebells.\n\n![A row of competition kettlebells of the same size but different colors.](images/E6372_0655P_1750_ebook.jpg)\n\n##### Competition Kettlebell Dimensions\n\nFollowing are the dimensions of competition kettlebells ([20](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref20>)):\n\n  * Height: 228 mm (8.5 inches)\n  * Diameter: 210 mm (8.25 inches)\n  * Handle diameter: 35 mm (1.4 inches)\n\n#### Considerations for Selecting Kettlebells\n\nThe first major consideration in the selection of a kettlebell is the type of load provided. The two basic types of kettlebells are the fixed and the adjustable ([20](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref20>)). With fixed-loaded kettlebells, such as cast iron or competition kettlebells, the load stays constant; thus a set of kettlebells, which range across several loads, is required in order to provide training variety. Adjustable kettlebells are either plate loaded or shot loaded. In actuality, a plate-loaded kettlebell is simply a handle that is attached to weight plates and is not really a kettlebell even though it is classified as one ([20](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref20>)). In contrast, a shot-loaded kettlebell is a hollow version of the more traditional kettlebell. Historically, these kettlebells were filled with sand, water, lead, and even mercury ([20](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref20>)). If this type of kettlebell is only partially filled, the shot moves around in the ball, causing an increased training stressor. While popular in the early 20th century, especially with circus strongmen such as the famous Arthur Saxon and Eugen Sandow, this type of kettlebell is not popular in contemporary strength and conditioning.\n\nThe second consideration relates to the handle, as it is the major interface between the athlete and the kettlebell. With cast iron kettlebells, the handle diameter changes slightly as the weight increases. For example a 20 kg (45 pounds) or heavier kettlebell has a handle between 33 (1.3 inches) and 35 (1.4 inches) mm; a smaller kettlebell may have a smaller handle diameter. Additionally, to facilitate the types of exercises that use kettlebells, the spacing between the handle and the top of the ball is standardized in good kettlebells. Typically, the space between the bottom of the handle and the top of the ball is 55 mm (2.2 inches), and the length of the handle is 186 mm (7.3 inches) ([20](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref20>)). With regard to handle surface, some kettlebells come with smooth painted handles; others have polished steel handles, which have no paint and are basically bare medal. The polished steel handle tends to allow for a better grip because it holds chalk better and does not get as slippery as painted or polished handles do when athletes sweat on them ([20](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref20>))."

  - id: "ch16-unilateral-training"
    title: "Unilateral Training"
    level: 2
    tags: [unilateral, training]
    key_points:
      - "When employing training methods, one can use unilateral or bilateral training interventions."
    recall_prompts:
      - "Unilateral Training 的核心概念是什麼？"
    content: "\n\nWhen employing training methods, one can use unilateral or bilateral training interventions. These types of training methods can be performed with the upper body or lower body, depending on the targeted outcomes. Common lower body unilateral training exercises include lunges, step-ups, and the single-leg squat, which is sometimes referred to as the Bulgarian split squat. This exercise isolates one leg and is typically used in the preparation of athletes from numerous sports. Typically these types of exercises are integrated into training programs with varying degrees of emphasis ([50](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref50>)) in an attempt to reduce bilateral asymmetries ([45](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref45>)) or as a rehabilitation tool ([25](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref25>)). They are often used to reduce a bilateral deficit, where there are asymmetries in force production between unilateral and bilateral movements ([42](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref42>)). It has also been demonstrated that bilateral movements exhibit a bilateral facilitation in which there is an increase in voluntary activation of the agonist muscle group ([8](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref8>), [67](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref67>)). Trained or stronger individuals tend to exhibit a bilateral facilitation, while untrained, injured, or weaker athletes exhibit a bilateral deficit ([10](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref10>)). Therefore, based on the bilateral facilitation response, trained individuals should not use unilateral methods for the development of strength. In contrast, unilateral training methods may be useful for strength development with untrained, weaker, and injured individuals ([10](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref10>)).\n\nTrained or stronger individuals exhibit a bilateral facilitation during bilateral exercises, while untrained, injured, or weaker individuals exhibit a bilateral deficit ([10](<E6372RM_Refs_d104_split_016.xhtml#chapter16-ref10>))."

  - id: "ch16-front-plank"
    title: "Conclusion / Front Plank"
    level: 3
    tags: [conclusion, front, plank]
    key_points:
      - "Starting Position"
    recall_prompts:
      - "Front Plank 是什麼？有哪些類型或應用？"
    content: "\n\nStarting Position\n\n  * Kneel in a prone, quadruped position on the floor. The feet should be hip-width apart or slightly closer with the palms of the hands flat on the floor shoulder-width apart and the elbows pointing backward.\n  * Drop the elbows to the floor and position them directly under the shoulders.\n  * Move the feet back one at a time to allow the hips and knees to extend so the abdomen and the front of the hips and legs rest on the floor.\n\nEnding Position\n\n  * Elevate the hips so the ankles, knees, hips, shoulders, and head are in a straight line.\n  * Isometrically hold the torso in a rigid position with the elbows under the shoulders and the head in a neutral position.\n\nMajor Muscles Involved\n\nrectus abdominis, internal obliques, external obliques, erector spinae\n\nStarting position\n\n![An athlete lies prone on their knees, thighs, toes, elbows, and forearms.](images/E6372_0756P_0019_ebook.jpg)\n\nEnding position\n\n![An athlete lies prone and raises their body, supporting it on toes, elbows, and forearms.](images/E6372_0756P_0021_ebook.jpg)\n\n16.2"

  - id: "ch16-side-plank"
    title: "Conclusion / Side Plank"
    level: 3
    tags: [conclusion, side, plank]
    key_points:
      - "Starting Position"
    recall_prompts:
      - "Side Plank 是什麼？有哪些類型或應用？"
    content: "\n\nStarting Position\n\n  * Lie on the floor on the left side.\n  * Position the left elbow underneath the left shoulder with the left forearm perpendicular to the body.\n  * Stack the right foot on top of the left foot with the right leg evenly on top of the left leg or place the right foot on the floor immediately in front of the left foot. Also, stack the right arm evenly on top of the right side of the torso.\n  * Position the head in a neutral position with the eyes focused forward.\n\nEnding Position\n\n  * Elevate the hips off the floor so the left ankle, knee, hip, and shoulder are in a straight line.\n  * Isometrically hold the torso in a rigid position with the left elbow under the left shoulder and the head in a neutral position.\n  * Switch and repeat the procedure for the right side.\n\nMajor Muscles Involved\n\ninternal obliques, external obliques\n\nStarting position\n\n![An athlete lies on their side and supports their body on elbows, forearms, and legs. Their legs are crossed at the ankles. ](images/E6372_0756P_0030_ebook.jpg)\n\nEnding position\n\n![An athlete lies on their side and raises their body, supporting it on feet, elbows, and forearms.](images/E6372_0756P_0034_ebook.jpg)\n\nCore Stability and Balance Training Exercises\n\n16.3"

  - id: "ch16-stability-ball-rollout"
    title: "Conclusion / Stability Ball Rollout"
    level: 3
    tags: [conclusion, stability, ball, rollout]
    key_points:
      - "Starting Position"
    recall_prompts:
      - "Stability Ball Rollout 是什麼？有哪些類型或應用？"
    content: "\n\nStarting Position\n\n  * Kneel facing the stability ball with the upper body in an upright position, arms extended, and the hands touching the ball.\n  * While keeping the hands on the ball, create a 90-degree angle at the knees and ankles with the knees, hips, and shoulders in a near-vertical plane.\n\nEnding Position\n\n  * Keep the knees and toes on the floor, elbows fully extended, arms parallel to each other, and knees, hips, and shoulders in a straight line. Extend the knees and flex the shoulders to roll the ball forward and the arms across the top of the ball until it comes very close to the face.\n  * Isometrically hold the torso in a rigid position; do not let the hips sag toward the floor.\n\nMajor Muscles Involved\n\nrectus abdominis, iliopsoas\n\nStarting position\n\n![An athlete kneels in front of a stability ball and keeps their hands on the ball.](images/E6372_0756P_0049_ebook.jpg)\n\nEnding position\n\n![An athlete rests on their knees and stretches their body forward while resting their head on the stability ball.](images/E6372_0756P_0050_ebook.jpg)\n\n16.4"

  - id: "ch16-stability-ball-pike"
    title: "Conclusion / Stability Ball Pike"
    level: 3
    tags: [conclusion, stability, ball, pike]
    key_points:
      - "Starting Position"
    recall_prompts:
      - "Stability Ball Pike 是什麼？有哪些類型或應用？"
    content: "\n\nStarting Position\n\n  * Kneel down in front of a stability ball.\n  * Position the body facing away from the ball.\n  * In a quadruped position with the hands underneath the shoulders and the knees underneath the hips, place both feet on the stability ball.\n  * Isometrically hold the torso in a rigid position with the elbows fully extended and the head in a neutral position.\n  * All repetitions begin from this position.\n\nUpward Movement Phase\n\n  * Keeping the knees and elbows fully extended and the torso in a rigid position, begin the exercise by flexing the hips to roll the ball toward the chest.\n  * Continue lifting the hips until the toes are on top of the ball and the hips are directly over the shoulders.\n  * Keep the head in a neutral position.\n\nDownward Movement Phase\n\n  * Return to the starting position by allowing the hips to extend under control.\n  * Keep the knees and elbows fully extended and the torso held rigid.\n\nMajor Muscles Involved\n\nrectus abdominis, iliopsoas\n\nStarting position\n\n![An athlete rests their legs on a stability ball and places their hands on the ground. Their body is horizontal.](images/E6372_0756P_0066_ebook.jpg)\n\nUpward and downward movements\n\n![An athlete rests their toes on a stability ball and places their hands on the ground. Their upper body is vertical, and their lower body is inclined.](images/E6372_0756P_0069_ebook.jpg)\n\n16.5"

  - id: "ch16-stability-ball-jackknife"
    title: "Conclusion / Stability Ball Jackknife"
    level: 3
    tags: [conclusion, stability, ball, jackknife]
    key_points:
      - "Starting Position"
    recall_prompts:
      - "Stability Ball Jackknife 是什麼？有哪些類型或應用？"
    content: "\n\nStarting Position\n\n  * Kneel down in front of a stability ball.\n  * Position the body facing away from the ball.\n  * In a quadruped position with the hands underneath the shoulders and the knees underneath the hips, place both feet on the stability ball.\n  * Isometrically hold the torso in a rigid position with the elbows fully extended and the head in a neutral position.\n  * All repetitions begin from this position.\n\nForward Movement Phase\n\n  * Keeping the knees and elbows fully extended and the torso in a rigid position, begin the exercise by raising the hips slightly and flexing the hips and knees to roll the ball toward the chest.\n  * Continue rolling the ball forward until the hips and knees are fully flexed.\n  * Keep the shoulders over the hands and the head in a neutral position.\n\nBackward Movement Phase\n\n  * Return to the starting position by allowing the hips and knees to extend under control.\n  * Keep the elbows fully extended and the torso held rigid.\n\nMajor Muscles Involved\n\nrectus abdominis, iliopsoas\n\nStarting position\n\n![An athlete rests their shins on a stability ball and places their hands on the ground. Their body is horizontal.](images/E6372_0756P_0081_ebook.jpg)\n\nForward and backward movements\n\n![An athlete rests their ankles on a stability ball, bends their knees, and places their hands on the ground.](images/E6372_0756P_0083_ebook.jpg)\n\nStrongman Exercises\n\n16.6"

  - id: "ch16-tire-flip"
    title: "Conclusion / Tire Flip"
    level: 3
    tags: [conclusion, tire, flip]
    key_points:
      - "Starting Position"
    recall_prompts:
      - "Tire Flip 是什麼？有哪些類型或應用？"
    content: "\n\nStarting Position\n\n  * Begin facing the tire with the feet hip- to shoulder-width apart.\n  * Squat down and lean into the tire so that the chin and the anterior deltoids are resting on the tire and the feet are positioned back far enough to maintain a neutral spine position.\n  * Keeping the arms outside the knees and the elbows fully extended, grasp the tire with a supinated grip.\n  * All repetitions begin from this position.\n\nUpward Movement Phase\n\n  * Begin by extending the knees and hips and plantar flexing the ankles while pushing the tire forward.\n  * Move forward explosively toward the tire by taking two or three steps.\n  * Continue this movement until the body is aligned in a 45° angle to the tire.\n  * Flex the hip and knee of one leg fully to drive the knee upward and toward the tire.\n  * Immediately after striking the tire, reorient the hands into a pronated grip.\n  * While moving the feet forward, forcefully extend the arms in order to push the tire over in front of the body.\n\nMajor Muscles Involved\n\ngluteus maximus, semimembranosus, semitendinosus, biceps femoris, vastus lateralis, vastus intermedius, vastus medialis, rectus femoris, soleus, gastrocnemius, deltoids, trapezius\n\nStarting position\n\n![An athlete squats on their toes in front of a large tire, leans into the fire, and grasps the base of the tire.](images/E6372_0757P_0044_ebook.jpg)\n\nTriple extension\n\n![An athlete lifts one side of a tire by making their body inclined.](images/E6372_0757P_0048_ebook.jpg)\n\nStrike position\n\n![An athlete lifts their right knee and strikes a tire upright.](images/E6372_0757P_0055_ebook.jpg)\n\nPush position\n\n![An athlete pushes a tire with their fingers. ](images/E6372_0757P_0060_ebook.jpg)\n\nWalk forward\n\n![As a tire falls, an athlete walks forward.](images/E6372_0757P_0092_ebook.jpg)\n\n16.7"

