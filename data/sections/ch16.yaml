    recall_prompts:
      - "Log Clean and Press 是什麼？有哪些類型或應用？"
    content: "\n\nThis exercise comes from strongman training and consists of quickly and forcefully picking the log up from the ground to the front of the shoulders and then pressing it overhead. The log clean consists of three phases but occurs in two motions, with a pause of the log at the shoulders. The log can either be cleaned and pressed each rep or cleaned once and pressed for multiple repetitions.\n\nStarting Position\n\n  * Stand with the feet placed between hip- and shoulder-width apart with the toes pointed forward or slightly outward.\n  * Squat down with the hips lower than the shoulders and grasp the log with a closed, neutral grip.\n  * Place the hands on the log handles with the arms slightly outside of the knees, with the elbows fully extended.\n  * Place the feet flat on the floor and position the log in front of the shins and over the balls of the feet.\n  * Position the body with the \n    * back in a neutral spine position,\n    * scapulae depressed and retracted,\n    * head in line with the vertebral column, and\n    * shoulders over or slightly in front of the log.\n  * All repetitions begin from this position.\n\nUpward Movement Phase: First Pull\n\n  * Lift the log off the ground by extending the hips and knees.\n  * Keep the torso-to-floor angle constant; do not let the hips rise before the shoulders.\n  * Keep the elbows extended and the shoulders over or slightly ahead of the log.\n\nUpward Movement Phase: Transition\n\n  * As the log passes the knees, pull the log into the body by flexing the knees and flexing at the elbows.\n  * Briefly pause in this position with the legs in a quarter-squat position and the log at or on the thighs.\n\nUpward Movement Phase: Second Pull\n\n  * Forcefully jump upward by extending the hips and knees and plantar flexing the ankles.\n  * Keep the log close to the body and the elbows tucked into the body.\n  * When the lower body joints reach full extension, rapidly drive the elbows forward to keep rolling the log up the body.\n  * Because of the explosiveness of this movement, the torso is erect or slightly hyperextended, the head is tilted slightly back, and the feet may lose contact with the floor.\n\nUpward Movement Phase: Catch\n\n  * After the lower body has fully extended, pull the body under the log and rotate the arms around under the log.\n  * Simultaneously flex the hips and knees to a quarter- or half-squat position.\n  * Rack the log across the front of the clavicles and anterior deltoids.\n\nPreparation Phase: Dip\n\n  * Flex the hips and knees at a slow to moderate speed to move the log in a straight path downward.\n  * Continue the dip to a depth not to exceed a quarter squat.\n  * Keep the feet flat on the floor, torso erect, and the upper arms directly under the log.\n\nUpward Movement Phase: Drive\n\n  * Immediately upon reaching the lowest position of the dip, reverse the movement by forcefully and quickly extending the hips and knees and then the elbows to move the log overhead.\n\nDownward Movement Phase\n\n  * Lower the log by gradually reducing the muscular tension of the arms to allow a controlled descent of the log to the shoulders.\n  * Simultaneously flex the hips and knees to cushion the impact of the log on the shoulders, and then return the log to the floor.\n\nMajor Muscles Involved\n\ngluteus maximus, semimembranosus, semitendinosus, biceps femoris, vastus lateralis, vastus intermedius, vastus medialis, rectus femoris, deltoids, trapezius\n\nStarting position\n\n![An athlete squats and grips the handles of a log.](images/E6372_0757P_0095_ebook.jpg)\n\nEnd of first pull/beginning of transition\n\n![An athlete begins pulling a log up from the ground.](images/E6372_0757P_0103_ebook.jpg)\n\nEnd of transition/beginning of second pull\n\n![An athlete squats and places a log on their thighs.](images/E6372_0757P_0117_ebook.jpg)\n\nEnd of second pull/beginning of catch\n\n![An athlete bends their knees and lifts a log to their chest.](images/E6372_0757P_0124_ebook.jpg)\n\nCatch/beginning of dip\n\n![An athlete straightens their legs and holds a log on their shoulders.](images/E6372_0757P_0133_ebook.jpg)\n\nEnd of dip/beginning of drive\n\n![An athlete bends their knees and holds a log over their shoulders.](images/E6372_0757P_0183_ebook.jpg)\n\nEnd of drive (final overhead position)\n\n![An athlete straightens their legs and holds a log over their head.](images/E6372_0757P_0138_ebook.jpg)\n\nOther Alternative Exercises\n\n16.8"

  - id: "ch16-back-squat-with-bands"
    title: "Conclusion / Back Squat With Bands"
    level: 3
    tags: [conclusion, back, squat, bands]
    key_points:
      - "Band Placement"
    recall_prompts:
      - "Back Squat With Bands 是什麼？有哪些類型或應用？"
    content: "\n\nBand Placement\n\n  * Loop the ends of long elastic bands around the band pegs of each side of a power rack. If the rack does not have band pegs, loop the bands around the handles of heavy dumbbells that will not move during the exercise.\n  * Take the other ends of the bands and place them over the ends of the bar so they rest against the outside of the weight plates on either side.\n  * The bands should be loose enough that there is no tension at the bottom of the squat. Tension should be applied to the bar when the exercise is performed, but at the bottom of the range of motion, the bands should be slack to apply no load to the bar. (_Note:_ Despite its appearance, the bands in the second photo are not creating any tension on the bar.)\n\nStarting Position\n\n  * Grasp the bar with a closed, pronated grip.\n  * Step under the bar and position the feet parallel to each other.\n  * Place the bar in a balanced position on the upper back and shoulders; follow the guidelines for the back squat in [chapter 15](<E6372ch15_d92.xhtml>) regarding the high or low placement of the bar.\n  * Extend the hips and knees to lift the bar off the supporting pins or ledge, and take one or two steps backward.\n  * Position the feet shoulder-width apart or wider, even with each other, and the toes pointed slightly outward.\n  * Stand with an erect torso by positioning the shoulders back, tilting the head slightly back, and protruding the chest up and out to create a neutral or slightly arched back.\n  * All repetitions begin from this position.\n\nDownward Movement Phase\n\n  * Begin the exercise by flexing the hips and knees slowly and under control while keeping the torso-to-floor angle relatively constant.\n  * Maintain a flat-foot position with the knees aligned over the feet as they flex.\n  * Continue flexing the hips and knees until the thighs are parallel to the floor, the torso begins to round or flex forward, or the heels begin to rise off the floor.\n\nUpward Movement Phase\n\n  * Raise the bar by extending the hips and knees while keeping the torso-to-floor angle relatively constant.\n  * Keep the torso erect, shoulders back, and chest up and out.\n  * Keep the heels on the floor and the knees aligned over the feet.\n  * Continue extending the hips and knees until the body is fully erect.\n\nMajor Muscles Involved\n\ngluteus maximus, semimembranosus, semitendinosus, biceps femoris, vastus lateralis, vastus intermedius, vastus medialis, rectus femoris\n\nStarting position\n\n![An athlete holds a barbell on the back of their shoulders and stands upright. The barbell ends have bands attached to them.](images/E6372_0757P_1508_ebook.jpg)\n\nDownward and upward movements\n\n![An athlete holds a barbell on the back of their shoulders and squats. The barbell ends have bands attached to them.](images/E6372_0757P_1509_ebook.jpg)\n\n16.9"

  - id: "ch16-two-arm-kettlebell-swing"
    title: "Conclusion / Two-Arm Kettlebell Swing"
    level: 3
    tags: [conclusion, kettlebell, swing]
    key_points:
      - "Starting Position"
    recall_prompts:
      - "Two-Arm Kettlebell Swing 是什麼？有哪些類型或應用？"
    content: "\n\nStarting Position\n\n  * Stand with feet flat and placed between hip- and shoulder-width apart with the toes pointed straight ahead, straddling a kettlebell.\n  * Squat down with the hips lower than the shoulders and grasp the kettlebell with a closed, pronated grip.\n  * Place the hands on the kettlebell with index fingers touching or close together, inside of the legs, keeping the elbows fully extended.\n  * Position the body with the \n    * back in a neutral spine position,\n    * shoulders retracted and depressed,\n    * feet flat on the floor, and\n    * eyes focused straight ahead or slightly upward.\n  * Maintain a neutral spine or normal lordotic position while flexing the hips and knees to approximately a quarter-squat position, with the kettlebell hanging at arm’s length between the thighs.\n  * All repetitions begin from this position.\n\nBackward Movement Phase\n\n  * Begin the exercise by flexing at the hips to swing the kettlebell between the legs.\n  * Keep the knees in a moderately flexed position with the back neutral and the elbows extended.\n  * Keep swinging the kettlebell backward until the torso is nearly parallel to the floor and the kettlebell is past the vertical line of the body.\n\nForward/Upward Movement Phase\n\n  * When the backward swing reaches its end point, reverse the movement by extending the hips and knees to move the kettlebell in an upward arc.\n  * Allow momentum to raise the kettlebell to eye level, keeping the elbows extended and the back in a neutral spine position.\n\nDownward/Backward Movement Phase\n\n  * Allow the kettlebell to drop into the downswing; flex the hips and knees to absorb the weight. Keep the elbows fully extended and the back neutral.\n  * Continue the downward-then-backward movement until the kettlebell passes under then behind the body, then begin the upward movement phase for the next repetition.\n\nMajor Muscles Involved\n\ngluteus maximus, semimembranosus, semitendinosus, biceps femoris, vastus lateralis, vastus intermedius, vastus medialis, rectus femoris\n\nStarting position\n\n![An athlete squats and lifts a kettlebell from the ground.](images/E6372_0757P_1136_ebook.jpg)\n\nInitial backward movement and beginning of forward/upward movement\n\n![An athlete bends forward with the knees bent slightly and swings a kettlebell backward. ](images/E6372_0757P_1126_ebook.jpg)\n\nEnd of forward/upward movement and beginning of downward/backward movement\n\n![An athlete stands upright and swings a kettlebell forward.](images/E6372_0757P_1127_ebook.jpg)\n\n16.10"

  - id: "ch16-single-leg-squat"
    title: "Conclusion / Single-Leg Squat"
    level: 3
    tags: [conclusion, single, squat]
    key_points:
      - "_Note:_ The single-leg squat is not typically done with a spotter."
    recall_prompts:
      - "Single-Leg Squat 是什麼？有哪些類型或應用？"
    content: "\n\n_Note:_ The single-leg squat is not typically done with a spotter. If spotting is needed, two spotters are used with one on each side of the bar. The positions of the spotters are not pictured in order to show the athlete’s position at the various stages of the one-leg squat more clearly.\n\nStarting Position: Athlete\n\n  * Grasp a barbell with a closed, pronated grip (for dumbbell variation, hold dumbbells with a closed, neutral grip with a dumbbell in each hand).\n  * Stand in front of a bench or box that is approximately knee-height with the feet approximately shoulder- to hip-width apart.\n  * Facing away from the bench or box, take a moderate step forward with one leg and place the instep of the back foot on top of the bench or box.\n  * Allow both knees to be slightly flexed, with the torso in a nearly erect position and the shoulders held back and chest up and out.\n  * All repetitions begin from this position.\n\nStarting Position: Two Spotters\n\n  * The spotters should stand erect at opposite ends of the bar with the feet hip-width apart and the knees slightly flexed.\n  * Hold the hands 2 to 3 inches (5-8 cm) below the end of the bar.\n\n_Note:_ If dumbbells are used, no spotter is needed.\n\nDownward Movement Phase: Athlete\n\n  * Flex the hip and knee of the forward leg simultaneously to lower the body in a vertical plane while keeping the torso-to-floor angle constant.\n  * Keep the heel of the forward foot flat on the floor and the instep of the back foot on top of the bench or box.\n  * Continue flexing the hip and knee until the front thigh is approximately parallel to the floor.\n\nDownward Movement Phase: Two Spotters\n\n  * Keep the cupped hands close to but not touching the bar as it descends.\n  * Slightly flex the knees, hips, and torso to keep a neutral spine position when following the bar.\n\nUpward Movement Phase: Athlete\n\n  * Raise the bar under control by actively extending the forward hip and knee; extend the other hip and knee also to keep the torso-to-floor angle constant.\n  * Maintain a neutral spine position and keep the torso upright.\n  * Keep the forward knee aligned over the forward foot.\n  * Do not flex the torso forward or round the spine.\n  * Continue extending the hip and knee of the forward leg to reach the starting position.\n  * Repeat for the desired number of repetitions and then switch the forward leg.\n\nUpward Movement Phase: Two Spotters\n\n  * Keep cupped hands close to but not touching the bar as it ascends.\n  * Slightly extend the knees, hips, and torso and keep the back neutral when following the bar.\n\nMajor Muscles Involved\n\ngluteus maximus, semimembranosus, semitendinosus, biceps femoris, vastus lateralis, vastus intermedius, vastus medialis, rectus femoris\n\nStarting position\n\n![An athlete holds a barbell on the back of their shoulders and rests their right ankle on a bench.](images/E6372_0757P_1494_ebook.jpg)\n\nDownward and upward movements\n\n![An athlete holds a barbell on the back of their shoulders and rests their right ankle on a bench. The athlete performs lunges.](images/E6372_0757P_1496_ebook.jpg)\n\n16.11"

  - id: "ch16-single-leg-romanian-deadlift-rdl"
    title: "Conclusion / Single-Leg Romanian Deadlift (RDL)"
    level: 3
    tags: [conclusion, single, romanian, deadlift]
    key_points:
      - "_Note:_ This exercise can be performed with the weight held in the hand of the same side of the body as the support leg (ipsilateral) or in the hand of the opposite side of the body as the support leg"
    recall_prompts:
      - "Single-Leg Romanian Deadlift (RDL) 是什麼？有哪些類型或應用？"
    content: "\n\n_Note:_ This exercise can be performed with the weight held in the hand of the same side of the body as the support leg (ipsilateral) or in the hand of the opposite side of the body as the support leg (contralateral). The description and the photos describe the contralateral single-leg RDL.\n\nStarting Position\n\n  * With the right hand, grasp a dumbbell or kettlebell with a closed, pronated grip.\n  * Stand on the left leg (as the support leg) with the hips and shoulders over the left foot.\n  * Hold the dumbbell or kettlebell in front of the right thigh with the right elbow fully extended and the right foot slightly staggered back.\n  * All repetitions begin from this position.\n\nDownward Movement Phase\n\n  * Allow the left support knee to flex until it reaches a moderately flexed position, and then rigidly hold that position throughout the movement.\n  * Begin the exercise by allowing the torso to flex forward at the hip of the left support leg.\n  * Keep the right shoulder, hip, knee, and ankle in one line as the torso flexes forward.\n  * Keep the back neutral and the right elbow still fully extended.\n  * Lower the dumbbell or kettlebell until the torso and right leg are approximately parallel to the floor.\n\nUpward Movement Phase\n\n  * Extend the hip of the left support leg to return to the starting position.\n  * Do not hyperextend the torso or flex the elbow holding the dumbbell or kettlebell.\n  * Repeat for the desired number of repetitions and then switch the support leg.\n\nMajor Muscles Involved\n\ngluteus maximus, semimembranosus, semitendinosus, biceps femoris\n\nStarting position\n\n![An athlete holds a kettlebell in their right hand. Their right leg is behind them on tiptoes.](images/E6372_0757P_0951_ebook.jpg)\n\nDownward and upward movements\n\n![An athlete holds a kettlebell in their right hand and lowers it toward the ground. They lift their right leg upward.](images/E6372_0757P_0956_ebook.jpg)\n\n16.12"

  - id: "ch16-one-arm-dumbbell-snatch"
    title: "Conclusion / One-Arm Dumbbell Snatch"
    level: 3
    tags: [conclusion, dumbbell, snatch]
    key_points:
      - "Starting Position"
    recall_prompts:
      - "One-Arm Dumbbell Snatch 是什麼？有哪些類型或應用？"
    content: "\n\nStarting Position\n\n  * Straddle a dumbbell and place the feet between hip- and shoulder-width apart with the toes pointed slightly outward.\n  * Squat down with the hips lower than the shoulders; grasp the dumbbell with a closed, pronated grip with the elbow fully extended.\n  * Position the body with the \n    * back neutral or slightly arched,\n    * scapulae depressed and retracted,\n    * chest held up and out,\n    * head in line with the vertebral column or slightly hyperextended,\n    * body’s weight balanced between the middle and balls of the feet,\n    * feet flat on the floor,\n    * shoulders of the hand that is holding the dumbbell over or slightly in front of the dumbbell, and\n    * eyes focused straight ahead or slightly upward.\n  * All repetitions begin from this position.\n\nUpward Movement Phase\n\n  * Begin the exercise by extending the knees, hips, and ankles forcefully to accelerate the dumbbell.\n  * The dumbbell should slide up the thigh or remain very close to the thigh as it accelerates upward.\n  * Keep the elbow of the arm holding the dumbbell fully extended as the knees, hips, and ankles are extending.\n  * Once the knees, hips, and ankles reach full extension, rapidly shrug the shoulder of the arm holding the dumbbell.\n  * As the shoulder reaches its highest elevation, flex the elbow holding the dumbbell and keep it close to the torso.\n  * Keep the arm that is not holding the dumbbell on the opposite hip or held to the side.\n  * Continue pulling the dumbbell as high as possible.\n\nCatch Phase\n\n  * Pull the body under the dumbbell by rotating the arm and hand holding the dumbbell around then under the dumbbell, and by flexing the hips and knees to approximately a quarter-squat position.\n  * Once the arm holding the dumbbell is under the dumbbell, extend the elbow quickly to push the dumbbell up and the body downward under the dumbbell.\n  * Catch the dumbbell in full extension at the same time the body reaches the quarter-squat position.\n  * Keep the arm that is not holding the dumbbell on the opposite hip or held to the side.\n  * After gaining control and balance, stand up to a fully erect position.\n\nDownward Movement Phase\n\n  * Slowly allow the dumbbell to lower to the shoulder, then the thigh, and finally to the floor between the feet using a squatting movement.\n\nMajor Muscles Involved\n\nrectus femoris, vastus medialis, vastus lateralis, vastus intermedius, gluteus maximus, semimembranosus, semitendinosus, biceps femoris, deltoids, trapezius\n\nStarting position\n\n![An athlete squats and grips a dumbbell in one hand.](images/E6372_0757P_1116_ebook.jpg)\n\nUpward movement\n\n![An athlete does a small jump and pulls a dumbbell to their chest.](images/E6372_0757P_1117_ebook.jpg)\n\nCatch\n\n![An athlete bends their knees slightly and holds a dumbbell above their head.](images/E6372_0757P_1118_ebook.jpg)\n\nStanding position\n\n![An athlete straightens their legs and holds a dumbbell above their head.](images/E6372_0757P_1119_ebook.jpg)\n\n#### Key Terms\n\n  * accommodating resistance\n  * alternative modes\n  * anatomical core\n  * anterior cruciate ligament (ACL)\n  * axial skeleton\n  * bilateral asymmetries\n  * bilateral deficit\n  * bilateral facilitation\n  * bodyweight training\n  * chains\n  * constant external resistance\n  * core\n  * farmer’s walk\n  * ground-based free weight exercises\n  * isolation exercises\n  * kettlebells\n  * logs\n  * machine-based training\n  * muscle activation\n  * nontraditional implement\n  * resistance band\n  * sticking point\n  * strongman training\n  * Valsalva maneuver\n  * variable resistance\n\n#### Study Questions\n\n  1. If during the tire flip the athlete’s hips rise faster than the shoulders during the initial pushing motion, what is an effective correction to give the athlete? \n     1. Start with a higher hip position.\n     2. Keep the hips slightly below the shoulders in this position.\n     3. Lift the tire upward instead of driving it forward.\n     4. Push with the arms first.\n  2. If a strong athlete incorporates only unilateral training into his or her program, what might the strength and conditioning professional expect to happen? \n     1. A bilateral facilitation will occur.\n     2. A bilateral deficit will be developed.\n     3. A reduction in bilateral asymmetries will occur.\n     4. Only unilateral strength will increase.\n  3. With regard to core training, when is instability exercise best applied? \n     1. with untrained athletes who are relatively weak\n     2. in trained athletes who are rehabilitating from an injury\n     3. with trained athletes who are trying to optimize strength and power\n     4. with untrained athletes who are new to the exercise\n  4. Which of the following is a rationale for using variable-resistance training methods? \n     1. to accommodate the changing mechanical advantages associated with constant-loaded exercises\n     2. to minimize force application throughout the full range of motion\n     3. to increase the time spent decelerating during a lifting motion\n     4. to keep the applied resistance constant during changes in joint angle\n  5. Training on instability devices can reduce the overall agonist force production capacity and power output of the athlete to less than ______ of what can be achieved in a stable condition. \n     1. 20%\n     2. 50%\n     3. 70%\n     4. 90%"
