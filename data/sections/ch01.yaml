      - "本章哪 3 個術語會在後續章節出現？"
      - "Conclusion 的核心概念是什麼？"
    content: "\n\nKnowledge of musculoskeletal, neuromuscular, cardiovascular, and respiratory anatomy and physiology is important for the strength and conditioning professional to have in order to understand the scientific basis for conditioning. This includes knowledge of the function of the macrostructure and microstructure of the skeleton and muscle fibers, muscle fiber types, and interactions between tendon and muscle and between the motor unit and its activation, as well as the interactions of the heart, vascular system, lungs, and respiratory system. This information is necessary for developing training strategies that will meet the specific needs of the athlete.\n\n### Key Terms\n\n  * A-band\n  * acetylcholine\n  * actin\n  * action potential\n  * all-or-none principle\n  * alveolar pressure\n  * alveoli\n  * aortic valve\n  * appendicular skeleton\n  * arterial system\n  * arteriole\n  * artery\n  * atrioventricular (AV) bundle\n  * atrioventricular (AV) node\n  * atrioventricular (AV) valves\n  * atrium\n  * axial skeleton\n  * biaxial joints\n  * bone periosteum\n  * bradycardia\n  * bronchi\n  * bronchiole\n  * capillary\n  * cartilaginous joints\n  * crossbridge\n  * depolarization\n  * diastole\n  * diffusion\n  * distal\n  * electrocardiogram (ECG)\n  * endomysium\n  * epimysium\n  * extrafusal fibers\n  * fasciculi\n  * fast-twitch fiber\n  * fibrous joints\n  * Golgi tendon organ (GTO)\n  * hemoglobin\n  * hyaline cartilage\n  * H-zone\n  * I-band\n  * inferior\n  * intrafusal fibers\n  * left bundle branch\n  * mitral valve\n  * motor neuron\n  * motor unit\n  * multiaxial joints\n  * muscle fiber\n  * muscle spindle\n  * myocardium\n  * myofibril\n  * myofilament\n  * myosin\n  * neuromuscular junction\n  * parasympathetic nervous system\n  * perimysium\n  * pleura\n  * pleural pressure\n  * power stroke\n  * proprioceptor\n  * proximal\n  * pulmonary valve\n  * Purkinje fibers\n  * P-wave\n  * QRS complex\n  * red blood cell\n  * repolarization\n  * right bundle branch\n  * sarcolemma\n  * sarcomere\n  * sarcoplasm\n  * sarcoplasmic reticulum\n  * semilunar valves\n  * sinoatrial (SA) node\n  * sliding-filament theory\n  * slow-twitch fiber\n  * superior\n  * sympathetic nervous system\n  * synovial fluid\n  * synovial joints\n  * systole\n  * tachycardia\n  * tendon\n  * tetanus\n  * trachea\n  * tricuspid valve\n  * tropomyosin\n  * troponin\n  * T-tubule\n  * T-wave\n  * twitch\n  * Type I fiber\n  * Type IIa fiber\n  * Type IIx fiber\n  * uniaxial joints\n  * vein\n  * venous system\n  * ventricle\n  * venule\n  * vertebral column\n  * Z-line\n\n### Study Questions\n\n  1. Which of the following substances regulates muscle actions? \n     1. potassium\n     2. calcium\n     3. troponin\n     4. tropomyosin\n  2. Which of the following substances acts at the neuromuscular junction to excite the muscle fibers of a motor unit? \n     1. acetylcholine\n     2. ATP\n     3. creatine phosphate\n     4. serotonin\n  3. When throwing a baseball, an athlete’s arm is rapidly stretched just before throwing the ball. Which of the following structures detects and responds to that stretch by reflexively increasing muscle activity? \n     1. Golgi tendon organ\n     2. muscle spindle\n     3. extrafusal muscle\n     4. Pacinian corpuscle\n  4. From which of the following is the heart’s electrical impulse normally initiated? \n     1. AV node\n     2. SA node\n     3. the brain\n     4. the sympathetic nervous system\n  5. Which of the following occurs during the QRS complex of a typical ECG? \n     1. I. depolarization of the atrium\n     2. II. repolarization of the atrium\n     3. III. repolarization of the ventricle\n     4. IV. depolarization of the ventricle\n     1. I and III only\n     2. II and IV only\n     3. I, II, and III only\n     4. II, III, and IV only"
