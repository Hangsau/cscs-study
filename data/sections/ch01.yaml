  - id: "ch01-musculoskeletal-system"
    title: "Musculoskeletal System"
    level: 2
    tags: [musculoskeletal, system]
    key_points:
      - "人體約 206 塊骨頭，分軸心骨骼（80）+ 附肢骨骼（126）"
      - "肌肉只能 pull 不能 push，靠 bony lever 轉換成 push 動作"
      - "骨骼在 heavy load + impact 訓練下密度增加（gymnasts 骨密度最高）"
      - "三種關節：fibrous（不動）/ cartilaginous（微動）/ synovial（多動）"
      - "synovial joint 特徵：hyaline cartilage + synovial fluid capsule"
      - "關節分三類 by axis：uniaxial（elbow）/ biaxial（ankle, wrist）/ multiaxial（shoulder, hip）"
      - "The musculoskeletal system of the human body consists of bones, joints, muscles, and tendons configured to allow the great variety of movements characteristic of human activity."
    recall_prompts:
      - "人體有幾塊骨頭？軸心 vs 附肢各幾塊？"
      - "為什麼肌肉只能 pull 但能做出 push 動作？"
      - "fibrous / cartilaginous / synovial 三種關節差別？"
      - "uniaxial / biaxial / multiaxial 各舉一個例子"
      - "骨密度最高的人是哪類運動員？為什麼？"
      - "Musculoskeletal System 的核心概念是什麼？"
    content: "\n\nThe musculoskeletal system of the human body consists of bones, joints, muscles, and tendons configured to allow the great variety of movements characteristic of human activity. This section describes the various components of the musculoskeletal system, both individually and in the context of how they function together.\n\n### Skeleton\n\nThe muscles of the body do not act directly to exert force on the ground or other objects. Instead, they function by pulling against bones that rotate about joints and transmit force to the environment. Muscles can only pull, not push; but through the system of bony levers, muscle pulling forces can be manifested as either pulling or pushing forces against external objects.\n\nThere are approximately 206 bones in the body, though the number can vary. This relatively light, strong structure provides leverage, support, and protection ([figure 1.1](<E6372ch01_d78.xhtml#f1.1>)). The axial skeleton consists of the skull (cranium), vertebral column (vertebra C1 through the coccyx), ribs, and sternum. The appendicular skeleton includes the shoulder (or pectoral) girdle (left and right scapula and clavicle); bones of the arms, wrists, and hands (left and right humerus, radius, ulna, carpals, metacarpals, and phalanges); the pelvic girdle (left and right coxal or innominate bones); and the bones of the legs, ankles, and feet (left and right femur, patella, tibia, fibula, tarsals, metatarsals, and phalanges).\n\n**Figure 1.1**  _(a)_ Front view and _(b)_ rear view of an adult male human skeleton.\n\n![An illustration of the human skeletal system.](images/E6372_508626_ebook.jpg)\n\n[Follow for extended description](<Ext_desc_E6372_508626_ebook.xhtml#l_E6372_508626_ebook>)\n\n#### What Factors Affect Skeletal Growth in an Adult?\n\nThere are several things that can positively affect the adult skeleton, and most are a result of muscle use. When the body is subjected to heavy loads (job tasks or resistance training), the bone will increase in density and bone mineral content. If the body performs more explosive movements with impact, similar changes can occur. Some of the higher bone densities have been seen in people who engage in gymnastics or other activities that involve high-strength and high-power movements, some with hard landings ([11](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref11>)). Other factors that influence bone adaptations are whether the axial skeleton is loaded and how often this loading occurs (frequency). Since the adaptation period of bone is longer than that of skeletal muscle, it is important to vary the stimulus in terms of frequency, intensity, and type.\n\nJunctions of bones are called joints. Fibrous joints (e.g., sutures of the skull) allow virtually no movement; cartilaginous joints (e.g., intervertebral disks) allow limited movement; and synovial joints (e.g., elbow and knee) allow considerable movement. Sport and exercise movements occur mainly about the synovial joints, whose most important features are low friction and large range of motion. Articulating bone ends are covered with smooth hyaline cartilage, and the entire joint is enclosed in a capsule filled with synovial fluid. There are usually additional supporting structures of ligament and cartilage ([13](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref13>)).\n\nVirtually all joint movement consists of rotation about points or axes. Joints can be categorized by the number of directions about which rotation can occur. Uniaxial joints, such as the elbow, operate as hinges, essentially rotating about only one axis. The knee is often referred to as a hinge joint, but its axis of rotation actually changes throughout the joint range of motion. Biaxial joints, such as the ankle and wrist, allow movement about two perpendicular axes. Multiaxial joints, including the shoulder and hip ball-and-socket joints, allow movement about all three perpendicular axes that define space.\n\nThe vertebral column is made up of vertebral bones separated by flexible disks that allow movement to occur. The vertebrae are grouped into 7 cervical vertebrae in the neck region; 12 thoracic vertebrae in the middle to upper back; 5 lumbar vertebrae, which make up the lower back; 5 sacral vertebrae, which are fused together and make up the rear part of the pelvis; and 3 to 5 coccygeal vertebrae, which form a kind of vestigial internal tail extending downward from the pelvis.\n\n### Skeletal Musculature\n\nThe system of muscles that enables the skeleton to move is depicted in [figure 1.2](<E6372ch01_d78.xhtml#f1.2>). The connection point between bones is the joint, and skeletal muscles are attached to bones at each of their ends. Without this arrangement, movement could not occur.\n\n**Figure 1.2**  _(a)_ Front view and _(b)_ rear view of adult male human skeletal musculature.\n\n![An illustration of the muscles in the anterior side of the adult male.](images/E6372_508073_ebook.jpg)\n\n![An illustration of the muscles in the posterior side of the adult male.](images/E6372_508074_ebook.jpg)\n\n#### Musculoskeletal Macrostructure and Microstructure\n\nEach skeletal muscle is an organ that contains muscle tissue, connective tissue, nerves, and blood vessels. Fibrous connective tissue, or epimysium, covers the body’s more than 430 skeletal muscles. The epimysium is contiguous with the tendons at the ends of the muscle ([figure 1.3](<E6372ch01_d78.xhtml#f1.3>)). The tendon is attached to bone periosteum, a specialized connective tissue covering all bones; any contraction of the muscle pulls on the tendon and, in turn, the bone. Limb muscles have two attachments to bone: proximal (closer to the trunk) and distal (farther from the trunk). The two attachments of trunk muscles are termed superior (closer to the head) and inferior (closer to the feet).\n\n**Figure 1.3** Schematic drawing of a muscle illustrating three types of connective tissue: epimysium (the outer layer), perimysium (surrounding each fasciculus, or group of fibers), and endomysium (surrounding individual fibers).\n\n![An illustration of the muscle layers. The layers are thick and thin myofilaments, myofibril, sarcoplasm, nucleus, sarcolemma, single muscle fiber, perimysium, endomysium between fibers, fasciculus, epimysium, muscle belly, and tendons.](images/E6372_508017_ebook.jpg)\n\nMuscle cells, often called muscle fibers, are long (sometimes running the entire length of a muscle), cylindrical cells 50 to 100 μm in diameter (about the diameter of a human hair). These fibers have many nuclei situated on the periphery of the cell and have a striated appearance under low magnification. Under the epimysium the muscle fibers are grouped in bundles (fasciculi) that may consist of up to 150 fibers, with the bundles surrounded by connective tissue called perimysium. Each muscle fiber is surrounded by connective tissue called endomysium, which is encircled by and is contiguous with the fiber’s membrane, or sarcolemma ([13](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref13>)). All the connective tissue—epimysium, perimysium, and endomysium—is contiguous with the tendon, so tension developed in a muscle cell is transmitted to the tendon and the bone to which it is attached (see [figure 1.3](<E6372ch01_d78.xhtml#f1.3>)).\n\nThe junction between a motor neuron (nerve cell) and the muscle fibers it innervates is called the motor end plate, or, more often, the neuromuscular junction ([figure 1.4](<E6372ch01_d78.xhtml#f1.4>)). Each muscle cell has only one neuromuscular junction, although a single motor neuron innervates many muscle fibers, sometimes hundreds or even thousands. A motor neuron and the muscle fibers it innervates are called a motor unit. All the muscle fibers of a motor unit contract together when they are stimulated by the motor neuron.\n\n**Figure 1.4** A motor unit, consisting of a motor neuron and the muscle fibers it innervates. There are typically several hundred muscle fibers in a single motor unit.\n\n![An illustration of a motor unit containing a neuron innervated to a muscle at the neuromuscular junction. The neuron has dendrites, nucleus, axon, node of Ranvier, and myelin sheath.](images/E6372_508018_ebook.jpg)\n\nThe interior structure of a muscle fiber is depicted in [figure 1.5](<E6372ch01_d78.xhtml#f1.5>). The sarcoplasm, which is the cytoplasm of a muscle fiber, contains contractile components consisting of protein filaments, other proteins, stored glycogen and fat particles, enzymes, and specialized organelles such as mitochondria and the sarcoplasmic reticulum.\n\n**Figure 1.5** Sectional view of a muscle fiber.\n\n![An illustration of the sectional view of a muscle fiber consisting of mitochondrion, myofibril, sarcolemma, T-tubule, opening to T-tubule, and sarcoplasmic reticulum.](images/E6372_508019_ebook.jpg)\n\nHundreds of myofibrils (each about 1 μm in diameter, 1/100 the diameter of a hair) dominate the sarcoplasm. Myofibrils contain the apparatus that contracts the muscle cell, which consists primarily of two types of myofilament: myosin and actin. The myosin filaments (thick filaments about 16 nm in diameter, about 1/10,000 the diameter of a hair) contain up to 200 myosin molecules. The myosin filament consists of a globular head, a hinge point, and a fibrous tail. The globular heads protrude away from the myosin filament at regular intervals, and a pair of myosin filaments forms a crossbridge, which interacts with actin. The actin filaments (thin filaments about 6 nm in diameter) consist of two strands arranged in a double helix. Myosin and actin filaments are organized longitudinally in the smallest contractile unit of skeletal muscle, the sarcomere. Sarcomeres average about 2.5 μm in length in a relaxed fiber (approximately 4,500 per centimeter of muscle length) and are repeated the entire length of the muscle fiber ([1](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref1>)).\n\n[Figure 1.6](<E6372ch01_d78.xhtml#f1.6>) shows the structure and orientation of the myosin and actin in the sarcomere. Adjacent myosin filaments anchor to each other at the M-bridge in the center of the sarcomere (the center of the H-zone). Actin filaments are aligned at both ends of the sarcomere and are anchored at the Z-line. Z-lines are repeated through the entire myofibril. Six actin filaments surround each myosin filament, and each actin filament is surrounded by three myosin filaments.\n\n**Figure 1.6** Detailed view of the myosin and actin protein filaments in muscle. The arrangement of myosin (thick) and actin (thin) filaments gives skeletal muscle its striated appearance.\n\n![An illustration of myosin and actin filaments in a muscle.](images/E6372_508020_ebook.jpg)\n\n[Follow for extended description](<Ext_desc_E6372_508020_ebook.xhtml#l_E6372_508020_ebook>)\n\nIt is the arrangement of the myosin and actin filaments and the Z-lines of the sarcomeres that gives skeletal muscle its alternating dark and light pattern, which appears as striated under magnification. The dark A-band corresponds with the alignment of the myosin filaments, whereas the light I-band corresponds with the areas in two adjacent sarcomeres that contain only actin filaments ([13](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref13>)). The Z-line is in the middle of the I-band and appears as a thin, dark line running longitudinally through the I-band. The H-zone is the area in the center of the sarcomere where only myosin filaments are present. During muscle contraction, the H-zone decreases as the actin slides over the myosin toward the center of the sarcomere. The I-band also decreases as the Z-lines are pulled toward the center of the sarcomere.\n\nParallel to and surrounding each myofibril is an intricate system of tubules, called the sarcoplasmic reticulum (see [figure 1.5](<E6372ch01_d78.xhtml#f1.5>)), which terminates as vesicles in the vicinity of the Z-lines. Calcium ions are stored in the vesicles. The regulation of calcium controls muscular contraction. T-tubules, or transverse tubules, run perpendicular to the sarcoplasmic reticulum and terminate in the vicinity of the Z-line between two vesicles. Because the T-tubules run between outlying myofibrils and are contiguous with the sarcolemma at the surface of the cell, discharge of an action potential (an electrical nerve impulse) arrives nearly simultaneously from the surface to all depths of the muscle fiber. Calcium is thus released throughout the muscle, producing a coordinated contraction.\n\nThe discharge of an action potential from a motor nerve signals the release of calcium from the sarcoplasmic reticulum into the myofibril, causing tension development in muscle.\n\n#### Sliding-Filament Theory of Muscular Contraction\n\nIn its simplest form, the sliding-filament theory states that the actin filaments at each end of the sarcomere slide inward on myosin filaments, pulling the Z-lines toward the center of the sarcomere and thus shortening the muscle fiber ([figure 1.7](<E6372ch01_d78.xhtml#f1.7>)). As actin filaments slide over myosin filaments, both the H-zone and I-band shrink. The action of myosin crossbridges pulling on the actin filaments is responsible for the movement of the actin filament. Because only a very small displacement of the actin filament occurs with each flexion of the myosin crossbridge, very rapid, repeated flexions must occur in many crossbridges throughout the entire muscle for measurable movement to occur ([13](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref13>)).\n\n**Figure 1.7** Contraction of a myofibril. _(a)_ In stretched muscle the I-bands and H-zone are elongated, and there is low force potential due to reduced crossbridge–actin alignment. _(b)_ When muscle contracts (here partially), the I-bands and H-zone are shortened. Force potential is high due to optimal crossbridge–actin alignment. _(c)_ With contracted muscle, force potential is low because the overlap of actin reduces the potential for crossbridge–actin alignment.\n\n![An illustration of a stretched myofibril. ](images/E6372_508021_ebook.jpg)\n\n[Follow for extended description](<Ext_desc_E6372_508021_ebook.xhtml#l_E6372_508021_ebook>)\n\n![An illustration of a relaxed myofibril.](images/E6372_513635_ebook.jpg)\n\n[Follow for extended description](<Ext_desc_E6372_513635_ebook.xhtml#l_E6372_513635_ebook>)\n\n![An illustration of a contracted myofibril.](images/E6372_513636_ebook.jpg)\n\n[Follow for extended description](<Ext_desc_E6372_513636_ebook.xhtml#l_E6372_513636_ebook>)\n\n##### Resting Phase\n\nUnder normal resting conditions, little calcium is present in the myofibril (most of it is stored in the sarcoplasmic reticulum), so very few of the myosin crossbridges are bound to actin. Even with the actin binding site covered, myosin and actin still interact in a weak bond, which becomes strong (and muscle tension is produced) when the actin binding site is exposed after release of the stored calcium.\n\n##### Excitation–Contraction Coupling Phase\n\nBefore myosin crossbridges can flex, they must first attach to the actin filament. When the sarcoplasmic reticulum is stimulated to release calcium ions, the calcium binds with troponin, a protein that is situated at regular intervals along the actin filament (see [figure 1.6](<E6372ch01_d78.xhtml#f1.6>)) and has a high affinity for calcium ions. This causes a shift to occur in another protein molecule, tropomyosin, which runs along the length of the actin filament in the groove of the double helix. The myosin crossbridge now attaches much more rapidly to the actin filament, allowing force to be produced as the actin filaments are pulled toward the center of the sarcomere ([1](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref1>)). It is important to understand that the amount of force produced by a muscle at any instant in time is directly related to the number of myosin crossbridges bound to actin filaments cross-sectionally at that instant in time ([1](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref1>)).\n\nThe number of crossbridges that are formed between actin and myosin at any instant in time dictates the force production of a muscle.\n\n##### Contraction Phase\n\nThe energy for pulling action, or power stroke, comes from hydrolysis (breakdown) of adenosine triphosphate (ATP) to adenosine diphosphate (ADP) and phosphate, a reaction catalyzed by the enzyme myosin adenosine triphosphatase (ATPase). Another molecule of ATP must replace the ADP on the myosin crossbridge globular head in order for the head to detach from the active actin site and return to its original position. This allows the contraction process to continue (if calcium is available to bind to troponin) or relaxation to occur (if calcium is not available). It may be noted that calcium plays a role in regulating a large number of events in skeletal muscle besides contraction. These include glycolytic and oxidative energy metabolism, as well as protein synthesis and degradation ([10](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref10>)).\n\nCalcium and ATP are necessary for crossbridge cycling with actin and myosin filaments.\n\n##### Recharge Phase\n\nMeasurable muscle shortening transpires only when this sequence of events—binding of calcium to troponin, coupling of the myosin crossbridge with actin, power stroke, dissociation of actin and myosin, and resetting of the myosin head position—is repeated over and over again throughout the muscle fiber. This occurs as long as calcium is available in the myofibril, ATP is available to assist in uncoupling the myosin from the actin, and sufficient active myosin ATPase is available for catalyzing the breakdown of ATP.\n\n##### Relaxation Phase\n\nRelaxation occurs when the stimulation of the motor nerve stops. Calcium is pumped back into the sarcoplasmic reticulum, which prevents the link between the actin and myosin filaments. Relaxation is brought about by the return of the actin and myosin filaments to their unbound state.\n\n###### Steps of Muscle Contraction\n\nThe steps of muscle contraction can be summarized as follows:\n\n  1. Initiation of ATP splitting (by myosin ATPase) causes myosin head to be in an “energized” state that allows it to move into a position to be able to form a bond with actin.\n  2. The release of phosphate from the ATP splitting process then causes the myosin head to change shape and shift.\n  3. This pulls the actin filament in toward the center of the sarcomere and is referred to as the _power stroke;_ ADP is then released.\n  4. Once the power stroke has occurred, the myosin head detaches from the actin but only after another ATP binds to the myosin head because the binding process facilitates detachment.\n  5. The myosin head is now ready to bind to another actin (as described in step 1), and the cycle continues as long as ATP and ATPase are present and calcium is bound to the troponin."

  - id: "ch01-activation-of-muscles"
    title: "Neuromuscular System / Activation of Muscles"
    level: 3
    tags: [neuromuscular, system, activation, muscles]
    key_points:
      - "When a motor neuron fires an impulse or action potential, all of the fibers that it serves are simultaneously activated and develop force."
    recall_prompts:
      - "Activation of Muscles 是什麼？有哪些類型或應用？"
    content: "\n\nWhen a motor neuron fires an impulse or action potential, all of the fibers that it serves are simultaneously activated and develop force. The extent of control of a muscle depends on the number of muscle fibers within each motor unit. Muscles that must function with great precision, such as eye muscles, may have motor units with as few as one muscle fiber per motor neuron. Changes in the number of active motor units in these small muscles can produce the extremely fine gradations in force that are necessary for precise movements of the eyeball. In contrast, the quadriceps muscle group, which moves the leg with much less precision, may have several hundred fibers served by one motor neuron.\n\nThe action potential (electric current) that flows along a motor neuron is not capable of directly exciting muscle fibers. Instead, the motor neuron excites the muscle fiber(s) that it innervates by chemical transmission. Arrival of the action potential at the nerve terminal causes release of a neurotransmitter, acetylcholine, which diffuses across the neuromuscular junction, causing excitation of the sarcolemma. Once a sufficient amount of acetylcholine is released, an action potential is generated along the sarcolemma, and the fiber contracts. All of the muscle fibers in the motor unit contract and develop force at the same time. There is no evidence that a motor neuron stimulus causes only some of the fibers to contract. Similarly, a stronger action potential cannot produce a stronger contraction. This phenomenon is known as the all-or-none principle of muscle.\n\nEach action potential traveling down a motor neuron results in a short period of activation of the muscle fibers within the motor unit. The brief contraction that results is referred to as a twitch. Activation of the sarcolemma results in the release of calcium within the fiber, and contraction proceeds as previously described. Force develops if there is resistance to the pulling interaction of actin and myosin filaments. Although calcium release during a twitch is sufficient to allow optimal activation of actin and myosin, and thereby maximal force of the fibers, calcium is removed before force reaches its maximum, and the muscle relaxes ([figure 1.8 _a_](<E6372ch01_d78.xhtml#f1.8>)). If a second twitch is elicited from the motor nerve before the fibers completely relax, force from the two twitches summates, and the resulting force is greater than that produced by a single twitch ([figure 1.8 _b_](<E6372ch01_d78.xhtml#f1.8>)). Decreasing the time interval between the twitches results in greater summation of crossbridge binding and force. The stimuli may be delivered at so high a frequency that the twitches begin to merge and eventually completely fuse, a condition called tetanus ([figure 1.8](<E6372ch01_d78.xhtml#f1.8>), _c_ and _d_). This is the maximal amount of force the motor unit can develop.\n\n**Figure 1.8** Twitch, twitch summation, and tetanus of a motor unit: a = single twitch; b = force resulting from summation of two twitches; c = unfused tetanus; d = fused tetanus.\n\n![Line graph of the relationship between force and frequency.](images/E6372_508022_ebook.jpg)\n\n[Follow for extended description](<Ext_desc_E6372_508022_ebook.xhtml#l_E6372_508022_ebook>)"

  - id: "ch01-muscle-fiber-types"
    title: "Neuromuscular System / Muscle Fiber Types"
    level: 3
    tags: [neuromuscular, system, muscle, fiber, types]
    key_points:
      - "Skeletal muscles are composed of fibers that have markedly different morphological and physiological characteristics."
    recall_prompts:
      - "Muscle Fiber Types 是什麼？有哪些類型或應用？"
    content: "\n\nSkeletal muscles are composed of fibers that have markedly different morphological and physiological characteristics. These differences have led to several different systems of classification, based on a variety of criteria. The most familiar approach is to classify fibers according to twitch time, employing the terms slow-twitch and fast-twitch fiber. Because a motor unit is composed of muscle fibers that are all of the same type, it also can be designated using this classification system. A fast-twitch motor unit is one that develops force and also relaxes rapidly and thus has a short twitch time. Slow-twitch motor units, in contrast, develop force and relax slowly and have a long twitch time.\n\nHistochemical staining for myosin ATPase content is often used to classify fibers as slow-twitch or fast-twitch. Although the techniques can stain for multiple fiber types, the commonly identified fibers are Type I (slow-twitch), Type IIa (fast-twitch), and Type IIx (fast-twitch). Another more specific method is to quantify the amount of myosin heavy chain (MHC) protein; the nomenclature for this is similar to that with the myosin ATPase methodology.\n\nThe contrast in mechanical characteristics of Type I and Type II fibers is accompanied by a distinct difference in the ability of the fibers to demand and supply energy for contraction and thus to withstand fatigue. Type I fibers are generally efficient and fatigue resistant and have a high capacity for aerobic energy supply, but they have limited potential for rapid force development, as characterized by low myosin ATPase activity and low anaerobic power ([2](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref2>), [8](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref8>)).\n\nType II motor units are essentially the opposite, characterized as inefficient and fatigable and as having low aerobic power, rapid force development, high myosin ATPase activity, and high anaerobic power ([2](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref2>), [8](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref8>)). Type IIa and Type IIx fibers differ mainly in their capacity for aerobic–oxidative energy supply. Type IIa fibers, for example, have greater capacity for aerobic metabolism and more capillaries surrounding them than Type IIx and therefore show greater resistance to fatigue ([3](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref3>), [7](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref7>), [9](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref9>), [12](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref12>)). Based on these differences, it is not surprising that postural muscles, such as the soleus, have a high composition of Type I fibers, whereas large, so-called locomotor muscles, such as the quadriceps group, have a mixture of both Type I and Type II fibers to enable both low and high power output activities (such as jogging and sprinting, respectively). Refer to [table 1.1](<E6372ch01_d78.xhtml#t1.1>) for a summary of the primary characteristics of fiber types.\n\nTABLE 1.1 Major Characteristics of Muscle Fiber Types | Fiber types  \n---|---  \nCharacteristic | Type I | Type IIa | Type IIx  \nMotor neuron size | Small | Large | Large  \nRecruitment threshold | Low | Intermediate/High | High  \nNerve conduction velocity | Slow | Fast | Fast  \nContraction speed | Slow | Fast | Fast  \nRelaxation speed | Slow | Fast | Fast  \nFatigue resistance | High | Intermediate/Low | Low  \nEndurance | High | Intermediate/Low | Low  \nForce production | Low | Intermediate | High  \nPower output | Low | Intermediate/High | High  \nAerobic enzyme content | High | Intermediate/Low | Low  \nAnaerobic enzyme content | Low | High | High  \nSarcoplasmic reticulum complexity | Low | Intermediate/High | High  \nCapillary density | High | Intermediate | Low  \nMyoglobin content | High | Low | Low  \nMitochondrial size, density | High | Intermediate | Low  \nFiber diameter | Small | Intermediate | Large  \nColor | Red | White/Red | White  \n  \nMotor units are composed of muscle fibers with specific morphological and physiological characteristics that determine their functional capacity."

  - id: "ch01-motor-unit-recruitment-patterns"
    title: "Neuromuscular System / Motor Unit Recruitment Patterns"
    level: 3
    tags: [neuromuscular, system, motor, recruitment, patterns]
    key_points:
      - "Through everyday experiences, we are quite aware that a given muscle can vary its level of force output according to the level required by a particular task."
    recall_prompts:
      - "Motor Unit Recruitment Patterns 是什麼？有哪些類型或應用？"
    content: "\n\nThrough everyday experiences, we are quite aware that a given muscle can vary its level of force output according to the level required by a particular task. This ability to vary or gradate force is essential for performance of smooth, coordinated patterns of movement. Muscular force can be graded in two ways. One is through variation in the frequency at which motor units are activated. If a motor unit is activated once, the twitch that arises does not produce a great deal of force. However, if the frequency of activation is increased so that the forces of the twitches begin to overlap or summate, the resulting force developed by the motor unit is much greater. This method of varying force output is especially important in small muscles, such as those of the hand. Even at low forces, most of the motor units in these muscles are activated, albeit at a low frequency. Force output of the whole muscle is intensified through increase in the frequency of firing of the individual motor units. The other means of varying skeletal muscle force involves an increase in force through varying the number of motor units activated, a process known as recruitment. In large muscles, such as those in the thigh, motor units are activated at near-tetanic frequency when called on. Increases in force output are achieved through recruitment of additional motor units.\n\nThe type of motor unit recruited for a given activity is determined by its physiological characteristics ([table 1.2](<E6372ch01_d78.xhtml#t1.2>)). For an activity such as distance running, slow-twitch motor units are engaged to take advantage of their remarkable efficiency, endurance capacity, and resistance to fatigue. If additional force is needed, as in a sprint at the end of a race, the fast-twitch motor units are called into play to increase the pace; unfortunately, exercise at such intensity cannot be maintained very long. If the activity requires near-maximal performance, as in a power clean, most of the motor units are called into play, with fast-twitch units making the more significant contribution to the effort. Complete activation of the available motor neuron pool is probably not possible in untrained people ([4](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref4>), [5](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref5>), [6](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref6>)). Although the large fast-twitch units may be recruited if the effort is substantial, under most circumstances it is probably not possible to activate them at a high enough frequency for maximal force to be realized.\n\nTABLE 1.2 Relative Involvement of Muscle Fiber Types in Sport Events Event | Type I | Type II  \n---|---|---  \n100 m sprint | Low | High  \n800 m run | High | High  \nMarathon | High | Low  \nOlympic weightlifting | Low | High  \nSoccer, lacrosse, hockey | High | High  \nAmerican football wide receiver | Low | High  \nAmerican football lineman | Low | High  \nBasketball, team handball | Low | High  \nVolleyball | Low | High  \nBaseball or softball pitcher | Low | High  \nBoxing | High | High  \nWrestling | High | High  \n50 m swim | Low | High  \nField events | Low | High  \nCross-country skiing, biathlon | High | Low  \nTennis | High | High  \nDownhill or slalom skiing | High | High  \nSpeed skating | High | High  \nTrack cycling | Low | High  \nDistance cycling | High | Low  \nRowing | High | High  \n  \nThe force output of a muscle can be varied through change in the frequency of activation of individual motor units or change in the number of activated motor units."

  - id: "ch01-proprioception"
    title: "Neuromuscular System / Proprioception"
    level: 3
    tags: [neuromuscular, system, proprioception]
    key_points:
      - "Proprioceptors are specialized sensory receptors located within joints, muscles, and tendons."
    recall_prompts:
      - "Proprioception 是什麼？有哪些類型或應用？"
    content: "\n\nProprioceptors are specialized sensory receptors located within joints, muscles, and tendons. Because these receptors are sensitive to pressure and tension, they relay information concerning muscle dynamics to the conscious and subconscious parts of the central nervous system. The brain is thus provided with information concerning kinesthetic sense, or conscious appreciation of the position of body parts with respect to gravity. Most of this proprioceptive information, however, is processed at subconscious levels so we do not have to dedicate conscious activity toward tasks such as maintaining posture or position of body parts.\n\nProprioceptors are specialized sensory receptors that provide the central nervous system with information needed to maintain muscle tone and perform complex coordinated movements.\n\n#### Muscle Spindles\n\nMuscle spindles are proprioceptors that consist of several modified muscle fibers enclosed in a sheath of connective tissue ([figure 1.9](<E6372ch01_d78.xhtml#f1.9>)). These modified fibers, called intrafusal fibers, run parallel to the normal, or extrafusal, fibers. Muscle spindles provide information concerning muscle length and the rate of change in length. When the muscle lengthens, spindles are stretched. This deformation activates the sensory neuron of the spindle, which sends an impulse to the spinal cord, where it synapses (connects) with motor neurons. This results in the activation of motor neurons that innervate the same muscle. Spindles thus indicate the degree to which the muscle must be activated in order to overcome a given resistance. As a load increases, the muscle is stretched to a greater extent, and engagement of muscle spindles results in greater activation of the muscle. Muscles that perform precise movements have many spindles per unit of mass to help ensure exact control of their contractile activity. A simple example of muscle spindle activity is the knee jerk reflex. Tapping on the tendon of the knee extensor muscle group below the patella stretches the muscle spindle fibers. This causes activation of extrafusal muscle fibers in the same muscle. A knee jerk occurs as these fibers actively shorten. This, in turn, shortens the intrafusal fibers and causes their discharge to cease.\n\n**Figure 1.9** Muscle spindle. When a muscle is stretched, deformation of the muscle spindle activates the sensory neuron, which sends an impulse to the spinal cord, where it synapses with a motor neuron, causing the muscle to contract.\n\n![An illustration of a muscle spindle. Signals travel from the intrafusal fiber in the spindle, through the sensory neuron, motor neuron, and extrafusal fiber in muscle spindle.](images/E6372_508026_ebook.jpg)\n\n##### How Can Athletes Improve Force Production?\n\n  * Incorporate phases of training that use heavier loads in order to optimize neural recruitment.\n  * Increase the cross-sectional area of muscles involved in the desired activity.\n  * Perform multimuscle, multijoint exercises that can be done with more explosive actions to optimize fast-twitch muscle recruitment.\n\n#### Golgi Tendon Organs\n\nGolgi tendon organs (GTOs) are proprioceptors located in tendons near the myotendinous junction and are in series, that is, attached end to end, with extrafusal muscle fibers ([figure 1.10](<E6372ch01_d78.xhtml#f1.10>)). Golgi tendon organs are activated when the tendon attached to an active muscle is stretched. As tension in the muscle increases, discharge of the GTOs increases. The sensory neuron of the GTO synapses with an inhibitory interneuron in the spinal cord, which in turn synapses with and inhibits a motor neuron that serves the same muscle. The result is a reduction in tension within the muscle and tendon. Thus, whereas spindles facilitate activation of the muscle, neural input from GTOs inhibits muscle activation. The GTOs’ inhibitory process is thought to provide a mechanism that protects against the development of excessive tension. The effect of GTOs is therefore minimal at low forces; but when an extremely heavy load is placed on the muscle, reflexive inhibition mediated by the GTOs causes the muscle to relax. The ability of the motor cortex to override this inhibition may be one of the fundamental adaptations to heavy resistance training.\n\n**Figure 1.10** Golgi tendon organ (GTO). When an extremely heavy load is placed on the muscle, discharge of the GTO occurs. The sensory neuron of the GTO activates an inhibitory interneuron in the spinal cord, which in turn synapses with and inhibits a motor neuron serving the same muscle.\n\n![An illustration of a Golgi tendon organ. Signals travel from the Golgi tendon organ through sensory neuron, inhibitory interneuron, motor neuron, and muscle spindle attached to a tendon.](images/E6372_508027_ebook.jpg)"

  - id: "ch01-cardiovascular-system"
    title: "Cardiovascular System"
    level: 2
    tags: [cardiovascular, system]
    key_points:
      - "心臟 4 腔：左右心房 + 左右心室，血液單向流動靠瓣膜"
      - "cardiac output (Q) = HR × SV，心輸出量 ≈ 5 L/min 靜止"
      - "心率限制因素：SA node 內在節律 (~100 bpm) + 副交感抑制（vagus）→ 靜止 70 bpm"
      - "動靜脈氧差 (a-vO2 diff) = 動脈血氧 - 混合靜脈血氧，運動時增加"
      - "VO2 max = Q × a-vO2 diff，是有氧能力的上限指標"
      - "動脈血氧含量約 20 ml O2 / 100 ml blood（Hb 15 g/dL × 1.34 ml O2/g）"
      - "The primary roles of the cardiovascular system are to transport nutrients and remove waste and by-products while assisting with maintaining the environment for all the body’s functions."
    recall_prompts:
      - "cardiac output 公式？靜止約多少？"
      - "心率限制的兩個因素？"
      - "a-vO2 diff 是什麼？運動時會增加還是減少？"
      - "VO2 max 公式兩個因子？"
      - "動脈血氧含量約多少 ml/100ml blood？"
      - "Cardiovascular System 的核心概念是什麼？"
    content: "\n\nThe primary roles of the cardiovascular system are to transport nutrients and remove waste and by-products while assisting with maintaining the environment for all the body’s functions. The cardiovascular system plays key roles in the regulation of the body’s acid–base system, fluids, and temperature, as well as a variety of other physiological functions. This section describes the anatomy and physiology of the heart and the blood vessels.\n\n### Heart\n\nThe heart is a muscular organ composed of two interconnected but separate pumps; the right side of the heart pumps blood through the lungs, and the left side pumps blood through the rest of the body. Each pump has two chambers: an atrium and a ventricle ([figure 1.11](<E6372ch01_d78.xhtml#f1.11>)). The right and left atria deliver blood into the right and left ventricles. The right and left ventricles supply the main force for moving blood through the pulmonary and peripheral circulations, respectively ([13](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref13>)).\n\n**Figure 1.11** Structure of the human heart and the course of blood flow through its chambers.\n\n![An illustration of the heart with different structures and the direction of flow of oxygenated and deoxygenated blood.](images/E6372_508028_ebook.jpg)\n\n#### Valves\n\nThe tricuspid valve and mitral valve (bicuspid valve) (collectively called atrioventricular [AV] valves) prevent the flow of blood from the ventricles back into the atria during ventricular contraction (systole). The aortic valve and pulmonary valve (collectively, the semilunar valves) prevent backflow from the aorta and pulmonary arteries into the ventricles during ventricular relaxation (diastole). Each valve opens and closes passively; that is, each closes when a backward pressure gradient pushes blood back against it, opening when a forward pressure gradient forces blood in the forward direction ([13](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref13>)).\n\n#### Conduction System\n\nA specialized electrical conduction system ([figure 1.12](<E6372ch01_d78.xhtml#f1.12>)) controls the mechanical contraction of the heart. The conduction system is composed of\n\n  * the sinoatrial (SA) node—the intrinsic pacemaker—where rhythmic electrical impulses are normally initiated;\n  * the internodal pathways that conduct the impulse from the SA node to the atrioventricular node;\n  * the atrioventricular (AV) node, where the impulse is delayed slightly before passing into the ventricles;\n  * the atrioventricular (AV) bundle, which conducts the impulse to the ventricles; and\n  * the left bundle branch and right bundle branch, which further divide into the Purkinje fibers and conduct impulses to all parts of the ventricles.\n\n**Figure 1.12** The electrical conduction system of the heart.\n\n![An illustration of the electrical conduction system of the heart with S A node, internodal pathways, A V node, Purkinje fibers, left bundle branch, and right bundle branch labeled.](images/E6372_508029_ebook.jpg)\n\nThe SA node is a small area of specialized muscle tissue located in the upper lateral wall of the right atrium. The fibers of the node are contiguous with the muscle fibers of the atrium, with the result that each electrical impulse that begins in the SA node normally spreads immediately into the atria. The conductive system is organized so that the impulse does not travel into the ventricles too rapidly, allowing time for the atria to contract and empty blood into the ventricles before ventricular contraction begins. It is primarily the AV node and its associated conductive fibers that delay each impulse entering into the ventricles. The AV node is located in the posterior septal wall of the right atrium ([13](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref13>)).\n\nThe left and right bundle branches lead from the AV bundle into the ventricles. Except for their initial portion, where they penetrate the AV barrier, these conduction fibers have functional characteristics quite opposite those of the AV nodal fibers. They are large and transmit impulses at a much higher velocity than the AV nodal fibers. Because these fibers give way to the Purkinje fibers, which more completely penetrate the ventricles, the impulse travels quickly throughout the entire ventricular system and causes both ventricles to contract at approximately the same time ([13](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref13>)).\n\nThe SA node normally controls heart rhythmicity because its discharge rate is considerably greater (60-80 times per minute) than that of either the AV node (40-60 times per minute) or the ventricular fibers (15-40 times per minute). Each time the SA node discharges, its impulse is conducted into the AV node and the ventricular fibers, discharging their excitable membranes. Thus, these potentially self-excitatory tissues are discharged before self-excitation can actually occur.\n\nThe inherent rhythmicity and conduction properties of the myocardium (heart muscle) are influenced by the cardiovascular center of the medulla, which transmits signals to the heart through the sympathetic and parasympathetic nervous systems, both of which are components of the autonomic nervous system. The atria are supplied with a large number of both sympathetic and parasympathetic neurons, whereas the ventricles receive sympathetic fibers almost exclusively. Stimulation of the sympathetic nerves accelerates depolarization of the SA node (the chronotropic effect), which causes the heart to beat faster. Stimulation of the parasympathetic nervous system slows the rate of SA node discharge, which slows the heart rate. The resting heart rate normally ranges from 60 to 100 beats/min; fewer than 60 beats/min is called bradycardia, and more than 100 beats/min is called tachycardia.\n\n#### Electrocardiogram\n\nThe electrical activity of the heart can be recorded at the surface of the body; a graphic representation of this activity is called an electrocardiogram (ECG). A normal ECG, seen in [figure 1.13](<E6372ch01_d78.xhtml#f1.13>), is composed of a P-wave, a QRS complex (the QRS complex is often three separate waves: a Q-wave, an R-wave, and an S-wave), and a T-wave. The P-wave and the QRS complex are recordings of electrical depolarization, that is, the electrical stimulus that leads to mechanical contraction. Depolarization is the reversal of the membrane electrical potential, whereby the normally negative potential inside the membrane becomes slightly positive and the outside becomes slightly negative. The P-wave is generated by the changes in the electrical potential of cardiac muscle cells that depolarize the atria and result in atrial contraction. The QRS complex is generated by the electrical potential that depolarizes the ventricles and results in ventricular contraction. In contrast, the T-wave is caused by the electrical potential generated as the ventricles recover from the state of depolarization; this process, called repolarization, occurs in ventricular muscle shortly after depolarization. Although atrial repolarization occurs as well, its wave formation usually occurs during the time of ventricular depolarization and is thus masked by the QRS complex ([13](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref13>)).\n\n**Figure 1.13** Normal electrocardiogram.\n\n![A graph of an electrocardiogram with a short peak labeled P, a dip labeled Q, a tall peak labeled R, a dip labeled S, and a small peak labeled T.](images/E6372_508031_ebook.jpg)\n\n### Blood Vessels\n\nThe central and peripheral circulation form a single closed-circuit system with two components: an arterial system, which carries blood away from the heart, and a venous system, which returns blood toward the heart ([figure 1.14](<E6372ch01_d78.xhtml#f1.14>)). The blood vessels of each system are identified here.\n\n**Figure 1.14** The arterial (right) and venous (left) components of the circulatory system. The percent values indicate the distribution of blood volume throughout the circulatory system at rest.\n\n![An illustration of distribution of blood volume in percent. Heart: 7. Pulmonary circulation: 9. Arteries: 13. Arterioles and capillaries: 7. Veins, venules, and venous sinuses: 64.](images/E6372_508032_ebook.jpg)\n\n#### Arteries\n\nThe function of arteries is to rapidly transport blood pumped from the heart. Because blood pumped from the heart is under relatively high pressure, arteries have strong, muscular walls. Small branches of arteries called arterioles act as control vessels through which blood enters the capillaries. Arterioles play a major role in the regulation of blood flow to the capillaries. Arterioles have strong, muscular walls that are capable of closing the arteriole completely or allowing it to be dilated many times their size, thus vastly altering blood flow to the capillaries in response to the needs of the tissues ([13](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref13>)).\n\n#### Capillaries\n\nThe function of capillaries is to facilitate exchange of oxygen, fluid, nutrients, electrolytes, hormones, and other substances between the blood and the interstitial fluid in the various tissues of the body. The capillary walls are very thin and are permeable to these, but not all, substances ([13](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref13>)).\n\n#### Veins\n\nVenules collect blood from the capillaries and gradually converge into the progressively larger veins, which transport blood back to the heart. Because the pressure in the venous system is very low, venous walls are thin, although muscular. This allows them to constrict or dilate to a great degree and thereby act as a reservoir for blood, either in small or in large amounts ([13](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref13>)). In addition, some veins, such as those in the legs, contain one-way valves that help maintain venous return by preventing retrograde blood flow.\n\n##### What Is the Skeletal Muscle Pump?\n\nThe skeletal muscle pump is the assistance that contracting muscles provide to the circulatory system. The muscle pump works with the venous system, which contains the one-way valves for blood return to the heart. The contracting muscle compresses the veins, but since the blood can flow only in the direction of the valves, it is returned to the heart. This mechanism is one of the reasons that individuals are told to keep moving around after exercise to avoid blood pooling in the lower extremities. On the flip side, it is important to periodically squeeze muscles during prolonged sitting to facilitate blood return to the heart.\n\nThe cardiovascular system transports nutrients and removes waste products while helping to maintain the environment for all the body’s functions. The blood transports oxygen from the lungs to the tissues for use in cellular metabolism; and it transports carbon dioxide, the most abundant by-product of metabolism, from the tissues to the lungs, where it is removed from the body.\n\n### Blood\n\nTwo paramount functions of blood are the transport of oxygen from the lungs to the tissues for use in cellular metabolism and the removal of carbon dioxide, the most abundant by-product of metabolism, from the tissues to the lungs. The transport of oxygen is accomplished by hemoglobin, the iron–protein molecule carried by the red blood cells. Hemoglobin also has an additional important role as an acid–base buffer, a regulator of hydrogen ion concentration, which is crucial to the rates of chemical reactions in cells. Red blood cells, the major component of blood, have other functions as well. For instance, they contain a large quantity of carbonic anhydrase, which catalyzes the reaction between carbon dioxide and water to facilitate carbon dioxide removal."

  - id: "ch01-respiratory-system"
    title: "Respiratory System"
    level: 2
    tags: [respiratory, system]
    key_points:
      - "呼吸道 upper（鼻/咽/喉）vs lower（氣管/支氣管/肺）"
      - "肺泡是 gas exchange 單位，表面積極大 (~70 m²)"
      - "ventilation = tidal volume × respiratory rate，靜止約 6 L/min"
      - "gas exchange 靠 diffusion（Fick's law）：面積↑、距離↓、分壓差↑ → diffusion↑"
      - "O2 從肺泡到血液靠 partial pressure gradient（肺泡 PO2 ≈ 104 mmHg，血液進入肺泡前 PO2 = 40 mmHg）"
      - "CO2 排出也靠 partial pressure（靜脈 PCO2 ≈ 46 mmHg，肺泡 PCO2 = 40 mmHg）"
      - "The primary function of the respiratory system is the basic exchange of oxygen and carbon dioxide."
    recall_prompts:
      - "呼吸道 upper vs lower 各包含哪些？"
      - "肺泡表面積極大約多少 m²？"
      - "ventilation 公式？靜止約多少？"
      - "Fick's law 三個影響 diffusion 的因素？"
      - "肺泡 PO2 vs 靜脈血液 PO2 各約多少 mmHg？"
      - "Respiratory System 的核心概念是什麼？"
    content: "\n\nThe primary function of the respiratory system is the basic exchange of oxygen and carbon dioxide. The anatomy of the human respiratory system is shown in [figure 1.15](<E6372ch01_d78.xhtml#f1.15>). As air passes through the nose, the nasal cavities perform three distinct functions: warming, humidifying, and purifying the air ([13](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref13>)). Air is distributed to the lungs by way of the trachea, bronchi, and bronchioles. The trachea is called the first-generation respiratory passage, and the right and left main bronchi are the second-generation passages; each division thereafter is an additional generation (bronchioles). There are approximately 23 generations before the air finally reaches the alveoli, where gases are exchanged in respiration ([13](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref13>)).\n\n**Figure 1.15** Gross anatomy of the human respiratory system.\n\n![An illustration of the human respiratory system with conchae, pharynx, epiglottis, glottis, larynx, esophagus, trachea, left and right main bronchi, pulmonary artery and vein, alveoli, and bronchiole labeled.](images/E6372_508033_ebook.jpg)\n\nThe primary function of the respiratory system is the basic exchange of oxygen and carbon dioxide.\n\n### Exchange of Air\n\nThe amount and movement of air and expired gases in and out of the lungs are controlled by expansion and recoil of the lungs. The lungs do not actively expand and recoil themselves but rather are acted upon to do so in two ways: by downward and upward movement of the diaphragm to lengthen and shorten the chest cavity and by elevation and depression of the ribs to increase and decrease the back-to-front diameter of the chest cavity ([13](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref13>)). Normal, quiet breathing is accomplished almost entirely by movement of the diaphragm. During inspiration, contraction of the diaphragm creates a negative pressure (vacuum) in the chest cavity, and air is drawn into the lungs. During expiration, the diaphragm simply relaxes; the elastic recoil of the lungs, chest wall, and abdominal structures compresses the lungs, and air is expelled. During heavy breathing, the elastic forces alone are not powerful enough to provide the necessary respiratory response. The extra required force is achieved mainly by contraction of the abdominal muscles, which push the abdomen upward against the bottom of the diaphragm ([13](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref13>)).\n\nThe second method for expanding the lungs is to raise the rib cage. Because the chest cavity is small and the ribs are slanted downward while in the resting position, elevating the rib cage allows the ribs to project almost directly forward so that the sternum can move forward and away from the spine. The muscles that elevate the rib cage are called muscles of inspiration and include the external intercostals, the sternocleidomastoids, the anterior serrati, and the scaleni. The muscles that depress the chest are muscles of expiration and include the abdominal muscles (rectus abdominis, external and internal obliques, and transversus abdominis) and the internal intercostals ([13](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref13>)).\n\n#### How Important Is It to Train the Muscles of Respiration?\n\nRegular exercise in general is beneficial for maintaining respiratory muscle function. Both endurance exercise, which involves repetitive contraction of breathing muscles, and resistance exercise, which taxes the diaphragm and abdominal muscles especially because of their use for stabilization and for increasing intra-abdominal pressure (Valsalva maneuver) during exertion, can result in some muscle training adaptations. This can help to preserve some of the pulmonary function with aging. However, it is generally not necessary to specifically train the muscles of respiration except following surgery or during prolonged bed rest when the normal breathing patterns are compromised.\n\nPleural pressure is the pressure in the narrow space between the lung pleura and the chest wall pleura (membranes enveloping the lungs and lining the chest walls). This pressure is normally slightly negative. Because the lung is an elastic structure, during normal inspiration the expansion of the chest cage is able to pull on the surface of the lungs and creates a more negative pressure, thus enhancing inspiration. During expiration, the events are essentially reversed ([13](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref13>)).\n\nAlveolar pressure is the pressure inside the alveoli when the glottis is open and no air is flowing into or out of the lungs. In fact, in this instance the pressure in all parts of the respiratory tree is the same all the way to the alveoli and is equal to the atmospheric pressure. To cause inward flow of air during inspiration, the pressure in the alveoli must fall to a value slightly below atmospheric pressure. During expiration, alveolar pressure must rise above atmospheric pressure ([13](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref13>)).\n\nDuring normal respiration at rest, only 3% to 5% of the total energy expended by the body is required for pulmonary ventilation. During very heavy exercise, however, the amount of energy required can increase to as much as 8% to 15% of total body energy expenditure, especially if the person has any degree of increased airway resistance, as occurs with exercise-induced asthma. Precautions, including physician evaluation of the athlete, are often recommended, depending on the potential level of impairment.\n\n### Exchange of Respiratory Gases\n\nWith ventilation, oxygen diffuses from the alveoli into the pulmonary blood, and carbon dioxide diffuses from the blood into the alveoli. The process of diffusion is a simple random motion of molecules moving in opposite directions through the alveolar capillary membrane. The energy for diffusion is provided by the kinetic motion of the molecules themselves. Net diffusion of the gas occurs from the region of high concentration to the region of low concentration. The rates of diffusion of the two gases depend on their concentrations in the capillaries and alveoli and the partial pressure of each gas ([13](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref13>)).\n\nAt rest, the partial pressure of oxygen in the alveoli is about 60 mmHg greater than that in the pulmonary capillaries. Thus, oxygen diffuses into the pulmonary capillary blood. Similarly, carbon dioxide diffuses in the opposite direction. This process of gas exchange is so rapid as to be thought of as instantaneous ([13](<E6372RM_Refs_d104_split_001.xhtml#chapter1-ref13>))."

