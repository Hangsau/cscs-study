sections:
  - id: "ch15-fundamentals-of-exercise-technique"
    title: "Fundamentals of Exercise Technique"
    level: 2
    tags: [fundamentals, exercise, technique]
    key_points:
      - "There are several commonalities among resistance training exercise techniques."
    recall_prompts:
      - "Fundamentals of Exercise Technique 的核心概念是什麼？"
    content: "\n\nThere are several commonalities among resistance training exercise techniques. Most free weight and machine exercises involve some sort of handgrip on a bar, dumbbell, or handle; and absolutely all exercises require an optimal body or limb position, movement range and speed, and method of breathing. Additionally, some exercises may also warrant the use of a weight belt and certain procedures for lifting a bar off the floor.\n\n### Handgrips\n\nTwo common grips are used in resistance training exercises: (a) the pronated grip, with palms down and knuckles up, also called the overhand grip; and (b) the supinated grip, with palms up and knuckles down, also known as the underhand grip ([figure 15.1](<E6372ch15_d92.xhtml#f15.1>)). (A variation of either grip is the neutral grip, in which the knuckles point laterally—as in a handshake.) Two less common grips are the alternated grip, in which one hand is in a pronated grip and the other is in a supinated grip, and the hook grip, which is similar to the pronated grip except that the thumb is positioned under the index and middle fingers. The hook grip is typically used for performing exercises that require a stronger grip (power exercises, e.g., snatch). Note that the thumb is wrapped around the bar in all of the grips shown; this positioning is called a closed grip. When the thumb does not wrap around the bar, the grip is called an open or false grip.\n\n**Figure 15.1** Bar grips: _(a)_ pronated, _(b)_ supinated, _(c)_ alternated, and _(d)_ hook (posterior view).\n\n![Four illustrations, a through d, of different bar grips. The four grips are a. Pronated, b. Supinated, c. Alternated, and d. Hook.](images/E6372_508173_ebook.jpg)\n\nEstablishing the proper grip in an exercise involves placing the hands at the correct distance from each other (referred to as the grip width), from the center of the bar (i.e., to maintain balance). The three grip widths (shown in [figure 15.2](<E6372ch15_d92.xhtml#f15.2>)) are common, wide, and narrow. For most exercises, the hands are placed approximately shoulder-width apart. The hand positioning for all exercises should result in a balanced, even bar. Weightlifting exercises and their variations use two types of grips: (a) the clean grip or (b) the snatch grip. Both of these grips are pronated closed hand positions. The clean grip is slightly wider than shoulder-width apart, outside of the knees. The snatch grip is a wide grip and can be determined using two types of measurements: the fist-to-opposite-shoulder method and the elbow-to-elbow method (also known as the scarecrow method). Both the clean grip and the snatch grip are often used with a hook grip (mentioned previously) to assist in giving the athlete a stronger grip.\n\n**Figure 15.2** Grip widths.\n\n![An illustration of three types of grips. Narrow: Between the insides of the grips. Common: At the center of the grips. c. At the outer ends of the grips.](images/E6372_508177_ebook.jpg)\n\n### Stable Body and Limb Positioning\n\nWhether an exercise requires lifting a barbell or dumbbell from the floor or pushing and pulling while one is positioned in or on a machine, establishing a stable position is critical for safety and optimal performance. A stable position enables the athlete to maintain proper body alignment during an exercise, which in turn places an appropriate stress on muscles and joints.\n\nExercises performed during standing typically require that the feet be positioned slightly wider than hip-width with the heels and balls of the feet in contact with the floor. Establishing a stable position in or on machines sometimes requires adjusting the seat or resistance arm and fastening belts snugly.\n\nSeated or supine (lying face up) exercises performed on a bench require a specific posture. The athlete should position the body to achieve a five-point body contact position:\n\n  1. Head is placed firmly on the bench or back pad.\n  2. Shoulders and upper back are placed firmly and evenly on the bench or back pad.\n  3. Buttocks are placed evenly on the bench or seat.\n  4. Right foot is flat on the floor.\n  5. Left foot is flat on the floor.\n\nEstablishing and maintaining this five-point body contact position at the beginning and throughout the movement phases promotes maximal stability and spinal support ([2](<E6372RM_Refs_d104_split_015.xhtml#chapter15-ref2>), [9](<E6372RM_Refs_d104_split_015.xhtml#chapter15-ref9>), [10](<E6372RM_Refs_d104_split_015.xhtml#chapter15-ref10>)).\n\nExercises performed during standing typically require that the feet be positioned slightly wider than hip-width with the heels and balls of the feet in contact with the floor. Seated or supine exercises performed on a bench usually require a five-point body contact position.\n\nCam-, pulley-, or lever-based exercise machines that have an axis of rotation require specific positioning of the athlete’s body, arms, or legs for reasons of safety and optimal execution. To align the primary joint of the body involved in the exercise with the axis of the machine, it may be necessary to move the seat; the ankle or arm roller pad; or the thigh, chest, or back pad. For example, adjust the ankle roller pad (up or down) and the back pad (forward or backward) to line up the knee joint with the machine axis before performing the leg (knee) extension exercise.\n\n### Range of Motion and Speed\n\nWhen the entire range of motion (ROM) is covered during an exercise, the value of the exercise is maximized and flexibility is maintained or improved. Ideally, an exercise’s full ROM should mimic the full ROM of the involved joint or joints in order for the greatest improvements to occur, but sometimes this is not possible (trailing leg knee joint during a lunge) or recommended (using intervertebral joints during a squat).\n\nRepetitions performed in a slow, controlled manner increase the likelihood that full ROM can be reached. However, when power or quick-lift exercises (e.g., power clean, push jerk, and snatch) are performed, an effort should be made to accelerate the bar to a maximal speed while still maintaining control and proper form throughout the exercise.\n\n### Breathing Considerations\n\nThe most strenuous movement of a repetition—typically soon after the transition from the eccentric phase to the concentric phase—is referred to as the sticking point. Strength and conditioning professionals should typically instruct athletes to exhale _through_ the sticking point and to inhale during the less stressful phase of the repetition ([3](<E6372RM_Refs_d104_split_015.xhtml#chapter15-ref3>), [6](<E6372RM_Refs_d104_split_015.xhtml#chapter15-ref6>), [7](<E6372RM_Refs_d104_split_015.xhtml#chapter15-ref7>)). For example, since the sticking point of the biceps curl exercise occurs about midway through the upward movement phase (concentric elbow flexion), the athlete should exhale during this portion. Inhalation, then, should occur as the bar is lowered back to the starting position. This breathing strategy applies to most resistance training exercises.\n\nThere are some situations in which breath holding may be suggested, however. For experienced resistance-trained athletes performing structural exercises (those that load the vertebral column and therefore place stress on it) with high loads, the Valsalva maneuver can be helpful for maintaining proper vertebral alignment and support. As explained in [chapter 2](<E6372ch02_d79.xhtml>), the Valsalva maneuver involves expiring against a closed glottis, which, when combined with contracting the abdomen and rib cage muscles, creates rigid compartments of fluid in the lower torso and air in the upper torso (i.e., the “fluid ball”). The advantage of the Valsalva maneuver is that it increases the rigidity of the entire torso to aid in supporting the vertebral column, which in turn reduces the associated compressive forces on the disks during lifting ([1](<E6372RM_Refs_d104_split_015.xhtml#chapter15-ref1>), [4](<E6372RM_Refs_d104_split_015.xhtml#chapter15-ref4>), [5](<E6372RM_Refs_d104_split_015.xhtml#chapter15-ref5>), [8](<E6372RM_Refs_d104_split_015.xhtml#chapter15-ref8>)). It also helps to establish and maintain a normal lordotic lumbar spine position (also called a neutral spine) and erect upper torso position, described in the technique checklists for certain exercises. Be aware, however, that the resulting increase in intra-abdominal pressure has potentially detrimental side effects, such as dizziness, disorientation, excessively high blood pressure, and blackouts. This is why the breath-holding phase is—and should be—quite transient, only about 1 to 2 seconds (at most). Even a very well-trained individual should not extend the length of the breath-holding phase, as blood pressure can quickly rise to triple resting levels ([7](<E6372RM_Refs_d104_split_015.xhtml#chapter15-ref7>)).\n\nStrength and conditioning professionals involved in conducting 1-repetition maximum (1RM) tests in, for example, the squat, deadlift, hip sled, leg press, shoulder press, or power clean, need to be aware of the advantages and disadvantages of coaching athletes in the Valsalva maneuver. While it is obviously important that the vertebral column be internally supported during these movements for safety and technique reasons, it is recommended that an athlete not extend the breath-holding period.\n\nFor most exercises, exhale through the sticking point of the concentric phase and inhale during the eccentric phase. Experienced and well-trained athletes may want to use the Valsalva maneuver when performing structural exercises to assist in maintaining proper vertebral alignment and support ([6](<E6372RM_Refs_d104_split_015.xhtml#chapter15-ref6>)).\n\n### Weight Belts\n\nThe use of a weight belt may help maintain intra-abdominal pressure during lifting ([5](<E6372RM_Refs_d104_split_015.xhtml#chapter15-ref5>), [7](<E6372RM_Refs_d104_split_015.xhtml#chapter15-ref7>)). Its appropriateness depends on the type of exercise performed and the relative load lifted. It is recommended that a weight belt be worn for exercises that place stress on the lower back and during sets that use near-maximal or maximal loads. Adopting this strategy may reduce the risk of lower back injury when combined with proper lifting and spotting techniques. A drawback to weight belt use is that wearing a belt too often reduces opportunities for the abdominal muscles to be trained. Furthermore, no weight belt is needed for exercises that do not stress the lower back (e.g., biceps curl, lat pulldown), or for exercises that do stress the lower back (e.g., back squat or deadlift) but involve the use of light loads.\n\nTypically an athlete should wear a weight belt when performing exercises that place stress on the lower back and during sets that involve near-maximal or maximal loads. A weight belt is not needed for exercises that do not stress the lower back or for those that do stress the lower back but involve light loads."

  - id: "ch15-spotting-free-weight-exercises"
    title: "Spotting Free Weight Exercises"
    level: 2
    tags: [spotting, free, weight, exercises]
    key_points:
      - "A spotter is someone who assists in the execution of an exercise to help protect the athlete from injury."
    recall_prompts:
      - "Spotting Free Weight Exercises 的核心概念是什麼？"
    content: "\n\nA spotter is someone who assists in the execution of an exercise to help protect the athlete from injury. A spotter may also serve to motivate the athlete and help in the completion of forced repetitions (also referred to as partner-assisted reps), but the spotter’s primary responsibility is the safety of the athlete being spotted. The spotter must realize that poor execution of this responsibility may result in serious injury, not only to the athlete being spotted, but also to the spotter and other individuals in close proximity. Although partner-assisted actions are valuable in helping an athlete benefit from training, the importance of promoting safety cannot be overemphasized.\n\nThe remainder of this section offers additional insight on when and how to spot free weight exercises. This information provides a foundation for strength and conditioning professionals to apply to their specific training environment.\n\n### Types of Exercises Performed and Equipment Involved\n\nFree weight exercises performed over the head (e.g., barbell shoulder press) or with the bar on the back (e.g., back squat), racked anteriorly on the shoulders or on the clavicles (e.g., front squat) or over the face (e.g., bench press, lying triceps extension), are more challenging for the athlete to correctly execute than those in which the bar or dumbbells are held or raised at the sides or in front (e.g., lateral shoulder raise or barbell biceps curl, respectively) and therefore should involve one or more spotters. The overhead, bar-on-the-back or bar-on-the-front-shoulders and over-the-face exercises (especially using dumbbells) also require more skill on the part of the spotter and are potentially the most dangerous to the athlete. Spotting dumbbell exercises typically requires more skill than spotting barbell exercises because there is an additional piece of equipment to observe and spot. Power exercises should not be spotted.\n\nWith the exception of power exercises, free weight exercises performed with a bar moving over the head, positioned on the back, racked on the front of the shoulders, or passing over the face typically require one or more spotters.\n\n#### Spotting Overhead Exercises and Those With the Bar on the Back or Front Shoulders\n\nIdeally, to promote the safety of the athlete, the spotters, and others nearby, overhead exercises and those involving the bar on the back or front shoulders should be performed inside a power rack with the crossbars in place at an appropriate height. All plates, bars, locks, and weight-plate trees must be cleared from the lifting area so they cannot be tripped over or run into and cannot affect the movement of the bar. Athletes who are not lifting should be instructed to stay clear of the lifting area. Since the loads lifted in these exercises can be considerable, to exert sufficient leverage the spotter or spotters should be at least as strong and at least as tall as the athlete who is lifting. Out-of-the-rack exercises (e.g., forward step lunge or step-up) with heavy weights can result in serious injury. These exercises should be executed only by well-trained and skilled athletes and spotted by experienced professionals.\n\n#### Spotting Over-the-Face Exercises\n\nWhen spotting over-the-face barbell exercises, it is important for the spotter to grasp the bar with an alternated grip, usually narrower than the athlete’s grip. Because of the bar’s curved trajectory in some exercises (e.g., lying triceps extension, barbell pullover), the spotter will use an alternated grip to pick up the bar and return it to the floor but choose to use a supinated grip to spot the bar (although this is not required). This helps ensure that the bar does not roll out of the spotter’s hands and onto the athlete’s face or neck. Since the spotter may be called upon to catch the bar or assist in lifting moderate to heavy loads (usually from a higher vantage point), establishing a solid, wide base of support with the feet and a neutral spine position is critically important.\n\nFor dumbbell exercises, it is important to spot as close to the dumbbells as possible or, in a few exercises, to spot the dumbbell itself. Although some individuals advocate spotting dumbbell movements by placing the hands on the athlete’s upper arms or elbows ([figure 15.3 _a_](<E6372ch15_d92.xhtml#f15.3>)), this technique may lead to injury. If the athlete’s elbows “collapse” (i.e., flex), the spotter will not be in a position to stop the dumbbells from striking the athlete’s face or chest. Spotting at the forearms near the wrists ([figure 15.3 _b_](<E6372ch15_d92.xhtml#f15.3>)) is a safer technique. Note that for some exercises (e.g., dumbbell pullover and overhead dumbbell triceps extension), it is necessary to spot with hands on the dumbbell itself.\n\n**Figure 15.3**  _(a)_ Incorrect dumbbell spotting location. _(b)_ Correct spotting location.\n\n![An athlete leans on a bench and lifts dumbbells above their head. Their partner spots them by grasping their forearms.](images/E6372_0757P_0857_ebook.jpg)\n\n![An athlete leans on a bench and lifts dumbbells above their head. Their partner spots them by grasping their wrists.](images/E6372_0757P_0863_ebook.jpg)\n\n#### Do Not Spot Power Exercises\n\nWhereas spotting is recommended in the types of exercises previously described, it is not advised in power exercises. Instead of spotting these exercises, the strength and conditioning professional needs to teach athletes how to get away from a bar that is unmanageable. Spotting these types of exercises is too dangerous to both the spotter and athlete. Athletes should be instructed that when they miss the bar in front, they should push the bar away or simply drop it. They should be taught that if they lose the bar behind the head, they should release it and jump forward. For these reasons, the surrounding area or platform should be cleared of other athletes and equipment before such exercises are performed.\n\n### Number of Spotters\n\nThe number of spotters needed is largely determined by the load being lifted, the experience and ability of the athlete and spotters, and the physical strength of the spotters. With heavier loads, the likelihood and severity of an injury increase. Once the load exceeds the spotter’s ability to effectively protect the athlete (and him- or herself), another spotter must become involved. On the other hand, one spotter is preferred if he or she can easily handle the load, because two or more spotters must coordinate their actions with those of the athlete. As the number of spotters increases, so does the chance that an error in timing or technique may occur.\n\n### Communication Between Athlete and Spotter\n\nCommunication is the responsibility of both the spotter and the athlete. Before beginning a set, the athlete should tell the spotter how the bar will initially be handled, how many repetitions will be performed, and when he or she is ready to move the bar into position. If spotters do not have this information they may take control of the bar improperly, too soon, or too late and consequently disrupt the exercise or injure the athlete.\n\n#### Use of a Liftoff\n\nThe term liftoff refers to moving the bar from the upright supports to a position in which the athlete can begin the exercise. Usually the spotter helps place the barbell or dumbbells into the athlete’s hands while the elbows are extended and helps to move the barbell or dumbbells to the proper starting position. Some athletes may want the spotter to provide a liftoff; others do not. If a liftoff is needed or requested, the athlete and spotter need to agree in advance on a verbal signal (e.g., the command “up” or “I will give it to you on the count of three”). Typically, the athlete signals that he or she is ready; the spotter says, “One, two, three,” and on “three” the bar is moved into position. Liftoffs are normally used in the bench press (off the supports), shoulder press (off the supports or the shoulders), and squatting exercises if the supports are too low and nonadjustable. When two spotters are involved and the athlete wants a liftoff, as with a bench press, one spotter should assist with the liftoff and then quickly move to the end of the bar to spot (the other spotter is already at the other end). The spotter providing the liftoff must be sure that the athlete has complete control of the bar at the conclusion of the liftoff. If two spotters are used, both should help the athlete place the bar back onto the supports on completion of the exercise.\n\n#### Amount and Timing of Spotting Assistance\n\nKnowing how much and when to help an athlete is an important aspect of spotting, and it requires the spotter to be experienced in proper spotting techniques. Most athletes typically need just enough help to successfully complete a repetition through a sticking point (i.e., a partner-assisted action); other times they might need the spotter to handle the entire load. At the first indication that a repetition will be missed, the athlete should quickly ask or signal the spotter (sometimes with just a grunt or sound) for help, and the spotter needs to immediately attempt to provide the amount of assistance needed. If the athlete cannot contribute anything to the completion of the repetition, the athlete should immediately tell the spotter to “take it” or use some other phrase agreed upon before the lift. Regardless of when or why the spotter is needed to assist, he or she should take the bar—if possible—from the athlete quickly and smoothly, trying to avoid abrupt changes in the amount of load being handled by the athlete. The athlete should try to stay with the bar until it is racked or placed safely on the floor. This helps to protect both the spotter and athlete from injury.\n\nThe spotting guidelines provided in the exercise technique checklists are appropriate for a typical training environment. Spotting procedures may vary when excessively heavy loads are being used—such as 1RM attempts—because more spotters are typically needed.\n\n##### Guidelines for Spotting\n\nCertain exercises that require spotting (over the face-neck and on the back) have a higher level of difficulty and thus warrant additional safety considerations. In any exercise where the potential for injury might occur, spotting should be used.\n\n  * Spotting is necessary on skillful multijoint exercises that involve a barbell or dumbbells being lifted over the head, on the back, on the front of the shoulders, or over the face.\n  * Exercises done overhead and with a bar racked on the back or in front of the shoulders may require more than one spotter, and multiple spotters must be taught how and where to spot the exercise.\n  * Spotting over-the-face exercises requires the spotter to grasp the implement being lifted or the athlete’s wrists. Spotters must be trained to grasp the implement properly and even assist athletes in reracking the bar or returning dumbbells to the start position in case an exercise becomes too difficult to complete safely on their own.\n  * Power exercises are not spotted due to the safety factors for the athlete and the spotter(s), and athletes should be taught “how to miss” properly when learning these exercises.\n  * Determining the number of spotters for certain exercises depends on a number of factors, especially the amount of load being used, because the likelihood of injury can increase greatly with heavier loads.\n  * Both spotters and athletes must communicate properly before beginning an exercise requiring increased safety. They both must take part in this communication and be clear as to what exercise is being performed and how many repetitions. Therefore, communicating on exercises that require a liftoff is critical to safety in these exercises.\n  * The liftoff requires a spotter to assist the athlete in getting the implement(s) to the proper position before beginning the exercise and can require multiple spotters, depending on the exercise.\n\nThe spotting guidelines provided in this chapter should be a fundamental part of any strength and conditioning professional’s training. Safety of athletes in the weight room is the most important part of supervising and conducting proper training programs and providing the best and safest atmosphere for athletes to be successful in training."

  - id: "ch15-curl-up"
    title: "Conclusion / Curl-Up"
    level: 3
    tags: [conclusion, curl]
    key_points:
      - "Starting Position"
    recall_prompts:
      - "Curl-Up 是什麼？有哪些類型或應用？"
    content: "\n\nStarting Position\n\n  * Lie in a supine position on a floor mat.\n  * Flex the knees to bring the heels near the buttocks.\n  * Fold the arms across the chest or abdomen.\n  * All repetitions begin from this position.\n\nUpward Movement Phase\n\n  * Flex the neck to move the chin toward the chest.\n  * Keeping the feet, buttocks, and lower back neutral and stationary on the mat, curl the torso toward the thighs until the upper back is off the mat. \n\nDownward Movement Phase\n\n  * Uncurl the torso back to the starting position.\n  * Keep the feet, buttocks, lower back, and arms in the same position.\n\nMajor Muscle Involved\n\nrectus abdominis\n\nStarting position\n\n![An athlete lies on their back with their knees bent and crosses their arms on their chest.](images/E6372_0757P_0736_ebook.jpg)\n\nUpward and downward movements\n\n![An athlete lies on their back with their knees bent, crosses their arms on their chest, and curls their torso forward.](images/E6372_0757P_0738_ebook.jpg)\n\n15.2"

  - id: "ch15-abdominal-crunch"
    title: "Conclusion / Abdominal Crunch"
    level: 3
    tags: [conclusion, abdominal, crunch]
    key_points:
      - "Starting Position"
    recall_prompts:
      - "Abdominal Crunch 是什麼？有哪些類型或應用？"
    content: "\n\nStarting Position\n\n  * Lie in a supine position on a floor mat.\n  * Place the heels on a bench with the hips and knees flexed to about 90°.\n  * Fold the arms across the chest or abdomen.\n  * All repetitions begin from this position.\n\nUpward Movement Phase\n\n  * Flex the neck to move the chin toward the chest.\n  * Keeping the buttocks and lower back neutral and stationary on the mat, curl the torso toward the thighs until the upper back is off the mat. \n\nDownward Movement Phase\n\n  * Uncurl the torso back to the starting position.\n  * Keep the feet, buttocks, lower back, and arms in the same position.\n\nMajor Muscle Involved\n\nrectus abdominis\n\nStarting position\n\n![An athlete lies on their back with their knees bent and their legs over a bench and crosses their arms on their chest.](images/E6372_0757P_0746_ebook.jpg)\n\nUpward and downward movements\n\n![An athlete lies on their back with their knees bent and their legs over a bench, crosses their arms on their chest, and curls their torso forward.](images/E6372_0757P_0748_ebook.jpg)\n\n15.3"

  - id: "ch15-abdominal-crunch-machine"
    title: "Conclusion / Abdominal Crunch (Machine)"
    level: 3
    tags: [conclusion, abdominal, crunch, machine]
    key_points:
      - "Starting Position"
    recall_prompts:
      - "Abdominal Crunch (Machine) 是什麼？有哪些類型或應用？"
    content: "\n\nStarting Position\n\n  * Sit down on the machine and press the back firmly against the back pad.\n  * Place the feet on the floor and the legs behind the roller pads.\n  * Position the legs parallel to each other.\n  * Reach back and grasp the handles with a closed, neutral grip with the back of the upper arms pressed against the arms pads.\n  * All repetitions begin from this position.\n\nForward Movement Phase\n\n  * Keeping the buttocks on the seat and the legs stationary, curl the torso forward toward the thighs.\n\nBackward Movement Phase\n\n  * Uncurl the torso back to the starting position.\n  * Keep the feet, buttocks, lower back, and arms in the same position.\n\nMajor Muscle Involved\n\nrectus abdominis\n\nStarting position\n\n![An athlete sits in an abdominal crunch machine, with their shins tucked behind roller pads and the back of their forearms resting against the arm pads.](images/E6372_0768P_0054_ebook.jpg)\n\nForward and backward movements\n\n![An athlete sits in an abdominal crunch machine and curls their body forward by holding the handle and pulling forward.](images/E6372_0768P_0056_ebook.jpg)\n\nBack \n\n15.4"

  - id: "ch15-bent-over-row"
    title: "Conclusion / Bent-Over Row"
    level: 3
    tags: [conclusion, bent, over]
    key_points:
      - "Before Beginning"
    recall_prompts:
      - "Bent-Over Row 是什麼？有哪些類型或應用？"
    content: "\n\nBefore Beginning\n\n  * Grasp the bar with a closed, pronated grip.\n  * Grip should be wider than shoulder-width.\n  * Lift the bar from the floor as described for the deadlift exercise. Use a pronated grip, not an alternated grip.\n\nStarting Position\n\n  * Position the feet in a shoulder-width stance with the knees slightly flexed.\n  * Flex forward at the hips so the torso is slightly above parallel to the floor.\n  * Create a neutral spine position.\n  * Focus the eyes a short distance ahead of the feet.\n  * Allow the bar to hang with the elbows fully extended.\n  * All repetitions begin from this position.\n\nUpward Movement Phase\n\n  * Pull the bar toward the torso.\n  * Keep the torso rigid, back neutral, and knees slightly flexed.\n  * Do not jerk the torso upward.\n  * Touch the bar to the lower chest or upper abdomen.\n\nDownward Movement Phase\n\n  * Lower the bar back to the starting position.\n  * Maintain the neutral spine and stationary torso and knee positions.\n  * At the end of the set, flex the hips and knees to place the bar on the floor and stand up.\n\nMajor Muscles Involved\n\nlatissimus dorsi, teres major, middle trapezius, rhomboids, posterior deltoids\n\nStarting position\n\n![An athlete bends forward with the knees slightly bent and grips a barbell.](images/E6372_0757P_1160_ebook.jpg)\n\nUpward and downward movements\n\n![An athlete bends forward with the knees slightly bent and lifts a barbell to their thighs.](images/E6372_0757P_1162_ebook.jpg)\n\n15.5"

  - id: "ch15-one-arm-dumbbell-row"
    title: "Conclusion / One-Arm Dumbbell Row"
    level: 3
    tags: [conclusion, dumbbell]
    key_points:
      - "Starting Position"
    recall_prompts:
      - "One-Arm Dumbbell Row 是什麼？有哪些類型或應用？"
    content: "\n\nStarting Position\n\n  * Position the feet in a shoulder-width stance with the knees slightly flexed.\n  * Flex forward at the hips so the torso is slightly above parallel to the floor.\n  * Create a neutral spine position.\n  * Grasp the dumbbell with a closed, neutral grip.\n  * Place the opposite hand on the bench for support.\n  * Allow the dumbbell to hang with the elbow fully extended.\n  * All repetitions begin from this position.\n\nUpward Movement Phase\n\n  * Pull the dumbbell toward the torso, keeping the elbow close to the body.\n  * Keep the torso rigid, back neutral, and knees slightly flexed.\n  * Touch the dumbbell to the side of the torso.\n\nDownward Movement Phase\n\n  * Lower the dumbbell back to the starting position.\n  * Maintain the neutral spine and stationary torso and flexed knee positions.\n\nMajor Muscles Involved\n\nlatissimus dorsi, teres major, middle trapezius, rhomboids, posterior deltoids\n\nStarting position\n\n![An athlete bends forward with the knees slightly bent, presses one arm over a bench, and holds a dumbbell in the other hand.](images/E6372_0757P_0821_ebook.jpg)\n\nUpward and downward movements\n\n![An athlete bends forward with the knees slightly bent, presses one arm over a bench, and lifts and lowers a dumbbell in the other hand.](images/E6372_0757P_0824_ebook.jpg)\n\n15.6"

