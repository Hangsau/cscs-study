    recall_prompts:
      - "Incline Dumbbell Bench Press (and Barbell Variation) 是什麼？有哪些類型或應用？"
    content: "\n\nThis exercise can also be performed with a barbell, using a closed, pronated grip slightly wider than shoulder-width. When using a barbell, the spotter assists by spotting the bar instead of the forearms near the athlete’s wrists. \n\nStarting Position: Athlete\n\n  * Grasp two dumbbells using a closed, pronated grip.\n  * Lie in a supine position on an incline bench in the five-point body contact position.\n  * Signal the spotter for assistance in moving the dumbbells into the starting position.\n  * Press the dumbbells in unison to an extended-elbow, parallel-arm position above the head and face.\n  * All repetitions begin from this position.\n\nStarting Position: Spotter\n\n  * Stand erect and very close to the head of the bench (but do not distract the athlete).\n  * Place the feet shoulder-width apart with the knees slightly flexed.\n  * Grasp the athlete’s forearms near the wrists.\n  * At the athlete’s signal, assist with moving the dumbbells to a position over the athlete’s head and face.\n  * Release the athlete’s forearms smoothly.\n\nDownward Movement Phase: Athlete\n\n  * Lower the dumbbells down and slightly out to be near the armpits and in line with the upper one-third area of the chest (between the clavicles and the nipples). \n  * Keep the wrists stiff and directly above the elbows, with the dumbbell handles aligned with each other.\n  * Maintain the five-point body contact position.\n  * Do not arch the back or raise the chest to meet the dumbbells.\n\nDownward Movement Phase: Spotter\n\n  * Keep the hands near—but not touching—the athlete’s forearms near the wrists as the dumbbells descend.\n  * Slightly flex the knees, hips, and torso and keep the back neutral when following the dumbbells.\n\nUpward Movement Phase: Athlete\n\n  * Push the dumbbells upward at the same rate and very slightly toward each other until the elbows are fully extended.\n  * Keep the wrists stiff and directly above the elbows, with the dumbbell handles aligned with each other.\n  * Maintain the five-point body contact position.\n\nUpward Movement Phase: Spotter\n\n  * Keep the hands near—but not touching—the athlete’s forearms near the wrists as the dumbbells ascend.\n  * Slightly extend the knees, hips, and torso and keep the back neutral when following the dumbbells.\n\nMajor Muscles Involved\n\npectoralis major, anterior deltoids, triceps brachii\n\nStarting positions\n\n![An athlete leans on a bench and lifts dumbbells above their head. Their spotter grasps their hands near their wrists.](images/E6372_0757P_0871_ebook.jpg)\n\nDownward and upward movements\n\n![An athlete leans on a bench and lowers dumbbells on either side of their chest. Their spotter grasps their hands near their wrists.](images/E6372_0757P_0874_ebook.jpg)\n\n15.15"

  - id: "ch15-flat-dumbbell-fly-and-incline-variation"
