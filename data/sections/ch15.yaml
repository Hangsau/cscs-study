    content: "\n\nStarting Position\n\n  * Sit on the end of a bench.\n  * Grasp the bar with a closed, supinated grip about hip- to shoulder-width apart.\n  * Position the feet and legs parallel to each other with the toes pointing straight ahead.\n  * Lean the torso forward and place the elbows and forearms on the top of the thighs.\n  * Move the wrists forward until they extend slightly beyond the patellae.\n  * Allow the wrists to extend and the hands to open so that the fingertips hold the bar.\n\nUpward Movement Phase\n\n  * Raise the bar by flexing the fingers and then the wrists.\n  * Flex the wrists as far as possible without moving the elbows or forearms.\n  * Do not jerk the shoulders backward or swing the bar upward.\n\nDownward Movement Phase\n\n  * Allow the wrists and fingers to slowly extend back to the starting position.\n  * Keep the torso and arms in the same position.\n\nMajor Muscles Involved\n\nflexor carpi ulnaris, flexor carpi radialis, palmaris longus\n\nStarting position\n\n![An athlete sits on the edge of a bench and holds a barbell in a loose position with their wrists stretched and outward.](images/E6372_0757P_0834_ebook.jpg)\n\nUpward and downward movements\n\n![An athlete sits on the edge of a bench and curls a barbell in their hands such that their wrists are bent and outward.](images/E6372_0757P_0835_ebook.jpg)\n\n15.19"

