  - id: "ch15-flat-barbell-bench-press-and-dumbbell-va"
    title: "Conclusion / Flat Barbell Bench Press (and Dumbbell Variation)"
    level: 3
    tags: [conclusion, flat, barbell, bench, press, dumbbell]
    key_points:
      - "This exercise can also be performed with two dumbbells, using a closed, pronated grip."
    recall_prompts:
      - "Flat Barbell Bench Press (and Dumbbell Variation) 是什麼？有哪些類型或應用？"
    content: "\n\nThis exercise can also be performed with two dumbbells, using a closed, pronated grip. When using dumbbells, the spotter assists by spotting the athlete’s forearms near the wrists instead of the bar. \n\nStarting Position: Athlete\n\n  * Lie in a supine position on a bench in the five-point body contact position.\n  * Place the body on the bench so that the eyes are below the racked bar.\n  * Grasp the bar with a closed, pronated grip slightly wider than shoulder-width apart.\n  * Signal the spotter for assistance in moving the bar off the supports.\n  * Position the bar over the chest with the elbows fully extended.\n  * All repetitions begin from this position.\n\nStarting Position: Spotter\n\n  * Stand erect and very close to the head of the bench (but do not distract the athlete).\n  * Place the feet shoulder-width apart with the knees slightly flexed.\n  * Grasp the bar with a closed, alternated grip inside the athlete’s hands.\n  * At the athlete’s signal, assist with moving the bar off the supports.\n  * Guide the bar to a position over the athlete’s chest.\n  * Release the bar smoothly.\n\nDownward Movement Phase: Athlete\n\n  * Lower the bar to touch the chest at approximately nipple level.\n  * Keep the wrists stiff and the forearms perpendicular to the floor and parallel to each other.\n  * Maintain the five-point body contact position.\n\nDownward Movement Phase: Spotter\n\n  * Keep the hands in the alternated grip position close to—but not touching—the bar as it descends.\n  * Slightly flex the knees, hips, and torso and keep the back neutral when following the bar.\n\nUpward Movement Phase: Athlete\n\n  * Push the bar upward and very slightly backward until the elbows are fully extended.\n  * Keep the wrists stiff and the forearms perpendicular to the floor and parallel to each other.\n  * Maintain the five-point body contact position.\n  * Do not arch the back or raise the chest to meet the bar.\n  * At the end of the set, signal the spotter for assistance in racking the bar.\n  * Keep a grip on the bar until it is racked.\n\nUpward Movement Phase: Spotter\n\n  * Keep the hands in the alternated grip position close to—but not touching—the bar as it ascends.\n  * Slightly extend the knees, hips, and torso and keep the back neutral when following the bar.\n  * At the athlete’s signal, grasp the bar with an alternated grip inside the athlete’s hands.\n  * Guide the bar back onto the supports.\n  * Keep a grip on the bar until it is racked.\n\nMajor Muscles Involved\n\npectoralis major, anterior deltoids, triceps brachii\n\nLiftoff\n\n![An athlete lies on their back on a bench with their legs hanging and bent at the knees. They grasp a barbell and lift it off a rack. A spotter grasps the bar.](images/E6372_0757P_1349_ebook.jpg)\n\nStarting positions\n\n![An athlete lies on their back on a bench and lifts a barbell above their head by stretching their arms. A spotter’s hand is close to the bar.](images/E6372_0757P_1351_ebook.jpg)\n\nDownward movements\n\n![An athlete lies on their back and lowers a barbell toward their chest by bending their arms. A spotter’s hand is close to the bar.](images/E6372_0757P_1352_ebook.jpg)\n\nUpward movements\n\n![An athlete lies on their back on a bench and lifts a barbell above their head by stretching their arms. A spotter’s hand is close to the bar.](images/E6372_0757P_1354_ebook.jpg)\n\nRacking the bar\n\n![An athlete lies on their back on a bench and racks the bar in its place. A spotter holds the bar.](images/E6372_0757P_1358_ebook.jpg)\n\n15.14"

  - id: "ch15-incline-dumbbell-bench-press-and-barbell"
    title: "Conclusion / Incline Dumbbell Bench Press (and Barbell Variation)"
