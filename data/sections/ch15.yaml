    key_points:
      - "Starting Position"
    recall_prompts:
      - "Seated Leg (Knee) Curl (Machine) 是什麼？有哪些類型或應用？"
    content: "\n\nStarting Position\n\n  * Sit down in the machine and press the back firmly against the back pad.\n  * Place the ankles on top of and in contact with the roller pad.\n  * Position the legs parallel to each other.\n  * Align the knees with the axis of the machine. If necessary, adjust the back pad to position the legs correctly.\n  * Grasp the handles or the sides of the seat.\n  * All repetitions begin from this position.\n\nDownward Movement Phase\n\n  * Curl the roller pad below the seat by fully flexing the knees.\n  * Keep the torso stationary and the hips and torso firmly pressed against the pads.\n  * Do not allow the hips or low back to lift off the pads.\n  * Maintain a tight grip on the handles or the sides of the seat.\n\nUpward Movement Phase\n\n  * Allow the knees to slowly extend back to the starting position.\n  * Keep the torso stationary and the hips and low back firmly pressed against the pads.\n  * Maintain a tight grip on the handles or the sides of the seat.\n  * Do not forcefully lock out the knees.\n\nMajor Muscles Involved\n\nsemimembranosus, semitendinosus, biceps femoris\n\nStarting position\n\n![An athlete sits in a seated leg or knee curl machine. Their legs are stretched, and their ankles are resting on a roller pad.](images/E6372_0756P_0249_ebook.jpg)\n\nDownward and upward movements\n\n![An athlete sits in a seated leg or knee curl machine. Their legs are bent, and their ankles push the roller pad back.](images/E6372_0756P_0252_ebook.jpg)\n\nShoulders \n\n15.31"

  - id: "ch15-shoulder-press-machine"
    title: "Conclusion / Shoulder Press (Machine)"
    level: 3
    tags: [conclusion, shoulder, press, machine]
    key_points:
      - "Starting Position"
    recall_prompts:
      - "Shoulder Press (Machine) 是什麼？有哪些類型或應用？"
    content: "\n\nStarting Position\n\n  * Sit down and lean back to place the body in the five-point body contact position.\n  * Grasp the handles with a closed, pronated grip.\n  * Align the handles with the top of the shoulders. If necessary, adjust the seat height to position the handles correctly.\n\nUpward Movement Phase\n\n  * Push the handles upward until the elbows are fully extended.\n  * Maintain the five-point body contact position.\n  * Do not arch the lower back or forcefully lock out the elbows.\n\nDownward Movement Phase\n\n  * Allow the elbows to slowly flex to lower the handles to the starting position.\n  * Maintain the five-point body contact position.\n\nMajor Muscles Involved\n\nanterior and medial deltoids, triceps brachii\n\nStarting position\n\n![An athlete sits in a shoulder press machine. They grasp the handles on either side of their shoulders.](images/E6372_0756P_0239_ebook.jpg)\n\nUpward and downward movements\n\n![An athlete sits in a shoulder press machine. They lift the handles of the machine above their head.](images/E6372_0756P_0242_ebook.jpg)\n\n15.32"

  - id: "ch15-seated-barbell-shoulder-press-and-dumbbe"
    title: "Conclusion / Seated Barbell Shoulder Press (and Dumbbell Variation)"
    level: 3
    tags: [conclusion, seated, barbell, shoulder, press, dumbbell]
    key_points:
      - "This exercise can also be performed with two dumbbells, using a closed, pronated grip."
    recall_prompts:
      - "Seated Barbell Shoulder Press (and Dumbbell Variation) 是什麼？有哪些類型或應用？"
    content: "\n\nThis exercise can also be performed with two dumbbells, using a closed, pronated grip. When using dumbbells, the spotter assists by spotting the athlete’s forearms near the wrists instead of the bar. \n\nStarting Position: Athlete\n\n  * Sit down on a vertical shoulder press bench and lean back to place the body in the five-point body contact position.\n  * Grasp the bar with a closed, pronated grip.\n  * Grip should be slightly wider than shoulder-width.\n  * Signal the spotter for assistance in moving the bar off the supports.\n  * Press the bar over the head until the elbows are fully extended.\n  * All repetitions begin from this position.\n\nStarting Position: Spotter\n\n  * Stand erect behind the bench with the feet shoulder-width apart and the knees slightly flexed.\n  * Grasp the bar with a closed, alternated grip inside the athlete’s hands.\n  * At the athlete’s signal, assist with moving the bar off the supports.\n  * Guide the bar to a position over the athlete’s head.\n  * Release the bar smoothly.\n\nDownward Movement Phase: Athlete\n\n  * Allow the elbows to slowly flex to lower the bar.\n  * Keep the wrists stiff and the forearms parallel to each other.\n  * Extend the neck slightly to allow the bar to pass by the face as it is lowered to touch the clavicles and anterior deltoids.\n  * Maintain the five-point body contact position.\n\nDownward Movement Phase: Spotter\n\n  * Keep the hands in the alternated grip position close to—but not touching—the bar as it descends.\n  * Keep the knees slightly flexed and the back neutral when following the bar.\n\nUpward Movement Phase: Athlete\n\n  * Push the bar upward until the elbows are fully extended.\n  * Extend the neck slightly to allow the bar to pass by the face as it is raised.\n  * Keep the wrists stiff and the forearms parallel to each other.\n  * Maintain the five-point body contact position.\n  * Do not arch the back or rise off the seat.\n  * At the end of the set, signal the spotter for assistance in racking the bar.\n  * Keep a grip on the bar until it is racked.\n\nUpward Movement Phase: Spotter\n\n  * Keep the hands in the alternated grip position close to—but not touching—the bar as it ascends.\n  * Slightly extend the knees, hips, and torso and keep the back neutral when following the bar.\n  * At the athlete’s signal after the set is completed, grasp the bar with an alternated grip inside the athlete’s hands.\n  * Guide the bar back onto the supports.\n  * Keep a grip on the bar until it is racked.\n\nMajor Muscles Involved\n\nanterior and medial deltoids, triceps brachii\n\nStarting positions\n\n![An athlete sits on a bench and raises a barbell over their head. A spotter stands behind them, ready to grab the bar.](images/E6372_0757P_1305_ebook.jpg)\n\nDownward and upward movements\n\n![An athlete sits on a bench and rests a barbell on their clavicle. A spotter stands behind them, ready to grab the bar.](images/E6372_0757P_1307_ebook.jpg)\n\n15.33"

  - id: "ch15-upright-row"
    title: "Conclusion / Upright Row"
    level: 3
    tags: [conclusion, upright]
    key_points:
      - "Starting Position"
    recall_prompts:
      - "Upright Row 是什麼？有哪些類型或應用？"
    content: "\n\nStarting Position\n\n  * Grasp the bar with a closed, pronated grip approximately shoulder-width apart or slightly wider.\n  * Stand erect with feet shoulder-width apart, knees slightly flexed.\n  * Rest the bar on the front of the thighs with the elbows fully extended and pointing out to the sides.\n\nUpward Movement Phase\n\n  * Pull the bar up along the abdomen and chest toward the chin.\n  * Keep the elbows pointed out to the sides as the bar brushes against the body.\n  * Keep the torso and knees in the same position.\n  * Do not rise up on the toes or swing the bar upward.\n  * At the highest bar position, the elbows should be level with or slightly higher than the shoulders and wrists.\n\nDownward Movement Phase\n\n  * Allow the bar to slowly descend back to the starting position.\n  * Keep the torso and knees in the same position.\n\nMajor Muscles Involved\n\ndeltoids, upper trapezius\n\nStarting position\n\n![An athlete holds a barbell with a clean grip close to their upper thighs.](images/E6372_0757P_1143_ebook.jpg)\n\nUpward and downward movements\n\n![An athlete lifts a barbell with a clean grip up to their chest.](images/E6372_0757P_1145_ebook.jpg)\n\n15.34"

  - id: "ch15-lateral-shoulder-raise"
    title: "Conclusion / Lateral Shoulder Raise"
    level: 3
    tags: [conclusion, lateral, shoulder, raise]
    key_points:
      - "Starting Position"
    recall_prompts:
      - "Lateral Shoulder Raise 是什麼？有哪些類型或應用？"
    content: "\n\nStarting Position\n\n  * Grasp two dumbbells with a closed, neutral grip.\n  * Position the feet shoulder- or hip-width apart, with the knees slightly flexed, torso erect, shoulders back, and eyes focused ahead. \n  * Move the dumbbells to the front of the thighs, positioning them with the palms facing each other.\n  * Slightly flex the elbows and hold this flexed position throughout the exercise. (Note: The elbows should be slightly more flexed than what is seen in the photos and the video clip.) \n\nUpward Movement Phase\n\n  * Raise the dumbbells up and out to the sides; the elbows and upper arms should rise together ahead of the forearms, hands, and dumbbells. \n  * Maintain an erect upper body position with the knees slightly flexed and feet flat.\n  * Do not jerk the body or swing the dumbbells upward.\n  * Continue raising the dumbbells until the arms are approximately parallel to the floor or nearly level with the shoulders.\n\nDownward Movement Phase\n\n  * Allow the dumbbells to descend slowly back to the starting position.\n  * Keep the torso and knees in the same position.\n\nMajor Muscles Involved\n\ndeltoids\n\nStarting position\n\n![An athlete holds a dumbbell in each hand in front of them. ](images/E6372_0757P_1090_ebook.jpg)\n\nUpward and downward movements\n\n![An athlete raises the dumbbells sideways to their shoulders.](images/E6372_0757P_1093_ebook.jpg)\n\nTriceps \n\n15.35"

  - id: "ch15-lying-barbell-triceps-extension"
    title: "Conclusion / Lying Barbell Triceps Extension"
    level: 3
    tags: [conclusion, lying, barbell, triceps, extension]
    key_points:
      - "Starting Position: Athlete"
    recall_prompts:
      - "Lying Barbell Triceps Extension 是什麼？有哪些類型或應用？"
    content: "\n\nStarting Position: Athlete\n\n  * Lie in a supine position on a bench in the five-point body contact position.\n  * Grasp the bar from the spotter with a closed, pronated grip about 12 inches (30 cm) wide.\n  * Position the bar over the chest with the elbows fully extended and the arms parallel.\n  * Point the elbows toward the knees (not out to the sides).\n  * All repetitions begin from this position.\n\nStarting Position: Spotter\n\n  * Stand erect and very close to the head of the bench (but do not distract the athlete).\n  * Place the feet shoulder-width apart in a staggered stance with the knees slightly flexed.\n  * Grasp the bar with a closed, alternated grip.\n  * Hand the bar to the athlete.\n  * Guide the bar to a position over the athlete’s chest.\n  * Release the bar smoothly.\n\nDownward Movement Phase: Athlete\n\n  * Keeping the upper arms stationary, allow the elbows to slowly flex to lower the bar toward the face.\n  * Keep the wrists stiff and the upper arms perpendicular to the floor and parallel to each other.\n  * Lower the bar until it almost touches the head or face.\n  * Maintain the five-point body contact position.\n\nDownward Movement Phase: Spotter\n\n  * Place the hands close to—but not touching—the bar as it descends.\n  * Slightly flex the knees, hips, and torso and keep the back neutral when following the bar.\n\nUpward Movement Phase: Athlete\n\n  * Push the bar upward by extending the elbows back to the starting position.\n  * Keep the wrists stiff and the elbows pointed toward the knees.\n  * Keep the upper arms parallel to each other and perpendicular to the floor.\n  * Maintain the five-point body contact position.\n  * At the end of the set, signal the spotter to take the bar.\n  * Keep a grip on the bar until the spotter removes it.\n\nUpward Movement Phase: Spotter\n\n  * Keep the hands close to—but not touching—the bar as it ascends.\n  * Slightly extend the knees, hips, and torso and keep the back neutral when following the bar.\n  * At the athlete’s signal after the set is completed, grasp the bar with an alternated grip, take it from the athlete, and set it on the floor. \n\nMajor Muscle Involved\n\ntriceps brachii\n\nStarting positions\n\n![An athlete lies on a bench and holds a barbell above their chest. A spotter positions their hands under the ends of the barbell.](images/E6372_0757P_0851_ebook.jpg)\n\nDownward and upward movements\n\n![An athlete lies on a bench and lowers a barbell over their face with their elbows bent. A spotter positions their hands under the ends of the barbell.](images/E6372_0757P_0853_ebook.jpg)\n\n15.36"

  - id: "ch15-triceps-pushdown-machine"
    title: "Conclusion / Triceps Pushdown (Machine)"
    level: 3
    tags: [conclusion, triceps, pushdown, machine]
    key_points:
      - "Starting Position"
    recall_prompts:
      - "Triceps Pushdown (Machine) 是什麼？有哪些類型或應用？"
    content: "\n\nStarting Position\n\n  * Grasp the bar with a closed, pronated grip 6 to 12 inches (15-30 cm) wide.\n  * Stand erect with feet shoulder-width apart, knees slightly flexed. Place the body close enough to the machine to allow the cable to hang straight down when it is held in the starting position. \n  * Pull the bar down to position the upper arms against the sides of the torso.\n  * Flex the elbows to position the forearms parallel to the floor or slightly above.\n  * All repetitions begin from this position.\n\nDownward Movement Phase\n\n  * Push the bar down until the elbows are fully extended.\n  * Keep the torso erect and the upper arms stationary.\n  * Do not forcefully lock out the elbows.\n\nUpward Movement Phase\n\n  * Allow the elbows to slowly flex back to the starting position.\n  * Keep the torso, arms, and knees in the same position.\n  * At the end of the set, return the bar to its resting position.\n\nMajor Muscles Involved\n\ntriceps brachii\n\nStarting position\n\n![An athlete bends their knees slightly, stands in front of a triceps pushdown machine, and holds the handle of the machine.](images/E6372_0756P_0721_ebook.jpg)\n\nDownward and upward movements\n\n![An athlete bends their knees slightly, stands in front of a triceps pushdown machine, and pulls down the handle of the machine with a straight back.](images/E6372_0756P_0722_ebook.jpg)\n\nPower Exercises \n\n15.37"

  - id: "ch15-push-press"
    title: "Conclusion / Push Press"
    level: 3
    tags: [conclusion, push, press]
    key_points:
      - "This exercise consists of quickly and forcefully pushing the bar from the shoulders to over the head."
    recall_prompts:
      - "Push Press 是什麼？有哪些類型或應用？"
    content: "\n\nThis exercise consists of quickly and forcefully pushing the bar from the shoulders to over the head. Although the ascent consists of two phases, the upward movement of the bar occurs in one continuous motion without interruption. Both the push press and the push jerk exercises involve a rapid hip and knee extension that accelerates the bar off the shoulders, followed immediately by movements that position the bar overhead. The technique used to attain this final bar position varies, however. In the push press, the hip and knee extension thrust is only forceful enough to drive the bar one-half to two-thirds the distance overhead. From this height, the bar is “pressed out” to the overhead position, with the hips and knees remaining fully extended after the thrust. \n\nFor either exercise, the athlete can begin with a bar taken from shoulder-height supports outside a power rack or by lifting a bar from the floor to the shoulders (via a repetition of the power clean exercise). Both exercises may be performed behind the neck using either a clean grip or a snatch grip. The following checklists describe the exercises using a power rack (although the rack is not shown). \n\nStarting Position\n\n  * Grasp the bar with a closed, pronated grip.\n  * Grip should be slightly wider than shoulder-width (clean grip).\n  * Step under the bar and position the feet hip-width apart and parallel to each other.\n  * Move up to the bar to place it on top of the anterior deltoids and clavicles.\n  * Extend the hips and knees to lift the bar off the supports.\n  * Step back away from the supports and stand in the middle of the lifting platform.\n  * Position the feet hip- to shoulder-width apart and even with each other with the toes pointed slightly outward.\n  * All repetitions begin from this position.\n\nPreparation Phase: Dip\n\n  * Flex the hips and knees at a controlled speed to move the bar in a straight path downward.\n  * Continue the dip to a depth not to exceed a quarter squat, the catch position of the power clean, or 10% of the athlete’s height. \n  * Keep the feet flat on the floor, the torso erect, and the elbows underneath or slightly ahead of the bar.\n\nUpward Movement Phase: Drive\n\n  * Immediately upon reaching the lowest position of the dip, reverse the movement by forcefully and quickly extending the hips, knees, and ankles and then the elbows to move the bar overhead. \n\nCatch (for the Push Press)\n\n  * After the hips and knees are fully extended and the bar is overhead from the drive phase, press it up the rest of the way until the elbows are fully extended. \n  * In this position the torso is erect, the head is in a neutral position, the feet are flat on the floor, and the bar is slightly over or behind the ears. \n\nDownward Movement Phase\n\n  * Lower the bar by gradually reducing the muscular tension of the arms to allow a controlled descent of the bar to the shoulders.\n  * Simultaneously flex the hips and knees to cushion the impact of the bar on the shoulders.\n  * At the end of the set, step toward the rack and place the bar in the supports.\n\nMajor Muscles Involved\n\ngluteus maximus, semimembranosus, semitendinosus, biceps femoris, vastus lateralis, vastus intermedius, vastus medialis, rectus femoris, soleus, gastrocnemius, deltoids, trapezius \n\nStarting position\n\n![An athlete holds a barbell with a clean grip on the anterior deltoid and clavicle.](images/E6372_0757P_1675_ebook.jpg)\n\nDip\n\n![An athlete holds a barbell with a clean grip on the anterior deltoid and clavicle and bends their knees slightly.](images/E6372_0757P_1678_ebook.jpg)\n\nDrive\n\n![An athlete begins lifting a bar with a clean grip over their head and stands on their toes.](images/E6372_0757P_1679_ebook.jpg)\n\nCatch (for the push press)\n\n![An athlete lifts a barbell with a clean grip over their head and stands on their feet.](images/E6372_0757P_1682_ebook.jpg)\n\n15.38"

  - id: "ch15-push-jerk"
    title: "Conclusion / Push Jerk"
    level: 3
    tags: [conclusion, push, jerk]
    key_points:
      - "The push jerk involves a more forceful hip and knee thrust so that the bar is actually “driven” upward and caught with extended elbows in the overhead position with the hips and knees slightly flexed."
    recall_prompts:
      - "Push Jerk 是什麼？有哪些類型或應用？"
    content: "\n\nThe push jerk involves a more forceful hip and knee thrust so that the bar is actually “driven” upward and caught with extended elbows in the overhead position with the hips and knees slightly flexed. \n\nStarting Position\n\n  * Grasp the bar with a closed, pronated grip.\n  * Grip should be slightly wider than shoulder-width (clean grip).\n  * Step under the bar and position the feet hip- to shoulder-width apart and parallel to each other.\n  * Move close to the bar so that it is resting on the anterior deltoids and clavicles.\n  * Extend the hips and knees to lift the bar out of the supports.\n  * Step back away from the supports and stand in the middle of the lifting platform.\n  * Position the feet hip-width apart or slightly wider with toes pointed straight ahead or slightly outward.\n  * All repetitions begin from this position.\n\nPreparation Phase: Dip\n\n  * Flex the hips and knees at a controlled speed to move the bar in a straight path downward.\n  * Continue the dip to a depth not to exceed a quarter squat.\n  * Keep the feet flat on the floor, the torso erect, and the elbows underneath or slightly ahead of the bar.\n\nUpward Movement Phase: Drive\n\n  * Immediately upon reaching the lowest position of the dip, reverse the movement by forcefully and quickly extending the hips, knees, and ankles, and then the elbows to move the bar overhead. \n\nCatch (for the Push Jerk)\n\n  * After the hips and knees are fully extended and the bar is being driven overhead, quickly flex the hips and knees to a dipped position while simultaneously fully extending the elbows so that the bar is received overhead at the same moment that the bar reaches its highest position. \n  * Catch the bar with the torso erect, the head in neutral position, feet flat on the floor, and the bar slightly behind the head, forming a straight line through the body. \n\nRecovery Phase\n\n  * After gaining control and balance, stand up by extending the hips and knees to a fully erect position with the feet flat on the floor. \n  * Keep the elbows locked while the bar is stabilized overhead.\n\nDownward Movement Phase\n\n  * Lower the bar by gradually reducing the muscular tension of the arms to allow a controlled descent of the bar to the shoulders.\n  * Simultaneously flex the hips and knees to cushion the impact of the bar on the shoulders.\n  * At the end of the set, step toward the rack and place the bar in the supports.\n\nMajor Muscles Involved\n\ngluteus maximus, semimembranosus, semitendinosus, biceps femoris, vastus lateralis, vastus intermedius, vastus medialis, rectus femoris, soleus, gastrocnemius, deltoids, trapezius \n\nStarting position\n\n![An athlete holds a barbell with a clean grip on the anterior deltoid and clavicle.](images/E6372_0757P_1684_ebook.jpg)\n\nDip\n\n![An athlete holds a barbell with a clean grip on the anterior deltoid and clavicle and bends their knees slightly.](images/E6372_0757P_1685_ebook.jpg)\n\nDrive\n\n![An athlete begins lifting a bar with a clean grip over their head and stands on their toes.](images/E6372_0757P_1687_ebook.jpg)\n\nCatch (for the push jerk)\n\n![An athlete lifts a barbell with a clean grip over their head and bends their knees slightly.](images/E6372_0757P_1691_ebook.jpg)\n\nRecovery position\n\n![An athlete lifts a barbell with a clean grip over their head and stands on their feet.](images/E6372_0757P_1692_ebook.jpg)\n\n15.39"

