      - "Starting Position"
    recall_prompts:
      - "Hip Sled (Machine) 是什麼？有哪些類型或應用？"
    content: "\n\nStarting Position\n\n  * Sit in the machine with the lower back, hips, and buttocks pressed against their pads.\n  * Place the feet flat on the platform hip-width apart with the toes slightly angled out.\n  * Position the legs parallel to each other.\n  * Grasp the handles or the sides of the seat and move the hips and knees to a fully extended position, but do not forcefully lock the knees. \n  * Keep the hips on the seat and the back pressed firmly and evenly against the back pad.\n  * Remove the support mechanism from the foot platform and grasp the handles or the seat again.\n  * All repetitions begin from this position.\n\nDownward Movement Phase\n\n  * Allow the hips and knees to slowly flex to lower the platform.\n  * Do not allow the platform to lower rapidly.\n  * Keep the hips and buttocks on the seat and the back pressed firmly and evenly against the back pad.\n  * Keep the knees aligned over the feet as they flex.\n  * Allow the hips and knees to flex until the thighs are parallel to the foot platform.\n  * Do not allow the buttocks to lose contact with the seat, the hips to roll off the back pad, or the heels to rise off the foot platform. \n\nUpward Movement Phase\n\n  * Push the platform up by extending the hips and knees.\n  * Push to a fully extended position, but do not forcefully lock out the knees.\n  * Maintain the same hip and back position; do not allow the buttocks to rise.\n  * Keep the knees aligned over the feet as they extend.\n  * At the end of the set, return the supports to the starting position, remove the feet, and exit the machine.\n\nMajor Muscles Involved\n\ngluteus maximus, semimembranosus, semitendinosus, biceps femoris, vastus lateralis, vastus intermedius, vastus medialis, rectus femoris \n\nFoot position\n\n![The feet on the platform of hip sled machine are hip-width apart.](images/E6372_0757P_3904_ebook.jpg)\n\nStarting position\n\n![An athlete is on a hip sled machine with their legs stretched and the feet placed on a platform. Their torso rests on an inclined plane.](images/E6372_0757P_3910_ebook.jpg)\n\nDownward and upward movements\n\n![An athlete is on a hip sled machine with their legs bent at the knees and the feet placed on a platform. Their torso rests on an inclined plane.](images/E6372_0757P_3912_ebook.jpg)\n\n15.21"

  - id: "ch15-back-squat"
    title: "Conclusion / Back Squat"
    level: 3
    tags: [conclusion, back, squat]
    key_points:
      - "Starting Position: Athlete"
    recall_prompts:
      - "Back Squat 是什麼？有哪些類型或應用？"
    content: "\n\nStarting Position: Athlete\n\n  * Grasp the bar with a closed, pronated grip (actual width depends on the bar position).\n  * Step under the bar and position the feet parallel to each other.\n  * Place the bar in a balanced position on the upper back and shoulders in one of two locations: \n    1. _Low bar position—_ across the posterior deltoids at the middle of the trapezius (using a handgrip wider than shoulder-width) \n    2. _High bar position—_ above the posterior deltoids at the base of the neck (using a handgrip only slightly wider than shoulder-width) \n  * Lift the elbows up to create a “shelf” for the bar using the upper back and shoulder muscles.\n  * Hold the chest up and out.\n  * Tilt the head slightly up.\n  * Once in position, signal the spotters for assistance in moving the bar off the supports.\n  * Extend the hips and knees to lift the bar.\n  * Take one or two steps backward.\n  * Position the feet shoulder-width apart (or wider), even with each other, with the toes pointed slightly outward.\n  * All repetitions begin from this position.\n\nStarting Position: Two Spotters\n\n  * Stand erect at opposite ends of the bar with the feet shoulder-width apart and the knees slightly flexed.\n  * Grasp the end of the bar by wrapping the hands around the bar with the thumbs crossed and palms facing the barbell.\n  * At the athlete’s signal, assist with lifting and balancing the bar as it is moved off the supports.\n  * Release the bar smoothly.\n  * Hold the hands 2 to 3 inches (5-8 cm) below the ends of the bar.\n  * Move sideways in unison with the athlete as the athlete moves backward.\n  * Once the athlete is in position, get into a shoulder-width stance with the knees slightly flexed and the torso erect.\n\nDownward Movement Phase: Athlete\n\n  * Maintain a position with the back neutral, elbows high, and the chest up and out.\n  * Allow the hips and knees to slowly flex while keeping the torso-to-floor angle relatively constant.\n  * Keep the heels on the floor and the knees aligned over the feet.\n  * Continue flexing the hips and knees until the tops of the thighs are parallel to the floor, the trunk begins to round or flex forward, or the heels rise off the floor. \n\nDownward Movement Phase: Two Spotters\n\n  * Keep the thumbs crossed and hands close to—but not touching—the bar as it descends.\n  * Slightly flex the knees, hips, and torso to keep a neutral spine position when following the bar.\n\nUpward Movement Phase: Athlete\n\n  * Maintain a position with neutral spine, high elbows, and the chest up and out.\n  * Extend the hips and knees at the same rate (to keep the torso-to-floor angle constant).\n  * Keep the heels on the floor and the knees aligned over the feet.\n  * Do not flex the torso forward or round the back.\n  * Continue extending the hips and knees to reach the starting position.\n  * At the end of the set, step forward toward the rack.\n  * Squat down until the bar rests on the supports.\n\nUpward Movement Phase: Two Spotters\n\n  * Keep the thumbs crossed and hands close to—but not touching—the bar as it ascends.\n  * Slightly extend the knees, hips, and torso and keep the back neutral when following the bar.\n  * At the end of the set, move sideways in unison with the athlete back to the rack.\n  * Simultaneously grasp the bar and assist with balancing the bar as it is racked.\n  * Release the bar smoothly.\n\nMajor Muscles Involved\n\ngluteus maximus, semimembranosus, semitendinosus, biceps femoris, vastus lateralis, vastus intermedius, vastus medialis, rectus femoris \n\nHigh bar position\n\n![An athlete holds a barbell low on their shoulders and neck.](images/E6372_0757P_1439_ebook.jpg)\n\nLow bar position\n\n![An athlete holds a barbell high on their shoulders and neck.](images/E6372_0757P_1436_ebook.jpg)\n\nStarting positions with high bar position\n\n![An athlete holds a barbell with a high bar position and stands upright. Two spotters stand on either side of the athlete with their hands nearly touching the barbell.](images/E6372_0757P_1443_ebook.jpg)\n\nDownward movement positions\n\n![An athlete holds a barbell with a high bar position and squats. Two spotters squat on either side of the athlete with their hands nearly touching the barbell.](images/E6372_0757P_1445_ebook.jpg)\n\nLowest squat position\n\n![An athlete holds a barbell with a high bar position and squats low, close to the ground.](images/E6372_0757P_1471_ebook.jpg)\n\nUpward movement positions\n\n![An athlete holds a barbell with a high bar position and stands upright again. Two spotters stand on either side of the athlete with their hands nearly touching the barbell.](images/E6372_0757P_1447_ebook.jpg)\n\nRacking the bar\n\n![An athlete holds a barbell with a high bar position and racks it. Two spotters stand on either side of the athlete and hold the ends of the barbell.](images/E6372_0757P_1449_ebook.jpg)\n\n15.22"

