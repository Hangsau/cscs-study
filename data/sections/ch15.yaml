    content: "\n\nStarting Position\n\n  * Grasp the bar with a closed, pronated grip.\n  * Grip should be wider than shoulder-width.\n  * Sit down on the seat facing the machine.\n  * Position the thighs under the pads with the feet flat on the floor. If necessary, adjust the seat and thigh pad.\n  * Lean the torso slightly backward.\n  * Extend the elbows fully.\n  * All repetitions begin from this position.\n\nDownward Movement Phase\n\n  * Pull the bar down and toward the upper chest.\n  * Maintain the slight torso backward lean; do not jerk the torso backward.\n  * Touch the bar to the clavicle and upper chest area.\n\nUpward Movement Phase\n\n  * Allow the elbows to slowly extend back to the starting position.\n  * Keep the torso in the same position.\n  * At the end of the set, stand up and return the bar to its resting position.\n\nMajor Muscles Involved\n\nlatissimus dorsi, teres major, middle trapezius, rhomboids, posterior deltoids\n\nStarting position\n\n![An athlete sits in a lat pulldown machine with their back straight and thighs under a roller pad. They hold a bar above their head.](images/E6372_0756P_0735_ebook.jpg)\n\nDownward and upward movements\n\n![An athlete sits in a lat pulldown machine with their back straight and thighs under a roller pad. They pull a bar downward toward their chest.](images/E6372_0756P_0736_ebook.jpg)\n\n15.7"

