    content: "\n\nStarting Position: Athlete\n\n  * Step under the bar and position the feet parallel to each other.\n  * Place the hands on the bar in one of two arm positions:\n\n  * Hold the chest up and out.\n  * Tilt the head slightly up.\n  * Once in position, signal the spotter for assistance in moving the bar off the supports.\n  * Extend the hips and knees to lift the bar.\n  * Take one or two steps backward.\n  * Position the feet shoulder-width apart (or wider), even with each other, with the toes pointed slightly outward.\n  * All repetitions begin from this position.\n\nStarting Position: Two Spotters\n\n  * Stand erect at opposite ends of the bar with the feet shoulder-width apart and the knees slightly flexed.\n  * Grasp the end of the bar by wrapping the hands around the bar with the thumbs crossed and palms facing the barbell.\n  * At the athlete’s signal, assist with lifting and balancing the bar as it is moved off the supports.\n  * Release the bar smoothly.\n  * Hold the hands 2 to 3 inches (5-8 cm) below the ends of the bar.\n  * Move sideways in unison with the athlete as the athlete moves backward.\n  * Once the athlete is in position, get into a shoulder-width stance with the knees slightly flexed and the torso erect.\n\nDownward Movement Phase: Athlete\n\n  * Maintain a position with the back neutral, elbows high, and the chest up and out.\n  * Allow the hips and knees to slowly flex while keeping the torso-to-floor angle relatively constant.\n  * Keep the heels on the floor and the knees aligned over the feet.\n  * Do not flex the torso forward or round the back.\n  * Continue flexing the hips and knees until the tops of the thighs are parallel to the floor, the trunk begins to round or flex forward, or the heels rise off the floor. \n\nDownward Movement Phase: Two Spotters\n\n  * Keep the thumbs crossed and hands close to—but not touching—the bar as it descends.\n  * Slightly flex the knees, hips, and torso and keep the back neutral when following the bar.\n\nUpward Movement Phase: Athlete\n\n  * Maintain a position with the back neutral, elbows high, and the chest up and out.\n  * Extend the hips and knees at the same rate (to keep the torso-to-floor angle constant).\n  * Keep the heels on the floor and the knees aligned over the feet.\n  * Do not flex the torso forward or round the back.\n  * Continue extending the hips and knees to reach the starting position.\n  * At the end of the set, step forward toward the rack.\n  * Squat down until the bar rests on the supports.\n\nUpward Movement Phase: Two Spotters\n\n  * Keep the thumbs crossed and hands close to—but not touching—the bar as it ascends.\n  * Slightly extend the knees, hips, and torso and keep the back neutral when following the bar.\n  * At the end of the set, move sideways in unison with the athlete back to the rack.\n  * Simultaneously grasp the bar and assist with balancing the bar as it is placed back on the supports.\n  * Release the bar smoothly.\n\nMajor Muscles Involved\n\ngluteus maximus, semimembranosus, semitendinosus, biceps femoris, vastus lateralis, vastus intermedius, vastus medialis, rectus femoris \n\nParallel-arm position\n\n![An athlete bends their arms and holds a barbell between the forearm and the upper arm.](images/E6372_0757P_1424_ebook.jpg)\n\nCrossed-arm position\n\n![An athlete crosses their arms in front of them and holds a barbell between their arms.](images/E6372_0757P_1426_ebook.jpg)\n\nStarting positions with parallel-arm position\n\n![An athlete holds a barbell with a parallel-arm position and stands upright. Two spotters stand on either side of the athlete with their hands nearly touching the barbell.](images/E6372_0757P_1391_ebook.jpg)\n\nDownward movement positions\n\n![An athlete holds a barbell with a parallel-arm position and squats. Two spotters squat on either side of the athlete with their hands nearly touching the barbell.](images/E6372_0757P_1393_ebook.jpg)\n\nLowest squat position \n\n![An athlete holds a barbell with a parallel-arm position and squats low, close to the ground.](images/E6372_0757P_1419_ebook.jpg)\n\nUpward movement positions\n\n![An athlete holds a barbell with a parallel-arm position and stands upright again. Two spotters stand on either side of the athlete with their hands nearly touching the barbell.](images/E6372_0757P_1396_ebook.jpg)\n\nRacking the bar\n\n![An athlete holds a barbell with a parallel-arm position and racks it. Two spotters stand on either side of the athlete and hold the ends of the barbell.](images/E6372_0757P_1397_ebook.jpg)\n\n15.23"

  - id: "ch15-forward-step-lunge"
    title: "Conclusion / Forward Step Lunge"
    level: 3
    tags: [conclusion, forward, step, lunge]
    key_points:
      - "This exercise can also be performed with two dumbbells, using a closed, neutral grip."
    recall_prompts:
      - "Forward Step Lunge 是什麼？有哪些類型或應用？"
    content: "\n\nThis exercise can also be performed with two dumbbells, using a closed, neutral grip. The athlete allows the dumbbells to hang at arm’s length alongside the body throughout the exercise. When using dumbbells, the spotter assists the athlete in the same manner as in the barbell version, although the task of helping the athlete rack the bar is not applicable. (_Note:_ This exercise cannot be performed inside a typical power rack. The use of a tiered squat rack or a power rack that has supports on the outside is recommended. To allow an optimal view of the exercise technique, a rack is not shown in the photos.) \n\nStarting Position: Athlete\n\n  * Step under the bar and position the feet parallel to each other.\n  * Grasp the bar with a closed, pronated grip.\n  * Place the bar in a balanced position on the upper back and shoulders above the posterior deltoids at the base of the neck (using a handgrip only slightly wider than shoulder-width). \n  * Lift the elbows up to create a “shelf” for the bar using the upper back and shoulder muscles.\n  * Hold the chest up and out.\n  * Tilt the head slightly up.\n  * Once in position, signal the spotter for assistance in moving the bar off the supports.\n  * Extend the hips and knees to lift the bar.\n  * Take two or three steps backward.\n  * All repetitions begin from this position.\n\nStarting Position: Spotter\n\n  * Stand erect and very close to the athlete (but do not distract the athlete).\n  * Place the feet shoulder-width apart with the knees slightly flexed.\n  * At the athlete’s signal, assist with lifting and balancing the bar as it is moved out of the rack.\n  * Move in unison with the athlete as the athlete moves backward to the starting position.\n  * Once the athlete is in position, get into a hip-width stance with the knees slightly flexed and the torso erect.\n  * Position the hands near the athlete’s hips, waist, or torso.\n\nForward Movement Phase: Athlete\n\n  * Take one exaggerated step directly forward with one leg (the lead leg).\n  * Keep the torso erect as the lead foot moves forward and contacts the floor.\n  * Keep the trailing foot in the starting position, but allow the trailing knee to slightly flex.\n  * Plant the lead foot flat on the floor pointing straight ahead or slightly inward.\n  * Allow the lead hip and knee to flex slowly.\n  * Keep the lead knee directly over the lead foot.\n  * Continue to flex the trailing knee until it is 1 to 2 inches (3-5 cm) above the floor.\n  * Balance the weight evenly between the ball of the trailing foot and the whole lead foot.\n  * Keep the torso perpendicular to the floor by “sitting back” on the trailing leg.\n\nForward Movement Phase: Spotter\n\n  * Step forward with the same lead leg as the athlete.\n  * Keep the lead knee and foot aligned with the athlete’s lead foot.\n  * Plant the lead foot 12 to 18 inches (30-46 cm) behind the athlete’s lead foot.\n  * Flex the lead knee as the athlete’s lead knee flexes.\n  * Keep the torso erect.\n  * Keep the hands near the athlete’s hips, waist, or torso.\n  * Assist only when necessary to keep the athlete balanced.\n\nBackward Movement Phase: Athlete\n\n  * Forcefully push off the floor by extending the lead hip and knee.\n  * Maintain the same erect torso position; do not jerk the upper body backward.\n  * Bring the lead foot back to a position next to the trailing foot; do not stutter-step backward.\n  * Stand erect in the starting position, pause, and then alternate lead legs for the next repetition.\n  * At the end of the set, step toward the rack and place the bar in the supports.\n\nBackward Movement Phase: Spotter\n\n  * Push backward with the lead leg in unison with the athlete.\n  * Bring the lead foot back to a position next to the trailing foot; do not stutter-step backward.\n  * Keep hands near the athlete’s hips, waist, or torso.\n  * Stand erect in the starting position, pause to wait for the athlete, and alternate lead legs for the next repetition.\n  * Assist only when necessary to keep the athlete balanced.\n  * At the end of the set, help the athlete rack the bar.\n\nMajor Muscles Involved\n\ngluteus maximus, semimembranosus, semitendinosus, biceps femoris, vastus lateralis, vastus intermedius, vastus medialis, rectus femoris, iliopsoas \n\nStarting positions\n\n![An athlete holds a barbell on their shoulders. Their spotter holds their hips.](images/E6372_0757P_1212_ebook.jpg)\n\nBeginning of forward movement positions\n\n![An athlete holds a barbell on their shoulders, bends their left knee, and stretches their right leg behind them. Their spotter holds their hips and assumes the same position.](images/E6372_0757P_1214_ebook.jpg)\n\nCompletion of forward movement positions\n\n![An athlete holds a barbell on their shoulders and gets on their right knee. Their spotter holds their hips and bends their legs slightly behind them.](images/E6372_0757P_1217_ebook.jpg)\n\nMiddle of backward movement positions\n\n![An athlete holds a barbell on their shoulders, bends their left knee, and stretches their right leg behind them. Their spotter holds their hips and assumes the same position.](images/E6372_0757P_1215_ebook.jpg)\n\n15.24"

  - id: "ch15-step-up"
    title: "Conclusion / Step-Up"
    level: 3
    tags: [conclusion, step]
    key_points:
      - "_Note:_ The box used should be 12 to 18 inches (30-46 cm) high, or high enough to create a 90° angle at the knee joint when the foot is on the box."
    recall_prompts:
      - "Step-Up 是什麼？有哪些類型或應用？"
    content: "\n\n_Note:_ The box used should be 12 to 18 inches (30-46 cm) high, or high enough to create a 90° angle at the knee joint when the foot is on the box. To allow an optimal view of the exercise technique, a rack is not shown in the photos. \n\nStarting Position: Athlete\n\n  * Grasp the bar with a closed, pronated grip.\n  * Step under the bar and position the feet parallel to each other.\n  * Place the bar in a balanced position on the upper back and shoulders above the posterior deltoids at the base of the neck (using a handgrip only slightly wider than shoulder-width). \n  * Lift the elbows up to create a “shelf” for the bar using the upper back and shoulder muscles.\n  * Hold the chest up and out.\n  * Tilt the head slightly up.\n  * Once in position, signal the spotter for assistance in moving the bar off the supports.\n  * Extend the hips and knees to lift the bar.\n  * Move to a spot near the front of the box.\n  * All repetitions begin from this position.\n\nStarting Position: Spotter\n\n  * Stand erect and very close to the athlete (but do not distract the athlete).\n  * Place the feet shoulder-width apart with the knees slightly flexed.\n  * At the athlete’s signal, assist with lifting and balancing the bar as it is moved out of the rack.\n  * Move in unison with the athlete as the athlete moves to the starting position.\n  * Once the athlete is in position, get into a hip-width stance with the knees slightly flexed and the torso erect.\n  * Position the hands near the athlete’s hips, waist, or torso.\n\nUpward Movement Phase: Athlete\n\n  * Step up with one leg (the lead leg) to place the entire foot on the top of the box.\n  * Keep the torso erect; do not lean forward.\n  * Keep the trailing foot in the starting position, but shift the body weight to the lead leg.\n  * Forcefully extend the lead hip and knee to move the body to a standing position on top of the box.\n  * Do not push off or hop up with the trailing leg or foot.\n  * At the highest position, stand erect and pause before beginning the downward movement phase.\n\nUpward Movement Phase: Spotter\n\n  * Take a small step forward with the lead leg as the athlete steps up on the box.\n  * As the athlete reaches the highest position, bring the trailing leg forward to be next to the lead leg.\n  * Keep the hands as near as possible to the athlete’s hips, waist, or torso.\n  * Assist only when necessary to keep the athlete balanced.\n\nDownward Movement Phase: Athlete\n\n  * Shift the body weight to the same lead leg.\n  * Step off the box with the same trailing leg.\n  * Maintain an erect torso position.\n  * Place the trailing foot on the floor the same distance from the box as the starting position.\n  * When the trailing foot is in full contact with the floor, shift the body weight to the trailing leg.\n  * Step off the box with the lead leg.\n  * Bring the lead foot back to a position next to the trailing foot.\n  * Stand erect in the starting position, pause, and then alternate lead legs for the next repetition.\n  * At the end of the set, step toward the rack and place the bar in the supports.\n\nDownward Movement Phase: Spotter\n\n  * Take a small step backward with the same trailing leg, as the athlete steps back down to the floor.\n  * As the athlete steps off the box with the lead leg, take a step backward with the same lead leg.\n  * Keep the hands near the athlete’s hips, waist, or torso.\n  * Stand erect in the starting position and pause to wait for the athlete.\n  * Assist only when necessary to keep the athlete balanced.\n  * At the end of the set, help the athlete rack the bar.\n\nMajor Muscles Involved\n\ngluteus maximus, semimembranosus, semitendinosus, biceps femoris, vastus lateralis, vastus intermedius, vastus medialis, rectus femoris \n\nStarting positions\n\n![An athlete holds a barbell on their shoulders and stands in front of a box. Their spotter holds their hips.](images/E6372_0757P_1233_ebook.jpg)\n\nInitial contact of lead foot with top of box\n\n![An athlete holds a barbell on their shoulders and puts their right leg on a box. Their spotter holds their hips.](images/E6372_0757P_1235_ebook.jpg)\n\nMiddle of upward movement positions\n\n![An athlete holds a barbell on their shoulders, has their right leg on a box, and lifts their left leg to place on the box. Their spotter holds their hips.](images/E6372_0757P_1239_ebook.jpg)\n\nCompletion of upward movement positions\n\n![An athlete holds a barbell on their shoulders and stands on a box. Their spotter holds their hips.](images/E6372_0757P_1237_ebook.jpg)\n\n15.25"

  - id: "ch15-good-morning"
    title: "Conclusion / Good Morning"
