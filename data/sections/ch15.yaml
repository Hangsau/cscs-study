    content: "\n\nStarting Position\n\n  * Place the hands on the bar in a closed, pronated position using either a clean or snatch grip.\n  * After performing the deadlift exercise to lift the bar off the floor, slightly to moderately flex the knees and keep them in this position throughout this exercise. (_Note:_ The knees should be slightly more flexed than shown in the video.) \n  * All repetitions begin from this position.\n\nDownward Movement Phase\n\n  * Begin the exercise by flexing the hips and pushing them backward, allowing the torso to move forward, keeping the bar in contact with the thighs. \n  * Keep the knees slightly flexed as the hips flex.\n  * Maintain a rigid torso, neutral spine, and keep the shoulders retracted until the barbell is aligned with the patella tendon and the torso is parallel to floor. (_Note:_ If using a snatch grip with this exercise, the torso will be slightly below parallel, depending on the athlete’s anthropometrics.) \n  * Keep a normal lordotic position throughout the movement.\n\nUpward Movement Phase\n\n  * Extend the hips, raising the torso back to the starting standing position.\n  * Keep the knees slightly flexed and the torso in a neutral spine position.\n  * Make sure the barbell maintains contact with the thighs throughout the movement.\n  * Do not hyperextend the back or flex the elbows.\n\nMajor Muscles Involved\n\ngluteus maximus, semimembranosus, semitendinosus, biceps femoris, erector spinae\n\nClean grip\n\n![An athlete holds a barbell in a clean grip near their upper thighs. Their knees are slightly bent.](images/E6372_0757P_1180_ebook.jpg)\n\nSnatch grip\n\n![An athlete holds a barbell in a clean grip and bends forward. Their knees are bent.](images/E6372_0757P_1182_ebook.jpg)\n\nStarting position\n\n![An athlete holds a barbell in a clean grip. The hands are at the center of the grips.](images/E6372_0757P_1177_ebook.jpg)\n\nDownward and upward movements\n\n![An athlete holds a barbell in a snatch grip. The hands are at the outer ends of the grips.](images/E6372_0757P_1178_ebook.jpg)\n\n15.29"

  - id: "ch15-leg-knee-extension-machine"
    title: "Conclusion / Leg (Knee) Extension (Machine)"
