    content: "\n\nThis exercise consists of quickly and forcefully pulling the bar from the floor to the front of the shoulders—all in one movement. Although the ascent consists of four phases, the upward movement of the bar occurs in one continuous motion without interruption. The hang power clean is similar to the power clean exercise, except that the bar _begins_ positioned at midthigh or slightly below or above the knees. In this variant of the power clean, the bar does not start on the floor or return to the floor between repetitions. \n\nStarting Position\n\n  * Stand with the feet placed between hip- and shoulder-width apart with the toes pointed slightly outward.\n  * Squat down with the hips lower than the shoulders and grasp the bar evenly with a pronated grip. If a stronger grip is needed, use a hook grip. \n  * Place the hands on the bar slightly wider than shoulder-width apart, outside of the knees, with the elbows fully extended and pointing out to the side. \n  * Place the feet flat on the floor and position the bar approximately 1 inch (3 cm) in front of the shins and over the balls of the feet. \n  * Position the body with the \n    * back neutral or slightly arched,\n    * scapulae depressed and retracted,\n    * chest held up and out,\n    * head in line with the vertebral column or slightly hyperextended,\n    * shoulders over or slightly in front of the bar, and\n    * eyes focused straight ahead or slightly upward.\n  * All repetitions begin from this position.\n\nUpward Movement Phase: First Pull\n\n  * Lift the bar off the floor by forcefully extending the hips and knees.\n  * Keep the torso-to-floor angle constant; do not let the hips rise before the shoulders.\n  * Maintain a neutral spine position.\n  * Keep the elbows fully extended, pointing out to the side, and the shoulders over or slightly ahead of the bar.\n  * As the bar is raised, keep it as close to the shins as possible.\n\nUpward Movement Phase: Transition\n\n  * As the bar rises just above the knees, thrust the hips forward and slightly flex the knees to move the thighs against and the knees under the bar. \n  * Keep the back neutral or slightly arched and the elbows fully extended and pointing out to the sides.\n\n_Note:_ The transition phase is similar to the Romanian deadlift; in fact, weightlifters use the RDL to strengthen this movement pattern. \n\nUpward Movement Phase: Second Pull\n\n  * Rapidly extend the hips, knees, and ankles. (_Note:_ It is important that the heels stay in contact with the floor for as long as possible in order to maximize force transference to the barbell.) \n  * Keep the bar as close to the body as possible.\n  * Keep the back neutral and the elbows pointing out to the sides.\n  * Keep the shoulders over the bar and the elbows extended as long as possible.\n  * When the lower body joints reach full extension, rapidly shrug the shoulders upward with the elbows still fully extended and pointing to the sides. \n  * As the shoulders reach their highest elevation, flex the elbows to begin pulling the body under the bar.\n  * Due to the explosive nature of this phase, the torso is erect or slightly hyperextended, the head is tilted slightly back, and the feet may lose contact with the floor. \n\nUpward Movement Phase: Catch\n\n  * After the lower body has fully extended, pull the body under the bar and rotate the arms around and under the bar.\n  * Simultaneously, flex the hips and knees to a quarter-squat position.\n  * Once the arms are under the bar, lift the elbows to position the upper arms parallel to the floor.\n  * Rack the bar across the front of the clavicles and anterior deltoids.\n  * Catch the bar with \n    * a nearly erect torso,\n    * the shoulders slightly ahead of the hips,\n    * a neutral head position, and\n    * flat feet.\n  * After gaining control and balance, stand up by extending the hips and knees to a fully erect position.\n\nDownward Movement Phase\n\n  * Lower the elbows to unrack the bar from the anterior deltoids and clavicles; then slowly lower the bar down to the thighs.\n  * Simultaneously flex the hips and knees to cushion the impact of the bar on the thighs.\n  * Squat down with the elbows fully extended until the bar touches the floor or drop the bar to the platform if rubber bumper plates are being used. \n\nMajor Muscles Involved\n\ngluteus maximus, semimembranosus, semitendinosus, biceps femoris, vastus lateralis, vastus intermedius, vastus medialis, rectus femoris, soleus, gastrocnemius, deltoids, trapezius \n\nStarting position/beginning of first pull\n\n![An athlete holds a barbell with a clean grip and squats. ](images/E6372_0757P_1694_ebook.jpg)\n\nEnd of first pull/beginning of transition\n\n![An athlete lifts a barbell with a clean grip while curving their back slightly.](images/E6372_0757P_1696_ebook.jpg)\n\nEnd of transition/beginning of second pull\n\n![An athlete lifts a barbell with a clean grip on their upper thighs and bends their knees slightly.](images/E6372_0757P_1707_ebook.jpg)\n\nEnd of second pull\n\n![An athlete stands upright with the barbell on their anterior deltoid and clavicle.](images/E6372_0757P_1718_ebook.jpg)\n\nCatch\n\n![An athlete gives a small jump and pulls the barbell rapidly upward.](images/E6372_0757P_1711_ebook.jpg)\n\nEnd position\n\n![An athlete positions the barbell on their anterior deltoid and clavicle. Their buttocks are pushed downward.](images/E6372_0757P_1713_ebook.jpg)\n\n15.40"

  - id: "ch15-power-snatch-and-hang-power-snatch-varia"
    title: "Conclusion / Power Snatch (and Hang Power Snatch Variation)"
    level: 3
    tags: [conclusion, power, snatch, hang, power, snatch]
    key_points:
      - "This exercise consists of quickly and forcefully pulling the bar from the floor to over the head with the elbows fully extended—all in one movement."
    recall_prompts:
      - "Power Snatch (and Hang Power Snatch Variation) 是什麼？有哪些類型或應用？"
    content: "\n\nThis exercise consists of quickly and forcefully pulling the bar from the floor to over the head with the elbows fully extended—all in one movement. Although the ascent consists of multiple phases, the upward movement of the bar occurs in one continuous motion without interruption. The hang power snatch is similar to the power snatch exercise, except that the initial position of the bar is not on the floor, and it does _not_ return to the floor between repetitions. \n\nStarting Position\n\n  * Stand with the feet placed between hip- and shoulder-width apart with the toes pointed slightly outward.\n  * Squat down with the hips lower than the shoulders and grasp the bar evenly with a pronated grip. If a stronger grip is needed, use a hook grip. \n  * The grip width is wider than for other exercises; a way to estimate it is to measure and use one of these distances for spacing the hands: ([1](<E6372RM_Refs_d104_split_015.xhtml#chapter15-ref1>)) the distance from the edge of the clenched fist of one hand to the opposite shoulder when the arm is straight out at the side, or ([2](<E6372RM_Refs_d104_split_015.xhtml#chapter15-ref2>)) the elbow-to-elbow distance when the arms are straight out at the sides. \n  * Extend the elbows fully and point them out to the side.\n  * Place the feet flat on the floor and position the bar approximately 1 inch (3 cm) in front of the shins and over the balls of the feet. \n  * Position the body with the \n    * back neutral or slightly arched,\n    * scapulae depressed and retracted,\n    * chest held up and out,\n    * head in line with the vertebral column or slightly hyperextended,\n    * feet flat on the floor,\n    * shoulders over or slightly in front of the bar, and\n    * eyes focused straight ahead or slightly upward.\n  * All repetitions begin from this position.\n\nUpward Movement Phase: First Pull\n\n  * Lift the bar off the floor by forcefully extending the hips and knees.\n  * Keep the torso-to-floor angle constant; do not let the hips rise before the shoulders.\n  * Maintain the neutral spine position.\n  * Keep the elbows fully extended, pointing out to the side, and the shoulders over or slightly ahead of the bar.\n  * As the bar is raised, keep it as close to the shins as possible.\n\nUpward Movement Phase: Transition\n\n  * As the bar rises just above the knees, thrust the hips forward and slightly flex the knees to move the thighs against, and the knees under, the bar. \n  * Keep the back neutral or slightly arched and the elbows fully extended and pointing out to the sides.\n\n_Note:_ The transition phase is similar to the Romanian deadlift; in fact, weightlifters use the RDL to strengthen this movement pattern. \n\nUpward Movement Phase: Second Pull\n\n  * Rapidly extend the hips, knees, and ankles. (_Note:_ It is important that the heels stay in contact with the floor for as long as possible in order to maximize force transference to the barbell.) \n  * Keep the bar as close to the body as possible. \n  * Keep the back neutral and the elbows pointing out to the sides.\n  * Keep the shoulders over the bar and the elbows extended as long as possible.\n  * When the lower body joints reach full extension, rapidly shrug the shoulders upward with the elbows still fully extended and out to the sides. \n  * As the shoulders reach their highest elevation, flex the elbows to begin pulling the body under the bar.\n  * Due to the explosive nature of this phase, the torso is erect or slightly hyperextended, the head is tilted slightly back, and the feet may lose contact with the floor. \n\nUpward Movement Phase: Catch\n\n  * After the lower body has fully extended, pull the body under the bar and rotate the hands around and under the bar.\n  * Simultaneously, flex the hips and knees to a quarter-squat position.\n  * Once the body is under the bar, catch the bar over and slightly behind the ears with \n    * fully extended elbows,\n    * an erect and stable torso,\n    * a neutral head position,\n    * flat feet, and\n    * the body’s weight over the middle of the feet.\n  * After gaining control and balance, stand up by extending the hips and knees to a fully erect position.\n  * Stabilize the bar overhead.\n\nDownward Movement Phase\n\n  * Lower the bar from the overhead position by gradually reducing the muscular tension of the shoulders to allow a controlled descent of the bar to the thighs. \n  * Simultaneously flex the hips and knees to cushion the impact of the bar on the thighs.\n  * Squat down with the elbows fully extended until the bar touches the floor or drop the bar to the platform if rubber bumper plates are being used. \n\nMajor Muscles Involved\n\ngluteus maximus, semimembranosus, semitendinosus, biceps femoris, vastus lateralis, vastus intermedius, vastus medialis, rectus femoris, soleus, gastrocnemius, deltoids, trapezius \n\nGrip measurement: fist-to-opposite-shoulder method\n\n![A person takes a grip measurement between the shoulder and the opposite fist of an athlete. The athlete extends their fist to the side.](images/E6372_0757P_1538_ebook.jpg)\n\nGrip measurement: elbow-to-elbow method\n\n![A person takes a grip measurement between the elbows of an athlete. The athlete holds up their elbow on their sides.](images/E6372_0757P_1536_ebook.jpg)\n\nStarting position/beginning of first pull\n\n![An athlete squats and holds a barbell in a snatch grip. ](images/E6372_0757P_1547_ebook.jpg)\n\nEnd of first pull/beginning of transition\n\n![An athlete squats and begins lifting a barbell from the ground.](images/E6372_0757P_1550_ebook.jpg)\n\nEnd of transition/beginning of second pull\n\n![An athlete straightens and holds a barbell in a snatch grip.](images/E6372_0757P_1571_ebook.jpg)\n\nEnd of second pull\n\n![An athlete jumps and pulls the barbell above his head.](images/E6372_0757P_1562_ebook.jpg)\n\nCatch\n\n![An athlete squats and holds a barbell above his head in a snatch grip.](images/E6372_0757P_1563_ebook.jpg)\n\nEnd position\n\n![An athlete stands straight and holds a barbell above his head in a snatch grip.](images/E6372_0757P_1566_ebook.jpg)\n\n#### Key Terms\n\n  * alternated grip\n  * clean grip\n  * closed grip\n  * false grip\n  * five-point body contact position\n  * forced repetitions\n  * free weight exercises\n  * grip width\n  * hook grip\n  * liftoff\n  * neutral grip\n  * neutral spine\n  * out-of-the-rack exercises\n  * overhand grip\n  * over-the-face barbell exercises\n  * partner-assisted reps\n  * power exercises\n  * pronated grip\n  * range of motion (ROM)\n  * snatch grip\n  * spotter\n  * sticking point\n  * structural exercises\n  * supinated grip\n  * supine\n  * underhand grip\n  * Valsalva maneuver\n\n#### Study Questions\n\n  1. Which of the following exercises requires a spotter? \n     1. lat pulldown\n     2. wrist curl\n     3. power clean\n     4. step-up\n  2. During which of the following exercises should a spotter’s hands be placed on the athlete’s forearms near the wrists? \n     1. bench press\n     2. incline dumbbell bench press\n     3. upright row\n     4. lying barbell triceps extension\n  3. Which of the following grips should be used during the deadlift exercise? \n     1. I. overhand\n     2. II. closed\n     3. III. open\n     4. IV. alternated\n     1. I and III only\n     2. II and IV only\n     3. I, II, and IV only\n     4. II, III, and IV only\n  4. Which of the following is the correct foot pattern in the step-up exercise? \n     1. step up _left_ foot, step up _right_ foot, step down _left_ foot, step down _right_ foot \n     2. step up _right_ foot, step up _left_ foot, step down _left_ foot, step down _right_ foot \n     3. step up _left_ foot, step down _left_ foot, step up _right_ foot, step down _right_ foot \n     4. step up _right_ foot, step up _left_ foot, step down _right_ foot, step down _left_ foot \n  5. The primary movement during the second pull phase of the power clean exercise is \n     1. hip flexion\n     2. hip extension\n     3. knee flexion\n     4. dorsiflexion"
