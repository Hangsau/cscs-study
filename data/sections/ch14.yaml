    title: "Flexibility / Frequency, Duration, and Intensity of Stretching"
    level: 3
    tags: [flexibility, frequency, duration, intensity, stretching]
    key_points:
      - "As with all forms of training, frequency, duration, and intensity are important issues in program design ([28](<E6372RM_Refs_d104_split_014."
    recall_prompts:
      - "Frequency, Duration, and Intensity of Stretching 是什麼？有哪些類型或應用？"
    content: "\n\nAs with all forms of training, frequency, duration, and intensity are important issues in program design ([28](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref28>)). Both static ([13](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref13>)) and proprioceptive neuromuscular facilitation ([34](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref34>)) stretching have been shown to increase joint flexibility around the knee, hip, trunk, shoulder, and ankle joints ([89](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref89>)). Despite this, the exact mechanisms responsible for increased flexibility are still unclear. The acute effects of stretching on ROM are transient and are greatest immediately after the stretching session; then they decline, with the duration of significant improvements in flexibility ranging from 3 minutes ([29](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref29>)) to 24 hours ([31](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref31>)).\n\nFor longer-lasting effects, a dedicated flexibility program is required ([89](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref89>)). Stretching twice per week, for a minimum of five weeks, has been shown to significantly improve flexibility ([40](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref40>)). However, the literature provides limited guidelines regarding specific stretching parameters, especially for proprioceptive neuromuscular facilitation methods ([30](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref30>)).\n\nAs to the appropriate duration for a static stretch, 15 to 30 seconds is generally recommended ([78](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref78>)) and has been shown to be more effective than shorter durations ([79](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref79>), [93](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref93>)). Evidence supports the use of 30 seconds (4-6) and suggests that there are diminishing returns beyond this duration. Another consideration is the total stretch time throughout a day, which may be as important as the duration of a single stretch ([17](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref17>), [79](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref79>)). When performing static stretches, athletes should hold the stretch at a position of mild discomfort (not pain). Joint integrity should never be compromised in order to increase ROM. All stretching sessions should be preceded by a period of general activity to raise muscle temperature. Because neural and vascular structures are stretched during flexibility exercises, athletes should be monitored for a loss of sensation or radiating pain."

  - id: "ch14-when-should-an-athlete-stretch"
    title: "Flexibility / When Should an Athlete Stretch?"
    level: 3
    tags: [flexibility, when, athlete, stretch]
    key_points:
      - "Stretching should be performed at the following times for optimal benefits:"
    recall_prompts:
      - "When Should an Athlete Stretch? 是什麼？有哪些類型或應用？"
    content: "\n\nStretching should be performed at the following times for optimal benefits:\n\n  * _Following practice and competition_. Postpractice stretching facilitates ROM improvements ([43](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref43>)) because of increased muscle temperature ([39](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref39>)). It should be performed within 5 to 10 minutes after practice. The increased body temperature increases the elastic properties of collagen within muscles and tendons, which allows for a greater stretch magnitude. Postpractice stretching may also decrease muscle soreness ([77](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref77>)), although the evidence on this is ambiguous ([1](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref1>), [61](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref61>)).\n  * _As a separate session_. If increased levels of flexibility are required, additional stretching sessions may be needed. In this case, stretching should be preceded by a thorough general warm-up to allow for the increase in muscle temperature necessary for effective stretching. This type of session can be especially useful as a recovery session on the day after a competition."

  - id: "ch14-proprioceptors-and-stretching"
    title: "Flexibility / Proprioceptors and Stretching"
    level: 3
    tags: [flexibility, proprioceptors, stretching]
    key_points:
      - "Two important proprioceptors should be considered during stretching: muscle spindles and Golgi tendon organs (GTOs)."
    recall_prompts:
      - "Proprioceptors and Stretching 是什麼？有哪些類型或應用？"
    content: "\n\nTwo important proprioceptors should be considered during stretching: muscle spindles and Golgi tendon organs (GTOs). Muscle spindles, located within intrafusal muscle fibers that run parallel to extrafusal muscle fibers, monitor changes in muscle length ([40](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref40>)). During a rapid stretching movement, a sensory neuron from the muscle spindle innervates a motor neuron in the spine. The motor neuron then causes a muscle action of the previously stretched extrafusal muscle fibers; this is the stretch reflex. Stimulation of the muscle spindle and the subsequent activation of the stretch reflex should be avoided during stretching, as motion will be limited by the reflexive muscle action. If the muscle spindles are not stimulated, the muscle relaxes and allows greater stretch. Because of the very slow movement during static stretching (see the next section, “Types of Stretching”), the stretch reflex is not invoked. Rapid (ballistic and dynamic) stretching movements may stimulate the muscle spindles, causing a stretch reflex.\n\nThe GTO, a mechanoreceptor located near the musculotendinous junction, is sensitive to increases in muscular tension. When stimulated, the GTO causes a muscle to reflexively relax. Relaxation that occurs in the same muscle that is experiencing increased tension is called autogenic inhibition ([18](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref18>), [22](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref22>), [72](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref72>)). Autogenic inhibition is accomplished via active contraction of a muscle immediately before a passive stretch of that same muscle. Tension built up during the active contraction stimulates the GTO, causing a reflexive relaxation of the muscle during the subsequent passive stretch. Relaxation that occurs in the muscle opposing the muscle experiencing the increased tension is called reciprocal inhibition ([18](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref18>), [72](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref72>)). This occurs when one simultaneously contracts the muscle opposing the muscle that is being passively stretched. Here the tension in the contracting muscle stimulates the GTO and causes a simultaneous reflexive relaxation of the stretched muscle."

  - id: "ch14-static-stretch"
    title: "Types of Stretching / Static Stretch"
    level: 3
    tags: [types, stretching, static, stretch]
    key_points:
      - "A static stretch is slow and constant, with the end position held for 15 to 30 seconds ([4](<E6372RM_Refs_d104_split_014."
    recall_prompts:
      - "Static Stretch 是什麼？有哪些類型或應用？"
    content: "\n\nA static stretch is slow and constant, with the end position held for 15 to 30 seconds ([4](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref4>), [6](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref6>)). A static stretch includes the relaxation and concurrent elongation of the stretched muscle ([37](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref37>)). Because it is performed slowly, static stretching does not elicit the stretch reflex of the stretched muscle ([20](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref20>)); therefore, the likelihood of injury is less than during ballistic stretching ([2](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref2>), [39](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref39>), [90](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref90>)). In addition, static stretching is easy to learn and has been shown to effectively improve ROM ([13](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref13>)). Although injury to muscles or connective tissue may result if the static stretch is too intense, there are no real disadvantages to static stretching as long as proper technique is used. Static stretching is appropriate for all athletes in a variety of sports for increasing flexibility.\n\nThe sitting toe touch is a good example of a static stretch. To perform this stretch statically, the athlete sits on the ground with the lower extremities together and knees extended, leans forward from the waist, and slowly reaches toward the ankles. The athlete gradually increases the intensity of the stretch by leaning forward until he or she feels mild discomfort in the hamstrings or lower back. The athlete holds this position for 15 to 30 seconds and then slowly returns to an upright sitting position. The stretch is static because it is performed slowly and the end position is held without movement."

  - id: "ch14-ballistic-stretch"
    title: "Types of Stretching / Ballistic Stretch"
    level: 3
    tags: [types, stretching, ballistic, stretch]
    key_points:
      - "A ballistic stretch typically involves active muscular effort and uses a bouncing-type movement in which the end position is not held ([70](<E6372RM_Refs_d104_split_014."
    recall_prompts:
      - "Ballistic Stretch 是什麼？有哪些類型或應用？"
    content: "\n\nA ballistic stretch typically involves active muscular effort and uses a bouncing-type movement in which the end position is not held ([70](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref70>)). Ballistic stretching is often used in the preexercise warm-up; however, if not appropriately controlled or sequenced, it may injure muscles or connective tissues, especially when there has been a previous injury ([20](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref20>)). Ballistic stretching usually triggers the stretch reflex that does not allow the involved muscles to relax, which may limit ROM, so the strength and conditioning professional should monitor this during the session.\n\nAs an example, consider the sitting toe touch performed as a ballistic stretch rather than a static stretch. The athlete sits on the ground with knees extended, lower extremities together, and upper body perpendicular to the legs. The athlete reaches quickly toward the ankles, bounces at the end position, and immediately returns to a near-vertical upper body position. With each repetition, the end position extends farther than in the preceding repetition. Ballistic stretching has been shown to be just as effective as static stretching in enhancing ROM ([63](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref63>)) and could play a role in a flexibility development program ([24](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref24>)). However, care must be taken to ensure that the athlete is appropriately prepared for this type of exercise acutely and chronically, and special care should be taken when a previous injury has been reported."

  - id: "ch14-dynamic-stretch"
    title: "Types of Stretching / Dynamic Stretch"
    level: 3
    tags: [types, stretching, dynamic, stretch]
    key_points:
      - "A dynamic stretch is a type of functionally based stretching exercise that uses sport-generic and sport-specific movements to prepare the body for activity ([64](<E6372RM_Refs_d104_split_014."
    recall_prompts:
      - "Dynamic Stretch 是什麼？有哪些類型或應用？"
    content: "\n\nA dynamic stretch is a type of functionally based stretching exercise that uses sport-generic and sport-specific movements to prepare the body for activity ([64](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref64>)). Dynamic stretching—sometimes referred to as mobility drills ([3](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref3>))—places an emphasis on the movement requirements of the sport or activity rather than on individual muscles. This type of exercise can closely duplicate the movement requirements of a sport or activity ([48](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref48>)); for example, a walking knee lift stretch mimics the knee lift of a sprinter. Essentially, one can think of dynamic stretching as actively moving a joint through the ROM encountered in a sport.\n\nDynamic and ballistic stretches may appear similar; however, a number of key differences significantly alter the effects of these activities such that dynamic stretching avoids the potential negative effects associated with ballistic stretching. Dynamic stretching avoids bouncing and is performed in a more controlled manner than ballistic stretching. The result is a controlled ROM that is often smaller than that produced by ballistic stretching but demonstrates the control required to be able to actively move through the full ROM and assume and hold the end position.\n\nThe ability to actively move a joint through a ROM is generally far more sport specific than the ability to statically hold a stretch. Advantages of dynamic stretching include its ability to promote dynamic flexibility and to replicate the movement patterns and ROM required for sport activities. As a consequence, dynamic stretches, as outlined in the discussion of warm-up, are increasingly the preferred method of stretching during warm-up.\n\nIn dynamic stretching, unlike static stretching, the muscle does not relax during the stretch but instead is active through the ROM; this is also more specific to the movement patterns that occur in sport. Even though it is an ideal warm-up activity, dynamic stretching may be less effective than static or proprioceptive neuromuscular facilitation stretching at increasing static ROM ([5](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref5>)); in situations in which an increased static ROM is needed, static or proprioceptive neuromuscular facilitation methods may be preferred.\n\nWhen one is designing a dynamic stretching program, the starting point should be a careful analysis of the major movement patterns within the given sport and the ROM required within these movements. One can then select exercises that replicate those movements via a series of dynamic stretches. In this way, it is possible to achieve a highly specific flexibility program.\n\nDynamic stretching provides the opportunity to combine movements ([32](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref32>), [49](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref49>)). This gives the strength and conditioning professional a large number of combinations that can be used to provide variety in the warm-up. Athletes can perform dynamic stretching exercises either for a series of repetitions in the same place (e.g., 10 lunges) or for a series of repetitions to cover a given distance (e.g., lunge for 15 m). Regardless of the method chosen, each drill should start slowly and gradually increase the ROM, the speed, or both during subsequent repetitions or sets. For example, athletes can perform the knee lift exercise over a distance of 15 m, starting at a walk, and build to a skip in subsequent repetitions. This progression provides for an increase in both speed and ROM. An effective warm-up using dynamic stretching can be achieved in 10 to 15 minutes ([64](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref64>)).\n\nIn a dynamic stretch that mirrors a sport skill—such as a sprinter’s knee lift drill—it is important that the stretch also emphasize the key skill factors required for the movement so that the most important mechanics of the drill are reinforced. For example, if the knee lift drill is used in the warm-up, effective body mechanics should be emphasized along with key joint positions such as dorsiflexion of the ankle of the lifted foot. The use of dynamic stretches must always be coordinated with appropriate sport techniques and never compromise proper technique."

  - id: "ch14-proprioceptive-neuromuscular-facilitatio"
    title: "Types of Stretching / Proprioceptive Neuromuscular Facilitation Stretch"
    level: 3
    tags: [types, stretching, proprioceptive, neuromuscular, facilitation, stretch]
    key_points:
      - "Proprioceptive neuromuscular facilitation (PNF) stretching was originally developed as part of a neuromuscular rehabilitation program designed to relax muscles with increased tone or activity ([90](<E"
    recall_prompts:
      - "Proprioceptive Neuromuscular Facilitation Stretch 是什麼？有哪些類型或應用？"
    content: "\n\nProprioceptive neuromuscular facilitation (PNF) stretching was originally developed as part of a neuromuscular rehabilitation program designed to relax muscles with increased tone or activity ([90](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref90>)). It has since been expanded to athletics as a method of increasing flexibility. Proprioceptive neuromuscular facilitation techniques are usually performed with a partner and involve both passive movement and active (concentric and isometric) muscle actions. Proprioceptive neuromuscular facilitation stretching may be superior to other stretching methods because it facilitates muscular inhibition ([21](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref21>), [34](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref34>), [53](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref53>), [74](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref74>), [80](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref80>), [88](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref88>), [91](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref91>)), although evidence for this has not been consistently shown ([28](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref28>)). However, PNF stretching is often impractical because most of the stretches require a partner and some expertise. This section serves as an introduction to PNF stretching.\n\nDuring a PNF stretch, three specific muscle actions are used to facilitate the passive stretch. Both isometric and concentric muscle actions of the antagonist (the muscle being stretched) are used before a passive stretch of the antagonist to achieve autogenic inhibition. The isometric muscle action is referred to as _hold_ and the concentric muscle action as _contract_. A concentric muscle action of the agonist, called agonist contraction, is used during a passive stretch of the antagonist to achieve reciprocal inhibition. Each technique also involves passive, static stretches that are referred to as _relax_.\n\nThere are three basic types of PNF stretching techniques:\n\n  * Hold-relax ([15](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref15>), [18](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref18>), [21](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref21>), [80](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref80>), [88](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref88>))\n  * Contract-relax ([15](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref15>), [21](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref21>))\n  * Hold-relax with agonist contraction ([18](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref18>), [72](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref72>))\n\nThe PNF techniques are completed in three phases. With each of the three techniques, the first phase incorporates a passive prestretch of 10 seconds. The muscle actions used in the second and third phases differ for the three techniques; the second and third phases give each technique its name. A stretch to improve hamstring flexibility provides an illustration (see [figures 14.1](<E6372ch14_d91.xhtml#f14.1>) through [14.11](<E6372ch14_d91.xhtml#f14.11>)).\n\n**Figure 14.1** Starting position of PNF hamstring stretch.\n\n![An athlete lies on their back on an exercise mat with arms stretched along their sides. One of their legs is raised toward the body.](images/E6372_0756P_0380_ebook.jpg)\n\n**Figure 14.2** Partner and subject leg and hand positions for PNF hamstring stretch.\n\n![An athlete lies on their back on an exercise mat. Their partner assists them in raising their leg by grasping their heel and knee.](images/E6372_0756P_0382_ebook.jpg)\n\n**Figure 14.3** Passive prestretch of hamstrings during hold-relax PNF hamstring stretch.\n\n![An athlete lies on their back on an exercise mat. Their partner assists them by pushing their leg toward their body by grasping their heel and knee.](images/E6372_0756P_0384_ebook.jpg)\n\n**Figure 14.4** Isometric action during hold-relax PNF hamstring stretch.\n\n![An athlete lies on their back on an exercise mat. Their partner assists them in raising their leg toward their body by grasping their heel and knee.](images/E6372_0756P_0386_ebook.jpg)\n\n**Figure 14.5** Increased ROM during passive stretch of hold-relax PNF hamstring stretch.\n\n![An athlete lies on their back on an exercise mat. Their partner assists them by pushing their leg more toward their body by grasping their heel and knee.](images/E6372_0756P_0388_ebook.jpg)\n\n**Figure 14.6** Passive prestretch of hamstrings during contract-relax PNF stretch.\n\n![An athlete lies on their back on an exercise mat. Their partner assists them in raising their leg toward their body by grasping their heel and knee. ](images/E6372_0756P_0413_ebook.jpg)\n\n**Figure 14.7** Concentric action of hip extensors during contract-relax PNF stretch.\n\n![An athlete lies on their back on an exercise mat. Their partner assists them in raising their leg downward and to the side by grasping their heel and knee.](images/E6372_0756P_0418_ebook.jpg)\n\n**Figure 14.8** Increased ROM during passive stretch of contract-relax PNF stretch.\n\n![An athlete lies on their back on an exercise mat. Their partner assists them by pushing their leg more toward their body by grasping their heel and knee.](images/E6372_0756P_0425_ebook.jpg)\n\n**Figure 14.9** Passive prestretch during hold-relax with agonist contraction PNF hamstring stretch.\n\n![An athlete lies on their back on an exercise mat. Their partner assists them by pushing their leg toward their body by grasping their heel and knee.](images/E6372_0756P_0428_ebook.jpg)\n\n**Figure 14.10** Isometric action of hamstrings during hold-relax with agonist contraction PNF hamstring stretch.\n\n![An athlete lies on their back on an exercise mat. Their partner assists them by holding their leg toward their body by grasping their heel and knee.](images/E6372_0756P_0431_ebook.jpg)\n\n**Figure 14.11** Concentric contraction of quadriceps during hold-relax with agonist contraction PNF hamstring stretch, creating increased ROM during passive stretch.\n\n![An athlete lies on their back on an exercise mat. Their partner assists them by pushing their leg more toward their body by grasping their heel and knee.](images/E6372_0756P_0434_ebook.jpg)\n\n#### Hold-Relax\n\nThe hold-relax technique begins with a passive prestretch that is held at the point of mild discomfort for 10 seconds ([figure 14.3](<E6372ch14_d91.xhtml#f14.3>)). The partner then applies a hip flexion force and instructs the athlete, “Hold and don’t let me move the leg”; the athlete “holds” and resists the movement so that an isometric muscle action occurs and is held for 6 seconds ([figure 14.4](<E6372ch14_d91.xhtml#f14.4>)). The athlete then relaxes, and a passive stretch is performed and held for 30 seconds ([figure 14.5](<E6372ch14_d91.xhtml#f14.5>)). The final stretch should be of greater magnitude due to autogenic inhibition (i.e., activation of the hamstrings).\n\n#### Contract-Relax\n\nThe contract-relax technique also begins with a passive prestretch of the hamstrings that is held at the point of mild discomfort for 10 seconds ([figure 14.6](<E6372ch14_d91.xhtml#f14.6>)). The athlete then extends the hip against resistance from the partner so that a concentric muscle action through the full ROM occurs ([figure 14.7](<E6372ch14_d91.xhtml#f14.7>)). The athlete then relaxes, and a passive hip flexion stretch is applied and held for 30 seconds ([figure 14.8](<E6372ch14_d91.xhtml#f14.8>)). The increased ROM is facilitated due to autogenic inhibition (i.e., activation of the hamstrings). In an alternative to this technique, the athlete attempts to extend the hip and the partner does not allow the movement ([69](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref69>)). Because this is essentially the same as the hold-relax technique, the contract-relax method described here is preferred.\n\n#### Hold-Relax With Agonist Contraction\n\nThe hold-relax with agonist contraction technique is identical to hold-relax in the first two phases ([figures 14.9](<E6372ch14_d91.xhtml#f14.9>) and [14.10](<E6372ch14_d91.xhtml#f14.10>)). During the third phase, a concentric action of the agonist is used in addition to the passive stretch to add to the stretch force ([figure 14.11](<E6372ch14_d91.xhtml#f14.11>)). That is, following the isometric hold, the athlete flexes the hip, thereby moving further into the new ROM. With this technique, the final stretch should be greater, primarily because of reciprocal inhibition (i.e., activation of the hip flexors) ([69](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref69>), [72](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref72>)) and secondarily because of autogenic inhibition (i.e., activation of the hamstrings) ([72](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref72>)).\n\nThe hold-relax with agonist contraction is the most effective PNF stretching technique due to facilitation via both reciprocal and autogenic inhibition.\n\n#### Common PNF Stretches With a Partner\n\nThe following are common PNF stretches performed with a partner. Each is illustrated with a photo.\n\n  * Calves and ankles ([figure 14.12](<E6372ch14_d91.xhtml#f14.12>))\n  * Chest ([figure 14.13](<E6372ch14_d91.xhtml#f14.13>))\n  * Groin ([figure 14.14](<E6372ch14_d91.xhtml#f14.14>)) \n  * Hamstrings and hip extensors (previously described)\n  * Quadriceps and hip flexors ([figure 14.15](<E6372ch14_d91.xhtml#f14.15>))\n  * Shoulders ([figure 14.16](<E6372ch14_d91.xhtml#f14.16>))\n\n**Figure 14.12** Partner PNF stretching for the calves.\n\n![An athlete sits on an exercise mat with their legs stretched forward. Their partner grasps their toes and pushes them toward their body.](images/E6372_0756P_0436_ebook.jpg)\n\n**Figure 14.13** Partner PNF stretching for the chest.\n\n![An athlete kneels on the floor and holds the back of their head. Their partner grabs their upper arms and pulls them backward.](images/E6372_0756P_0438_ebook.jpg)\n\n**Figure 14.14** Partner PNF stretching for the groin.\n\n![An athlete sits on the floor with the soles of their feet touching. Their partner pushes their knees toward the floor.](images/E6372_0756P_0440_ebook.jpg)\n\n**Figure 14.15** Partner PNF stretching for the quadriceps and hip flexors.\n\n![An athlete lies on their stomach on the floor. Their partner grasps one of their legs, bends it, and lifts it.](images/E6372_0756P_0442_ebook.jpg)\n\n**Figure 14.16** Partner PNF stretching for the shoulders.\n\n![An athlete kneels on the floor. Their partner grasps their wrists and pulls them backward.](images/E6372_0756P_0447_ebook.jpg)"

  - id: "ch14-guidelines-for-static-stretching"
    title: "Conclusion / Guidelines for Static Stretching"
    level: 3
    tags: [conclusion, guidelines, static, stretching]
    key_points:
      - "* Get into a position that facilitates relaxation."
    recall_prompts:
      - "Guidelines for Static Stretching 是什麼？有哪些類型或應用？"
    content: "\n\n  * Get into a position that facilitates relaxation.\n  * Move to the point in the ROM where you experience a sensation of mild discomfort. If performing partner-assisted PNF stretching, communicate clearly with your partner.\n  * Hold stretches for 15 to 30 seconds.\n  * Repeat unilateral stretches on both sides."

  - id: "ch14-precautions-for-static-stretching"
    title: "Conclusion / Precautions for Static Stretching"
    level: 3
    tags: [conclusion, precautions, static, stretching]
    key_points:
      - "* Decrease stretch intensity if you experience pain, radiating symptoms, or loss of sensation."
    recall_prompts:
      - "Precautions for Static Stretching 是什麼？有哪些類型或應用？"
    content: "\n\n  * Decrease stretch intensity if you experience pain, radiating symptoms, or loss of sensation.\n  * Use caution when stretching a hypermobile joint.\n  * Avoid combination movements that involve the spine (e.g., extension and lateral flexion).\n  * Stabilizing muscles should be active to protect other joints and prevent unwanted movements.\n\nNeck\n\n14.1"

  - id: "ch14-look-right-and-left"
    title: "Conclusion / Look Right and Left"
    level: 3
    tags: [conclusion, look, right, left]
    key_points:
      - "1."
    recall_prompts:
      - "Look Right and Left 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Stand or sit with the head and neck upright.\n  2. Turn the head to the right using a submaximal concentric muscle action.\n  3. Turn the head to the left using a submaximal concentric muscle action.\n\nMuscle Affected\n\nsternocleidomastoid\n\nRotation of the neck to the right\n\n![An athlete rotates their neck to the left.](images/E6372_0756P_0306_ebook.jpg)\n\nRotation of the neck to the left\n\n![An athlete rotates their neck to the right.](images/E6372_0756P_0304_ebook.jpg)\n\n14.2"

  - id: "ch14-flexion-and-extension"
    title: "Conclusion / Flexion and Extension"
    level: 3
    tags: [conclusion, flexion, extension]
    key_points:
      - "1."
    recall_prompts:
      - "Flexion and Extension 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Standing or sitting with head and neck upright, flex the neck by tucking the chin toward the chest.\n  2. If the chin touches the chest, try to touch the chin lower on the chest.\n  3. Extend the neck by trying to come as close as possible to touching the head to the back.\n\nMuscles Affected\n\nsternocleidomastoid, suboccipitals, splenae\n\nNeck flexion\n\n![An athlete extends their neck by lifting their chin.](images/E6372_0756P_0308_ebook.jpg)\n\nNeck extension\n\n![An athlete flexes their neck by tucking their chin to their chest.](images/E6372_0756P_0310_ebook.jpg)\n\nShoulders and Chest\n\n14.3"

  - id: "ch14-straight-arms-behind-back"
    title: "Conclusion / Straight Arms Behind Back"
    level: 3
    tags: [conclusion, straight, arms, behind, back]
    key_points:
      - "1."
    recall_prompts:
      - "Straight Arms Behind Back 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Standing, place both arms behind the back.\n  2. Interlock fingers with palms facing each other.\n  3. Straighten the elbows fully.\n  4. Slowly raise the arms, keeping the elbows straight.\n  5. Keep head upright and neck relaxed.\n\nMuscles Affected\n\nanterior deltoid, pectoralis major\n\nStretching the shoulder joints—standing\n\n![An athlete clasps their hands behind their back and lifts the clasped hands upward.](images/E6372_0756P_0312_ebook.jpg)\n\n14.4"

  - id: "ch14-seated-lean-back"
    title: "Conclusion / Seated Lean-Back"
    level: 3
    tags: [conclusion, seated, lean, back]
    key_points:
      - "1."
    recall_prompts:
      - "Seated Lean-Back 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Sitting with the legs straight and arms extended, place palms on the floor about 12 inches (30 cm) behind the hips.\n  2. Point the fingers away from the body (backward).\n  3. Slide the hands backward and lean backward.\n\nMuscles Affected\n\ndeltoids, pectoralis major\n\nStretching the shoulder joints—seated\n\n![An athlete sits on the floor, stretches their legs, and positions their hands behind them with fingers pointing backward. They slide their hands backward.](images/E6372_0756P_0314_ebook.jpg)\n\nPosterior of Upper Arm\n\n14.5"

  - id: "ch14-behind-neck-stretch-chicken-wing"
    title: "Conclusion / Behind-Neck Stretch (Chicken Wing)"
    level: 3
    tags: [conclusion, behind, neck, stretch, chicken, wing]
    key_points:
      - "1."
    recall_prompts:
      - "Behind-Neck Stretch (Chicken Wing) 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Standing or sitting, abduct the right shoulder and flex the elbow.\n  2. Reach the right hand down toward the left scapula.\n  3. Grasp the right elbow with the left hand.\n  4. Pull the elbow behind the head with the left hand to increase shoulder abduction.\n\nMuscles Affected\n\ntriceps brachii, latissimus dorsi\n\nStretching the triceps\n\n![An athlete grasps the right elbow with their left hand and touches their upper back with their right hand.](images/E6372_0756P_0316_ebook.jpg)\n\nUpper Back\n\n14.6"

  - id: "ch14-cross-arm-in-front-of-chest"
    title: "Conclusion / Cross Arm in Front of Chest"
    level: 3
    tags: [conclusion, cross, front, chest]
    key_points:
      - "1."
    recall_prompts:
      - "Cross Arm in Front of Chest 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Stand or sit with the left elbow slightly flexed (15°-30°) and the arm across the body (i.e., shoulder in horizontal adduction).\n  2. Grasp the upper arm just above the elbow, placing the right hand on the posterior side of the upper arm.\n  3. Pull the left arm across the chest (toward the right) with the right hand.\n\nMuscles Affected\n\nposterior deltoid, rhomboids, middle trapezius\n\nStretching the upper back\n\n![An athlete grasps their upper arm and presses the arm against their chest.](images/E6372_0756P_0320_ebook.jpg)\n\n14.7"

  - id: "ch14-arms-straight-up-above-head-pillar"
    title: "Conclusion / Arms Straight Up Above Head (Pillar)"
    level: 3
    tags: [conclusion, arms, straight, above, head, pillar]
    key_points:
      - "1."
    recall_prompts:
      - "Arms Straight Up Above Head (Pillar) 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Stand with the arms in front of the torso, fingers interlocked with palms facing out.\n  2. Slowly straighten the arms above the head with the palms up.\n  3. Continue to reach upward with the hands and arms.\n  4. While continuing to reach upward, slowly reach slightly backward.\n\nMuscle Affected\n\nlatissimus dorsi\n\nStretching the upper back and forearms\n\n![An athlete clasps their hands above their head and pushes the clasped hands upward.](images/E6372_0756P_0322_ebook.jpg)\n\nLower Back\n\n14.8"

  - id: "ch14-spinal-twist-pretzel"
    title: "Conclusion / Spinal Twist (Pretzel)"
    level: 3
    tags: [conclusion, spinal, twist, pretzel]
    key_points:
      - "1."
    recall_prompts:
      - "Spinal Twist (Pretzel) 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Sitting with the legs straight and the upper body nearly vertical, place the right foot to the left side of the left knee.\n  2. Place the back of the left elbow on the right side of the right knee, which is now bent.\n  3. Place the right palm on the floor 12 to 16 inches (30-40 cm) behind the hips.\n  4. Push the right knee to the left with the left elbow while turning the shoulders and head to the right as far as possible. Try to look behind the back.\n\nMuscles Affected\n\ninternal oblique, external oblique, piriformis, erector spinae\n\nStretching the low back and sides\n\n![An athlete sits on the floor, bends their right knee, places their left foot to the left of the left knee, and twists their body to the right.](images/E6372_0756P_0326_ebook.jpg)\n\n14.9"

  - id: "ch14-semi-leg-straddle"
    title: "Conclusion / Semi-Leg Straddle"
    level: 3
    tags: [conclusion, semi, straddle]
    key_points:
      - "1."
    recall_prompts:
      - "Semi-Leg Straddle 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Sit with knees flexed 30° to 50°; let the legs totally relax.\n  2. Point the knees outward; the sides of the knees may or may not touch the floor.\n  3. Lean forward from the waist and reach forward with extended arms.\n\n_Note_ : Bending the knees and relaxing the legs decreases hamstring involvement and increases lower back stretch.\n\nMuscle Affected\n\nerector spinae\n\nStretching the low back from a seated position\n\n![An athlete sits on the floor with their knees bent and pointing outward and sliding their hands forward on the floor.](images/E6372_0756P_0328_ebook.jpg)\n\nHips\n\n14.10"

  - id: "ch14-forward-lunge-fencer"
    title: "Conclusion / Forward Lunge (Fencer)"
    level: 3
    tags: [conclusion, forward, lunge, fencer]
    key_points:
      - "1."
    recall_prompts:
      - "Forward Lunge (Fencer) 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Standing, take a long step forward with the right leg and flex the right knee until it is directly over the right foot (as in the free weight lunge exercise).\n  2. Keep the right foot flat on the floor.\n  3. Keep the back leg straight.\n  4. Keep the back foot pointed in the same direction as the front foot; it is not necessary to have the heel on the floor.\n  5. Keep the torso upright and rest the hands on the hips or the front leg.\n  6. Slowly lower the hips forward and downward.\n\nMuscles Affected\n\niliopsoas, rectus femoris\n\nStretching the hip flexors\n\n![An athlete performs lunges.](images/E6372_0756P_0509_ebook.jpg)\n\n14.11"

  - id: "ch14-supine-knee-flex"
    title: "Conclusion / Supine Knee Flex"
    level: 3
    tags: [conclusion, supine, knee, flex]
    key_points:
      - "1."
    recall_prompts:
      - "Supine Knee Flex 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Lie on the back with legs straight.\n  2. Flex the right knee and hip, bringing the thigh toward the chest.\n  3. Place both hands behind the thigh and continue to pull the thigh toward the chest.\n\nMuscles Affected\n\nhip extensors (gluteus maximus and hamstrings)\n\nStretching the gluteals and hamstrings\n\n![An athlete lies on their back on the floor, grasps the underside of their thigh and knee, brings their thigh to their chest, and bends their knee.](images/E6372_0756P_0342_ebook.jpg)\n\nTorso\n\n14.12"

  - id: "ch14-side-bend-with-straight-arms"
    title: "Conclusion / Side Bend With Straight Arms"
    level: 3
    tags: [conclusion, side, bend, straight, arms]
    key_points:
      - "1."
    recall_prompts:
      - "Side Bend With Straight Arms 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Stand with feet shoulder-width apart.\n  2. Interlace the fingers with the palms away from the torso and facing outward.\n  3. Reach upward with straight arms.\n  4. Keeping the arms straight, lean from the waist to the left side. Do not bend the knees.\n\nMuscles Affected\n\nexternal oblique, latissimus dorsi, serratus anterior\n\nStretching the sides and upper back\n\n![An athlete clasps their hands above their head and tilts their body to the side.](images/E6372_0756P_0344_ebook.jpg)\n\n14.13"

  - id: "ch14-side-bend-with-bent-arm"
    title: "Conclusion / Side Bend With Bent Arm"
    level: 3
    tags: [conclusion, side, bend, bent]
    key_points:
      - "1."
    recall_prompts:
      - "Side Bend With Bent Arm 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Stand with feet shoulder-width apart.\n  2. Flex the right elbow and raise the elbow above the head.\n  3. Reach the right hand down toward the left shoulder.\n  4. Grasp the right elbow with the left hand.\n  5. Pull the elbow behind the head.\n  6. Keeping the arm bent, lean from the waist to the left side.\n  7. Do not bend the knees.\n\nMuscles Affected\n\nexternal oblique, latissimus dorsi, serratus anterior, triceps brachii\n\nStretching the sides, triceps, and upper back\n\n![An athlete grasps the right elbow with their left hand and touches their upper back with their right hand. They tilt their body to the side.](images/E6372_0756P_0348_ebook.jpg)\n\nAnterior of Thigh and Hip Flexor\n\n14.14"

  - id: "ch14-side-quadriceps-stretch"
    title: "Conclusion / Side Quadriceps Stretch"
    level: 3
    tags: [conclusion, side, quadriceps, stretch]
    key_points:
      - "1."
    recall_prompts:
      - "Side Quadriceps Stretch 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Lie on the left side with both legs straight.\n  2. Place the left forearm flat on the floor and the upper arm perpendicular to the floor.\n  3. Place the left forearm at a 45° angle to the torso.\n  4. Flex the right leg (knee), with the heel of the right foot moving toward the buttocks.\n  5. Grasp the front of the ankle with the right hand and pull toward the buttocks.\n\n_Note_ : The stretch occurs as a result of knee flexion and hip extension.\n\nMuscles Affected\n\nquadriceps, iliopsoas\n\nStretching the quadriceps\n\n![An athlete lies on their side, rests their body on their forearm and elbow, grasps their ankle, bends their knee, and pulls their ankle backward.](images/E6372_0756P_0350_ebook.jpg)\n\nPosterior of Thigh\n\n14.15"

  - id: "ch14-sitting-toe-touch"
    title: "Conclusion / Sitting Toe Touch"
    level: 3
    tags: [conclusion, sitting, touch]
    key_points:
      - "1."
    recall_prompts:
      - "Sitting Toe Touch 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Sit with the upper body nearly vertical and legs straight.\n  2. Lean forward using hip flexion and grasp the toes with each hand. Slightly pull the toes toward the upper body and pull the chest toward the legs. If you have limited flexibility, try to grasp the ankles.\n\nMuscles Affected\n\nhamstrings, erector spinae, gastrocnemius\n\nStretching the hamstrings and lower back\n\n![An athlete sits on the floor with their legs stretched and touches the soles of their feet.](images/E6372_0756P_0357_ebook.jpg)\n\n14.16"

  - id: "ch14-semistraddle-figure-four"
    title: "Conclusion / Semistraddle (Figure Four)"
    level: 3
    tags: [conclusion, semistraddle, figure, four]
    key_points:
      - "1."
    recall_prompts:
      - "Semistraddle (Figure Four) 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Sit with the upper body nearly vertical and legs straight.\n  2. Place the sole of the right foot on the inner side of the left knee. The outer side of the right leg should be resting on the floor.\n  3. Lean forward using hip flexion and grasp the toes of the left foot with the left hand. Slightly pull the toes toward the upper body as the chest is also pulled toward the left leg.\n\nMuscles Affected\n\ngastrocnemius, hamstrings, erector spinae\n\nStretching the hamstrings and lower back\n\n![An athlete sits on the floor with one leg stretched and the other leg bent. They grasp the toes of their stretched leg.](images/E6372_0756P_0362_ebook.jpg)\n\nGroin\n\n14.17"

  - id: "ch14-straddle-spread-eagle"
    title: "Conclusion / Straddle (Spread Eagle)"
    level: 3
    tags: [conclusion, straddle, spread, eagle]
    key_points:
      - "1."
    recall_prompts:
      - "Straddle (Spread Eagle) 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Sit with the upper body nearly vertical and legs straight. Abduct the hips, spreading the legs as far as possible.\n  2. With both hands, grasp the toes of the left foot and pull on the toes slightly while pulling the chest toward the left leg.\n  3. Repeat toward the center by grasping the right toes with the right hand and the left toes with the left hand. Pull the torso forward and toward the ground.\n\nMuscles Affected\n\ngastrocnemius, hamstrings, erector spinae, hip adductors, sartorius\n\nStretching the hamstrings and hip adductors\n\n![An athlete sits on the floor with their legs spread wide and grasps the toes of one of the legs.](images/E6372_0756P_0366_ebook.jpg)\n\nStretching the hamstrings, hip adductors, and lower back\n\n![An athlete sits on the floor with their legs spread wide and grasps the toes of both legs while bending forward.](images/E6372_0756P_0368_ebook.jpg)\n\n14.18"

  - id: "ch14-butterfly"
    title: "Conclusion / Butterfly"
    level: 3
    tags: [conclusion, butterfly]
    key_points:
      - "1."
    recall_prompts:
      - "Butterfly 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Sitting with the upper body nearly vertical and legs straight, flex both knees, bringing the soles of the feet together.\n  2. Pull the feet toward the body.\n  3. Place the hands on the feet and the elbows on the legs.\n  4. Pull the torso slightly forward as the elbows push down, causing hip abduction.\n\nMuscles Affected\n\nhip adductors, sartorius\n\nStretching the hip adductors\n\n![An athlete sits on the floor, brings the soles of their feet together, and holds them.](images/E6372_0756P_0370_ebook.jpg)\n\nCalf\n\n14.19"

  - id: "ch14-wall-stretch"
    title: "Conclusion / Wall Stretch"
    level: 3
    tags: [conclusion, wall, stretch]
    key_points:
      - "1."
    recall_prompts:
      - "Wall Stretch 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Stand facing the wall with feet shoulder-width apart and toes approximately 2 feet (0.6 m) from the wall.\n  2. Lean forward, placing the hands on the wall.\n  3. Step back approximately 2 feet (0.6 m) with the stretch leg while flexing the opposite knee.\n  4. Extend the knee of the stretch leg and lower the heel to the floor to apply the stretch.\n\nMuscles Affected\n\ngastrocnemius, soleus; Achilles tendon\n\nStretching the calves\n\n![An athlete presses their palms against a wall, bends their right leg, stretches their left leg, and pushes against the wall.](images/E6372_0756P_0672_ebook.jpg)\n\n14.20"

  - id: "ch14-step-stretch"
    title: "Conclusion / Step Stretch"
    level: 3
    tags: [conclusion, step, stretch]
    key_points:
      - "1."
    recall_prompts:
      - "Step Stretch 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Place the ball of one foot on the edge of a step or board 3 to 4 inches (8-10 cm) high, with the other foot flat on the step.\n  2. With straight legs, lower the heel of the foot on the edge of the step as far as possible.\n  3. Repeat with the other leg.\n\n_Note_ : To stretch the Achilles tendon, complete the same stretch with 10° of knee flexion.\n\nMuscles Affected\n\ngastrocnemius, soleus, Achilles tendon\n\nStretching the calf while standing on a step\n\n![An athlete has one leg on a step and the other leg on the edge of a step.](images/E6372_0756P_0374_ebook.jpg)\n\nDynamic Stretching Techniques\n\n  * [14.21 Arm Swings](<E6372ch14_d91.xhtml#d20>)\n  * [14.22 Inchworm](<E6372ch14_d91.xhtml#d21>)\n  * [14.23 Lunge Walk](<E6372ch14_d91.xhtml#d22>)\n  * [14.24 Lunge With Overhead Side Reach](<E6372ch14_d91.xhtml#d23>)\n  * [14.25 Walking Knee Lift](<E6372ch14_d91.xhtml#d24>)\n  * [14.26 Forward Lunge With Elbow to Instep](<E6372ch14_d91.xhtml#d25>)\n  * [14.27 Heel-to-Toe Walk](<E6372ch14_d91.xhtml#d26>)\n  * [14.28 Walking Over and Under](<E6372ch14_d91.xhtml#d27>)\n  * [14.29 Inverted Hamstring Stretch](<E6372ch14_d91.xhtml#d28>)\n  * [14.30 Straight-Leg March](<E6372ch14_d91.xhtml#d29>)\n  * [14.31 Spiderman Crawl](<E6372ch14_d91.xhtml#d30>)\n\n#### Guidelines for Dynamic Stretching\n\n  * Carry out 5 to 10 repetitions for each movement, either in place or over a given distance.\n  * Where possible, progressively increase the ROM on each repetition.\n  * Where appropriate, increase the speed of motion in subsequent sets, but always maintain control of the motion.\n  * Actively control muscular actions as you move through the ROM.\n  * Where appropriate, try to replicate the movements required for sport performance.\n\n#### Precautions for Dynamic Stretching\n\n  * Move progressively through the ROM.\n  * Move deliberately through the motion but without bouncing (movement should be controlled at all times).\n  * Do not forsake good technique for additional ROM.\n\nDynamic Stretching Techniques \n\n14.21"

  - id: "ch14-arm-swings"
    title: "Conclusion / Arm Swings"
    level: 3
    tags: [conclusion, swings]
    key_points:
      - "1."
    recall_prompts:
      - "Arm Swings 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Stand erect and raise the arms in front of the body until they are parallel to the floor.\n  2. While walking over a prescribed distance, swing the arms in unison to the right so the left arm is in front of the chest, the fingers of the left hand are pointing directly lateral to the left shoulder, and the right arm is behind the body.\n  3. Immediately reverse the direction of movement to swing the arms in unison to the left.\n  4. Movement should occur only at the shoulder joints (i.e., keep torso and head facing forward).\n  5. Alternate swinging the arms in unison to the right and left.\n\nMuscles Affected\n\nlatissimus dorsi, teres major, anterior and posterior deltoids, pectoralis major\n\n![An athlete swings both their arms to their left side.](images/E6372_0756P_0451_ebook.jpg)\n\n14.22"

  - id: "ch14-inchworm"
    title: "Conclusion / Inchworm"
    level: 3
    tags: [conclusion, inchworm]
    key_points:
      - "1."
    recall_prompts:
      - "Inchworm 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Stand erect with the feet placed shoulder-width apart.\n  2. While slightly flexing the knees, bend forward at the waist and place hands shoulder-width apart flat on the floor.\n  3. The weight of the body should be shifted back (i.e., not directly over the hands), with the buttocks high in the air—imagine making an inverted V with the body.\n  4. Move the hands alternately forward, as if taking short steps with the hands, until the body is in the push-up position.\n  5. Walk the legs to the hands using small steps while keeping the knees slightly flexed.\n  6. Repeat the motion over a prescribed distance.\n\nMuscles Affected\n\nerector spinae, gastrocnemius, gluteus maximus, hamstrings, soleus, anterior tibialis\n\n![An athlete bends forward and moves their hands alternately forward.](images/E6372_0756P_0483_ebook.jpg)\n\n![An athlete bends on their toes and hands. They move forward with their toes.](images/E6372_0756P_0487_ebook.jpg)\n\n![An athlete bends forward and places their hands on the floor. Their legs are planted firmly on the floor.](images/E6372_0756P_0475_ebook.jpg)\n\n14.23"

  - id: "ch14-lunge-walk"
    title: "Conclusion / Lunge Walk"
    level: 3
    tags: [conclusion, lunge, walk]
    key_points:
      - "1."
    recall_prompts:
      - "Lunge Walk 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Stand erect with the feet parallel to each other and shoulder-width apart.\n  2. Take an exaggerated step directly forward with the left leg, planting the left foot flat on the floor pointing straight ahead.\n  3. Allow the left hip and knee to slowly flex, keeping the left knee directly over the left foot.\n  4. Slightly flex the right knee and lower it until it is 1 to 2 inches (3-5 cm) above the floor; the right foot should be pointed straight ahead.\n  5. Balance the weight evenly between the ball of the right foot and the entire left foot.\n  6. Keep the torso perpendicular to the floor by “sitting back” on the right leg.\n  7. Forcefully push off of the floor by extending the left hip and knee.\n  8. Pick up the right foot and place it next to the left foot; do not stutter-step forward.\n  9. Stand erect, pause, and then step forward with the right leg, progressing forward with each step.\n\nMuscles Affected\n\ngluteus maximus, hamstrings, iliopsoas, quadriceps\n\n![An athlete performs lunges and grasps the back of their head. Pressure acts sideways and downward on the bent knee.](images/E6372_0756P_0488_ebook.jpg)\n\n14.24"

  - id: "ch14-lunge-with-overhead-side-reach"
    title: "Conclusion / Lunge With Overhead Side Reach"
    level: 3
    tags: [conclusion, lunge, overhead, side, reach]
    key_points:
      - "1."
    recall_prompts:
      - "Lunge With Overhead Side Reach 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Stand erect with the feet parallel to each other and shoulder-width apart.\n  2. Take an exaggerated step directly forward with the left leg, planting the left foot flat on the floor pointing straight ahead.\n  3. Allow the left hip and knee to slowly flex, keeping the left knee directly over the left foot.\n  4. Slightly flex the right knee and lower it until it is 1 to 2 inches (3-5 cm) above the floor; the right foot should be pointed straight ahead.\n  5. Reach up high with the right arm and bend the torso laterally toward the left leg.\n  6. Return to an erect torso position, and then forcefully push off the floor by extending the left hip and knee.\n  7. Pick up the right foot and place it next to the left foot; do not stutter-step forward.\n  8. Stand erect, pause, and then step forward with the right leg, progressing forward with each step.\n\nMuscles Affected\n\ngluteus maximus, hamstrings, iliopsoas, latissimus dorsi, internal and external oblique, rectus femoris\n\n![An athlete performs lunges with the left leg bent. They stretch their right arm upward and tilt their body to the left side.](images/E6372_0756P_0496_ebook.jpg)\n\n14.25"

  - id: "ch14-walking-knee-lift"
    title: "Conclusion / Walking Knee Lift"
    level: 3
    tags: [conclusion, walking, knee, lift]
    key_points:
      - "1."
    recall_prompts:
      - "Walking Knee Lift 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Stand erect with the feet parallel to each other and shoulder-width apart.\n  2. Step forward with the left leg and flex the right hip and knee to move the right thigh upward toward the chest.\n  3. Grasp the front of the right knee/upper shin and use the arms to pull the right knee up further and to squeeze the thigh against the chest.\n  4. Dorsiflex the left foot as the right hip and knee are flexed.\n  5. Keeping the torso erect, pause for a moment, then proceed to step down with the right leg.\n  6. Shift the body weight to the right leg and repeat the motion with the left leg.\n  7. Progress forward with each step, increasing the ROM and speed on subsequent steps.\n\nMuscles Affected\n\ngluteus maximus, hamstrings\n\n![An athlete lifts their right foot by bending their knee and moves their left foot forward.](images/E6372_0756P_0500_ebook.jpg)\n\n14.26"

  - id: "ch14-forward-lunge-with-elbow-to-instep"
    title: "Conclusion / Forward Lunge With Elbow to Instep"
    level: 3
    tags: [conclusion, forward, lunge, elbow, instep]
    key_points:
      - "1."
    recall_prompts:
      - "Forward Lunge With Elbow to Instep 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Stand erect with the feet parallel to each other and shoulder-width apart.\n  2. Take an exaggerated step directly forward with the left leg, planting the left foot flat on the floor pointing straight ahead.\n  3. Allow the left hip and knee to slowly flex, keeping the left knee directly over the left foot.\n  4. Slightly flex the right knee and lower it until it is 1 to 2 inches (3-5 cm) above the floor; the right foot should be pointed straight ahead.\n  5. Lean forward, bringing the left arm forward and touching the left elbow to the instep of the left foot; the right hand may be placed on the floor to maintain balance.\n  6. Lean back to return to an erect torso position, and then forcefully push off the floor by extending the left hip and knee.\n  7. Pick up the right foot and place it next to the left foot; do not stutter-step forward.\n  8. Stand erect, pause, and then step forward with the right leg, progressing forward with each step.\n\nMuscles Affected\n\nbiceps femoris, erector spinae, gastrocnemius, gluteus maximus, hamstrings, iliopsoas, latissimus dorsi, internal and external oblique, quadriceps, rectus femoris, soleus\n\n![An athlete stands on the ground with their feet parallel to each other and shoulder-width apart.](images/E6372_0756P_0502_ebook.jpg)\n\n![An athlete performs lunges.](images/E6372_0756P_0507_ebook.jpg)\n\n![An athlete bends one knee, stretches the other leg, and places both their hands on the floor.](images/E6372_0756P_0510_ebook.jpg)\n\n14.27"

  - id: "ch14-heel-to-toe-walk"
    title: "Conclusion / Heel-to-Toe Walk"
    level: 3
    tags: [conclusion, heel, walk]
    key_points:
      - "1."
    recall_prompts:
      - "Heel-to-Toe Walk 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Stand erect with the feet parallel to each other and shoulder-width apart.\n  2. Take a small step forward with the right leg; place the heel of the right foot on the ground first and then continue to dorsiflex the foot.\n  3. Immediately roll forward and rise up as high as possible onto the ball of the right foot.\n  4. Swing the left leg forward in order to take another small step.\n  5. Repeat with the left leg, progressing forward with each step.\n\nMuscles Affected\n\ngastrocnemius, soleus, anterior tibialis\n\n![An athlete has their right foot on the ground and the left foot on its toe on the ground.](images/E6372_0756P_0558_ebook.jpg)\n\n![An athlete has their right foot on the ground and the left foot on its toe on the ground.](images/E6372_0756P_0559_ebook.jpg)\n\n14.28"

  - id: "ch14-walking-over-and-under"
    title: "Conclusion / Walking Over and Under"
    level: 3
    tags: [conclusion, walking, over, under]
    key_points:
      - "1."
    recall_prompts:
      - "Walking Over and Under 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Stand erect with the feet parallel to each other and shoulder-width apart.\n  2. Flex the left hip and knee and then abduct the left thigh until it is parallel to the floor.\n  3. Step laterally to the left, stepping laterally over the first hurdle.\n  4. Place the left foot firmly on the ground, shift the body weight to the left leg, and then proceed to lift the right leg over the first hurdle.\n  5. After lifting the right leg over the hurdle and placing the right foot firmly on the ground, stand erect, pause, and then flex the hips and knees and dorsiflex the ankles to assume a full squat position.\n  6. Extend the left leg laterally, as if performing a lateral lunge.\n  7. Keeping the body weight low, move the body laterally, ducking under the second hurdle.\n  8. Stand erect, pause, and repeat the motion in the opposite direction, ducking under the second hurdle and stepping over the first.\n\n_Note:_ If hurdles are not available, athletes can perform the exercise can be performed by mirroring the motion of trying to step laterally and then under a hurdle.\n\nMuscles Affected\n\nhip abductors, hip adductors, gastrocnemius, gluteus maximus, hamstrings, iliopsoas, rectus femoris, soleus\n\n![An athlete stands to the left of a hurdle and lifts their left thigh.](images/E6372_0757P_3573_ebook.jpg)\n\n![An athlete stands to the left of a hurdle and steps over a hurdle on their left with their left leg.](images/E6372_0757P_3576_ebook.jpg)\n\n![An athlete stands between two hurdles and slips a leg under the hurdle on their left.](images/E6372_0757P_3585_ebook.jpg)\n\n![An athlete stands crouches and goes under a hurdle on their left.](images/E6372_0757P_3591_ebook.jpg)\n\n14.29"

  - id: "ch14-inverted-hamstring-stretch"
    title: "Conclusion / Inverted Hamstring Stretch"
    level: 3
    tags: [conclusion, inverted, hamstring, stretch]
    key_points:
      - "1."
    recall_prompts:
      - "Inverted Hamstring Stretch 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Stand tall and step a small step forward with the left leg.\n  2. Bend at the waist.\n  3. Reach forward with the left arm and simultaneously reach back with the right leg.\n  4. Try to keep the hips square.\n  5. Reach a position in which you feel a stretch in the hamstrings but eventually aim to attain a position in which the body is parallel to the floor.\n  6. Reach the right hand down toward the floor.\n  7. Return to the start by actively using the hamstrings and gluteals of the planted leg.\n  8. Take a step forward and repeat on the other leg.\n\nMuscles Affected\n\ngluteus maximus, hamstrings, hip abductors, hip adductors, erector spinae\n\n![An athlete raises their left arm, pushes their right leg behind them, and stands on the toes of their right leg.](images/E6372_0756P_0600_ebook.jpg)\n\n![An athlete raises their left arm forward and their right leg backward.](images/E6372_0756P_0607_ebook.jpg)\n\n![An athlete bends such that their body and right leg are in a straight line and their arms are stretched outward.](images/E6372_0756P_0613_ebook.jpg)\n\n![An athlete bends such that their body, right leg, and left arm are horizontal and in a line. They touch their left leg with their right hand.](images/E6372_0756P_0612_ebook.jpg)\n\n14.30"

  - id: "ch14-straight-leg-march"
    title: "Conclusion / Straight-Leg March"
    level: 3
    tags: [conclusion, straight, march]
    key_points:
      - "1."
    recall_prompts:
      - "Straight-Leg March 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Assume a tall standing position with both arms outstretched in front of the chest.\n  2. Rise up onto the toes of the left leg and simultaneously, using a straight-leg action, raise the right leg forward and up, aiming to actively move it through as large a ROM as possible.\n  3. Once the highest point is reached, actively pull the leg back to the start position.\n  4. Maintain the tall standing posture throughout.\n  5. Repeat on alternate legs as you move forward.\n\nMuscles Affected\n\ngluteus maximus, hamstrings, iliopsoas, rectus femoris\n\n![An athlete stands upright with their arms stretched forward.](images/E6372_0756P_0661_ebook.jpg)\n\n![An athlete stands upright with their arms stretched forward. They stand on their left toes and lift their right leg upward to touch their hands.](images/E6372_0756P_0662_ebook.jpg)\n\n![An athlete stands upright with their arms stretched forward. They stand on their left toes and bring their right leg downward from their hands.](images/E6372_0756P_0664_ebook.jpg)\n\n14.31"

  - id: "ch14-spiderman-crawl"
    title: "Conclusion / Spiderman Crawl"
    level: 3
    tags: [conclusion, spiderman, crawl]
    key_points:
      - "1."
    recall_prompts:
      - "Spiderman Crawl 是什麼？有哪些類型或應用？"
    content: "\n\n  1. Assume a push-up position but with elbows bent so that the position is lower than normal.\n  2. Lift and externally rotate the left leg, bringing the knee forward at an angle outside the left elbow.\n  3. Walk the hands forward and across the body.\n  4. As this progresses, bring the right leg forward outside the right hand and repeat for the given distance.\n  5. Repeat, alternating sides, for the required distance.\n\nMuscles Affected\n\nbiceps femoris, erector spinae, gastrocnemius, gluteus maximus, hamstrings, iliopsoas, latissimus dorsi, internal and external oblique, quadriceps, rectus femoris, soleus\n\n![An athlete crouches by stretching their right leg and bending their left leg. Their hands are planted on the ground near their left leg.](images/E6372_0756P_0636_ebook.jpg)\n\n![An athlete crouches by stretching their right leg and bending their left leg. Their hands are planted on the ground between their legs.](images/E6372_0756P_0638_ebook.jpg)\n\n![An athlete crouches by stretching their left leg and bending their right leg. Their hands are planted on the ground near their right leg.](images/E6372_0756P_0639_ebook.jpg)\n\n#### Key Terms\n\n  * active stretch\n  * agonist contraction\n  * autogenic inhibition\n  * ball-and-socket joint\n  * ballistic stretch\n  * contract-relax\n  * dynamic flexibility\n  * dynamic stretch\n  * elasticity\n  * ellipsoidal joint\n  * fibrosis\n  * flexibility\n  * general warm-up\n  * Golgi tendon organ (GTO)\n  * hinge joint\n  * hold-relax\n  * hold-relax with agonist contraction\n  * mechanoreceptor\n  * mobility drills\n  * muscle spindles\n  * passive stretch\n  * plasticity\n  * potentiation\n  * proprioceptive neuromuscular facilitation (PNF)\n  * Raise, Activate and Mobilize, and Potentiate (RAMP)\n  * range of motion (ROM)\n  * reciprocal inhibition\n  * specific warm-up\n  * static flexibility\n  * static stretch\n  * stretch reflex\n\n#### Study Questions\n\n  1. Which of the following is a nontemperature-related effect of a warm-up? \n     1. enhanced neural function\n     2. disruption of transient connective tissue bonds\n     3. elevation of baseline oxygen consumption\n     4. increase in muscle temperature\n  2. When stimulated during contract-relax PNF stretching, Golgi tendon organs allow the relaxation of the \n     1. stretched muscle by contracting the reciprocal muscle\n     2. reciprocal muscle by contracting the stretched muscle\n     3. reciprocal muscle by its own contraction\n     4. stretched muscle by its own contraction\n  3. Which of the following stretching techniques decreases muscle spindle stimulation? \n     1. dynamic\n     2. ballistic\n     3. static\n     4. passive\n  4. Stimulation of muscle spindles induces a \n     1. relaxation of GTOs\n     2. relaxation of the stretched muscle\n     3. contraction of the stretched muscle\n     4. contraction of the reciprocal muscle\n  5. After performing the hold-relax with agonist contraction PNF stretch for the hamstrings, which of the following explains the resulting increase in flexibility? \n     1. I. autogenic inhibition\n     2. II. stretch inhibition\n     3. III. reciprocal inhibition\n     4. IV. crossed-extensor inhibition\n     1. I and III only\n     2. II and IV only\n     3. I, II, and III only\n     4. II, III, and IV only"
