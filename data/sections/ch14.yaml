sections:
  - id: "ch14-warm-up"
    title: "Warm-Up"
    level: 2
    tags: [warm]
    key_points:
      - "A warm-up period is now almost universally accepted as an integral part of any training session or competition ([10](<E6372RM_Refs_d104_split_014."
    recall_prompts:
      - "Warm-Up 的核心概念是什麼？"
    content: "\n\nA warm-up period is now almost universally accepted as an integral part of any training session or competition ([10](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref10>)). Essentially, its goal is to prepare the athlete mentally and physically for exercise or competition ([51](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref51>)). A well-designed warm-up can confer a number of physiological responses that can potentially increase subsequent performance. These can be divided into temperature-related effects and non–temperature-related effects ([10](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref10>)). Temperature-related effects include an increase in muscle temperature, core temperature ([68](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref68>)), enhanced neural function, and the disruption of transient connective tissue bonds ([33](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref33>)), while non–temperature-related effects can include increased blood flow to muscles, an elevation of baseline oxygen consumption, and postactivation potentiation ([10](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref10>)). Warm-up effects are best elicited via an active type of warm-up rather than via passive warming techniques ([33](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref33>)). The positive effects on performance may include the following:\n\n  * Faster muscle contraction and relaxation of both agonist and antagonist muscles ([51](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref51>))\n  * Improvements in the rate of force development and reaction time ([3](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref3>))\n  * Improvements in muscle strength and power ([9](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref9>), [33](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref33>))\n  * Lowered viscous resistance in muscles and joints ([33](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref33>))\n  * Improved oxygen delivery due to the Bohr effect, whereby higher temperatures facilitate oxygen release from hemoglobin and myoglobin ([68](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref68>))\n  * Increased blood flow to active muscles ([68](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref68>))\n  * Enhanced metabolic reactions ([33](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref33>))\n  * An increased psychological preparedness for performance ([10](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref10>))\n\nWhile the number of quality studies investigating the impact of warm-up on performance is surprisingly low, studies generally show a positive impact on subsequent performance ([42](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref42>)). These include improvements in endurance performance (both aerobic and anaerobic) and improvements in performance on physical tasks such as jumping, as well as in actual sporting performance ([42](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref42>)). What is also clear is that the major factors influencing the potential improvements are the structure of the warm-up and the specificity of the warm-up to the task(s) to be performed ([42](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref42>)). It is likely that a range of warm-ups can be used, provided that they are structured in a way that addresses the specific physiological, biomechanical, and psychological requirements of the sport and of the athlete.\n\nThe structure of the warm-up influences potential improvements; as such, the warm-up needs to be specific to the activity to be performed.\n\nAn effective warm-up has also traditionally been thought to decrease the risk of injury. While the influence of a warm-up on injury prevention is unclear, the evidence suggests that positive effects may exist ([41](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref41>), [85](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref85>), [86](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref86>)). For example, increased muscle temperature can increase resistance to muscle tear ([81](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref81>)).\n\n### Components of a Warm-Up\n\nIt is generally advised that a warm-up consist of a period of aerobic exercise, followed by stretching, and ending with a period of activity similar to the upcoming activity ([42](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref42>)). A traditional warm-up program structure is built around these requirements and typically involves two key phases.\n\nThe first is a general warm-up period ([21](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref21>), [77](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref77>)), which may consist of 5 minutes of slow aerobic activity such as jogging, skipping, or cycling. The aim of this phase is to increase heart rate, blood flow, deep muscle temperature, respiration rate, and perspiration and decrease viscosity of joint fluids ([30](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref30>)). This phase is typically followed by a period of general stretching that aims to replicate the ranges of motion required for the upcoming activity.\n\nFollowing the general warm-up is the specific warm-up period, which incorporates movements similar to the movements of the athlete’s sport. This phase should also include rehearsal of the skill(s) to be performed ([100](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref100>)).\n\nThe whole warm-up should progress gradually and provide sufficient intensity to increase muscle and core temperatures without causing fatigue or reducing energy stores ([68](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref68>)). Typically, it should last between 10 and 20 minutes; the shorter time periods are far more common in the majority of training sessions. Longer time periods are more common in cases in which aspects of the warm-up are an integral part of the main session, or when specific competition warm-ups are being carried out. The warm-up should end no more than 15 minutes before the start of the subsequent activity (after this time the positive effects of the warm-up start to dissipate) ([33](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref33>)).\n\n### Targeted and Structured Warm-Ups\n\nWhile the structure of general and specific warm-up is generally accepted, activities undertaken within warm-ups vary considerably. Consequently, although athletes may be undertaking a warm-up, it is difficult to ensure that the warm-up adequately addresses the key variables required to optimize subsequent performance ([42](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref42>)). Effective planning needs to carefully consider how the warm-up will contribute to subsequent performance. Similarly, planning needs to delineate between warm-ups used before competition and the more ubiquitous warm-ups used within a training session. Whereas the warm-up for competition aims at maximizing performance in the subsequent competition, the training warm-up, as well as optimizing acute performance, can contribute to performance in other productive ways and should be planned appropriately. For optimal impact, this planning should also consider how the warm-up contributes to the overall development of the athlete; this planning should entail short-, medium-, and long-term considerations.\n\nMedium- and long-term planning is a recent trend with regard to planning effective warm-ups. Athletes spend a great deal of training time warming up, and so structures that allow optimal use of this time provide a potentially powerful tool for the coach ([54](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref54>)). Effective warm-ups should be thought of as an integral part of a training session, not as a separate entity ([54](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref54>)). With most training warm-ups lasting from 10 to 20 minutes, over a training cycle this contributes to a significant amount of training time; with effective planning, this can contribute greatly to an athlete’s overall development, as well as optimally preparing the athlete for the subsequent session.\n\nThe warm-up is an integral part of the training session. Strength and conditioning professionals should plan warm-ups incorporating short-, medium-, and long-term considerations that will contribute to the overall development of the athlete.\n\nIt is likely that optimal levels of warm-up exist ([89](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref89>)); these are related to the type of warm-up (training or competition), the task to be performed, the individual, and the environment. There is likely a range of potentially effective warm-ups; the key is that the coach has a structure around which to plan the warm-up. The structure of general and specific warm-up, though valid, may need to be supplemented by an approach that allows for greater targeting of both short- and long-term performance. One structure that has been adopted by many coaches and that addresses all of the key aspects of an effective warm-up is the Raise, Activate and Mobilize, and Potentiate (RAMP) protocol ([54](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref54>)). This builds on the general and specific structure and provides a suitable approach via which performance can be maximized in the short, medium, and long term ([54](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref54>)). As the name indicates, raise, activate and mobilize, and potentiate are its three key phases.\n\nThe first phase of RAMP involves activities that raise the level of key physiological parameters but also the levels of skill of the athletes. This phase is analogous to the general warm-up and has the aim of elevating body temperature, heart rate, respiration rate, blood flow, and joint fluid viscosity via low-intensity activities. However, a critical aspect is that unlike traditional general warm-up activities, these are not simply general aerobic exercises; instead, they attempt to simulate the movement patterns of the upcoming activity or develop the movement patterns or skill patterns the athlete will need to deploy within the sport. In this way, the session, from the outset, is targeted at key movement and skill capacities, as well as providing the required physiological effects of the activity. This also assists in the psychological preparation of the athlete for practice or competition as the session constantly addresses components that relate to performance.\n\nThe second phase, activating and mobilizing, is analogous to the stretching component of a typical warm-up. Key movement patterns required for athletic performance in both the subsequent session and in the athlete’s overall development, such as squat patterns and lunge patterns, are performed. The focus on mobility, or actively moving through a range of motion, requires a combination of motor control, stability, and flexibility and more closely relates to the movements requirements an athlete will face ([54](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref54>)). Great debate is still prevalent as to whether static stretching should be used within warm-up, and at present the evidence is equivocal. Some reviews of the literature on the effect of static stretching on performance question the practice ([83](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref83>), [84](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref84>), [100](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref100>)), suggesting that it can compromise muscle performance ([59](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref59>)). Studies have demonstrated negative effects of static stretching on performance in a range of parameters such as force production ([8](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref8>), [25](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref25>)-[27](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref27>), [35](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref35>), [76](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref76>)), power performance ([23](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref23>), [92](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref92>), [99](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref99>), [100](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref100>)), running speed ([38](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref38>)), reaction/movement time ([7](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref7>)), and strength endurance ([73](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref73>)). Other studies show no decrement in performance, and a more recent review by Kay and Blazevich ([56](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref56>)) concludes that there is clear evidence that short-duration static stretching has no detrimental effect on subsequent performance unless stretches are held for greater than 60 seconds. However, a recent meta-analysis performed by Simic and colleagues ([87](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref87>)) calls into question the work of Kay and Blazevich ([56](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref56>)), suggesting that the authors did not use appropriate statistical measures to support their contentions. Simic and coworkers ([87](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref87>)) report that shorter-duration (<45 seconds) static stretching bouts result in less performance decrement but that the performance decrement still exists and may affect competitive performance. Therefore, in deciding whether to use static stretching within this phase of the warm-up, it is important that the strength and conditioning professional perform a benefit–risk analysis ([65](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref65>)). An important factor to consider in designing this phase of the warm-up is the range of motion required for the activity; athletes in sports that require greater ranges of motion may need to spend more time in this phase of warm-up than those with a low range of motion requirement ([46](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref46>), [97](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref97>)).\n\nIn relation to these decisions, the use of a mobilization and activation phase for warm-up rather than a stretching phase helps coaches select the activities. As no consistent link has been shown between stretching and injury prevention ([47](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref47>), [50](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref50>), [75](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref75>), [86](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref86>), [89](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref89>)) or subsequent muscle soreness ([55](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref55>)), the focus in warm-ups should shift to performance. Exercises should be designed to contribute to the preparation for the upcoming session but also enhance the athlete’s overall movement capacities. Exercises that encourage the athlete to use key movement patterns, thus helping with the development of the required motor control as well as developing mobility, are ideal activities within this phase of the warm-up ([54](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref54>)). Similarly, this phase provides a great opportunity via which to address any specific movement issues an athlete may demonstrate ([54](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref54>)).\n\nThe use of a range of dynamic stretching and mobility exercises provides all of these key advantages. Additionally, dynamic stretching helps maintain the temperature-related benefits of the raising phase of the warm-up ([54](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref54>)). Furthermore, a number of joints can be integrated into a single stretch, often including multiplanar movements similar to those that occur in sport. Thus, dynamic stretches are extremely time efficient, which can be important when training time is limited ([49](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref49>), [54](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref54>)). These advantages, together with the fact that dynamic stretching and mobility exercises have been shown to improve subsequent running performance ([38](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref38>), [66](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref66>), [98](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref98>)), make these types of exercises the preferred activities during warming up for the majority of sports ([54](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref54>)).\n\nThe third phase, potentiation, is analogous to the specific warm-up but importantly also focuses on the intensity of activities. This phase deploys sport-specific activities that progress in intensity until the athlete is performing at the intensity required for the subsequent competition or training session. This phase is important to subsequent performance, especially in activities that require high levels of speed, strength, and power, yet it is often omitted from traditional warm-ups. Indeed, the more power necessary for the sport or activity, the more important the potentiation phase of warm-up ([17](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref17>)), and including high-intensity dynamic exercises can facilitate subsequent performance ([11](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref11>), [14](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref14>), [36](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref36>), [99](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref99>)). Competition warm-up should include a progression of sport-specific activities that enable the athlete to maximize performance physiologically and psychologically ([11](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref11>)). For the training warm-up, this should be targeted to the upcoming session yet also address the longer-term requirements of the athlete. With effective planning, this phase of the warm-up can be a key part of the session, presenting an ideal opportunity to work on aspects of performance such as speed and agility ([54](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref54>)). Effective planning of this phase can allow considerable training time to be spent on key components of fitness without an overall increase in training duration ([54](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref54>)). Indeed, it is this phase that ultimately determines the optimal length of the warm-up, as the potentiation phase can become a key part of the session, allowing the delivery of elements such as speed training and agility training; in these instances the entire warm-up will be longer but will progress essentially seamlessly to the main session."

  - id: "ch14-flexibility-and-performance"
    title: "Flexibility / Flexibility and Performance"
    level: 3
    tags: [flexibility, flexibility, performance]
    key_points:
      - "The effects of flexibility on performance depend on the types of activity undertaken, and the most flexible athlete is not always the most successful ([82](<E6372RM_Refs_d104_split_014."
    recall_prompts:
      - "Flexibility and Performance 是什麼？有哪些類型或應用？"
    content: "\n\nThe effects of flexibility on performance depend on the types of activity undertaken, and the most flexible athlete is not always the most successful ([82](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref82>)). Therefore, optimizing flexibility in relation to the specific activity rather than simply maximizing flexibility is the main aim of training ([71](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref71>)). Sports and activities have specific requirements for ROM, and it is likely that optimal levels of flexibility exist for each activity, with these related to the movements within the particular sport ([45](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref45>), [89](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref89>)). It is also important that the strength and conditioning professional keep in mind the kinetic and kinematic patterns required within the ROM, as this will dictate the types of development methods used. The development of greater ROM will be associated with the aim of enhancing performance, and this often involves the need to apply force over the required ROM and the ability to assume the key technical positions required for the sport. In some instances, greater ROM can be seen as the missing link in the athlete’s power program, as the ability to apply force over a greater ROM can increase impulse, via extending the time over which the athlete can apply force, which in turn contributes to enhanced performance in a range of sports ([67](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref67>)). Thus, the strength and conditioning professional should look at the optimal ROM required of the athlete, but also at the force patterns required through this ROM, and should develop these in tandem with enhanced ROM to ensure that the athlete is optimally prepared for performance.\n\nThere are optimal ranges of flexibility for different sports and activities, and injury risk may be increased when an athlete is unable to attain this range. It is also important to note that both inflexibility and hyperflexibility can result in higher risks of injury ([78](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref78>), [89](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref89>)). In addition, an imbalance in flexibility could predispose the individual to an increased risk of injury ([57](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref57>), [58](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref58>))."

  - id: "ch14-factors-affecting-flexibility"
    title: "Flexibility / Factors Affecting Flexibility"
    level: 3
    tags: [flexibility, factors, affecting, flexibility]
    key_points:
      - "A number of anatomical and training-related factors affect flexibility."
    recall_prompts:
      - "Factors Affecting Flexibility 是什麼？有哪些類型或應用？"
    content: "\n\nA number of anatomical and training-related factors affect flexibility. Training cannot alter some factors, such as joint structure, age, and sex. However, others can be manipulated and thus are important considerations in the design of flexibility development programs. A long-term program of stretching can have cumulative positive effects ranging from enhanced flexibility to enhanced strength ([82](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref82>)). Strength and conditioning professionals should consider each athlete’s unique combination of factors and sport requirements when recommending flexibility development exercises and programs.\n\n#### Joint Structure\n\nThe structure of a joint determines its ROM ([66](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref66>)). Ball-and-socket joints, such as the hip and shoulder, move in all anatomical planes and have the greatest ROM of all joints ([2](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref2>)). The wrist is an ellipsoidal joint (an oval-shaped condyle that fits into an elliptical cavity) primarily allowing movement in the sagittal and frontal planes; its ROM is significantly less than that of the shoulder or hip ([2](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref2>)). In contrast, the knee is a modified hinge joint, with movement primarily in the sagittal plane; its ROM is less than that of either a ball-and-socket joint or the ellipsoidal wrist joint. The type of joint, the shapes of the joint’s articulating surfaces, and the soft tissues surrounding the joint all affect its ROM.\n\n#### Age and Sex\n\nYoung people tend to be more flexible than older people ([95](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref95>)), and females tend to be more flexible than males ([44](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref44>)). Differences in flexibility between young men and women may be due in part to structural and anatomical differences and the type and extent of activities performed. Older people undergo a process called fibrosis, in which fibrous connective tissue replaces degenerating muscle fibers ([2](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref2>)). This is likely due to inactivity and a tendency to use less of the available ROM during movement. Just as older people can improve strength, they can improve flexibility with appropriate exercise.\n\n#### Muscle and Connective Tissue\n\nA range of body tissues can influence flexibility. For example, factors such as muscle tissue, the musculotendinous unit, tendons, ligaments, fascial sheaths, joint capsules, and skin may limit ROM ([30](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref30>)). The relative contributions of these to increased flexibility, both acutely and chronically, remain unclear and reflect the impact of elasticity and plasticity. Elasticity (the ability to return to original resting length after a passive stretch) and plasticity (the tendency to assume a new and greater length after a passive stretch) of connective tissue are other factors that determine ROM ([39](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref39>), [96](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref96>)). Stretching exercises can positively affect connective tissues by taking advantage of their plastic potential, although the relative importance of each tissue type and the differences between individual responses remain unclear ([12](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref12>)).\n\n#### Stretch Tolerance\n\nAn important factor in determining an athlete’s flexibility is stretch tolerance, or the ability to tolerate the discomfort of stretching ([82](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref82>)). Individuals with a greater ROM tend to demonstrate a greater level of stretch tolerance and are thus able to tolerate a greater stretch load ([12](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref12>)). One important feature of a regular stretching program is that it can increase an athlete’s stretch tolerance, thus potentially permitting further increases in flexibility.\n\n#### Neural Control\n\nThe control of an athlete’s ROM is ultimately held at the level of the central and peripheral nervous system and less by structural elements ([62](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref62>)). This system includes both afferent and efferent mechanisms resulting in both reflexive and conscious activities that ultimately control the ROM an athlete is able to attain. A key aspect of an effective flexibility program is the capacity to positively affect this system, allowing for elicitation of a greater ROM.\n\n#### Resistance Training\n\nA comprehensive and proper resistance training program may increase flexibility ([60](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref60>), [88](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref88>)) and also assist in the development of force capacity through the enhanced ROM. Effective strength training protocols should be seen as an important adjunct to a stretching program ([82](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref82>)). However, this comes with a proviso: Heavy resistance training with limited ROM during the exercises may decrease ROM ([30](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref30>)). To prevent loss of ROM, an athlete should perform exercises that develop both agonist and antagonist muscles ([16](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref16>)) and should exercise through the full available ROM of the involved joints.\n\n#### Muscle Bulk\n\nA significant increase in muscle bulk may adversely affect ROM by impeding joint movement. An athlete with large biceps and deltoids, for example, may experience difficulty in stretching the triceps ([30](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref30>)), racking a power clean, or holding a bar while performing the front squat. Although altering the training program can decrease the amount of muscle bulk, this may not be advisable for large power athletes such as shot putters or American football offensive linemen. Strength and conditioning professionals should always keep the requirements of the athlete’s sport in mind: The need for large muscles may supersede the need for extreme joint mobility, but similarly, where ROM is crucial, the potential negative effects of muscle bulk should be considered and training programs planned accordingly.\n\n#### Activity Level\n\nAn active person tends to be more flexible than an inactive one ([44](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref44>)). This is particularly true if the activity includes flexibility exercises but is also true if the person performs other activities such as resistance training. Both men and women have successfully increased their flexibility as an outcome of a properly designed resistance training program ([94](<E6372RM_Refs_d104_split_014.xhtml#chapter14-ref94>)). It is also important to understand that activity level alone does not improve flexibility; stretching exercises or exercises requiring the body to move through a full ROM are essential if joint flexibility is to be maintained or increased."

