chapter_id: ch03
chapter_title_zh: "運動與訓練生物能量學"
source_file: "doc_61bb054caf00_ch03_bioenergetics_of_exercise_and_training.md"
sections:
  - id: "ch03-essential-terminology"
    title: "Essential Terminology"
    level: 2
    tags: [essential, terminology]
    key_points:
      - "Bioenergetics, or the flow of energy in a biological system, concerns primarily the conversion of macronutrients—carbohydrate, protein, and fats, which contain chemical energy—into biologically usable"
    recall_prompts:
      - "Essential Terminology 的核心概念是什麼？"
    content: "\n\nBioenergetics, or the flow of energy in a biological system, concerns primarily the conversion of macronutrients—carbohydrate, protein, and fats, which contain chemical energy—into biologically usable forms of energy. It is the breakdown of the chemical bonds in these macronutrients that provides the energy necessary to perform biological work.\n\nThe breakdown of large molecules into smaller molecules, associated with the release of energy, is termed catabolism. The synthesis of larger molecules from smaller molecules can be accomplished using the energy released from catabolic reactions; this building-up process is termed anabolism. The breakdown of protein into amino acids is an example of catabolism, while the formation of protein from amino acids is an anabolic process. Exergonic reactions are energy-releasing reactions and are generally catabolic. Endergonic reactions require energy and include anabolic processes and the contraction of muscle. Metabolism is the total of all the catabolic or exergonic and anabolic or endergonic reactions in a biological system. Energy derived from catabolic or exergonic reactions is used to drive anabolic or endergonic reactions through an intermediate molecule, adenosine triphosphate (ATP). Adenosine triphosphate allows the transfer of energy from exergonic to endergonic reactions. Without an adequate supply of ATP, muscular activity and muscle growth would not be possible. Thus, it is apparent that when designing training programs, strength and conditioning professionals need to have a basic understanding of how exercise affects ATP hydrolysis and resynthesis.\n\nAdenosine triphosphate is composed of adenosine and three phosphate groups ([figure 3.1](<E6372ch03_d80.xhtml#f3.1>)). Adenosine is the combination of adenine (a nitrogen-containing base) and ribose (a five-carbon sugar). The breakdown of one molecule of ATP to yield energy is known as hydrolysis, because it requires one molecule of water. The hydrolysis of ATP is catalyzed by the presence of an enzyme called adenosine triphosphatase (ATPase). Specifically, myosin ATPase is the enzyme that catalyzes ATP hydrolysis for crossbridge recycling. Other specific enzymes hydrolyze ATP at other locations, such as calcium ATPase for pumping calcium into the sarcoplasmic reticulum and sodium-potassium ATPase for maintaining the sarcolemmal concentration gradient after depolarization ([59](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref59>)). The following equation depicts the reactants (left), enzyme (middle), and products (right) of ATP hydrolysis:\n\n![Equation reads: A T P plus H sub 2 O, with a bidirectional arrow labeled A T Pase, yields A D P plus P sub i plus H superscript plus, plus Energy.](images/E6372_Equation_03_01_ebook.jpg) (3.1)\n\nwhere ADP represents adenosine diphosphate (only two phosphate groups, [figure 3.1](<E6372ch03_d80.xhtml#f3.1>)), Pi is an inorganic phosphate molecule, and H+ is a hydrogen ion (proton). Further hydrolysis of ADP cleaves the second phosphate group and yields adenosine monophosphate (AMP). The energy released primarily from the hydrolysis of ATP and secondarily from ADP results in biological work.\n\n**Figure 3.1**  _(a)_ The chemical structure of an ATP molecule showing adenosine (adenine + ribose), the triphosphate group, and locations of the high-energy chemical bonds. _(b)_ The hydrolysis of ATP breaks the terminal phosphate bond, releases energy, and leaves ADP, an inorganic phosphate (Pi), and a hydrogen ion (H+). _(c)_ The hydrolysis of ADP breaks the terminal phosphate bond, releases energy, and leaves AMP, Pi, and H+.\n\n![A chemical reaction of the formation of A M P from A T P.](images/E6372_508036_ebook.jpg)\n\n[Follow for extended description](<Ext_desc_E6372_508036_ebook.xhtml#l_E6372_508036_ebook>)\n\nAdenosine triphosphate is classified as a high-energy molecule because it stores large amounts of energy in the chemical bonds of the two terminal phosphate groups. Because muscle cells store ATP only in limited amounts and activity requires a constant supply of ATP to provide the energy needed for muscle actions, ATP-producing processes must occur in the cell."

  - id: "ch03-phosphagen-system"
    title: "Biological Energy Systems / Phosphagen System"
    level: 3
    tags: [biological, energy, systems, phosphagen, system]
    key_points:
      - "The phosphagen system provides ATP primarily for short-term, high-intensity activities (e."
    recall_prompts:
      - "Phosphagen System 是什麼？有哪些類型或應用？"
    content: "\n\nThe phosphagen system provides ATP primarily for short-term, high-intensity activities (e.g., resistance training and sprinting) and is highly active at the start of all exercise regardless of intensity ([62](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref62>), [70](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref70>), [153](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref153>)). This energy system relies on the hydrolysis of ATP (equation 3.1) and breakdown of another high-energy phosphate molecule called creatine phosphate (CP), also called phosphocreatine (PCr). Creatine kinase is the enzyme that catalyzes the synthesis of ATP from CP and ADP in the following reaction:\n\n![Equation reads: A D P plus C P, with a bidirectional arrow labeled Creatine kinase, yields A T P plus Creatine.](images/E6372_Equation_03_02_ebook.jpg) (3.2)\n\nCreatine phosphate supplies a phosphate group that combines with ADP to replenish ATP. The creatine kinase reaction provides energy at a high rate; however, because CP is stored in relatively small amounts, the phosphagen system cannot be the primary supplier of energy for continuous, long-duration activities ([30](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref30>)).\n\n#### ATP Stores\n\nThe body stores approximately 80 to 100 g (about 3 ounces) of ATP at any given time, which does not represent a significant energy reserve for exercise ([107](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref107>)). In addition, ATP stores cannot be completely depleted due to the necessity for basic cellular function. In fact, ATP concentrations may decrease by up to 50% to 60% ([34](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref34>), [71](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref71>), [100](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref100>), [143](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref143>)) of the preexercise levels during experimentally induced muscle fatigue. Therefore, the phosphagen system uses the creatine kinase reaction (equation 3.2) to maintain the concentration of ATP. Under normal circumstances, skeletal muscle concentrations of CP are four to six times higher than ATP concentrations ([107](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref107>)). Therefore, the phosphagen system, through CP and the creatine kinase reaction, serves as an energy reserve for rapidly replenishing ATP. In addition, Type II (fast-twitch) muscle fibers contain higher concentrations of CP than Type I (slow-twitch) fibers ([95](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref95>), [132](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref132>)); thus, individuals with higher percentages of Type II fibers may be able to replenish ATP faster through the phosphagen system during anaerobic, explosive exercise.\n\nAnother important single-enzyme reaction that can rapidly replenish ATP is the adenylate kinase (also called myokinase) reaction:\n\n![Equation reads: 2 A D P, with a bidirectional arrow labeled Adenylate kinase, yields A T P plus A M P.](images/E6372_Equation_03_03_ebook.jpg) (3.3)\n\nThis reaction is particularly important because AMP, a product of the adenylate kinase (myokinase) reaction, is a powerful stimulant of glycolysis ([22](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref22>), [28](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref28>)).\n\n#### Control of the Phosphagen System\n\nThe reactions of the phosphagen system (often represented by equations 3.1, 3.2, and 3.3) are largely controlled by the law of mass action or the mass action effect ([107](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref107>)). The law of mass action states that the concentrations of reactants or products (or both) in solution will drive the direction of the reactions. With enzyme-mediated reactions, such as the reactions of the phosphagen system, the rate of product formation is greatly influenced by the concentrations of the reactants. This is denoted in equations 3.1, 3.2, and 3.3 by the two-way arrow between reactants and products. For example, as ATP is hydrolyzed to yield the energy necessary for exercise (equation 3.1), there is a transient increase in ADP concentrations (as well as Pi) in the sarcolemma. This will increase the rate of the creatine kinase and adenylate kinase reaction (equations 3.2 and 3.3) to replenish the ATP supply. The process will continue until (a) the exercise ceases or (b) the intensity is low enough that it does not deplete CP stores and it allows glycolysis or the oxidative system to become the primary supplier of ATP and rephosphorylate the free creatine (equation 3.2) ([37](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref37>)). At this point, the sarcoplasmic concentration of ATP will remain steady or increase, which will slow down or reverse the directions of the creatine kinase and adenylate kinase reactions. As a result, equations 3.1, 3.2, and 3.3 are often referred to as near-equilibrium reactions that proceed in a direction dictated by the concentrations of the reactants due to the law of mass action."

  - id: "ch03-glycolysis"
    title: "Biological Energy Systems / Glycolysis"
    level: 3
    tags: [biological, energy, systems, glycolysis]
    key_points:
      - "Glycolysis is the breakdown of carbohydrate—either glycogen stored in the muscle or glucose delivered in the blood—to resynthesize ATP ([22](<E6372RM_Refs_d104_split_003."
    recall_prompts:
      - "Glycolysis 是什麼？有哪些類型或應用？"
    content: "\n\nGlycolysis is the breakdown of carbohydrate—either glycogen stored in the muscle or glucose delivered in the blood—to resynthesize ATP ([22](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref22>), [143](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref143>)). The process of glycolysis involves multiple enzymatically catalyzed reactions ([figure 3.2](<E6372ch03_d80.xhtml#f3.2>)). As a result, the ATP resynthesis rate during glycolysis is not as rapid as with the single-step phosphagen system; however, the capacity to produce ATP is much higher due to a larger supply of glycogen and glucose compared to CP. As with the phosphagen system, glycolysis occurs in the sarcoplasm.\n\n**Figure 3.2** Glycolysis. ADP = adenosine diphosphate; ATP = adenosine triphosphate; NAD+, NADH = nicotinamide adenine dinucleotide.\n\n![A cyclic diagram of the products formed during glycolysis.](images/E6372_508037_ebook.jpg)\n\n[Follow for extended description](<Ext_desc_E6372_508037_ebook.xhtml#l_E6372_508037_ebook>)\n\nAs depicted in [figure 3.2](<E6372ch03_d80.xhtml#f3.2>), pyruvate, the end result of glycolysis, may proceed in one of two directions:\n\n  1. Pyruvate can be converted to lactate in the sarcoplasm.\n  2. Pyruvate can be shuttled into the mitochondria.\n\nWhen pyruvate is converted to lactate, ATP resynthesis occurs at a faster rate via the rapid regeneration of NAD+, but is limited in duration due to the subsequent H+ production and resulting decrease in cytosolic pH. This process is sometimes called anaerobic glycolysis (or fast glycolysis). However, when pyruvate is shuttled into the mitochondria to undergo the Krebs cycle, the ATP resynthesis rate is slower because of the numerous reactions, but can occur for a longer duration if the exercise intensity is low enough. This process is often referred to as aerobic glycolysis (or slow glycolysis). At higher exercise intensities, pyruvate and NADH will increase above what can be handled by pyruvate dehydrogenase and will then be converted into lactate and NAD+. Unfortunately, because glycolysis itself does not depend on oxygen, the terms _anaerobic_ and _aerobic_ (or _fast_ and _slow_ , respectively) _glycolysis_ are probably not practical for describing the processes. Nevertheless, the fate of pyruvate is ultimately controlled by the energy demands within the cell. If energy demand is high and must be transferred quickly, as during resistance training, pyruvate is primarily converted to lactate for further support of anaerobic glycolysis. If energy demand is not as high and oxygen is present in sufficient quantities in the cell, pyruvate can be further oxidized in the mitochondria.\n\n#### Glycolysis and the Formation of Lactate\n\nThe formation of lactate from pyruvate is catalyzed by the enzyme lactate dehydrogenase. Sometimes, mistakenly, the end result of this reaction is said to be the formation of lactic acid. However, due to the physiological pH (i.e., near 7) and earlier steps in glycolysis that consume protons ([123](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref123>)), lactate—rather than lactic acid—is the product of the lactate dehydrogenase reaction. Although the muscular fatigue experienced during exercise often correlates with high tissue concentrations of lactate, lactate is not the cause of fatigue ([22](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref22>), [27](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref27>), [123](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref123>)). Proton (H+) accumulation during fatigue reduces the intracellular pH, inhibits glycolytic reactions, and directly interferes with muscle’s excitation–contraction coupling—possibly by inhibiting calcium binding to troponin ([57](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref57>), [113](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref113>)) or by interfering with crossbridge recycling ([51](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref51>), [57](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref57>), [78](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref78>), [113](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref113>), [144](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref144>)). Also, the decrease in pH inhibits the enzymatic turnover rate of the cell’s energy systems ([9](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref9>), [78](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref78>)). Overall, this process of an exercise-induced decrease in pH is referred to as metabolic acidosis ([123](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref123>)), and may be responsible for much of the peripheral fatigue that occurs during exercise ([42](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref42>), [154](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref154>)). More recently, the role of metabolic acidosis in peripheral fatigue has been questioned ([128](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref128>)); and other factors have been reported to play a prominent role in peripheral fatigue, such as an increased interstitial K+ concentration and Pi that impairs Ca++ release ([118](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref118>), [137](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref137>)). However, evidence suggests that other mechanisms, such as the simple hydrolysis of ATP (equation 3.1), are responsible for most of the H+ accumulation and that lactate itself actually works to decrease metabolic acidosis rather than accelerate it ([27](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref27>), [123](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref123>)). See the sidebar titled “Lactic Acid Does Not Cause Metabolic Acidosis!” In fact, lactate is often used as an energy substrate, especially in Type I and cardiac muscle fibers ([10](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref10>), [106](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref106>), [160](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref160>)). It is also used in gluconeogenesis—the formation of glucose from noncarbohydrate sources—during extended exercise and recovery ([19](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref19>), [106](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref106>)).\n\nNormally there is a low concentration of lactate in blood and muscle. The reported normal range of lactate concentration in blood is 0.5 to 2.2 mmol/L at rest ([67](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref67>)) and 0.5 to 2.2 mmol for each kilogram of wet muscle (muscle that has not been desiccated) ([67](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref67>)). Lactate production increases with exercise intensity ([67](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref67>), [127](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref127>)) and appears to depend on muscle fiber type. Researchers have reported that the maximal rate of lactate production for Type II muscle fibers is 0.5 mmol·g−1·s−1 ([46](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref46>), [105](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref105>)) and for Type I muscle is 0.25 mmol·g−1·s−1 ([111](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref111>)). The higher rate of lactate production by Type II muscle fibers may reflect a higher concentration or activity of glycolytic enzymes than in Type I muscle fibers ([10](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref10>), [120](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref120>)). Although the highest possible concentration of lactate accumulation is not known, severe fatigue may occur at blood concentrations between 20 and 25 mmol/L ([105](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref105>)); one study, however, showed blood lactate concentrations greater than 30 mmol/L following multiple bouts of dynamic exercise ([79](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref79>)). Along with exercise intensity and muscle fiber type, exercise duration ([67](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref67>)), state of training ([66](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref66>)), and initial glycogen levels ([67](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref67>)) can also influence lactate accumulation.\n\nBlood lactate concentrations reflect the net balance of lactate production and clearance as a result of bicarbonate (HCO3 −) buffering. HCO3 − minimizes the disrupting influence of the H+ on pH by accepting the proton (H2CO3). The clearance and buffering of lactate from the blood reflect a return to homeostatic range. Lactate can be cleared by oxidation within the muscle fiber in which it was produced, or it can be transported in the blood to other muscle fibers to be oxidized ([106](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref106>)). Lactate can also be transported in the blood to the liver, where it is converted to glucose. This process is referred to as the Cori cycle and is depicted in [figure 3.3](<E6372ch03_d80.xhtml#f3.3>).\n\n**Figure 3.3** The Cori cycle.\n\n![An illustration of the Cori cycle occurring in liver and muscle.](images/E6372_508038_ebook.jpg)\n\n[Follow for extended description](<Ext_desc_E6372_508038_ebook.xhtml#l_E6372_508038_ebook>)\n\nGollnick and colleagues ([67](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref67>)) and others ([8](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref8>), [72](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref72>), [116](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref116>)) have reported that blood lactate concentrations normally return to preexercise values within an hour after activity, depending on the duration and intensity of exercise, training status, and type of recovery (i.e., passive versus active). Light activity during the postexercise period has been shown to increase lactate clearance rates ([55](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref55>), [67](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref67>), [72](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref72>), [79](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref79>), [116](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref116>)). For example, an active recovery following a 200-yard (182.9 m) maximal-effort swim resulted in the greatest lactate clearance in comparison to a passive recovery in competitive swimmers ([72](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref72>)). In addition, both aerobically trained ([67](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref67>)) and anaerobically trained ([62](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref62>)) athletes have faster lactate clearance rates than untrained people. Peak blood lactate concentrations occur approximately 5 minutes after the cessation of exercise ([67](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref67>)), a delay frequently attributed to the time required to buffer and transport lactate from the tissue to the blood ([93](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref93>)).\n\nBlood lactate accumulation is greater following high-intensity, intermittent exercise (e.g., resistance training and sprints) than following lower-intensity, continuous exercise ([79](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref79>), [101](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref101>), [150](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref150>)). However, trained people experience lower blood lactate concentrations than untrained people when exercising at an absolute workload (same resistance) ([66](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref66>), [89](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref89>), [141](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref141>)). This indicates that resistance training results in alterations in lactate response similar to those from aerobic endurance training ([67](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref67>), [89](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref89>), [141](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref141>)). These alterations include a lower blood lactate concentration at a given workload in trained individuals and higher blood lactate concentrations in trained individuals during maximal exercise ([67](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref67>), [89](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref89>), [141](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref141>)).\n\nThe net reaction for glycolysis when pyruvate is converted to lactate may be summarized as follows:\n\nGlucose + 2Pi \\+ 2ADP → 2Lactate + 2ATP + H2O (3.4)\n\n##### Lactic Acid Does Not Cause Metabolic Acidosis!\n\n_Lactic acidosis_ is a common misnomer, as lactic acid is inaccurately believed to cause the burning sensations experienced with muscle fatigue during high-intensity exercise. This is based on the assumption that there is an immediate dissociation of lactic acid into lactate and H+ when produced by glycolysis in skeletal muscle ([1](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref1>), [60](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref60>), [123](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref123>)). However, the phosphoglycerate kinase reaction of glycolysis involves the transfer of a phosphate leaving a carboxylate (COO−) group ([103](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref103>)). Thus, as shown in [figure 3.4](<E6372ch03_d80.xhtml#f3.4>), no proton (H+) exists to dissociate from lactate ([60](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref60>), [123](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref123>)).\n\n**Figure 3.4** The phosphoglycerate kinase reaction of glycolysis, illustrating that there is no proton (H+) to dissociate from lactate.\n\n![A reaction is as follows: Phosphoenolpyruvate yields pyruvate with the help of pyruvate kinase. Pyruvate yields lactate in the presence of lactate dehydrogenase.](images/E6372_517349_ebook.jpg)\n\nFurthermore, the lactate dehydrogenase reaction itself consumes protons, which alkalizes the cell ([60](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref60>), [123](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref123>))—quite the opposite of acidosis. In fact, Busa and Nuccitelli ([27](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref27>)) stated, “ATP hydrolysis, not lactate accumulation, is the dominant source of the intracellular acid load …” (p. 430). The take-home message from Robergs and colleagues ([123](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref123>)) is that the hydrolysis of ATP outside the mitochondria is primarily responsible for the proton (H+) accumulation during exercise-induced metabolic acidosis—not the conversion of pyruvate to lactate as is commonly believed. Consequently, the term _lactic acidosis_ is indeed a misnomer, and the term _metabolic acidosis_ is recommended to describe the reduced pH within skeletal muscle during high-intensity, fatiguing exercise.\n\n#### Glycolysis Leading to the Krebs Cycle\n\nIf oxygen is present in sufficient quantities in the mitochondria (specialized cellular organelles where the reactions of aerobic metabolism occur), the end product of glycolysis, pyruvate, is not converted to lactate but is transported into the mitochondria. Also transported are two molecules of reduced nicotinamide adenine dinucleotide (NADH) produced during glycolytic reactions (_reduced_ refers to the added hydrogen). When pyruvate enters the mitochondria, it is converted to acetyl-CoA (CoA stands for coenzyme A) by the pyruvate dehydrogenase complex, resulting in the loss of a carbon as CO2. Acetyl-CoA can then enter the Krebs cycle for further ATP resynthesis. The NADH molecules enter the electron transport system, where they can also be used to resynthesize ATP.\n\nThe net reaction for glycolysis when pyruvate is shuttled to the mitochondria may be summarized as follows:\n\nGlucose + 2Pi \\+ 2ADP + 2NAD+ → 2Pyruvate + 2ATP + 2NADH + 2H2O (3.5)\n\n#### Energy Yield of Glycolysis\n\nThere are two primary mechanisms for resynthesizing ATP during metabolism:\n\n  1. Substrate-level phosphorylation\n  2. Oxidative phosphorylation\n\nPhosphorylation is the process of adding an inorganic phosphate (Pi) to another molecule. For example, ADP + Pi \\arrow\\ ATP is the phosphorylation of ADP to ATP. Oxidative phosphorylation refers to the resynthesis of ATP in the electron transport chain (ETC). In contrast, substrate-level phosphorylation refers to the direct resynthesis of ATP from ADP during a single reaction in the metabolic pathways. To illustrate, in glycolysis there are two steps that result in substrate-level phosphorylation of ADP to ATP ([42](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref42>)):\n\n![Equation reads: 1, 3-bisphosphoglycerate plus A D P plus P sub i, with a rightward arrow labeled Phosphoglycerate kinase, yields 3-phosphoglycerate plus A T P.](images/E6372_Equation_03_06_ebook.jpg) (3.6)\n\n![Equation reads: Phosphoenolpyruvate plus A D P plus P sub i, with a rightward arrow labeled Pyruvate kinase, yields Pyruvate plus A T P.](images/E6372_Equation_03_07_ebook.jpg) (3.7)\n\nThe gross number of ATP molecules that are resynthesized as a result of substrate-level phosphorylation during glycolysis is four ([figure 3.2](<E6372ch03_d80.xhtml#f3.2>)). However, the reaction that converts fructose-6-phosphate to fructose-1,6-bisphosphate (catalyzed by the enzyme phosphofructokinase [PFK]) in glycolysis requires the hydrolysis of one ATP molecule. In addition, there are two possible sources of glucose: blood glucose and muscle glycogen. When blood glucose enters the muscle cell, it must be phosphorylated to remain in the cell and to maintain the glucose concentration gradient ([67](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref67>)). The phosphorylation of one molecule of blood glucose, which is catalyzed by hexokinase, also requires the hydrolysis of one ATP. In contrast, when muscle glycogen is broken down (i.e., glycogenolysis) to glucose with the help of the enzyme glycogen phosphorylase, the glucose is already phosphorylated, and it does not require the hydrolysis of ATP. Therefore, when glycolysis begins with one molecule of blood glucose, two ATP molecules are used and four ATP are resynthesized, which results in a net resynthesis of two ATP molecules. When glycolysis begins from muscle glycogen, only one ATP is used and four ATP are resynthesized, which yields a net resynthesis of three ATP molecules.\n\n#### Control of Glycolysis\n\nIn general, the rate of glycolysis is stimulated to increase during intense muscle actions by high concentrations of ADP, Pi, and ammonia and by a slight decrease in pH and AMP ([22](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref22>), [61](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref61>), [140](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref140>)), all of which are signs of increased ATP hydrolysis and a need for energy. In contrast, glycolysis is inhibited by markedly lower pH, ATP, CP, citrate, and free fatty acids ([22](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref22>)), which are usually present at rest. (Note that a slight decrease in pH increases glycolysis, but if pH continues to decrease significantly it will inhibit the rate of glycolysis.) However, there are more specific factors that contribute to the regulation of glycolysis ([107](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref107>)), such as the concentrations and turnover rates of three important glycolytic enzymes: hexokinase, PFK, and pyruvate kinase. All three of these are regulatory enzymes in glycolysis, because each has important allosteric (meaning “other site”) binding sites. Allosteric regulation occurs when the end product of a reaction or series of reactions feeds back to regulate the turnover rate of key enzymes in the metabolic pathways. Consequently, this process is also called _end product regulation_ ([85](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref85>)) or _feedback regulation_ ([61](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref61>)). Allosteric inhibition occurs when an end product binds to the regulatory enzyme and decreases its turnover rate and slows product formation. In contrast, allosteric activation occurs when an “activator” binds with the enzyme and increases its turnover rate.\n\nHexokinase, which catalyzes the phosphorylation of glucose to glucose-6-phosphate, is allosterically inhibited by the concentration of glucose-6-phosphate in the sarcoplasm ([61](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref61>)). Thus, the higher the concentration of glucose-6-phosphate, the more hexokinase will be inhibited. In addition, the phosphorylation of glucose commits it to the cell so that it cannot leave. Similarly, the PFK reaction (fructose-6-phosphate → fructose 1,6-bisphosphate) commits the cell to metabolizing glucose rather than storing it as glycogen. Phosphofructokinase is the most important regulator of glycolysis because it is the rate-limiting step. Adenosine triphosphate is an allosteric inhibitor of PFK; therefore, as intracellular ATP concentrations rise, PFK activity decreases and reduces the conversion of fructose-6-phosphate to fructose 1,6-bisphosphate and, subsequently, decreases activity of the glycolytic pathway. However, AMP is an allosteric activator of PFK and a powerful stimulator of glycolysis. Moreover, the ammonia produced during high-intensity exercise as a result of AMP or amino acid deamination (removing the amine group from the amino acid molecule) can also stimulate PFK. Pyruvate kinase catalyzes the conversion of phosphoenolpyruvate to pyruvate and is the final regulatory enzyme. Pyruvate kinase is allosterically inhibited by ATP and acetyl-CoA (the latter is a Krebs cycle intermediate) and activated by high concentrations of AMP and fructose-1,6-bisphosphate ([61](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref61>)).\n\n#### Lactate Threshold and Onset of Blood Lactate Accumulation\n\nRecent evidence suggests that there are specific break points in the lactate accumulation curve ([figure 3.5](<E6372ch03_d80.xhtml#f3.5>)) as exercise intensity increases ([39](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref39>), [98](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref98>)). The exercise intensity or relative intensity at which blood lactate begins an abrupt increase above the baseline concentration has been termed the lactate threshold (LT) ([161](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref161>)). The _LT_ represents a significantly increased reliance on anaerobic mechanisms for energy production to meet demand. The LT corresponds well with the ventilatory threshold (breaking point in the relationship between ventilation and V̇O2) and is often used as a marker of the anaerobic threshold.\n\n**Figure 3.5** Lactate threshold (LT) and onset of blood lactate accumulation (OBLA).\n\n![A line graph of the change in blood lactate concentration over time.](images/E6372_531549_ebook.jpg)\n\n[Follow for extended description](<Ext_desc_E6372_531549_ebook.xhtml#l_E6372_531549_ebook>)\n\nReprinted, by permission, from T.O. Bompa and G.G. Haff, 2009. _Periodization: Theory and methodology of training,_ 5th ed. (Champaign, IL: Human Kinetics), 295.\n\nThe LT typically begins at 50% to 60% of maximal oxygen uptake in untrained individuals and at 70% to 80% in aerobically trained athletes ([29](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref29>), [52](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref52>)). A second increase in the rate of lactate accumulation has been noted at higher relative intensities of exercise. This second point of inflection has been termed the onset of blood lactate accumulation (OBLA) and occurs when the concentration of blood lactate reaches 4 mmol/L ([83](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref83>), [136](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref136>), [142](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref142>)). The breaks in the lactate accumulation curve may correspond to the points at which intermediate and large motor units are recruited during increasing exercise intensities ([92](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref92>)). The muscle cells associated with large motor units are typically Type II fibers, which are particularly suited for anaerobic metabolism and lactate production.\n\nSome studies suggest that training at intensities near or above the LT or OBLA pushes the LT and OBLA to the right (i.e., lactate accumulation occurs later at a higher exercise intensity) ([39](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref39>), [43](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref43>)). This shift probably occurs as a result of changes in hormone release, particularly reduced catecholamine release at high exercise intensities, and increased mitochondrial content that allows for greater production of ATP through aerobic mechanisms. The shift allows the athlete to perform at higher percentages of maximal oxygen uptake without as much lactate accumulation in the blood ([22](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref22>), [41](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref41>))."

  - id: "ch03-the-oxidative-aerobic-system"
    title: "Biological Energy Systems / The Oxidative (Aerobic) System"
    level: 3
    tags: [biological, energy, systems, oxidative, aerobic, system]
    key_points:
      - "The oxidative system, the primary source of ATP at rest and during low-intensity activities, uses primarily carbohydrate and fats as substrates ([62](<E6372RM_Refs_d104_split_003."
    recall_prompts:
      - "The Oxidative (Aerobic) System 是什麼？有哪些類型或應用？"
    content: "\n\nThe oxidative system, the primary source of ATP at rest and during low-intensity activities, uses primarily carbohydrate and fats as substrates ([62](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref62>)). Protein does not provide a significant contribution to total energy; however, the use of protein does significantly increase during long-term starvation and long bouts (>90 minutes) of exercise ([41](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref41>), [102](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref102>)). At rest, approximately 70% of the ATP produced is derived from fats and 30% from carbohydrate. Following the onset of activity, as the intensity of the exercise increases, there is a shift in substrate preference from fats to carbohydrate. During high-intensity aerobic exercise, almost 100% of the energy is derived from carbohydrate if an adequate supply is available, with only minimal contributions from fats and protein. However, during prolonged, submaximal, steady-state work, there is a gradual shift from carbohydrate back to fats, and to a very small extent protein, as energy substrates ([22](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref22>)).\n\n#### Glucose and Glycogen Oxidation\n\nThe oxidative metabolism of blood glucose and muscle glycogen begins with glycolysis. If oxygen is present in sufficient quantities, the end product of glycolysis, pyruvate, is not converted to lactate but is transported to the mitochondria, where it is converted to acetyl-CoA (a two-carbon molecule), which enters the Krebs cycle, also known as the citric acid cycle or tricarboxylic acid cycle ([7](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref7>), [61](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref61>)). The Krebs cycle is a series of reactions that continues the oxidation of the substrate from glycolysis and produces two ATP indirectly from guanine triphosphate (GTP), via substrate-level phosphorylation, for each molecule of glucose ([figure 3.6](<E6372ch03_d80.xhtml#f3.6>)).\n\n**Figure 3.6** The Krebs cycle. CoA = coenzyme A; FAD2+, FADH, FADH2 = flavin adenine dinucleotide; GDP = guanine diphosphate; GTP = guanine triphosphate; NAD+, NADH = nicotinamide adenine dinucleotide.\n\n![An illustration of the Krebs cycle.](images/E6372_508040_ebook.jpg)\n\n[Follow for extended description](<Ext_desc_E6372_508040_ebook.xhtml#l_E6372_508040_ebook>)\n\nAlso produced from the two pyruvate molecules subsequent to the production of one molecule of glucose are six molecules of NADH and two molecules of reduced flavin adenine dinucleotide (FADH2). These molecules transport hydrogen atoms to the ETC to be used to produce ATP from ADP ([22](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref22>), [107](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref107>)). The ETC uses the NADH and FADH2 molecules to rephosphorylate ADP to ATP ([figure 3.7](<E6372ch03_d80.xhtml#f3.7>)).\n\n**Figure 3.7** The electron transport chain. CoQ = coenzyme Q; Cyt = cytochrome.\n\n![An illustration of the electron transport chain with different products formed when A D P plus P i is added and A T P is released.](images/E6372_508041_ebook.jpg)\n\nThe hydrogen atoms are passed down the chain (a series of electron carriers known as cytochromes) to form a proton concentration gradient, which provides the energy for ATP production, with oxygen serving as the final electron acceptor (resulting in the formation of water). Because NADH and FADH2 enter the ETC at different sites, they differ in their ability to produce ATP. One molecule of NADH can produce three molecules of ATP, whereas one molecule of FADH2 can produce only two molecules of ATP. The production of ATP during this process is referred to as _oxidative phosphorylation_. The oxidative system, beginning with glycolysis and including the Krebs cycle and ETC, results in the production of approximately 38 ATP from the degradation of one molecule of blood glucose ([22](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref22>), [85](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref85>)). However, if the initiation of glycolysis is muscle glycogen, the net ATP production is 39, since the hexokinase reaction is not necessary with muscle glycogenolysis. Nevertheless, oxidative phosphorylation accounts for over 90% of ATP synthesis compared to substrate-level phosphorylation, which demonstrates the capacity of energy transfer by the oxidative system. See [table 3.1](<E6372ch03_d80.xhtml#t3.1>) for a summary of these processes.\n\nTABLE 3.1 Total Energy Yield From the Oxidation of One Glucose Molecule Process | ATP production  \n---|---  \nSlow glycolysis: |   \nSubstrate-level phosphorylation | 4  \nOxidative phosphorylation: 2 NADH (3 ATP each) | 6  \n**Krebs cycle (2 rotations through the Krebs cycle per glucose):** |   \nSubstrate-level phosphorylation | 2  \nOxidative phosphorylation: 8 NADH (3 ATP each) | 24  \nVia GTP: 2 FADH2 (2 ATP each) | 4  \n**Total** | 40*  \n  \n*Glycolysis consumes 2 ATP (if starting with blood glucose), so net ATP production is 40 - 2 = 38. This figure may also be reported as 36 ATP depending on which shuttle system is used to transport the NADH to the mitochondria. ATP = adenosine triphosphate; FADH2 = flavin adenine dinucleotide; GTP = guanine triphosphate; NADH = nicotinamide adenine dinucleotide.\n\n#### Fat Oxidation\n\nFats can also be used by the oxidative energy system. Triglycerides stored in fat cells can be broken down by an enzyme, hormone-sensitive lipase, to produce free fatty acids and glycerol. This releases a portion of the total free fatty acids from the fat cells into the blood, where they can circulate and enter muscle fibers and undergo oxidation ([88](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref88>), [121](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref121>)). Additionally, limited quantities of triglycerides are stored within the muscle along with a form of hormone-sensitive lipase to produce an intramuscular source of free fatty acids ([22](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref22>), [47](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref47>)). Free fatty acids enter the mitochondria, where they undergo beta oxidation, a series of reactions in which the free fatty acids are broken down, resulting in the formation of acetyl-CoA and hydrogen protons ([figure 3.6](<E6372ch03_d80.xhtml#f3.6>)). The acetyl-CoA enters the Krebs cycle directly, and the hydrogen atoms are carried by NADH and FADH2 to the ETC ([22](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref22>)). The result is hundreds of ATP molecules supplied by beta oxidation. For example, the breakdown of a single triglyceride molecule containing three 16-carbon chain free fatty acids (palmitic acid) can be metabolized by beta oxidation to yield over 300 ATP molecules (>100 ATP per palmitic acid). The overarching concept is that fat oxidation is capable of a tremendous capacity for ATP synthesis compared to carbohydrate and protein oxidation.\n\n#### Protein Oxidation\n\nAlthough not a significant source of energy for most activities, protein can be broken down into its constituent amino acids by various metabolic processes. Most of these amino acids can then be converted into glucose (in a process known as _gluconeogenesis_), pyruvate, or various Krebs cycle intermediates to produce ATP ([figure 3.6](<E6372ch03_d80.xhtml#f3.6>)). The contribution of amino acids to the production of ATP has been estimated to be minimal during short-term exercise but may contribute 3% to 18% of the energy requirements during prolonged activity ([20](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref20>), [138](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref138>)). The major amino acids that are oxidized in skeletal muscle are believed to be the branched-chain amino acids (leucine, isoleucine, and valine), although alanine, aspartate, and glutamate may also be used ([69](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref69>)). The nitrogenous waste products of amino acid degradation are eliminated through the formation of urea and small amounts of ammonia ([22](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref22>)). The elimination through formation of ammonia is significant because ammonia is toxic and is associated with fatigue.\n\n#### Control of the Oxidative (Aerobic) System\n\nThe rate-limiting step in the Krebs cycle (see [figure 3.6](<E6372ch03_d80.xhtml#f3.6>)) is the conversion of isocitrate to α-ketoglutarate, a reaction catalyzed by the enzyme isocitrate dehydrogenase. Isocitrate dehydrogenase is stimulated by ADP and allosterically inhibited by ATP. The reactions that produce NADH or FADH2 also influence the regulation of the Krebs cycle. If NAD+ and FAD2+ are not available in sufficient quantities to accept hydrogen, the rate of the Krebs cycle is reduced. Also, when GTP accumulates, the concentration of succinyl CoA increases, which inhibits the initial reaction (oxaloacetate + acetyl-CoA → citrate + CoA) of the Krebs cycle. The ETC is inhibited by ATP and stimulated by ADP ([22](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref22>)). A simplified overview of the metabolism of fat, carbohydrate, and protein is presented in [figure 3.8](<E6372ch03_d80.xhtml#f3.8>).\n\n**Figure 3.8** The metabolism of fat and that of carbohydrate and protein share some common pathways. Note that many are oxidized to acetyl-CoA and enter the Krebs cycle.\n\n![An illustration of different compounds oxidized to acetyl C o A and entering the Krebs cycle.](images/E6372_508044_ebook.jpg)\n\n[Follow for extended description](<Ext_desc_E6372_508044_ebook.xhtml#l_E6372_508044_ebook>)"

  - id: "ch03-energy-production-and-capacity"
    title: "Biological Energy Systems / Energy Production and Capacity"
    level: 3
    tags: [biological, energy, systems, energy, production, capacity]
    key_points:
      - "The phosphagen, glycolytic, and oxidative energy systems differ in their ability to supply energy for activities of various intensities and durations ([tables 3."
    recall_prompts:
      - "Energy Production and Capacity 是什麼？有哪些類型或應用？"
    content: "\n\nThe phosphagen, glycolytic, and oxidative energy systems differ in their ability to supply energy for activities of various intensities and durations ([tables 3.2](<E6372ch03_d80.xhtml#t3.2>) and [3.3](<E6372ch03_d80.xhtml#t3.3>)). Exercise intensity is defined as a level of muscular activity that can be quantified in terms of power (work performed per unit of time) output ([99](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref99>)). Activities such as resistance training performed at a high power output require a rapid rate of energy supply and rely almost entirely on the energy provided by the phosphagen system. Activities that are of low intensity but long duration, such as marathon running, require a prolonged energy supply and rely predominantly on the energy supplied by the oxidative energy system. The primary source of energy for activities between these two extremes shifts, depending on the intensity and duration of the event ([table 3.2](<E6372ch03_d80.xhtml#t3.2>)). In general, short, high-intensity activities (e.g., high-intensity resistance training and sprinting) rely largely on the phosphagen energy system and fast glycolysis. As the intensity decreases and duration increases, the emphasis gradually shifts to slow glycolysis and the oxidative energy system ([45](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref45>), [129](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref129>)).\n\nTABLE 3.2 Effect of Event Duration and Intensity on Primary Energy System Used Duration of event | Intensity of event | Primary energy system  \n---|---|---  \n0-6 s | Extremely high | Phosphagen  \n6-30 s | Very high | Phosphagen and fast glycolysis  \n30 s to 2 min | High | Fast glycolysis  \n2-3 min | Moderate | Fast glycolysis and oxidative system  \n>3 min | Low | Oxidative system  \n  \nThe relationships between duration, intensity, and primary energy systems used assume that the athlete strives to attain the best possible performance for a given event.\n\nTABLE 3.3 Rankings of Rate and Capacity of ATP Production System | Rate of ATP production | Capacity of ATP production  \n---|---|---  \nPhosphagen | 1 | 5  \nFast glycolysis | 2 | 4  \nSlow glycolysis | 3 | 3  \nOxidation of carbohydrates | 4 | 2  \nOxidation of fats and proteins | 5 | 1  \n  \n_Note_ : 1 = fastest/greatest; 5 = slowest/least.\n\nIn general, there is an inverse relationship between a given energy system’s maximum rate of ATP production (i.e., ATP produced per unit of time) and its capacity (i.e., the total amount of ATP produced over time). The phosphagen system is capable of achieving the highest rate of ATP production, while fat oxidation has the greatest capacity of ATP production. As a result, the phosphagen energy system primarily supplies ATP for high-intensity activities of short duration (e.g., 100 m dash), the glycolytic system for moderate- to high-intensity activities of short to medium duration (e.g., 400 m dash), and the oxidative system for low-intensity activities of long duration (e.g., marathon).\n\nThe duration of the activity also influences which energy system is used. Athletic events range in duration from 1 to 3 seconds (e.g., snatch and shot put) to more than 4 hours (e.g., long-distance triathlons and ultramarathons). If an athlete makes a best effort (an effort that results in the best possible performance for a given event), the time considerations shown in [table 3.2](<E6372ch03_d80.xhtml#t3.2>) are reasonable ([48](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref48>), [78](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref78>), [124](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref124>), [144](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref144>), [147](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref147>)).\n\nAt no time, during either exercise or rest, does any single energy system provide the complete supply of energy. During exercise, the degree to which anaerobic and oxidative systems contribute to the energy being produced is determined primarily by the exercise intensity and secondarily by exercise duration ([22](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref22>), [45](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref45>), [48](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref48>)).\n\nThe extent to which each of the three energy systems contributes to ATP production depends primarily on the intensity of muscular activity and secondarily on the duration. At no time, during either exercise or rest, does any single energy system provide the complete supply of energy."

  - id: "ch03-substrate-depletion-and-repletion"
    title: "Substrate Depletion and Repletion"
    level: 2
    tags: [substrate, depletion, repletion]
    key_points:
      - "Energy substrates—molecules that provide starting materials for bioenergetic reactions, including phosphagens (ATP and CP), glucose, glycogen, lactate, free fatty acids, and amino acids—can be selecti"
    recall_prompts:
      - "Substrate Depletion and Repletion 的核心概念是什麼？"
    content: "\n\nEnergy substrates—molecules that provide starting materials for bioenergetic reactions, including phosphagens (ATP and CP), glucose, glycogen, lactate, free fatty acids, and amino acids—can be selectively depleted during the performance of activities of various intensities and durations. Subsequently, the energy that can be produced by the bioenergetic systems is reduced. Fatigue experienced during many activities is frequently associated with the depletion of phosphagens ([66](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref66>), [87](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref87>)) and glycogen ([21](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref21>), [78](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref78>), [90](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref90>), [131](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref131>)); the depletion of substrates such as free fatty acids, lactate, and amino acids typically does not occur to the extent that performance is limited. Consequently, the depletion and repletion pattern of phosphagens and glycogen following physical activity is important in exercise and sport bioenergetics.\n\n### Phosphagens\n\nFatigue during exercise appears to be at least partially related to the decrease in phosphagens (i.e., ATP and CP). Phosphagen concentrations in muscle are more rapidly depleted as a result of high-intensity anaerobic exercise compared to aerobic exercise ([66](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref66>), [87](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref87>)). Creatine phosphate can decrease markedly (50-70%) during the first stage of high-intensity exercise of short and moderate duration (5-30 seconds) and can be almost completely depleted as a result of very intense exercise to exhaustion ([84](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref84>), [91](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref91>), [96](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref96>), [108](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref108>)). Muscle ATP concentrations may decrease only slightly ([34](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref34>)) or may decrease up to 50% to 60% ([143](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref143>)) of the preexercise levels during experimentally induced fatigue. It should also be noted that dynamic muscle actions that produce external work use more metabolic energy and typically deplete phosphagens to a greater extent than do isometric muscle actions ([18](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref18>)).\n\nThe intramuscular ATP concentration is largely sustained during exercise as a consequence of CP depletion and the contribution of additional ATP from the myokinase reaction and oxidation of other energy sources, such as glycogen and free fatty acids. Postexercise phosphagen repletion can occur in a relatively short period; complete resynthesis of ATP appears to occur within 3 to 5 minutes, and complete CP resynthesis can occur within 8 minutes ([75](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref75>), [87](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref87>)). Repletion of phosphagens is largely accomplished as a result of aerobic metabolism ([75](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref75>)), although glycolysis can contribute to recovery after high-intensity exercise ([29](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref29>), [40](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref40>)).\n\nThe effects of training on concentrations of phosphagens are not well studied or understood. Aerobic endurance training may increase resting concentrations of phosphagens ([49](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref49>), [97](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref97>)) and decrease their rate of depletion at a given absolute submaximal power output ([33](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref33>), [97](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref97>)) but not at a relative (percentage of maximum) submaximal power output ([33](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref33>)). Although researchers have noted indications of increased resting concentrations of phosphagens ([12](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref12>), [125](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref125>)), short-term (eight weeks) studies of sprint and six months of resistance or explosive training have not shown alterations in resting concentrations of phosphagens ([11](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref11>), [16](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref16>), [145](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref145>), [148](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref148>)). However, total phosphagen content can be larger following sprint training due to increases in muscle mass ([148](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref148>)). Resistance training has been shown to increase the resting concentrations of phosphagens in the triceps brachii after five weeks of training ([104](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref104>)). The increases in phosphagen concentration may have occurred due to selective hypertrophy of Type II fibers, which can contain a higher phosphagen concentration than Type I fibers ([103](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref103>)).\n\n### Glycogen\n\nLimited stores of glycogen are available for exercise. Approximately 300 to 400 g of glycogen are stored in the body’s total muscle and about 70 to 100 g in the liver ([135](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref135>)). Resting concentrations of liver and muscle glycogen can be influenced by training and dietary manipulations ([56](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref56>), [135](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref135>)). Research suggests that both anaerobic training, including sprinting and resistance training ([16](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref16>), [104](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref104>)), and stereotypical aerobic endurance training ([64](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref64>), [65](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref65>)) can increase resting muscle glycogen concentration with concomitantly appropriate nutrition.\n\nThe rate of glycogen depletion is related to exercise intensity ([135](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref135>)). Muscle glycogen is a more important energy source than liver glycogen during moderate- and high-intensity exercise. Liver glycogen appears to be more important during low-intensity exercise, and its contribution to metabolic processes increases with duration of exercise. Increases in relative exercise intensity of 50%, 75%, and 100% of maximal oxygen uptake result in increases in the rate of muscle glycogenolysis (the breakdown of glycogen) of 0.7, 1.4, and 3.4 mmol·kg−1·min−1, respectively ([131](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref131>)). At relative intensities of exercise above 60% of maximal oxygen uptake, muscle glycogen becomes an increasingly important energy substrate; the entire glycogen content of some muscle cells can become depleted during exercise ([130](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref130>)).\n\nRelatively constant blood glucose concentrations are maintained at very low exercise intensities (below 50% of maximal oxygen uptake) as a result of low muscle glucose uptake; as duration increases beyond 90 minutes, blood glucose concentrations fall, but rarely below 2.8 mmol/L ([2](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref2>)). Long-term exercise (over 90 minutes) at higher intensities (above 50% of maximal oxygen uptake) may result in substantially decreased blood glucose concentrations as a result of liver glycogen depletion. Hypoglycemic reactions may occur in some people with exercise-induced blood glucose values less than 2.5 mmol/L ([3](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref3>), [35](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref35>)). A decline in blood glucose to around 2.5 to 3.0 mmol/L results from reduced liver carbohydrate stores and causes decreased carbohydrate oxidation and eventual exhaustion ([32](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref32>), [35](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref35>), [135](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref135>)).\n\nVery high-intensity, intermittent exercise, such as high-intensity resistance training, can cause substantial depletion of muscle glycogen (decreases of 20% to 60%) with relatively few sets (low total workloads) ([99](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref99>), [124](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref124>), [144](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref144>), [146](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref146>)). Although phosphagens may be the primary limiting factor during resistance exercise with high resistance and few repetitions or few sets, muscle glycogen may become the limiting factor for resistance training with many total sets and larger total amounts of work ([124](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref124>)). This type of exercise could cause selective muscle fiber glycogen depletion (more depletion in Type II fibers), which can also limit performance ([50](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref50>), [124](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref124>)). As with other types of dynamic exercise, the rate of muscle glycogenolysis during resistance exercise depends on intensity (i.e., the greater the intensity, the faster the rate of glycogenolysis). However, it appears that when the total work performed is equal, the absolute amount of glycogen depletion is the same, regardless of the intensity of the resistance training session ([69](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref69>), [124](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref124>)).\n\nRepletion of muscle glycogen during recovery is related to postexercise carbohydrate ingestion. Repletion appears to be optimal if 0.7 to 3.0 g of carbohydrate per kilogram of body weight is ingested every 2 hours following exercise ([56](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref56>), [135](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref135>)). This level of carbohydrate consumption can maximize muscle glycogen repletion at 5 to 6 mmol/g of wet muscle mass per hour during the first 4 to 6 hours following exercise. Muscle glycogen may be completely replenished within 24 hours, provided that sufficient carbohydrate is ingested ([56](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref56>), [135](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref135>)). However, if the exercise has a high eccentric component (associated with exercise-induced muscle damage), more time may be required to completely replenish muscle glycogen ([119](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref119>), [162](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref162>)).\n\n#### Differences in Phosphocreatine Depletion and Resynthesis in Children Versus Adults\n\nKappenstein and colleagues ([94](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref94>)) tested the hypothesis that a greater oxidative capacity in children results in lower CP depletion, faster CP resynthesis, and lower metabolic acidosis than in adults during high-intensity intermittent exercise. Sixteen children (mean age = 9 years) and 16 adults (mean age = 26 years) completed 10 bouts of 30-second dynamic, plantar flexion contractions at 25% of 1-repetition maximum (1RM). Creatine phosphate, ATP, inorganic phosphate (Pi), and phosphomonoesters were measured during and after exercise. Creatine phosphate breakdown was significantly lower in children during the first exercise bout, and average CP levels were higher in children at the end of exercise and during the recovery periods. In addition, muscle pH was significantly higher in children at the end of exercise. The results suggested that children are better able to meet energy demands with oxidative metabolism during high-intensity intermittent exercise."

  - id: "ch03-bioenergetic-limiting-factors-in-exercis"
    title: "Bioenergetic Limiting Factors in Exercise Performance"
    level: 2
    tags: [bioenergetic, limiting, factors, exercise, performance]
    key_points:
      - "Factors limiting maximal performance ([22](<E6372RM_Refs_d104_split_003."
    recall_prompts:
      - "Bioenergetic Limiting Factors in Exercise Performance 的核心概念是什麼？"
    content: "\n\nFactors limiting maximal performance ([22](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref22>), [49](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref49>), [78](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref78>), [86](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref86>), [102](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref102>), [154](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref154>)) must be considered in the mechanisms of fatigue experienced during exercise and training. Understanding the possible limiting factors associated with a particular athletic event is required when one is designing training programs and attempting to delay fatigue and possibly enhance performance. [Table 3.4](<E6372ch03_d80.xhtml#t3.4>) depicts examples of various limiting factors based on depletion of energy sources and increases in muscle hydrogen ions, although other potential factors have been postulated.\n\nTABLE 3.4 Ranking of Bioenergetic Limiting Factors Exercise | ATP and creatine phosphate | Muscle glycogen | Liver glycogen | Fat stores | Lower pH  \n---|---|---|---|---|---  \nMarathon | 1 | 5 | 4-5 | 2-3 | 1  \nTriathlon | 1-2 | 5 | 4-5 | 1-2 | 1-2  \n5,000 m run | 1-2 | 3 | 3 | 1-2 | 1  \n1,500 m run | 2-3 | 3-4 | 2 | 1-2 | 2-3  \n400 m swim | 2-3 | 3-4 | 3 | 1 | 1-2  \n400 m run | 3 | 3 | 1 | 1 | 4-5  \n100 m run | 5 | 1-2 | 1 | 1 | 1-2  \nDiscus | 2-3 | 1 | 1 | 1 | 1  \nRepeated snatch exercise at 60% of 1RM (10 sets) | 4-5 | 4-5 | 1-2 | 1-2 | 4-5  \n  \n_Note_ : 1 = least probable limiting factor; 5 = most probable limiting factor.\n\nGlycogen depletion can be a limiting factor both for long-duration, low-intensity exercise supported primarily by aerobic metabolism and for repeated, high-intensity exercise supported primarily by anaerobic mechanisms. Of importance to resistance training, sprinting, and other primarily anaerobic activities is the effect of metabolic acidosis on limiting contractile force ([53](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref53>), [78](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref78>), [114](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref114>), [115](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref115>), [123](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref123>)). Several other factors have been implicated in the development of muscle fatigue and may limit exercise performance, including increased intracellular inorganic phosphate, ammonia accumulation, increased ADP, and impaired calcium release from the sarcoplasmic reticulum ([4](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref4>), [5](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref5>), [129](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref129>), [154](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref154>), [158](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref158>)). Further research is needed to delineate the causes of muscular fatigue and the limiting factors in exercise performance."

  - id: "ch03-oxygen-uptake-and-the-aerobic-and-anaero"
    title: "Oxygen Uptake and the Aerobic and Anaerobic Contributions to Exercise"
    level: 2
    tags: [oxygen, uptake, aerobic, anaerobic, contributions, exercise]
    key_points:
      - "Oxygen uptake (or consumption) is a measure of a person’s ability to take in oxygen via the respiratory system and deliver it to the working tissues via the cardiovascular system, and the ability of w"
    recall_prompts:
      - "Oxygen Uptake and the Aerobic and Anaerobic Contributions to Exercise 的核心概念是什麼？"
    content: "\n\nOxygen uptake (or consumption) is a measure of a person’s ability to take in oxygen via the respiratory system and deliver it to the working tissues via the cardiovascular system, and the ability of working tissues (predominantly skeletal muscle) to use oxygen. During low-intensity exercise with a constant power output, oxygen uptake increases for the first few minutes until a steady state of uptake (oxygen demand equals oxygen consumption) is reached ([figure 3.9](<E6372ch03_d80.xhtml#f3.9>)) ([7](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref7>), [83](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref83>)).\n\n**Figure 3.9** Low-intensity, steady-state exercise metabolism: 75% of maximal oxygen uptake (V̇O2max). EPOC = excess postexercise oxygen consumption; V̇O2 = oxygen uptake.\n\n![An illustration of the oxygen consumption during rest, while exercising for 15 minutes, and during recovery.](images/E6372_508048_ebook.jpg)\n\n[Follow for extended description](<Ext_desc_E6372_508048_ebook.xhtml#l_E6372_508048_ebook>)\n\nAt the start of an exercise bout, however, some of the energy must be supplied through anaerobic mechanisms because the aerobic system responds slowly to the initial increase in the demand for energy ([62](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref62>), [153](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref153>)). This anaerobic contribution to the total energy cost of exercise is termed the oxygen deficit ([83](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref83>), [107](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref107>)). After exercise, oxygen uptake remains above preexercise levels for a period of time that varies according to the intensity and length of the exercise. Postexercise oxygen uptake has been termed the oxygen debt ([83](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref83>), [107](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref107>)), recovery O2 ([107](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref107>)), or the excess postexercise oxygen consumption (EPOC) ([22](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref22>)). The EPOC is the oxygen uptake above resting values used to restore the body to the preexercise condition ([139](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref139>)). Only small to moderate relationships between the oxygen deficit and the EPOC have been observed ([13](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref13>), [77](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref77>)); the oxygen deficit may influence the size of the EPOC, but the two are not equal. The possible factors affecting the EPOC are listed in the sidebar ([17](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref17>), [21](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref21>), [22](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref22>), [58](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref58>), [107](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref107>)).\n\n### Excess Postexercise Oxygen Consumption Is Intensity, Duration, and Mode Dependent\n\nExcess postexercise oxygen consumption (EPOC) refers to the prolonged increase in V̇O2 that may be observed for hours after exercise ([58](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref58>)).\n\nAerobic Exercise and EPOC ([17](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref17>))\n\n  * Intensity has the greatest effect on EPOC.\n  * The greatest EPOC values are found when both exercise intensity (i.e., >50-60% V̇O2max) and durations (i.e., >40 minutes) are high.\n  * Performing brief, intermittent bouts of supramaximal exercise (i.e., >100% V̇O2max) may induce the greatest EPOC with lower total work.\n  * There is interindividual variability for EPOC in response to a given relative exercise stimulus.\n  * The effects of aerobic exercise modes on EPOC are unclear.\n\nResistance Exercise and EPOC ([17](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref17>))\n\n  * Heavy resistance exercise (i.e., three sets, eight exercises to exhaustion, 80-90% 1RM) produces greater EPOCs than circuit weight training (i.e., four sets, eight exercises, 15 repetitions, 50% 1RM).\n  * Thus, EPOC is also intensity dependent in response to resistance training.\n\nFactors Responsible for EPOC ([17](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref17>))\n\n  * Replenishment of oxygen in blood and muscle\n  * ATP/CP resynthesis\n  * Increased body temperature, circulation, and ventilation\n  * Increased rate of triglyceride–fatty acid cycling\n  * Increased protein turnover\n  * Changes in energy efficiency during recovery\n\nAnaerobic mechanisms provide much of the energy for work if the exercise intensity is above the maximal oxygen uptake that a person can attain ([figure 3.10](<E6372ch03_d80.xhtml#f3.10>)). Generally, as the contribution of anaerobic mechanisms supporting the exercise increases, the exercise duration decreases ([7](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref7>), [68](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref68>), [156](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref156>), [157](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref157>)).\n\n**Figure 3.10** High-intensity, non–steady-state exercise metabolism (80% of maximum power output). The required V̇O2 here is the oxygen uptake that would be required to sustain the exercise if such an uptake were possible to attain. Because it is not, the oxygen deficit lasts for the duration of the exercise. EPOC = excess postexercise oxygen consumption; V̇O2max = maximal oxygen uptake.\n\n![An illustration of the oxygen consumption during rest, while exercising for 1 minute, and during recovery.](images/E6372_508050_ebook.jpg)\n\n[Follow for extended description](<Ext_desc_E6372_508050_ebook.xhtml#l_E6372_508050_ebook>)\n\nThe approximate contribution of anaerobic and aerobic mechanisms to maximal sustained efforts on a cycle ergometer is shown in [table 3.5](<E6372ch03_d80.xhtml#t3.5>) ([110](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref110>), [149](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref149>), [159](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref159>)). Contributions from anaerobic mechanisms are primary up to 60 seconds, after which aerobic metabolism becomes the primary energy-supplying mechanism. The contribution of anaerobic mechanisms to this type of exercise represents the maximal anaerobic capacity ([109](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref109>), [149](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref149>)).\n\nTABLE 3.5 Contributions of Anaerobic and Aerobic Mechanisms to Maximal Sustained Efforts in Bicycle Ergometry | 0-5 s | 30 s | 60 s | 90 s | 150 s | 200 s  \n---|---|---|---|---|---|---  \nExercise intensity (% of maximum power output) | 100 | 55 | 35 | 31 | Not available | Not available  \nContribution of anaerobic mechanisms (%) | 96 | 75 | 50 | 35 | 30 | 22  \nContribution of aerobic | 4 | 25 | 50 | 65 | 70 | 78"

  - id: "ch03-interval-training"
    title: "Metabolic Specificity of Training / Interval Training"
    level: 3
    tags: [metabolic, specificity, training, interval, training]
    key_points:
      - "Interval training is a method that emphasizes bioenergetic adaptations for a more efficient energy transfer within the metabolic pathways by using predetermined intervals of exercise and rest periods "
    recall_prompts:
      - "Interval Training 是什麼？有哪些類型或應用？"
    content: "\n\nInterval training is a method that emphasizes bioenergetic adaptations for a more efficient energy transfer within the metabolic pathways by using predetermined intervals of exercise and rest periods (i.e., work-to-rest ratios). Theoretically, properly spaced work-to-rest intervals allow more work to be accomplished at higher exercise intensities with the same or less fatigue than during continuous training at the same relative intensity. An early paper by Christensen and colleagues ([31](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref31>)) compared the total running distance, average oxygen uptake, and blood lactate concentration during continuous running for 5 minutes and interval running totaling 30 minutes with 2:1, 1:1, and 1:2 work-to-rest ratios. Subjects were assigned a continuous running intensity (speed) that would result in fatigue within 5 minutes. At that fast pace during the continuous run, the subjects were able to complete 0.81 miles (1.30 km) before exhaustion. Using 2:1, 1:1, and 1:2 work-to-rest ratios and the same running intensity for a total duration of 30 minutes, however, the subjects were able to complete 4.14 miles (6.66 km), 3.11 miles (5.00 km), and 2.07 miles (3.33 km), respectively, all while working aerobic capacity in a manner similar to that in the continuous running condition. Therefore, much more training can be accomplished at higher intensities with interval training; this concept has been established for over 45 years ([31](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref31>)).\n\nA series of short-term (two-week) interval training studies used six sessions of four to seven 30-second maximum cycling efforts interspaced with 4 minutes of recovery (1:8 work-to-rest ratio). These studies demonstrated improvements in muscle oxidative potential ([26](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref26>), [63](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref63>)), muscle buffering capacity ([26](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref26>), [63](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref63>)), muscle glycogen content ([25](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref25>), [26](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref26>)), and time-trial performance ([25](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref25>)), as well as doubled aerobic endurance capacity ([26](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref26>)). In addition, a similar four-week interval training program exhibited increases in muscle activation and total work output ([38](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref38>)) in trained cyclists. Thus, even the results of recent studies support the use of interval training for metabolic adaptations.\n\nFew studies provide results that can be used to generate definitive guidelines for choosing specific work-to-rest ratios. One such study, however, reported aerobic and anaerobic metabolic variables, total work, and time to exhaustion differences between two different work-to-rest ratios in elite cyclists ([117](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref117>)). The cyclists performed two intermittent protocols that included either a 40:20-second or a 30:30-second work-to-rest interval to exhaustion at a fixed work rate. The 40:20-second work-to-rest ratio resulted in significantly reduced total work and time to exhaustion while producing higher metabolic values (V̇O2max, lactate concentration, ETC). In contrast, the 30:30-second work-to-rest ratio provided sustained but slightly lower metabolic values for a considerably longer period of time. Another study manipulated the work variable via intensity and duration of the work-to-rest ratios. Wakefield and Glaister ([152](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref152>)) reported a greater amount of time above 95% V̇O2max during running at an intensity of 105% of V̇O2max rather than 115% of V̇O2max with a work duration of 30 seconds rather than 20 and 25 seconds (rest = 20 seconds). When one is determining the proper work-to-rest ratio for athletes, knowledge of the time intervals, intensity of work, and recovery periods for each of the energy systems is critical to maximizing the amount of work that can be accomplished for a given exercise intensity. For example, after a bout of maximal exercise that depletes CP stores, the complete resynthesis of CP may take up to 8 minutes ([75](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref75>)), which suggests that short-duration, high-intensity exercise requires greater work-to-rest ratios due to the aerobic mechanisms that replete phosphagen stores ([75](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref75>)).\n\nIn contrast, as the goals of training change to longer-duration, lower-intensity tasks, the durations of the work intervals can be longer; this will lengthen the rest periods and decrease the work-to-rest ratios. [Table 3.6](<E6372ch03_d80.xhtml#t3.6>) provides some general guidelines for work-to-rest ratios that are designed to emphasize the development of specific energy systems based on the theoretical time course for metabolic system involvement and substrate recovery. However, it should be noted that more research is necessary to provide evidence-based recommendations for optimal work-to-rest ratios.\n\nTABLE 3.6 Using Interval Training to Train Specific Energy Systems % of maximum power | Primary system stressed | Typical exercise time | Range of work-to-rest period ratios  \n---|---|---|---  \n90-100 | Phosphagen | 5-10 s | 1:12 to 1:20  \n75-90 | Fast glycolysis | 15-30 s | 1:3 to 1:5  \n30-75 | Fast glycolysis and oxidative | 1-3 min | 1:3 to 1:4  \n20-30 | Oxidative | >3 min | 1:1 to 1:3"

  - id: "ch03-high-intensity-interval-training"
    title: "Metabolic Specificity of Training / High-Intensity Interval Training"
    level: 3
    tags: [metabolic, specificity, training, high, intensity, interval]
    key_points:
      - "High-intensity interval training (HIIT) involves brief repeated bouts of high-intensity exercise with intermittent recovery periods."
    recall_prompts:
      - "High-Intensity Interval Training 是什麼？有哪些類型或應用？"
    content: "\n\nHigh-intensity interval training (HIIT) involves brief repeated bouts of high-intensity exercise with intermittent recovery periods. High-intensity interval training typically incorporates either running- or cycling-based modes of exercise and is an efficient exercise regimen for eliciting cardiopulmonary ([23](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref23>)) and metabolic and neuromuscular ([24](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref24>)) adaptations. In fact, Buchheit and Laursen ([23](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref23>)) stated that HIIT “is today considered one of the most effective forms of exercise for improving physical performance in athletes” (p. 314). High-intensity interval training is often discussed in terms of duty cycles involving a high-intensity work phase followed by a lower-intensity recovery phase. It has been suggested that nine different HIIT variables can be manipulated to achieve the most precise metabolic specificity ([23](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref23>)), including\n\n  * intensity of the active portion of each duty cycle,\n  * duration of the active portion of each duty cycle,\n  * intensity of the recovery portion of each duty cycle,\n  * duration of the recovery portion of each duty cycle,\n  * number of duty cycles performed in each set,\n  * number of sets,\n  * rest time between sets,\n  * recovery intensity between sets, and\n  * mode of exercise for HIIT.\n\nThe authors ([24](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref24>)) indicate, however, that the intensities and durations of the active and recovery portions of each duty cycle are the most important factors to consider. To optimize HIIT training adaptations for athletes, HIIT sessions should maximize the time spent at or near V̇O2max. More specifically, the cumulative duration and intensity of the active portions of the duty cycles should equate to several minutes above 90% of V̇O2max ([24](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref24>)).\n\nThe benefits of a HIIT protocol designed to repeatedly elicit a very high percentage of V̇O2max are primarily the result of the concurrent recruitment of large motor units and near-maximal cardiac output ([6](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref6>)). Thus, HIIT provides a stimulus for both oxidative muscle fiber adaptation and myocardial hypertrophy. Additional HIIT adaptations include increases in V̇O2max, proton buffering, glycogen content, anaerobic thresholds, time to exhaustion, and time-trial performance. For example, Gibala and coworkers ([63](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref63>)) reported equivalent improvements in muscle buffering capacity and glycogen content for HIIT at 250% of V̇O2peak during four to six 30-second cycling sprints compared to continuous cycling for 90 to 120 minutes at 65% of V̇O2peak over six total training sessions. In addition, 750 kJ cycling time trials decreased in both groups by 10.1% and 7.5% in the HIIT and long, slow endurance training groups, respectively. Thus, HIIT provided performance and physiological adaptations equivalent to those of long, slow endurance training, but in a time-efficient manner.\n\nThe strength and conditioning professional should consider a number of factors when designing a HIIT program. For example, a 400 m sprinter would need a HIIT program geared toward anaerobic-based durations and intensities more than a 2-mile ([3](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref3>),200 m) runner. Other considerations for the desired training adaptations are periodization, similar to that for resistance training, and the number of exercise sessions per day and week. Periodization allows for the general development of aerobic and anaerobic systems during the preseason with transitioning to sport-specific HIIT sessions during the competitive season. In addition, HIIT sessions in conjunction with other training sessions (i.e., team practices) may result in greater stress and risk for injury as a result of overtraining. Therefore, careful consideration is warranted in determining the appropriate number of HIIT sessions when concurrent with other sport-related activities."

  - id: "ch03-combination-training"
    title: "Metabolic Specificity of Training / Combination Training"
    level: 3
    tags: [metabolic, specificity, training, combination, training]
    key_points:
      - "Some suggest that aerobic endurance training should be added to the training of anaerobic athletes (a process that can be termed combination training or cross-training) to enhance recovery, because it"
    recall_prompts:
      - "Combination Training 是什麼？有哪些類型或應用？"
    content: "\n\nSome suggest that aerobic endurance training should be added to the training of anaerobic athletes (a process that can be termed combination training or cross-training) to enhance recovery, because it is postulated that recovery relies primarily on aerobic mechanisms. Several studies have demonstrated that recovery in power output is related to endurance fitness ([14](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref14>), [15](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref15>), [74](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref74>)). Bogdanis and colleagues ([14](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref14>)) reported relationships in power recovery in the first 10 seconds of a cycling sprint, the resynthesis of PCr, and endurance fitness (V̇O2max). However, aerobic endurance training may reduce anaerobic performance capabilities, particularly for high-strength, high-power performance ([80](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref80>)). Aerobic endurance training has been shown to reduce anaerobic energy production capabilities in rats ([151](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref151>)). Additionally, combined anaerobic and aerobic endurance training can reduce the gain in muscle girth ([36](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref36>), [126](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref126>)), maximum strength ([36](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref36>), [76](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref76>), [126](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref126>)), and speed- and power-related performance ([44](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref44>), [73](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref73>)).\n\nEven though the exact mechanism for this phenomenon is not known, it has been suggested that combination training may increase training volume to a level that may result in overtraining in comparison to aerobic and anaerobic training alone. Hickson and colleagues ([82](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref82>)) provide evidence that combination training that includes progressive endurance running and cycling and resistance training may produce a plateau effect and, ultimately, a decrease in strength gains. Specifically, it was reported that heavy resistance training combined with an endurance program provided significant improvements in squat strength during the first seven weeks of the program, followed by a plateau period (two weeks) and then a decrease in squat strength during the remaining weeks of the program (two weeks). The results provided evidence that the upper limits of strength may be inhibited with progressive endurance training such as running and cycling. Other mechanisms that have been suggested to hinder the development of strength when in combination with endurance training are (a) decreasing rapid voluntary activation, (b) chronically lower muscle glycogen levels that can limit intracellular signaling responses during resistance training, and (c) and fiber type transition to slow-twitch fibers ([112](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref112>)).\n\nOn the other hand, some studies and reviews indicate that the opposite holds true; these suggest that anaerobic training (strength training) can improve low- and high-intensity exercise endurance ([54](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref54>), [81](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref81>), [82](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref82>), [134](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref134>)). Sedano and colleagues ([134](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref134>)) reported improvements in performance of highly trained runners as a result of concurrent endurance, resistance, and plyometric training. There was no reduction in V̇O2max over the 12 weeks in runners who participated in resistance and plyometric training. Furthermore, the combination training improved performance measures such as maximal strength, peak running velocity, and 3 km time trial compared to endurance training alone. Thus in highly trained runners it would appear that strength training would improve performance while not hindering metabolic parameters (V̇O2max).\n\nAlthough oxidative metabolism is important for increased postexercise V̇O2, lactate removal, and PCr restoration from heavy anaerobic exercise (e.g., resistance training and sprint training) ([133](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref133>)), care must be used in prescribing aerobic endurance training for anaerobic sports. In this context, it should be noted that specific anaerobic training can stimulate increases in aerobic power and enhance markers of recovery ([54](<E6372RM_Refs_d104_split_003.xhtml#chapter3-ref54>)). Thus, it appears that extensive aerobic endurance training to enhance recovery from anaerobic events is not necessary and may be counterproductive in most strength and power sports."

  - id: "ch03-conclusion"
    title: "Conclusion"
    level: 2
    tags: [conclusion]
    key_points:
      - "Training programs with increased productivity can be designed through an understanding of how energy is produced during various types of exercise and how energy production can be modified by specific "
    recall_prompts:
      - "Conclusion 的核心概念是什麼？"
    content: "\n\nTraining programs with increased productivity can be designed through an understanding of how energy is produced during various types of exercise and how energy production can be modified by specific training regimens. Which energy system is used to supply energy for muscular contraction is determined primarily by the intensity of exercise and secondarily by the duration of exercise. Metabolic responses and training adaptations are largely regulated by exercise characteristics (e.g., intensity, duration, and recovery intervals). How these responses and adaptations occur following physical activity forms the basis for metabolic specificity of exercise and training. This principle allows for enhanced athletic performance through the implementation of improved training programs.\n\n### Key Terms\n\n  * adenosine diphosphate (ADP)\n  * adenosine monophosphate (AMP)\n  * adenosine triphosphatase (ATPase)\n  * adenosine triphosphate (ATP)\n  * adenylate kinase reaction\n  * aerobic\n  * aerobic glycolysis\n  * allosteric activation\n  * allosteric inhibition\n  * anabolism\n  * anaerobic\n  * anaerobic glycolysis\n  * beta oxidation\n  * bioenergetics\n  * branched-chain amino acid\n  * calcium ATPase\n  * catabolism\n  * combination training\n  * Cori cycle\n  * creatine kinase\n  * creatine phosphate (CP)\n  * cytochrome\n  * depletion\n  * electron transport chain (ETC)\n  * endergonic reaction\n  * energy\n  * energy substrate\n  * excess postexercise oxygen consumption (EPOC)\n  * exergonic reaction\n  * fast glycolysis\n  * flavin adenine dinucleotide (FADH2)\n  * gluconeogenesis\n  * glycogenolysis\n  * glycolysis\n  * glycolytic system\n  * high-intensity interval training (HIIT)\n  * hydrolysis\n  * inorganic phosphate\n  * interval training\n  * Krebs cycle\n  * lactate\n  * lactate threshold (LT)\n  * lactic acid\n  * law of mass action\n  * mass action effect\n  * metabolic acidosis\n  * metabolic specificity\n  * metabolism\n  * mitochondria\n  * myokinase reaction\n  * myosin ATPase\n  * near-equilibrium reactions\n  * nicotinamide adenine dinucleotide (NADH)\n  * onset of blood lactate accumulation (OBLA)\n  * oxidative phosphorylation\n  * oxidative system\n  * oxygen debt\n  * oxygen deficit\n  * oxygen uptake\n  * phosphagen system\n  * phosphocreatine (PCr)\n  * phosphofructokinase (PFK)\n  * phosphorylation\n  * pyruvate\n  * rate-limiting step\n  * repletion\n  * slow glycolysis\n  * sodium-potassium ATPase\n  * substrate-level phosphorylation\n  * wet muscle\n  * work-to-rest ratio\n\n### Study Questions\n\n  1. Which of the following substances can be metabolized anaerobically? \n     1. glycerol\n     2. glucose\n     3. amino acids\n     4. free fatty acids\n  2. Which of the following reactions is the primary cause of metabolic acidosis (i.e., the decrease in intramuscular pH during high-intensity, fatiguing exercise)? \n     1. ATP → ADP + Pi \\+ H+\n     2. pyruvate + NADH → lactate + NAD+\n     3. ADP + creatine phosphate → ATP + creatine\n     4. fructose-6-phosphate → fructose-1,6-bisphosphate\n  3. Which of the following energy systems produces ATP at the quickest rate? \n     1. phosphagen\n     2. aerobic glycolysis\n     3. fat oxidation\n     4. fast glycolysis\n  4. Approximately how many net ATP are produced via the oxidative energy system from the metabolism of one glucose molecule? \n     1. 27\n     2. 34\n     3. 38\n     4. 41\n  5. Which of the following energy substrates cannot be depleted during extreme exercise intensities or durations? \n     1. creatine phosphate\n     2. glycogen\n     3. water\n     4. ATP"
