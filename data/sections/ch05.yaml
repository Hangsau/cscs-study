    recall_prompts:
      - "Fiber Size Changes 是什麼？有哪些類型或應用？"
    content: "\n\nThe magnitude of muscle hypertrophy experienced following anaerobic training is intimately associated with muscle fiber type. Muscle fibers, in particular those within the high-threshold motor units governed by the size principle, must be activated in order to promote significant hypertrophy ([36](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref36>)). During resistance training, both Type I and Type II muscle fibers have the potential to be recruited, with the frequency at which they are recruited ultimately determining the extent of their adaptive processes. According to the size principle, only following hierarchical activation do Type I or Type II fibers receive a signaling mechanism that initiates the cascade of regulatory processes promoting protein synthesis. Collectively, however, following muscle fiber activation these hypertrophic responses translate into enlarged CSA of the intact muscle after several months of training. Typically, Type II fibers manifest greater increases in size than Type I fibers; thus the magnitude of hypertrophy is not uniform between the two major fiber types ([83](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref83>)). In fact, it has been argued that the ultimate potential for hypertrophy may reside in the relative proportion of Type II fibers within a given athlete’s muscles ([131](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref131>), [191](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref191>)). That is, athletes who genetically possess a relatively large proportion of fast-twitch fibers may have a greater potential for increasing muscle mass than individuals possessing predominately slow-twitch fibers."

  - id: "ch05-fiber-type-transitions"
    title: "Muscular Adaptations / Fiber Type Transitions"
    level: 3
    tags: [muscular, adaptations, fiber, type, transitions]
    key_points:
      - "The pattern of neural stimulation dictates the extent to which fiber type adaptations occur following anaerobic training."
    recall_prompts:
      - "Fiber Type Transitions 是什麼？有哪些類型或應用？"
    content: "\n\nThe pattern of neural stimulation dictates the extent to which fiber type adaptations occur following anaerobic training. Muscle fibers are theoretically positioned on a continuum from the most oxidative to the least oxidative type (see [figure 5.3](<E6372ch05_d82.xhtml#f5.3>) and the description of muscle fiber types in [chapter 1](<E6372ch01_d78.xhtml>)). The continuum is as follows: I, Ic, IIc, IIac, IIa, IIax, and IIx, with a concomitant myosin heavy chain (MHC) expression (i.e., MHC I, IIa, and IIx) ([181](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref181>)). Although the proportions of Type I and II fibers are genetically determined ([154](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref154>)), changes within each subtype can occur following anaerobic training. With training and activation of the high-threshold motor units, there is a transition from Type IIx to IIa fiber type ([25](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref25>)). In other words, Type IIx muscle fibers change their myosin adenosine triphosphatase (ATPase) isoform content and progressively become more oxidative IIa fibers. In fact, research has shown nearly full transitions from Type IIx to IIa fiber profiles following the combination of high-intensity resistance and aerobic endurance training ([112](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref112>)). The changes in fast-twitch fiber types have typically not been linked to the rate at which changes in the muscle fiber CSA take place.\n\n**Figure 5.3** Muscle fiber transitions occur during training. This means that a shift of the type of myosin adenosine triphosphatase (ATPase) and heavy chains takes place during training. Transformations from IIx to IIax to IIa can be seen, and then small percentages change to IIac and IIc. Exercise activities that recruit motor units with Type IIx muscle fibers initiate a shift toward IIa fibers.\n\n![An equation. 2 x yields 2 a x, which yields 2 a, which in turn yields 2 a c. 2 c yields 1 c, which yields 1.](images/E6372_508103_ebook.jpg)\n\nType IIx fibers represent a “reservoir” that, upon consistent activation, changes into a more oxidative form along the continuum (i.e., to an intermediate fiber Type IIax and then to a IIa) ([25](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref25>)). Any change in the muscle fiber type continuum and associated MHCs occurs in the early stages of a resistance training program. In an early study, Staron and colleagues ([183](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref183>)) examined the effects of a high-intensity resistance training protocol (multiple sets of squat, leg press, and knee extension exercises using 6- to 12RM loads and 2-minute rest periods) performed by men and women two times per week for eight weeks. They reported a significant decrease in the Type IIx percentage in women after just two weeks of training (four workouts) and in the men after four weeks of training (eight workouts). Over the eight-week training program, Type IIx fiber types decreased from ~18% to about 7% of the total muscle fibers in both men and women. Analysis of the MHCs showed that in this early phase of training, IIx MHCs were replaced with IIa MHCs. In addition, this study demonstrated that changes in hormonal factors (testosterone and cortisol interactions) correlated with changes in muscle fiber type. Interestingly, detraining has the opposite effect, resulting in an increase in Type IIx fibers and a reduction in Type IIa fibers ([153](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref153>)), with a possible overshoot of Type IIx fibers (i.e., higher IIx percentages than observed pretraining ([10]). While transformation within muscle fiber subtypes appears typical, transformation from Type I to Type II or vice versa appears less probable, most likely due to differing MHC isoforms and relative oxidative enzyme content ([155](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref155>)). Whether these transformations are possible remains doubtful at this point, as insufficient evidence is currently available. These possibilities need to be explored in future studies; it is intriguing to consider whether or not the continuum of adaptations extends beyond Type I and II subpopulations, especially in extreme cases in which a marathon runner (high percentage of Type I fibers) follows a high-intensity resistance training program or a powerlifter (high percentage of Type II fibers) begins an extensive aerobic endurance training program."

  - id: "ch05-structural-and-architectural-changes"
    title: "Muscular Adaptations / Structural and Architectural Changes"
    level: 3
    tags: [muscular, adaptations, structural, architectural, changes]
    key_points:
      - "Pennate muscle has fascicles that attach obliquely (in a slanted position) to its tendon."
    recall_prompts:
      - "Structural and Architectural Changes 是什麼？有哪些類型或應用？"
    content: "\n\nPennate muscle has fascicles that attach obliquely (in a slanted position) to its tendon. Pennation angle affects the force production capabilities as well as the range of motion of a muscle. Larger pennation angles can also accommodate greater protein deposition and allow for greater increases in CSA ([2](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref2>)). In pennate muscle, resistance training has been shown to increase the angle of pennation, with strength-trained athletes displaying larger pennation angles in the triceps brachii and vastus lateralis muscles compared to untrained individuals ([2](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref2>)). In addition, fascicle length has been shown to be greater in strength-trained athletes ([94](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref94>)), and fascicle length of the gastrocnemius and vastus lateralis has been found to be greater in sprinters compared to distance runners ([6](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref6>)). The combination of resistance, sprint, and jump training has been shown to increase rectus femoris fascicle length; and sprint and jump training have been shown to increase vastus lateralis fascicle length ([20](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref20>)). These architectural changes have a positive effect on the manner in which force is ultimately transmitted to tendons and bones."

  - id: "ch05-other-muscular-adaptations"
    title: "Muscular Adaptations / Other Muscular Adaptations"
    level: 3
    tags: [muscular, adaptations, other, muscular, adaptations]
    key_points:
      - "Resistance training has been shown to increase myofibrillar volume ([128](<E6372RM_Refs_d104_split_005."
    recall_prompts:
      - "Other Muscular Adaptations 是什麼？有哪些類型或應用？"
    content: "\n\nResistance training has been shown to increase myofibrillar volume ([128](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref128>)), cytoplasmic density ([132](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref132>)), sarcoplasmic reticulum and T-tubule density ([9](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref9>)), and sodium–potassium ATPase activity ([71](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref71>)). Collectively, these changes act to facilitate hypertrophy and enable greater expression of muscular strength. Sprint training has been shown to enhance calcium release ([150](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref150>)), which assists in increasing speed and power production by promoting actin and myosin crossbridge formation.\n\nHeavy resistance training has also been shown to reduce mitochondrial density ([133](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref133>)). While the number of mitochondria actually remains constant or can slightly increase throughout a training phase, mitochondrial density is expressed relative to muscle area. Increases in muscle CSA occur disproportionately to mitochondrial proliferation, and consequently the density of mitochondria per unit volume is actually found to decrease with hypertrophy. Muscle hypertrophy also results in decreased capillary density by similar mechanisms, again with the number of capillaries per fiber actually increasing somewhat ([184](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref184>)). Powerlifters and weightlifters show significantly lower capillary densities than control subjects, whereas bodybuilders have capillary densities similar to those of nonathletes ([107](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref107>)). Bodybuilding workouts produce large hydrogen ion concentrations, but having more capillaries per fiber may assist in the clearance of metabolites from exercising muscle ([111](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref111>), [190](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref190>)).\n\nAnaerobic exercise results in substantial reductions in muscle and blood pH ([33](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref33>)), with several mechanisms regulating a change in acid–base balance during exercise. With adaptations to consistent acute changes in pH during training (i.e., increased H\\+ concentration), buffering capacity can improve. This increased capacity then allows an athlete to better tolerate the accumulation of H+ within the working muscle, resulting in delayed fatigue and greater muscular endurance ([175](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref175>)). By its nature, high-intensity interval training (sprints, cycling) performed above the lactate threshold has been shown to significantly increase buffering capacity by 16% to 38% ([17](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref17>), [175](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref175>)). Elsewhere, athletes competing in anaerobic team sports have been shown to have higher buffering capacity than endurance athletes and untrained control subjects ([47](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref47>)).\n\nWithin skeletal muscle, substrate content and enzyme activity represent further areas of adaptation in response to anaerobic training. Most notably, when ATP and creatine phosphate (CP) concentrations are repeatedly exhausted following bouts of intermittent high-intensity muscular contraction, the storage capacity of these high-energy compounds is increased via a “supercompensation” effect. MacDougall and colleagues ([135](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref135>)) reported a 28% increase in resting CP and an 18% increase in ATP concentrations following five months of resistance training (i.e., three to five sets of 8-10 repetitions with 2-minute rest periods). In addition, it appears that bodybuilding-style programs such as this, which stress anaerobic glycolysis, may also be a potent stimulus for enhancement of glycogen content, as this was found to increase up to 112%."

  - id: "ch05-general-bone-physiology"
    title: "Connective Tissue Adaptations / General Bone Physiology"
    level: 3
    tags: [connective, tissue, adaptations, general, bone, physiology]
    key_points:
      - "The rate of bone adaptation occurs differently in the axial (skull-cranium, vertebral column, ribs, and sternum) and appendicular (shoulder girdle, pelvis, and bones of the upper and lower extremities"
    recall_prompts:
      - "General Bone Physiology 是什麼？有哪些類型或應用？"
    content: "\n\nThe rate of bone adaptation occurs differently in the axial (skull-cranium, vertebral column, ribs, and sternum) and appendicular (shoulder girdle, pelvis, and bones of the upper and lower extremities) skeleton, owing to differing amounts of trabecular (spongy) bone and cortical (compact) bone. Cortical bone is dense and forms a compact outer shell surrounding the trabecular bone, with the two types of bone linked by interlocking narrow and delicate plates of trabecular bone. The spaces between the trabecular plates are occupied by bone marrow that consists of adipose tissue and blood products such as immature red blood cells. Blood vessels from the marrow cavity extend into the dense cortical bone through a network of vertical and horizontal canals. Because it is less dense and has a greater surface area–to–mass ratio, trabecular bone is able to respond more rapidly to stimuli than cortical bone as it is softer, weaker, and more flexible and therefore more inclined to adaptive change.\n\nThe term minimal essential strain (MES) refers to the threshold stimulus that initiates new bone formation. Consistently exceeding these thresholds signals osteoblasts to migrate to the region experiencing the stress and to form bone, while forces that fall below the MES do not present an appropriate stimulus for new bone formation. Bone cells work to regulate the formation of new bone tissue such that forces experienced on a regular basis do not exceed the MES, thereby establishing a margin of safety against fracture. Strain registered by bone is a function of the force per unit area of bone (stress). The MES is thought to be approximately 1/10 of the force required to fracture bone. Increasing the diameter of bone allows the force to be distributed over a larger surface area, thereby decreasing the amount of mechanical stress. Following bone growth, a force that previously exceeded the MES will now be below the MES threshold. Progressive weight-bearing physical activities that generate forces exceeding the MES are therefore the most effective at increasing bone size and strength.\n\nForces that reach or exceed a threshold stimulus initiate new bone formation in the area experiencing the mechanical strain."

  - id: "ch05-anaerobic-training-and-bone-growth"
    title: "Connective Tissue Adaptations / Anaerobic Training and Bone Growth"
    level: 3
    tags: [connective, tissue, adaptations, anaerobic, training, bone]
    key_points:
      - "As muscular strength and hypertrophy increase in response to anaerobic training modalities, the forces generated by the increased muscle contractions subsequently increase the mechanical stress on bon"
    recall_prompts:
      - "Anaerobic Training and Bone Growth 是什麼？有哪些類型或應用？"
    content: "\n\nAs muscular strength and hypertrophy increase in response to anaerobic training modalities, the forces generated by the increased muscle contractions subsequently increase the mechanical stress on bone, and the bone itself must increase in mass and strength to provide an adequate support structure. Any increase in muscle strength or mass may therefore result in a corresponding increase in bone mineral density (BMD), or the quantity of mineral deposited in a given area of the bone ([93](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref93>)). Interestingly, inactivity or immobilization has the opposite effect and results in a more rapid rate of loss of bone matrix and BMD ([178](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref178>)). Numerous studies have shown a positive correlation between BMD and muscle strength and mass ([158](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref158>), [198](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref198>)). Researchers have reported that resistance-trained athletes have higher BMD than age-matched sedentary control subjects ([28](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref28>), [29](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref29>), [164](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref164>)). In some individuals (e.g., professional soccer players), physical activity seems to influence bone mass, area, and width more than BMD ([198](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref198>)). Thus, exercise that stimulates muscle hypertrophy and strength gains also appears to stimulate bone growth.\n\nQuantitatively, the time course for bone adaptations is rather long—approximately six months or longer ([27](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref27>))—and depends intimately on the structure of the program. However, the process of adaptation begins within the first few workouts. The process of osteogenesis involves secretion of substances into the blood (substances specific to bone only) that can be measured. Therefore, any elevation in an osteogenic marker can be recognized as an early indicator of bone formation and presumably a precursor to increased BMD, provided that the stimulus is maintained over a long training period."

  - id: "ch05-principles-of-training-to-increase-bone-"
    title: "Connective Tissue Adaptations / Principles of Training to Increase Bone Strength"
    level: 3
    tags: [connective, tissue, adaptations, principles, training, increase]
    key_points:
      - "Anaerobic training programs that have the objective to stimulate bone growth need to incorporate specificity of loading, speed and direction of loading, sufficient volume, appropriate exercise selecti"
    recall_prompts:
      - "Principles of Training to Increase Bone Strength 是什麼？有哪些類型或應用？"
    content: "\n\nAnaerobic training programs that have the objective to stimulate bone growth need to incorporate specificity of loading, speed and direction of loading, sufficient volume, appropriate exercise selection, progressive overload, and variation ([30](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref30>)). Specificity of loading demands the use of exercises that directly load the particular region of interest of the skeleton. If the body interprets these forces as new or novel, they will stimulate bone growth in the area that is receiving the strain. For example, running may be a good stimulus for increased BMD in the femur but the wrong choice for promoting mineral deposits when one is trying to strengthen the wrist. The concept of specificity of loading becomes particularly important when a strength and conditioning professional prescribes exercises to increase bone mass in regions of the skeleton most commonly affected by osteoporosis—a disease in which BMD and bone mass become reduced to critically low levels. Research indicates that high-impact cyclical loading exercises for the lower body, such as gymnastics ([187](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref187>)), volleyball, or basketball ([42](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref42>)), selectively increase BMD at clinically relevant sites such as the hip and spine more than lower-impact activities do. Additionally, increases in BMD may be seen in highly trained college athletes already possessing high levels of BMD. These changes in BMD are independent of reproductive hormonal status if the stimulus is sufficient ([187](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref187>)).\n\nExercise selection is critical when one is trying to elicit maximal osteogenic stimuli (factors that stimulate new bone formation). In essence, exercises should involve multiple joints, should direct the force vectors primarily through the spine and hip (i.e., structural exercises), and should apply external loads heavier than those with single-joint assistance exercises. Cussler and colleagues ([35](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref35>)) showed a positive linear relationship between the amounts of weight lifted over the course of a training year and associated increases in BMD. In addition, the findings of this research highlighted the importance of exercise specificity in that the squat, compared to seated leg press, was more effective for increasing BMD in the trochanter of the femur ([35](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref35>)). The use of single-joint, machine-based exercises should be limited, as these exercises isolate a single muscle group by using equipment as support to stabilize the body rather than promoting skeletal support. Therefore, exercises such as the back squat, power clean, deadlift, snatch, and push jerk (for the axial skeleton and lower body) and the shoulder press (for the upper body) are recommended as more effective methods for increasing bone strength.\n\nBecause bone responds favorably to mechanical forces, the principle of progressive overload—progressively placing greater than normal demands on the exercising musculature—applies when one is training to increase bone mass ([70](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref70>), [196](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref196>)). Although the maximal strength of bone is maintained well above the voluntary force capabilities of the associated musculature, bone responds to higher forces (e.g., 1- to 10RM loads) that are repetitively applied over time. The adaptive response of bone ensures that forces do not exceed a critical level that increases the risk of stress fractures (microfractures in bone due to structural fatigue). Support for progressive overload comes from studies that have compared BMD of various groups of athletes to that of nonathletes ([42](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref42>), [198](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref198>)). In fact, elite adolescent weightlifters have been found to possess levels of bone mineralization that far exceed values found in untrained adults ([29](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref29>), [91](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref91>)). This observation is interesting because it indicates that young bone may be more responsive to osteogenic stimuli than mature bone. Evidence indicates that physical activity during growth modulates the external geometry and trabecular architecture of bone, potentially enhancing skeletal strength ([84](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref84>)). Recent evidence shows that physical activity–associated bone loading during skeletal growth (i.e., adolescence) and after skeletal growth (i.e., early adulthood) elevates peak bone mass and is positively associated with adult bone mass in later life ([186](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref186>)).\n\nAnother important consideration in the design of programs to stimulate new bone formation is training variation. The internal architecture of the human skeleton has a mechanism through which it compensates for new strain patterns experienced by the bone. To optimally dissipate the imposed forces, the direction of the collagen fibers within the bone matrix may change to conform to the lines of stress experienced by the bone. Thus, changing the distribution (and direction) of the force vectors by using a variety of exercises continually presents a unique stimulus for new bone formation within a given region of bone. Subsequently, collagen formation occurs in multiple directions, increasing bone strength in various directions. Overall, if the magnitude of the load or the rate of force application is sufficient, it is not typically necessary to perform more than a total of 30 to 35 repetitions, as a greater volume of loading is not likely to provide any additional stimulus for bone growth ([57](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref57>), [178](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref178>)).\n\nThe components of mechanical load that stimulate bone growth are the magnitude of the load (intensity), rate (speed) of loading, direction of the forces, and the volume of loading (number of repetitions).\n\n#### How Can Athletes Stimulate Bone Formation?\n\nIn order to promote bone formation, athletes should use specific programming of acute training variables in order to maximize optimal adaptations.\n\n  * Select multijoint, structural exercises that involve many muscle groups at once. Avoid isolated, single-joint movements.\n  * Select exercises that direct axial force vectors through the spine and hip and apply heavier loads than single-joint assistance exercises.\n  * Use the principle of progressive overload to stress the musculoskeletal system, and continue to progressively increase load as the tissues become accustomed to the stimulus.\n  * Use both heavy-load exercises and ballistic or high-impact exercises to expose the bone to different intensities of force.\n  * By varying exercise selection, it is possible to change the distribution of force insults and present a unique stimulus for new bone formation."

  - id: "ch05-adaptations-of-tendons-ligaments-and-fas"
    title: "Connective Tissue Adaptations / Adaptations of Tendons, Ligaments, and Fascia to Anaerobic Training"
    level: 3
    tags: [connective, tissue, adaptations, adaptations, tendons, ligaments]
    key_points:
      - "Tendons, ligaments, fascia, and cartilage are complex and dynamic structures that are the critical link between muscles and bones."
    recall_prompts:
      - "Adaptations of Tendons, Ligaments, and Fascia to Anaerobic Training 是什麼？有哪些類型或應用？"
    content: "\n\nTendons, ligaments, fascia, and cartilage are complex and dynamic structures that are the critical link between muscles and bones. The primary structural component of all connective tissue is the collagen fiber (Type I for bone, tendon, and ligaments and Type II for cartilage; [figure 5.5](<E6372ch05_d82.xhtml#f5.5>)). The parent protein, procollagen, is synthesized and secreted by fibroblasts, which are the most common cells found in the connective tissue of animals and act as stem cells in the synthesis of the extracellular matrix, as well as playing a critical role in wound healing. Procollagen molecules consist of three protein strands twisted around each other in a triple helix. Procollagen leaves the cell with protective extensions on the ends to prevent premature collagen formation. Cleavage of the extensions via enzymes results in the formation of active collagen that aligns with other collagen molecules to form a long filament. Measurement of these enzymes provides an indication of collagen metabolism. In fact, enzyme levels increase in response to training, thereby showing increased net Type I collagen synthesis ([125](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref125>)). The parallel arrangement of filaments is called a microfibril. Collagen has a striated (striped) appearance under a light microscope, somewhat like skeletal muscle, owing to the orderly alignment of the gaps between the collagen molecules within a microfibril. As bone grows, microfibrils become arranged into fibers, and the fibers into larger bundles. The true strength of collagen comes from the strong chemical bonds (cross-linking) that form between adjacent collagen molecules throughout the collagen bundles. Collagen bundles are bunched together longitudinally to form tendons or ligaments, or are arranged in sheets with the layers oriented in different directions, as found in bone, cartilage, and fascia.\n\n**Figure 5.5** Formation of a collagen fiber.\n\n![An illustration of the formation of a collagen fiber.](images/E6372_508107_ebook.jpg)\n\n[Follow for extended description](<Ext_desc_E6372_508107_ebook.xhtml#l_E6372_508107_ebook>)\n\nTendons and ligaments are composed primarily of tightly packed, parallel arrangements of collagen bundles. Mature tendons and ligaments contain relatively few cells. The small number of metabolically active cells in tendons and ligaments makes the requirement for oxygen and nutrients in these tissues relatively low. Ligaments contain elastic fibers (elastin) in addition to collagen, as a certain amount of stretch is needed within a ligament to allow normal joint motion. Tendons and ligaments attach to bone with great strength, allowing the maximal transmission of forces. The fibrous connective tissues that surround and separate the different organizational levels within skeletal muscle are referred to as fascia. Fascia has sheets of fibrocollagenous support tissue, containing bundles of collagen fibers arranged in different planes, to provide resistance to forces from different directions. Fascia within muscles converges near the end of the muscle to form a tendon through which the force of muscle contraction is transmitted to bone. Compared with that of muscle tissue, tendon metabolism is much slower due to poorer vascularity and circulation ([92](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref92>)). In fact, the increase in blood flow to skeletal muscle via exercise is not paralleled by the same flow perfusion in tendons ([99](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref99>)). This limited vascularity has implications for regeneration and is the reason tendons can take significant amounts of time to heal following injury.\n\nThe primary stimulus for growth of tendons, ligaments, and fascia is the insult from mechanical forces created during high-intensity exercise. The degree of tissue adaptation appears to be proportional to the intensity of exercise ([99](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref99>)). Consistent anaerobic exercise that exceeds the threshold of strain has a positive effect on stimulating connective tissue changes ([92](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref92>)).\n\nEmpirical evidence suggests that connective tissues must increase their functional capabilities in response to increased muscle strength and hypertrophy. The sites where connective tissues can increase strength and load-bearing capacity are\n\n  * the junctions between the tendon (and ligament) and bone surface,\n  * within the body of the tendon or ligament, and\n  * in the network of fascia within skeletal muscle ([99](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref99>)).\n\nAs muscles become stronger, they pull on their bony attachments with greater force and cause an increase in bone mass at the tendon–bone junction and along the line over which the forces are distributed.\n\nHigh-intensity anaerobic training results in connective tissue growth and other ultrastructural changes that enhance force transmission. Specific changes within a tendon that contribute to its increase in size and strength include the following:\n\n  * An increase in collagen fibril diameter\n  * A greater number of covalent cross-links within the hypertrophied fiber\n  * An increase in the number of collagen fibrils\n  * An increase in the packing density of collagen fibrils\n\nCollectively, these adaptations increase the tendon’s ability to withstand greater tensional forces ([143](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref143>)).\n\nMuscle hypertrophy in animals relates to an increase in the number and size of fibroblasts, thereby resulting in a greater supply of total collagen. Activation of fibroblasts and subsequent growth of the connective tissue network are prerequisites for hypertrophy of active muscle ([142](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref142>)). This may explain why biopsies of trained athletes have shown that hypertrophied muscle contains greater total collagen than in untrained individuals but that the collagen content remains proportional to the existing muscle mass ([143](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref143>)). Recent studies indicate that tendon stiffness (force transmission per unit of strain, or tendon elongation) increases as a result of resistance training ([123](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref123>)). In fact, Kubo and colleagues ([121](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref121>)) reported a 15% to 19% increase in Achilles tendon stiffness following eight weeks of resistance training. The intensity of exercise is critical, as heavy loads (80% of 1RM) increase tendon stiffness but light loads (20% of 1RM) do not ([122](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref122>))."

  - id: "ch05-adaptations-of-cartilage-to-anaerobic-tr"
    title: "Connective Tissue Adaptations / Adaptations of Cartilage to Anaerobic Training"
    level: 3
    tags: [connective, tissue, adaptations, adaptations, cartilage, anaerobic]
    key_points:
      - "Cartilage is a dense connective tissue capable of withstanding considerable force without damage to its structure."
    recall_prompts:
      - "Adaptations of Cartilage to Anaerobic Training 是什麼？有哪些類型或應用？"
    content: "\n\nCartilage is a dense connective tissue capable of withstanding considerable force without damage to its structure. The main functions of cartilage are to\n\n  * provide a smooth joint articulating surface,\n  * act as a shock absorber for forces directed through the joint, and\n  * aid in the attachment of connective tissue to the skeleton.\n\nA feature unique to cartilage is that it lacks its own blood supply and must depend on diffusion of oxygen and nutrients from synovial fluid (which is why cartilage does not easily repair itself following injury). Two primary types of cartilage are significant in relation to physical activity. Hyaline cartilage (articular cartilage) is found on the articulating surfaces of bones. Fibrous cartilage is a very tough form of cartilage found in the intervertebral disks of the spine and at the junctions where tendons attach to bone.\n\nThe fact that articular cartilage gets its nutrient supply via diffusion from synovial fluid provides a link for joint mobility to joint health. Movement about a joint creates changes in pressure in the joint capsule that drive nutrients from the synovial fluid toward the articular cartilage of the joint ([180](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref180>)). Immobilization of a joint prevents proper diffusion of oxygen and essential nutrients throughout the joint. This results in the death of the healthy cells within cartilage, called chondrocytes, and a resorption of the cartilage matrix ([195](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref195>)). Current understanding indicates that human cartilage undergoes atrophy, or thinning, when external loading is removed (e.g., postoperative immobilization and paraplegia). However, the effect that increased external loading has on average cartilage thickness remains to be fully elucidated ([46](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref46>)). In any case, it is likely that genetic contribution plays a greater role in determining cartilage morphology.\n\n#### How Can Athletes Stimulate Connective Tissue Adaptations?\n\nTendons, Ligaments, Fascia\n\n  * Long-term adaptations in tendons, ligaments, and fascia are stimulated through progressive high-intensity loading patterns using external resistances.\n  * High-intensity loads should be used, as low to moderate intensities do not markedly change the collagen content of connective tissue.\n  * Forces should be exerted throughout the full range of motion of a joint, and wherever possible multiple-joint exercises should be used.\n\nCartilage\n\n  * Moderate-intensity anaerobic exercise seems to be adequate for increasing cartilage thickness. Strenuous exercise does not appear to cause any degenerative joint disease when progressively overloaded appropriately.\n  * Tissue viability can be maintained by adopting a variety of exercise modalities and ensuring that load is applied throughout the range of motion."

  - id: "ch05-endocrine-responses-and-adaptations-to-a"
    title: "Endocrine Responses and Adaptations to Anaerobic Training"
    level: 2
    tags: [endocrine, responses, adaptations, anaerobic, training]
    key_points:
      - "Hormones have a variety of regulatory roles during anaerobic training and affect homeostatic mechanisms dedicated to keeping the body’s functions within normal range during rest and exercise ([60](<E6"
    recall_prompts:
      - "Endocrine Responses and Adaptations to Anaerobic Training 的核心概念是什麼？"
    content: "\n\nHormones have a variety of regulatory roles during anaerobic training and affect homeostatic mechanisms dedicated to keeping the body’s functions within normal range during rest and exercise ([60](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref60>), [61](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref61>), [102](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref102>), [106](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref106>), [109](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref109>)). These include the development of muscle, bone, and connective tissue through both anabolic and catabolic processes. As discussed in [chapter 4](<E6372ch04_d81.xhtml>), endocrine responses to anaerobic training can include (a) acute changes during and after exercise, (b) chronic changes in the acute response to a workout, (c) chronic changes in resting concentrations, and (d) changes in hormone receptor content.\n\n### Acute Anabolic Hormone Responses\n\nFollowing anaerobic exercise (in particular resistance training), elevated concentrations of testosterone, molecular variants of growth hormone, and cortisol have been found for up to 30 minutes in men ([104](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref104>), [105](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref105>), [115](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref115>), [117](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref117>)). These fluctuations occur quickly and then rapidly stabilize in response to homeostatic challenges from the initial demands of acute exercise ([119](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref119>), [183](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref183>)) and longer-term training ([136](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref136>)). The magnitude of elevation is greatest when large muscle mass exercises are performed, or during workouts with moderate to high intensity and volume combined with shorter rest intervals ([111](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref111>), [115](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref115>)) For example, high correlations exist between blood lactate (i.e., from high-intensity anaerobic exercise), growth hormone, and cortisol ([78](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref78>)), and thus it is thought that hydrogen ion accumulation may be a primary factor influencing growth hormone and cortisol release. Elsewhere, elevations in free testosterone have been shown to be greater in resistance-trained men compared to aerobic-trained men ([82](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref82>), [193](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref193>)), with some studies reporting slight testosterone elevations in women following anaerobic exercise ([149](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref149>)).\n\nThe acute anabolic hormone response to anaerobic exercise is critical for exercise performance and subsequent training adaptations. Upregulation of anabolic hormone receptors is important for mediating the hormonal effects.\n\nInsulin-like growth factor I (IGF-I) is a primary mediator of growth hormone; it acts as a hormonal messenger that stimulates growth-promoting effects in almost every cell of the body, especially skeletal muscle, cartilage, and bone. Insulin-like growth factor I has a delayed response to exercise and is dependent upon the acute growth hormone response. However, alternative _mechano growth factors_ are upregulated in skeletal muscle in response to mechanical loading and act independently of growth hormone ([66](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref66>)). Insulin secretion in comparison parallels blood glucose and amino acid changes, with insulin mostly affected by supplementation before, during, or after exercise and not by the anaerobic exercise stimulus ([13](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref13>)). Catecholamines (epinephrine, norepinephrine, dopamine) reflect the acute demands of anaerobic exercise ([22](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref22>), [56](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref56>), [105](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref105>), [111](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref111>)), with increasing concentrations important for regulating force production, muscle contraction rate, energy availability, and augmentation of other hormones (e.g., testosterone).\n\n### Chronic Changes in the Acute Hormonal Response\n\nAdherence to a long-term resistance training program results in an increased ability to exert greater levels of muscular force ([80](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref80>)), with relative training intensities increasing over time as the body adapts to tolerate progressively heavier loads. As a consequence, acute endocrine responses to anaerobic training will likely mirror these improvements, as has been predominantly shown with growth hormone ([34](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref34>)). The longitudinal changes in endocrine function reflect the increased exercise “stress” being tolerated by the body in response to incremental external loading. It is thus hypothesized that any chronic adaptations in acute hormonal response patterns potentially augment the ability to better tolerate and sustain prolonged higher exercise intensities.\n\n### Chronic Changes in Resting Hormonal Concentrations\n\nChronic changes in resting hormone concentrations following anaerobic exercise are unlikely, with research providing inconclusive changes in testosterone, growth hormone, IGF-I, and cortisol over time ([115](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref115>)). Instead, resting concentrations likely reflect the current state of the muscle tissue in response to substantial changes to the training program (i.e., volume or intensity) and nutritional factors. It appears that the elevation during and immediately following a workout may present receptors with enough of a stimulus to affect tissue remodeling without the need for chronic elevations in basal concentrations ([162](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref162>)). It is important to note that chronic elevations in an anabolic hormone may be counterproductive over the long term. Receptors tend to downregulate over time when exposed consistently to high levels of hormones. For example, in type 2 diabetes mellitus, sensitivity of skeletal muscle to insulin is reduced due to chronic elevated blood insulin. This is why anabolic steroid users repeatedly cycle drug use rather than maintaining consistently high doses.\n\n### Hormone Receptor Changes\n\nReceptor content is important for mediating the adaptations elicited by any hormonal response. Androgen receptors (AR) have received much attention in the literature, and their content (i.e., number of receptors per area on the target tissue) depends on several factors including muscle fiber type, contractile activity, and the concentrations of testosterone. Resistance training has been shown to upregulate AR content within 48 to 72 hours after the workout ([15](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref15>)). The resistance exercise stimulus appears to mediate the magnitude of acute AR modifications. Ratamess and colleagues ([162](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref162>)) compared one set versus six sets of 10 repetitions of squats and reported no differences in AR content following the single-set protocol; however, the higher-volume protocol elicited significant downregulation of AR content 1 hour after the workout. This study also demonstrated that when sufficient volume is reached, AR protein content may initially downregulate, before the upregulation that has been shown in other studies. However, Kraemer and colleagues ([118](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref118>)) have shown that consumption of a protein-carbohydrate supplement before and after the workout attenuates this AR downregulation."

  - id: "ch05-cardiovascular-and-respiratory-responses"
    title: "Cardiovascular and Respiratory Responses to Anaerobic Exercise"
    level: 2
    tags: [cardiovascular, respiratory, responses, anaerobic, exercise]
    key_points:
      - "Both acute bouts of anaerobic exercise and long-term anaerobic training have a significant impact on cardiovascular and respiratory function."
    recall_prompts:
      - "Cardiovascular and Respiratory Responses to Anaerobic Exercise 的核心概念是什麼？"
    content: "\n\nBoth acute bouts of anaerobic exercise and long-term anaerobic training have a significant impact on cardiovascular and respiratory function. This is reflected in both anaerobic athletes ([51](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref51>)) and sedentary individuals ([97](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref97>)), where enhanced cardiac function and dimensions are apparent. Heavy-load resistance training can benefit the cardiovascular system, but differently from resistance training with more repetitions of light loads and less rest or conventional aerobic endurance training ([52](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref52>)). Improved ability of the heart, lungs, and circulatory system to function under conditions of high pressure and force production can prepare the athlete’s body for the extreme demands of sporting competition.\n\n### Acute Cardiovascular Responses to Anaerobic Exercise\n\nAn acute bout of anaerobic exercise significantly increases cardiovascular responses. Heart rate, stroke volume, cardiac output, and blood pressure all increase significantly during resistance exercise. Peak blood pressures of 320/250 mmHg and a heart rate of 170 beats/min have been reported during a high-intensity (i.e., 95% of 1RM) leg press exercise ([134](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref134>)). Generally, the blood pressure response increases nonlinearly with the magnitude of active muscle mass and is higher during the concentric phase of each repetition than during the eccentric phase, especially at the “sticking point” of an exercise. Although large elevations in blood pressure have been reported, there are limited data to indicate that resistance training has any negative effects on resting blood pressure ([31](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref31>)). In addition, intrathoracic pressure increases, and plasma volume reductions of up to 22% have been reported ([157](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref157>), [162](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref162>)).\n\nAcute anaerobic exercise results in increased cardiac output, stroke volume, heart rate, oxygen uptake, systolic blood pressure, and blood flow to active muscles.\n\nDuring a set of resistance exercise, stroke volume and cardiac output increase mostly during the eccentric phase of each repetition, especially when the Valsalva technique is used (see [chapter 2](<E6372ch02_d79.xhtml>)) ([49](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref49>)). Because the concentric phase of a repetition is much more difficult and elevations in intrathoracic and intra-abdominal pressures are more prominent (via the Valsalva maneuver), limiting venous return and reducing end-diastolic volume, the hemodynamic response of resistance exercise is delayed such that cardiac output increases more during the eccentric phase or during the rest period between sets. This is especially true for an individual’s heart rate response; during the first 5 seconds after completion of a set, heart rate is higher than during the set itself ([160](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref160>)).\n\nThe degree to which blood flow is increased in the working muscles during anaerobic training is dependent on a number of factors, including (a) the intensity of resistance, (b) the length of time of the effort (i.e., the number of repetitions performed), and (c) the size of the muscle mass activated. When lower resistances are lifted for many repetitions, the responses are relatively similar to those observed during aerobic exercise ([64](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref64>)). However, heavy resistance exercise decreases blood flow to the working muscles as a result of contracted muscle tissue’s clamping down on capillaries and creating a localized occlusion. Muscular contractions greater than 20% of maximal voluntary contraction impede peripheral blood flow within the muscle during a set, but blood flow increases during the subsequent rest period (reactive hyperemia) ([116](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref116>)). Interestingly, the lack of blood flow (and subsequent increase in metabolites such as hydrogen ions and reduction in pH) during heavy external loading is a potent stimulus for muscle growth ([188](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref188>)). Overall, the magnitude of the acute cardiovascular responses depends on the intensity and volume of exercise, muscle mass involvement, rest period length, and contraction velocity ([113](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref113>), [160](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref160>)).\n\n### Chronic Cardiovascular Adaptations at Rest\n\nThe effect of anaerobic training modalities on resting heart rate remains to be fully elucidated. Short-term resistance training has been shown to decrease resting heart rate between 5% and 12% ([53](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref53>), [57](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref57>)). However, when this effect is studied longitudinally over time, mixed responses are reported, with either no change in resting heart rate or reductions of 4% to 13% ([53](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref53>), [57](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref57>)). In chronically resistance-trained athletes (e.g., bodybuilders, powerlifters, weightlifters), both average and lower than average resting heart rates (60-78 beats/min) have been reported compared to those in untrained individuals.\n\nA meta-analysis of resting blood pressure indicated that both systolic and diastolic blood pressure decreased by 2% to 4% as an adaptation to resistance training ([95](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref95>)). It appears that the response is greatest in those individuals who initially have a slightly elevated blood pressure. Similarly, the rate–pressure product (heart rate × systolic blood pressure; a measure of myocardial work) has been shown to either remain constant or decrease following resistance training ([52](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref52>), [53](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref53>)). Stroke volume has been shown to increase in absolute magnitude, but not relative to body surface area or lean body mass ([53](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref53>)). That is, stroke volume will increase as lean tissue mass increases during long-term resistance training. Lastly, resistance training may either not change or slightly decrease total cholesterol and low-density lipoproteins and increase high-density lipoproteins ([90](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref90>)). Therefore, heavy resistance training does little to enhance resting cardiac function, but greater improvements may result from adaptations to a high-volume program with short rest periods (i.e., bodybuilding, circuit training) in which the overall continuity of the exercise stress in a workout is much higher.\n\nChronic resistance training also alters cardiac dimensions. Increased left ventricular wall thickness and mass have been reported, but the increase disappears when expressed relative to body surface area or lean body mass ([52](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref52>), [53](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref53>)). It is thought that this increase may result from exposure to intermittently elevated blood pressures and increases in intrathoracic pressure in addition to accommodating changes from increases in lean body mass and body size. Highly resistance-trained athletes have greater than normal absolute posterior left ventricular and intraventricular septum wall thickness ([55](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref55>)). Little or no change in left ventricular chamber size or volume is observed with resistance training; this is a major difference between resistance exercise and aerobic exercise. Greater than normal absolute left and right ventricular end-diastolic and end-systolic volumes have been reported in bodybuilders but not weightlifters ([55](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref55>)), which indicates that high-volume training may be more conducive to increasing absolute left ventricular volumes. It is important to note that bodybuilders frequently incorporate aerobic exercise into their training programs in an effort to metabolize body fat and promote a lean body composition; therefore, it is possible that some of these adaptations have been brought about, in part, by aerobic endurance training. Bodybuilders as well as weightlifters have greater than normal absolute and relative (to lean body mass and body surface) left atrial internal dimensions, with the bodybuilders showing a significantly greater dimension ([37](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref37>)).\n\n### Chronic Adaptations of the Acute Cardiovascular Response to Anaerobic Exercise\n\nChronic resistance training reduces the cardiovascular response to an acute bout of resistance exercise of a given absolute intensity or workload. Short-term studies have shown that resistance training results in adaptations that blunt the acute increases in heart rate, blood pressure, and double product caused by the resistance training workout ([139](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref139>), [169](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref169>)). In addition, male bodybuilders have been found to have lower systolic and diastolic blood pressure and heart rates during sets of 50% to 100% of 1RM performed to momentary muscular failure compared to both sedentary and lesser-trained men ([54](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref54>)). Interestingly, bodybuilders’ peak cardiac output and stroke volume are significantly greater than those of powerlifters ([49](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref49>)), demonstrating that stroke volume and cardiac output may be greater per absolute workload as a result of training. It is thought that these adaptations result from a decreased afterload on the left ventricle, which in turn increases cardiac output and decreases myocardial oxygen consumption ([49](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref49>)). Lastly, oxygen extraction is generally not improved with resistance training using heavy loads and low volume. It is enhanced to a greater extent with continuous aerobic exercise or perhaps slightly with a resistance training program using high volume and short rest periods ([116](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref116>)).\n\n### Ventilatory Response to Anaerobic Exercise\n\nVentilation rate generally does not limit resistance exercise and is either unaffected or only moderately improved by anaerobic training. With resistance exercise, ventilation is significantly elevated during each set, but the elevation is even greater during the first minute of recovery ([160](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref160>)). Ventilations in excess of 60 L/min have been reported ([160](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref160>)), and the rest interval length had a large effect such that short rest intervals (30 seconds to 1 minute) produced the most substantial elevation. Training adaptations include increased tidal volume and breathing frequency with maximal exercise. With submaximal activity, however, breathing frequency is often reduced while tidal volume is increased. It appears that such ventilatory adaptations result from local, neural, or chemical adaptations in the specific muscles trained through exercise ([14](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref14>)). Additionally, improved ventilation efficiency, as characterized by reduced ventilatory equivalent for oxygen (the ratio of air ventilated to oxygen used by the tissues, V̇E/V̇O2), is observed in trained versus untrained individuals ([14](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref14>))."

  - id: "ch05-compatibility-of-aerobic-and-anaerobic-m"
    title: "Compatibility of Aerobic and Anaerobic Modes of Training"
    level: 2
    tags: [compatibility, aerobic, anaerobic, modes, training]
    key_points:
      - "Strength/power training and work capacity–endurance training have divergent physiology that presents a programming challenge to the strength and conditioning professional working to optimize concurren"
    recall_prompts:
      - "Compatibility of Aerobic and Anaerobic Modes of Training 的核心概念是什麼？"
    content: "\n\nStrength/power training and work capacity–endurance training have divergent physiology that presents a programming challenge to the strength and conditioning professional working to optimize concurrent gains in both these physical and physiological characteristics. Combining resistance and aerobic endurance training may interfere with strength and power gains, primarily if the aerobic endurance training is high in intensity, volume, or frequency ([44](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref44>), [86](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref86>), [112](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref112>)). Callister and colleagues ([24](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref24>)) showed that simultaneous sprint and aerobic endurance training decreased sprint speed and jump power. Possible explanations for this less-than-optimal power development include adverse neural changes and the alterations of muscle proteins in muscle fibers. In contrast, most studies have shown no adverse effects on aerobic power resulting from heavy resistance exercise despite the expected cellular changes caused by this type of exercise ([112](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref112>)). Few studies have shown that resistance training can hinder V̇O2max improvements ([65](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref65>)). Interestingly, Kraemer and colleagues ([120](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref120>)) reported that women who performed both resistance exercise and aerobic endurance training had greater aerobic development than those who performed the aerobic endurance training alone. Such data have encouraged some athletes (e.g., distance runners) to add supplemental sport-specific resistance training to their total training regimen. Indeed, the majority of research indicates that heavy resistance training has very limited, if any, negative effects on aerobic power ([197](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref197>)) but instead can serve to actually enhance performance in endurance sports ([172](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref172>)).\n\nIn a study examining the potential incompatibility of strength and endurance exercise, Kraemer and colleagues ([112](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref112>)) used three months of simultaneous high-intensity strength and aerobic endurance training under five conditions:\n\n  1. A combination group (C) that performed both resistance and aerobic endurance training\n  2. A group (UC) that performed upper body resistance and aerobic endurance training\n  3. A resistance training–only group (S)\n  4. An aerobic endurance training–only group (E)\n  5. A control group\n\nThe S group increased 1RM strength and rate of strength development more than did the C group. In addition, maximal oxygen consumption improvements were not affected by the simultaneous training (i.e., almost identical improvements in 2-mile [3.2 km] run times). Thus, no overtraining state for aerobic endurance was apparent.\n\nA fascinating finding of the research by Kraemer and colleagues ([112](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref112>)) was change in the muscle fiber size of the thigh musculature. Previous studies have shown decreases in muscle fiber size during aerobic endurance training ([15](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref15>), [65](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref65>)). Kraemer’s group ([112](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref112>)), however, indicated that the transformation of Type IIx to Type IIa fibers was almost complete in the S group (19.1±7.9% Type IIx pretraining to 1.9±0.8% posttraining) and C group (14.11±7.2% pre to 1.6±0.8% post). Interestingly, the UC and E groups (who performed only interval training) also had significant Type IIx fiber transformation after training (22.6±4.9% pre to 11.6±5.3% post for UC, and 19.2±3.6% pre to 8.8±4.4% post for E). This indicates that heavy resistance training recruits more of the Type IIx fibers than high-intensity aerobic endurance interval training. In addition, a small number (<3%) of Type IIa fibers were converted to Type IIc fibers in the aerobic training group. The combined group increased muscle size only in Type IIa fibers, while the S group demonstrated increases in Type I, IIc, and IIa fibers. The lack of change in Type I fiber area and increase in Type IIa fiber area in the C group appear to represent a cellular adaptation that shows the antagonism of simultaneous strength and aerobic endurance stimuli, since strength training alone produced increases in both Type I and II muscle fiber areas. The E group showed decreased size in Type I and IIc fibers, presumably due to higher observed cortisol levels (and reduced testosterone) and their physiological need for shorter distances between capillary and cell to enhance oxygen kinetics.\n\nThe majority of studies use untrained subjects to examine the effects of simultaneous high-intensity resistance training and aerobic endurance training ([65](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref65>), [74](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref74>), [127](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref127>), [138](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref138>)). Few studies have looked at concurrent training in elite athlete populations ([172](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref172>)). Several studies have shown an incompatibility using three days a week of resistance training alternating with three days a week of aerobic endurance training (i.e., training on six consecutive days), or four to six days a week of combined high-intensity resistance and aerobic endurance training ([16](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref16>), [44](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref44>), [112](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref112>)), thereby lending credibility to the suggestion that the onset of overtraining mechanisms could have played a role. When both modalities are performed during the same workout (yielding a frequency of three days a week with at least one day off between workouts), the incompatibility has not been shown as frequently ([127](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref127>), [137](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref137>), [138](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref138>)). An exception was a study by Sale and colleagues ([168](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref168>)), who showed that training four days (two days of resistance training and two days of aerobic endurance training) per week was better than training two days (combined resistance training and aerobic endurance training) per week for increasing leg press 1RM (25% vs. 13%). These studies show that increasing the recovery period between workouts may decrease the incompatibility, a principle supported by a recent meta-analysis of concurrent training by Wilson and colleagues ([197](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref197>)).\n\nPower development appears to be negatively affected more than strength during concurrent high-intensity resistance and aerobic endurance training. Häkkinen and colleagues ([74](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref74>)) reported similar dynamic and isometric strength increases following 21 weeks of concurrent training or resistance training only; however, the resistance training–only group showed improvements in the rate of force development whereas the concurrent training group did not match this increase. Kraemer and colleagues ([112](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref112>)) also showed that a resistance training–only group increased muscle power whereas a combined group did not. The resistance training–only group also increased peak power in upper and lower body tests while the combined group did not. It appears that power development is much more susceptible to the antagonistic effects of combined strength and aerobic endurance training than is slow-velocity strength ([112](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref112>)). Lastly, the sequence may play a role in the magnitude of adaptation. Leveritt and Abernethy ([126](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref126>)) examined lifting performance 30 minutes following a 25-minute aerobic exercise workout and found that the number of repetitions performed during the squat was reduced by 13% to 36% over three sets.\n\n### What Performance Improvements Occur Following Anaerobic Exercise?\n\nMuscular Strength\n\n  * A review of more than 100 studies has shown that mean strength can increase approximately 40% in “untrained,” 20% in “moderately trained,” 16% in “trained,” 10% in “advanced,” and 2% in “elite” participants over periods ranging from four weeks to two years ([103](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref103>)).\n  * With training, a positive shift in muscle fiber types reflects an augmented recruitment of higher-order motor units. Type IIx fibers transition to Type IIa fibers and reflect a greater fatigue resistance at similar absolute force output.\n\nPower\n\n  * The optimal load for maximizing absolute peak power output in the jump squat is 0% of 1RM (i.e., body weight [31]). However, it has been reported that peak power output is maximized in trained power athletes with higher loads corresponding to 30% to 60% of squat 1RM ([12](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref12>)).\n  * Peak power in the squat is maximized at 56% of 1RM and in the power clean at 80% of 1RM ([31](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref31>)).\n  * For the upper body, peak power output can be maximized during the ballistic bench press throw using loads corresponding to 46% to 62% of 1RM bench press ([11](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref11>)).\n\nLocal Muscular Endurance\n\n  * Cross-sectional data in anaerobic athletes have shown enhanced muscular endurance and subsequent muscular adaptations consistent with improved oxidative and buffering capacity ([100](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref100>)).\n  * Skeletal muscle adaptations to anaerobic muscular endurance training include fiber type transitions from Type IIx to Type IIb, as well as increases in mitochondrial and capillary numbers, buffering capacity, resistance to fatigue, and metabolic enzyme activity ([64](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref64>), [116](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref116>)).\n\nBody Composition\n\n  * Resistance training can increase fat-free mass and reduce body fat by up to 9% ([116](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref116>)).\n  * Increases in lean tissue mass, daily metabolic rate, and energy expenditure during exercise are outcomes of resistance training ([53](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref53>)).\n\nFlexibility\n\n  * Anaerobic training potentially can have a positive impact on flexibility, and a combination of resistance training and stretching appears to be the most effective method to improve flexibility with increasing muscle mass ([116](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref116>)).\n\nAerobic Capacity\n\n  * In untrained people, heavy resistance training can increase V̇O2max from 5% to 8%. In trained individuals, resistance training does not significantly affect aerobic capacity ([52](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref52>)).\n  * Circuit training and programs using high volume and short rest periods (i.e., 30 seconds or less) have been shown to improve V̇O2max ([64](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref64>)).\n\nMotor Performance\n\n  * Resistance training has been shown to increase running economy, vertical jump, sprint speed, tennis serve velocity, swinging and throwing velocity, and kicking performance ([116](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref116>))."

  - id: "ch05-what-are-the-markers-of-anaerobic-overtr"
    title: "Overtraining / What Are the Markers of Anaerobic Overtraining?"
    level: 3
    tags: [overtraining, what, markers, anaerobic, overtraining]
    key_points:
      - "Although the knowledge of central pathological mechanisms of OTS has increased significantly, there remains a strong demand for relevant tools for the early identification of OTS."
    recall_prompts:
      - "What Are the Markers of Anaerobic Overtraining? 是什麼？有哪些類型或應用？"
    content: "\n\nAlthough the knowledge of central pathological mechanisms of OTS has increased significantly, there remains a strong demand for relevant tools for the early identification of OTS. Until a definitive evaluative tool is developed, coaches and athletes need to use performance decrements as verification that overtraining is evident. The following criteria may be considered:\n\n  1. Is the athlete experiencing any of the following symptoms? \n     1. Unexplained underperformance\n     2. Persistent fatigue\n     3. Increased sense of effort during training\n     4. Disordered sleep patterns\n     5. Loss of appetite\n  2. Are the athlete’s scores in maximal exercise tests, sport-specific performance tests, or vital signs assessments (heart rate, blood pressure) poorer than on previous tests or what would be considered normal or baseline?\n  3. Are there errors in the design of the athlete’s training program? \n     1. Training volume increased significantly (<5%)\n     2. Training intensity increased significantly\n     3. Training monotony present\n     4. High number or frequency of competitions\n  4. Are there other confounding factors? \n     1. Psychological signs and symptoms (disturbed Profile of Mood States [POMS], higher than normal rating of perceived exertion [RPE])\n     2. Social factors (family, relationships, finances, work, coach, team)\n     3. Recent or multiple time zone travel\n  5. Does the athlete have any common exclusion criteria? \n     1. Confounding illnesses\n     2. Anemia\n     3. Infectious diseases\n     4. Muscle damage (high creatine kinase levels)\n     5. Endocrine disorders (diabetes, catecholamines, adrenal, thyroid)\n     6. Major eating disorders\n     7. Biological abnormalities (C-reactive protein, creatinine, decreased ferritin)\n     8. Musculoskeletal injury\n     9. Cardiologic symptoms\n     10. Adult-onset asthma\n     11. Allergies\n\nIt should be noted that no single marker can be taken as an indicator of impending OTS. A plethora of research ([140](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref140>), [185](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref185>), [194](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref194>)) suggests that OTS is multifactorial in its nature and that regular monitoring of a combination of performance, physiological, biochemical, immunological, and psychological variables should be considered."

  - id: "ch05-mistakes-that-can-lead-to-anaerobic-over"
    title: "Overtraining / Mistakes That Can Lead to Anaerobic Overtraining"
    level: 3
    tags: [overtraining, mistakes, that, lead, anaerobic, overtraining]
    key_points:
      - "The overtraining state is associated with damage to or negative physiological alterations in the neuromuscular system."
    recall_prompts:
      - "Mistakes That Can Lead to Anaerobic Overtraining 是什麼？有哪些類型或應用？"
    content: "\n\nThe overtraining state is associated with damage to or negative physiological alterations in the neuromuscular system. As with any form of training, the structure of an anaerobic training program ultimately dictates the nature of the physical and physiological adaptations that take place in response to the training stimulus. A mistake in the prescription of any acute program variable could theoretically contribute to OTS if it is consistently repeated over time. This can often occur when highly motivated athletes use a high volume of heavy training loads with high training frequency and take limited rest to recover between workouts. Training volume has been shown to be important for augmenting continued gains in performance. Conversely, however, an excessively high volume of exercise can create a stimulus that exceeds the athlete’s ability to recover from the stress and may result in excessive soreness and residual fatigue. Training periodization should therefore consist of careful planning to avoid overtraining."

  - id: "ch05-hormonal-markers-of-anaerobic-overtraini"
    title: "Overtraining / Hormonal Markers of Anaerobic Overtraining"
    level: 3
    tags: [overtraining, hormonal, markers, anaerobic, overtraining]
    key_points:
      - "Regular monitoring of performance standards is central in any attempt to avoid the onset of NFOT or OTS, but some researchers have used biological markers to try to characterize anaerobic overtraining"
    recall_prompts:
      - "Hormonal Markers of Anaerobic Overtraining 是什麼？有哪些類型或應用？"
    content: "\n\nRegular monitoring of performance standards is central in any attempt to avoid the onset of NFOT or OTS, but some researchers have used biological markers to try to characterize anaerobic overtraining. Indeed, it has long been hypothesized that endocrine factors mediate the central dysfunction that occurs during the pathogenesis of OTS ([140](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref140>)).\n\nThe resting plasma testosterone/cortisol ratio has long been considered an indicator of an overtraining state. This ratio decreases in relation to the intensity and duration of exercise; however, it is now evident that it indicates only the actual physiological strain of training and cannot be used for diagnostic purposes ([43](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref43>)). A blunted rise in pituitary hormones (adrenocorticotropic hormone [ACTH], growth hormone, luteinizing hormone, follicle-stimulating hormone [FSH]) in response to a stressful stimulus has been reported ([194](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref194>)). However, despite this seemingly uniform acute hormonal response following exercise, explaining the disturbance in the neuroendocrine system caused by OTS is not simple. Indeed, whether peripheral metabolic hormones can be used as accurate markers of OTS remains a topic of ongoing discussion. In efforts to predict overtraining responses from FOR, decreased resting concentrations of testosterone and IGF-I have been observed ([159](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref159>)); but in response to resistance exercise, augmented acute testosterone responses are found in trained individuals with previous exposure to overreaching ([61](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref61>)). _Volume-related overtraining_ has been shown to increase cortisol and to decrease resting luteinizing hormone and total and free testosterone concentrations ([58](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref58>)). In addition, the exercise-induced elevation in total testosterone can potentially be blunted ([79](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref79>)).\n\n_Intensity-related overtraining_ does not appear to alter resting concentrations of hormones ([58](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref58>)). Fry and colleagues ([60](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref60>)) reported no changes in circulating testosterone, free testosterone, cortisol, and growth hormone concentrations during high-intensity anaerobic overtraining (e.g., 10 1RM sets of the squat exercise each day for two weeks). Interestingly, Meeusen and colleagues ([141](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref141>)) have reported that the _training status_ of an athlete has an impact on hypothalamic–pituitary reactivity, with differing neuroendocrine responses exhibited in response to NFOR. Initially, highly trained athletes are likely to experience a large, hypersensitive sympathetic hormone response, following which a suppression of circulating hormone concentrations will occur that reflects a downregulation of pituitary sensitivity and long-term pituitary exhaustion ([141](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref141>)). Collectively, endocrine responses appear to require longer than one week of monitoring in order to serve as adequate markers. What remains clear, however, is that the most effective biological markers are perhaps those that allow for early detection of NFOR, and it is this early recognition that will support the prevention of OTS."

  - id: "ch05-psychological-factors-in-overtraining"
    title: "Overtraining / Psychological Factors in Overtraining"
    level: 3
    tags: [overtraining, psychological, factors, overtraining]
    key_points:
      - "Mood disturbances and psychological symptoms, as determined from the Profile of Mood States (POMS), have been associated with OTS in athletes for many years."
    recall_prompts:
      - "Psychological Factors in Overtraining 是什麼？有哪些類型或應用？"
    content: "\n\nMood disturbances and psychological symptoms, as determined from the Profile of Mood States (POMS), have been associated with OTS in athletes for many years. Heavy resistance training is accompanied by decreased vigor, motivation, and confidence; raised levels of tension, depression, anger, fatigue, confusion, anxiety, and irritability; and impaired concentration ([110](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref110>)). Altered psychological characteristics are also related to changing endocrine profiles ([141](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref141>)). Many athletes sense overtraining by the associated psychological alterations that are often observed before actual decrements in performance occur. Monitoring the mood and mental state of an athlete is very important to gain insights into overtraining ([111](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref111>), [140](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref140>))."

  - id: "ch05-detraining"
    title: "Detraining"
    level: 2
    tags: [detraining]
    key_points:
      - "Detraining is the term given to a decrement in performance and loss of the accumulated physiological adaptations following the cessation of anaerobic training or when there is a substantial reduction "
    recall_prompts:
      - "Detraining 的核心概念是什麼？"
    content: "\n\nDetraining is the term given to a decrement in performance and loss of the accumulated physiological adaptations following the cessation of anaerobic training or when there is a substantial reduction in frequency, volume, intensity, or any combination of these variables. According to the principles of _reversibility,_ training-induced adaptations are transient and thus can disappear when the training load is insufficient or removed completely. The result is a partial or complete loss of the anatomical, physiological, and performance adaptations that have been made. The magnitude of these losses is dependent on the length of the detraining period as well as the initial training status of the individual.\n\nFollowing the removal of a training stimulus is a lag time before the effects of detraining are fully observed. Strength performance in general is readily maintained for up to four weeks of inactivity; but in highly trained athletes, eccentric force and sport-specific power may decline significantly faster ([146](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref146>)). In trained weightlifters, removing the training stimulus for 14 days did not significantly affect 1RM strength performance in the bench press (−1.7%) and squat (−0.9%), isometric (−7%) and isokinetic concentric knee extension force (−2.3%), or vertical jump performance (1.2%) ([88](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref88>)). In recreationally trained men, very little change is seen during the first six weeks of detraining ([108](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref108>)). Longer periods of training cessation are accompanied by significantly pronounced declines in the strength performance of strength-trained athletes ([146](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref146>)), but this loss is still limited to 7% to 12% during periods of inactivity ranging from 8 to 12 weeks. This strength loss is coupled with decreased average maximal bilateral and unilateral intramuscular EMG. Indeed, strength reductions appear related to neural mechanisms initially, with atrophy predominating as the detraining period extends. Interestingly, the amount of muscle strength retained is rarely lower than pretraining values, indicating that resistance training has a residual effect when the stimulus is removed. However, when the athlete returns to training, the rate of strength reattainment is high, supporting the paradigm of “muscle memory.”\n\nWith respect to muscle fiber characteristics following the cessation of training, it appears that fiber disruption remains unchanged during the initial weeks of inactivity, but oxidative fibers may increase in strength-trained athletes (decrease in endurance athletes) within eight weeks of stopping training ([146](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref146>)). In strength-trained athletes, 14 days of inactivity has been reported to have no effect on muscle fiber type distribution ([88](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref88>)). In comparison, muscle fiber cross-sectional area declines rapidly in strength and sprint athletes ([146](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref146>)). In 12 trained weightlifters, Hortobagyi and colleagues ([88](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref88>)) observed a decline of 6.4% in fast-twitch fiber cross-sectional area in 14 days. These changes specifically targeted fast-twitch fibers initially, with no significant change immediately found in the slow-twitch fiber population. Longer periods of stoppage bring about declines in both fast- and slow-twitch fiber cross-sectional area and muscle mass in anaerobically trained athletes. In professional rugby league players, cross-sectional area of fast-twitch fibers decreased more than that of slow-twitch fibers, with the former being 23% larger at the end of a competitive season but only 9% larger after six weeks without training ([8](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref8>)). After seven months with no training, an average of 37.1% atrophy was observed in all fiber types of a powerlifter ([182](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref182>)); in elite body builders after 13.5 months without training, fat-free mass, thigh and arm girth, and average fiber area decreased by 9.3%, 0.5%, 11.5%, and 8.3%, respectively ([72](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref72>))."

  - id: "ch05-conclusion"
    title: "Conclusion"
    level: 2
    tags: [conclusion]
    key_points:
      - "Anaerobic exercise represents a specific type of training stress to the anatomy and various systems of the body, and adaptations consequent to anaerobic training are specific to the nature of the exer"
    recall_prompts:
      - "Conclusion 的核心概念是什麼？"
    content: "\n\nAnaerobic exercise represents a specific type of training stress to the anatomy and various systems of the body, and adaptations consequent to anaerobic training are specific to the nature of the exercise performed. It is also apparent that an individual’s age, nutrition, prior fitness level, and training motivation can affect adaptations. Integration of a training program that has many components requires careful planning and monitoring in order to minimize the occurrence of incompatibilities or overtraining. Explosive training evokes marked increases in muscular power, whereas more conventional heavy resistance training mainly increases muscle size and strength. Anaerobic training (resistance, sprint, plyometric, agility, high-intensity interval training) in general elicits specific adaptations in the nervous system leading to greater recruitment, rate of firing, synchronization, and enhanced muscle function that enable increases in strength and power.\n\nAnaerobic training also has positive effects on bone, muscle, and the associated connective tissue; the entire musculoskeletal system undergoes a coordinated adaptation to exercise. Athletes undertaking strenuous exercise training experience changes in the force-generating capabilities of muscle, resulting in a coordinated and proportional increase in the load-bearing capacity of bone and other connective tissue. Anaerobic training can increase skeletal muscle mass, force-generating capability, and metabolic capacity and may lead to subtle alterations of the endocrine system that enhance the tissue remodeling process.\n\nAnaerobic training generally results in fewer acute and chronic responses in the cardiovascular and respiratory systems, although low-intensity, high-volume resistance exercise produces some responses that are similar to those with aerobic exercise. Collectively, improved neuromuscular, musculoskeletal, endocrine, and cardiovascular function contribute to enhanced muscle strength, power, hypertrophy, muscular endurance, and motor performance—all of which contribute to increased athletic performance. The adaptations observed in athletes are directly related to the quality of the exercise stimulus and accordingly to the levels of progressive overload, specificity, and variation incorporated into program design. The scientific basis of program design is ultimately seen in the effectiveness with which the athlete improves performance.\n\n### Key Terms\n\n  * actin\n  * anaerobic alactic system\n  * anaerobic lactic system\n  * anaerobic training\n  * bilateral deficit\n  * bilateral facilitation\n  * bone matrix\n  * bone mineral density (BMD)\n  * collagen\n  * cortical bone\n  * cross-education\n  * cross-linking\n  * detraining\n  * elastin\n  * electromyography (EMG)\n  * fibrous cartilage\n  * functional overreaching (FOR)\n  * hyaline cartilage\n  * hydroxyapatite\n  * hyperplasia\n  * hypertrophy\n  * mechanical loading\n  * microfibril\n  * minimal essential strain (MES)\n  * motor unit\n  * myogenesis\n  * myosin\n  * myotatic reflex\n  * nebulin\n  * neuromuscular junction (NMJ)\n  * nonfunctional overreaching (NFOR)\n  * osteoblasts\n  * osteogenic stimuli\n  * osteoporosis\n  * overreaching\n  * overtraining\n  * overtraining syndrome (OTS)\n  * parasympathetic overtraining syndrome\n  * peak bone mass\n  * pennation angle\n  * periosteum\n  * procollagen\n  * progressive overload\n  * rate–pressure product\n  * reactive hyperemia\n  * selective recruitment\n  * size principle\n  * specificity of loading\n  * stress fractures\n  * structural exercises\n  * sympathetic overtraining syndrome\n  * tendon stiffness\n  * titin\n  * trabecular bone\n  * ventilatory equivalent\n\n### Study Questions\n\n  1. Following resistance training, augmented neural drive to the working musculature is the result of \n     1. I. increased agonist muscle recruitment\n     2. II. muscle hypertrophy\n     3. III. improved firing rate\n     4. IV. greater synchronization\n     1. all of the above\n     2. I and IV only\n     3. I, II, and III only\n     4. I, II, and IV only\n  2. When one is performing a box-to-box plyometric drop jump, in order to generate sufficient force in a limited amount of time (<200 ms), which muscle fibers are bypassed through the principle of selective recruitment? \n     1. I\n     2. IIa\n     3. IIx\n     4. IIc\n  3. Which of the following performance or physiological characteristics is NOT usually observed in a state of nonfunctional overreaching (NFOR) within athlete populations? \n     1. stagnation and a decrease in performance\n     2. hormonal disturbances\n     3. mood disturbances and depression\n     4. increased levels of fatigue\n  4. Following prolonged periods of detraining in elite strength/power athletes, which of the following physical characteristics will likely show the largest reduction as a consequence of the removal of an anaerobic training stimulus?\n\n     1. total fat mass\n     2. fast-twitch fiber cross-sectional area\n     3. slow-twitch fiber cross-sectional area\n     4. total Type I muscle fiber content\n  5. Following a period of chronic high-intensity resistance training, a variety of physiological adaptations take place in a number of systems within the body that promote improved athletic performance in strength/power activities. If an elite athlete were to undergo 12 weeks of heavy strength training, which of the following adaptations would NOT be expected consequent to this type of anaerobic exercise? \n     1. a transition from Type IIx to Type IIa muscle fiber\n     2. increased pennation angle in certain muscle groups\n     3. reduced sarcoplasmic reticulum and T-tubule density\n     4. elevated sodium–potassium ATPase activity\n  6. In which of the following athletes might you expect limited bone mineral density (BMD) levels as a consequence of the force vectors and the physical demands associated with the given sport? \n     1. a 16-year-old gymnast with a seven-year training history in her sport\n     2. a 23-year-old offensive lineman who has lifted weights for eight years\n     3. a 33-year-old track cyclist who has a 1RM squat of 352 pounds\n     4. a 19-year-old 800 m freestyle swimmer with one year of dryland training"
