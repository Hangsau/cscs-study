sections:
  - id: "ch05-central-adaptations"
    title: "Neural Adaptations / Central Adaptations"
    level: 3
    tags: [neural, adaptations, central, adaptations]
    key_points:
      - "Increased motor unit activation begins in the higher brain centers, where the intent to produce maximal levels of muscular force and power causes motor cortex activity to increase ([41](<E6372RM_Refs_"
    recall_prompts:
      - "Central Adaptations 是什麼？有哪些類型或應用？"
    content: "\n\nIncreased motor unit activation begins in the higher brain centers, where the intent to produce maximal levels of muscular force and power causes motor cortex activity to increase ([41](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref41>)). As the level of force developed rises, or when a new exercise or movement is being learned, primary motor cortex activity is elevated in an effort to support the enhanced need for neuromuscular function. Adaptations to anaerobic training methods are then reflected by substantial neural changes in the spinal cord, particularly along the descending corticospinal tracts ([3](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref3>)). Indeed, after use of anaerobic training methods, the recruitment of fast-twitch motor units has been shown to be elevated as a means to support heightened levels of force expression ([151](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref151>)). This is in comparison to what is seen in untrained individuals ([4](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref4>)), in whom the ability to maximally recruit motor units is limited, especially fast-twitch motor units. In untrained individuals or in those rehabilitating from injury, electrical stimulation has been shown to be more effective than voluntary activations in eliciting beneficial gains. This response further indicates the potential inability of these populations to successfully activate all available muscle fibers. Indeed, research has shown that only 71% of muscle tissue is activated during maximal efforts in untrained populations ([7](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref7>))."

  - id: "ch05-adaptations-of-motor-units"
    title: "Neural Adaptations / Adaptations of Motor Units"
    level: 3
    tags: [neural, adaptations, adaptations, motor, units]
    key_points:
      - "The functional unit of the neuromuscular system is the motor unit."
    recall_prompts:
      - "Adaptations of Motor Units 是什麼？有哪些類型或應用？"
    content: "\n\nThe functional unit of the neuromuscular system is the motor unit. Consisting of the alpha motor neuron and the muscle fibers that it activates, a motor unit may innervate <10 muscle fibers for small, intricate muscles or >100 fibers for large, powerful trunk and limb muscles. When expression of maximal force is desired, all the available motor units must be activated within a muscle. Change in the firing rate or frequency of the motor unit also affects the ability to generate force. Increased force with greater firing rates reflects the summation of successive muscle contractions, whereby action potentials temporarily overlap. With increased motor unit firing rates, the muscle fibers are continually activated by subsequent action potentials before they have time to completely relax following a prior action potential. The summation of overlapping action potentials is expressed as augmented contractile strength ([1](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref1>)). These firing rates represent an adaptive mechanism shown to improve following heavy resistance training ([166](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref166>)). Gains in maximal strength and power of agonist muscles are generally associated with (a) an increase in recruitment; (b) an increased rate of firing; (c) greater synchronization of neural discharge, which acts to coordinate the activity of multiple muscles in synergy ([173](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref173>)); or (d) a combination of all these factors.\n\nThe recruitment or decruitment of motor units in an orderly manner is governed by the size principle ([figure 5.2](<E6372ch05_d82.xhtml#f5.2>)), which represents the relationship between motor unit twitch force and recruitment threshold ([166](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref166>), [167](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref167>)). According to this principle, motor units are recruited in an ascending order according to their recruitment thresholds and firing rates. This represents a continuum of voluntary force in the agonist muscle. Because most muscles contain a range of Type I and Type II muscle fibers, force production can range from very low to maximal levels. Those motor units high in the recruitment order are used primarily for high force, speed, or power production. As the demands of force expression increase, motor units are recruited in a sequential fashion from low- to high-threshold motor units. Thus, with heavy resistance training, all muscle fibers get larger ([77](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref77>), [183](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref183>), [184](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref184>)) because for the most part they are all recruited to some extent in order to produce the higher levels of force required to lift progressively heavier loads. Maximal force production not only requires the recruitment of a maximum percentage of available motor units, including the high-threshold motor units, but also relies on the recruitment occurring at very high firing frequencies, which promotes the summation of activated motor units and as a consequence augments the magnitude of contractile activity. Once a motor unit is recruited, less activation is needed in order for it to be rerecruited ([69](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref69>)). This phenomenon may have important ramifications for strength and power training, as the high-threshold motor units may be more readily reactivated subsequent to prior recruitment.\n\n**Figure 5.2** Graphic representation of the size principle, according to which motor units that contain Type I (slow-twitch) and Type II (fast-twitch) fibers are organized based on some “size” factor. Low-threshold motor units are recruited first and have lower force capabilities than higher-threshold motor units. Typically, to get to the high-threshold motor units, the body must first recruit the lower-threshold motor units. Exceptions exist, especially with respect to explosive, ballistic contractions that can selectively recruit high-threshold units to rapidly achieve more force and power.\n\n![A graph of the classification of type 1 and type 2 motor units.](images/E6372_508102_ebook.jpg)\n\n[Follow for extended description](<Ext_desc_E6372_508102_ebook.xhtml#l_E6372_508102_ebook>)\n\nExceptions to the size principle do exist. Under certain circumstances, an athlete is able to inhibit the lower-threshold motor units and in their place activate higher-threshold motor units ([148](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref148>), [189](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref189>)). This selective recruitment is critical when force production is required at very high speeds for the expression of muscular power. Indeed, both rapid changes in the direction of force production and ballistic muscular contractions—as found in the movement patterns of Olympic weightlifting, plyometrics, speed, power, and agility training—have been shown to lead to preferential recruitment of fast-twitch motor units ([148](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref148>), [189](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref189>)). This variation in recruitment order benefits high-velocity training modalities in which rate of force production is vital to success. For example, it would be very difficult for athletes to generate enough angular velocity and power to attain maximal height for the vertical jump if they had to recruit the entire slow-twitch motor unit pool before activation of the fast-twitch units. As the time between the countermovement and the subsequent jump takeoff is often less than 0.4 seconds, there simply is insufficient time to recruit all of the motor units in order and still perform an explosive jump ([4](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref4>), [113](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref113>)). Instead, selective recruitment appears to be a beneficial intrinsic neural mechanism favoring explosive exercise. In addition, using specific training methods may enhance selective recruitment, which in turn may improve sport performance ([149](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref149>)).\n\nWith heavy resistance training, all muscle fibers get larger (i.e., hypertrophy) because motor units are recruited in a sequential order by their size to produce high levels of force. In advanced lifters, the central nervous system may adapt by allowing well-trained athletes to recruit some motor units in a nonconsecutive order, by recruiting larger ones first to promote greater production of power or speed in a movement.\n\nAnother critical element of adaptation in neural recruitment is the level of tissue activation that results from chronic resistance training for muscular hypertrophy. Research has shown that as muscle size increases it does not require as much neural activation to lift a given load. Ploutz and colleagues ([157](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref157>)) reported that fewer quadriceps muscle fibers were activated when subjects lifted a set load following nine weeks of resistance training that resulted in a 5% increase in muscle size. Such results demonstrate the importance of progressive overloading during resistance training and how it promotes the continual recruitment of an optimal amount of muscle tissue.\n\nOther motor unit adaptations include changes in the rate and sequence of firing. A positive relationship exists between the magnitude of force produced and the rate of motor unit firing; high firing rates from the onset of ballistic muscle contraction are especially critical to increased rates of force development ([1](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref1>)). The increase in firing rate (vs. recruitment) appears to be dependent on muscle size, such that smaller muscles rely more on an increased firing rate to enhance force production whereas larger muscles depend more on recruitment ([48](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref48>), [63](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref63>)). Evidence suggests that anaerobic training can play a role in enhancing firing rates of recruited motor units ([4](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref4>)). For example, resistance training may result in a more synchronized pattern (i.e., the firing of two or more motor units at a fixed interval) of activation during the exertion of large forces, rather than the customary asynchronous pattern usually common to motor function ([50](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref50>), [174](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref174>)). Although the specific role of motor unit synchronization during anaerobic training remains to be fully elucidated, synchronization is potentially more critical to the _timing_ of force production and less significant with regard to the overall level of force developed."

  - id: "ch05-neuromuscular-junction"
    title: "Neural Adaptations / Neuromuscular Junction"
    level: 3
    tags: [neural, adaptations, neuromuscular, junction]
    key_points:
      - "The neuromuscular junction (NMJ) is the interface between the nerve and the skeletal muscle fibers, and it represents another potential site for neural adaptation following anaerobic training ([38](<E"
    recall_prompts:
      - "Neuromuscular Junction 是什麼？有哪些類型或應用？"
    content: "\n\nThe neuromuscular junction (NMJ) is the interface between the nerve and the skeletal muscle fibers, and it represents another potential site for neural adaptation following anaerobic training ([38](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref38>), [39](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref39>)). Because of the difficulty in investigating this structure, most studies examining the NMJ have used animal models to demonstrate its adaptation to exercise. Deschenes and colleagues ([40](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref40>)) examined the impact of high-intensity versus low-intensity treadmill exercise training on NMJ in the soleus muscle of rats. Following both high- and low-intensity running, the NMJ was found to increase in its total area. High-intensity training, however, resulted in more dispersed, irregular-shaped synapses and a greater total length of nerve terminal branching compared to low-intensity training. In another study, greater end-plate perimeter length and area, as well as greater dispersion of acetylcholine receptors within the end-plate region, were also found after seven weeks of resistance training ([39](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref39>)). These adaptations suggest that anaerobic training appears to induce beneficial morphological changes in the NMJ that are conducive to enhanced neural transmission capabilities."

  - id: "ch05-neuromuscular-reflex-potentiation"
    title: "Neural Adaptations / Neuromuscular Reflex Potentiation"
    level: 3
    tags: [neural, adaptations, neuromuscular, reflex, potentiation]
    key_points:
      - "Anaerobic training causes positive changes in the reflex (i."
    recall_prompts:
      - "Neuromuscular Reflex Potentiation 是什麼？有哪些類型或應用？"
    content: "\n\nAnaerobic training causes positive changes in the reflex (i.e., muscle spindle or stretch reflex) response of the neuromuscular system and enhances the magnitude and rate of force development via this reflex. This myotatic reflex harnesses the involuntary elastic properties of the muscle and connective tissue and acts to positively increase force production without any additional energy requirement. Resistance training in particular has been shown to increase reflex potentiation by between 19% and 55% ([5](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref5>)). Furthermore, resistance-trained athletes (weightlifters, bodybuilders) are found to have greater reflex potentiation in the soleus muscle compared to untrained individuals ([170](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref170>))."

  - id: "ch05-anaerobic-training-and-electromyography-"
    title: "Neural Adaptations / Anaerobic Training and Electromyography Studies"
    level: 3
    tags: [neural, adaptations, anaerobic, training, electromyography, studies]
    key_points:
      - "Electromyography (EMG) is a common research tool used to examine the magnitude of neural activation within skeletal muscle."
    recall_prompts:
      - "Anaerobic Training and Electromyography Studies 是什麼？有哪些類型或應用？"
    content: "\n\nElectromyography (EMG) is a common research tool used to examine the magnitude of neural activation within skeletal muscle. Two kinds of EMG are commonly used in research and applied settings: surface EMG and intramuscular (needle or fine wire) EMG. Surface EMG requires placement of adhesive electrodes on the surface of the skin where they are able to monitor a large area of underlying muscle ([152](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref152>)). Surface EMG is often more effective for monitoring superficial muscle, as it is unable to bypass the action potentials of superficial muscles and detect deeper muscle activity. Also, the more body fat an individual has, the weaker the EMG signal is likely to be with use of this methodology. In comparison, with intramuscular EMG, the skin surface is numbed, and a needle electrode, or a needle containing two fine-wire electrodes, is inserted through the skin and positioned into the belly of the muscle itself. Fine-wire electrodes emphasize a specificity of assessment in that they are located in a muscle of interest and accurately record localized motor unit action potentials ([85](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref85>)). Because of its invasiveness, intramuscular EMG is primarily adopted in research settings or under clinical conditions. While it is often difficult to determine the specific underpinning mechanism(s) (i.e., increased recruitment, discharge rate, or synchronization; Golgi tendon organ inhibition) affecting EMG output, an increase in EMG signal indicates greater neuromuscular activity.\n\nAn important consideration when examining the neuromuscular system is the training status of an individual. Neural adaptations (improved motor learning and coordination) predominate in the early phase of training without any concomitant increases in muscle hypertrophy ([73](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref73>), [75](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref75>)-[77](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref77>)). In addition, the onset of hypertrophy is associated with a decline in EMG activity ([145](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref145>)). It appears that as an individual’s training status advances, there exists an interplay between neural and hypertrophic mechanisms that contribute to further gains in strength and power.\n\nSale ([166](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref166>), [167](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref167>)) reported that dramatic increases in neural adaptation take place in the early part of a training program (6 to 10 weeks). As the duration of training increases (>10 weeks), muscle hypertrophy then occurs, and it is these structural changes that contribute to strength and power gains more than neural adaptations. Eventually muscle hypertrophy plateaus as _accommodation_ to the training load occurs. However, at that time, if an athlete incorporates new variation or progressive overload into the training plan, neural adaptations will once again contribute to the performance improvements by acting to tolerate the “new” physical insult from training. This pattern is replicated with every stepwise change in the training demand, and as athletes progress in training, the type of program used may be one of the most important factors to consider ([77](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref77>), [80](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref80>), [161](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref161>)). Neural factors are especially important for strength gains in programs that use very high training intensities (>85% of 1-repetition maximum [1RM]) ([145](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref145>)). Training programs designed to elicit muscular power also provide a potent stimulus to the nervous system and result in higher posttraining EMG activity ([149](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref149>)).\n\nElectromyography studies have also yielded some interesting findings regarding neural adaptations to anaerobic training:\n\n  * Exercising muscle undergoing unilateral resistance training produces increased strength and neural activity in the contralateral resting muscle, a phenomenon known as cross-education ([89](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref89>)). A review of the literature has shown that strength in the untrained limb may increase up to 22%, with an average strength increase of approximately 8% ([147](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref147>)). The increase in strength of the untrained limb is accompanied by greater EMG activity in that limb ([176](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref176>)), thereby suggesting that a central neural adaptation accounts for the majority of strength gains.\n  * In untrained individuals, a bilateral deficit is evident. The force produced when both limbs contract together is lower than the sum of the forces they produce when contracting unilaterally. Research has shown that the corresponding EMG activity is lower during bilateral contractions ([63](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref63>)), suggesting that neural mechanisms are, at least in part, a contributing factor. With longitudinal bilateral training, the magnitude of the bilateral deficit is reduced. In fact, trained or stronger individuals often show a bilateral facilitation effect in which an increase in voluntary activation of the agonist muscle groups occurs ([15](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref15>), [171](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref171>)).\n  * The EMG activity of antagonist muscle groups has been shown to change in response to anaerobic training during agonist movements. In most instances, cocontraction of antagonist muscles serves as a protective mechanism to increase joint stability and reduce the risk of injury ([96](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref96>)). However, when too much antagonist activity opposes agonist movement, it creates a resistance to maximal force production. A number of studies have shown reduced antagonist cocontraction following resistance training, resulting in an increase in net force without an increase in agonist motor unit recruitment ([26](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref26>), [76](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref76>), [151](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref151>)). Elsewhere, sprint and plyometric training have also been shown to alter the timing of cocontractor activation ([96](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref96>)). The specific role of altering antagonist cocontraction patterns remains unclear. Greater antagonist activity may be observed during ballistic movements that require high levels of joint stability, or when people are unfamiliar with a task and require more inherent stability ([48](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref48>))."

  - id: "ch05-muscular-growth"
    title: "Muscular Adaptations / Muscular Growth"
    level: 3
    tags: [muscular, adaptations, muscular, growth]
    key_points:
      - "Muscle hypertrophy is the term given to the enlargement of muscle fiber cross-sectional area (CSA) following training."
    recall_prompts:
      - "Muscular Growth 是什麼？有哪些類型或應用？"
    content: "\n\nMuscle hypertrophy is the term given to the enlargement of muscle fiber cross-sectional area (CSA) following training. A positive relationship exists between hypertrophy and the expression of muscular strength. Biologically, the process of hypertrophy involves an increase in the net accretion (i.e., an increase in synthesis, reduction in degradation, or both) of the contractile proteins actin and myosin within the myofibril, as well as an increase in the number of myofibrils within a muscle fiber. In addition to these contractile proteins, other structural proteins such as titin and nebulin are also synthesized proportionately to the myofilament changes. The new myofilaments are added to the periphery of the myofibril and result in an increase in its diameter. The cumulative effect of these additions is an enlargement of the fiber and, collectively, the size of the muscle or muscle group itself. During exposure to mechanical loading (e.g., resistance training), a series of intracellular processes regulate gene expression and subsequently promote increased protein synthesis ([165](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref165>)).\n\nMechanical deformation of muscle stimulates various proteins independent of hormone concentrations, and these proteins have been shown to increase in activity before evidence of muscle hypertrophy appears. In particular, mechanical tissue deformation activates the protein kinase B (Akt)–mammalian target of rapamycin (mTOR) pathway, the adenosine monophosphate–activated protein kinase (AMPK) pathway, and the mitogen-activated protein kinase (MAPK) pathway. Of these, the Akt/mTOR pathway in particular is important in directly regulating adaptations to resistance training ([179](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref179>)). When muscle fibers contract, Akt/mTOR signaling increases dramatically, and this response is critical for increasing muscle protein synthesis and subsequent growth (a process known as myogenesis). At the same time, the downregulation of inhibitory growth factors (e.g., myostatin) suggests that resistance exercise significantly affects a plethora of growth-signaling and breakdown pathways ([18](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref18>), [98](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref98>), [101](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref101>)). Protein synthetic rates are elevated after acute resistance exercise and remain elevated for up to 48 hours ([130](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref130>), [156](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref156>)). The magnitude of increased protein synthesis depends on a variety of factors including carbohydrate and protein intake, amino acid availability, timing of nutrient intake, mechanical stress of the weight training workout, muscle cell hydration levels, and the anabolic hormonal and subsequent receptor response ([19](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref19>), [115](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref115>), [162](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref162>)).\n\nThe process of hypertrophy involves both an increase in the synthesis of the contractile proteins actin and myosin within the myofibril and an increase in the number of myofibrils within the muscle fiber itself. The new myofilaments are added to the external layers of the myofibril, resulting in an increase in its diameter.\n\nExercise-induced muscle damage (EIMD) and disruption of myofibrils and the uniform structure of muscle fiber sarcomeres following high-intensity anaerobic training (e.g., resistance training) also have a marked effect on muscle growth. The theoretical basis for this suggests that structural changes associated with EIMD influence gene expression in an effort to strengthen muscle tissue and protect it from further damage. The repair and remodeling process itself may involve a host of regulatory mechanisms (e.g., hormonal, immune, and metabolic) that interact with the training status of the individual ([105](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref105>), [193](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref193>)). However, it is understood that both the inflammatory responses and increased protein turnover (i.e., increased net protein synthesis) ultimately contribute to long-term hypertrophic adaptations ([179](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref179>)). The sequence of protein synthesis involves (a) water uptake, (b) noncontractile protein synthesis, and (c) contractile protein synthesis ([192](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref192>)). At the same time, reduced degradation acts to maintain the size of fibers by reducing net protein loss.\n\nAfter the initiation of a heavy resistance training program, changes in the type of muscle proteins (e.g., fast myosin heavy chains) start to take place within several appropriately timed workouts ([113](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref113>), [183](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref183>)). However, muscle fiber hypertrophy requires a longer period of training (>16 workouts) before significant changes in CSA actually become apparent ([185](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref185>)). As with initial gains in performance variables (e.g., strength, power), hypertrophic responses are at their greatest in the early stages, after which the rate of muscle growth diminishes over time ([113](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref113>)). Athletes studied across two years of heavy resistance training showed increases in strength that paralleled optimal training intensities, although muscle fiber hypertrophy contributed little to increased lifting performance ([80](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref80>)).\n\nThe magnitude of hypertrophy ultimately depends on the training stimulus and the manner in which the acute training variables are prescribed. In order to optimize muscle growth, appropriate training periodization is essential for maximizing the combination of mechanical and metabolic stimuli. Mechanical factors include the lifting of heavy loads, the inclusion of eccentric muscle actions, and low to moderate training volumes ([114](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref114>)), all of which are characteristic of strength training. An increasing amount of evidence is also supporting the use of novel training modalities (e.g., occlusion training [177]) as alternative methods of inducing appropriate mechanical or metabolic stress. Metabolic factors center on low- to moderate-intensity or moderately high-intensity training with high volumes and short rest intervals (characteristic of bodybuilding training) ([114](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref114>)). Collectively, mechanical factors result in optimal recruitment of muscle fibers (as muscle fibers need to be recruited before growth), growth factor expression, and potential disruption to the sarcomeres, all of which increase muscle CSA ([67](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref67>), [161](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref161>)). The metabolic factors stress the glycolytic energy system and result in increased metabolites that may be involved in muscle growth. These programs also elicit the most potent anabolic hormone response ([115](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref115>)).\n\nAlso proposed as a mechanism for increasing muscle size, and something that has been debated by exercise scientists for years, is hyperplasia. Hyperplasia is the term given to an increase in the number of muscle fibers via longitudinal fiber splitting in response to high-intensity resistance training. Hyperplasia has been shown to occur in animals ([68](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref68>), [87](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref87>)), but the findings are controversial in humans, with some studies providing support ([129](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref129>), [132](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref132>), [191](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref191>)) and others rejecting its occurrence in humans ([131](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref131>)). Part of the reason for this confusion may arise from cross-sectional studies comparing resistance-trained athletes to untrained individuals, showing a greater number of fibers in the trained population. In this scenario it is difficult to determine if the difference is due to genetics or hyperplasia. One must also consider that the procedures scientists perform on animals simply cannot be done on humans for ethical and logistical reasons. Consequently, some of the more convincing data supporting skeletal muscle hyperplasia emerge from animal studies ([68](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref68>), [87](<E6372RM_Refs_d104_split_005.xhtml#chapter5-ref87>)). When examining hyperplasia in animal models, researchers remove whole muscle and strip back the fascia in order to analyze muscle fiber numbers longitudinally under a microscope. In humans, removal of whole muscle is not feasible. Instead, needle biopsies techniques are used to harvest a small sample of muscle tissue, which is then examined in cross section, and a prediction of hyperplasia is made indirectly from extrapolation mathematics. While hyperplasia cannot be completely ruled out, it does not appear to be a major strategy for muscle tissue adaptation to resistance training; and, if it occurs at all, it involves only a small amount of the stimulated tissue (maybe less than 10%) if the conditions are optimal. It may be hypothesized that if hyperplasia occurs, it may be in response to muscle fibers reaching a theoretical upper limit in size, which may occur in athletes using anabolic steroids and other growth agents or undergoing long-term training that produces large to extreme levels of hypertrophy. This remains to be fully elucidated and continues to be an area of contention among scientific researchers."

