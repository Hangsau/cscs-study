sections:
  - id: "ch06-cardiovascular-responses"
    title: "Acute Responses to Aerobic Exercise / Cardiovascular Responses"
    level: 3
    tags: [acute, responses, aerobic, exercise, cardiovascular, responses]
    key_points:
      - "The primary functions of the cardiovascular system during aerobic exercise are to deliver oxygen and other nutrients to the working muscles and remove metabolites and waste products."
    recall_prompts:
      - "Cardiovascular Responses 是什麼？有哪些類型或應用？"
    content: "\n\nThe primary functions of the cardiovascular system during aerobic exercise are to deliver oxygen and other nutrients to the working muscles and remove metabolites and waste products. This section describes the cardiovascular mechanisms of these acute responses.\n\n#### Cardiac Output\n\nCardiac output is the amount of blood pumped by the heart in liters per minute and is determined by the quantity of blood ejected with each beat (stroke volume) and the heart’s rate of pumping (heart rate):\n\nQ̇ = Stroke volume × Heart rate (6.1)\n\nwhere Q̇ is the cardiac output. Stroke volume is measured in milliliters of blood per beat, and heart rate is measured in beats (contractions) per minute ([46](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref46>)).\n\nIn the progression from rest to steady-state aerobic exercise, cardiac output initially increases rapidly, then more gradually, and subsequently reaches a plateau. With maximal exercise, cardiac output may increase to four times the resting level of about 5 L/min to a maximum of 20 to 22 L/min ([4](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref4>)). Stroke volume (see next section) begins to increase at the onset of exercise and continues to rise until the individual’s oxygen consumption is at approximately 40% to 50% of maximal oxygen uptake ([4](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref4>)). At that point, stroke volume begins to plateau. Sedentary college-aged men have maximal stroke volumes averaging between 100 and 120 ml of blood per beat; maximal stroke volumes for college-aged women are approximately 25% less, due to a smaller average body size as well as a smaller heart muscle ([99](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref99>)). The effect of training on the responses to exercise is marked, and we see an increase in maximal stroke volume for college-aged men up to 150 to 160 ml per beat and approximately 100 to 110 for college-aged women ([99](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref99>)).\n\n#### Stroke Volume\n\nTwo physiological mechanisms are responsible for the regulation of stroke volume. The first is a result of the end-diastolic volume, the volume of blood available to be pumped by the left ventricle at the end of the filling phase, or diastole. The second is due to the action of catecholamines including epinephrine and norepinephrine, which are hormones of the sympathetic nervous system that produce a more forceful ventricular contraction and greater systolic emptying of the heart.\n\nWith aerobic exercise, the amount of blood returning to the heart (also called venous return) is increased due to a combination of venoconstriction (induced via increased sympathetic nervous system activation) ([6](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref6>)), the skeletal muscle pump (muscular contractions combine with one-way venous valves to “push” more blood to the heart during exercise [44]), and the respiratory pump (increased respiratory frequency and tidal volume) ([93](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref93>)). All of these result in alterations in the pressure on the chambers of the heart and thoracic vena cava, which promote increased venous return ([93](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref93>)), and thus end-diastolic volume is significantly increased. With the increased volume, the myocardial fibers become more stretched than at rest, resulting in a more forceful contraction (this is analogous to greater stretch on a rubber band resulting in greater elastic recoil) and an increase in force of systolic ejection and greater cardiac emptying ([46](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref46>)). This principle, called the Frank-Starling mechanism, is related to the concept that the force of contraction is a function of the length of the fibers of the muscle wall. This increase in cardiac emptying is characterized by an increase in the ejection fraction, the fraction of the end-diastolic volume ejected from the heart ([32](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref32>), [46](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref46>)). At the onset of exercise, or even with the anticipation of exercise, sympathetic stimulation increases myocardial contractility and consequently increases stroke volume ([32](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref32>), [91](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref91>)).\n\n#### Heart Rate\n\nJust before and at the beginning of an exercise session, a reflex or anticipatory stimulation of the sympathetic nervous system results in an increase in heart rate. Heart rate increases linearly with increases in intensity during aerobic exercise ([32](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref32>)). The rate of increase in heart rate, the actual heart rate response, and the maximal heart rate achieved relate to a variety of individual characteristics of the human system, including fitness and age, in addition to exercise workload.\n\n##### How Can Athletes Estimate Maximal Heart Rate?\n\nA simple estimate of maximal heart rate is to subtract one’s age from 220; for example, the estimated maximal heart rate for a 47-year-old person is\n\n220 − 47 (age in years) = 173 beats/min.\n\nThe variance, or standard deviation, around this estimate is ±10 to 12 beats/min; thus the actual maximal heart rate for this individual could be expected to fall within the range of 161 to 185 beats/min. See [chapter 20](<E6372ch20_d97.xhtml>) for more exercise heart rate calculations. More recently a meta-analysis determined that the equation 208 − 0.7 × age could be used in healthy adults to more accurately predict maximal heart rate ([123](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref123>))."

  - id: "ch06-oxygen-uptake"
    title: "Acute Responses to Aerobic Exercise / Oxygen Uptake"
    level: 3
    tags: [acute, responses, aerobic, exercise, oxygen, uptake]
    key_points:
      - "Oxygen uptake is the amount of oxygen consumed by the body’s tissues."
    recall_prompts:
      - "Oxygen Uptake 是什麼？有哪些類型或應用？"
    content: "\n\nOxygen uptake is the amount of oxygen consumed by the body’s tissues. The oxygen demand of working muscles increases during an acute bout of aerobic exercise and is directly related to the mass of exercising muscle, metabolic efficiency, and exercise intensity. Aerobic exercise involving a larger mass of muscle or a greater level of work is likely to be associated with a higher total oxygen uptake. Increased metabolic efficiency allows for an increase in oxygen uptake, especially at maximal exercise.\n\nMaximal oxygen uptake is the greatest amount of oxygen that can be used at the cellular level for the entire body. Maximal oxygen uptake has been found to correlate well with the degree of physical conditioning and is recognized as the most widely accepted measure of cardiorespiratory fitness ([32](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref32>)). The capacity to use oxygen is related primarily to the ability of the heart and circulatory system to transport oxygen and the ability of body tissues to use it. Resting oxygen uptake is estimated at 3.5 ml of oxygen per kilogram of body weight per minute (ml·kg−1·min−1) for an average person; this value is defined as 1 metabolic equivalent (MET). Maximal oxygen uptake values in normal, healthy individuals generally range from 25 to 80 ml·kg−1·min−1, or 7.1 to 22.9 METs, and depend on a variety of physiological parameters, including age and conditioning level ([46](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref46>)).\n\nOxygen uptake (V̇O2) can be calculated with the Fick equation, which expresses the relationship of cardiac output, oxygen uptake, and arteriovenous oxygen difference:\n\nV̇O2 = Q̇ × a-v̅O2 difference (6.2)\n\nwhere Q̇ is the cardiac output in milliliters per minute and a-v̅O2 difference is the arteriovenous oxygen difference (the difference in the oxygen content between arterial and venous blood) in milliliters of oxygen per 100 ml of blood. Recalling equation 6.1, we can calculate oxygen uptake as shown in the following example:\n\nV̇O2 = Heart rate × Stroke volume × a-v̅O2 difference\n\nV̇O2 = 72 beats/min × 65 ml blood/beat × 6 ml O2/100 ml blood = 281 ml O2/min\n\nTo express oxygen uptake in its common unit (i.e., ml·kg−1·min−1), we would then divide the result by the person’s weight in kilograms. This is an example for an 80 kg (176-pound) athlete:\n\nV̇O2 = 281 ml O2/min ÷ 80 kg\n\nV̇O2 = 3.5 ml·kg−1·min−1"

  - id: "ch06-blood-pressure"
    title: "Acute Responses to Aerobic Exercise / Blood Pressure"
    level: 3
    tags: [acute, responses, aerobic, exercise, blood, pressure]
    key_points:
      - "Systolic blood pressure estimates the pressure exerted against the arterial walls as blood is forcefully ejected during ventricular contraction (systole) and, when combined with heart rate, can be use"
    recall_prompts:
      - "Blood Pressure 是什麼？有哪些類型或應用？"
    content: "\n\nSystolic blood pressure estimates the pressure exerted against the arterial walls as blood is forcefully ejected during ventricular contraction (systole) and, when combined with heart rate, can be used to describe the myocardial oxygen consumption (work) of the heart. This estimate of the work of the heart is obtained according to the following equation and is referred to as the rate–pressure product, or double product:\n\nRate–pressure product = Heart rate × Systolic blood pressure (6.3)\n\nDiastolic blood pressure is used to estimate the pressure exerted against the arterial walls when no blood is being forcefully ejected through the vessels (diastole). Diastolic blood pressure provides an indication of peripheral resistance and can decrease with aerobic exercise due to vasodilation. In systemic circulation, pressure is highest in the aorta and arteries and rapidly falls off within the venous circulation. Also, because pumping by the heart is pulsatile, resting arterial pressure on average fluctuates between a systolic level of 120 mmHg and a diastolic level of 80 mmHg (approximate values). As the blood flow continues through the systemic circulation, its pressure falls progressively to nearly 0 mmHg (venous pressure) by the time it reaches the termination of the vena cava in the right atrium ([46](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref46>)).\n\nThe mean arterial pressure is the average blood pressure throughout the cardiac cycle (equation 6.4). Mean arterial pressure is not the average of systolic and diastolic pressures, because the arterial pressure usually remains nearer the diastolic level than the systolic level during a greater portion of the cardiac cycle. Thus, the mean arterial pressure is usually less than the average of the systolic and diastolic pressures.\n\nMean arterial blood pressure = [(Systolic blood pressure − Diastolic blood pressure) ÷ 3] + Diastolic blood pressure (6.4)\n\nNormal resting blood pressure generally ranges from 110 to 139 mmHg systolic and from 60 to 89 mmHg diastolic. With maximal aerobic exercise, systolic pressure can normally rise to as much as 220 to 260 mmHg, while diastolic pressure remains at the resting level or decreases slightly ([46](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref46>), [91](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref91>))."

  - id: "ch06-control-of-local-circulation"
    title: "Acute Responses to Aerobic Exercise / Control of Local Circulation"
    level: 3
    tags: [acute, responses, aerobic, exercise, control, local]
    key_points:
      - "Resistance to blood flow is also increased with increasing viscosity of the blood and the length of the vessel."
    recall_prompts:
      - "Control of Local Circulation 是什麼？有哪些類型或應用？"
    content: "\n\nResistance to blood flow is also increased with increasing viscosity of the blood and the length of the vessel. However, these factors remain relatively constant under most circumstances. Thus, vasoconstriction and vasodilation of blood vessels are the primary mechanisms for regulating regional blood flow.\n\nDuring aerobic exercise, blood flow to active muscles is considerably increased by the dilation of local arterioles; at the same time, blood flow to other organ systems is reduced by constriction of the arterioles. At rest, 15% to 20% of cardiac output is distributed to skeletal muscle, whereas with vigorous exercise this value may rise to 90% of cardiac output ([32](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref32>), [91](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref91>)).\n\nAcute aerobic exercise results in increased cardiac output, stroke volume, heart rate, oxygen uptake, systolic blood pressure, and blood flow to active muscles and a decrease in diastolic blood pressure."

  - id: "ch06-respiratory-responses"
    title: "Acute Responses to Aerobic Exercise / Respiratory Responses"
    level: 3
    tags: [acute, responses, aerobic, exercise, respiratory, responses]
    key_points:
      - "Aerobic exercise provides for the greatest impact on both oxygen uptake and carbon dioxide production as compared to other types of exercise, such as anaerobic resistance training."
    recall_prompts:
      - "Respiratory Responses 是什麼？有哪些類型或應用？"
    content: "\n\nAerobic exercise provides for the greatest impact on both oxygen uptake and carbon dioxide production as compared to other types of exercise, such as anaerobic resistance training. Significant increases in oxygen delivered to the tissue, carbon dioxide returned to the lungs, and minute ventilation (the volume of air breathed per minute) provide for appropriate levels of alveolar gas concentrations during aerobic exercise ([91](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref91>)).\n\nWith aerobic exercise, increased minute ventilation occurs as a result of increases in the depth of breathing, frequency of breathing, or both. During strenuous exercise, the breathing frequency of healthy young adults usually increases from 12 to 15 breaths per minute at rest to 35 to 45 breaths per minute, while tidal volume (TV), the amount of air inhaled and exhaled with each breath, increases from resting values (of 0.4 to 1 L) to as much as 3 L or greater. Consequently, the minute ventilation can increase to 15 to 25 times the resting value, or to values of 90 to 150 L of air per minute ([32](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref32>), [46](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref46>), [91](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref91>)).\n\nDuring low- to moderate-intensity aerobic exercise, there is an increase in ventilation directly associated with both increased oxygen uptake and carbon dioxide production. In this instance, the increase in ventilation is primarily due to increased tidal volume. The ratio of minute ventilation to oxygen uptake is termed the ventilatory equivalent and ranges between 20 and 25 L of air per liter of oxygen consumed. In more intense exercise (generally above 45% to 65% of maximal oxygen uptake in untrained individuals and 70% to 90% in trained athletes), breathing frequency takes on a greater role. At these levels, minute ventilation rises disproportionately to the increases in oxygen uptake and begins to parallel the abrupt rise in blood lactate. At this point, the ventilatory equivalent may increase to 35 or 40 L of air per liter of oxygen consumed with this high-intensity activity ([32](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref32>), [91](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref91>)).\n\nWith inspiration, air enters the alveoli, the functional unit of the pulmonary system where gas exchange occurs. However, with inspiration, air also occupies areas of the respiratory passages: the nose, mouth, trachea, bronchi, and bronchioles. This area is not functional for gas exchange and is called the anatomical dead space. The normal volume of this air space is approximately 150 ml in young adults and increases with age. Because the respiratory passages stretch with deep breathing, the anatomical dead space increases as tidal volume increases ([figure 6.1](<E6372ch06_d83.xhtml#f6.1>)). Nevertheless, the increase in tidal volume with deep breathing is proportionately greater than any increase in anatomical dead space. Thus, increasing tidal volume (deeper breathing) provides for more efficient ventilation than increasing frequency of breathing alone ([46](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref46>), [91](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref91>)).\n\n**Figure 6.1** Distribution of tidal volume in a healthy athlete at rest. The tidal volume comprises about 350 ml of room air that mixes with alveolar air, about 150 ml of air in the larger passages (anatomical dead space), and a small portion of air distributed to either poorly ventilated or incompletely filled alveoli (physiological dead space).\n\n![An illustration of a respirator for measuring tidal volume. The device measures anatomical dead space, physiological dead space, and alveolar air.](images/E6372_508152_ebook.jpg)\n\nPhysiological dead space refers to alveoli in which poor blood flow, poor ventilation, or other problems with the alveolar surface impair gas exchange. The physiological dead space in the lungs of healthy people is usually negligible because all or nearly all alveoli are functional. Certain types of lung disease such as chronic obstructive lung disease or pneumonia can significantly reduce alveolar function, increasing physiological dead space by as much as 10 times the volume of anatomical dead space ([46](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref46>), [91](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref91>)).\n\nDuring aerobic exercise, large amounts of oxygen diffuse from the capillaries into the tissues; increased levels of carbon dioxide move from the blood into the alveoli; and minute ventilation increases to maintain appropriate alveolar concentrations of these gases."

  - id: "ch06-gas-responses"
    title: "Acute Responses to Aerobic Exercise / Gas Responses"
    level: 3
    tags: [acute, responses, aerobic, exercise, responses]
    key_points:
      - "Diffusion is the movement of oxygen and carbon dioxide across a cell membrane and is a function of the concentration of each gas and the resulting partial pressure exerted by the molecular motion of e"
    recall_prompts:
      - "Gas Responses 是什麼？有哪些類型或應用？"
    content: "\n\nDiffusion is the movement of oxygen and carbon dioxide across a cell membrane and is a function of the concentration of each gas and the resulting partial pressure exerted by the molecular motion of each gas. Diffusion results from the movement of gas from high concentration to low concentration. At the tissue level, where oxygen is used in metabolism and carbon dioxide is produced, the partial pressures of these gases in some instances differ considerably from those in arterial blood ([figure 6.2](<E6372ch06_d83.xhtml#f6.2>)). At rest, the partial pressure of oxygen in the interstitial fluid (fluid immediately outside a muscle cell) rapidly drops from 100 mmHg in arterial blood to as low as 40 mmHg, while the partial pressure of carbon dioxide is elevated above that of arterial blood to about 46 mmHg. During high-intensity aerobic exercise, the partial pressures of these gases are approximately 3 mmHg for oxygen and 90 mmHg for carbon dioxide. Consequently, these pressure gradients cause the movement of gases across cell membranes. In addition, the diffusing capacities of oxygen and, in particular, carbon dioxide increase dramatically with exercise, which facilitates their exchange ([32](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref32>), [46](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref46>), [91](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref91>)).\n\n**Figure 6.2** Pressure gradients for gas transfer in the body at rest. The pressures of oxygen (PO2) and carbon dioxide (PCO2) in alveolar air, venous and arterial blood, and muscle tissue are shown.\n\n![An illustration of the circulation of blood and change in pressure gradients.](images/E6372_508153_ebook.jpg)\n\n[Follow for extended description](<Ext_desc_E6372_508153_ebook.xhtml#l_E6372_508153_ebook>)"

  - id: "ch06-blood-transport-of-gases-and-metabolic-b"
    title: "Acute Responses to Aerobic Exercise / Blood Transport of Gases and Metabolic By-Products"
    level: 3
    tags: [acute, responses, aerobic, exercise, blood, transport]
    key_points:
      - "Oxygen is carried in blood either dissolved in the plasma or combined with hemoglobin."
    recall_prompts:
      - "Blood Transport of Gases and Metabolic By-Products 是什麼？有哪些類型或應用？"
    content: "\n\nOxygen is carried in blood either dissolved in the plasma or combined with hemoglobin. Because oxygen is not readily soluble in fluids, only about 3 ml of oxygen can be carried per liter of plasma. Nonetheless, this limited amount of oxygen transported in plasma contributes to the partial pressure of oxygen in blood and other body fluids, thus playing a role in the mechanisms that regulate breathing and in the diffusion of oxygen into alveolar blood and the cells of body tissues ([46](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref46>), [91](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref91>)).\n\nGiven the limited capacity of plasma to carry oxygen, the majority of oxygen in blood is carried by the hemoglobin. Men have about 15 to 16 g of hemoglobin per 100 ml of blood, and women have about 14 g of hemoglobin per 100 ml of blood. One gram of hemoglobin can carry 1.34 ml of oxygen; thus, the oxygen-carrying capacity of 100 ml of blood is about 20 ml of oxygen in men and a little less in women ([91](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref91>)).\n\nThe way in which carbon dioxide is removed from the system has some similarities to oxygen transport, but the vast amount of carbon dioxide is removed by a more complex process. After carbon dioxide is formed in the cell, it easily diffuses across the cell membranes and is subsequently transported to the lungs. As with oxygen, only a limited quantity of carbon dioxide—about 5% of that produced during metabolism—is carried in the plasma; similar to the situation with oxygen, this limited amount of carbon dioxide contributes to establishing the partial pressure of carbon dioxide in the blood. Some carbon dioxide is also transported via hemoglobin, but this amount is limited ([91](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref91>)).\n\nThe greatest amount of carbon dioxide removal (approximately 70%) is from the combination with water and delivery to the lungs in the form of bicarbonate (HCO3 −). The initial step in this reversible reaction is the combination of carbon dioxide in solution with water in the red blood cells to form carbonic acid. The reaction would normally be quite slow except for the impact of the enzyme carbonic anhydrase, which significantly speeds up this process. Once carbonic acid is formed, it is broken down to hydrogen ions and bicarbonate ions. Because hemoglobin is a significant acid–base buffer, hydrogen ions combine with hemoglobin. This process helps to maintain the pH of the blood. Bicarbonate ions diffuse from the red blood cells to the plasma while chloride ions diffuse into the blood cells to replace them ([46](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref46>), [91](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref91>)).\n\nLactic acid is another important metabolic by-product of exercise. During low- to moderate-intensity exercise, sufficient oxygen is available to the working muscles and lactic acid does not accumulate, as the removal rate is greater than or equal to the production rate. This removal of lactate includes the Cori cycle, in which muscle-derived lactate is transported via the blood to the liver, where it undergoes gluconeogenesis. If, at higher work intensities, aerobic metabolism is not sufficient to keep up with the formation of lactic acid, then the lactic acid level in the blood begins to rise. The aerobic exercise level at which lactic acid (converted to blood lactate at this point) begins to show an increase is termed the onset of blood lactate accumulation or OBLA (see [chapter 3](<E6372ch03_d80.xhtml>))."

  - id: "ch06-cardiovascular-adaptations"
    title: "Chronic Adaptations to Aerobic Exercise / Cardiovascular Adaptations"
    level: 3
    tags: [chronic, adaptations, aerobic, exercise, cardiovascular, adaptations]
    key_points:
      - "Aerobic endurance training results in several changes in cardiovascular function, including increased maximal cardiac output, increased stroke volume, and reduced heart rate at rest and during submaxi"
    recall_prompts:
      - "Cardiovascular Adaptations 是什麼？有哪些類型或應用？"
    content: "\n\nAerobic endurance training results in several changes in cardiovascular function, including increased maximal cardiac output, increased stroke volume, and reduced heart rate at rest and during submaximal exercise. In addition, muscle fiber capillary density increases as a result of aerobic endurance training, supporting delivery of oxygen and removal of carbon dioxide.\n\nFor optimal aerobic exercise performance, increasing maximal oxygen uptake is of paramount importance. One of the primary mechanisms for increasing maximal oxygen uptake is the enhancement of central cardiovascular function (cardiac output). The normal discharge rate of the sinoatrial (SA) node ranges from 60 to 80 times per minute. Aerobic endurance training results in a significantly slower discharge rate due to an increase in parasympathetic tone. Increased stroke volume also affects the resting heart rate—more blood is pumped per contraction, so the heart needs to contract less frequently to meet the same cardiac output. Aerobic endurance training can increase the heart’s ability to pump blood per contraction at rest and thus may account for some of the significant bradycardia (slower heart rate) observed in highly conditioned aerobic endurance athletes, whose resting heart rates commonly range from 40 to 60 beats/min ([46](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref46>), [91](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref91>)).\n\nThe most significant change in cardiovascular function with long-term (6-12 months) aerobic endurance training is the increase in maximal cardiac output, resulting primarily from improved stroke volume. A significantly lower heart rate in response to a standardized submaximal level of work is another hallmark of aerobic endurance training. Furthermore, heart rate increases more slowly in trained athletes than in sedentary people for a given workload ([33](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref33>), [91](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref91>)). Because maximal heart rate may actually decrease slightly with prolonged training ([83](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref83>)), perhaps as a result of increased parasympathetic tone ([11](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref11>)), the size of the left ventricle (both chamber volume and wall thickness) and the strength of contractions (increased contractility) are key to increasing stroke volume with submaximal as well as maximal exercise.\n\nIn addition to delivering oxygen, nutrients, and hormones, the capillary circulation provides the means for removing heat and metabolic by-products. Increased muscle fiber capillary density has been observed in response to the increased density of muscle associated with aerobic endurance training and is a function of volume and intensity of training. This increase in capillary density decreases the diffusion distance for oxygen and metabolic substrates ([76](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref76>))."

  - id: "ch06-respiratory-adaptations"
    title: "Chronic Adaptations to Aerobic Exercise / Respiratory Adaptations"
    level: 3
    tags: [chronic, adaptations, aerobic, exercise, respiratory, adaptations]
    key_points:
      - "Ventilation generally does not limit aerobic exercise and is either unaffected or only moderately affected by training ([7](<E6372RM_Refs_d104_split_006."
    recall_prompts:
      - "Respiratory Adaptations 是什麼？有哪些類型或應用？"
    content: "\n\nVentilation generally does not limit aerobic exercise and is either unaffected or only moderately affected by training ([7](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref7>), [24](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref24>)). Furthermore, the ventilatory adaptations observed appear to be highly specific to activities that involve the type of exercise used in training; that is, adaptations observed during lower extremity exercise primarily occur as a result of lower extremity training. If exercise training focuses on the lower extremities, one will not likely observe ventilatory adaptation during upper extremity activities. Training adaptations include increased tidal volume and breathing frequency with maximal exercise. With submaximal activity, breathing frequency is often reduced and tidal volume is increased. Ventilatory adaptations result from local, neural, or chemical adaptations in the specific muscles trained through exercise ([7](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref7>), [24](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref24>))."

  - id: "ch06-neural-adaptations"
    title: "Chronic Adaptations to Aerobic Exercise / Neural Adaptations"
    level: 3
    tags: [chronic, adaptations, aerobic, exercise, neural, adaptations]
    key_points:
      - "Nervous system adaptations play a significant role in the early stages of aerobic endurance training ([108](<E6372RM_Refs_d104_split_006."
    recall_prompts:
      - "Neural Adaptations 是什麼？有哪些類型或應用？"
    content: "\n\nNervous system adaptations play a significant role in the early stages of aerobic endurance training ([108](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref108>)). At the outset, efficiency is increased and fatigue of the contractile mechanisms is delayed. Additionally, improved aerobic performance may result in a rotation of neural activity among synergists (i.e., rather than maintaining a constant state of activation, synergistic muscles alternate between active and inactive to maintain low-level muscular force production [122]) and among motor units within a muscle. Thus, the athlete produces more efficient locomotion during the activity with lower energy expenditure."

  - id: "ch06-muscular-adaptations"
    title: "Chronic Adaptations to Aerobic Exercise / Muscular Adaptations"
    level: 3
    tags: [chronic, adaptations, aerobic, exercise, muscular, adaptations]
    key_points:
      - "One of the fundamental adaptive responses to aerobic endurance training is an increase in the aerobic capacity of the trained musculature."
    recall_prompts:
      - "Muscular Adaptations 是什麼？有哪些類型或應用？"
    content: "\n\nOne of the fundamental adaptive responses to aerobic endurance training is an increase in the aerobic capacity of the trained musculature. This adaptation allows the athlete to perform a given absolute intensity of exercise with greater ease. More impressively, after training, an athlete can exercise at a greater relative intensity of a now-higher maximal aerobic power. Thus, measuring an athlete’s maximal oxygen uptake only before and after aerobic endurance training may not accurately portray his or her ability to perform during competition. For example, an athlete who can run the marathon at a pace equal to 75% of maximal oxygen uptake may, after training, be able to maintain a pace that is 80% of maximal aerobic power. This adaptation occurs as a result of glycogen sparing (less glycogen use during exercise) and increased fat utilization within the muscle, which prolongs performance at the same intensity ([59](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref59>)). Consequently, the OBLA occurs at a higher percentage (up to 80-90%) of the trained athlete’s aerobic capacity. This advantageous response may be due to the aerobic endurance athlete’s muscle fiber type, specific local adaptations resulting from aerobic endurance training that reduce the production of lactic acid, changes in hormone release (particularly catecholamine release at high-intensity exercise), and a more rapid rate of lactic acid removal ([91](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref91>)).\n\nThe muscular component of an aerobic endurance training program involves submaximal muscle contractions extended over a large number of repetitions with little recovery. Therefore, the relative intensity is very low, and the overall volume is very high. This manner of training encourages relative increases in aerobic potential that are similar in Type I and Type II fibers ([134](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref134>)). Compared to Type II fibers, Type I fibers have a higher preexisting initial aerobic capacity, to which the increase in aerobic potential from training is added ([43](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref43>)). Thus, Type I fibers possess an oxidative capacity greater than that of Type II fibers both before and after training. However, if the intensity is sufficient, as in running repeated 800 m intervals, fast-twitch fibers (especially Type IIx fibers) also make a significant contribution to the effort. Under such conditions, their aerobic capacity also increases with training, but chronic aerobic endurance training reduces the concentration of glycolytic enzymes and can reduce the overall muscle mass of these fibers ([82](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref82>)).\n\nConversely, selective hypertrophy of Type I muscle fibers occurs ([19](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref19>)) due to their increased recruitment during aerobic activities, although the resulting cross-sectional diameter is not as great as that seen in Type II fibers adapted to resistance exercise. Also, the change is smaller than the hypertrophy of Type I fibers from a bodybuilding-style resistance training program.\n\nThere is little evidence to show that Type II fibers change into Type I fibers as a result of aerobic endurance training, but there may be a gradual conversion within the two major Type II fiber subgroups—of Type IIx fibers to Type IIa fibers ([2](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref2>), [134](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref134>)). This adaptation is significant, in that Type IIa fibers possess a greater oxidative capacity than Type IIx fibers and have functional characteristics more similar to those of Type I fibers. The result of this conversion is a greater number of muscle fibers that can contribute to aerobic endurance performance.\n\nAt the cellular level, muscular adaptations to aerobic exercise include an increase in the size and number of mitochondria ([56](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref56>)) and increased myoglobin content ([21](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref21>), [52](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref52>)). Myoglobin is a protein that transports oxygen within the cell. Mitochondria are the organelles in cells that are responsible for aerobically producing adenosine triphosphate (ATP) via oxidation of glycogen and free fatty acids. When the larger and more numerous mitochondria are combined with an increase in the quantity of oxygen that can be delivered to mitochondria by the greater concentration of myoglobin, the capacity of the muscle tissue to extract and use oxygen is enhanced. This adaptation is further augmented by increases in the level and activity of the enzymes involved in the aerobic metabolism of glucose ([61](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref61>)) and a parallel increase in glycogen ([41](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref41>), [43](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref43>)) and triglyceride ([94](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref94>)) stores."

  - id: "ch06-bone-and-connective-tissue-adaptations"
    title: "Chronic Adaptations to Aerobic Exercise / Bone and Connective Tissue Adaptations"
    level: 3
    tags: [chronic, adaptations, aerobic, exercise, bone, connective]
    key_points:
      - "The selection of different forms of aerobic exercise has met with some success in bringing about improvements in bone mass."
    recall_prompts:
      - "Bone and Connective Tissue Adaptations 是什麼？有哪些類型或應用？"
    content: "\n\nThe selection of different forms of aerobic exercise has met with some success in bringing about improvements in bone mass. Aerobic programs that are the most successful in stimulating bone growth involve the more intense physical activities such as running and high-intensity aerobics ([10](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref10>), [15](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref15>)). The key to the success of aerobic exercise in stimulating new bone formation is that the activity must be significantly more intense than the daily activities the person normally engages in, so as to exceed the minimum threshold intensity, as well as at a cyclical strain to exceed the minimum and strain frequency for bone growth ([10](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref10>)). The intensity of the activity must systematically increase in order to continually overload the bone. Eventually, it may become difficult to overload bone through aerobic exercise when the oxygen transport system rather than limitations of the musculoskeletal system restricts the progression to new exercise intensity. Bone responds to the magnitude and rate of external loading. Therefore, to enhance the stimulus to the musculoskeletal system, it is also necessary to increase the rate of limb movement. Using high-intensity interval training techniques is one method of providing a greater osteogenic stimulus while still providing the benefits associated with aerobic exercise ([12](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref12>), [34](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref34>)).\n\nIn mature adults, the extent to which tendons, ligaments, and cartilage grow and become stronger is proportional to the intensity of the exercise stimulus, especially from weight-bearing activities ([98](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref98>)). As with bone and muscle, exercise intensity that consistently exceeds the strain placed on the connective tissues during normal daily activities is needed to create connective tissue changes (see [chapter 5](<E6372ch05_d82.xhtml>) for more information).\n\nAn example of the positive effects of weight-bearing activity on cartilage is evidenced in a typical knee joint, where the surfaces of the joint that experience the greatest degree of weight bearing are thicker than the non–weight-bearing surfaces ([98](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref98>)). Complete movement through a full range of motion during weight bearing is likely essential to maintain tissue viability ([119](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref119>)).\n\nAnimal studies evaluating the potential negative effects of aerobic exercise on cartilage have shown encouraging results. Although studies have found that strenuous running (12.5 miles [20 km] per session) decreases cartilage thickness ([66](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref66>)), other studies using dogs as subjects demonstrated that a moderate running program (1 hour per day, five days per week for 15 weeks) increased cartilage thickness and stimulated positive remodeling of bone tissue ([67](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref67>)). And running 25 miles (40 km) per session for one year, or weighted running (using jackets weighing 130% of the animals’ weight) 2.5 miles (4 km) five days per week for 550 weeks, did not cause degenerative joint disease ([15](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref15>))."

  - id: "ch06-endocrine-adaptations"
    title: "Chronic Adaptations to Aerobic Exercise / Endocrine Adaptations"
    level: 3
    tags: [chronic, adaptations, aerobic, exercise, endocrine, adaptations]
    key_points:
      - "While the significance of endocrine responses to resistance training is well accepted ([75](<E6372RM_Refs_d104_split_006."
    recall_prompts:
      - "Endocrine Adaptations 是什麼？有哪些類型或應用？"
    content: "\n\nWhile the significance of endocrine responses to resistance training is well accepted ([75](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref75>)), the changes in hormone production that contribute to the body’s adaptation to aerobic exercise are equally important ([38](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref38>), [39](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref39>), [69](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref69>), [91](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref91>), [94](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref94>)). Testosterone, insulin, insulin-like growth factors (IGF-I), and growth hormone affect the integrity of muscle, bone, and connective tissue as well as assist in maintaining metabolism within a normal range ([35](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref35>), [36](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref36>), [71](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref71>), [72](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref72>), [127](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref127>)). Increases in hormonal circulation and changes at the receptor level (both number of receptors and turnover rate) are specific responses to aerobic exercise.\n\nHigh-intensity aerobic training augments the absolute secretion rates of many hormones in response to maximal exercise, although trained athletes have attenuated hormonal responses to submaximal exercise ([87](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref87>)). The hormone concentrations of a trained athlete equal those of their untrained counterparts at the same relative submaximal exercise intensity ([115](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref115>)). The greater hormonal response patterns to maximal exercise appear to augment the athlete’s ability to tolerate and sustain prolonged high aerobic exercise intensities ([138](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref138>)). When exercise intensity is very high and exercise duration is very short (from 5 to 10 seconds), only “fight-or-flight” changes in peripheral blood hormone concentrations occur (e.g., epinephrine and norepinephrine concentrations increase) ([74](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref74>)).\n\nAerobic training, especially running, is often associated with an increase in net protein breakdown from the muscle ([124](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref124>)), brought about in part by stress-induced cortisol secretion ([115](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref115>), [116](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref116>)) that the body attempts to offset by increasing hormonal anabolic responses in testosterone and IGF-1 ([128](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref128>)). However, recent evidence suggests that net protein synthesis in skeletal muscle of endurance-trained athletes does occur and may lead to muscle hypertrophy ([68](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref68>)), but most likely is due to mitochondrial rather than contractile proteins ([131](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref131>), [133](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref133>))."

  - id: "ch06-adaptations-to-aerobic-endurance-trainin"
    title: "Adaptations to Aerobic Endurance Training"
    level: 2
    tags: [adaptations, aerobic, endurance, training]
    key_points:
      - "Much research has been done on training adaptations associated with aerobic endurance exercise ([5](<E6372RM_Refs_d104_split_006."
    recall_prompts:
      - "Adaptations to Aerobic Endurance Training 的核心概念是什麼？"
    content: "\n\nMuch research has been done on training adaptations associated with aerobic endurance exercise ([5](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref5>), [13](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref13>), [17](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref17>), [26](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref26>), [37](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref37>), [53](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref53>), [54](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref54>), [131](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref131>)). Aerobic metabolism plays a vital role in human performance and is basic to all sports, if for no other reason than recovery ([125](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref125>)). Metabolically, the Krebs cycle and electron transport chain are the main pathways in aerobic energy production. Aerobic metabolism produces far more ATP energy than anaerobic metabolism and uses fats, carbohydrates, and proteins as fuel sources for generating ATP. Many sports involve interactions between the aerobic and anaerobic metabolic systems and thus require appropriate training. For example, soccer, lacrosse, basketball, field hockey, and ice hockey involve continuous movement (and thus constant aerobic demand) mixed with bursts of sprint and power activities. Proper conditioning of the aerobic system is vital to the ability of the player to sustain such activity and adequately recover within and between exercise sessions.\n\n### What Are the Improvements in Performance From Aerobic Exercise?\n\nThe body systems affected by aerobic exercise include musculoskeletal, cardiovascular, and respiratory. Adaptations include the following:\n\n  * _Respiratory system:_ Decreased submaximal respiration rate ([31](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref31>)).\n  * _Cardiovascular system:_ Decreased heart rate for fixed submaximal workloads ([106](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref106>)) associated with increased stroke volume and cardiac output. Blood volume is also increased, supporting increased stroke volume and cardiac output ([45](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref45>)).\n  * _Musculoskeletal system:_ Increased arterial–venous O2 difference associated with increased capillarization in muscle ([110](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref110>), [123](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref123>)), increased oxidative enzyme concentrations, and increased mitochondrial size and density ([58](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref58>)).\n  * _Aerobic power (maximal oxygen uptake):_ Arguably the most significant change in physiological variables with aerobic exercise training is an increase in maximal oxygen uptake (V̇O2max), often used as the criterion variable for cardiovascular fitness. The V̇O2max is determined in part by genetics and by the training program undertaken by the athlete. Elite athletes may show minor changes in V̇O2max with training (5-10%), while untrained individuals may increase V̇O2max by as much as 20% ([55](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref55>), [62](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref62>)). A high V̇O2max coupled with increased lactate threshold allows enhanced performance for running sports as well as sports requiring intermittent sprinting (soccer, basketball, and other team sports).\n  * _Lactate threshold:_ Aerobic training increases the absolute lactate threshold, allowing the highly trained individual to work at both a higher relative and absolute percentage of their V̇O2max than an individual less well trained. This increased tolerance of lactate translates into a variety of performance outcomes; these include running at a higher percentage of V̇O2max for a race (resulting in reduced time), covering more distance during a game, enhanced recovery for second-half performance, and working at higher exercise intensities throughout an event. The importance of having a high lactate threshold can be seen in the following example. Two individuals can have the same V̇O2max, perhaps 50 ml·kg−1·min−1; however, if one has a lactate threshold of 80% of V̇O2max (i.e., threshold occurs at 40 ml·kg−1·min−1) whereas the other’s occurs at 70% (i.e., 35 ml·kg−1·min−1), the first individual will be able to maintain a power output equivalent to 5 ml·kg−1·min−1 higher than the second individual. All other things being equal, such as movement economy, this would result in a greater speed of movement and thus superior performance.\n  * _Effective utilization of substrate:_ Carbohydrates are the preferred source of fuel for high-intensity intermittent exercise in many team sports. Aerobic exercise training results in a greater use of fat as a substrate for exercise with a relative sparing of carbohydrate. With a sparing of carbohydrate, an endurance-trained individual can maintain higher-intensity exercise for longer periods of time. Aerobic exercise may be further improved through various carbohydrate loading manipulations to increase endogenous glycogen stores ([16](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref16>)).\n  * _Muscle fiber adaptations:_ When muscle fibers are examined from a cross-sectional point of view, elite distance runners have a higher proportion (percentage) of Type I fibers, and the available Type I fibers are functionally very efficient for aerobic metabolism (increased mitochondrial density and oxidative enzyme capacity [57] and capillary network for oxygen delivery). Aerobic exercise training, especially long-distance and high-intensity intermittent exercise, results in an increase in the oxidative capacity of Type I fibers. Research indicates that skeletal muscle fibers can alter their myosin heavy chain and internal characteristics, leading to alterations in the classification of fibers and the observation that Type IIx fibers are increased in endurance trained athletes ([8](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref8>), [102](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref102>)). From a performance standpoint, these metabolic and fiber changes result in a more efficient use of aerobic energy production.\n  * _Exercise efficiency:_ The economy of exercise is mostly a function of biomechanics and technique. Two aerobic endurance athletes may have the same maximal oxygen uptake and lactate threshold yet not show the same performance outcomes. The athlete with the more efficient exercise (i.e., requiring less energy to maintain the same power output) would be able to sustain the same power output for a longer duration even though the two athletes have the same V̇O2max and lactate threshold.\n\nEvery athlete needs a basic level of cardiovascular endurance—if not for performance, for health reasons—that can be achieved using a wide variety of training modalities and programs. Apart from the stereotypical submaximal aerobic training methods, another method that can produce significant gains in aerobic fitness (e.g., increased V̇O2max, lactate threshold) is interval training ([14](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref14>), [37](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref37>), [80](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref80>)).\n\nOne of the most commonly measured adaptations to aerobic endurance training is an increase in maximal oxygen uptake associated with an increase in maximal cardiac output ([13](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref13>), [23](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref23>), [53](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref53>), [131](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref131>)). As the intensity of exercise increases, oxygen consumption rises to maximal levels. When oxygen consumption can no longer increase to meet the demands, maximal oxygen uptake has been achieved even in the presence of continuing oxygen availability. Aerobic endurance training can improve an athlete’s aerobic power by 5% to 30%, depending, in part, on the starting fitness level as well as the genetic potential of the individual ([5](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref5>)). Most adaptations in maximal oxygen consumption can be achieved within a 6- to 12-month training period. After that, further changes in aerobic endurance performance consist of increases in running efficiency and increased lactate threshold ([62](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref62>)). Metabolic changes include increased respiratory capacity, lower blood lactate concentrations at a given submaximal exercise intensity, increased mitochondrial and capillary densities, and improved enzyme activity. It may be that experienced runners do not experience further increases in their V̇O2max through chronic endurance training but that their performance improves due to enhanced running economy ([13](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref13>), [54](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref54>)).\n\nThe intensity of training is one of the most important factors in improving and maintaining aerobic power. Short, high-intensity bouts of interval sprints can improve maximal oxygen uptake if the interim rest period is also short. Callister and colleagues ([17](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref17>)) showed that long rest periods used with sprints improve sprint speed without significant increases in maximal aerobic power. Therefore, longer training sessions with higher amounts of rest between exercise bouts result in less improvement in aerobic capacity. The use of shorter recovery periods between high-intensity training intervals has been shown in various studies to improve various skeletal muscle metabolic processes, resulting in improved endurance performance ([40](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref40>)).\n\nAerobic endurance training is generally associated with alterations in body composition, assuming appropriate nutritional intake. Aerobic endurance training usually decreases the relative percentage of body fat but has little or no significant effect on fat-free mass. Longer-term programs can result in greater decreases in the percentage of body fat ([13](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref13>), [26](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref26>), [61](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref61>)). Excessive training may lead to a predominance of catabolic activity in the body and cause an imbalance between catabolic and anabolic processes ([114](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref114>)).\n\nAerobic endurance training results in reduced body fat, increased maximal oxygen uptake, increased running economy, increased respiratory capacity, lower blood lactate concentrations at submaximal exercise, increased mitochondrial and capillary densities, and improved enzyme activity.\n\n[Table 6.2](<E6372ch06_d83.xhtml#t6.2>) lists the physiological changes that occur with short-term (three- to six-month) aerobic endurance training and compares the results for previously untrained and elite aerobic endurance athletes.\n\nTABLE 6.2 Physiological Variables in Aerobic Endurance Training | Previously untrained subjects | **Highly trained or elite subjects**  \n---|---|---  \n| Pre | Post  \nHeart rate (beats/min) |  |  |   \nResting ([104](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref104>), [109](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref109>)) | 76.4 | 57.0 | 45  \nMaximal ([104](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref104>), [109](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref109>)) | 192.8 | 190.8 | 196  \nStroke volume (ml) |  |  |   \nResting ([109](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref109>), [137](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref137>)) | 79 | 76 | 94  \nMaximal ([109](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref109>), [137](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref137>)) | 104 | 120 | 187  \nCardiac output (L/min) |  |  |   \nResting ([109](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref109>), [137](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref137>)) | 5.7 | 4.4 | 4.2  \nMaximal ([109](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref109>), [137](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref137>)) | 20.0 | 22.8 | 33.8  \nHeart volume (ml) ([104](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref104>), [109](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref109>)) | 860 | 895 | 938  \nBlood pressure (mm Hg) ([104](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref104>), [109](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref109>)) |  |  |   \nResting ([104](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref104>), [109](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref109>)) | 131/75 | 144/78 | 112/75  \nMaximal ([104](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref104>), [109](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref109>)) | 204/81 | 201/74 | 188/77  \nPulmonary ventilation (body temperature [37 °C] and pressure [ambient], saturated [47 mmHg]) (L/min) |  |  |   \nResting ([104](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref104>), [109](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref109>)) | 10.9 | 12.0 | 11.8  \nMaximal ([104](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref104>), [109](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref109>)) | 128.7 | 156.4 | 163.4  \nArteriovenous oxygen difference (ml/100 ml) |  |  |   \nResting | 5.8 | 7.5 | —  \nMaximal ([109](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref109>), [137](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref137>)) | 16.2 | 17.1 | 15.9  \nMaximal oxygen uptake (ml-kg-1-min-1) ([104](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref104>), [109](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref109>)) | 36.0 | 48.0 | 74.1  \n% Type I fibers ([1](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref1>)) | 48 | 51 | 72  \nFiber area (μm2) |  |  |   \nType I ([27](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref27>)) | 4,947* | 6,284* | 6,485  \nType II ([27](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref27>)) | 5,460* | 6,378* | 8,342  \nCapillary density |  |  |   \nNumber/mm2 ([1](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref1>), [51](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref51>)) | 289 | 356 | 640  \nNumber/fiber ([1](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref1>)) | 1.39 | 1.95 | 2.15  \nSkeletal muscle enzymes |  |  |   \nCitrate synthase (μmol-min-1-g-1 wet weight) ([132](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref132>)) | 35.9 | 45.1 | —  \nLactate dehydrogenase (μmol-g-1-min-1) ([27](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref27>)) | 843* | 788* | 746  \nSuccinate dehydrogenase (μmol-g-1-min-1) ([27](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref27>)) | 6.4* | 17.7* | 21.6  \nPhosphofructokinase (μmol-g-1-min-1) ([42](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref42>), [43](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref43>)) | 27.13 | 58.82 | 20.1  \nMaximal fiber shortening velocity (fiber lengths/s) |  |  |   \nType I ([48](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref48>), [126](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref126>)) | 0.99 | 1.27 | 1.65  \nType II ([48](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref48>), [126](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref126>)) | 3.18 | 3.38 | 3.72  \n  \n*Data not from training study; subjects were untrained or “good distance runners.”\n\nData compiled by Carwyn Sharp. Unless otherwise indicated, data is from Saltin, B, Blomqvist, G, et al. Response to exercise after bed rest and after training. Circulation 38(Suppl. 7):1-78, 1968."

  - id: "ch06-external-and-individual-factors-influenc"
    title: "External and Individual Factors Influencing Adaptations to Aerobic Endurance Training"
    level: 2
    tags: [external, individual, factors, influencing, adaptations, aerobic]
    key_points:
      - "A variety of external and individual factors can influence both the acute responses and the chronic adaptations of the cardiovascular and respiratory systems to exercise."
    recall_prompts:
      - "External and Individual Factors Influencing Adaptations to Aerobic Endurance Training 的核心概念是什麼？"
    content: "\n\nA variety of external and individual factors can influence both the acute responses and the chronic adaptations of the cardiovascular and respiratory systems to exercise. The effects of altitude, hyperoxic breathing, smoking, and blood doping (external factors), as well as genetic potential, age, and sex (individual factors), are briefly described in this section.\n\n### Altitude\n\nAt elevations greater than 3,900 feet ([1](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref1>),200 m), acute physiological adjustments begin to occur to compensate for the reduced partial pressure of oxygen in the atmosphere ([49](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref49>)). [Table 6.3](<E6372ch06_d83.xhtml#t6.3>) presents the adjustments to altitude hypoxia that are immediate and longer-term. Two adjustments that occur early in the acclimatization process are particularly important. First, there is an increase in pulmonary ventilation (hyperventilation) at rest and during exercise. This increase in ventilation is primarily the result of increased breathing frequency. With longer stays at high elevation, however, increased tidal volume also contributes to augmented ventilation. Stabilization of ventilation is dependent on the level of altitude and the duration at altitude ([64](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref64>)). Second, in the early stages of altitude exposure, there is an increase in cardiac output at rest and during submaximal exercise, due primarily to increases in heart rate ([49](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref49>), [91](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref91>)). Submaximal heart rate and cardiac output can increase 30% to 50% above sea level values, and stroke volume is constant or slightly reduced. Increased submaximal cardiac output reflects the need for increased blood flow at a time when arterial blood oxygen content is reduced in order to maintain adequate oxygen delivery to the tissues.\n\nTABLE 6.3 Adjustments to Altitude Hypoxia System | Immediate adjustments | Longer-term adjustments  \n---|---|---  \nPulmonary | Hyperventilation | Increase in ventilation rate stabilizers  \nAcid-base | Body fluids become more alkaline due to reduction in CO2 with hyperventilation. | Excretion of HCO3- by the kidneys with concomitant reduction in alkaline reserve  \nCardiovascular | Cardiac output increases at rest and during submaximal exercise. Submaximal heart rate increases. Stroke volume remains the same or is slightly Maximal heart rate remains the same or is slightly lowered. Maximal cardiac output remains the same or is slightly lowered. | Continued elevation in submaximal heart rate submaximal and maximal exercise Decreased stroke volume at rest and with lowered. Lowered maximal heart rate Lowered maximal cardiac output  \nHematologic |  | Increased red cell production (polycythemia) Increased viscosity Increased hematocrit Decreased plasma volume  \nLocal tissue |  | Increased capillary density of skeletal muscle Increased number of mitochondria Increased use of free fatty acids, sparing muscle glycogen  \n  \nWithin 10 to 14 days at a given altitude, heart rate and cardiac output begin to return to normal values because of the longer-term acclimatization response of increased red blood cell production. Thus, with acute exposure to altitude, hyperventilation and increased submaximal cardiac output are rapid and relatively effective responses to offset the challenges of the reduced partial pressure of oxygen. However, despite these adjustments, during this acute period, arterial oxygen saturation decreases and results in decreases in maximal oxygen uptake and aerobic performance at altitudes above 3,900 feet ([1](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref1>),200 m). Acclimatization changes revert in about one month after return to sea level. As indicated in [table 6.3](<E6372ch06_d83.xhtml#t6.3>), chronic physiological and metabolic adjustments that occur during a prolonged altitude exposure include\n\n  * increased formation of hemoglobin (generally 5-15% increase, although higher values have been reported) and red blood cells (30-50% increase),\n  * increased diffusing capacity of oxygen through the pulmonary membranes,\n  * maintenance of the acid–base balance of body fluids by renal excretion of HCO3 − and through hyperventilation, and\n  * increased capillarization.\n\nAll these adaptations generally improve tolerance of the relative hypoxia at medium and high altitudes ([46](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref46>), [49](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref49>), [91](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref91>)) and may result in nearly sea level exercise capacities with adequate acclimatization. A minimum of three to six weeks is needed to adapt at moderate altitude ([2](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref2>),200 to 3,000 m). However, reduced performance, compared to sea level, is generally expected with altitude exposure regardless of the period of acclimatization. Strength and conditioning professionals are encouraged to inform athletes of both expected acute responses and chronic adaptations to altitude so that they can maintain appropriately adjusted training regimens and a positive mental approach to the impact of altitude.\n\n### Hyperoxic Breathing\n\nBreathing oxygen-enriched gas mixtures (hyperoxic breathing) during rest periods or following exercise has been proposed to positively affect some aspects of exercise performance, although the mechanisms for these results are not well understood and the procedure remains controversial and the research divided ([117](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref117>), [118](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref118>)). Hyperoxic breathing may increase the amount of oxygen carried by the blood and therefore increase the supply of oxygen to working muscles. However, the breathing of ambient air at sea level by healthy people results in arterial hemoglobin oxygen saturation between 95% to 98%. Thus, the potential for hyperoxic breathing during rest periods or following exercise has yet to be fully elucidated ([46](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref46>), [103](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref103>)).\n\n### Smoking\n\nRelatively little research is available regarding smoking and exercise performance, possibly because athletes and active individuals may tend to avoid smoking for fear of impairing performance or increasing disease risk ([85](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref85>), [101](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref101>)). Smokers experience impairments in lung function and are at increased risk for chronic obstructive pulmonary diseases ([88](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref88>), [120](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref120>)) including chronic bronchitis ([65](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref65>)) and emphysema ([86](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref86>)). Decrements in exercise tolerance and cardiopulmonary function have been observed in teenagers ([85](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref85>)), demonstrating that the harmful effects of smoking occur in even young smokers within a relatively short period of time. The detrimental effects of smoking include\n\n  * increased airway resistance due to nicotine-related bronchiole constriction or increased fluid secretion and swelling in the bronchial tree due to the irritation of smoke; and\n  * paralysis of the cilia on the surfaces of the respiratory tract by nicotine, which limits the ability to remove excess fluids and foreign particles, causing debris to accumulate in the respiratory passageways and adding to the difficulty of breathing.\n\nThus, even the light smoker may feel respiratory strain during exercise and experience a reduction in the level of performance ([46](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref46>), [91](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref91>)).\n\nCarbon monoxide, a component of cigarette smoke, is associated with an impaired hemodynamic response to exercise and increased catecholamine release. Carbon monoxide has a higher affinity for hemoglobin than does oxygen. The resulting carboxyhemoglobin (carbon monoxide and hemoglobin) reduces the amount of oxygen that can be carried by hemoglobin and thus reduces the oxygen that can be provided to the working muscles. The reduction in oxygen-carrying capacity may reduce maximal exercise capacity, and submaximal cardiovascular responses may increase in an effort to provide adequate oxygenated blood to the working muscles. The increased catecholamine release increases heart rate and blood pressure.\n\n### Blood Doping\n\nThe practice of artificially increasing red blood cell mass (blood doping) as a means to improve athletic performance has been criticized as unethical and as one that poses serious health risks to the athlete ([100](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref100>)). Nonetheless, research has suggested that this practice can improve aerobic exercise performance and may enhance tolerance of certain environmental conditions ([112](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref112>)).\n\nBlood doping can be accomplished through infusion of an individual’s own red blood cells or those from someone else, or through administration of erythropoietin (EPO), which stimulates red blood cell production. Infusion of red blood cells rapidly increases red blood cell mass, but for just a few weeks ([97](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref97>)), whereas the effects of the drug EPO produce changes over weeks and last as long as EPO continues to be administered ([112](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref112>)). In either case, it is theorized that increasing red blood cell mass increases the blood’s ability to carry oxygen and thus increases oxygen availability to working muscles. Maximal oxygen uptake has been demonstrated to increase by up to 11% with either red blood cell infusion or EPO administration ([112](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref112>), [113](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref113>)). At standardized submaximal workloads, blood doping has also been associated with decreased heart rate and blood lactate as well as higher pH values ([112](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref112>)).\n\nThe effects of blood doping suggest the potential for diminishing the impact of various environmental conditions. The effects of altitude appear to be lessened with blood doping, although as altitude increases, the positive influence of blood doping is reduced ([107](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref107>)). Environmental stressors such as heat and cold exposure may also be affected by blood doping. During heat exposure, a blood-doped athlete will be able to tolerate submaximal exercise stress more easily ([63](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref63>), [111](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref111>)-[113](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref113>)). The increased blood volume associated with increased red blood cell mass allows the body to shunt more blood to the skin for improved thermoregulation while still providing sufficient blood to transport oxygen to the working muscles. However, blood doping appears to confer these benefits primarily to individuals who are already acclimatized to heat and provides very little aid relating to the response to heat of those who are not acclimatized ([112](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref112>)). Much less is known about blood doping with respect to cold stress, and although some theoretical benefit has been suggested, this practice could conceivably increase health risks ([112](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref112>)).\n\nThe health risks associated with blood doping further complicate the controversy surrounding this practice. Theoretically, high hematocrit levels may increase risks for embolic events such as stroke, myocardial infarction, deep vein thrombosis, or pulmonary embolism. Increased arterial blood pressure, flu-like symptoms, and increased plasma potassium levels may present themselves with EPO use ([113](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref113>)). Finally, there is risk associated with infusion or transfusion, although in most cases the risk is relatively small ([113](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref113>)).\n\n### Genetic Potential\n\nThe upper limit of an individual’s genetic potential contributes significantly to the absolute magnitude of the training adaptations. The magnitude of change also depends on the current training status of the individual. Each biological system adaptation, such as that of the cardiovascular system, has an upper limit, and as the athlete gets closer to that upper limit, smaller and smaller gains are observed. For example, in some elite competitions (e.g., swimming), small gains in performance may be the difference between the gold medal and 26th place. Thus, in an event in which tenths or hundredths of a second make a big difference, it may be worth the extra training time to gain that 0.05% improvement in performance. Because of the small gains possible with training in elite athletes, careful program design and monitoring become even more critical ([26](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref26>), [70](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref70>), [77](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref77>), [135](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref135>)).\n\n### Age and Sex\n\nPhysiological adaptations to aerobic endurance training vary according to age and sex ([3](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref3>), [131](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref131>)). Maximal aerobic power decreases with age in adults as a consequence of various physiological changes that accompany aging—for example, reduced muscle mass and strength (also called sarcopenia) ([79](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref79>)) and increased fat mass ([3](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref3>), [78](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref78>)). On the average, when women and men are matched by age, the aerobic power values of women range from 73% to 85% of the values of men ([131](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref131>)). However, the general physiological response to training is similar in men and women ([84](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref84>)). The differences in aerobic power may be caused by several factors, including women’s higher percentage of body fat and lower blood hemoglobin values and men’s larger heart size and blood volume ([13](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref13>), [18](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref18>))."

  - id: "ch06-overtraining-definition-prevalence-diagn"
    title: "Overtraining: Definition, Prevalence, Diagnosis, and Potential Markers"
    level: 2
    tags: [overtraining, definition, prevalence, diagnosis, potential, markers]
    key_points:
      - "Improving sport performance for competitive athletes through appropriately designed training programs is crucial to success."
    recall_prompts:
      - "Overtraining: Definition, Prevalence, Diagnosis, and Potential Markers 的核心概念是什麼？"
    content: "\n\nImproving sport performance for competitive athletes through appropriately designed training programs is crucial to success. Equally important to the success of an athlete in any sport is adequate recovery from intense training. When there is an imbalance between training loads and recovery, the potential for overtraining and development of the overtraining syndrome (OTS) exists ([28](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref28>)). While considerable research exists on OTS, controversy remains regarding how to define, evaluate, and remedy this syndrome ([73](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref73>), [121](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref121>)).\n\nRecently, the European and American Colleges of Sports Medicine published a joint consensus statement about OTS ([92](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref92>)). This section of the chapter presents some of the findings of this consensus statement, particularly with regard to definitions, potential markers, and prevention.\n\nFor effectively studying OTS, consistent terminology is needed. The recommendations of the consensus statement are from the work of Halson ([47](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref47>)) and Urhausen ([130](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref130>)). In these definitions, overtraining is considered a process (expressed as a verb) that can result in overreaching in the short term (functional overreaching) or extreme overreaching (nonfunctional overreaching [NFOR]) or OTS in the long term. Each of these conditions results in a sport performance decrement that is a hallmark of overtraining. In the case of functional overreaching, training is purposely intensified to cause a brief decrement in performance followed by a few days or weeks of recovery. The result is a supercompensative improvement in performance. An example is a final maximal training session (which causes functional overreaching) a few weeks before a competition, followed by a gradual tapering period leading up to an enhanced performance. Nonfunctional overreaching is characterized by a stagnation or decrease in sport performance, with recovery requiring weeks to months in order for the athlete to return to the previous level of performance. If intensified training continues without adequate recovery, an athlete can progress to OTS, in which performance is decreased and for which months of recovery would be required to return the athlete to prior levels of performance. These definitions for overtraining assume a continuum for which the common trigger for the progression from functional overreaching to OTS is continued intensified training with insufficient rest. While it is difficult to measure the prevalence of OTS, a recent study ([105](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref105>)) indicated that about 10% (7% to 21%) of collegiate swimmers and other aerobic endurance athletes experienced either NFOR or OTS.\n\nOvertraining syndrome can lead to dramatic performance decreases in all athletes; the most common cause is intensified training without adequate recovery.\n\n### Cardiovascular Responses\n\nGreater volumes of training associated with OTS can affect heart rate. Interestingly, resting heart rate can be either decreased or increased in association with OTS ([136](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref136>)). Heart rate variability can decrease with onset of OTS, indicating reduced parasympathetic input or excessive sympathetic stimulation. Exercise-induced maximum heart rates decrease from overtraining, as have heart rates at absolute submaximal exercise intensities ([50](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref50>)). Increased training volumes, within a given time period, associated with overtraining do not generally affect resting blood pressures. However, increased training intensity can produce increased resting diastolic blood pressures without affecting resting systolic pressures.\n\n### Biochemical Responses\n\nUnusually high training volume can result in increased levels of creatine kinase (CK), indicating muscle damage ([30](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref30>)). Lactate concentrations, on the other hand, either decrease or stay the same when training volumes increase. Blood lipids and lipoproteins are not altered by volume overtraining. Muscle glycogen decreases with prolonged periods of overtraining, although this may be largely due to dietary considerations. Decreased glycogen levels may contribute to the lowered lactate responses.\n\n### Endocrine Responses\n\nIn men, total testosterone decreases after an initial increase in response to the exercise stimuli; however, this should be viewed as a response to a stressful stimulus rather than an indication of overtraining ([92](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref92>)). Concentrations of free testosterone also decrease in some cases. These changes do not appear to be regulated by the pituitary, since luteinizing hormone levels are not affected ([129](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref129>)). The changes in free testosterone appear to be independent of protein-binding capacity, because concentrations of sex hormone–binding globulin are not altered ([129](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref129>)). Therefore, the decreased ratio of total testosterone to sex hormone–binding globulin that can accompany increased volumes of training seems to be due to altered total testosterone levels.\n\nThe anabolic–catabolic state of an athlete may be quantified by the testosterone-to-cortisol ratio, which decreases or stays the same with greater training volumes. The free testosterone component may be more influential physiologically. Decreases of 5% to 50% in the ratio of free testosterone to cortisol have also been reported with increased training volumes. A possible marker of OTS is a decrease of 30% or more in this ratio.\n\nDecreased pituitary secretion of growth hormone occurs with overtraining. This and other endocrine responses to an overtraining stimulus appear to be due primarily to impaired hypothalamic function, not pituitary function. Whether these endocrine alterations are responsible for performance decrements is open to debate. Levels of free testosterone, total testosterone, cortisol, and creatine kinase seem to simply reflect training volumes. Actual physical performance is occasionally related to total testosterone concentrations, but not in all cases.\n\nCatecholamines appear very responsive to an overtraining stimulus. Alterations in basal levels of epinephrine, norepinephrine, and dopamine are reported to be significantly related to the severity of self-reported complaints in overtrained runners. Changes in catecholamine and cortisol concentrations may mirror each other during overtraining, although cortisol is not as sensitive to increased training volume as catecholamines are. Severely increased volumes of training can result in decreased nocturnal levels of epinephrine, which indicate basal levels. Preexercise or resting levels of epinephrine and norepinephrine are either unchanged or increased. A given absolute load of exercise results in increased epinephrine and norepinephrine levels in the presence of overtraining compared with before overtraining, although maximum levels of epinephrine and norepinephrine are unchanged. Basal levels of dopamine decrease with volume overtraining, as do dopamine concentrations at the same absolute workload. With submaximal exercise, dopamine responses vary, but they appear to counter norepinephrine patterns. Although often difficult to document, severe volume overtraining of aerobic endurance athletes produces characteristics of the parasympathetic OTS, including reduced sensitivity to catecholamines, and may result in advanced cases of severe OTS.\n\n### Strategies for Prevention of Overtraining Syndrome\n\nThe overtraining syndrome represents a cumulative sum of stressors with the primary cause of intensified training without adequate recovery ([92](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref92>)). However other contributors include lack of sleep, environmental considerations (heat, cold, altitude, pollution), interpersonal difficulties, and traveling, among others. While the definitive identification of OTS remains somewhat controversial, there are still some strategies that athletes and coaches can follow to prevent OTS.\n\nAn effective tactic includes making sure the athlete is following good nutrition guidelines as well as getting sufficient sleep and recovery time. Coaches should track an athlete’s training program, and the program should provide variety in intensity and volume. Keeping an accurate record of an athlete’s performance can also help “catch” a marker of OTS early in the process so that training can be adjusted. Most importantly, athletes should have access to a multidisciplinary health team (coach, physician, nutritionist, and psychologist) to discuss any issues related to their lives; this access may lead to early information that would assist in avoiding OTS ([92](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref92>)).\n\n#### What Are the Markers of Aerobic Overtraining?\n\nSeveral criteria characterize a variable as a reliable marker for the onset of overtraining syndrome:\n\n  * The marker should be sensitive to the training load.\n  * It should not be affected by other factors.\n  * Changes in the marker should precede development of overtraining syndrome.\n  * The marker should be easy to measure accurately.\n  * Measurement should not be profoundly invasive.\n  * The marker should not be expensive to use or measure.\n\nThe following variables have been identified as potential markers, but none satisfy all of the criteria listed ([92](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref92>)).\n\n  * Decreased performance\n  * Decreased percentage of body fat\n  * Decreased maximal oxygen uptake\n  * Altered blood pressure\n  * Increased muscle soreness\n  * Decreased muscle glycogen\n  * Altered resting heart rate and decreased heart rate variability\n  * Increased submaximal exercise heart rate\n  * Decreased lactate\n  * Increased creatine kinase\n  * Altered cortisol concentration\n  * Decreased total testosterone concentration\n  * Decreased ratio of total testosterone to cortisol\n  * Decreased ratio of free testosterone to cortisol\n  * Decreased ratio of total testosterone to sex hormone–binding globulin\n  * Decreased sympathetic tone (decreased nocturnal and resting catecholamines)\n  * Increased sympathetic stress response\n  * Change in mood states\n  * Decreased performance in psychomotor speed tests\n\n### Detraining\n\nDetraining is defined as the partial or complete loss of training-induced adaptations in response to an insufficient training stimulus ([95](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref95>), [96](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref96>)). Detraining is governed by the principle of training reversibility, which states that whereas physical training results in several physiological adaptations that enhance athletic performance, stopping or markedly reducing training induces a partial or complete reversal of these adaptations, compromising athletic performance. A distinction needs to be made with regard to cessation of training that results in a reversal of adaptations and tapering. Tapering is the planned reduction of volume of training (usually in duration and frequency but not intensity) that occurs before an athletic competition or a planned recovery microcycle. This type of reduction in training is designed to enhance athletic performance and adaptations.\n\nAerobic endurance adaptations are most sensitive to periods of inactivity because of their enzymatic basis. The exact cellular mechanisms that dictate detraining changes are unknown, and further research is needed to clarify the underlying physiological alterations. Two review articles ([95](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref95>), [96](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref96>)) address the factors that contribute to aerobic performance, most importantly V̇O2max and the factors determining V̇O2max (cardiac output and arteriovenous oxygen difference) and the impact of detraining. The authors discuss the impact of short-term (four weeks) ([95](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref95>)) and long-term (more than four weeks) ([96](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref96>)) detraining. In highly trained athletes, maximal oxygen uptake is reduced 4% to 14% with short-term ([22](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref22>), [90](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref90>)) and 6% to 20% with long-term detraining ([21](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref21>), [25](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref25>), [90](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref90>)). The reduction in V̇O2max is primarily a result of decreased blood volume ([20](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref20>)), decreased stroke volume ([20](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref20>), [21](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref21>)), decreased maximal cardiac output ([20](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref20>), [21](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref21>)), and increased submaximal heart rate ([20](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref20>), [23](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref23>), [25](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref25>), [89](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref89>)). The decrease in V̇O2max supports the loss of aerobic-related endurance performance ([20](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref20>), [21](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref21>), [23](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref23>), [25](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref25>), [60](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref60>), [89](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref89>)).\n\nProper exercise variation, intensity, maintenance programs, and active recovery periods can adequately protect against serious detraining effects ([29](<E6372RM_Refs_d104_split_006.xhtml#chapter6-ref29>))."

  - id: "ch06-conclusion"
    title: "Conclusion"
    level: 2
    tags: [conclusion]
    key_points:
      - "Aerobic endurance exercise produces many acute cardiovascular and respiratory responses, and aerobic endurance training produces many chronic adaptations."
    recall_prompts:
      - "Conclusion 的核心概念是什麼？"
    content: "\n\nAerobic endurance exercise produces many acute cardiovascular and respiratory responses, and aerobic endurance training produces many chronic adaptations. This information can be of particular value for developing the goals of a conditioning program and can provide a basis for clinical evaluation and the selection of parameters to be included in such an evaluation process. Knowledge of cardiovascular, respiratory, nervous, muscular, bone and connective tissue, and endocrine system responses to aerobic endurance training can help the strength and conditioning professional understand the scientific basis for aerobic conditioning and the adaptations to expect and monitor during training. Adaptations to specific types of exercise stimuli take place in the body. Optimal adaptations reflect careful design, implementation, and performance of strength and conditioning programs.\n\n### Key Terms\n\n  * alveoli\n  * anatomical dead space\n  * arteriovenous oxygen difference\n  * blood doping\n  * bradycardia\n  * cardiac output\n  * detraining\n  * diastole\n  * diastolic blood pressure\n  * diffusion\n  * double product\n  * ejection fraction\n  * end-diastolic volume\n  * erythropoietin (EPO)\n  * Fick equation\n  * Frank-Starling mechanism\n  * functional overreaching\n  * heart rate\n  * hyperoxic breathing\n  * hyperventilation\n  * maximal heart rate\n  * maximal oxygen uptake\n  * mean arterial pressure\n  * metabolic equivalent (MET)\n  * minute ventilation\n  * mitochondria\n  * myoglobin\n  * nonfunctional overreaching\n  * overreaching\n  * overtraining\n  * overtraining syndrome (OTS)\n  * oxygen uptake\n  * physiological dead space\n  * rate–pressure product\n  * stroke volume\n  * systole\n  * systolic blood pressure\n  * tapering\n  * tidal volume\n  * vasoconstriction\n  * vasodilation\n  * venous return\n  * ventilatory equivalent\n\n### Study Questions\n\n  1. A 17-year-old high school cross-country runner has been training aerobically for six months in preparation for the upcoming season. Which of the following adaptations will occur in the muscles during that time? \n     1. increased concentration of glycolytic enzymes\n     2. hyperplasia of Type II fibers\n     3. transformation from Type I to Type II fibers\n     4. hypertrophy of Type I fibers\n  2. The amount of blood ejected from the left ventricle during each beat is the \n     1. cardiac output\n     2. a-v̅O2 difference\n     3. heart rate\n     4. stroke volume\n  3. Which of the following does NOT normally increase during an aerobic exercise session? \n     1. end-diastolic volume\n     2. cardiac contractility\n     3. cardiac output\n     4. diastolic blood pressure\n  4. The mean arterial pressure is defined as the \n     1. average blood pressure throughout the cardiac cycle\n     2. average of the systolic and diastolic blood pressures\n     3. average systolic blood pressure during exercise\n     4. average of blood pressure and heart rate\n  5. Primary training adaptations of elite aerobically trained athletes include which of the following? \n     1. I. increased maximal oxygen uptake\n     2. II. decreased blood lactate concentration\n     3. III. increased running economy\n     4. IV. decreased capillary density\n     1. I and III only\n     2. II and IV only\n     3. I, II, and III only\n     4. II, III, and IV only"
