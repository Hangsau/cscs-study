    recall_prompts:
      - "Hormonal Changes in Peripheral Blood 的核心概念是什麼？"
    content: "\n\nWe learn a lot about the physical stress of a workout on the human body by monitoring various measures, including the changes in hormone concentrations in the blood. This is just one biocompartment that can be monitored, and it must be viewed in the context of all of the other processes stimulating muscle and protein synthesis (e.g., neural factors, the branched-chain amino acid leucine). Hormone concentrations can be determined from blood samples drawn from athletes at various stages of exercise and training. One can also measure hormones in the fluid surrounding the muscle or within the muscle itself ([151](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref151>)). Although interpretation of blood concentrations of hormones can be tricky, as this is only one part of the whole hormonal response puzzle, such data provide an indication of the status or responses of the glands or of the functional status of the mechanisms controlled by the hormone. It should be noted that peripheral concentrations of hormones in the blood do not indicate the status of the various receptor populations or the effects of a hormone within the cell. It is typically assumed, however, that large increases in hormone concentration indicate higher probabilities for interactions with receptors. There is little doubt that an increase in circulatory concentrations, in the absence of a plasma volume reduction, means that there was an increase in release from the endocrine glands. The physiological outcome from this increase now depends on the “status” of the receptor in the target tissue—that is, can the hormonal signal be realized in the cell by the binding to the receptor and the translation of the signal to the DNA machinery or other intracellular targets (e.g., mTOR pathway)? More difficult to interpret are decreases in hormonal concentrations that might indicate several possible fates for the hormone, including higher uptake into the target tissue receptors, greater degradation of the hormone, decreased secretion of the hormone, or some combination of these. In addition to these direct effects on hormones, many different physiological mechanisms contribute in varying degrees to the observed changes in peripheral blood concentrations of hormones with exercise, including circadian pattern, fluid volume shifts (exercise tends to push fluid from the blood to the intercellular compartment), tissue clearance rates (time spent in a tissue), venous pooling of blood, and hormone interactions with binding proteins ([18](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref18>), [24](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref24>), [25](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref25>), [89](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref89>)). These mechanisms interact to produce a certain concentration of a hormone in the blood, which influences the potential for interaction with the receptors in target tissue and their subsequent secondary effects, leading to the final effect of the hormone on a cell. Thus, when one is determining the specific effects of exercise on hormones, one must consider many different interpretations. An increase in hormonal concentrations in the blood is not a prerequisite for seeing gains in muscle size or strength but does represent an increased activation for hormonal release of the endocrine gland involved.\n\nHormone responses are tightly linked to the characteristics of the resistance exercise protocol."

  - id: "ch04-adaptations-in-the-endocrine-system"
    title: "Adaptations in the Endocrine System"
    level: 2
    tags: [adaptations, endocrine, system]
    key_points:
      - "Although organs such as muscle and connective tissue are the ultimate targets of most resistance training programs, many adaptations occur within the endocrine system as well."
    recall_prompts:
      - "Adaptations in the Endocrine System 的核心概念是什麼？"
    content: "\n\nAlthough organs such as muscle and connective tissue are the ultimate targets of most resistance training programs, many adaptations occur within the endocrine system as well. In other words, when one trains muscles, endocrine glands are also being trained. As noted before, the involvement of any endocrine gland is dependent on how much support is needed by that gland’s secretions to support the activated motor units. If one just does wrist curls for sets of 15, it is doubtful that any endocrine gland will be stimulated to increase release of hormones, as the normal homeostatic concentration of hormones going though circulation would be able to meet the needs of such a minor muscle group exercise. However, local receptors would be upregulated in the muscle tissue involved to meet the needs for the motor units used for that exercise. Adaptations are related to changes in the target organs and the toleration of exercise stress. The potential for adaptation in the endocrine system, with so many different sites and mechanisms that can be affected, is great. The following are examples of the potential types of adaptation that are possible:\n\n  * Amount of synthesis and storage of hormones\n  * Transport of hormones via binding proteins\n  * Time needed for the clearance of hormones through liver and other tissues\n  * Amount of hormonal degradation that takes place over a given period of time\n  * How much blood-to-tissue fluid shift occurs with exercise stress\n  * How tightly the hormone binds to its receptor (receptor affinity); this is an uncommon response to exercise training\n  * How many receptors are in the tissue\n  * The change in the content and in some cases the size of the secretory cells in the gland\n  * The magnitude of the signal sent to the cell nucleus by the H-RC or secondary messenger\n  * The degree of interaction with the cell nucleus (which dictates how much muscle protein to produce)\n\nHormones are secreted in response to a need for homeostatic control in the body; the endocrine system is part of an overall strategy to bring physiological functions back into normal range ([60](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref60>)). These homeostatic mechanisms controlled by the endocrine system can be activated in response to an acute (immediate) resistance exercise stress or can be altered by chronic (over longer periods of time) resistance training ([32](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref32>), [55](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref55>), [57](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref57>), [64](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref64>), [73](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref73>), [81](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref81>), [172](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref172>), [173](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref173>), [184](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref184>)). The mechanism that mediates acute homeostatic changes to acute resistance exercise stress is typically a sharp increase or decrease in hormonal concentrations to regulate a physiological variable, such as glucose level. A more subtle increase or decrease usually occurs in chronic resting hormonal concentrations in response to resistance training ([172](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref172>))."

  - id: "ch04-testosterone"
    title: "Primary Anabolic Hormones / Testosterone"
    level: 3
    tags: [primary, anabolic, hormones, testosterone]
    key_points:
      - "Testosterone is the primary androgen that interacts with skeletal muscle tissue; dihydrotestosterone is the primary androgen that interacts with sex-linked tissues (e."
    recall_prompts:
      - "Testosterone 是什麼？有哪些類型或應用？"
    content: "\n\nTestosterone is the primary androgen that interacts with skeletal muscle tissue; dihydrotestosterone is the primary androgen that interacts with sex-linked tissues (e.g., prostate in men). Although circulating testosterone concentration is important for the anabolic signal, it is the binding of testosterone to its receptor that is the key to stimulating anabolic functions. Therefore, an increase in circulating testosterone (free, bound, or both) concentration is not an absolute marker of this event. However, increased testosterone concentration does provide an indirect marker of motor unit activation and metabolic demands beyond hemostatic conditions and typically is associated with increased receptor binding. Heavy resistance training using one or two repetitions in low volume, which may not cause any changes in testosterone concentrations after a workout, could potentially still increase the absolute number of receptors and thus binding sites available to testosterone; however, this effect on receptors has yet to be fully elucidated ([171](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref171>), [188](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref188>)). Nevertheless, change in testosterone concentrations is a dramatic anabolic signal for target tissues throughout the body.\n\nCirculating testosterone was proposed as a physiological marker for both men and women for evaluating the anabolic status of the body ([70](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref70>), [129](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref129>)). The hormonal control of testosterone release has been reviewed in detail ([31](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref31>), [61](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref61>), [97](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref97>), [106](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref106>), [189](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref189>)). Testosterone has both direct and indirect effects on muscle tissue. It can promote growth hormone release from the pituitary, which can influence protein synthesis in muscle; and in turn growth hormone appears to have a permissive or synergistic effect on testosterone’s promotion of protein synthesis ([138](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref138>)). The potential interactions with other hormones and other signaling systems demonstrate the highly interdependent nature of the neuroendocrine–immune system in influencing the strength and size of skeletal muscles. The effects of testosterone on the development of strength and muscle size are also related to the influence of testosterone on the nervous system ([12](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref12>), [90](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref90>)). For example, testosterone can interact with receptors on neurons, increase the amounts of neurotransmitters, and influence structural protein changes. Each of these interactions can enhance the force production potential and mass of the innervated muscle.\n\nFollowing secretion in the blood circulation from the testes in men and the ovaries and adrenal glands in women, testosterone is transported to target tissues by a binding protein (largely sex hormone–binding globulin and albumin). At the target tissue, testosterone disassociates from the binding protein and crosses the cell membrane in order to bind to the intracellular androgen receptor. Research studies have shown that testosterone also binds to cell membrane receptors. This binding allows a rapid intracellular effect of testosterone, such as calcium release, to occur ([36](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref36>), [186](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref186>)). The knowledge of hormone receptors and their cellular effects is rapidly growing, and the future promises to bring new discoveries that will further elucidate this content area.\n\nIncreases in peripheral blood concentrations of testosterone have been observed in men during and following many types of high-intensity aerobic endurance exercise ([119](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref119>)) as well as resistance exercise ([60](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref60>)). Although not a consistent finding, some data show small testosterone, especially for free testosterone, increases in women after resistance exercise ([188](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref188>)). Variations in testosterone’s cellular actions consequent to resistance exercise thus may be attributed to differences in the cell membrane, perhaps because of the forces placed on membranes with resistance exercise, or to different feedback mechanisms sending signals to the higher brain centers (e.g., higher levels of testosterone feeding back on the brain to decrease luteinizing hormone secretion). Furthermore, receptor interactions may be quite different under different exercise conditions due to the differential force on the membrane ([31](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref31>)). High-intensity aerobic endurance exercise can cause a dramatic catabolic tissue response, and increases in testosterone may be related to the need for protein synthesis to keep up with protein loss ([179](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref179>), [180](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref180>)). Despite increased testosterone, hypertrophy does not typically take place with aerobic endurance training ([119](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref119>)). In fact, oxidative stress may actually promote a decrease in muscle fiber size in order to optimize oxygen transport into the cell ([119](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref119>)). Without the proper exercise stimulus, the cellular mechanisms that mediate muscle fiber growth are not activated to the extent that hypertrophy occurs.\n\nIn boys and younger men (<18 years), several factors appear to influence acute serum testosterone concentrations and might affect whether significant increases occur during or following exercise. Key among these factors is the onset of puberty. Since testosterone production in prepubescent boys is very low, these boys lack sufficient quantities to induce noteworthy hypertrophy. Independently or in various combinations, several exercise variables can increase serum testosterone concentrations in boys and younger men ([38](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref38>), [57](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref57>), [100](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref100>), [115](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref115>)):\n\n  * Large muscle group exercises (e.g., deadlift, power clean, squats)\n  * Heavy resistance (85-95% of 1RM)\n  * Moderate to high volume of exercise, achieved with multiple sets, multiple exercises, or both\n  * Moderate rest intervals (2 minutes)\n  * Two years or more of resistance training experience\n\nIncreases in serum total testosterone in men are evident when blood is sampled before and immediately after exercise protocols that use very large muscle groups: deadlifts, for example, but not bench presses ([38](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref38>), [68](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref68>), [74](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref74>), [114](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref114>), [190](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref190>)). When blood is sampled 4 or more hours after exercise and not immediately following it, other factors, such as diurnal variations (normal fluctuations in hormone levels throughout the day) or recovery phenomena, can affect the magnitude or direction of the acute stress response ([32](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref32>)). Additionally, possible rebounds or decreases in testosterone blood values over time may reflect augmentation or depression of diurnal variations ([103](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref103>)), making interpretation of late blood samples yet more difficult. Recent evidence demonstrates that acute resistance exercise does not appear to affect the diurnal changes in testosterone ([122](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref122>), [163](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref163>)). In men, testosterone concentrations are typically highest in the morning and drop with time through the day, but increases can occur at any point in the circadian pattern with exercise. However, the magnitude of change is smaller when resting concentrations are smaller, thus leading to lower absolute concentrations with exercise despite the fact that increases do occur. To date, time of day of strength training (e.g., morning or afternoon) has not been shown to have significant effects on the resting total testosterone concentrations, its diurnal pattern, or the absolute increase in maximum strength ([163](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref163>)). Women have much lower concentrations of serum testosterone and little variation in concentrations during the day (although there are limited data to support the latter contention). However, the response of their androgen receptors is very dynamic with a much faster upregulation than in men, likely to better use the amount of testosterone present with a resistance exercise stimulus ([188](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref188>)). Thus, an elevation in testosterone in the blood in women following resistance exercise might have an impact as it is more quickly responded to with receptor changes to use the newly available testosterone in the blood.\n\nLarge muscle group exercises using an adequate volume of total work result in acute increased total testosterone concentrations in men.\n\n#### Free Testosterone and Sex Hormone–Binding Globulin\n\nThe acute exercise responses of free testosterone (testosterone not bound to a binding protein, such as sex hormone–binding globulin for transport) are beginning to be better understood. Free testosterone accounts for only 0.5% to 2% of total testosterone; thus higher total testosterone concentration allows for more free testosterone. Heavy resistance exercise (e.g., six sets of 10 repetitions at 80% of 1RM) can acutely increase free testosterone in men and women, although the increase is much smaller for women ([188](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref188>)). For men, Kraemer and colleagues ([120](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref120>)) showed that age appears to affect free testosterone responses to resistance exercise. In other words, younger (i.e., 30-year-old) men had higher concentrations of free testosterone after a workout than older (i.e., 62-year-old) men. This might indicate greater biological potential for testosterone to interact with the target tissues in younger men. The so-called free hormone hypothesis states that it is only the free hormone that interacts with target tissues. Nevertheless, the bound hormone could significantly influence the rate of hormone delivery to a target tissue, such as muscle, and this may be an advantage that younger men have over older men after a workout ([34](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref34>)). That is, younger men have more absolute values for total testosterone and thus more free testosterone on a percentage value of total than older men.\n\nThe role, regulation, and interaction of binding proteins and their interactions with cells also present interesting possibilities for force production improvements, especially for women, whose total amount of testosterone is very low in comparison with that of men. Muscle cell stimulation of growth keeps testosterone around longer in a bound state. In fact, the binding protein itself may act as a hormone with biological activity ([159](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref159>)). The biological role of various binding proteins appears to be an important factor in tissue interactions ([71](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref71>), [72](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref72>), [75](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref75>), [159](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref159>)). Studies by Kvorning and colleagues ([130](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref130>), [131](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref131>)) have demonstrated that for younger men, testosterone is a major player in the anabolic responses to resistance training. When subjects were given luteinizing hormone blockers, which resulted in very low testosterone concentrations but did not affect other anabolic signaling systems, gains in muscle strength and lean tissue mass were reduced when compared to those of normally functioning men with normal testosterone concentrations. These classic studies demonstrate how important endogenous testosterone is in the adaptive mechanisms for resistance training adaptations.\n\n#### Testosterone Responses in Women\n\nTestosterone is the primary male sex hormone. Women have about 15- to 20-fold lower concentrations of circulating testosterone than men do. Most studies have not been able to demonstrate an acute increase in testosterone following a resistance exercise workout for women; data show that if increases do occur, they are relatively small ([26](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref26>), [38](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref38>), [76](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref76>), [81](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref81>), [114](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref114>), [190](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref190>)) and are sometimes observed only for free testosterone ([188](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref188>)). Yet in younger women, a small but significant increase in serum testosterone in response to six sets of 10RM squats has been observed ([144](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref144>)). In addition, Vingren and colleagues ([188](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref188>)) observed acute increases in free testosterone in men and women who were trained in response to a heavy resistance exercise protocol, but the concentrations in women were dramatically lower than in men (see [figure 4.5](<E6372ch04_d81.xhtml#f4.5>)). The testosterone concentration can vary substantially between individual women, as some women secrete higher concentrations of adrenal androgens. In one report, changes were observed in baseline concentrations of testosterone in women who exercised regularly compared with inactive controls ([26](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref26>)). Still, other studies have been unable to demonstrate changes in serum concentrations of testosterone with training ([38](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref38>), [76](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref76>), [81](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref81>), [114](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref114>), [190](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref190>)). However, again, the use of testosterone by the upregulation of skeletal muscle androgen receptors in a rapid manner, in about an hour, shows the great sensitivity that women have to increases in testosterone and the importance of its use ([188](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref188>)).\n\n**Figure 4.5** Responses of _(a)_ total testosterone and _(b)_ free testosterone in response to six sets of squats at 80% of 1RM with 2 minutes rest between sets. The midpoint (Mid) sample is after three sets; * indicates a significant increase from preexercise values; # indicates a significant difference from women at the corresponding time point.\n\n![A line graph of the change in total testosterone level in men and women before and after exercising.](images/E6372_508062_ebook.jpg)\n\n[Follow for extended description](<Ext_desc_E6372_508062_ebook.xhtml#l_E6372_508062_ebook>)\n\n![A line graph of the change in free testosterone level in men and women before and after exercising.](images/E6372_513648_ebook.jpg)\n\n[Follow for extended description](<Ext_desc_E6372_513648_ebook.xhtml#l_E6372_513648_ebook>)\n\nReprinted, with permission, from Vingren et al., 2009 ([188](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref188>)).\n\n#### Training Adaptations of Testosterone\n\nWe are still learning about the responses of testosterone to resistance training ([73](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref73>), [119](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref119>), [173](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref173>), [188](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref188>), [191](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref191>)). Importantly, one has to realize that testosterone increases in response to the demands of an exercise protocol; then the receptors either increase binding to use the elevated testosterone or they do not due to a lack of need for the signal to increase muscle-related metabolism. It may well be that other receptors on other target tissues (e.g., nervous, satellite cells) are more affected at certain time points in training depending on the window of adaptation available in the target tissues. So expecting increases in resting concentrations may be an outmoded concept; but one might expect an increase in the exercise-induced concentrations due to improved functional capacity and the ability to do more work in an exercise protocol. It appears that training time and experience may be very important factors in altering the resting and exercise-induced concentrations of this hormone. Its role in skeletal muscle might change, however, as upper limits of muscle cell size increases are achieved. In adult men, acute increases in testosterone are observed if the exercise stimulus is adequate (i.e., multiple sets, 5-10RM, adequate muscle mass used). In a classic study, Häkkinen and colleagues ([73](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref73>)) demonstrated that over the course of two years of training, even in elite weightlifters, small increases in resting serum testosterone concentrations do occur, concomitant with increases in follicle-stimulating hormone and luteinizing hormone, which are involved in regulation of testosterone production and are released and secreted from the anterior pituitary in response to signals from the brain via the hypothalamus. Testosterone might have a role in nervous system development in long-term training by augmenting the neural adaptations that occur for strength gain in highly trained strength and power athletes ([75](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref75>), [76](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref76>)). Furthermore, some studies have shown greater resistance training adaptation when the training program sessions induced acutely elevated testosterone concentrations ([78](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref78>), [158](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref158>)).\n\nResearch on the effect of resistance exercise and training on the androgen receptor (the receptor for testosterone) is limited; however, recently several studies have been published underscoring the current interest in this topic ([126](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref126>), [156](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref156>), [187](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref187>), [188](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref188>), [192](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref192>)). The findings vary, showing both increases and decreases in androgen receptor content; however, these differences might stem from variations in exercise protocols as well as the time point for tissue sampling. Despite these varying findings, it appears that resistance exercise and training ultimately increase the muscle androgen receptor content. With the increase in androgen receptor binding, the use of testosterone is enhanced. Additionally, nutritional intakes before a workout can cause upregulated skeletal muscle androgen content and are a reason why ingesting protein and some carbohydrate before a workout appears to be important ([126](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref126>))."

  - id: "ch04-growth-hormone"
    title: "Primary Anabolic Hormones / Growth Hormone"
    level: 3
    tags: [primary, anabolic, hormones, growth, hormone]
    key_points:
      - "There is a great amount of confusion about what GH is and what it is responsible for in the human body."
    recall_prompts:
      - "Growth Hormone 是什麼？有哪些類型或應用？"
    content: "\n\nThere is a great amount of confusion about what GH is and what it is responsible for in the human body. Growth hormone in recent years has taken on a new complexity in both exercise and medicine. The primary hormone that arises from the DNA machinery is the 191 amino acid polypeptide (called a monomer with molecular weight of 22 kDa) that is produced in the somatotroph of the anterior pituitary gland: in two types of somatotrophs, band 1 (containing smaller molecular weight forms, e.g., 22 kDa) and band 2 (containing large molecular weight forms such as aggregates). Due to the advances of the radioimmunoassay in the 1960s and 1970s, the 22 kDa has been the primary form that has been assessed in the blood; this has blinded our view of what is going on with the other larger concentrations of aggregate forms until recent years. It is now clear that the world of pituitary GH endocrinology is much more complex than previously appreciated when only the 22 kDa variant was investigated. The blood is filled with GH splice variants and, more importantly, its many aggregates (i.e., multiple disulfide bonds linking together GH monomers) in different molecular weight combinations. Additionally, making the scenario more complex is the presence of two types of GH binding proteins that also make higher molecular weight forms (e.g., GH monomer bound with a GH binding protein). At present, scientists are just starting to unravel the complex regulatory roles this superfamily plays. Interestingly, there is a much higher concentration of bioactive GH (i.e., aggregates) when compared to just the 22 kDa GH monomer. This leads one to believe that we have gotten only a small glimpse of what GHs are doing in the body. Demonstrating that we are not completely clear as to the physiological role of the 22 kDa monomer, in medicine it has been implicated in cancer involving its interactions with liver IGF-I release ([154](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref154>)). Thus, the aggregate forms of GH might be the important biologically functional relevant GH involved in adaptation to exercise ([128](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref128>)).\n\nAgain, the majority of studies in exercise endocrinology have examined the 22 kDa isoform due to the ease and popularity of immunoassays (often termed radioimmunoassay [RIA], enzyme-linked immunosorbent assay [ELISA], or enzyme immunoassay [EIA]). These techniques depend on antibody interactions to determine the amount present in the blood. The antibodies used are generally specific to the 22 kDa GH variant, and thus many other forms remain undetected or underdetected with such assay techniques. Nevertheless, the current model for the regulation and targets of various forms of GH is as shown in [figure 4.6](<E6372ch04_d81.xhtml#f4.6>). The multitude of physiological mechanisms and target tissues that have been linked to GH mediation have indicated for some time a need for a superfamily of hormones to achieve such diversity of effects.\n\n**Figure 4.6** Diagram of growth hormone cybernetics and interactions.\n\n![An illustration of the secretion of different hormones by hypothalamus, anterior pituitary, and liver.](images/E6372_508063_ebook.jpg)\n\n[Follow for extended description](<Ext_desc_E6372_508063_ebook.xhtml#l_E6372_508063_ebook>)\n\nGrowth hormone is important for the normal development of a child, but it also appears to play a vital role in adapting to the stress of resistance training. A study by McCall and colleagues ([139](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref139>)) found a positive correlation between GH responses and muscle fiber hypertrophy following 20 weeks of resistance training, yet it is possible that other GH variants followed a pattern of increase similar to that of the 22 kDa form and could also explain the relationship. This highlights the problems with using simple regression to determine a hormone’s effects; and since “cause and effect” is not dictated by simple regression, great caution is needed with such interpretations for any hormone. The target tissues for GH are highly variable, and different molecular weight variants have different target tissues, which include bone, immune cells, skeletal muscle, fat cells, and liver tissue. The main physiological roles of GH and its superfamily are the following (albeit clarity is lacking as to which molecular form of the GH superfamily is directly responsible for the given role):\n\n  * Decreases glucose utilization\n  * Decreases glycogen synthesis\n  * Increases amino acid transport across cell membranes\n  * Increases protein synthesis\n  * Increases utilization of fatty acids\n  * Increases lipolysis (fat breakdown)\n  * Increases availability of glucose and amino acids\n  * Increases collagen synthesis\n  * Stimulates cartilage growth\n  * Increases retention of nitrogen, sodium, potassium, and phosphorus\n  * Increases renal plasma flow and filtration\n  * Promotes compensatory renal hypertrophy\n  * Enhances immune cell function\n\nThe secretion of GHs is regulated by a complex system of neuroendocrine feedback mechanisms ([23](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref23>), [39](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref39>), [128](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref128>), [136](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref136>), [157](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref157>), [170](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref170>), [193](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref193>)). Many of the hormone’s actions might be mediated by a secondary set of hormones or even be the result of other GH forms, but GH in its many forms interacts directly with target tissues. The 22 kDa GH form both stimulates the release of IGFs at the autocrine level of the cell, contributing to the overall changes in IGFs in the body, and increases the availability of amino acids for protein synthesis. This results in conditions that promote tissue repair in general and perhaps in recovery following resistance exercise. Insulin-like growth factor may be released from nonhepatic tissues (e.g., fat, white blood cells), including muscle itself, which may not produce as much endogenous IGF as other body tissues ([28](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref28>), [45](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref45>), [77](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref77>)). Nevertheless, GH plays a crucial role in direct cellular interactions as one of the most potent anabolic hormones ([139](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref139>)). The secretion of the 22 kDa GH, and thus the amount in the blood, varies according to time of day, with the highest levels observed at night during sleep ([40](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref40>), [98](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref98>), [170](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref170>)). However, the higher amounts of bioactive GH have not been shown to have a circadian pattern. The 22 kDa form of release of GH is pulsatile, or burst-like; these pulses also have different amplitudes throughout the day, and exercise appears to increase their amplitude and number. It has been hypothesized that nocturnal increases are involved in various tissue repair mechanisms in the body. Thus, it is possible that GH secretion and release may directly influence adaptations of the contractile unit of muscle and subsequent expression of strength ([139](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref139>)). Various external factors, such as age, male versus female sex, sleep, nutrition, alcohol consumption, and exercise, all alter GH release patterns ([16](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref16>), [17](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref17>), [19](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref19>), [152](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref152>), [185](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref185>)). Growth hormone is released into the peripheral circulation, where it attaches to specific binding proteins, which represent the extracellular domain of the GH receptor. In general, GH acts by binding to plasma membrane–bound receptors on the target cells. The interactions with bioactive GH or its aggregates and splice variants remain a topic of current research as we now look at GH as having more than one molecular form ([65](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref65>), [125](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref125>), [181](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref181>)).\n\n#### Growth Hormone Responses to Stress\n\nPituitary hormones (e.g., proopiomelanocortin [POMC], GHs, and prolactin) respond to a variety of exercise stressors, including resistance exercise ([26](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref26>), [29](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref29>), [56](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref56>), [60](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref60>), [113](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref113>), [116](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref116>), [132](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref132>), [134](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref134>)). Growth hormone (22 kDa) concentrations increase in response to breath holding and hyperventilation alone ([33](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref33>)), as well as to hypoxia ([177](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref177>)). It appears that a substantial stimulus for 22 kDa GH release is increased hydrogen ion (drop in pH) and lactate concentrations ([64](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref64>)). Not all resistance exercise protocols demonstrate increased serum GH concentration. Vanhelder and colleagues ([184](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref184>)) observed that when a light load (28% of 7RM) was used with a high number of repetitions in each set, no changes in the serum concentration of the 22 kDa GH occurred. It appears that an intensity threshold must be reached in order to elicit a significant 22 kDa GH response to resistance exercise, especially when longer rest periods (>3 minutes) are used ([113](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref113>)). This may be due to the metabolic connection with glycolytic metabolism (at least for the 22 kDa variant).\n\nDepending on the load, rest, exercise volume, and exercise selection of a resistance exercise protocol, different 22 kDa GH responses occur ([5](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref5>), [43](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref43>), [44](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref44>), [139](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref139>), [143](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref143>), [166](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref166>), [167](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref167>), [174](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref174>)). In a study designed to determine the different variables related to GH increases, Kraemer and colleagues ([113](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref113>)) found that serum increases in the 22 kDa GH are differentially sensitive to the volume of exercise, the amount of rest between sets (less rest, higher 22 kDa GH), and the resistance used (10RM produces higher lactate values and higher 22 kDa GH responses). When the intensity used was 10RM (heavy resistance) with three sets of each exercise (high total work, approximately 60,000 J) and short (1-minute) rest periods, large increases were observed in serum 22 kDa GH concentrations. The most dramatic increases occurred in response to a 1-minute rest period when the duration of exercise was longer (10RM vs. 5RM). Because such differences are related to the configuration of the exercise session (e.g., rest period length), it appears that greater attention needs to be given to program design variables when physiological adaptations to resistance training are being evaluated.\n\nGrowth hormone release is affected by the type of resistance training protocol used including the duration of rest period. Short rest period types of workouts result in greater serum concentrations compared to long rest protocols of similar total work; however, at present it is not clear how the various molecular forms (e.g., aggregates and splice variants) or types of GH are affected by rest period duration.\n\n#### Growth Hormone Responses in Women\n\nThroughout the menstrual cycle, women have higher blood concentrations of the 22 kDa GH than men due to greater frequency and amplitude of secretion. Hormone concentrations and hormone responses to exercise vary with menstrual phase ([29](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref29>)), although the mechanisms of this variation are unclear. Kraemer and colleagues ([114](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref114>), [117](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref117>)) found that during the early follicular phase of the menstrual cycle, women had significantly higher 22 kDa GH concentrations at rest compared with men. Furthermore, with use of a heavy resistance exercise protocol characterized by long rest periods (3 minutes) and heavy loads (5RM), 22 kDa GH concentrations did not increase above resting concentrations. However, when a short-rest (1 minute) and moderate-resistance (10RM) exercise protocol was used, significant increases in serum 22 kDa GH values were observed. Hormonal response patterns to different resistance exercise routines may vary over the course of the menstrual cycle owing to alterations in resting levels ([114](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref114>), [117](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref117>)); furthermore, the use of hormonal contraception (e.g., estrogen-containing birth control pills) appears to increase the 22 kDa GH response to resistance exercise ([127](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref127>)). However, the response patterns of men and women to the same resistance exercise protocol are similar when workouts (e.g., short rest results in a higher 22 kDa GH elevation compared to long rest period workouts) are compared ([114](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref114>)).\n\nStudies show that the bioactive GH is also made of many different molecular sizes based on what molecular sizes bind together (e.g., two monomers bound together results in a dimer or a 44 kDa form, and so on as GH monomers are added together) ([128](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref128>)). Interestingly, in women, bioactive GH has been shown to be altered by resistance training. It appears that the resting concentrations are increased while little change occurs in the 22 kDa form ([125](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref125>)). In addition, concentrations of bioactive GH are not as high in older women as in younger women, and resistance exercise is a more potent stimulus to bioactive GH than endurance exercise ([65](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref65>)). Initial research showed that contraceptives also have minimal effects on bioactive GH forms. Furthermore, higher concentrations of bioactive GH are observed in women who have greater strength, also suggesting the importance of the higher aggregated forms of GH ([123](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref123>)). These new insights on the GH hormone again demonstrate the potential complexity of the endocrine system and show that we have much more to learn about these important signals to tissues.\n\nThe effects of periodizing resistance training over the course of the menstrual cycle remain to be examined, and more research is needed to elucidate any sex-related neuroendocrine adaptation mechanism ([43](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref43>)). At present, women’s reduced concentrations of testosterone and different resting hormonal concentrations over the course of the menstrual cycle appear to be their most striking neuroendocrine differences from men.\n\n#### Training Adaptations of Growth Hormone\n\nIt appears that GH concentrations need to be measured over longer time periods (2-24 hours) to show whether changes occur with resistance training. The area under the time curve, which includes an array of pulsatile effects, tells whether changes in release have occurred. The responses of GH to resistance training have not been extensively studied, but observations of normal, single measurements of resting 22 kDa GH concentrations in elite lifters suggest little change. It is likely that differences in feedback mechanisms, changes in receptor sensitivities, IGF potentiation, diurnal variations, and maximal exercise concentrations may mediate GH adaptations with resistance training. The typical trends for training-related changes in GH appear to be a reduction in 22 kDa GH response to an absolute exercise stress and alterations in 22 kDa GH pulsatility characteristics. The reduction in the 22 kDa GH exercise-induced responses with training perhaps indicates potential interactions with other molecular weight forms. Individual responses over a nine-month period were highly variable, with no significant group changes over time in a group of elite weightlifters (unpublished observations). This likely means that higher amounts of aggregate GH were being produced; the 22 kDa form is becoming less important as the study of the pituitary gland continues due to the majority of GH being held in aggregate or bound form. This is a hot area of current and future research. As already noted, initial data indicate that resting concentrations and some molecular weight forms of GH are also influenced by long-term resistance training in women ([125](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref125>)). At present it would appear that the exercise-induced responses of the 22 kDa GH are what change with training with little change in the resting concentrations, except for small menstrual phase increases and decreases. For the bioactive GH in contrast to the 22 kDa monomere GH form, it is the resting concentrations that may see the most changes with subtle alterations in some bioactive fractions of higher than 22 kDa molecular weight ([125](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref125>)). Still, we are far from understanding how GH changes with long-term resistance training."

  - id: "ch04-insulin-like-growth-factors"
    title: "Primary Anabolic Hormones / Insulin-Like Growth Factors"
    level: 3
    tags: [primary, anabolic, hormones, insulin, like, growth]
    key_points:
      - "Some of the effects of 22 kDa GH are mediated through small polypeptides called _insulin-like growth factors (IGFs)_ or _somatomedins_ ([27](<E6372RM_Refs_d104_split_004."
    recall_prompts:
      - "Insulin-Like Growth Factors 是什麼？有哪些類型或應用？"
    content: "\n\nSome of the effects of 22 kDa GH are mediated through small polypeptides called _insulin-like growth factors (IGFs)_ or _somatomedins_ ([27](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref27>), [37](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref37>), [45](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref45>)). It has been postulated that an IGF superfamily might be important as a biomarker for health and performance ([145](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref145>), [150](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref150>)). Insulin-like growth factor I is a 70 amino acid polypeptide, and IGF-II is a 67 amino acid polypeptide; the function of the latter is less clear. Again, a superfamily of peptides exists along with binding proteins. The liver secretes IGFs after 22 kDa GH stimulates liver cells to synthesize IGFs. Besides GH, factors such as thyroid hormone and testosterone are also involved in the regulation of IGF synthesis (193-196). Typical of many polypeptide hormones, both growth factors are synthesized as larger precursor molecules, which then undergo processing to form the other variants of the active hormones themselves. Insulin-like growth factors travel in the blood bound to binding proteins; in the target tissue, IGFs disassociate from the binding protein and interact with the receptors ([1](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref1>), [175](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref175>), [176](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref176>)). Blood levels of IGFs are usually measured as either total levels (bound plus free) or free IGF concentrations.\n\nAt least six different circulating binding proteins that regulate the amount of IGF available for receptor interaction have been identified: IGF-I binding proteins 1 to 6, with binding protein-1 and binding protein-3 the most extensively studied in terms of their response to exercise. Each binding protein responds to exercise stress independently and has its own biological actions.\n\nBinding proteins are important factors in the transport and physiological mechanisms of IGF ([22](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref22>), [23](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref23>), [49](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref49>)). Insulin-like growth factor has been shown to stimulate the secretion of its own binding proteins from within the muscle cell itself, thus modulating the cell’s responsiveness to IGF ([140](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref140>)). The circulating IGF binding proteins play an important role in restricting access of the IGF peptides to receptors and are influenced by 22 kDa GH concentrations. Other factors, such as nutritional status and insulin levels, also have been shown to be important signal mechanisms for IGF release. The nutritional influence on IGF transport, production, and regulatory control is a dramatic variable affecting its cellular interactions. Acute changes in nitrogen balance and protein intake and nutritional status affect a variety of mechanisms ([22](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref22>), [121](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref121>), [139](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref139>)). It also appears that binding proteins act as a reservoir of IGF, and release from the binding proteins is signaled by the availability of a receptor on the cell ([13](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref13>)). This allows IGF to be viable for a longer period of time and could theoretically reduce the amount of degradation of IGF.\n\nIn strength training, many of these mechanisms are influenced by the exercise stress; by acute hormonal responses; and by the need for muscle, nerve, and bone tissue remodeling at the cellular level ([20](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref20>), [79](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref79>), [83](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref83>), [168](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref168>)). The dramatic interactions of multiple hormones and receptors provide powerful adaptive mechanisms in response to resistance training and can contribute to the subsequent changes in muscular strength and size.\n\n#### Exercise Responses of Insulin-Like Growth Factors\n\nInsulin-like growth factor I has been the primary IGF studied in the context of exercise because of its prolific role in protein anabolism ([146](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref146>), [150](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref150>)). It too is a superfamily of polypeptides and binding proteins with dramatic implications for health and performance ([148](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref148>)). The exact reasons for acute increases in blood levels of IGF-I are unknown but are probably related to the disruption of various cells, including fat and muscle cells, because these cells manufacture and store IGF ([183](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref183>)). Insulin-like growth factor I exists across different biocompartments (blood, interstitial fluid [ISF], and muscle), and whether circulating IGF-I responses to exercise reflect what is going on in local fluids surrounding the muscle has been examined. In that study of men and women, it was shown that the increase in circulating total and free IGF-I was not correlated with increases in interstitial fluid IGF-I concentrations or muscle IGF-I protein content ([151](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref151>)). Such data indicated that exercise-induced increases in circulating IGF-I are not reflective of local IGF-I signaling that is taking place, showing that circulating concentrations are but one view of the endocrine response patterns. It takes 8 to 24 hours for IGF to be produced and released from the liver following stimulation by GH ([9](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref9>), [30](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref30>)). This seems to indicate that IGF is released from storage sources other than the liver, that release is due to cellular disruption of cells that already contain IGF, or that GH-mediated release of IGF with certain types of exercise has a different time course from that in injection–response studies. Systematic alterations in circulatory concentrations of IGF in response to various types of exercise protocols appear to be closely related to regulatory factors of IGF release and transport ([13](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref13>)). Evaluation of serum changes over longer periods is necessary for assessment of specific effects and relationships to GH in the serum ([46](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref46>)). In women and men, IGF-I has remained stable despite improvements in strength and power over a two-month training program ([147](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref147>)). Exercise-related increases seem to occur more readily if resting concentrations are of a lower value (e.g., 10 to 20 nmol/L). Thus, the stability of resting concentrations may be affected by the absolute amounts of IGF-I in circulation. With training, higher resting concentrations (e.g., 35-45 nmol/L) can make acute exercise-induced increases less probable. Importantly, free forms that are not bound to any binding protein may be the effective elements that influence target tissues ([66](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref66>), [149](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref149>), [160](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref160>)), especially skeletal muscle.\n\nThe autocrine and perhaps paracrine release mechanisms of IGF-I may be paramount in the IGF-I influence on muscle. At rest, fat cells contain relatively high concentrations of IGF, and skeletal muscle has very little of its own. However, mechanical stimulation, overload, and stretch of muscle cells, as in resistance exercise, cause them to substantially increase their production of IGF-I. Insulin-like growth factor I produced in muscle is often referred to as mechano growth factor, and it exerts autocrine functions ([63](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref63>), [141](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref141>)). It has been suggested that autocrine actions of mechano growth factor are the primary actions of IGF-I in muscle. It has also been proposed that IGF-I splice variants may regulate myoblast differentiation through the actions of mature IGF-I and not the E peptides, so examination of this topic remains of great interest ([137](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref137>)). It is possible that IGF may be released from nonhepatic cells without the mediation of GH ([1](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref1>), [2](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref2>), [45](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref45>), [77](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref77>), [82](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref82>), [83](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref83>)). In addition, cells may produce and keep IGFs so that the IGFs exert their effect without entering the peripheral circulation.\n\nAlthough IGF-I has been shown to be responsive to exercise in some studies, this does not follow a classic endocrine response (i.e., stimulus of gland by exercise resulting in hormone release into the blood) in all cases. It was shown that IGF-I was responsive to resistance exercise in men and women, but in those studies the starting concentrations were lower ([113](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref113>), [114](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref114>)). In another study the concentrations were higher and, despite increases in immunoreactive (22 kDa) GH, no increase in IGF-I was observed ([118](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref118>)). From these studies it has been theorized that the starting level of IGF-I may be a factor in determining whether an increase is observed with exercise (i.e., no increases if starting concentrations are high, an increase if starting concentrations are low). A study by Kraemer and colleagues ([121](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref121>)) supported this theory, but it was also shown that the IGF-I concentrations were more sensitive to acute caloric loads, which included carbohydrate and protein supplementation before and after a workout ([figure 4.7](<E6372ch04_d81.xhtml#f4.7>)).\n\n**Figure 4.7** Responses of insulin-like growth factor I to a multiple-set, heavy resistance exercise protocol on three consecutive days with and without nutritional supplementation of protein-carbohydrate (i.e., Mass fuel) before and during the 1-hour recovery period.\n\n![A line graph of the change in mass fuel and placebo on days 1 through 3.](images/E6372_508065_ebook.jpg)\n\n[Follow for extended description](<Ext_desc_E6372_508065_ebook.xhtml#l_E6372_508065_ebook>)\n\n† _p_ < 0.05 from corresponding placebo value.\n\nAdapted, by permission, from Kraemer et al. 1998 ([121](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref121>)).\n\n#### Training Adaptations of Insulin-Like Growth Factors\n\nResponses of IGF-I to heavy resistance training remain variable, but studies demonstrate that changes are based on the starting concentrations before training (i.e., if basal concentrations are low, IGF-I increases; if high, there is no change or it decreases) (W.J. Kraemer, unpublished data). Additionally, the intake of food or the level of caloric restriction (or both) influences the resting and exercise-induced concentrations in the blood ([80](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref80>), [109](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref109>)). In women, resistance training was shown to increase total IGF-I and reduced IGF binding protein-1 concentrations during acute resistance exercise, indicating that exercise mode-specific adaptations in the circulating IGF-I system can occur ([67](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref67>)). The effects of training are still an ongoing story as to the many different aspects of the IGF superfamily response patterns ([149](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref149>)). As with GH, training-induced adaptations in IGF-I are probably reflected in a variety of mechanisms related to type of IGFs, release, transport, and receptor interaction. Furthermore, the interaction with other anabolic hormones cannot be ignored, as these often target the same outcome (e.g., protein synthesis). Adaptations to heavy resistance training of IGF-I in the various tissues still requires further investigation."

  - id: "ch04-adrenal-hormones"
    title: "Adrenal Hormones"
    level: 2
    tags: [adrenal, hormones]
    key_points:
      - "The adrenal gland plays a crucial role in the fight-or-flight response phenomenon and has two major divisions: the medulla (center) and the cortex (shell)."
    recall_prompts:
      - "Adrenal Hormones 的核心概念是什麼？"
    content: "\n\nThe adrenal gland plays a crucial role in the fight-or-flight response phenomenon and has two major divisions: the medulla (center) and the cortex (shell). Both divisions respond to exercise stress. The adrenal medulla is stimulated directly by the nervous system and thus provides a fast and almost immediate response; the cortex is stimulated by adrenocorticotropic hormone (ACTH) released from the anterior pituitary. The adrenal hormones most important to training and conditioning are cortisol, a glucocorticoid from the adrenal cortex, and the catecholamines (epinephrine, norepinephrine, and dopamine) and enkephalin-containing polypeptides (e.g., peptide F) from the adrenal medulla ([95](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref95>), [104](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref104>), [109](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref109>), [116](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref116>), [182](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref182>)). Peptide F, a proenkephalin fragment, plays an important role in enhancing immune cell functions ([182](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref182>)). Thus, the adrenal medulla secretes hormones involved in both the immediate reaction to stress and the subsequent recovery from that stress.\n\n### Cortisol\n\nClassically, glucocorticoids, and more specifically cortisol in humans, have been viewed as catabolic hormones in skeletal muscle ([45](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref45>), [47](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref47>), [129](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref129>)). In reality, however, cortisol is a primary signal hormone for carbohydrate metabolism and is related to the glycogen stores in the muscle. When glycogen concentrations are low, other substrates (proteins) must be catabolized to produce energy and to support maintenance of blood glucose concentrations. Cortisol concentrations display a strong circadian pattern; concentration is greatest in the early morning and drops throughout the day. Thus the time of day is an important consideration when one is examining or comparing results for cortisol.\n\n#### Role of Cortisol\n\nCortisol exerts its major catabolic effects by stimulating the conversion of amino acids to carbohydrates, increasing the level of proteolytic enzymes (enzymes that break down proteins), inhibiting protein synthesis, and suppressing many glucose-dependent processes such as glycogenesis and immune cell function ([51](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref51>)). Cortisol has greater catabolic effects on Type II fibers, which might, at least in part, be because they have more protein than Type I fibers; but cortisol might still be involved with the control of degradation in Type I fibers.([162](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref162>)). Type I fibers rely more on reducing degradation to develop muscle hypertrophy, in contrast to the dramatic increases in synthesis used by Type II fibers to develop hypertrophy.\n\nIn situations of disease, joint immobilization, or injury, an elevation in cortisol mediates a nitrogen-wasting effect with a net loss of contractile protein. This results in muscle atrophy, with associated reductions in force production capability ([45](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref45>), [133](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref133>)). In the muscle, the anabolic effects of testosterone and insulin counter cortisol’s catabolic effects. If a greater number of receptors are bound with testosterone and this receptor complex then blocks the genetic element on the DNA to which cortisol and its receptor complex can bind, protein is conserved or enhanced. Conversely, if a greater number of receptors are bound to cortisol, protein is degraded and lost. The balance of anabolic and catabolic activities in the muscle affects the protein contractile unit, directly influencing strength. The acute increases in circulating cortisol following exercise also implicate acute inflammatory response mechanisms in tissue remodeling ([51](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref51>)).\n\n#### Resistance Exercise Responses of Cortisol\n\nAs with 22 kDa GH, it appears that cortisol increases with resistance exercise, most dramatically when rest periods are short or the total volume of work is high ([116](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref116>), [178](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref178>)). Increases in cortisol might not have negative effects in men after a period of training to which the body has adapted; adaptation “disinhibits” cortisol at the level of the testis, thereby maintaining testosterone’s primary influence on its nuclear receptors.\n\nCortisol responds to resistance exercise protocols that create a dramatic stimulus to anaerobic metabolism. It is interesting that selection among the acute program variables that produce the highest catabolic responses in the body also produces the greatest GH response ([116](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref116>), [166](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref166>), [178](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref178>)). Thus, though chronic high levels of cortisol have adverse effects, acute increases may be a part of a larger remodeling process in muscle tissue. Muscle must be disrupted to a certain extent (below injury levels) to remodel itself and enlarge; acute elevations in cortisol would help in this remodeling process by helping to remove damaged proteins.\n\nBecause of the catabolic role of cortisol, athletes and strength and conditioning professionals have much interest in its potential as a whole-body marker of tissue breakdown. To a certain extent, cortisol is such a marker, but the magnitude of increase may need to be greater than 800 nmol/L to indicate potential overtraining problems ([55](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref55>), [56](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref56>), [58](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref58>), [59](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref59>)). The testosterone-to-cortisol ratio also has been used in the attempt to determine the anabolic–catabolic status of the body ([70](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref70>)). Although such markers are attractive conceptually, serum cortisol measurements and the testosterone-to-cortisol ratio have met with only limited success in predicting or monitoring changes in strength and power capabilities ([124](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref124>)). Problems with these tests probably have to do with the multiple roles of cortisol and other hormones.\n\nFew studies have investigated the effect of resistance exercise on glucocorticoid receptors in muscle tissue, but recent data indicate that in trained men, significantly lower concentrations of receptors are found at rest and over a recovery period of 70 minutes after exercise when compared to those in women ([188](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref188>)). Concomitantly, women with the same exercise protocol decreased and then increased their androgen binding capacity over the 70 minutes following exercise, whereas men saw only a continual downregulation. This indicates that women dealing with a lower concentration of testosterone more rapidly upregulated androgen receptors whereas glucocorticoid receptors were already upregulated before the workout.\n\nInterestingly, for B lymphocytes, glucocorticoid receptor upregulation for men and women was observed before exercise (anticipatory), during, and after exercise for 1 hour ([52](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref52>)). Yet with a heavy 5RM protocol, women did not exhibit an increase in cortisol concentrations in the blood, whereas men did. This indicates a differential stimulus between the sexes, yet the receptor responses of immune cells to cortisol are similar. Such data indicate that different target tissues might respond differentially to cortisol as well as to other hormone signals.\n\nIt is probable that vast differences are observed in the physiological role of cortisol in acute versus chronic exercise responses to resistance exercise. Acute cortisol responses may reflect the metabolic stress of the exercise, and chronic aspects may be primarily involved with tissue homeostasis entailing protein metabolism ([45](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref45>), [51](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref51>)). Thus, cortisol’s role in overtraining, detraining, or injury may be critical when muscle tissue atrophy and decreases in force production capabilities are observed ([133](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref133>)). Such roles remain to be demonstrated; however, cortisol’s role in suppressing function of cells of the immune system (e.g., B and T cells) has a direct impact on the recovery and remodeling of skeletal muscle tissue. This impact of cortisol on immune cells can be dramatic, with the main effect one of “inactivating” immune cell functions, which partially contributes to the immune suppression observed after intense exercise stress ([51](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref51>)). With heavy resistance exercise, glucocorticoid receptor expression in B cells decreased with exercise and increased during recovery, demonstrating a greater binding, which in turn would reduce B cell activity during recovery ([52](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref52>)). The effects were somewhat attenuated in women compared to men of similar training levels, indicating a sex difference in the magnitude of the responses.\n\nResistance exercise protocols that use high volume, large muscle groups, and short rest periods result in increased serum cortisol values ([119](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref119>)). Though chronic high concentrations of cortisol may have adverse catabolic effects, acute increases still contribute to the remodeling of muscle tissue and maintenance of blood glucose.\n\n### Catecholamines\n\nThe catecholamines—primarily epinephrine but also norepinephrine and dopamine—are secreted by the adrenal medulla and are important for the acute expression of strength and power because the hormones act as central motor stimulators and peripheral vascular dilators and enhance enzyme systems and calcium release in muscle ([95](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref95>)). Thus, the resistance exercise–induced stress leads to events similar to the classic fight-or-flight response. The importance of catecholamines during resistance exercise was highlighted by the finding that men who had a higher catecholamine release immediately before and during a heavy resistance exercise session were able to better maintain force output throughout the session ([53](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref53>)). The role of catecholamines in growth-promoting actions in muscle tissue is less clear, but they act to stimulate other anabolic hormones.\n\n#### Role of Catecholamines\n\nThe physiological functions of epinephrine and norepinephrine in muscle are these:\n\n  * Increase force production via central mechanisms and increased metabolic enzyme activity\n  * Increase muscle contraction rate\n  * Increase blood pressure\n  * Increase energy availability\n  * Increase muscle blood flow (via vasodilation)\n  * Augment secretion rates of other hormones, such as testosterone\n\nCatecholamines appear to reflect the acute demands and physical stress of resistance exercise protocols ([105](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref105>)). A high-intensity (10RM), short-rest (10-60 seconds between sets and exercises), heavy resistance exercise routine (10 exercises, three sets) typically used by bodybuilders for development of strength and hypertrophy was shown to maintain increased plasma norepinephrine, epinephrine, and dopamine levels for 5 minutes into recovery ([105](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref105>)). In addition, epinephrine has been correlated to lactate concentrations with exercise stress. Adrenal responses are not involved in the recovery responses until the stress is removed. Some specific endogenous opioid peptides (i.e., proenkephalins) are secreted by the adrenal medulla and affect the immune system, which is critical in recovery from exercise stress ([182](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref182>)). If training is not varied, continued stress keeps the adrenal gland engaged, and recovery is delayed due to the secondary responses of cortisol and its negative effects on immune system cells and protein structures. Long-term continued high stress can even lead to adrenal exhaustion, at which point the ability of the adrenal medulla to release catecholamines is diminished.\n\n#### Training Adaptations of Catecholamines\n\nHeavy resistance training has been shown to increase the ability of an athlete to secrete greater amounts of epinephrine during maximal exercise ([104](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref104>)). It has also been suggested that training reduces epinephrine responses to a single bench press workout ([68](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref68>)). Because epinephrine is involved in metabolic control, force production, and the response mechanisms of other hormones (such as testosterone, GHs, and IGFs), stimulation of catecholamines is probably one of the first endocrine mechanisms to occur in response to resistance exercise.\n\n##### How Can Athletes Manipulate the Endocrine System With Resistance Training?\n\nGeneral Concepts\n\n  * The more muscle fibers recruited for an exercise, the greater the extent of potential remodeling process in the whole muscle.\n  * Only muscle fibers activated by resistance training are subject to adaptation, including hormonal adaptations to stress.\n\nTo Increase Serum Testosterone Concentrations\n\nSerum testosterone concentrations have been shown to increase acutely with use of these methods independently or in various combinations:\n\n  * Large muscle group exercises (e.g., deadlift, power clean, squats)\n  * Heavy resistance (85% to 95% of 1RM)\n  * Moderate to high volume of exercise, achieved with multiple sets or multiple exercises\n  * Short rest intervals (30-60 seconds)\n\nTo Increase 22 kDa Growth Hormone Concentrations\n\nGrowth hormone levels have been shown to increase acutely with use of either of these methods or both in combination:\n\n  * Use workouts with higher lactate concentrations and associated acid–base disruptions; that is, use high intensity (10RM, or heavy resistance) with three sets of each exercise (high total work) and short (1-minute) rest periods.\n  * Supplement diet with carbohydrate and protein before and after workouts.\n\nTo Optimize Responses of Adrenal Hormones\n\n  * Use high volume, large muscle groups, and short rest periods to expose the body to an adrenergic stress. But be careful to vary the training protocol and the rest period length from short to long over time, provide days of complete rest, and use lower-volume workouts to allow the adrenal gland to engage in recovery processes, to reduce stress on the adrenal medulla so as not to experience adrenergic exhaustion, and to reduce stress on the adrenal cortex and prevent chronic cortisol secretions from the adrenal cortex. This way, the stress of the exercises will not result in a nonfunctional overreaching or overtraining.\n\nTraining protocols must be varied to allow the adrenal gland to engage in recovery processes and to prevent the secondary responses of cortisol, which can have negative effects on the immune system and protein structures."

  - id: "ch04-other-hormonal-considerations"
    title: "Other Hormonal Considerations"
    level: 2
    tags: [other, hormonal, considerations]
    key_points:
      - "A host of different hormones are involved in the maintenance of normal body function and in adaptive responses of the body to resistance training ([26](<E6372RM_Refs_d104_split_004."
    recall_prompts:
      - "Other Hormonal Considerations 的核心概念是什麼？"
    content: "\n\nA host of different hormones are involved in the maintenance of normal body function and in adaptive responses of the body to resistance training ([26](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref26>), [45](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref45>), [46](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref46>), [76](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref76>), [87](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref87>), [97](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref97>), [107](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref107>)). Although we might focus on one or two hormones for their roles in a particular physiological function, other hormones must create an optimal environment in which the primary hormonal actions can take place. Hormones such as insulin, thyroid hormones, and beta-endorphin have been implicated in growth, repair, pain analgesia, and exercise stress mechanisms; unfortunately, few data are available concerning their responses and adaptations to resistance exercise or training ([48](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref48>), [116](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref116>), [120](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref120>)). Owing to the relatively tight homeostatic control of both insulin and thyroid hormone secretion in healthy individuals, chronic training adaptations in circulating resting concentrations of these hormones would not be expected in that population. Although improvements in insulin resistance have been observed in healthy individuals following resistance training, these changes may reflect only an acute effect from the most recent exercise session ([15](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref15>)). It is more likely that longer-term changes such as 24-hour secretion rates, sensitivity of the receptors, and binding interactions would be affected. The effect of resistance exercise and training on thyroid hormones in healthy individuals has received little attention in the literature. McMurray and colleagues ([142](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref142>)) found that although the concentration of the thyroid hormone triiodothyronine (T3) was not affected acutely by a bout of resistance exercise, the concentration of thyroxine (T4), a precursor to T3, was elevated acutely and reduced during the subsequent night’s sleep. A more recent study did not find changes to T3 or T4 concentrations at 24, 48, or 72 hours after a bout of resistance exercise ([88](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref88>)). This suggests that any acute resistance exercise effects on thyroid hormones are brief. Transient reductions in T3 and T4 concentrations with long-term resistance training have been found after six months ([4](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref4>)) and three and five months ([4](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref4>), [153](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref153>)), respectively, but they returned to baseline concentrations after nine months of training. Although little change occurs for these hormones, they are very important for physiological adaptations to resistance training as they have permissive effects in metabolic control, amino acid synthesis, and augmentation of other hormonal release mechanisms."

  - id: "ch04-conclusion"
    title: "Conclusion"
    level: 2
    tags: [conclusion]
    key_points:
      - "As we continue to study the endocrine system and its interactions with the nervous system, the immune system, and the musculoskeletal system, we find that the functions of these systems are truly inte"
    recall_prompts:
      - "Conclusion 的核心概念是什麼？"
    content: "\n\nAs we continue to study the endocrine system and its interactions with the nervous system, the immune system, and the musculoskeletal system, we find that the functions of these systems are truly integrated and very complex. Signaling communication among systems is accomplished with hormones and other signaling molecules (e.g., cytokines, chemokines, molecular signal molecules). For years, strength and conditioning professionals and athletes have appreciated the importance of anabolic hormones for mediating changes in the body and helping with the adaptive response to heavy resistance training. Whether trying to optimize a workout or avoid overtraining, the strength and conditioning professional must remember that the endocrine system plays an important role. The goal of this chapter has been to provide an initial glimpse into this complex but also highly organized system that helps to mediate changes in the body with resistance exercise training.\n\n### Key Terms\n\n  * allosteric binding site\n  * anabolic hormone\n  * catabolic hormone\n  * cross-reactivity\n  * diurnal variation\n  * downregulation\n  * endocrine gland\n  * General Adaptation Syndrome\n  * hormone\n  * hormone–receptor complex (H-RC)\n  * lock-and-key theory\n  * neuroendocrine immunology\n  * neuroendocrinology\n  * polypeptide hormone\n  * proteolytic enzyme\n  * secondary messenger\n  * steroid hormone\n  * target tissue cell\n  * thyroid hormone\n\n### Study Questions\n\n  1. After a bout of resistance training, acute hormonal secretions provide all of the following information to the body EXCEPT \n     1. amount of physiological stress\n     2. metabolic demands of exercise\n     3. type of physiological stress\n     4. energy expended\n  2. Which of the following hormones enhance(s) muscle tissue growth? \n     1. I. growth hormone\n     2. II. cortisol\n     3. III. IGF-I\n     4. IV. progesterone\n     1. I and III only\n     2. II and IV only\n     3. I, II, and III only\n     4. II, III, and IV only\n  3. Which of the following is NOT a function of growth hormone? \n     1. increase lipolysis\n     2. decrease collagen synthesis\n     3. increase amino acid transport\n     4. decrease glucose utilization\n  4. Which of the following hormones has the greatest influence on neural changes? \n     1. growth hormone\n     2. testosterone\n     3. cortisol\n     4. IGF\n  5. What type of resistance training workout promotes the highest growth hormone increases following the exercise session? \n\nRest Volume Sets\n\n     1. 30 seconds High 3\n     2. 30 seconds Low 1\n     3. 3 minutes High 1\n     4. 3 minutes Low 3"
