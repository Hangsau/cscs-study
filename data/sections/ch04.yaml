  - id: "ch04-synthesis-storage-and-secretion-of-hormo"
    title: "Synthesis, Storage, and Secretion of Hormones"
    level: 2
    tags: [synthesis, storage, secretion, hormones]
    key_points:
      - "Hormones are chemical messengers or signal molecules that are synthesized, stored, and released into the blood by endocrine glands—body structures specialized for this function—and certain other cells"
    recall_prompts:
      - "Synthesis, Storage, and Secretion of Hormones 的核心概念是什麼？"
    content: "\n\nHormones are chemical messengers or signal molecules that are synthesized, stored, and released into the blood by endocrine glands—body structures specialized for this function—and certain other cells ([figure 4.1](<E6372ch04_d81.xhtml#f4.1>), [table 4.1](<E6372ch04_d81.xhtml#t4.1>)). Similarly, neurons synthesize, store, and secrete neurotransmitters, which may have hormonal functions. The relatively new term neuroendocrinology refers to the study of the interactions between the nervous system and the endocrine system. Typically, endocrine glands are stimulated to release hormones by a chemical signal received by receptors on the gland or by direct neural stimulation. For example, the adrenal medulla (the internal part of the adrenal gland) releases the hormone epinephrine upon neural stimulation from the brain ([91](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref91>), [104](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref104>), [112](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref112>), [182](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref182>)). The adrenal cortex (the outer part of the adrenal gland) synthesizes and secretes the hormone cortisol after stimulation by another hormone, adrenocorticotropic hormone, released from the pituitary gland ([110](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref110>), [111](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref111>), [116](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref116>)). Following stimulation, endocrine glands release hormones into the blood, which carries the hormones (and thereby the signal) to hormone-specific receptors located on the surface (peptide hormones) or in the cytosol (steroid hormones and thyroid hormones) of the target tissue cells (6-8, 11, 37, 61).\n\n**Figure 4.1** The principal endocrine glands of the body along with other glands that secrete hormones.\n\n![The principal endocrine glands of the body are hypothalamus, pituitary, thyroid, parathyroid, heart, adrenal, liver, pancreas, kidneys, and ovaries in females, and testes in males.](images/E6372_508053_ebook.jpg)\n\nTABLE 4.1 Endocrine Glands and Selected Hormones Endocrine gland | Hormone | Selected physiological actions  \n---|---|---  \nAnterior pituitary gland | Growth hormone(s) | Stimulates insulin-like growth factor I secretion from the liver, protein synthesis, growth, and metabolism; other aggregates of the growth hormone (GH) also have biological function and make up the more complex super family of GH.  \nAdrenocorticotropic hormone | Stimulates glucocorticoid secretion from the adrenal cortex  \nBeta-endorphin | Stimulates analgesia  \nThyroid-stimulating hormone | Stimulates thyroid hormone secretion from the thyroid gland  \nFollicle-stimulating hormone | Stimulates growth of follicles in ovary and seminiferous tubules in testes; stimulates ovum and sperm production  \nLuteinizing hormone | Stimulates ovulation as well as secretion of sex hormones in the gonads (ovaries and testes)  \nProlactin | Stimulates milk production in mammary glands; maintains corpora lutea and secretion of progesterone  \nPosterior pituitary gland | Antidiuretic hormone | Increases contraction of smooth muscle and reabsorption of water by kidneys  \nOxytocin | Stimulates uterine contractions and release of milk by mammary glands  \nThyroid gland | Thyroxine | Stimulates oxidative metabolism in mitochondria and cell growth  \nCalcitonin | Reduces calcium phosphate levels in blood  \nParathyroid glands | Parathyroid hormone | Increases blood calcium; decreases blood phosphate; stimulates bone formation  \nPancreas | Insulin | Reduces blood glucose concentrations via promotion of glucose uptake by cells; promotes glycogen storage; suppresses fat oxidation and gluconeogenesis; is involved in protein synthesis  \nGlucagon | Increases blood glucose levels  \nAdrenal cortex | Glucocorticoids (cortisol, cortisone, and so on) | Catabolic and anti-anabolic: promote protein breakdown and inhibit amino acid incorporation into proteins; conserve blood glucose concentrations via stimulation of conversion of proteins into carbohydrates (gluconeogenesis); suppress immune cell function; promote fat oxidation  \nMineralocorticoids (aldosterone, deoxycorticosterone, and so on) | Increase body fluids via sodium-potassium retention  \nLiver | Insulin-like growth factors | Increase protein synthesis in cells  \nAdrenal medulla | Epinephrine | Increases cardiac output; increases blood sugar and glycogen breakdown and fat metabolism  \nNorepinephrine | Has properties of epinephrine; also constricts blood vessels  \nProenkephalin fragments (e.g., peptide F) | Enhance immune cell function, have analgesia effects  \nOvaries | Estradiol | Stimulate development of female sex characteristics  \nProgesterone | Stimulates development of female sex characteristics and mammary glands; maintains pregnancy  \nTestes | Testosterone | Anabolic and anticatabolic: promotes amino acid incorporation into proteins and inhibits protein breakdown; stimulates growth and development and maintenance of male sex characteristics  \nHeart (atrium) | Atrial peptide | Regulates sodium, potassium, and fluid volume  \nKidney | Renin | Regulates kidney function, permeability, solute  \n  \nIn addition to endocrine function via release into blood circulation, hormones can be secreted to function via intracrine, autocrine, and paracrine mechanisms. Intracrine and autocrine secretion of a hormone means that the cell releases the hormone to act upon the cell itself, via binding to intracellular and membrane receptors, respectively. It may be stimulated to do so via an external stimulus (e.g., another hormone), but the secreted hormone never enters the blood circulation. For example, insulin-like growth factor I (IGF-I) can be produced inside the muscle fiber when stimulated by mechanical force production or growth hormone(s) interactions with the muscle cell. Paracrine secretion of hormones involves the release of a hormone to interact with adjacent cells, without moving into the blood circulation. These mechanisms demonstrate the multiple roles that hormones can play in their interactions with a target cell.\n\nA variety of binding proteins that carry hormones are found in the blood ([6](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref6>), [8](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref8>)). These many binding proteins carry both peptide hormones and steroid hormones. In a sense, these binding proteins act as storage sites within the circulation, help to fight degradation of the hormone, and extend its half-life. Most hormones are not active unless they are separated (free) from their specific binding protein. However, some hormone-binding proteins may actually have biological actions themselves. For instance, sex hormone–binding globulin (SHBG), the binding protein from testosterone and estrogen, can bind to specific membrane receptors and initiate activation of a cyclic adenosine monophosphate (cAMP) pathway ([50](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref50>)). Thus, binding proteins, whether circulating in the blood or bound to a cell receptor, are major players in endocrine function and regulation. The interactions of bound hormones with receptors are just beginning to become appreciated in the field of endocrinology, and recent research has suggested the existence of even more complex regulation of hormones and target tissues ([135](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref135>)).\n\nMany hormones affect multiple tissues in the body ([1](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref1>), [3](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref3>), [82](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref82>), [84](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref84>)-[86](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref86>)). Testosterone or one of its derivatives, for example, interacts with almost every tissue in the body. In this chapter we focus on skeletal muscle tissue as the primary target of hormonal interactions; but many other tissues, such as bone, connective tissue, kidney, and liver, are just as important to the adaptive changes observed with resistance training. It must be remembered that the whole cascade of physiological events, including hormonal signaling, is a result of the activation of motor units to create movement (i.e., size principle). The demands and magnitude of any physiological response are related to this need created by activated motor units. The amount of muscle tissue activated by the exercise dictates which physiological system is needed and how involved it is to meet the homeostatic demands of force/power production during the exercise and for the demands of recovery. For example, heart rate will be much higher to support an 80% of 1 RM squat exercise performed for 3 sets of 10 repetitions with 2 minutes rest between sets than the same protocol done for bicep curls. While similar systems will be involved with both, exercise protocol differences will exist based on the amount of muscle tissue mass affected by the protocol. Hormonal systems are also involved with other target tissues and glands that were stressed in a particular workout, but again, their needs are also dictated by the specific neural recruitment demands and their involvement to support movement. Thus, a five-set 5RM workout has different demands than a one-set 25-RM workout in its motor unit activation and its need for physiological support and recovery.\n\nMost hormones play multiple physiological roles. These roles include regulation of reproduction; maintenance of the internal environment (homeostasis); energy production, utilization, and storage; and growth and development. In addition, hormones interact with each other in complex ways. A particular hormone may function in either an independent or a dependent manner, depending on its role in a given physiological mechanism. Such complexity and flexibility allow the endocrine system to respond in the proper magnitude to a physiological challenge and to interact differently with various physiological systems or target tissues at the same time."

  - id: "ch04-muscle-as-the-target-for-hormone-interac"
    title: "Muscle as the Target for Hormone Interactions"
    level: 2
    tags: [muscle, target, hormone, interactions]
    key_points:
      - "Hormonal mechanisms are a part of an integrated signaling system that mediates change in the metabolic and cellular processes of muscle as a result of resistance exercise and training."
    recall_prompts:
      - "Muscle as the Target for Hormone Interactions 的核心概念是什麼？"
    content: "\n\nHormonal mechanisms are a part of an integrated signaling system that mediates change in the metabolic and cellular processes of muscle as a result of resistance exercise and training. Muscle remodeling involves the disruption and damage of muscle fibers, an inflammatory response, degradation of damaged proteins, hormonal and other signal (e.g., growth factors, cytokines) interactions, and ultimately the synthesis of new proteins and their orderly incorporation into existing or new sarcomeres ([2](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref2>), [20](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref20>)). The inflammatory process involves the immune system and various immune cells (e.g., T and B cells), which are influenced by the endocrine system ([51](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref51>)). The study of the connection between the neural, endocrine, and immune systems is called neuroendocrine immunology. This term demonstrates the interdependence of these systems and the integrative nature of the remodeling process in muscle. We cannot limit our thinking about biological processes to one system.\n\nHormones are intimately involved with protein synthesis and degradation mechanisms that are part of muscle adaptations to resistance exercise. The production of the contractile proteins, actin and myosin, as well as structural proteins (e.g., desmin and titin), and the ultimate incorporation of all these proteins into the sarcomere complete the process at the molecular level. A multitude of hormones—including anabolic hormones (hormones that promote tissue building) such as insulin, insulin-like growth factors (IGFs), testosterone, and growth hormone—all contribute to various aspects of this process. Thyroid hormones act as important permissive hormones that allow the actions of other hormones to take place. As another important action in the building of tissue, anabolic hormones also block the negative effects on protein metabolism of catabolic hormones, such as cortisol and progesterone, which can degrade cell proteins. The negative effects of cortisol on skeletal muscle can also be seen in its roles to inactivate immune cells or block other signaling pathways such as the Akt/mechanistic target of rapamycin (mTOR) pathway involved in mRNA translation initiation. The interrelatedness of hormones, muscle fibers, and the subsequent changes in functional capabilities of muscle fibers provides the basis for the adaptive influence of hormones in hypertrophy. Yet again, the effect of hormones represents only one of the possible mechanisms for skeletal muscle adaptation to resistance training."

  - id: "ch04-role-of-receptors-in-mediating-hormonal-"
    title: "Role of Receptors in Mediating Hormonal Changes"
    level: 2
    tags: [role, receptors, mediating, hormonal, changes]
    key_points:
      - "The signal from a hormone (and thereby its biological effect) is relayed only to cells that express the receptor for that specific hormone."
    recall_prompts:
      - "Role of Receptors in Mediating Hormonal Changes 的核心概念是什麼？"
    content: "\n\nThe signal from a hormone (and thereby its biological effect) is relayed only to cells that express the receptor for that specific hormone. This ensures that the hormonal signal affects only the target tissue and not all cells in the body. Typically, the hormone is trying to influence cellular metabolism or affect DNA transcription in the nucleus (remember that muscle cells are multinucleated). Because many hormones cannot cross the cell membrane, their signal has to be transmitted throughout the cell via secondary messengers (often in the form of a cascade of reactions that ultimately interact and mediate the signal to the DNA machinery in the multiple nuclei of the muscle cell or single nuclei of typical cells). Receptors are generally either integrated into the cell membrane (polypeptide hormone receptors) or in the cytosol (steroid and thyroid hormone receptors). Every cell, from muscle fibers to immune cells to brain cells, has receptors to mediate the message or the signal from some hormone. One of the basic principles in endocrinology is that a given hormone interacts with a specific receptor. This principle is generally referred to as the lock-and-key theory ([41](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref41>)) (in which the receptor is the lock and the hormone is the key; [figure 4.2](<E6372ch04_d81.xhtml#f4.2>)); however, it is now known that the hormone–receptor interaction is much more complex than this simple lock-and-key theory conveys. Although only one hormone has exactly the right characteristics to bind to and fully induce a signal via a specific receptor, in cases of cross-reactivity a given receptor partially interacts with other hormones (i.e., allosteric binding or blocking of the primary binding site). Similarly, receptors can have allosteric binding sites at which substances other than hormones can enhance or reduce the cellular response to the primary hormone. Finally, some hormones may need to be in an aggregated form (several hormones linked together) to produce the optimal signal via the receptor; this is believed to be the case for growth hormone, where one sees that the high molecular weight molecules do not have immune binding but do bind to bioactive receptors in the tibial line assay ([65](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref65>)).\n\n**Figure 4.2** A schematic representation of the classic lock-and-key theory for hormonal action at the cell receptor level.\n\n![An illustration of the schematic representation of the lock-and-key theory for hormonal action.](images/E6372_508056_ebook.jpg)\n\n[Follow for extended description](<Ext_desc_E6372_508056_ebook.xhtml#l_E6372_508056_ebook>)\n\nWhen an adaptation is no longer possible (e.g., the maximal amount of protein has been added to the muscle fiber) ([54](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref54>)) or “overstimulation” by a hormone has occurred (e.g., insulin resistance), receptors can become less responsive or even nonresponsive to a specific hormone, preventing it from stimulating further actions in the cell. This inability of a hormone to interact with a receptor is called downregulation of receptor function. Receptors have the ability to increase or decrease their binding sensitivity, and the actual number of receptors present for binding can also be altered. Alterations in the receptor’s binding characteristics or the number of receptors can be as dramatic an adaptation as the release of increased amounts of hormone from an endocrine gland. Obviously, if a receptor is not responsive to the hormone, little or no alteration in cell metabolism will result from that hormone. For example, it has been shown for the hormone testosterone that exercise training affects only the maximal number of receptors, not the binding sensitivity of the receptor ([31](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref31>)). Scientists are just starting to study and understand the role that changes in receptors play in muscle adaptions to exercise training."

  - id: "ch04-categories-of-hormones"
    title: "Categories of Hormones"
    level: 2
    tags: [categories, hormones]
    key_points:
      - "In terms of molecular structure, there are three main categories of hormones: steroid, polypeptide (or simply peptide), and amine hormones."
    recall_prompts:
      - "Categories of Hormones 的核心概念是什麼？"
    content: "\n\nIn terms of molecular structure, there are three main categories of hormones: steroid, polypeptide (or simply peptide), and amine hormones. Each category of hormones interacts with muscle cells in different ways. In this chapter we focus primarily on the first two categories, as well as the most prominent amine hormones involved with exercise, the catecholamines.\n\n### Steroid Hormone Interactions\n\nSteroid hormones, which include hormones from the adrenal cortex (e.g., cortisol) and the gonads (e.g., testosterone and estradiol), are fat soluble and passively diffuse across the cell membrane, although possible transport mechanisms have been described. The basic series of events leading to the biological effect is the same for any steroid hormone. After diffusing across the sarcolemma, the hormone binds with its receptor to form a hormone–receptor complex (H-RC), causing a conformational shift in the receptor and thus activating it. The H-RC then binds to another H-RC and moves to the nucleus, where it arrives at the DNA. The H-RC “opens” the double-stranded DNA in order to expose transcriptional units that code for the synthesis of specific proteins. The H-RC recognizes specific enhancers, or upstream regulatory elements of the specific gene promoted by the given hormone, and that specific part of the DNA is transcribed. The resultant messenger RNA (mRNA) then moves into the sarcoplasm of the cell, where it is translated by the ribosome into the specific protein promoted by the steroid hormone. [Figure 4.3](<E6372ch04_d81.xhtml#f4.3>) shows a typical steroid hormone (testosterone) migrating into and through the cell. With its interaction at the genetic level of the cell, the action of the steroid hormone is completed ([31](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref31>), [155](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref155>)). However, the fact that mRNA is produced for a specific protein (e.g., actin) does not necessarily mean that that protein is produced by the ribosome and incorporated into the sarcomere. The hormone message to produce a specific mRNA is only the first part of the entire process of protein synthesis.\n\n**Figure 4.3** Typical steroid migration into a target cell by either testosterone in skeletal muscle or dihydrotestosterone in sex-linked tissues. Only one hormone pathway (testosterone or dihydrotestosterone) is targeted for one cell, but the two are shown together in this diagram. Each has different physiological outcomes.\n\n![An illustration of the seven outcomes when testosterone or dihydrotestosterone enters a target cell. ](images/E6372_508060_ebook.jpg)\n\n### Polypeptide Hormone Interactions\n\nPolypeptide hormones are made up of chains of amino acids; examples are growth hormone and insulin. Because polypeptide hormones are not fat soluble and thus cannot cross the cell membrane, secondary messengers inside the cell are activated by the conformational change in the receptor induced by hormone binding. In this way, the membrane receptors transmit the hormonal signal to the inside of the cell where it propagates through a cascade of signaling events inside the cell. In general, the signaling cascades initiated by polypeptide hormones affect metabolic processes, DNA transcription, or mRNA translation initiation at the ribosome. One of the signals from insulin, for example, induces a translocation of specific glucose transporters (GLUT4) from the cytosol to the cell membrane, allowing for increased glucose uptake ([69](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref69>)). [Figure 4.4](<E6372ch04_d81.xhtml#f4.4>) shows a typical polypeptide hormone interaction with the cell nucleus via the cytokine-activated Janus kinase (JAK)/signal transducer and activator of transcription (STAT) signaling pathway. The JAK/STAT pathway is used in many different interactions with various hormones and is a topic of continued investigation ([21](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref21>)).\n\n**Figure 4.4** Typical polypeptide hormone (growth hormone in this example) interaction with a receptor via the cytokine-activated JAK/STAT signaling pathway. Although the hormone binds to an external receptor, a secondary messenger (STAT) is activated that can enter the cell nucleus. Tyr-P = tyrosinase-related protein.\n\n![An illustration of a dimerized growth hormone receptor attaching itself to T y r-P, which releases S T A T that causes gene transcription in the nucleus.](images/E6372_508061_ebook.jpg)\n\n### Amine Hormone Interactions\n\nAmine hormones are synthesized from the amino acid tyrosine (e.g., epinephrine, norepinephrine, and dopamine) or tryptophan (e.g., serotonin). Similarly to peptide hormones, they bind to membrane receptors and act via secondary messengers. However, in contrast to peptide hormones, amine hormones are not regulated directly via negative feedback."

  - id: "ch04-heavy-resistance-exercise-and-hormonal-i"
    title: "Heavy Resistance Exercise and Hormonal Increases"
    level: 2
    tags: [heavy, resistance, exercise, hormonal, increases]
    key_points:
      - "Long-term (months to years) consistent heavy resistance training brings about significant adaptive responses that result in enhanced size, strength, and power of trained musculature ([71](<E6372RM_Ref"
    recall_prompts:
      - "Heavy Resistance Exercise and Hormonal Increases 的核心概念是什麼？"
    content: "\n\nLong-term (months to years) consistent heavy resistance training brings about significant adaptive responses that result in enhanced size, strength, and power of trained musculature ([71](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref71>), [72](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref72>), [92](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref92>), [93](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref93>), [102](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref102>), [108](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref108>), [119](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref119>)). The increase in anabolic hormone concentrations observed consequent to the performance of heavy resistance exercise is one signal that can increase hormonal interactions with various target tissues including skeletal muscle. On stimulation of a motor unit by the motor cortex, various signals (electrical, chemical, and hormonal) are sent from the brain and activated muscles to a number of endocrine glands. A key concept is that physiological systems, including the endocrine system, are sensitive to the needs of activated muscle, and therefore the type of exercise protocol conducted will determine the extent of a given system’s involvement.\n\nHormones are secreted before (anticipatory response), during, and after the resistance exercise bout due to the physiological stress of resistance exercise ([35](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref35>), [38](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref38>), [48](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref48>), [53](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref53>), [56](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref56>), [73](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref73>), [114](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref114>)-[116](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref116>)). Acute hormonal secretions provide information to the body regarding such things as the amount and type of physiological stress (e.g., via epinephrine), the metabolic demands of the exercise (e.g., via insulin), and thus the need for subsequent changes in resting metabolism (e.g., change in substrate utilization). With specific patterns of nervous system stimulation from resistance exercise, certain hormonal changes occur simultaneously for specific purposes related to meeting the demands of the exercise bout, recovery, and adaptation to the acute exercise stress. The patterns of stress and hormonal responses combine to shape the tissues’ adaptive response to a specific training program.\n\nHormonal increases in response to resistance exercise take place in a physiological environment that is unique to this type of exercise stress. The heavy external loads being lifted and resultant large muscle force requirement necessitate the activation of high-threshold motor units not typically stimulated by other types of exercise such as aerobic endurance exercise. Among the many different responses to this large force production stress are alterations in the sarcolemma’s ability to import nutrients and in the sensitivity and number of hormone receptors in the muscle cells. As few as one or two heavy resistance exercise sessions can increase the number of androgen receptors, the receptor for testosterone, in the muscle ([126](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref126>), [192](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref192>)). In addition, local inflammatory processes related to tissue damage and repair mechanisms are activated by stress and run their time course with recovery ([20](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref20>)). Combined, these alterations lead to muscle growth and strength increases in the intact muscle.\n\nThe specific force produced in activated fibers stimulates receptor and membrane sensitivities to anabolic factors, including hormones, which lead to muscle growth and strength changes.\n\nFollowing a resistance exercise session, remodeling of the muscle tissue takes place in the environment of hormonal secretions and other molecular signaling mechanisms that provide for anabolic actions. However, if the stress is too great, catabolic actions in the muscle may exceed anabolic actions as a result of, among other factors, the inability of anabolic hormones to bind to their receptors or the downregulation of receptors in the muscle tissue ([31](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref31>), [129](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref129>)). Thus, hormonal actions are important both during and after an exercise session to respond to the demands of the exercise stress (45-47). As noted before, the magnitude of the hormonal response (i.e., anabolic or catabolic) depends on the amount of tissue stimulated, the amount of tissue remodeling, and the amount of tissue repair required consequent to the exercise stress ([51](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref51>), [143](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref143>)). Thus, again, the characteristics of the exercise stimulus (i.e., selection among the acute program variables) are paramount to the hormonal response to the exercise protocol ([94](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref94>), [96](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref96>))."

  - id: "ch04-mechanisms-of-hormonal-interactions"
    title: "Mechanisms of Hormonal Interactions"
    level: 2
    tags: [mechanisms, hormonal, interactions]
    key_points:
      - "The mechanisms of hormonal interaction with muscle tissue depend on several factors."
    recall_prompts:
      - "Mechanisms of Hormonal Interactions 的核心概念是什麼？"
    content: "\n\nThe mechanisms of hormonal interaction with muscle tissue depend on several factors. First, when exercise acutely increases the blood concentrations of hormones, the probability of interaction with receptors might be greater. However, if the physiological function to be affected is already close to a genetic maximum (i.e., with little adaptive potential left), the receptor is not as sensitive to the increased hormonal exposure. For example, a muscle cell that has already reached its maximum size with long-term training may not be sensitive to endogenous hormonal signals to stimulate further protein accretion. Similar receptor desensitization (decreased affinity) to a hormone can develop when resting hormone levels are chronically elevated due to disease (e.g., type 2 diabetes mellitus) or exogenous drug use. How and when this reduction in receptor sensitivity to hormonal increases occurs in human muscle has not been fully established; however, genetic predisposition ultimately limits increases in muscle size. Second, because adaptations to heavy resistance exercise typically are anabolic, the recovery mechanisms involved are related to increases in the size of muscle cells. Third, errors in exercise prescriptions can result in a greater catabolic effect or a lack of an anabolic effect (ineffective exercise program). As a result, hormonal mechanisms can adversely affect cellular development or minimally activate mechanisms that augment hypertrophy.\n\nThe combination of many different mechanisms is thought to stimulate exercise-induced hypertrophy, and molecular signaling including hormones is involved with this process. This signaling is influenced by neural factors that provide important signals to the skeletal muscle and thus can augment anabolic processes. For instance, neural activation of muscle fibers increases hormone binding affinity of receptors in muscle. The integration of the nervous system and the various hormonal mechanisms is different in trained and untrained people ([73](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref73>), [161](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref161>)). In addition, certain hormonal mechanisms for exercise-induced hypertrophy, such as those mediated by testosterone, are not fully operational in both sexes or at all ages ([38](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref38>), [100](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref100>), [115](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref115>)). A wide array of hormonal mechanisms with differential effects (based on program design, training level, sex, age, genetic predisposition, and adaptation potential) provides myriad possible adaptation strategies for the maintenance or improvement of muscle size and strength ([99](<E6372RM_Refs_d104_split_004.xhtml#chapter4-ref99>))."

