      Although all obese individuals share the trait of excess body fat, they cannot be treated homogeneously. They must be screened for coexisting illnesses such as diabetes, orthopedic problems, cardiac disease, psychological disorders such as binge-eating disorder or depression, social and cultural influences, and readiness for change. Obese athletes who are mandated to lose weight (e.g., by a physician) pose a special challenge because losing weight is dictated by an external source and is not an internalized goal. Weight loss takes a great deal of dedication from within the individual, and these athletes may need to work closely with a mental health professional or registered dietitian to help them meet their goal.
      
      #### Rapid Weight Loss
      
      Though there is no uniform definition in the literature, _rapid weight loss_ generally refers to quick weight loss, faster than can be achieved by lowering calorie intake and increasing exercise, in a short period of time ([29](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref29>)). Athletes may use any variety of techniques to cut weight quickly in order to compete in a desired weight class, meet a weight goal set by their coach, or improve performance. Potentially dangerous weight loss techniques may include fasting, fad diets, voluntary dehydration (diuretics, sauna, water and salt manipulation, wearing multiple layers of clothing), excessive spitting, self-induced vomiting, laxative abuse, and inappropriate or excessive use of thermogenic aids ([29](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref29>)).
      
      Athletes who attempt to lose too much weight too quickly may lose lean body mass, feel fatigued, experience headaches or mood swings, put their training and performance in jeopardy, and suffer from several potentially serious side effects. These include dehydration, heat illness, muscle cramping, fatigue, dizziness, suppressed immune system functioning, hormone imbalances, hyperthermia, reduced muscle strength, decreased plasma and blood volume, low blood pressure, electrolyte imbalances, kidney failure (diuretic abuse), fainting, and death (extreme cases) ([29](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref29>)).
      
      The strength and conditioning professional should be able to recognize the signs and symptoms associated with rapid weight loss techniques and refer athletes to the appropriate professional while also communicating concerns to the rest of the coaching staff. In addition, the strength and conditioning professional may want to consider documenting the steps he or she has taken to assist the athlete (for good record keeping and to prevent liability) while also working with a medical doctor or registered dietitian to set appropriate weight goals after body composition, dieting, medical, and eating disorder history have been taken into account. Some athletes may need to reconsider which weight class they are competing in if they cannot make weight without putting their health or performance in jeopardy.

  - id: "ch10-feeding-and-eating-disorders"
    title: "Feeding and Eating Disorders"
    level: 2
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      Eating disorders, including binge-eating disorder, anorexia nervosa, and bulimia nervosa, are serious mental health disorders that can affect both men and women, appear at any point in life, and increase risk of mortality. Those with eating disorders have a high prevalence of other psychiatric disorders, including anxiety disorders, mood disorders such as depression, impulse-control disorders, and substance abuse disorders ([41](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref41>), [50](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref50>)).
      
      Studies show an increased prevalence of both disordered eating and eating disorders in athletes compared to controls ([37](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref37>), [121](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref121>), [143](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref143>)). In particular, athletes in sports with weight classes such as wrestling, those in sports that emphasize leanness such as cross-country running, and aesthetic sports such as gymnastics may be more prone to disordered eating and eating disorders ([37](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref37>), [121](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref121>), [143](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref143>)). Signs of disordered eating may include restrictive eating, fasting, skipping meals, and taking diet pills, laxatives, or diuretics. However, those with disordered eating do not meet the full diagnostic criteria for an eating disorder ([37](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref37>)).
      
      Eating disorders are multifactorial diseases and, as such, require a multidisciplinary team approach. The strength and conditioning professional must be aware of signs and symptoms of an eating disorder and have a referral network in place so athletes can get the psychological, medical, and nutrition help they need from experts who work with eating disorders.
      
      ### Anorexia Nervosa
      
      Anorexia nervosa is characterized by a distorted body image and an intense fear of gaining weight or becoming fat, leading those with this disease to excessive calorie restriction and severe weight loss ([6](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref6>)). Those with anorexia nervosa also put a great deal of emphasis on their weight or shape yet do not recognize the seriousness of their illness. Also, people with anorexia nervosa typically engage in ritualistic behaviors including repeated weighing, cutting food into small pieces, and carefully portioning their food ([87](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref87>)).
      
      #### Symptoms of Anorexia Nervosa
      
        * Thinning of the bones (osteopenia or osteoporosis)
        * Brittle hair and nails
        * Dry and yellowish skin
        * Growth of fine hair all over the body (lanugo)
        * Mild anemia and muscle wasting and weakness
        * Severe constipation
        * Low blood pressure, slowed breathing and pulse
        * Damage to the structure and function of the heart
        * Brain damage
        * Multiorgan failure
        * Drop in internal body temperature, causing a person to feel cold all the time
        * Lethargy, sluggishness, or feeling tired all the time
        * Infertility
      
      Reprinted from National Institute of Mental Health.
      
      Two subtypes fall under anorexia nervosa. The restricting type does not regularly binge eat or purge, while the binge-eating or purging type regularly engages in binge eating or purging.
      
      The average age of onset is 19 years old, and the lifetime prevalence in females and males is 0.9% and 0.3%, respectively. Just 33.8% of those with anorexia nervosa are in treatment ([50](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref50>)). However, these statistics are based on older criteria for anorexia nervosa; prevalence rates may go up with the 2013 revised diagnostic criteria ([48](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref48>)). It is important to note that among all mental health disorders, anorexia nervosa has the highest mortality rate ([41](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref41>)). For more information about anorexia nervosa, the reader is encouraged to read the American Psychiatric Association’s _Diagnostic and Statistical Manual of Mental Disorders, Fifth Edition_ (2013).
      
      ### Binge-Eating Disorder
      
      Previously categorized under “eating disorder not otherwise specified,” binge-eating disorder has its own category in the _Diagnostic and Statistical Manual of Mental Disorders, Fifth Edition_ ([6](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref6>)). Binge-eating disorder is characterized by repeated episodes, occurring at least once a week for a period of three weeks, of uncontrolled binge eating (eating significantly more food in a short period of time than most people would eat under the same circumstances) ([6](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref6>)). The binge-eating episodes are associated with three or more of the following:
      
        * Eating much more rapidly than normal
        * Eating until feeling uncomfortably full
        * Eating large amounts of food when not feeling physically hungry
        * Eating alone because of feeling embarrassed by how much one is eating
        * Feeling disgusted with oneself, depressed, or very guilty afterward ([6](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref6>))
      
      Because binge-eating episodes are not followed by purging, as is the case with bulimia nervosa, people with binge-eating disorder are often overweight or obese. The lifetime prevalence for men and women is 2.0% and 3.5%, respectively, and average age of onset is 25 years old. A lifetime prevalence of binge-eating disorder is associated with morbid obesity (BMI >40). Over the course of a lifetime, only 43.6% of people with binge-eating disorder are receiving treatment ([50](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref50>)). However, these statistics are based on older criteria for binge-eating disorder, before its inclusion as a specific eating disorder in 2013. Prevalence rates may go up with the revised criteria ([48](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref48>)). Binge eating is associated with significant physical and psychological problems. In addition, people with binge-eating disorder may feel embarrassed, guilty, or disgusted with their behavior and may attempt to hide their behavior by eating alone ([6](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref6>)).
      
      ### Bulimia Nervosa
      
      Bulimia nervosa is characterized by recurrent consumption of food in amounts significantly greater than would customarily be consumed in a discrete period of time—for example, an entire pizza and a half-gallon of ice cream, plus a package of cookies. Purging follows episodes of binge eating and may include one or more of the following: self-induced vomiting, intense exercise, laxative use, or diuretic use. The binging and purging occur at least once a week for a period of three months ([6](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref6>)). People with bulimia nervosa feel a lack of control over their eating during binge episodes and are more likely to be normal weight as opposed to underweight, are unhappy with their weight and body, and fear weight gain. Average age of onset for bulimia nervosa is 20 years old, and the lifetime prevalence is 0.6%. Only 43.2% of those with bulimia nervosa are receiving treatment ([50](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref50>)). However, these statistics are also based on older criteria for bulimia nervosa, and prevalence rates may go up with the revised criteria in the _Diagnostic and Statistical Manual of Mental Disorders, Fifth Edition_ ([48](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref48>)). For more information about bulimia, the reader is encouraged to read this source.
      
      #### Symptoms of Bulimia Nervosa
      
        * Chronically inflamed and sore throat
        * Swollen salivary glands in the neck and jaw area
        * Worn tooth enamel, increasingly sensitive and decaying teeth as a result of exposure to stomach acid
        * Acid reflux disorder and other gastrointestinal problems
        * Intestinal distress and irritation from laxative abuse
        * Severe dehydration from purging of fluids
        * Electrolyte imbalance (too low or too high levels of sodium, calcium, potassium, and other minerals), which can lead to heart attack.
      
      Reprinted from National Institute of Mental Health.
      
      ### Avoidant/Restrictive Food Intake Disorder
      
      Avoidant/restrictive food intake disorder (ARFID) is an eating or feeding disturbance, including apparent lack of interest in eating or food; avoidance based on the sensory characteristics of food; or concern about aversive consequences of eating. This disorder is manifested by persistent failure to meet appropriate nutritional or energy needs associated with one (or more) of the following ([6](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref6>)):
      
        * Significant weight loss (or failure to achieve expected weight gain or faltering growth in children)
        * Significant nutritional deficiency
        * Dependence on enteral feeding or oral nutritional supplements
        * Marked interference with psychosocial functioning
      
      The disturbance is not better explained by lack of available food or by associated culturally sanctioned practice.
      
      The eating disturbance does not occur exclusively during the course of anorexia nervosa or bulimia nervosa, and there is no evidence of a disturbance in the way in which one’s body weight or shape is experienced.
      
      The eating disturbance is not attributable to a concurrent medical condition or not better explained by another mental disorder. When the eating disturbance occurs in the context of another condition or disorder, the severity of the eating disturbance exceeds that routinely associated with the condition or disorder and warrants additional clinical attention ([6](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref6>)).
      
      ### Pica
      
      People with pica eat nonnutritive substances for a period of at least one month. Common nonnutritive substances include clay, laundry starch, ice, cigarette butts, hair, or chalk ([64](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref64>)). Those with pica may have electrolyte and metabolic disorders, intestinal obstruction, wearing away of tooth enamel, and gastrointestinal problems, among other issues. Testing for anemia is recommended since pica is associated with iron deficiency ([64](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref64>)).
      
      ### Rumination Disorder
      
      Rumination involves chewing, reswallowing, or spitting of regurgitated food. To be classified as having this disorder, one must display this behavior, unrelated to any medical condition, for at least one month.
      
      Rumination disorder can occur alongside other eating issues or disorders ([6](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref6>)).
      
      ### Eating Disorders: Management and Care
      
      It is not the responsibility of the strength and conditioning professional to treat or diagnose an eating disorder. It is his or her ethical responsibility to assist the athlete in attaining the proper diagnosis from a qualified physician and treatment from a qualified treatment team. Therefore, strength and conditioning professionals should be mindful of the symptoms of each eating disorder as well as signs of disordered eating. Keep in mind that abnormal eating patterns and amenorrhea alone are not indicative of an eating disorder. A professional who is experienced and qualified in diagnosing and treating eating disorders should be contacted when an athlete’s behavior is concerning.
      
      #### Eating Disorder Resources
      
        * **National Eating Disorders Association**
          * [www.nationaleatingdisorders.org](<http://www.nationaleatingdisorders.org>)
        * **International Association of Eating Disorders Professionals**
          * [www.iaedp.com](<http://www.iaedp.com>)
        * **The Renfrew Center Foundation**
          * [www.renfrewcenter.com](<http://www.renfrewcenter.com>)
        * **National Association of Anorexia Nervosa and Associated Disorders, Inc.**
          * [www.anad.org](<http://www.anad.org>)
        * **Remuda Ranch**
          * [www.remudaranch.com](<http://www.remudaranch.com>)
      
      The strength and conditioning professional is not responsible for treating eating disorders but instead should be aware of the symptoms associated with an eating disorder and refer athletes to the appropriate professional.

  - id: "ch10-conclusion"
    title: "Conclusion"
    level: 2
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      The primary role of nutrition in strength and conditioning is to support athletic performance. A general understanding of nutrition principles and applications is essential for strength and conditioning professionals so that they can provide consistent, accurate information to their athletes while also being able to identify the potential signs and symptoms of an eating disorder. And though pre-, during-, and postcompetition nutrition can lead to better performance, a nutritionally sound daily diet should be emphasized as well, for overall health, greater training adaptations, and performance.
      
      ### Key Terms
      
        * anorexia nervosa
        * binge-eating disorder
        * body mass index (BMI)
        * bulimia nervosa
        * carbohydrate loading
        * diet-induced thermogenesis
        * disordered eating
        * eating disorders
        * isocaloric
        * obesity
        * precompetition meal
        * voluntary dehydration
      
      ### Study Questions
      
        1. The primary macronutrient that is addressed in the precompetition meal is 
           1. fat
           2. carbohydrate
           3. protein
           4. vitamin
        2. Which of the following makes the GREATEST contribution to total energy expenditure? 
           1. resting metabolic rate
           2. physical activity energy expenditure
           3. thermic effect of food
           4. resting blood sugar levels
        3. Which of the following is characteristic of anorexia nervosa? 
           1. normal body weight
           2. very low dietary fat intake
           3. preoccupation with food
           4. secretive eating
        4. When an eating disorder is suspected, the strength and conditioning professional should 
           1. monitor the athlete’s daily food intake
           2. require frequent weigh-ins
           3. encourage further assessment by an eating disorder specialist
           4. provide nutritional information
