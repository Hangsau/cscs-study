sections:
  - id: "ch10-precompetition-nutrition"
    title: "Precompetition, During-Event, and Postcompetition Nutrition / Precompetition Nutrition"
    level: 3
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      The precompetition meal helps provide fluid to maintain adequate hydration and carbohydrate to maximize blood glucose and stored glycogen levels ([5](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref5>), [25](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref25>)) while also keeping hunger pangs at bay. Glycogen is the main form of energy used during high-intensity (>70% V̇O2max) exercise; once these stores become depleted, the athlete will experience muscular fatigue ([56](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref56>)). Small quantities of glycogen are stored in liver and muscle, totaling approximately 15 g of glycogen per kilogram body weight ([1](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref1>)). For example, an 80 kg man can store approximately 1,200 grams of glycogen. Glycogen stored in the liver is used for the whole body, while glycogen stored in muscle tissue is used by muscle ([56](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref56>)).
      
      Despite the vital roles that both hydration and glycogen play in athletic performance, studies examining the importance of the precompetition meal and its effect on performance are equivocal due to differences in study subjects and methods used. Some show that a high-carbohydrate preexercise meal enhances aerobic time to exhaustion ([24](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref24>), [93](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref93>), [113](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref113>)) as well as anaerobic performance in adolescent males ([71](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref71>)), while other studies found no effect on time-trial performance ([100](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref100>)). Despite these differences and the fact that studies simulating performance can’t take into account several factors that distinguish the competitive environment from a lab setting, such as precompetition nerves, temperature, humidity, and altitude, athletes can adapt general precompetition guidelines based on the literature to fit their own unique needs and the competitive environment they are in.
      
      All precompetition meals should take timing, meal and fluid composition, event or sport, and individual athlete preferences into account. In order to minimize the potential for stomach upset, smaller quantities of fluids and food should be consumed when the precompetition meal is consumed closer in temporal proximity to competition. Precompetition foods and beverages should be familiar to the athlete (tried in practice), low in fat and fiber so that they empty rapidly from the stomach and minimize any potential for gastrointestinal distress, and moderate in protein (protein promotes longer-lasting satiety) ([5](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref5>)).
      
      Athletes can choose from either high or low glycemic index ([124](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref124>)) carbohydrates before competition, since the research does not indicate that one is more advantageous than the other ([12](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref12>)). Even though consuming carbohydrates that rapidly increase insulin, such as glucose, will lead to an initial drop in blood sugar at the beginning of exercise, blood sugar levels typically return to normal within approximately 20 minutes, and the initial drop has no negative effect on performance ([78](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref78>)).
      
      #### Minimizing Gastrointestinal Issues
      
      To minimize the likelihood of stomach discomfort during competition, athletes should do the following:
      
        * Try food in practice first. Always try new foods during several practice sessions before competition ([5](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref5>)).
        * When the meal is closer in time to the start of the game or event, consume smaller amounts of food and liquids.
        * Avoid high-fat and high-fiber foods. Both fat and fiber slow down the rate of digestion. When food is still being digesting as you are exercising, you may experience stomach cramps ([5](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref5>)).
        * Avoid sugar alcohols. Despite their name, sugar alcohols contain no alcohol. But their chemical structure resembles that of both sugar and alcohol. Sugar alcohols are a type of carbohydrate that is not completely absorbed in the gut. Consequently, consumption can cause gas, bloating, and cramping and may have a laxative effect. Sugar alcohols are found in some low-carbohydrate and sugar-free products, including sugar-free gum, toothpaste, and mouthwashes. The two sugar alcohols most likely to cause gastrointestinal issues are sorbitol and mannitol ([131](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref131>)). Any product that could result in consumption of 20 g of mannitol must carry this warning on the label: “Excess consumption may have a laxative effect.” Individual responses to sugar alcohol vary. Sugar alcohols include xylitol (the most common one found in dental products), erythritol, sorbitol, mannitol, maltitol, isomalt, lactitol, hydrogenated starch hydrolysates, and hydrogenated glucose syrups ([131](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref131>)).
      
      #### Aerobic Endurance Sports
      
      The precompetition meal may be most important for aerobic endurance athletes who compete in long-duration activity (>2 hours) in the morning after an overnight fast. Upon waking in the morning, blood sugar levels are low and liver glycogen stores are substantially reduced. Both conditions decrease the amount of carbohydrate available for use as energy. Carbohydrates at the precompetition meal can significantly enhance glycogen stores and improve exercise time to exhaustion in those who regularly include carbohydrate in their diets, when consumed 3 or more hours before competition ([27](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref27>), [137](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref137>)). 
      
      A crossover study examined whether a precompetition high-carbohydrate meal combined with a carbohydrate-electrolyte sports drink consumed during exercise improved aerobic endurance running capacity (70% V̇O2max until exhaustion) more than the sports drink alone ([23](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref23>)). The scientists had men perform three treadmill runs, each separated by one week, after an overnight fast followed by ([1](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref1>)) a carbohydrate meal 3 hours before exercise in addition to a carbohydrate-electrolyte sports drink during running; ([2](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref2>)) a carbohydrate meal 3 hours before exercise and water during running; or ([3](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref3>)) a low-calorie placebo drink (same flavor as the sports drink) 3 hours before exercise and water during running. In the two-day period before the first main trial, subjects weighed and recorded their food intake. They replicated the same diet for the two-day period before each trial. No differences were noted in average daily caloric intake between the three trials. Consumption of the high-carbohydrate meal preexercise improved endurance running capacity by 9% compared to the placebo drink before exercise and water during the run. However, the high-carbohydrate meal plus sports drink during the run improved endurance capacity by 22% compared to the placebo beforehand and sports drink during the run. These results indicate that a high-carbohydrate preexercise or precompetition meal can help improve aerobic endurance running capacity ([23](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref23>)).
      
      Endurance athletes who are not chronically adapted to a low-carbohydrate diet and start exercise with depleted glycogen stores will break down muscle to use protein for energy and may acutely suppress immune and central nervous system functioning. Therefore, a high-carbohydrate preexercise meal can help attenuate the breakdown of skeletal muscle while also providing carbohydrate for immune and nervous system functioning ([20](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref20>), [72](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref72>)). Over time, adaptation to chronic consumption of a low-carbohydrate diet increases the body’s reliance on its vast storage of fat as a fuel source during exercise, though training with low glycogen stores may suppress immune and central nervous system functioning ([20](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref20>), [45](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref45>)). In a study examining protein catabolism, six subjects rode a cycle ergometer for 1 hour at 61% V̇O2max after a carbohydrate loading protocol or carbohydrate depletion. In the carbohydrate-depleted state, protein breakdown was calculated at 13.7 g per hour, which represented 10.7% of the calories used during exercise ([72](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref72>)).
      
      It is clear that a preexercise meal consumed hours before competition can help improve aerobic endurance performance. However, extremely early morning start times can complicate the desire to feed with a concurrent desire for maximum sleep. For instance, a runner who must be at the starting line of a race at 7 a.m. may find that waking up at 3 or 4 a.m. to eat isn’t practical. Athletes who find themselves in this scenario should practice eating small amounts of food 1 to 2 hours before they start while also ensuring that they consume an adequate amount of carbohydrate during competition.
      
      The following are general recommendations that can be adapted to meet each athlete’s individual needs. More research needs to be done to examine the needs of athletes in a variety of sports and to determine the effects of varying amounts of each macronutrient on performance ([95](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref95>)). Until this is done, the guidelines for aerobic endurance athletes are adapted to other sports.
      
        * Athletes should prehydrate, if necessary, several hours before exercise to allow for fluid absorption and urine output. Their urine specific gravity (USG) reading should be <1.020 ([112](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref112>)).
        * Athletes who tend to get nauseated easily, who have experienced diarrhea during competition, who get anxious or experience precompetition jitters, or who compete in high-intensity sports (jarring movements can increase the likelihood of stomach upset), as well as those who are competing in the heat, may want to consider eating at least 4 hours before competition. Aerobic endurance athletes who eat at least 4 hours before competition should include approximately 1 to 4 g of carbohydrate per kilogram body weight and 0.15 to 0.25 g of protein per kilogram body weight ([124](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref124>)).
        * If the precompetition meal is consumed 2 hours before exercise, athletes should aim for approximately 1 g of carbohydrate per kilogram body weight. Athletes should follow an individualized hydration plan. During prolonged activity in hot weather, they should consume a sports drink containing 20 to 30 mEq of sodium (460-690 mg with chloride as the anion) per liter, 2 to 5 mEq of potassium (78-195 mg) per liter, and carbohydrate in a concentration of 5% to 10% ([112](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref112>)).
        * When consumed closer to the start of competition, the preexercise meal should be smaller. In addition, liquid sources of carbohydrate may be preferable when the preexercise meal is 1 hour before the event because they are emptied from the stomach faster than solid food ([5](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref5>)). Gels, gummies, and similar sources of carbohydrate are also digested very quickly. [Table 10.1](<E6372ch10_d87.xhtml#t10.1>) summarizes these recommendations while providing sample food options.
      
      TABLE 10.1 Precompetition Food and Fluid Recommendations for Aerobic Endurance Athletes* Time before competition | Food recommendations | Fluid recommendations | Sample precompetition meals for a 68.2 kg (150 lb) athlete | Sample meals based on food and fluid recommendations  
      ---|---|---|---|---  
      >1 hour | 0.5 g carbohydrate per kilogram body weight |  | 34 g carbohydrate | 1 small banana 8 oz. sports drink | 37 g carbohydrate 8 oz. fluid  
      2 hours | 1 g carbohydrate per kilogram body weight | If not adequately hydrated, sip on 3-5 ml (0.10-0.17 oz.) of fluid per kilogram body weight ([112](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref112>)) | 68 g carbohydrate 7-12 oz. fluid | 2.5 cups boiled, plain potato, flesh only 2 mini bagels with 1 Tbsp jam + 8 oz. sports drink | 66 g carbohydrate 72 g carbohydrate 8 g protein 8 oz. fluid  
      4 hours or more | 1-4 g carbohydrate per kilogram body weight and 0.150.25 g protein per kilogram body weight ([100](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref100>)) | Should consume approximately 5-7 ml of water or a sports drink per kilogram body weight ([112](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref112>)) | 68-272.8 g carbohydrate 10-17 g protein Minimal fat | Bowl of cereal and fruit: 8 oz. skim milk + 2 cups of Cheerios + 1/4 cup (measured unpacked) raisins | 74 g carbohydrate 11 g protein 14 oz. water  
      Egg white sandwich: 2 egg whites on 2 pieces of white bread (skip high-fiber breads preworkout) | 72 g carbohydrate (based on 1 slice = 64 g weight) 17 g protein 14 oz. water  
      
      *These recommendations are for aerobic endurance athletes and can be adapted for other types of athletes.
      
      Athletes may want to keep a record of their food intake, including the time each meal or snack was consumed and how they felt while training. By recording the types and amounts of food consumed and when these are consumed in relation to training, they may be able to identify any issues they are having with performance or stomach upset and develop a better precompetition plan.
      
      The primary purpose of the precompetition meal is to provide sufficient fluid to maintain hydration and carbohydrate to maximize blood glucose and stored glycogen while also satisfying hunger.
      
      #### Carbohydrate Loading
      
      Depletion of muscle and liver glycogen leads to fatigue during long-term aerobic endurance exercise ([109](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref109>), [123](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref123>), [133](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref133>)). Therefore, a technique called carbohydrate loading has been used for decades to enhance muscle glycogen before aerobic endurance events. And though there are many different variations of carbohydrate loading, all include high carbohydrate intake in the days leading up to an event to maximize glycogen stores and therefore carbohydrate availability in the later stages of the event ([25](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref25>)). Carbohydrate loading offers potential benefits for distance runners, road cyclists, cross-country skiers, and other aerobic endurance athletes who risk depleting glycogen stores, and it may conceivably benefit other athletes as well ([105](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref105>)).
      
      A commonly used carbohydrate loading regimen includes three days of a high-carbohydrate diet in concert with tapering exercise the week before competition and complete rest the day before the event. The diet should provide adequate calories and carbohydrate per day: 8 to 10 g of carbohydrate per kilogram body weight. This regimen should increase muscle glycogen stores 20% to 40% above normal ([25](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref25>)). However, higher intakes, 10 to 12 g of carbohydrate per kilogram body weight, have been suggested for runners during the 36 to 48 hours before a marathon ([19](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref19>)).
      
      Studies show that carbohydrate loading is effective in men ([123](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref123>), [139](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref139>)). However, the studies in women have been mixed. One study examined the effects of carbohydrate loading on aerobic endurance performance and substrate utilization in eight 20- to 40-year-old weight-stable, eumenorrheic female runners with an average running history of 53 km (24 miles) per week for at least 12 months before the study and a typical carbohydrate intake below 65% of total caloric intake ([7](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref7>)). Each female completed three different 24.2 km (15-mile) self-paced treadmill performance runs after four days on each experimental diet regimen: ([1](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref1>)) carbohydrate supplementation (50% of calories from carbohydrate), ([2](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref2>)) carbohydrate loading and supplementation (75% of calories from carbohydrate), and ([3](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref3>)) placebo (50% of calories from carbohydrate). Both the carbohydrate-supplemented and carbohydrate loading plus supplementation groups consumed a 6% carbohydrate-electrolyte solution before exercise (6 ml/kg) and every 20 minutes during exercise (3 ml/kg). And though the carbohydrate-supplemented and carbohydrate loading plus supplementation groups used a greater portion of energy from carbohydrate during their runs, there was no significant difference in running performance between the groups. However, both total calories and grams of carbohydrate per day were not reported; therefore, it is possible that total calorie or carbohydrate intakes (or both) were not adequate for the runners. In addition, given the small number of subjects included in this study, differences in performance may have been noted if more subjects had been included ([7](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref7>)).
      
      In another study, researchers found that males increased glycogen content significantly while female athletes did not after increasing carbohydrate intake from 58% to 74% of calories for four days before a submaximal aerobic endurance exercise test, due to either inadequate carbohydrate or calorie intake (or both) or sex differences in glycogen storage ([123](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref123>)). In a follow-up study, the same researchers examined glycogen storage capacity in six well-trained men and six well-trained women ([125](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref125>)). Subjects were randomly assigned to one of three diets for four days: a high-carbohydrate diet (75% of total calorie intake), a high-carbohydrate diet plus extra calories (75% of calories from carbohydrate and a 34% increase in total calories), or their habitual daily diet. In men, both the higher-carbohydrate diet and higher-carbohydrate plus extra calories diet led to significantly greater levels of glycogen than the habitual diet. However, in women, only the higher-carbohydrate plus extra calories diet resulted in significant increases in glycogen storage compared to the habitual diet. In the high-carbohydrate conditions, men increased their total carbohydrate intake to 7.9 g of carbohydrate per kilogram body weight whereas women reached just 6.4 g of carbohydrate per kilogram body weight. No differences were noted between men and women in their ability to use glycogen as measured by enzymatic activity. Therefore, the failure of previous studies to show improved performance from carbohydrate loading in women was likely due to inadequate overall carbohydrate intake ([125](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref125>)). This theory (that women were not consuming enough total carbohydrate in many of the protocols) was backed up in a study examining female cyclists. In trained female cyclists, three or four days on a moderate-carbohydrate diet (48% of calories from carbohydrates) followed by three or four days consuming 78% of calories from carbohydrates (8.14 g of carbohydrate per kilogram body weight) led to significant increases in glycogen stores and greater cycling time to exhaustion compared to seven days on the moderate-carbohydrate diet ([133](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref133>)). Researchers have found that glycogen storage capacity in the 4-hour time period after exercise did not differ between men and women when they consumed the same amount of carbohydrate per unit body weight (1 g of carbohydrate per kilogram body weight immediately and 1 hour after the completion of exercise) ([122](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref122>)). And while glycogen storage capacity is greater during the luteal phase of the menstrual cycle in women as compared to the early follicular phase due to hormonal differences, carbohydrate loading can make up for this difference ([94](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref94>)).
      
      The main challenge with carbohydrate loading in females appears to be their overall daily calorie intake. Women who habitually consume less than 2,400 calories per day may find it difficult to consume greater amounts of carbohydrate. Therefore, female athletes may need to increase their total energy intake above 2,400 calories, in addition to consuming a higher-carbohydrate diet, in order to increase glycogen stores ([123](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref123>), [133](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref133>)).
      
      Though the majority of studies on carbohydrate loading have been done in aerobic endurance athletes, some research has attempted to examine carbohydrate loading for athletes in high-intensity sports as well. In a randomized, crossover design, seven professional soccer players who consumed an average of 46% of calories from carbohydrates ate either a 39% or a 65% carbohydrate diet two days before being testing. Each test consisted of 6,856 m of field work (completed at 65%, 57%, and 81% V̇O2max) followed by a treadmill run to exhaustion in an attempt to mimic a soccer game. After the high-carbohydrate diet, the players ran 17.1 km total, which was 0.9 km longer (a significant difference) than the distance run while on the lower-carbohydrate diet. However, three of the athletes ran less than 420 m longer, indicating significant variability in the athletes’ responses to a higher-carbohydrate regimen ([11](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref11>)). The results of this study may or may not be applicable to soccer players, since the average distance covered in a soccer match is considerably shorter (10.3 km with a range of 9.7 to 11.3 km, as reported in one study), and it is covered in an intermittent manner and at varying levels of intensity ([68](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref68>)).
      
      In a study examining the effect of carbohydrate loading on resistance exercise performance, eight healthy young men were randomly assigned to either a higher-carbohydrate (6.5 g of carbohydrate per kilogram body weight) or a moderate-carbohydrate diet (4.4 g of carbohydrate per kilogram body weight) for four days. After this period, they participated in a resistance exercise test including four sets of 12 repetitions of maximal-effort jump squats with a load of 30% of 1-repetition maximum (1RM) and a 2-minute rest period between sets ([44](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref44>)). There was no significant difference in power performance between subjects on the high-carbohydrate and the moderate-carbohydrate diets. Therefore, in this study a higher-carbohydrate diet did not enhance power performance during a four-set resistance exercise test. However, it is unclear whether the carbohydrate loading regimen could have affected power performance if more sets were performed or if the carbohydrate loading regimen more closely resembled that of an endurance athlete, providing 8-10 g carbohydrate per kilogram bodyweight ([44](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref44>)).
      
      The degree of benefit derived from carbohydrate loading varies among individuals, even among aerobic endurance athletes, and therefore athletes should determine the value of this regimen while weighing any negative side effects, such as temporary weight gain, in practice before competition. Athletes who use carbohydrate loading as a means to maximize glycogen storage should also know how different types of carbohydrates affect them. For instance, oligosaccharides, which are found in dry beans and peas, onions, and foods with added inulin or other oligosaccharides (such as some nutrition bars and shakes), are rapidly fermented by bacteria in the gut, which can lead to excessive intestinal gas and bloating. Dietary fiber is found in vegetables, fruits, whole grains, dry beans and peas, nuts, and seeds ([130](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref130>)). [Table 10.2](<E6372ch10_d87.xhtml#t10.2>) provides a sample daily meal plan for a 68 kg (150-pound) athlete following research-based carbohydrate recommendations for aerobic endurance athletes.
      
      TABLE 10.2 Carbohydrate loading Regimens and Sample Daily Meal Plans for Aerobic Endurance Athletes* Amount of carbohydrate | Sample meal plan for a 68 kg (150 lb) athlete | Nutrition breakdown  
      ---|---|---  
      8-10 g carbohydrate per kilogram body weight consumed on day 3 before an event ([25](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref25>)) | **Breakfast:** 3 eggs 4 slices 15-grain toast 1 cup mixed chopped fruit 1 170 g fruit-on-the- bottom yogurt **Snack:** 40 mini pretzels **Lunch:** Chicken stir fry including 2 cups brown rice 6 oz. cooked chicken breast 1 cup mixed stir fry vegetables cooked in 2 Tbsp sesame oil **Early afternoon snack:** 1 bagel with 2 Tbsp 100% fruit jam **Post taper run:** 8 oz. 100% juice 2 cups whole-grain cereal 8 oz. skim milk **Dinner:** 3 cups pasta 1 cup pasta sauce Green salad with a variety of colorful vegetables and 2 oz. cheese 1 Tbsp salad dressing | 91 g fat 576 g carbohydrate 141 g protein 8.5 g carbohydrate per kilogram body weight  
      10-12 g carbohydrate per kilogram body weight consumed on each of the two days before an event ([19](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref19>)) | **Breakfast:** 3 eggs 4 slices 15-grain toast 1 cup mixed chopped fruit 1 170 g fruit-on-the-bottom yogurt **Snack:** 40 mini pretzels 1 glass 100% juice **Lunch:** Chicken stir fry including 2 cups brown rice 4 oz. cooked chicken breast 1 cup mixed stir fry vegetables all cooked in 2 Tbsp sesame oil **Early afternoon snack:** 1 bagel with 2 Tbsp 100% fruit jam **Post taper run:** 8 oz. 100% juice 2 cups whole-grain cereal 1/3 cup packed raisins added 8 oz. skim milk **Dinner:** 3 cups pasta 1 cup pasta sauce Green salad with a variety of colorful vegetables and 2 oz. cheese 1 Tbsp salad dressing | 91 g fat 689 g carbohydrate 128 g protein 10.1 g carbohydrate per kilogram body weight  
      
      *These recommendations are for aerobic endurance athletes and can be adapted for other types of athletes.
      
      Carbohydrate loading is an effective strategy to maximize glycogen storage. However, athletes must consume 8 to 10 g of carbohydrate per kilogram body weight per day during the loading period to notice any benefit from carbohydrate loading.

  - id: "ch10-during-event-nutrition"
    title: "Precompetition, During-Event, and Postcompetition Nutrition / During-Event Nutrition"
    level: 3
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      Nutrition is an important factor during aerobic endurance events lasting greater than 45 minutes, intermittent-activity sports, or when an athlete has multiple events in one day. Fluids and carbohydrates can affect performance, while the provision of amino acids may minimize muscle damage.
      
      Proper hydration during competition is essential for performance while also helping to prevent overheating, dehydration, and heat illness. Athletes should hydrate themselves several hours before exercise to allow for fluid absorption and urine output before competing. In addition, they should consume enough fluid during exercise to prevent water weight losses exceeding 2% of body weight ([112](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref112>)). The optimal sports drink contains 20 to 30 mEq of sodium (460-690 mg with chloride as the anion) per liter, 2 to 5 mEq of potassium (78-195 mg) per liter, and carbohydrate in a concentration of 5% to 10% ([53](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref53>)). Sports drinks with a higher concentration of carbohydrate—those that contain more than 8%—delay gastric emptying (how quickly the drink is emptied from the stomach), which could lead to stomach discomfort ([82](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref82>)). Therefore a carbohydrate concentration of 6% to 8% may be ideal ([112](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref112>)).
      
      Fluid intake guidelines are different for children. According to the American Academy of Pediatrics, children weighing 40 kg (88 pounds) should drink 5 ounces (148 ml) of cold water or a flavored salted beverage every 20 minutes during practice, while adolescents weighing 60 kg (132 pounds) should drink 9 ounces (256 ml) every 20 minutes even if they do not feel thirsty. They also recommend a sodium chloride concentration of 15 to 20 mmol/L (1 g per 2 pints), which has been shown to increase voluntary hydration by 90% when compared to unflavored water ([4](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref4>), [13](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref13>), [138](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref138>)). Despite these recommendations, keep in mind that 9 ounces of fluid at one time is a considerable amount for an adolescent and may cause stomach distress. Therefore these guidelines may need to be adjusted for individual athletes.
      
      #### Aerobic Endurance Sports
      
      Consuming carbohydrates during prolonged aerobic endurance exercise can improve performance while also reducing exercise-induced stress and suppression of immune system functioning ([90](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref90>)). And though sports drinks provide carbohydrates, they cannot keep up with an athlete’s carbohydrate utilization during prolonged, intense activity (unless an excessive amount of fluid is consumed). In fact, athletes who train intensely may burn 600 to 1,200 calories or more per hour ([66](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref66>)). Several studies show that a carbohydrate intake ranging from 28 to 144 g per hour (with higher amounts studied during cycling) during aerobic endurance activity can decrease reliance on limited glycogen stores, extend time to exhaustion, and improve performance by providing a steady stream of carbohydrate that can be used for energy ([26](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref26>), [62](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref62>), [85](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref85>), [128](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref128>)).
      
      Despite greater intakes per hour, as noted earlier, exogenous (external; that which is consumed) carbohydrate oxidation rates do not exceed 1.0 to 1.1 g per minute, likely due to the rate of glucose absorption and possibly also the limited delivery rate of 1 g per minute of glucose into the bloodstream ([61](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref61>)). However, each carbohydrate has a different rate of oxidation. Glucose, sucrose, maltose, maltodextrins, and amylopectin are oxidized quickly; the oxidation rates of fructose, galactose, and amylose are 25% to 50% slower ([61](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref61>)). In addition, each type of carbohydrate has a different intestinal transport system. If an athlete consumes one type of carbohydrate, fructose for instance, carbohydrate digestion will be limited when the intestinal transporter for fructose becomes saturated. Therefore, consuming multiple types of carbohydrates together, such as sucrose, fructose, and glucose or maltodextrin, increases the rate of carbohydrate absorption and exogenous carbohydrate oxidation compared to consuming an isocaloric amount of just one sugar ([58](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref58>)). In addition to improving the rate of carbohydrate utilization by the body, consuming multiple types of carbohydrate during exercise was found to improve cycling time-trial performance after 120 minutes of cycling (the study design simulated the last few stages of an aerobic endurance race when an athlete must provide maximum effort) when subjects were provided glucose combined with fructose versus glucose only at a rate of 1.8 g per minute (108 g of carbohydrate per hour) ([28](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref28>)). In addition, athletes given 36 g of glucose and fructose every 15 minutes had a better 100 km cycling time than cyclists given only glucose every 15 minutes ([128](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref128>)).
      
      In addition to actually ingesting carbohydrates, simply rinsing carbohydrates through the mouth (without actually ingesting them) seems to improve performance lasting approximately 1 hour by 2% to 3%, presumably by affecting the central nervous system ([60](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref60>)).
      
      ##### Fructose and Gastrointestinal Symptoms
      
      Fructose, a sugar found naturally in fruit and also added to a number of foods and beverages, including many sports nutrition products, is often blamed for symptoms of stomach upset during exercise. Though some people do not completely absorb fructose and may therefore experience bloating, gas, abdominal discomfort, and alterations in bowel functioning after consuming this sugar ([116](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref116>)), studies have not examined gastrointestinal symptoms related to fructose ingestion alone in athletes. Thus athletes need to test, in practice, whether changing their sports drinks or other products they consume during training (and testing fructose-free conditions) helps alleviate any gastrointestinal symptoms they may be having ([119](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref119>)). Athletes with irritable bowel syndrome are more likely to have a problem absorbing fructose and therefore experience side effects ([116](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref116>)).
      
      In addition to providing carbohydrates during aerobic endurance activity, adding protein to a carbohydrate gel led to increased time until exhaustion during a bout of cycling while also attenuating the rise in creatine kinase (a marker of muscle damage) during cycling, due either to the protein itself or to the additional calories provided by the protein ([111](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref111>)). A meta-analysis and review of the research examining how the addition of protein to carbohydrate affects aerobic endurance performance revealed mixed findings ([111](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref111>)). Only time-to-exhaustion studies showed that the addition of protein made a significant difference. However, these studies were not controlled for calorie intake during the trial; therefore, it is unclear if any benefit was due to protein or the added calories provided by the protein. The three time-trial studies showed no difference between carbohydrate only and carbohydrate plus protein ([120](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref120>)).
      
      #### Intermittent High-Intensity Sports
      
      Many team sports, such as soccer, tennis, basketball, and American football, include repeated bouts of short-duration, high-intensity activity in addition to involving a wide range of skills. Fatigue during play could stem from a number of factors, including decreased or depleted glycogen stores and dehydration. The provision of both fluids and carbohydrate is essential for performance during prolonged intermittent sports. For instance, a long tennis match may last 4 hours—considerably longer than many aerobic endurance events. Because tennis players cannot drink continuously during a match and can lose more than 2.5 L of fluid per hour, a recommendation of 200 to 400 ml (6.8-13.5 ounces) per changeover (switching sides) has been put forth for these athletes ([65](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref65>)). In addition to maintaining hydration status, research shows that carbohydrate supplementation may not affect ratings of perceived exertion ([38](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref38>)) but improves stroke quality (which includes measures of velocity, precision, and error rate) during prolonged play ([132](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref132>)).
      
      In soccer players, 5 ml per kilogram body weight of a 6.9% glucose-polymer drink, consumed 15 minutes before each match and at halftime, made no difference in several measures of performance such as successful tackles, heading, dribbling, or shooting ability ([142](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref142>)). Yet another soccer study, this one with professional soccer players, found that the group consuming a carbohydrate-electrolyte beverage improved some parameters of performance during match play. In this study, 22 professional male soccer players consumed the same diet for seven days (55% of the calories were derived from carbohydrate, 25% from fat, and 20% from protein), refrained from exercise for three days before the match, and consumed a standardized breakfast 4 hours before the match on game day. They were divided into two groups, receiving either (a) a carbohydrate-electrolyte drink (7% carbohydrates, sodium 24 mmol/L, chloride 12 mmol/L, potassium 3 mmol/L) or (b) placebo. Each group drank 5 ml (0.17 ounces) per kilogram body weight before the match and 2 ml (0.7 ounces) per kilogram body weight every 15 minutes during the 90-minute game. The group receiving the carbohydrate-electrolyte drink finished the specific dribble test faster than those receiving the placebo. In addition, ratings of precision were higher in the carbohydrate-electrolyte trial versus placebo. However, there were no differences in the coordination or power tests between groups. In this particular study, supplementation with a carbohydrate-electrolyte drink improved soccer-specific skill performance compared with a placebo ([96](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref96>)).
      
      In another study that found that during-play carbohydrate consumption was beneficial, a randomized, double-blind protocol was used. Seventeen male soccer players received 8 ml (0.27 ounces) of a 6.4% carbohydrate-electrolyte beverage per kilogram body weight before exercise plus 3 ml (0.10 ounces) per kilogram body weight after every 15 minutes (for a total of 52 g of carbohydrate per hour) during a 90-minute intermittent shuttle test ([3](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref3>)). Consuming the carbohydrate-electrolyte beverage attenuated a significant decrease in skill reduction from before exercise until the last 15 to 30 minutes of exercise compared to placebo. In the carbohydrate trial, there was a 3% reduction in skill performance during this time period, while in the placebo trial a 15% decline in skill performance was noted. However, this trial was performed after carbohydrate-depleting exercise followed by a low-carbohydrate meal and then an overnight fast; therefore, the effect of carbohydrates on performance may depend not only on the amount consumed during intermittent activities but also on whether the athlete is competing in a fed or fasted and glycogen-depleted state ([3](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref3>)).
      
      In another study, which used four 15-minute quarters of intermittent high-intensity shuttles at various intensities (walking, jogging, running, sprinting, and jumping), separated by a 20-minute rest at halftime and followed by a shuttle run to fatigue (designed to mimic a competitive soccer or basketball game), subjects who consumed a carbohydrate-electrolyte (carbohydrate) drink before exercise (5 ml of a 6% solution per kilogram body weight) and at halftime (5 ml of a 18% solution per kilogram body weight) ran 37% longer in the run to fatigue than those receiving a placebo and were significantly faster in a 20 m sprint during the fourth quarter. In addition, the carbohydrate-supplemented group performed better on a whole-body motor skill test during the later stages of exercise and reported decreased perceptions of fatigue, indicating that the consumption of a carbohydrate-electrolyte beverage during intermittent sports is advantageous ([136](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref136>)).
      
      #### Strength and Power Sports
      
      Carbohydrates are also an essential source of energy used during resistance training and therefore in strength and power sports. Research studies using a series of different weightlifting protocols found that participants used a significant amount of muscle glycogen ([74](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref74>)). Most of these studies had participants perform just a few sets of exercises. Therefore, athletes who perform in strength and power competitions or sports, or in positions that rely on muscle strength and power (hammer throwers, offensive linemen in American football), could deplete their muscle glycogen stores. Furthermore, starting with already low carbohydrate stores will increase muscle breakdown ([72](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref72>)). Strength and power athletes can maintain their glycogen stores, which may decrease muscular fatigue in slow-twitch fibers and possibly lead to better performance, by supplementing with carbohydrate before and during competition ([39](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref39>), [54](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref54>)).
      
      ##### During-Competition Food and Fluid Recommendations
      
      Due to large variations in sweat rates and electrolyte concentrations, athletes should measure weight changes during training and competition in specific weather conditions and develop individualized hydration strategies based on this information ([112](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref112>)). During prolonged activity in hot weather, the Institute of Medicine recommends sports drinks containing 20 to 30 mEq of sodium (460-690 mg with chloride as the anion) per liter, 2 to 5 mEq of potassium (78-195 mg) per liter, and carbohydrate in a concentration of 5% to 10% ([53](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref53>)).
      
        * Children weighing 40 kg (88 pounds) should drink 5 ounces (148 ml) of cold water or a flavored salted beverage every 20 minutes during practice.
        * Adolescents weighing 60 kg (132 pounds) should drink 9 ounces (256 ml) every 20 minutes even if they do not feel thirsty ([4](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref4>), [13](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref13>)).
        * Aerobic endurance athletes should consume 28 to 144 g of multiple types of carbohydrates together, such as sucrose, fructose, and glucose, or maltodextrin, each hour during prolonged aerobic endurance activity ([26](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref26>), [28](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref28>), [62](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref62>), [85](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref85>), [128](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref128>)).
        * Tennis players should aim for approximately 200 to 400 ml fluid per changeover and have some of this fluid from a carbohydrate-electrolyte sports drink ([65](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref65>)).

  - id: "ch10-postcompetition-nutrition"
    title: "Precompetition, During-Event, and Postcompetition Nutrition / Postcompetition Nutrition"
    level: 3
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      The postcompetition meal helps athletes rehydrate, replenish glycogen stores, and repair muscle tissue. Therefore, what they consume in the time period soon after training or competition helps prepare their body for the next bout of activity. Each athlete’s postcompetition needs vary based on the sport he or she plays, intensity during play, amount of time played, the individual’s weight and age, and probably the person’s sex. However, much more research has been conducted with male subjects as opposed to females; therefore, recommendations are not broken out based on sex due to a lack of sufficient data in females.
      
      After competition, athletes should replace fluid and electrolyte losses. If time permits, normal meals, snacks (provided they contain some sodium), and water will restore fluid and electrolyte losses. More salt can be added to foods when sweat sodium losses are substantial ([51](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref51>), [112](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref112>)). Athletes can choose a carbohydrate-electrolyte sports drink or plain water alongside foods that contain sodium chloride (or they can salt their foods) since sodium is essential for helping the body retain fluid ([79](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref79>), [112](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref112>), [118](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref118>)). Rehydration strategies should be individualized as much as possible. Athletes competing in weight-class sports such as wrestling and mixed martial arts may deliberately dehydrate themselves to make weight and attempt to rehydrate before competition, though short time periods between weighing and competing may mean starting competition in a dehydrated state, leading to poor performance and health risks.
      
      #### Aerobic Endurance Events
      
      After prolonged aerobic endurance events, it is important to replenish carbohydrate stores before the next training session or competition (whichever comes first) and consume enough protein to build and repair muscle. Glycogen synthesis occurs in two distinct phases. The first phase is independent of insulin and lasts 30 to 60 minutes, and glycogen synthesis occurs rapidly. The second phase lasts several hours, and glycogen synthesis occurs at a much slower pace. Glycogen synthesis occurs at a rapid rate when large amounts of carbohydrate, 1.0 to 1.85 g per kilogram body weight per hour, are consumed immediately after exercise or competition and at regular intervals every 15 to 60 minutes thereafter for up to 5 hours ([57](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref57>)). Though athletes may be able to fully replenish their glycogen stores right away or over the course of a 24-hour period after a long training session, this isn’t necessarily the case after competition. Strenuous aerobic endurance events that result in measurable muscle damage, such as the marathon, lead to delayed glycogen resynthesis even if an athlete consumes a higher-carbohydrate diet, possibly due to either metabolic disturbance or mechanical damage to muscle cells ([9](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref9>), [117](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref117>), [134](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref134>)).
      
      Though athletes are often told that they need to eat carbohydrate immediately after they finish competing, research shows that this isn’t always necessary; they may be able to wait 2 hours after finishing a glycogen-depleting event before eating carbohydrate. In a study examining the rate of glycogen resynthesis, five high-glycemic meals were given to athletes over the course of a 24-hour period after a 2-hour-long glycogen-depleting bout of cycling. One group received the first three meals over the 4-hour period after exercise, while the second group received the first three meals at regular 2-hour intervals starting 2 hours after they finished over the first 6 hours after exercise. The rate of glycogen resynthesis was the same between groups after 8 hours and after 24 hours ([98](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref98>)). Therefore, athletes who have more than 24 hours to recover can likely wait before eating after exercise and replace their glycogen over the 24-hour time period after exercise as long as they consume an adequate amount of carbohydrate. However, athletes who train two or three times a day or have less than 24 hours to recover may want to consider eating or drinking a high-carbohydrate meal immediately after finishing their event and at regular intervals thereafter to quickly replenish glycogen stores.
      
      Because prolonged aerobic endurance exercise breaks down muscle tissue, protein should be included in the aerobic endurance athlete’s posttraining meal to help start muscle building and repair, which may attenuate posttraining and post-event muscle soreness ([80](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref80>)). Consuming protein after training has another benefit: it increases the rate of glycogen storage if carbohydrate intake is inadequate (i.e., <1.2 g of carbohydrate per kilogram body weight per hour) ([57](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref57>)). In a randomized, controlled trial, 18 elite orienteers participated in 13 exercise sessions during one week. Half of the orienteers (the PRO-CON group) ingested a protein drink before (0.3 g per kilogram body weight) and a protein-carbohydrate drink after (0.3 g protein per kilogram body weight + 1 g carbohydrate per kilogram body weight) training. The other half of participants consumed an isocaloric carbohydrate-only beverage before and after exercise (CHO). Diet was kept consistent throughout the study (15/63/22% protein/carbohydrate/fat) except for the addition of the supplements. The basic diet + supplements provided 3.0 g of protein per kilogram body weight/day and 8.3 to 9.3 g of carbohydrate per kilogram body weight/day in the PRO-CON group; the CHO group consumed 1.8 g of protein per kilogram body weight/day and 8.8 to 10.8 g carbohydrate per kilogram body weight/day. A 4 km run test was performed at the beginning and end of the study and 2 hours after participants consumed a standardized breakfast. PRO-CON significantly improved performance and reduced markers of muscle breakdown, while CHO did not improve performance. However, it isn’t clear from this study if the timing of protein made the difference or the increased total daily intake of protein in the PRO-CON as compared to the CHO group ([40](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref40>)).
      
      Other research does suggest that protein is important after endurance exercise. For instance, a single-blind, randomized, triple-crossover design was used to assess how different doses of a protein–leucine blend affected myofibrillar protein fractional synthetic rate (FSR; muscle protein synthesis) in 12 endurance-trained men after 100 minutes of high-intensity cycling (performed 3 hours after a standardized breakfast; diet the day before the test was standardized based on calorie needs and provided the same percentage of carbohydrate, protein, and fat for each subject). Cyclists consumed 70/15/180/30 g protein/leucine/carbohydrate/fat, or 23/5/180/30 g, or 0/0/274/30 g (Control) in four servings during the first 90 minutes of a 240-minute (4-hour) recovery period. The lower-protein, lower-leucine supplement (23/5/180/30 g) increased FSR by 33% ± 12% compared to Control, while additional protein and leucine (70/15/180/30 g) increased FSR by 51% ± 12% compared to Control. Though no significant differences were noted between the two protein and leucine groups, both fared better than placebo, indicating that protein is important after a long, tough workout ([110](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref110>)). Given different workouts, exercise completed in a fasted or unfasted state, and different doses of protein (10-96 g) used in other studies, the precise minimum dose of protein needed to maximize FSR after endurance exercise isn’t clear ([18](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref18>), [49](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref49>)). In addition, it isn’t clear if maximizing FSR in the time period immediately after endurance exercise will translate to improved performance over time. And finally, the ideal time period after endurance training during which protein should be consumed is not clear and may depend on whether training was completed in a fasted or unfasted state as well as on total daily protein intake. However, one study found that delaying protein intake after endurance exercise by as little as 3 hours blunts its anabolic effects ([73](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref73>)).
      
      #### High-Intensity Intermittent Sports
      
      Because athletes who participate in intermittent high-intensity sports—such as basketball, hockey, and soccer—may play more than one game per day, sometimes with just a few hours in between tournament games, immediate recovery after a game is imperative for performance in their next game. And when competing in sports that involve prolonged high-intensity intermittent activity, such as soccer, American football, field and ice hockey, rugby, and tennis, athletes may significantly reduce their muscle glycogen stores, leading to muscular fatigue ([10](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref10>), [55](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref55>)). Fully replacing muscle glycogen before a subsequent bout of exercise or competition may prolong time until fatigue and improve performance. In a study designed to mimic a soccer game, Nicholas and colleagues had six males complete the same exercise test separated by 22 hours on two consecutive days—75 minutes of a prolonged, intermittent, high-intensity shuttle run test after which they completed as many 20 m shuttles as possible (each shuttle alternated between jogging and sprinting). Subjects were assigned to one of two diets for the 22-hour recovery period: a recovery diet including 10 g of carbohydrate per kilogram body weight or an isocaloric diet with more protein and fat than their normal daily diet. Intermittent running capacity improved after the higher-carbohydrate diet as compared to the higher-calorie condition with more protein and fat ([89](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref89>)). Also, Balsom and colleagues found that male study subjects performed significantly more work in both short-term (<10 minutes) and prolonged (>30 minutes) high-intensity intermittent exercise sessions after consuming a high- versus low-carbohydrate diet for the 48-hour period before the exercise sessions ([10](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref10>)).
      
      High-intensity intermittent sports can lead to some degree of muscle damage depending on many factors including the time and intensity of play and body size. Studies show that consuming protein postexercise helps decrease some markers of muscle damage ([34](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref34>)). The ideal amount of protein an athlete should consume immediately after play in a game such as American football or soccer remains unclear at this time. And though postexercise carbohydrate intake can affect performance in a subsequent event or training session, particularly when sessions are close together in time, the addition of protein will not affect performance in a subsequent bout of exercise during the 4-hour recovery period following the initial event or exercise session ([80](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref80>)).
      
      #### Strength and Power Sports
      
      Athletes in strength and power sports rely on both blood glucose and glycogen for energy during competition. Because a single bout of resistance training can lead to significant reductions in glycogen ([74](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref74>)) and decreases in glycogen can impair force production and isometric strength while accentuating muscle weakness, it is imperative that these athletes restore glycogen levels before their next bout of exercise ([39](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref39>), [54](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref54>)). During the recovery period after strength and power competitions, athletes should focus on consuming higher-glycemic carbohydrates immediately postexercise if they must compete or train again over the course of the 24-hour period after the initial training session or competition. The amount of carbohydrate they need to fully replenish glycogen stores depends on many factors, including intensity and the time spent competing, their overall body weight and muscle mass, their preexercise meal (and state of glycogen stores before competition), and whether or not they consumed carbohydrate during the competition. In a crossover study, after an overnight fast, eight men who completed six sets of single-leg knee extensions at 70% of 1RM, until 50% of full knee extension was no longer possible, depleted glycogen levels to 71%. They replaced glycogen stores to 91% of preexercise levels by six hours after training after consuming 1.5 g of carbohydrate per kilogram body weight immediately after the resistance training session and again one hour later. However, when study subjects consumed water only immediately after training and again one hour later, they barely increased muscle glycogen content above depletion levels to 75% ([99](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref99>)).
      
      Net protein balance depends on both muscle protein synthesis and breakdown. And though carbohydrates have no effect on muscle protein synthesis, they help attenuate acute protein breakdown resulting from resistance exercise. The increase in protein breakdown likely depends on the resistance stimulus, the person’s overall nutrition intake, and dietary intake before and during training or competition. One study in untrained young men found that acute protein breakdown increased by 51% ± 17% after a bout of resistance training ([14](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref14>)). In another study, the rate of both mixed muscle protein fractional synthesis rate (muscle protein synthesis) and fractional breakdown rate (breakdown) were measured after a bout of either concentric or eccentric exercise in four untrained men and four untrained women. The rate of synthesis increased significantly above resting levels by 112% in the 3-hour period after exercise, 65% over the 24-hour period after exercise, and 34% over the 48-hour period after exercise. Muscle breakdown also increased by 31% and 18% in the 3- and 24-hour periods after exercise yet returned to baseline by 48 hours after exercise ([104](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref104>)). Relatively small amounts of carbohydrate, somewhere between 30 and 100 g, can sufficiently reduce muscle protein breakdown ([16](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref16>), [35](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref35>)). And though muscle protein breakdown has a role in overall protein balance, muscle protein synthesis plays a much bigger role in overall protein balance ([35](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref35>)).
      
      Supplementing with protein after a muscle-damaging bout of resistance training increases acute muscle protein synthesis. Varying amounts of protein have been used after resistance training to stimulate muscle protein synthesis, though maximal stimulation occurs with 20 to 25 g (providing about 8.5 to 10 g of essential amino acids) of a high-quality, high-leucine, fast protein (one that leads to a rapid rise in amino acids in the bloodstream) in younger individuals, while 40 g or more may be necessary in older adults ([103](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref103>)). Rice is an intermediate-speed leucine-poor protein (though the rise in leucine in the bloodstream appears quickly after consumption of rice protein); larger doses of rice effectively stimulated muscle protein synthesis to the same extent as a higher-quality protein when matched for leucine content ([63](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref63>)). Therefore the leucine content of the protein, and possibly the speed of leucine delivery, appears to be the determining factor for acute changes in maximal stimulation of muscle protein synthesis. A protein dose that contains 2 to 3 g of leucine or 0.05 g of leucine per kilogram body weight will maximally stimulate muscle protein synthesis in younger adults ([91](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref91>), [97](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref97>), [127](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref127>)).
      
      In addition to the acute increase in muscle protein synthesis, consistently supplementing with protein after resistance training led to small to moderate increases in muscle hypertrophy over time compared to conditions in which subjects were not given protein supplements ([22](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref22>), [115](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref115>)). Only one study to date has directly examined the relationship between acute measures of muscle protein synthesis and hypertrophy due to resistance training. In this study 23 young men who were recreationally active but had not participated in a resistance training exercise program in at least a year were tested for initial strength and resting and postexercise rates of muscle protein synthesis. Then they participated in a 16-week linear resistance training program consisting of two days of lower body (leg press, leg extension, leg curl, and calf press) and two days of upper body (chest press, shoulder press, seated row, lat pulldown, biceps curl, triceps extension) exercises performed first thing in the morning after an overnight fast. After exercise each day and at breakfast on nontraining days they consumed a nutrition drink containing 30 g of milk protein, 25.9 g of carbohydrate, and 3.4 g of fat. The study authors found no relationship between the acute rise (6 hours posttraining) in muscle protein synthesis due to exercise training and the nutrition drink provided and muscle hypertrophy. However, the authors also noted that changes in muscle protein synthesis with training were not uniform among study subjects; therefore, though acute changes in muscle protein synthesis are important for muscle hypertrophy, they are not the sole determining factor that predicts a person’s potential to increase muscle growth ([81](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref81>)). Thirty grams of milk protein, as used in this study, provides an estimated 24 g of casein, 6 g of whey protein, and a total of 2.8 g of leucine ([129](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref129>)).
      
      #### Concurrent Training
      
      Exercise interference is a concept suggesting that endurance exercise, when combined with strength training (back-to-back sessions), blunts gains in strength compared to strength training alone but results in improvements in endurance performance ([140](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref140>)). While interest in concurrent training-based research has increased recently, nutrition recommendations for concurrent training are often based on isolated studies examining the impact of nutrition interventions on endurance or resistance training alone. The consumption of carbohydrate after endurance exercise and prelift can help suppress skeletal muscle breakdown. Also, given the impact of protein intake after endurance exercise on muscle protein synthesis, as well as the research suggesting that protein intake during prolonged (>2 hours) resistance training supports greater rates of muscle protein synthesis during exercise compared to a carbohydrate control, athletes should consider consuming protein after endurance exercise and prelift or during their lifting session ([101](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref101>)).
      
      #### Protein at Mealtime
      
      In addition to consuming protein right after working out, adults should also focus on their protein intake at each main meal, especially since resistance training can increase muscle sensitivity to amino acids for 24 to 48 hours after exercise whereas the anabolic effect of a meal lasts approximately 3-5 hours. For optimal muscle remodeling, experts suggest consuming at least 20 to 30 g of protein per meal and eating meals every 3 to 4 hours ([77](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref77>), [101](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref101>)).
      
      The amount of data on muscle protein synthesis in children is limited because invasive measurement procedures are required ([15](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref15>)), and no studies have examined muscle protein synthesis after training and postworkout protein ingestion in healthy children. However, one thing is clear with regard to children: They do not need to follow the same per-meal protein guidelines as adults because the drive for protein synthesis is regulated by insulin and calorie intake as opposed to leucine. Children can therefore consume protein in smaller amounts spread throughout their day to meet their protein needs ([75](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref75>)). For more information about protein needs by sport, see [table 10.3](<E6372ch10_d87.xhtml#t10.3>).
      
      TABLE 10.3 Sport-Specific Protein Needs Sport | Daily protein needs in grams per kilogram body weight | Sample daily intake for a 200 lb man or woman (grams of protein) | Postexercise protein needs | Postexercise protein examples  
      ---|---|---|---|---  
      Low to moderate endurance activity (e.g., jogging, triathlon) | 1.0-1.1 | 1 cup Greek yogurt (22 g) Grilled chicken sandwich (28 g) 1 higher-protein nutrition bar (20 g) Spaghetti with meatballs (4 oz. meatballs) (20 g) | 0.2-0.5 g per kilogram body weight | 1 higher-protein nutrition bar (20 g) 1 cup higher-protein Greek yogurt with 2 Tbsp. peanut butter mixed in 25 g whey protein  
      Elite endurance athlete or one who trains intensely | >1.6 | 1 cup Greek yogurt (22 g) Grilled chicken sandwich (28 g) 2 oz. cheese with wholegrain crackers (20 g) Spaghetti with meatballs (6 oz. meatballs) (30 g) 8 oz. glass of milk (8 g) 1/2 cup cottage cheese (15 g) | 0.2-0.5 g per kilogram body weight | 20 oz. milk or higher- protein soy milk (20 g)  
      American football | 1.0-2.0, though likely at the upper end of this range for those playing at an intense level | 2 g protein per kilogram body weight: 5 large egg whites or whole eggs, cooked with 1 oz. cheese (38 g) Grilled chicken sandwich (28 g) 1 glass of milk (or high-protein soy milk) (8 g) 2 Tbsp peanut butter mixed in 1/2 cup oatmeal (made with milk) (about 20 g) 6 oz. grilled salmon (48 g) 12 oz. glass of milk + 1 scoop whey protein (37 g) | Not clarified by research; therefore, players may want to follow the guidelines for resistance training and consume a minimum of 20-25 g of a fast, high-quality, leucine-rich (2-3 g leucine) protein | Whey protein shake + fruit Other examples (though not fast proteins): >1 cup higher-protein Greek yogurt Grilled cheese sandwich with turkey or chicken  
      Gymnastics | Dietary restriction increases protein needs (if they restrict calories); no studies conducted on gymnasts’ protein needs |  | Not yet clarified by research |   
      Team sports | Likely 1.0-2.0 g per kilogram body weight, depending on the sport and intensity of exercise | 2.0 g per kilogram body weight; follow the same sample daily meal plan as noted above for American football | Not clarified by research |   
      Weightlifting | 1.5-2.0 | 2.0 g per kilogram body weight; follow the same sample daily meal plan as noted above for American football | 20 g egg protein or 25 g whey protein pre- or postexercise or both; studies have used 20-70 g protein in close temporal proximity to resistance exercise, though a protein containing approximately 2-3 g leucine per serving of protein is recommended | Whey protein shake  
      Wrestling | Not known, though dietary restriction increases protein needs |  | No studies have been conducted that specifically outline protein needs for wrestling pre- or postexercise |   
      
      ##### Nutrition for Various Performance Goals
      
      Nutrition for Aerobic Endurance Performance and Recovery
      
        * Aerobic endurance athletes need to consume 8 to 10 g of carbohydrate and 1.0 to 1.6 g of protein per kilogram body weight per day, especially if training for 90 or more minutes.
        * Athletes who eat at least 4 hours before competition should include approximately 1 to 4 g of carbohydrate per kilogram body weight and 0.15 to 0.25 g of protein per kilogram body weight ([124](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref124>)). If the precompetition meal is consumed 2 hours before exercise, athletes should aim for approximately 1 g of carbohydrate per kilogram body weight ([112](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref112>)).
        * Athletes should consume 28 to 144 g of multiple types of carbohydrate (such as sucrose, fructose, and glucose or maltodextrin) per hour during prolonged aerobic endurance exercise to extend time until exhaustion and improve performance ([26](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref26>), [28](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref28>), [62](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref62>), [85](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref85>), [128](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref128>)).
        * During prolonged activity in hot weather, athletes should consume sports drinks containing 20 to 30 mEq of sodium (460-690 mg with chloride as the anion) per liter, 2 to 5 mEq of potassium (78-195 mg) per liter, and carbohydrate in a concentration of 5% to 10% ([53](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref53>)).
        * Postexercise, approximately 1.5 g of carbohydrate per kilogram body weight should be consumed within 30 minutes after stopping the exercise. Some, though not all, studies show that the addition of protein to carbohydrate postworkout may attenuate muscle breakdown and soreness and increase muscle protein synthesis. The ideal amount of protein and the time period after exercise in which it should be consumed are not clear based on the current body of literature and may depend on whether the exercise was performed in the fed versus fasted state and on total calories consumed postworkout ([36](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref36>), [49](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref49>), [80](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref80>)). However, as a general guideline, at least 10 g of protein should also be consumed within a 3-hour time period after endurance exercise (sooner may be better, though the exact time period has yet to be elucidated in the research) ([73](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref73>)).
        * Glycogen stores should be replenished after exercise and before the next bout of training. A regular diet with sufficient carbohydrate intake can restore glycogen over the course of a 24-hour period. For faster glycogen synthesis, athletes should eat or drink a high-carbohydrate meal immediately after exercise and at regular intervals thereafter. This is especially important for athletes who train again less than 24 hours after their initial training session ([57](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref57>)).
      
      Nutrition for Strength
      
        * Athletes should consider supplementing with carbohydrate before and during competition to maintain strength and minimize muscle breakdown ([39](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref39>), [54](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref54>)). In general, strength/speed athletes should consume 5 to 6 g of carbohydrate per kilogram body weight per day. As little as 30 g of carbohydrate after training may reduce muscle breakdown. The ideal time period for carbohydrate consumption postresistance training has yet to be fully clarified; however, consuming carbohydrate sooner (rather than waiting) may be more beneficial, particularly if training was carried out in a fasted state ([35](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref35>)).
        * Because low glycogen can impair muscle force, athletes should consume higher-glycemic carbohydrates immediately following weightlifting or strength and power competitions if they must compete or train again over the course of the 24-hour period after their initial competition. Otherwise, they can consume enough carbohydrate over the course of the day to restore glycogen levels before the next bout of training or competition ([39](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref39>), [54](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref54>), [99](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref99>)).
        * In general, strength/speed athletes should consume 1.4 to 1.7 g of protein per kilogram body weight per day, even if their sport or training includes an aerobic endurance component. After resistance training, younger individuals should consume at least 20 to 25 g (providing about 8.5 to 10 g of essential amino acids) of a high-quality, high-leucine protein (2-3 g), while older adults should consume 40 g or more to maximally stimulate muscle protein synthesis in the acute time period after training ([103](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref103>)). If the exercise was performed in a fasted state (first thing in the morning or more than 3 hours after the last protein-rich meal), the protein should be consumed within 30 minutes after the end of the session; but if the exercise was performed in a fed state (preexercise protein-rich meal or supplement), this postexercise time window may be considerably longer ([8](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref8>)).
        * Between 30 and 100 g of high-glycemic carbohydrates should be consumed after muscle-damaging exercise to reduce muscle protein breakdown ([16](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref16>), [35](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref35>)). 
        * Adult athletes should eat meals containing at least 20 to 30 g of a higher-leucine protein.
      
      Nutrition for Hypertrophy
      
        * Between 30 and 100 g of high-glycemic carbohydrates should be consumed after muscle-damaging exercise to reduce muscle protein breakdown ([16](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref16>), [35](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref35>)).
        * After resistance training, younger individuals should consume at least 20 to 25 g (providing about 8.5 to 10 g of essential amino acids) of a high-quality, high-leucine protein (2-3 g), while older adults should consume 40 g or more to maximally stimulate muscle protein synthesis in the acute time period after training ([103](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref103>)).
        * Adult athletes should eat meals containing at least 20 to 30 g of a higher-leucine protein every 3 to 4 hours.
      
      Nutrition for Muscular Endurance
      
        * Maintain adequate hydration by preventing water weight losses exceeding 2% of body weight.
        * During prolonged training or competition, consider a carbohydrate-electrolyte beverage to delay fatigue and improve performance, particularly if performing after an overnight fast ([136](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref136>)) ([3](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref3>)).
        * Fully replace glycogen stores before the next training session or competition.
        * Consume protein after training or games to minimize muscle damage and soreness ([34](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref34>)).

  - id: "ch10-nutrition-strategies-for-altering-body-c"
    title: "Nutrition Strategies for Altering Body Composition"
    level: 2
    tags: []
    key_points:
    recall_prompts:
    content: |
      
      
      Athletes who want to alter their body composition typically need to gain muscle, lose body fat, or both. Although there are some scenarios (typically in those with eating disorders) in which an athlete may need to gain both muscle and fat, this section focuses on gaining muscle and losing body fat.
      
      The first step toward altering body composition involves estimating calorie needs (though _calorie_ is the common term, the technical term is _kilocalorie_). The number of calories an athlete needs each day depends on a number of factors including genetics, body weight, body composition, training program, and age. Children and adolescents also need calories for growth and development. 
      
      Basal metabolic rate (BMR) is by far the largest contributor to total energy expenditure, accounting for approximately 65% to 70% of daily energy expenditure ([59](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref59>), [107](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref107>)). It is a measure of the calories required for maintaining normal body functions such as respiration, blood circulation, and gastrointestinal and renal processing. _Basal metabolic rate_ and _resting metabolic rate_ (RMR) are often used interchangeably, though they are slightly different. Basal metabolic rate is measured after an overnight fast (12 to 14 hours without food) with the subject resting supine and motionless but awake ([32](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref32>), [52](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref52>)). Resting metabolic rate is often used instead of BMR due to the ease of measurement (an overnight fast is not required), yet it is 10% to 20% higher than BMR due to increased energy expenditure resulting from recent food intake or physical activity completed earlier in the day. Several factors influence BMR and RMR, particularly fat-free mass, which explains approximately 70% to 80% of the difference in RMR among individuals ([52](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref52>), [88](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref88>), [108](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref108>)). Other factors include age, nutrition status, genetics, and differences in endocrine functioning (such as hypo- or hyperthyroidism).
      
      The second-largest component of an individual’s energy requirement is the energy expended in physical activity. Of all the components, it is the most variable among individuals. The number of calories expended through physical activity increases with the frequency, intensity, and duration of the training program, as well as nontraining daily activity (washing a car, doing housework, and so on). Typically, 20% to 30% of total daily energy expenditure is from physical activity, though this figure may be considerably higher in athletes ([59](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref59>), [107](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref107>)). The highest energy costs are seen in aerobic activities performed by large athletes for long periods of time, whereas lowest energy costs are associated with skill and power sports performed by smaller athletes.
      
      The thermic effect of food, also known as diet-induced thermogenesis, is the increase in energy expenditure above the RMR that can be measured for several hours following a meal. The thermic effect of food includes the energy cost of digestion, absorption, metabolism, and storage of food in the body. The thermic effect of food accounts for approximately 10% to 15% of total calories burned each day ([59](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref59>), [107](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref107>)).
      
      Many different equations can be used to calculate calorie needs, including the Cunningham equation and Harris-Benedict equation, which are prediction equations. Harris-Benedict takes sex, body weight, height, and age into account to predict RMR. Resting metabolic rate can then be multiplied by an activity factor from 1.2 (sedentary) to 1.9 (heavy physical activity) to predict energy requirements ([42](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref42>)). However, the Harris-Benedict does not take into account how muscle mass affects RMR ([83](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref83>)). The Cunningham equation takes the same variables into account as Harris-Benedict but also includes fat-free mass, making it more applicable to athletes ([126](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref126>)).
      
      RMR = 500 + 22(LBM in kg)
      
      After using the Cunningham equation to estimate RMR based on lean body mass (LBM), an activity factor can be used to estimate total daily energy expenditure. Instead of using a basic activity factor, the strength and conditioning coach may choose to use metabolic equivalents (MET values)—an estimate of caloric expenditure during activity. One MET is the energy equivalent of sitting quietly; therefore, the greater the intensity of exercise, the higher the MET value ([2](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref2>)).
      
      Another, more laborious method that can be used by very motivated athletes is to record dietary intake for a minimum of three consecutive, representative days during a period of stable body weight. The individual’s daily energy requirement is assumed to equal the average number of calories consumed each day. The pitfall of this method is that recording food intake usually alters normal eating habits and people do not always accurately record their food intake ([47](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref47>), [114](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref114>)). Finally, a very simple method for quickly assessing calorie needs is presented in [table 10.4](<E6372ch10_d87.xhtml#t10.4>).
      
      TABLE 10.4 Estimated Daily Calorie Needs of Male and Female Athletes by Activity Level Activity level | Male | Female  
      ---|---|---  
      kcal/lb | kcal/kg | kcal/lb | kcal/kg  
      Light | 17 | 38 | 16 | 35  
      Moderate | 19 | 41 | 17 | 37  
      Heavy | 23 | 50 | 20 | 44  
      
      _Light activity level:_ Walking on a level surface at 2.5 to 3.0 miles per hour (4.0 to 4.8 km/h), garage work, electrical trades, carpentry, restaurant trades, housecleaning, child care, golf, sailing, table tennis.
      
      _Moderate activity level:_ Walking 3.5 to 4.0 miles per hour (5.6 to 6.4 km/h), weeding and hoeing, cycling, skiing, tennis, dancing.
      
      _Heavy activity level:_ Walking with load uphill, heavy manual digging, basketball, climbing, American football, soccer.
      
      ### Weight Gain
      
      An athlete’s ability to gain weight depends on numerous factors; the ones that can be controlled include diet and training. The off-season should be used as a time to make dietary changes that focus on weight gain since athletes do not have the pressures of competition on their mind.
      
      If athletes increase their calorie intake dramatically and consistently, they could gain more fat than they would like. A general guideline, which should be adjusted based on the athlete, is to consume approximately 500 additional calories per day in order to gain weight ([106](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref106>)). Eating larger portion sizes, increasing meal frequency, and focusing on choosing calorie-dense foods are all strategies that can help an athlete gain weight. In addition to increasing total calorie intake, athletes should ensure that they are eating enough protein to maximize gains in lean body mass: 1.5 to 2.0 g per kilogram body weight per day. Increasing an athlete’s protein intake may make weight gain tough, given the profound effect that protein has on satiety, as well as the increased thermic effect of feeding associated with higher-protein diets. However, overfeeding protein is advantageous if the athlete can sustain the diet. In a randomized, controlled overfeeding study, 16 healthy adults lived in a metabolic ward for eight weeks and were overfed a diet containing low (5% of total calories), normal (15% of total calories), or high (25% of total calories) protein. The subjects who consumed the normal- and high-protein diet stored approximately 45% of the excess calories as lean body mass, whereas those on the low-protein diet stored 95% of the excess calories consumed as body fat ([31](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref31>)). In addition to making dietary changes, athletes who want to gain weight should consider supplementing with creatine monohydrate, a supplement that safely and effectively increases lean body weight ([69](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref69>)).
      
      Finally, though athletes may know their energy and protein needs, putting this knowledge into practice can be perplexing. Therefore, regular nutrition counseling (or coaching) by a sports dietitian or sports nutritionist with an advanced degree is a recommended strategy for facilitating greater weight gain. A study in 21 elite athletes with heavy training loads, who were randomized to receive nutrition counseling or to eat ad libitum, showed that over the course of the 8- to 12-week weight gain period, the group receiving dietary counseling had greater total and lean body mass gains during the intervention and after 12 months; this means that the group receiving nutrition counseling continued to benefit from the nutrition guidance for several months after counseling ended ([33](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref33>)).
      
      ### Weight (Fat) Loss
      
      Athletes participating in a variety of sports may need to lose body fat to improve aspects of performance such as speed or endurance. Plus, regulating body weight may give certain athletes a mental advantage going into competition ([102](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref102>)). In addition, maintaining or making weight is a recurring aspect of sports that include weight classes, weight limitations, or judging based on appearance such as weightlifting, wrestling, boxing, lightweight crew, and gymnastics.
      
      Despite diet books on the bestseller lists, there is no ideal diet that works for everyone. Instead, studies show that a variety of types of diets, including low-carbohydrate and low-fat diets, result in weight loss as long as the people following them are consuming fewer calories than needed to maintain weight. In addition, there appears to be no difference between the amount of weight loss on a low-carbohydrate as compared to a low-fat (and therefore higher-carbohydrate) diet ([17](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref17>), [30](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref30>)). Total calorie intake and dietary adherence, the ability to stick with a diet over time, are the two most important factors that predict successful weight loss. However, a good portion of weight loss during dieting may come from muscle ([135](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref135>)). And because muscle protein synthesis is an energy-expensive process, during times of dieting, caloric restriction may decrease muscle protein synthesis. Athletes who want to maintain muscle and lose body fat while dieting should consume about 1.8 to 2.7 g protein per kilogram body weight per day (or approximately 2.3-3.1 g protein per kilogram fat-free mass per day) in addition to maintaining a moderate energy deficit of approximately 500 calories/day ([84](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref84>)).
      
      There is no one ideal diet. Instead, athletes need to choose a dietary approach based on whether it is safe for them, contains enough protein to meet their needs, and fits their lifestyle so that they can easily adhere to it.
      
      #### Low-Carbohydrate Diets
      
      The popularity and effectiveness of low-carbohydrate diets may have less to do with cutting carbohydrates (in healthy individuals) and more to do with a temporary decrease in water weight, cutting calories, and increasing protein intake. When people significantly reduce their carbohydrate intake, they deplete their glycogen stores (carbohydrate stored with three to four parts water) and therefore quickly drop pounds from water weight. Once carbohydrates are reintroduced into the diet, they can rapidly gain the weight back ([67](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref67>)).
      
      Over time, however, low-carbohydrate diets may work for some people because of increased levels of protein. Protein increases feelings of fullness (satiety) in a dose-dependent manner—the more protein consumed at one sitting, the greater its effect on satiety. However, at this time the “optimal dose” for maximum satiety remains unclear. Protein also increases the thermic effect of feeding. More calories are burned during digesting and processing protein than carbohydrate or fat. And finally, protein helps spare metabolically active lean muscle tissue during weight loss. This is important because muscle burns a few more calories at rest than fat does, and over time this can affect body weight. Plus, more muscle may mean that a person can train harder and therefore burn more calories during training ([84](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref84>)).
      
      Though cutting carbohydrates may be detrimental for a number of competitive athletes, particularly during precompetition and competition phases, it is a very effective approach for someone with insulin resistance (a condition that leads to the buildup of glucose in the blood because the body doesn’t use insulin effectively), as well as type 2 diabetes. It may also be a very effective approach for overweight and obese individuals ([43](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref43>), [46](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref46>), [141](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref141>)).
      
      In order to be sustainable in the long term, diets should be individualized, be easy to adhere to, and take into account lifestyle habits, medical history (including diabetes, insulin resistance, other diseases and medical concerns), diet history, and food preferences while providing all of the nutrients an athlete needs to train and perform optimally. And finally, research shows that ongoing behavior therapy and support can improve long-lasting results ([76](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref76>)).
      
      #### Overweight and Obesity
      
      Overweight and obesity, defined as a body mass index (BMI) of 25 to 29.9 kg/m2 and ≥30 kg/m2, respectively, increase a person’s risk of morbidity from hypertension; dyslipidemia; coronary heart disease; gallbladder disease; stroke; type 2 diabetes; sleep apnea; osteoarthritis; respiratory problems; and endometrial, breast, prostate, and colon cancers ([86](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref86>)). Obesity is categorized as a disease and affects 34.9% of adults and 17% of children in the United States ([92](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref92>)).
      
      The causes of obesity are complex and include an interaction of genes and environment, involving social, behavioral, cultural, metabolic, physiological, and genetic factors. However, many treatment options are effective, including dietary therapy, altering physical activity patterns, behavior therapy techniques, pharmacotherapy, and surgery. Some patients and clinicians employ a combination of these treatments. The initial goal for weight loss in overweight and obese individuals should be 10% of initial weight within six months ([86](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref86>)).
      
      Body mass index is considered a measure of body fat calculated from height and weight. Body mass index is often used to assess risk for diseases associated with more body fat; however, in reality, it is a measure of excess weight as opposed to excess body fat ([86](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref86>)) because BMI cannot distinguish between excess fat and muscle or bone mass ([21](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref21>)). Lastly, age, sex, ethnicity, and muscle mass affect the association between BMI and body fat. Therefore, BMI can overestimate body fat in athletes and others with muscular builds and underestimate body fat in older persons or those who have lost muscle ([86](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref86>)). The same factors that affect the relationship between BMI and body fat in adults are applicable to children. In addition, height and sexual maturation influence a child’s BMI. The same calculation is used for children, but BMI interpretations for children take into account age and sex.
      
      Body mass index should not be used as a diagnostic tool but instead as an initial screening tool to identify potential weight issues in individuals and to track population-based rates of overweight and obesity. In addition, no single body fat measure should be used to assess health, disease, or disease risk ([21](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref21>)). Overweight and obesity combined with other risk factors, including high blood pressure, high low-density lipoprotein cholesterol, low high-density lipoprotein cholesterol, high triglycerides, high blood glucose, physical inactivity, family history of premature heart disease, or cigarette smoking, increase a person’s risk for heart disease ([86](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref86>)).
      
      Body mass index should not be used as a diagnostic tool but instead as an initial screening tool to identify potential weight issues in individuals and to track population-based rates of overweight and obesity.
      
      Waist circumference is another measure commonly used to assess disease risk. Men have an increased relative risk for disease if they have a waist circumference greater than 40 inches (102 cm), while women have an increased relative risk if they have a waist circumference greater than 35 inches (88 cm) ([86](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref86>)).
      
      ##### Calculating BMI
      
      To estimate BMI using kilograms and meters, use this equation:
      
      Weight (kilograms) / Height (meters)2
      
      To estimate BMI using pounds and inches, use this equation:
      
      [Weight (pounds) / Height (inches)2] × 703
      
      Overweight is defined as a BMI of 25 to 29.9 kg/m2 and obesity as a BMI of 30 kg/m2 or more.
      
      [Table 10.5](<E6372ch10_d87.xhtml#t10.5>) describes the various classifications of overweight and obesity. For reference, [table 10.6](<E6372ch10_d87.xhtml#t10.6>) provides the weights and heights that correspond to BMIs of 25, 27, and 30. [Table 10.7](<E6372ch10_d87.xhtml#t10.7>) lists BMI categories for corresponding percentile rankings for children. For more information about the screening process and risk assessment, refer to Clinical Guidelines on the Identification, Evaluation, and Treatment of Overweight and Obesity in Adults on the National Heart, Lung, and Blood Institute’s website. Strength and conditioning professionals should use other, more accurate measures of body composition such as skinfolds or dual-energy X-ray absorptiometry (DEXA) in athletes with more muscle than their age- and sex-matched counterparts since BMI is more likely to overestimate overweight and obesity ([70](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref70>)).
      
      TABLE 10.5 Classification of Adult Weight by body Mass Index (bMI) and Associated Disease Risk ([86](<E6372RM_Refs_d104_split_010.xhtml#chapter10-ref86>)) |  |  | Disease risk** relative to normal weight and waist circumference  
      ---|---|---|---  
